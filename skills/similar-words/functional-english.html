<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>B2 Speaking — Part 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400;1,500&family=DM+Sans:wght@400;500;600;700;800&display=swap');

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* INTUITY dark ground — unified with the phrase bank & essay pages */
  --bg:      #0d0d0d;
  --surface: #ffffff;
  --border:  rgba(255,255,255,.10);
  --border2: rgba(255,255,255,.16);
  --text:    #e8e8ea;
  --muted:   #b5b5bb;
  --faint:   #7a7a82;
  --hh: 56px;
  --fh: 54px;
  --ff: 'DM Sans', sans-serif;
  --fd: 'Lora', serif;

  /* the five family hues (shared with phrase-bank) */
  --fam-evaluating:#3fbfb2;  --fam-evaluating-d:#2a8b81;
  --fam-reasoning:#f0a23c;   --fam-reasoning-d:#c07a1f;
  --fam-positioning:#e85a4f; --fam-positioning-d:#b83a31;
  --fam-projecting:#9a6baa;  --fam-projecting-d:#6d4a7c;
  --fam-relating:#C9A961;    --fam-relating-d:#9a7d3f;
  --gold:#C9A961;

  /* each function points at its family hue.
     bg = translucent tint on dark · bd = border · acc = active text · lbl = eyebrow */
  /* EVALUATING (teal): advantages, disadvantages, problems, solution */
  --c-advantages-bg:rgba(63,191,178,.13);   --c-advantages-bd:rgba(63,191,178,.5);   --c-advantages-acc:#5fd4c7;  --c-advantages-lbl:#5fd4c7;
  --c-disadvantages-bg:rgba(63,191,178,.13);--c-disadvantages-bd:rgba(63,191,178,.5);--c-disadvantages-acc:#5fd4c7;--c-disadvantages-lbl:#5fd4c7;
  --c-problems-bg:rgba(63,191,178,.13);     --c-problems-bd:rgba(63,191,178,.5);     --c-problems-acc:#5fd4c7;    --c-problems-lbl:#5fd4c7;
  --c-solution-bg:rgba(63,191,178,.13);     --c-solution-bd:rgba(63,191,178,.5);     --c-solution-acc:#5fd4c7;    --c-solution-lbl:#5fd4c7;
  /* REASONING (amber): cause, effect, justifying */
  --c-cause-bg:rgba(240,162,60,.13);        --c-cause-bd:rgba(240,162,60,.5);        --c-cause-acc:#f5b45f;      --c-cause-lbl:#f5b45f;
  --c-effect-bg:rgba(240,162,60,.13);       --c-effect-bd:rgba(240,162,60,.5);       --c-effect-acc:#f5b45f;     --c-effect-lbl:#f5b45f;
  --c-justifying-bg:rgba(240,162,60,.13);   --c-justifying-bd:rgba(240,162,60,.5);   --c-justifying-acc:#f5b45f; --c-justifying-lbl:#f5b45f;
  /* POSITIONING (coral): opinion, agree, disagree, partial */
  --c-opinion-bg:rgba(232,90,79,.13);       --c-opinion-bd:rgba(232,90,79,.5);       --c-opinion-acc:#f0776d;   --c-opinion-lbl:#f0776d;
  --c-agree-bg:rgba(232,90,79,.13);         --c-agree-bd:rgba(232,90,79,.5);         --c-agree-acc:#f0776d;     --c-agree-lbl:#f0776d;
  --c-disagree-bg:rgba(232,90,79,.13);      --c-disagree-bd:rgba(232,90,79,.5);      --c-disagree-acc:#f0776d;  --c-disagree-lbl:#f0776d;
  --c-partial-bg:rgba(232,90,79,.13);       --c-partial-bd:rgba(232,90,79,.5);       --c-partial-acc:#f0776d;   --c-partial-lbl:#f0776d;
  /* PROJECTING (plum): speculation, generalising */
  --c-speculation-bg:rgba(154,107,170,.15); --c-speculation-bd:rgba(154,107,170,.55);--c-speculation-acc:#c79bd6;--c-speculation-lbl:#c79bd6;
  --c-generalising-bg:rgba(154,107,170,.15);--c-generalising-bd:rgba(154,107,170,.55);--c-generalising-acc:#c79bd6;--c-generalising-lbl:#c79bd6;
  /* RELATING (gold): comparing */
  --c-comparing-bg:rgba(201,169,97,.15);    --c-comparing-bd:rgba(201,169,97,.55);   --c-comparing-acc:#d9bd7e; --c-comparing-lbl:#d9bd7e;
}

html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--ff); overflow:hidden; }

#load { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:9999; }
#load.gone { display:none; }
.ld-title { font-family:var(--fd); font-size:22px; font-style:italic; }
.ld-sub   { font-size:11px; color:var(--faint); letter-spacing:.12em; }
.ld-err   { font-size:13px; color:#dc2626; text-align:center; max-width:340px; line-height:1.7; }
.spin { width:26px; height:26px; border:2px solid var(--border2); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

#hdr {
  position:fixed; top:0; left:0; right:0; height:var(--hh); z-index:200;
  background:#151517; border-bottom:1.5px solid var(--border2);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; gap:14px; box-shadow:0 1px 8px rgba(0,0,0,.06);
}
.hdr-brand { display:flex; flex-direction:column; gap:1px; }
.hdr-t { font-size:14px; font-weight:800; color:var(--text); letter-spacing:-.01em; }
.hdr-s { font-size:9px; color:var(--faint); letter-spacing:.14em; }

.mode-pill {
  display:flex; background:rgba(255,255,255,.06);
  border:1.5px solid var(--border2); border-radius:99px; padding:3px; gap:2px; flex-shrink:0;
}
.mb {
  font-size:12px; font-weight:800; letter-spacing:.04em;
  padding:6px 18px; border-radius:99px; border:none; cursor:pointer;
  font-family:var(--ff); background:transparent; color:var(--faint); transition:all .2s;
}
.mb.on { background:rgba(255,255,255,.14); color:#fff; box-shadow:none; }

.prompt-btn {
  font-size:12px; font-weight:700; padding:7px 14px;
  border-radius:8px; border:1.5px solid var(--border2);
  background:transparent; color:var(--muted); cursor:pointer;
  font-family:var(--ff); transition:all .2s; white-space:nowrap; flex-shrink:0;
}
.prompt-btn:hover { color:var(--text); border-color:rgba(255,255,255,.3); background:rgba(255,255,255,.06); }

#fstrip {
  position:fixed; top:var(--hh); left:0; right:0; height:var(--fh); z-index:190;
  background:#151517; border-bottom:1.5px solid var(--border2);
  display:flex; align-items:center; gap:7px;
  padding:0 18px; overflow-x:auto; scrollbar-width:none;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
#fstrip::-webkit-scrollbar { display:none; }

.fb {
  font-size:13px; font-weight:700; letter-spacing:.01em; white-space:nowrap;
  padding:8px 20px; border-radius:99px;
  border:1.5px solid var(--border2); background:rgba(255,255,255,.05); color:var(--muted);
  cursor:pointer; font-family:var(--ff); transition:all .18s; flex-shrink:0;
}
.fb:hover { color:#fff; border-color:rgba(255,255,255,.28); background:rgba(255,255,255,.08); }

.fb[data-fn="advantages"].on    { background:var(--c-advantages-bg);    border-color:var(--c-advantages-bd);    color:var(--c-advantages-acc); }
.fb[data-fn="disadvantages"].on { background:var(--c-disadvantages-bg); border-color:var(--c-disadvantages-bd); color:var(--c-disadvantages-acc); }
.fb[data-fn="problems"].on      { background:var(--c-problems-bg);      border-color:var(--c-problems-bd);      color:var(--c-problems-acc); }
.fb[data-fn="solution"].on      { background:var(--c-solution-bg);      border-color:var(--c-solution-bd);      color:var(--c-solution-acc); }
.fb[data-fn="cause"].on         { background:var(--c-cause-bg);         border-color:var(--c-cause-bd);         color:var(--c-cause-acc); }
.fb[data-fn="effect"].on        { background:var(--c-effect-bg);        border-color:var(--c-effect-bd);        color:var(--c-effect-acc); }
.fb[data-fn="agree"].on         { background:var(--c-agree-bg);         border-color:var(--c-agree-bd);         color:var(--c-agree-acc); }
.fb[data-fn="disagree"].on      { background:var(--c-disagree-bg);      border-color:var(--c-disagree-bd);      color:var(--c-disagree-acc); }
.fb[data-fn="partial"].on       { background:var(--c-partial-bg);       border-color:var(--c-partial-bd);       color:var(--c-partial-acc); }
.fb[data-fn="opinion"].on       { background:var(--c-opinion-bg);       border-color:var(--c-opinion-bd);       color:var(--c-opinion-acc); }
.fb[data-fn="speculation"].on   { background:var(--c-speculation-bg);   border-color:var(--c-speculation-bd);   color:var(--c-speculation-acc); }
.fb[data-fn="justifying"].on    { background:var(--c-justifying-bg);    border-color:var(--c-justifying-bd);    color:var(--c-justifying-acc); }
.fb[data-fn="comparing"].on     { background:var(--c-comparing-bg);     border-color:var(--c-comparing-bd);     color:var(--c-comparing-acc); }
.fb[data-fn="generalising"].on  { background:var(--c-generalising-bg);  border-color:var(--c-generalising-bd);  color:var(--c-generalising-acc); }

#app {
  position:fixed; top:calc(var(--hh) + var(--fh)); left:0; right:0; bottom:0; overflow:hidden;
}

#classCanvas { width:100%; height:100%; position:relative; }

#promptCard {
  position:absolute; top:24px; left:50%; transform:translateX(-50%);
  background:#fff; border:1.5px solid rgba(0,0,0,.12); border-radius:16px;
  padding:16px 28px; text-align:center; min-width:280px; max-width:540px;
  cursor:grab; box-shadow:0 2px 14px rgba(0,0,0,.08);
  user-select:none; z-index:10; display:none;
}
#promptCard.show { display:block; }
#promptCard:active { cursor:grabbing; }
.pc-txt { font-family:var(--fd); font-size:17px; font-style:italic; color:#5a5a5a; line-height:1.55; }

.phrase-card {
  position:absolute; border-radius:14px; border:1.5px solid rgba(0,0,0,.08);
  background:#fff;
  padding:14px 16px 13px; min-width:220px; max-width:275px;
  cursor:grab; box-shadow:0 10px 26px -8px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.3);
  user-select:none; z-index:20;
  border-top:3px solid var(--card-accent,#ccc);
}
.phrase-card:active { cursor:grabbing; }
.phrase-card.used   { opacity:.45; cursor:default; }

.phrase-card[data-fn="advantages"] { --card-accent:#3fbfb2; }
.phrase-card[data-fn="disadvantages"] { --card-accent:#3fbfb2; }
.phrase-card[data-fn="problems"] { --card-accent:#3fbfb2; }
.phrase-card[data-fn="solution"] { --card-accent:#3fbfb2; }
.phrase-card[data-fn="cause"] { --card-accent:#f0a23c; }
.phrase-card[data-fn="effect"] { --card-accent:#f0a23c; }
.phrase-card[data-fn="agree"] { --card-accent:#e85a4f; }
.phrase-card[data-fn="disagree"] { --card-accent:#e85a4f; }
.phrase-card[data-fn="partial"] { --card-accent:#e85a4f; }
.phrase-card[data-fn="opinion"] { --card-accent:#e85a4f; }
.phrase-card[data-fn="speculation"] { --card-accent:#9a6baa; }
.phrase-card[data-fn="justifying"] { --card-accent:#f0a23c; }
.phrase-card[data-fn="comparing"] { --card-accent:#C9A961; }
.phrase-card[data-fn="generalising"] { --card-accent:#9a6baa; }

.phc-fn { font-size:9px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
.phrase-card[data-fn="advantages"]    .phc-fn { color:var(--c-advantages-lbl); }
.phrase-card[data-fn="disadvantages"] .phc-fn { color:var(--c-disadvantages-lbl); }
.phrase-card[data-fn="problems"]      .phc-fn { color:var(--c-problems-lbl); }
.phrase-card[data-fn="solution"]      .phc-fn { color:var(--c-solution-lbl); }
.phrase-card[data-fn="cause"]         .phc-fn { color:var(--c-cause-lbl); }
.phrase-card[data-fn="effect"]        .phc-fn { color:var(--c-effect-lbl); }
.phrase-card[data-fn="agree"]         .phc-fn { color:var(--c-agree-lbl); }
.phrase-card[data-fn="disagree"]      .phc-fn { color:var(--c-disagree-lbl); }
.phrase-card[data-fn="partial"]       .phc-fn { color:var(--c-partial-lbl); }
.phrase-card[data-fn="opinion"]       .phc-fn { color:var(--c-opinion-lbl); }
.phrase-card[data-fn="speculation"]   .phc-fn { color:var(--c-speculation-lbl); }
.phrase-card[data-fn="justifying"]    .phc-fn { color:var(--c-justifying-lbl); }
.phrase-card[data-fn="comparing"]     .phc-fn { color:var(--c-comparing-lbl); }
.phrase-card[data-fn="generalising"]  .phc-fn { color:var(--c-generalising-lbl); }

.phc-stem { font-size:17px; font-weight:700; color:#1a1a1a; line-height:1.3; margin-bottom:5px; }
.phc-conn { font-size:13px; font-style:italic; font-family:var(--fd); color:#6a6a6a; line-height:1.4; }
.phc-who  { font-size:11px; font-weight:700; color:#3a7a55; margin-top:9px; letter-spacing:.03em; }

#stu {
  position:fixed; bottom:0; left:0; right:0; z-index:300;
  background:#151517; border-top:1.5px solid var(--border2);
  padding:14px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  transform:translateY(100%); transition:transform .28s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
}
#stu.open { transform:translateY(0); }
.stu-lbl { font-size:10px; font-weight:800; color:var(--faint); letter-spacing:.1em; flex-shrink:0; }
#stuName {
  background:rgba(255,255,255,.06); border:1.5px solid var(--border2);
  border-radius:8px; padding:8px 14px; font-size:14px;
  color:var(--text); outline:none; width:170px; font-family:var(--ff);
}
#stuName:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,169,97,.18); }
.stu-mark {
  font-size:12px; font-weight:700; padding:9px 20px; border-radius:8px;
  border:1.5px solid rgba(63,191,178,.5); background:rgba(63,191,178,.14); color:#5fd4c7;
  cursor:pointer; font-family:var(--ff); transition:all .15s;
}
.stu-mark:hover { background:rgba(63,191,178,.24); }
.stu-close { margin-left:auto; font-size:20px; line-height:1; color:var(--faint); background:none; border:none; cursor:pointer; }
.stu-close:hover { color:var(--text); }

#pdrop {
  position:fixed; top:calc(var(--hh) + 8px); right:20px;
  background:#1a1a1d; border:1.5px solid var(--border2);
  border-radius:14px; min-width:360px; z-index:400;
  box-shadow:0 10px 36px rgba(0,0,0,.14); display:none;
  max-height:calc(100vh - 90px); overflow-y:auto;
}
#pdrop.show { display:block; animation:dropIn .18s ease; }
@keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
.pd-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:13px 16px; cursor:pointer;
  border-bottom:1px solid var(--border); transition:background .12s;
}
.pd-item:last-child { border-bottom:none; }
.pd-item:hover { background:rgba(255,255,255,.05); }
.pd-item.sel { background:rgba(201,169,97,.14); }
.pd-num { font-size:10px; font-weight:800; color:var(--faint); letter-spacing:.06em; padding-top:2px; flex-shrink:0; min-width:20px; }
.pd-q { font-family:var(--fd); font-size:13px; font-style:italic; color:var(--muted); line-height:1.5; }
.pd-item.sel .pd-q { color:var(--text); }

/* SOLO */
#soloView {
  width:100%; height:100%; display:none; flex-direction:column; align-items:center;
  overflow-y:auto; padding:24px 16px 60px;
  scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.1) transparent;
}
.solo-prompt {
  background:#151517; border:1.5px solid var(--border2); border-radius:14px;
  padding:18px 28px; text-align:center; max-width:700px; width:100%; margin-bottom:20px;
  box-shadow:0 1px 8px rgba(0,0,0,.05);
}
.sop-q { font-family:var(--fd); font-size:17px; font-style:italic; color:var(--muted); line-height:1.5; }

.func-tabs {
  display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
  max-width:700px; width:100%; margin-bottom:20px;
}
.ftab {
  font-size:12px; font-weight:700; letter-spacing:.01em;
  padding:7px 16px; border-radius:99px;
  border:1.5px solid var(--border2); background:rgba(255,255,255,.05); color:var(--faint);
  cursor:pointer; font-family:var(--ff); transition:all .18s;
}
.ftab:hover { color:#fff; background:rgba(255,255,255,.08); }
.ftab[data-fn="advantages"].on    { background:var(--c-advantages-bg);    border-color:var(--c-advantages-bd);    color:var(--c-advantages-acc); }
.ftab[data-fn="disadvantages"].on { background:var(--c-disadvantages-bg); border-color:var(--c-disadvantages-bd); color:var(--c-disadvantages-acc); }
.ftab[data-fn="problems"].on      { background:var(--c-problems-bg);      border-color:var(--c-problems-bd);      color:var(--c-problems-acc); }
.ftab[data-fn="solution"].on      { background:var(--c-solution-bg);      border-color:var(--c-solution-bd);      color:var(--c-solution-acc); }
.ftab[data-fn="cause"].on         { background:var(--c-cause-bg);         border-color:var(--c-cause-bd);         color:var(--c-cause-acc); }
.ftab[data-fn="effect"].on        { background:var(--c-effect-bg);        border-color:var(--c-effect-bd);        color:var(--c-effect-acc); }
.ftab[data-fn="agree"].on         { background:var(--c-agree-bg);         border-color:var(--c-agree-bd);         color:var(--c-agree-acc); }
.ftab[data-fn="disagree"].on      { background:var(--c-disagree-bg);      border-color:var(--c-disagree-bd);      color:var(--c-disagree-acc); }
.ftab[data-fn="partial"].on       { background:var(--c-partial-bg);       border-color:var(--c-partial-bd);       color:var(--c-partial-acc); }
.ftab[data-fn="opinion"].on       { background:var(--c-opinion-bg);       border-color:var(--c-opinion-bd);       color:var(--c-opinion-acc); }
.ftab[data-fn="speculation"].on   { background:var(--c-speculation-bg);   border-color:var(--c-speculation-bd);   color:var(--c-speculation-acc); }
.ftab[data-fn="justifying"].on    { background:var(--c-justifying-bg);    border-color:var(--c-justifying-bd);    color:var(--c-justifying-acc); }
.ftab[data-fn="comparing"].on     { background:var(--c-comparing-bg);     border-color:var(--c-comparing-bd);     color:var(--c-comparing-acc); }
.ftab[data-fn="generalising"].on  { background:var(--c-generalising-bg);  border-color:var(--c-generalising-bd);  color:var(--c-generalising-acc); }

#choiceRow {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:10px; max-width:700px; width:100%; margin-bottom:20px;
}
.choice-card {
  border-radius:13px; padding:18px 16px 15px; cursor:pointer; background:#fff;
  transition:all .18s; border:1.5px solid rgba(0,0,0,.1); border-top:3px solid var(--card-accent,#ccc);
  display:flex; flex-direction:column; gap:7px;
}
.choice-card:hover { transform:translateY(-2px); box-shadow:0 10px 26px -6px rgba(0,0,0,.5); }
.choice-card.picked { cursor:default; transform:none; border-width:2px; }
.choice-card[data-fn="advantages"] { --card-accent:#3fbfb2; }
.choice-card[data-fn="disadvantages"] { --card-accent:#3fbfb2; }
.choice-card[data-fn="problems"] { --card-accent:#3fbfb2; }
.choice-card[data-fn="solution"] { --card-accent:#3fbfb2; }
.choice-card[data-fn="cause"] { --card-accent:#f0a23c; }
.choice-card[data-fn="effect"] { --card-accent:#f0a23c; }
.choice-card[data-fn="agree"] { --card-accent:#e85a4f; }
.choice-card[data-fn="disagree"] { --card-accent:#e85a4f; }
.choice-card[data-fn="partial"] { --card-accent:#e85a4f; }
.choice-card[data-fn="opinion"] { --card-accent:#e85a4f; }
.choice-card[data-fn="speculation"] { --card-accent:#9a6baa; }
.choice-card[data-fn="justifying"] { --card-accent:#f0a23c; }
.choice-card[data-fn="comparing"] { --card-accent:#C9A961; }
.choice-card[data-fn="generalising"] { --card-accent:#9a6baa; }

.cc-num { font-size:9px; font-weight:800; letter-spacing:.1em; }
.choice-card[data-fn="advantages"]    .cc-num { color:var(--c-advantages-lbl); }
.choice-card[data-fn="disadvantages"] .cc-num { color:var(--c-disadvantages-lbl); }
.choice-card[data-fn="problems"]      .cc-num { color:var(--c-problems-lbl); }
.choice-card[data-fn="solution"]      .cc-num { color:var(--c-solution-lbl); }
.choice-card[data-fn="cause"]         .cc-num { color:var(--c-cause-lbl); }
.choice-card[data-fn="effect"]        .cc-num { color:var(--c-effect-lbl); }
.choice-card[data-fn="agree"]         .cc-num { color:var(--c-agree-lbl); }
.choice-card[data-fn="disagree"]      .cc-num { color:var(--c-disagree-lbl); }
.choice-card[data-fn="partial"]       .cc-num { color:var(--c-partial-lbl); }
.choice-card[data-fn="opinion"]       .cc-num { color:var(--c-opinion-lbl); }
.choice-card[data-fn="speculation"]   .cc-num { color:var(--c-speculation-lbl); }
.choice-card[data-fn="justifying"]    .cc-num { color:var(--c-justifying-lbl); }
.choice-card[data-fn="comparing"]     .cc-num { color:var(--c-comparing-lbl); }
.choice-card[data-fn="generalising"]  .cc-num { color:var(--c-generalising-lbl); }

.cc-stem { font-size:15px; font-weight:700; color:#1a1a1a; line-height:1.3; }
.cc-conn { font-size:13px; font-style:italic; font-family:var(--fd); color:#6a6a6a; line-height:1.35; }

#expandedBox {
  max-width:700px; width:100%; background:#151517;
  border:1.5px solid var(--border2); border-radius:14px;
  overflow:hidden; display:none; box-shadow:0 3px 14px rgba(0,0,0,.08);
}
#expandedBox.show { display:block; animation:fadeUp .3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
.exp-header { padding:16px 22px 13px; border-bottom:1px solid var(--border); }
.exp-stem   { font-size:17px; font-weight:700; color:var(--text); }
.exp-conn   { font-size:13px; font-style:italic; font-family:var(--fd); color:var(--muted); margin-top:3px; }
.exp-body   { padding:18px 22px; display:flex; flex-direction:column; gap:15px; }
.exp-row    { display:flex; flex-direction:column; gap:4px; }
.exp-label  { font-size:9px; font-weight:800; letter-spacing:.14em; color:var(--faint); text-transform:uppercase; }
.exp-text   { font-size:14px; color:var(--muted); line-height:1.7; }
.exp-text.highlight { color:var(--text); font-weight:600; }
.exp-next {
  margin:0 22px 20px; font-size:12px; font-weight:700; padding:9px 22px; border-radius:9px;
  border:1.5px solid var(--border2); background:rgba(255,255,255,.06); color:var(--muted);
  cursor:pointer; font-family:var(--ff); transition:all .15s; display:inline-block;
}
.exp-next:hover { color:#fff; background:rgba(255,255,255,.1); }

#hint {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  font-size:12px; color:var(--faint); letter-spacing:.06em;
  pointer-events:none; transition:opacity .4s; white-space:nowrap;
}
#hint.hidden { opacity:0; }

@media(max-width:700px) {
  :root { --hh:50px; --fh:48px; }
  #hdr { padding:0 14px; }
  .hdr-t { font-size:13px; }
  .fb { font-size:12px; padding:7px 15px; }
  #choiceRow { grid-template-columns:1fr; }
  .phc-stem { font-size:15px; }
}
</style>
</head>
<body>

<div id="load">
  <div class="spin"></div>
  <div class="ld-title">B2 Speaking</div>
  <div class="ld-sub">PART 2 — FUNCTIONAL LANGUAGE</div>
</div>

<div id="hdr">
  <div class="hdr-brand">
    <div class="hdr-t">B2 Speaking — Part 2</div>
    <div class="hdr-s">FUNCTIONAL LANGUAGE</div>
  </div>
  <div class="mode-pill">
    <button class="mb on" id="btnClass" onclick="setMode('class')">CLASS</button>
    <button class="mb"    id="btnSolo"  onclick="setMode('solo')">SOLO</button>
  </div>
  <button class="prompt-btn" id="promptBtn" onclick="toggleDrop()">Prompt ▾</button>
</div>

<div id="fstrip"></div>
<div id="pdrop"></div>

<div id="app">
  <div id="classCanvas">
    <div id="promptCard"><div class="pc-txt" id="pcText"></div></div>
  </div>
  <div id="soloView">
    <div class="solo-prompt"><div class="sop-q" id="sopText">Select a prompt to begin.</div></div>
    <div class="func-tabs" id="funcTabs"></div>
    <div id="choiceRow"></div>
    <div id="expandedBox"></div>
  </div>
</div>

<div id="hint">Select a category above to reveal cards</div>

<div id="stu">
  <span class="stu-lbl">USED BY</span>
  <input id="stuName" placeholder="Student name…" maxlength="28" autocomplete="off">
  <button class="stu-mark" onclick="markUsed()">Mark as used ✓</button>
  <button class="stu-close" onclick="closeStu()">✕</button>
</div>

<script>
let D = {};
let mode = 'class', promptIdx = -1, activeFunc = null, pendingCard = null, usedMap = {};
let soloFuncIdx = 0, soloPickedIdx = null, soloTriple = [];
let dragging = null, dragOffX = 0, dragOffY = 0, dragMoved = false, promptDrag = null;

function corpusUrl() {
  return new URLSearchParams(location.search).get('json') || 'data/functional-english.json';
}
/* The unified corpus is nested by family; this page's logic expects a flat
   D.functions[] in family order. Flatten while tagging each with its family
   (kept for future family-aware colouring), preserving phrases + expanded. */
function flattenCorpus(data) {
  const order = Object.keys(data.families);
  const byId = {};
  data.functions.forEach(f => byId[f.id] = f);
  const flat = [];
  order.forEach(famKey => {
    (data.families[famKey].functionIds || []).forEach(id => {
      const fn = byId[id];
      if (fn) flat.push(Object.assign({ family: famKey }, fn));
    });
  });
  // include any function not referenced by a family, just in case
  data.functions.forEach(f => { if (!flat.find(x => x.id === f.id)) flat.push(f); });
  return { prompts: data.prompts || [], functions: flat };
}
async function load() {
  try {
    const r = await fetch(corpusUrl());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const raw = await r.json();
    D = raw.families ? flattenCorpus(raw) : raw;   // accept unified or legacy shape
    document.getElementById('load').classList.add('gone');
    buildPromptDrop(); buildFstrip(); renderSoloFuncTabs();
  } catch(e) {
    document.getElementById('load').innerHTML =
      `<div class="ld-err"><strong>Could not load ${corpusUrl()}</strong><br><br>
       Place both files in the same folder and serve via the deployed site or a local server.<br><br>
       <span style="opacity:.4">${e.message}</span></div>`;
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('btnClass').classList.toggle('on', m==='class');
  document.getElementById('btnSolo').classList.toggle('on',  m==='solo');
  document.getElementById('classCanvas').style.display = m==='class'?'block':'none';
  document.getElementById('soloView').style.display    = m==='solo' ?'flex' :'none';
  document.getElementById('fstrip').style.display      = m==='class'?'flex' :'none';
  document.getElementById('hint').classList.toggle('hidden', m!=='class' || activeFunc!==null);
  closeStu();
}

function buildPromptDrop() {
  document.getElementById('pdrop').innerHTML = D.prompts.map((p,i) =>
    `<div class="pd-item${i===promptIdx?' sel':''}" onclick="selectPrompt(${i})">
       <span class="pd-num">${i+1}.</span>
       <span class="pd-q">${p.text}</span>
     </div>`).join('');
}

function toggleDrop() { document.getElementById('pdrop').classList.toggle('show'); }

function selectPrompt(i) {
  promptIdx = i; usedMap = {};
  document.getElementById('pdrop').classList.remove('show');
  buildPromptDrop();
  const p = D.prompts[i];
  document.getElementById('pcText').textContent = p.text;
  const pc = document.getElementById('promptCard');
  pc.classList.add('show');
  pc.style.left = '50%'; pc.style.top = '24px'; pc.style.transform = 'translateX(-50%)';
  document.getElementById('sopText').textContent = p.text;
  if (activeFunc) spawnCards(activeFunc);
  soloFuncIdx = 0; soloPickedIdx = null; dealSoloTriple(); renderSoloContent();
}

document.addEventListener('click', e => {
  const d = document.getElementById('pdrop'), b = document.getElementById('promptBtn');
  if (!d.contains(e.target) && e.target !== b) d.classList.remove('show');
});

function buildFstrip() {
  document.getElementById('fstrip').innerHTML = D.functions.map(f =>
    `<button class="fb${activeFunc===f.id?' on':''}" data-fn="${f.id}" onclick="selectFunc('${f.id}')">${f.label}</button>`
  ).join('');
}

function selectFunc(id) {
  if (activeFunc === id) {
    activeFunc = null; clearCards(); buildFstrip();
    document.getElementById('hint').classList.remove('hidden'); return;
  }
  activeFunc = id; buildFstrip();
  document.getElementById('hint').classList.add('hidden');
  spawnCards(id);
}

const canvas = document.getElementById('classCanvas');
function clearCards() { canvas.querySelectorAll('.phrase-card').forEach(c=>c.remove()); }
function getHH() {
  return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hh')) +
         parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fh'));
}

function spawnCards(funcId) {
  clearCards();
  const fn = D.functions.find(f=>f.id===funcId); if (!fn) return;
  const colW=278, rowH=148, startX=18, startY=18;
  const cols = Math.max(1, Math.floor((canvas.offsetWidth-36)/(colW+8)));
  fn.phrases.forEach((ph,pi) => {
    const x = startX + (pi%cols)*(colW+8);
    const y = startY + Math.floor(pi/cols)*rowH;
    createCard(fn, ph, pi, x, y, usedMap[funcId+':'+pi]);
  });
}

function createCard(fn, ph, pi, x, y, who) {
  const card = document.createElement('div');
  card.className = 'phrase-card'+(who?' used':'');
  card.setAttribute('data-fn', fn.id); card.setAttribute('data-pi', pi);
  card.style.left = x+'px'; card.style.top = y+'px';
  card.innerHTML = `<div class="phc-fn">${fn.label.toUpperCase()}</div>
    <div class="phc-stem">${ph.stem}</div>
    <div class="phc-conn">${ph.connector}</div>
    ${who?`<div class="phc-who">✓ ${who}</div>`:''}`;
  canvas.appendChild(card);
  if (!who) {
    card.addEventListener('mousedown', e => {
      if (e.button!==0) return;
      startCardDrag(card, e.clientX, e.clientY); e.preventDefault();
    });
    card.addEventListener('touchstart', e => {
      startCardDrag(card, e.touches[0].clientX, e.touches[0].clientY);
    }, {passive:true});
    card.addEventListener('click', () => { if (dragMoved) return; openStu(card); });
  }
}

function startCardDrag(el, cx, cy) {
  dragging=el; dragMoved=false;
  const rect=el.getBoundingClientRect();
  dragOffX=cx-rect.left; dragOffY=cy-rect.top;
  el.style.zIndex='50'; el.style.boxShadow='0 12px 36px rgba(0,0,0,.18)'; el.style.transition='none';
}

document.addEventListener('mousemove', e => {
  if (dragging) { dragMoved=true; dragging.style.left=(e.clientX-dragOffX)+'px'; dragging.style.top=(e.clientY-dragOffY-getHH())+'px'; }
  if (promptDrag) {
    const pc=document.getElementById('promptCard');
    pc.style.left=(e.clientX-promptDrag.offX)+'px'; pc.style.top=(e.clientY-promptDrag.offY-getHH())+'px';
  }
});
document.addEventListener('touchmove', e => {
  if (dragging) { dragMoved=true; const t=e.touches[0]; dragging.style.left=(t.clientX-dragOffX)+'px'; dragging.style.top=(t.clientY-dragOffY-getHH())+'px'; }
  if (promptDrag) {
    const t=e.touches[0], pc=document.getElementById('promptCard');
    pc.style.left=(t.clientX-promptDrag.offX)+'px'; pc.style.top=(t.clientY-promptDrag.offY-getHH())+'px';
  }
}, {passive:true});
document.addEventListener('mouseup', () => {
  if (dragging) { dragging.style.zIndex='20'; dragging.style.boxShadow=''; dragging=null; }
  promptDrag=null;
});
document.addEventListener('touchend', () => {
  if (dragging) { dragging.style.zIndex='20'; dragging.style.boxShadow=''; dragging=null; }
  promptDrag=null;
});

const pcEl = document.getElementById('promptCard');
pcEl.addEventListener('mousedown', e => {
  if (e.button!==0) return;
  const rect=pcEl.getBoundingClientRect();
  promptDrag={offX:e.clientX-rect.left, offY:e.clientY-rect.top};
  pcEl.style.transform='none'; e.preventDefault();
});
pcEl.addEventListener('touchstart', e => {
  const rect=pcEl.getBoundingClientRect();
  promptDrag={offX:e.touches[0].clientX-rect.left, offY:e.touches[0].clientY-rect.top};
  pcEl.style.transform='none';
}, {passive:true});

function openStu(el) {
  pendingCard=el; document.getElementById('stuName').value='';
  document.getElementById('stu').classList.add('open');
  setTimeout(()=>document.getElementById('stuName').focus(),180);
}
function closeStu() { pendingCard=null; document.getElementById('stu').classList.remove('open'); }
function markUsed() {
  if (!pendingCard) return;
  const name=document.getElementById('stuName').value.trim()||'Student';
  const fn=pendingCard.getAttribute('data-fn'), pi=+pendingCard.getAttribute('data-pi');
  usedMap[fn+':'+pi]=name;
  pendingCard.classList.add('used'); pendingCard.style.cursor='default';
  const w=pendingCard.querySelector('.phc-who');
  if (w) w.textContent='✓ '+name;
  else { const d=document.createElement('div'); d.className='phc-who'; d.textContent='✓ '+name; pendingCard.appendChild(d); }
  closeStu();
}
document.getElementById('stuName').addEventListener('keydown', e => {
  if (e.key==='Enter') markUsed(); if (e.key==='Escape') closeStu();
});

function renderSoloFuncTabs() {
  if (!D.functions) return;
  document.getElementById('funcTabs').innerHTML = D.functions.map((f,i) =>
    `<button class="ftab${i===soloFuncIdx?' on':''}" data-fn="${f.id}" onclick="soloSetFunc(${i})">${f.label}</button>`
  ).join('');
}
function dealSoloTriple() {
  soloPickedIdx=null;
  const phrases=D.functions[soloFuncIdx].phrases;
  soloTriple=[...phrases.keys()].sort(()=>Math.random()-.5).slice(0,3).map(pi=>({phraseIdx:pi,phrase:phrases[pi]}));
}
function renderSoloContent() {
  const fn=D.functions[soloFuncIdx];
  renderSoloFuncTabs();
  document.getElementById('choiceRow').innerHTML = soloTriple.map((t,ci) =>
    `<div class="choice-card${soloPickedIdx===ci?' picked':''}" data-fn="${fn.id}" onclick="pickChoice(${ci})">
       <div class="cc-num">OPTION ${ci+1}</div>
       <div class="cc-stem">${t.phrase.stem}</div>
       <div class="cc-conn">${t.phrase.connector}</div>
     </div>`).join('');
  const box=document.getElementById('expandedBox');
  if (soloPickedIdx!==null) {
    const ph=soloTriple[soloPickedIdx].phrase;
    const ex=ph.expanded||fn.expanded||{};
    box.className='show';
    box.innerHTML=`<div class="exp-header"><div class="exp-stem">${ph.stem}</div><div class="exp-conn">${ph.connector}</div></div>
      <div class="exp-body">
        <div class="exp-row"><div class="exp-label">Point</div><div class="exp-text highlight">${ex.point||''}</div></div>
        <div class="exp-row"><div class="exp-label">Reason</div><div class="exp-text">${ex.reason||''}</div></div>
        <div class="exp-row"><div class="exp-label">Example</div><div class="exp-text">${ex.example||''}</div></div>
        <div class="exp-row"><div class="exp-label">Contrast</div><div class="exp-text">${ex.contrast||''}</div></div>
        <div class="exp-row"><div class="exp-label">Conclusion</div><div class="exp-text">${ex.conclusion||''}</div></div>
      </div>
      <button class="exp-next" onclick="nextSoloRound()">Next 3 phrases →</button>`;
    setTimeout(()=>box.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  } else { box.className=''; box.innerHTML=''; }
}
function pickChoice(ci) { if (soloPickedIdx!==null) return; soloPickedIdx=ci; renderSoloContent(); }
function nextSoloRound() { dealSoloTriple(); renderSoloContent(); document.getElementById('soloView').scrollTo({top:0,behavior:'smooth'}); }
function soloSetFunc(i) { soloFuncIdx=i; dealSoloTriple(); renderSoloContent(); document.getElementById('soloView').scrollTo({top:0,behavior:'smooth'}); }

setMode('class');
load();
</script>
</body>
</html>
