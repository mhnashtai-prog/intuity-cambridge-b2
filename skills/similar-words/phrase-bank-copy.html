<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTUITY — Phrase Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0d0d0d; --gold:#C9A961;
    /* the five families = the five hues INTUITY already owns */
    --evaluating:#3fbfb2;   --evaluating-d:#2a8b81;
    --reasoning:#f0a23c;    --reasoning-d:#c07a1f;
    --positioning:#e85a4f;  --positioning-d:#b83a31;
    --projecting:#9a6baa;   --projecting-d:#6d4a7c;
    --relating:#C9A961;     --relating-d:#9a7d3f;
    --ink:#2b2b30; --stance:#8a8a92;
  }
  html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}
  body{font-family:'DM Sans',sans-serif;color:#e5e5e7;-webkit-tap-highlight-color:transparent;}

  .header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;
    justify-content:space-between;padding:.7rem 1.15rem;height:52px;
    background:rgba(13,13,13,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);}
  .brand{display:flex;flex-direction:column;gap:1px;}
  .brand-t{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:-.01em;}
  .brand-s{font-size:.5rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.32);}
  .back-link{position:absolute;left:1.15rem;text-decoration:none;font-family:'Space Grotesk',sans-serif;
    font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);}
  .back-link:hover{color:rgba(255,255,255,.7);}
  .header .brand{margin:0 auto;align-items:center;}
  .crumb{position:absolute;right:1.15rem;font-family:'Space Grotesk',sans-serif;font-size:.56rem;
    font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);cursor:pointer;
    opacity:0;transition:opacity .2s;pointer-events:none;}
  .crumb.show{opacity:1;pointer-events:auto;}
  .crumb:hover{color:#fff;}

  .stage{position:fixed;top:52px;left:0;right:0;bottom:0;overflow-y:auto;
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent;}
  .stage::-webkit-scrollbar{width:5px;} .stage::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}
  .stage.no-scroll{overflow:hidden;}
  .wrap{max-width:1180px;margin:0 auto;padding:1.3rem 1.15rem 3rem;}
  .wrap.full{max-width:none;padding:0;}

  .lead{font-size:.8rem;color:rgba(255,255,255,.4);font-weight:500;margin:.1rem .3rem 1.15rem;line-height:1.5;max-width:640px;}
  .cap-inner{max-width:640px;margin:0 auto;}

  /* ── LEVEL 1 · FIVE FAMILY CARDS, ALL ON ONE SCREEN ── */
  .fam-carousel{position:relative;display:flex;align-items:stretch;gap:.4rem;}
  .fam-viewport{flex:1;min-width:0;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:.2rem 0 .3rem;}
  .fam-viewport::-webkit-scrollbar{display:none;}
  .families{display:flex;gap:.7rem;align-items:stretch;padding:0 .15rem;}
  .fam{position:relative;flex:0 0 calc((100% - 2.8rem)/5);min-width:0;scroll-snap-align:start;
    background:#fff;border-radius:1.1rem;padding:2.3rem .8rem 1rem .9rem;
    display:flex;flex-direction:column;
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 18px 45px -12px rgba(0,0,0,.55),0 6px 18px rgba(0,0,0,.35);}
  .fam::before{content:'';position:absolute;top:.9rem;left:.9rem;right:.8rem;height:8px;
    background-image:radial-gradient(circle, rgba(0,0,0,.12) 3px, transparent 3.5px);
    background-size:16px 8px;background-repeat:repeat-x;}
  .fam-head{position:absolute;top:1.1rem;left:-9px;display:flex;align-items:center;gap:.4rem;
    background:var(--fc);padding:.35rem .6rem .35rem .45rem;border-radius:.45rem .65rem .65rem .45rem;
    box-shadow:0 6px 14px -4px rgba(0,0,0,.35);z-index:2;max-width:calc(100% + 9px);}
  .fam-head::after{content:'';position:absolute;left:0;bottom:-8px;border-style:solid;border-width:8px 0 0 12px;
    border-color:var(--fc-d) transparent transparent transparent;filter:brightness(.75);}
  .fam-name{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.6rem;letter-spacing:.1em;
    text-transform:uppercase;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fam-purpose{font-size:.66rem;font-style:italic;color:var(--stance);margin:.35rem .1rem .8rem;
    line-height:1.4;min-height:2.6em;}
  /* ── inside each family card: 2-col catalogue, filling the card top-down ── */
  .fam-badges{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;align-content:start;}
  .fbadge{position:relative;min-width:0;display:flex;flex-direction:column;cursor:pointer;text-align:left;
    background:#faf9f7;border:1px solid rgba(0,0,0,.07);border-radius:.7rem;
    padding:.7rem .6rem .5rem;min-height:5.4rem;
    transition:transform .16s,box-shadow .18s,border-color .18s;}
  .fbadge:hover{transform:translateY(-2px);box-shadow:0 8px 18px -6px rgba(0,0,0,.18);
    border-color:color-mix(in srgb,var(--fc) 45%,transparent);}
  .fbadge:focus-visible{outline:2px solid var(--fc);outline-offset:2px;}
  .fbadge-tag{align-self:flex-start;font-family:'Space Grotesk',sans-serif;font-size:.4rem;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;color:var(--fc-d);
    background:color-mix(in srgb,var(--fc) 14%,#fff);border-radius:999px;padding:.12rem .4rem;margin-bottom:.4rem;}
  .fbadge-hero{flex:1;display:flex;align-items:center;font-family:'Space Grotesk',sans-serif;
    font-size:.66rem;font-weight:800;letter-spacing:.01em;text-transform:uppercase;color:var(--ink);
    line-height:1.15;word-break:break-word;}
  .fbadge-foot{display:flex;align-items:center;justify-content:flex-end;margin-top:.4rem;}
  .fbadge-open{flex-shrink:0;width:1.2rem;height:1.2rem;border-radius:50%;
    background:color-mix(in srgb,var(--fc) 16%,#fff);color:var(--fc-d);
    display:flex;align-items:center;justify-content:center;font-size:.66rem;line-height:1;font-weight:700;
    transition:background .16s;}
  .fbadge:hover .fbadge-open{background:color-mix(in srgb,var(--fc) 32%,#fff);}

  /* ── LEVEL 2 · FUNCTIONS within a family (kept for future radial use) ── */
  .fn-list{display:flex;flex-direction:column;gap:.55rem;}
  .fn-tile{position:relative;display:flex;align-items:center;justify-content:space-between;gap:.8rem;
    border-radius:.85rem;padding:.9rem 1.05rem;cursor:pointer;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
    border-left:4px solid var(--fc);transition:transform .16s,background .2s;}
  .fn-tile:hover{transform:translateX(3px);background:rgba(255,255,255,.055);}
  .fn-tile:focus-visible{outline:2px solid var(--fc);outline-offset:2px;}
  .fn-name{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.82rem;letter-spacing:.04em;
    text-transform:uppercase;color:#e5e5e7;}
  .fn-when{font-size:.68rem;font-style:italic;color:rgba(255,255,255,.4);margin-top:.15rem;}
  .fn-yield{flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:.56rem;font-weight:700;
    letter-spacing:.05em;color:var(--fc);background:color-mix(in srgb,var(--fc) 14%,transparent);
    border:1px solid color-mix(in srgb,var(--fc) 35%,transparent);border-radius:999px;padding:.25rem .6rem;white-space:nowrap;}

  /* ── LEVEL 2 · CONSTELLATION — question centre, phrases orbiting, no spokes ── */
  .constellation{position:relative;width:100%;height:calc(100vh - 52px);overflow:hidden;
    touch-action:none;}

  /* the question: plain, prominent, no box, no circle */
  .q-centre{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;
    width:min(46%,520px);text-align:center;pointer-events:none;}
  .q-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:.16em;
    text-transform:uppercase;color:var(--fc);opacity:.9;margin-bottom:.7rem;}
  .q-text{font-family:'Lora',serif;font-style:italic;font-weight:500;
    font-size:clamp(1.15rem,2.1vw,1.7rem);line-height:1.4;color:#fff;
    text-shadow:0 2px 20px rgba(0,0,0,.8);}
  .q-next{pointer-events:auto;margin-top:1.1rem;font-family:'Space Grotesk',sans-serif;font-size:.58rem;
    font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fc);
    background:color-mix(in srgb,var(--fc) 12%,transparent);
    border:1px solid color-mix(in srgb,var(--fc) 40%,transparent);border-radius:999px;
    padding:.5rem 1.1rem;cursor:pointer;transition:background .18s,transform .18s;}
  .q-next:hover{background:color-mix(in srgb,var(--fc) 24%,transparent);transform:translateY(-1px);}
  .q-controls{display:flex;align-items:center;justify-content:center;gap:.55rem;margin-top:1.1rem;flex-wrap:wrap;}
  .q-controls .q-next{margin-top:0;}
  .q-practice{pointer-events:auto;font-family:'Space Grotesk',sans-serif;font-size:.58rem;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:999px;
    padding:.5rem 1rem;cursor:pointer;transition:all .18s;}
  .q-practice:hover{color:#fff;border-color:rgba(255,255,255,.3);}
  .q-practice.on{color:var(--fc);background:color-mix(in srgb,var(--fc) 16%,transparent);
    border-color:color-mix(in srgb,var(--fc) 45%,transparent);}
  .q-further{pointer-events:auto;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.58rem;
    font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);
    background:rgba(201,169,97,.12);border:1px solid rgba(201,169,97,.4);border-radius:999px;
    padding:.5rem 1rem;transition:all .18s;}
  .q-further:hover{background:rgba(201,169,97,.22);transform:translateY(-1px);}

  /* gap-blank in practice mode */
  .gap{display:inline-block;min-width:3.2em;text-align:center;
    border-bottom:2px dashed color-mix(in srgb,var(--fc) 60%,#bbb);color:transparent;
    cursor:pointer;user-select:none;transition:color .2s,border-color .2s;position:relative;}
  .gap.revealed{color:var(--fc-d);border-bottom-color:transparent;font-weight:800;}
  .enode.practising{cursor:pointer;}
  .enode.practising .enode-tail{opacity:.55;}

  /* phrase card — white poster with family-hue RIBBON BANNER (unity element) */
  .enode{position:absolute;z-index:2;width:270px;background:#fff;border-radius:.9rem;
    padding:2.4rem .85rem .7rem;cursor:grab;transform:translate(-50%,-50%);
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 10px 26px -8px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.32);
    transition:box-shadow .18s;user-select:none;-webkit-user-select:none;}
  .enode:active{cursor:grabbing;}
  .enode.dragging{box-shadow:0 16px 40px -8px rgba(0,0,0,.6);z-index:20;}
  /* the ribbon banner — small tag straddling the top-left corner */
  .enode-banner{position:absolute;top:.75rem;left:-6px;display:flex;align-items:center;gap:.3rem;
    background:var(--fc);padding:.2rem .5rem .2rem .3rem;border-radius:.35rem .5rem .5rem .35rem;
    box-shadow:0 4px 10px -3px rgba(0,0,0,.4);z-index:3;}
  .enode-banner::after{content:'';position:absolute;left:0;bottom:-6px;border-style:solid;border-width:6px 0 0 9px;
    border-color:var(--fc-d) transparent transparent transparent;filter:brightness(.75);}
  .enode-bnum{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:.52rem;color:var(--fc);
    background:#fff;width:.95rem;height:.95rem;border-radius:.25rem;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;}
  .enode-blabel{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.44rem;letter-spacing:.09em;
    text-transform:uppercase;color:#fff;white-space:nowrap;}
  .enode-stem{font-size:.82rem;font-weight:700;color:var(--ink);line-height:1.32;}
  .enode-tail{font-size:.68rem;font-style:italic;color:var(--stance);line-height:1.4;margin-top:.15rem;font-family:'Lora',serif;}
  .const-hint{position:absolute;bottom:1.1rem;left:50%;transform:translateX(-50%);z-index:4;
    font-size:.6rem;font-style:italic;color:rgba(255,255,255,.28);letter-spacing:.04em;pointer-events:none;
    transition:opacity .5s;}
  .const-hint.hidden{opacity:0;}

  /* ── FURTHER PRACTICE: cue-card state on the orbiting cards ── */
  .enode.cue-card .enode-tail{display:none;}
  .enode.cue-card .enode-stem{font-size:.9rem;letter-spacing:.01em;}
  .enode.cue-card .cue-trigger{display:inline-block;margin-top:.5rem;font-family:'Space Grotesk',sans-serif;
    font-size:.5rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;
    background:var(--fc);border-radius:999px;padding:.16rem .55rem;}
  .enode.cue-card .cue-slash{color:color-mix(in srgb,var(--fc) 55%,#ccc);font-weight:400;margin:0 .1rem;}
  .enode.cue-card{cursor:pointer;}
  .enode.cue-card:hover{transform:translate(-50%,-50%) scale(1.03);}
  .enode.done .enode-banner::before{content:'✓';position:absolute;right:-1.4rem;top:50%;transform:translateY(-50%);
    font-size:.7rem;color:#5fd4c7;font-weight:900;}
  .enode.done{opacity:.7;}

  /* ── completion card overlay (the beautiful centre card) ── */
  .cc-overlay{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
    background:rgba(10,10,12,.72);backdrop-filter:blur(3px);padding:1rem;}
  .cc-overlay.show{display:flex;animation:ccfade .25s ease;}
  @keyframes ccfade{from{opacity:0;}to{opacity:1;}}
  .cc-card{position:relative;width:min(560px,94%);background:#fff;border-radius:1.25rem;
    padding:2.7rem 1.7rem 1.5rem;box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 30px 70px -15px rgba(0,0,0,.7);
    animation:ccpop .28s cubic-bezier(.22,1,.36,1);}
  @keyframes ccpop{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:none;}}
  .cc-banner{position:absolute;top:1rem;left:-8px;display:flex;align-items:center;gap:.4rem;
    background:var(--fc);padding:.32rem .7rem .32rem .5rem;border-radius:.4rem .6rem .6rem .4rem;
    box-shadow:0 5px 12px -4px rgba(0,0,0,.35);}
  .cc-banner::after{content:'';position:absolute;left:0;bottom:-8px;border-style:solid;border-width:8px 0 0 12px;
    border-color:var(--fc-d) transparent transparent transparent;filter:brightness(.75);}
  .cc-blabel{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.5rem;letter-spacing:.1em;
    text-transform:uppercase;color:#fff;}
  .cc-task{font-family:'Space Grotesk',sans-serif;font-size:.54rem;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;color:var(--fc-d);margin-bottom:1rem;}
  .cc-cue{font-size:1.35rem;font-weight:700;color:var(--ink);line-height:1.4;}
  .cc-cue .slash{color:color-mix(in srgb,var(--fc) 55%,#ccc);font-weight:400;margin:0 .15rem;}
  .cc-trigger{display:inline-block;margin-top:1rem;font-family:'Space Grotesk',sans-serif;font-size:.78rem;
    font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:var(--fc);
    border-radius:999px;padding:.35rem .95rem;box-shadow:0 4px 12px -3px rgba(0,0,0,.3);}
  .cc-answer{width:100%;margin-top:1.3rem;background:#f7f6f4;border:1.5px solid rgba(0,0,0,.1);border-radius:.7rem;
    padding:.8rem .9rem;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--ink);resize:vertical;
    min-height:3rem;outline:none;transition:border-color .18s;}
  .cc-answer:focus{border-color:var(--fc);}
  .cc-reveal{margin-top:1.2rem;padding:1.1rem 1.2rem;border-radius:.8rem;display:none;
    background:color-mix(in srgb,var(--fc) 8%,#fff);border:1px solid color-mix(in srgb,var(--fc) 25%,transparent);}
  .cc-reveal.show{display:block;animation:ccfade .25s ease;}
  .cc-reveal-label{font-family:'Space Grotesk',sans-serif;font-size:.5rem;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:var(--fc-d);margin-bottom:.5rem;}
  .cc-reveal-model{font-size:1.05rem;line-height:1.5;color:var(--ink);font-weight:600;}
  .cc-reveal-alt{font-size:.9rem;color:var(--stance);line-height:1.5;margin-top:.5rem;font-style:italic;font-family:'Lora',serif;}
  .cc-assess{display:none;gap:.6rem;margin-top:1.1rem;}
  .cc-assess.show{display:flex;}
  .cc-assess-btn{flex:1;font-family:'Space Grotesk',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;padding:.7rem;border-radius:.7rem;cursor:pointer;border:1.5px solid;transition:all .15s;}
  .cc-got{background:rgba(63,191,178,.14);border-color:rgba(63,191,178,.5);color:#2a8b81;}
  .cc-got:hover{background:rgba(63,191,178,.24);}
  .cc-miss{background:rgba(232,90,79,.12);border-color:rgba(232,90,79,.45);color:#b83a31;}
  .cc-miss:hover{background:rgba(232,90,79,.22);}
  .cc-actions{margin-top:1.2rem;}
  .cc-act{width:100%;font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;padding:.78rem;border-radius:.7rem;cursor:pointer;border:none;transition:all .16s;}
  .cc-primary{background:var(--gold);color:#0d0d0d;}
  .cc-primary:hover{background:#d8bd7e;}
  .cc-close{width:100%;margin-top:.7rem;font-family:'Space Grotesk',sans-serif;font-size:.58rem;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;padding:.65rem;border-radius:.7rem;cursor:pointer;
    background:transparent;border:1px solid rgba(0,0,0,.14);color:var(--stance);transition:all .15s;}
  .cc-close:hover{background:rgba(0,0,0,.04);color:var(--ink);}


  /* carousel arrows + dots (galleries idiom) */
  .fam-arrow{flex-shrink:0;width:42px;height:42px;border-radius:50%;background:rgba(201,169,97,.22);
    border:1px solid rgba(201,169,97,.4);color:var(--gold);font-size:1.1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .25s;box-shadow:0 6px 16px rgba(0,0,0,.4);}
  .fam-arrow:hover:not(:disabled){background:rgba(201,169,97,.36);transform:scale(1.12);}
  .fam-arrow:disabled{opacity:.18;cursor:not-allowed;}
  .fam-dots{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:1rem;}
  .fam-dot{width:8px;height:8px;border-radius:50%;background:rgba(99,99,102,.32);cursor:pointer;transition:all .3s;}
  .fam-dot.active{background:var(--gold);transform:scale(1.45);box-shadow:0 0 10px rgba(201,169,97,.4);}
  .fam-dot:hover:not(.active){background:rgba(201,169,97,.45);}

  /* All five fit on wide → arrows and dots hidden; carousel only engages when narrower */
  .fam-arrow,.fam-dots{display:none;}

  /* view switching */
  .view{display:none;} .view.active{display:block;animation:fade .28s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @media(prefers-reduced-motion:reduce){.view.active{animation:none;} .fam:hover,.fn-tile:hover,.fbadge:hover{transform:none;} .fam-viewport{scroll-behavior:auto;}}

  /* below 1000px the five no longer fit → become a swipeable carousel */
  @media(max-width:1000px){
    .fam-arrow{display:flex;}
    .fam-dots{display:flex;}
    .fam{flex:0 0 calc((100% - 1.4rem)/3);}
    .fam-purpose{min-height:2.6em;}
  }
  @media(max-width:760px){
    .fam{flex:0 0 calc((100% - .7rem)/2);}
  }
  @media(max-width:520px){
    .fam{flex:0 0 100%;}
    .fam-badges{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
    .wrap{padding:1.3rem .6rem 3rem;}
  }
  @media(max-width:380px){
    .fam-badges{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header class="header">
  <a class="back-link" href="/?openModal=vocabulary" id="backLink" onclick="return smartBack(event)">← Back</a>
  <div class="brand"><span class="brand-t">Phrase Bank</span><span class="brand-s">Functional Language</span></div>
  <span class="crumb" id="crumb" onclick="goBack()">↑ All families</span>
</header>

<div class="stage">
  <div class="wrap">
    <!-- LEVEL 1 -->
    <div class="view active" id="viewFamilies">
      <p class="lead">Five families of moves. Swipe across, tap a function to see the expressions worth owning. A map to reach into — not a list to learn.</p>
      <div class="fam-carousel">
        <button class="fam-arrow" id="famPrev" aria-label="Previous">←</button>
        <div class="fam-viewport"><div class="families" id="familyList"></div></div>
        <button class="fam-arrow" id="famNext" aria-label="Next">→</button>
      </div>
      <div class="fam-dots" id="famDots"></div>
    </div>
    <!-- LEVEL 2 · constellation — question at centre, phrases orbiting -->
    <div class="view" id="viewCapsule">
      <div class="constellation" id="constellation">
        <div class="q-centre" id="qCentre">
          <div class="q-eyebrow" id="qEyebrow"></div>
          <div class="q-text" id="qText"></div>
          <div class="q-controls">
            <button class="q-next" id="qNext" onclick="nextQuestion()">Next question →</button>
            <button class="q-practice" id="qPractice" onclick="togglePractice()">Practice: off</button>
            <button class="q-further" id="qFurther" onclick="toggleFurther()">Further practice →</button>
          </div>
        </div>
        <!-- phrase / cue cards injected here -->
        <!-- completion card overlay (appears when a cue is chosen) -->
        <div class="cc-overlay" id="ccOverlay">
          <div class="cc-card" id="ccCard">
            <div class="cc-banner"><span class="cc-blabel" id="ccLabel"></span></div>
            <div class="cc-task">Build the full sentence using the trigger</div>
            <div class="cc-cue" id="ccCue"></div>
            <span class="cc-trigger" id="ccTrigger"></span>
            <textarea class="cc-answer" id="ccAnswer" placeholder="Write your sentence… (optional — or say it aloud)"></textarea>
            <div class="cc-reveal" id="ccReveal">
              <div class="cc-reveal-label">Model answer</div>
              <div class="cc-reveal-model" id="ccModel"></div>
              <div class="cc-reveal-alt" id="ccAlt"></div>
            </div>
            <div class="cc-assess" id="ccAssess">
              <button class="cc-assess-btn cc-got" onclick="ccMark(true)">✓ I built it</button>
              <button class="cc-assess-btn cc-miss" onclick="ccMark(false)">✗ Needs work</button>
            </div>
            <div class="cc-actions" id="ccActions">
              <button class="cc-act cc-primary" id="ccRevealBtn" onclick="ccReveal()">Reveal model</button>
            </div>
            <button class="cc-close" id="ccClose" onclick="ccCloseCard()">✕ Close — next student</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ══ CORPUS — fetched from the unified functional-english.json ═══
   One source of truth, shared with the speaking page. The adapter
   folds the flat functions[] into the family tree the bank renders,
   mapping {stem, connector, expanded} → {stem, tail, frame} + PREC. */
let CORPUS = {};
const FAM_ORDER=['evaluating','reasoning','positioning','projecting','relating'];

// derive a short "frame" tag from a stem's grammatical shape (for the register chip)
function frameOf(stem){
  const s=stem.trim().toLowerCase();
  if(/^(in my|from my|to my|as far as|as i see|personally|in general|by and large|broadly|on the whole|generally|more often|as a rule|in most)/.test(s)) return 'adverbial phrase';
  if(/\bthat\s*…?$/.test(s) || /\bthat\b/.test(s)) return 'clause frame';
  if(/^(this|it|there|one|a |the )/.test(s)) return 'noun-phrase frame';
  if(/,\s*…?$/.test(s)) return 'sentence opener';
  return 'set phrase';
}

function adaptCorpus(data){
  const out={};
  for(const [famKey,fam] of Object.entries(data.families)){
    out[famKey]={ name:fam.label, purpose:fam.purpose, functions:{} };
  }
  for(const fn of data.functions){
    const famKey=fn.family;
    if(!out[famKey]) continue;
    out[famKey].functions[fn.id]={
      label: fn.label,
      when: fn.when || 'to use this move',
      yield: fn.phrases.length,
      prec: fn.expanded || null,
      capsule: fn.phrases.map(p=>({
        stem: p.stem,
        tail: p.connector,
        frame: frameOf(p.stem)
      }))
    };
  }
  return out;
}

let path={family:null, fn:null};

const hue = fam => ({
  evaluating:['var(--evaluating)','var(--evaluating-d)'],
  reasoning:['var(--reasoning)','var(--reasoning-d)'],
  positioning:['var(--positioning)','var(--positioning-d)'],
  projecting:['var(--projecting)','var(--projecting-d)'],
  relating:['var(--relating)','var(--relating-d)'],
}[fam]);

/* LEVEL 1 — five-up family cards, four function-badges inside each */
function renderFamilies(){
  const el=document.getElementById('familyList');
  el.innerHTML=FAM_ORDER.map(fam=>{
    const F=CORPUS[fam], [c]=hue(fam);
    const badges=Object.entries(F.functions).map(([k,fn])=>{
      return `
      <button class="fbadge" style="--fc:${c}" onclick="openFn('${fam}','${k}')"
        aria-label="${cap(k)}, ${fn.yield} expressions">
        <span class="fbadge-tag">${fn.yield} expr.</span>
        <span class="fbadge-hero">${cap(k)}</span>
        <span class="fbadge-foot">
          <span class="fbadge-open">→</span>
        </span>
      </button>`;
    }).join('');
    return `<div class="fam" style="--fc:${c};--fc-d:${hue(fam)[1]}">
      <div class="fam-head"><span class="fam-name">${F.name}</span></div>
      <div class="fam-purpose">${F.purpose}</div>
      <div class="fam-badges">${badges}</div>
    </div>`;
  }).join('');
  initCarousel();
}

/* ── horizontal carousel: arrows + dots page the scroll-snap track ── */
function perPage(){
  const w=window.innerWidth;
  return w<=520?1 : w<=760?2 : w<=1000?3 : 5;
}
function pageCount(){ return Math.max(1, Math.ceil(FAM_ORDER.length/perPage())); }
function currentPage(vp){
  const cardW=vp.querySelector('.fam')?.offsetWidth||1;
  const gap=16;
  return Math.round(vp.scrollLeft/((cardW+gap)*perPage()));
}
function initCarousel(){
  const vp=document.querySelector('.fam-viewport');
  const prev=document.getElementById('famPrev');
  const next=document.getElementById('famNext');
  const dots=document.getElementById('famDots');
  const pages=pageCount();
  dots.innerHTML=Array.from({length:pages},(_,i)=>`<div class="fam-dot" data-p="${i}"></div>`).join('');
  const update=()=>{
    const p=currentPage(vp);
    dots.querySelectorAll('.fam-dot').forEach((d,i)=>d.classList.toggle('active',i===p));
    prev.disabled=vp.scrollLeft<=4;
    next.disabled=vp.scrollLeft>=vp.scrollWidth-vp.clientWidth-4;
  };
  const go=dir=>{
    const cardW=vp.querySelector('.fam')?.offsetWidth||1;
    vp.scrollBy({left:dir*(cardW+16)*perPage(),behavior:'smooth'});
  };
  prev.onclick=()=>go(-1);
  next.onclick=()=>go(1);
  vp.onscroll=update;
  dots.querySelectorAll('.fam-dot').forEach(d=>d.onclick=()=>{
    const cardW=vp.querySelector('.fam')?.offsetWidth||1;
    vp.scrollTo({left:(+d.dataset.p)*(cardW+16)*perPage(),behavior:'smooth'});
  });
  window.addEventListener('resize',()=>{dots.innerHTML='';initCarousel();},{once:true});
  update();
}

/* LEVEL 2 — constellation: question at centre, phrases orbiting with ribbon banners */
let qList=[], qIndex=0, curFam=null, curFn=null;

function openFn(fam,k){
  path={family:fam, fn:k};
  curFam=fam; curFn=k;
  const F=CORPUS[fam], fn=F.functions[k], [c]=hue(fam);
  const con=document.getElementById('constellation');
  con.style.setProperty('--fc',c);
  con.style.setProperty('--fc-d',hue(fam)[1]);

  // question set for this function (fall back to a generic prompt if none)
  qList = (QUESTIONS[k] && QUESTIONS[k].length) ? QUESTIONS[k].slice() : [];
  qIndex = 0;
  setQuestion(fam,k);

  // reset Further Practice when entering a function
  furtherMode=false;
  const fbtn=document.getElementById('qFurther');
  if(fbtn){ fbtn.textContent='Further practice →'; fbtn.classList.remove('on'); }

  // clear previous cards + hint
  con.querySelectorAll('.enode').forEach(n=>n.remove());
  con.querySelector('.const-hint')?.remove();

  switchView('viewCapsule');
  requestAnimationFrame(()=>layoutConstellation(fam,k));
  setCrumb();
}

function setQuestion(fam,k){
  const F=CORPUS[fam], [c]=hue(fam);
  document.getElementById('qEyebrow').textContent=cap(k)+' · '+F.name;
  document.getElementById('qEyebrow').style.setProperty('--fc',c);
  const qt=document.getElementById('qText');
  qt.textContent = qList.length ? qList[qIndex] : F.functions[k].when;
  const nextBtn=document.getElementById('qNext');
  nextBtn.style.display = qList.length>1 ? 'inline-block' : 'none';
  nextBtn.style.setProperty('--fc',c);
}

function nextQuestion(){
  if(!qList.length) return;
  qIndex = (qIndex+1) % qList.length;
  setQuestion(curFam,curFn);
}

let dragEl=null, dragDX=0, dragDY=0;
function layoutConstellation(fam,k){
  const F=CORPUS[fam], fn=F.functions[k], [c,d]=hue(fam);
  const con=document.getElementById('constellation');
  const W=con.clientWidth, H=con.clientHeight;
  const cx=W/2, cy=H/2;

  // In Further Practice mode the orbiting cards are the drill CUE items;
  // otherwise they are the phrase frames.
  const drillItems = (DRILLS[k] || []);
  const items = furtherMode ? drillItems : fn.capsule;
  const n=items.length;
  if(furtherMode && !n){
    // no drills authored for this function — fall back with a note
    const note=document.createElement('div');
    note.className='const-hint'; note.style.opacity='.5';
    note.textContent='No production drills authored for this function yet.';
    con.appendChild(note);
    return;
  }

  /* Original elliptical placement — the natural spread around the question.
     Cards on a wide ellipse, distributed by even angular steps down each flank. */
  const half = Math.ceil(n/2);
  const rightCount = n - half;
  const rx = Math.min(W*0.30, 430);
  const ry = Math.min(H*0.40, 300);

  function place(i){
    const onLeft = i < half;
    const idx = onLeft ? i : i - half;
    const count = onLeft ? half : rightCount;
    const spread = 130;   // wider arc → more space between adjacent cards (1→2, 2→3…)
    const start = -spread/2;
    const step = count>1 ? spread/(count-1) : 0;
    const deg = start + idx*step;
    const rad = deg*Math.PI/180;
    const baseX = onLeft ? -Math.cos(rad) : Math.cos(rad);
    const y = Math.sin(rad);
    return { x: cx + baseX*rx, y: cy + y*ry };
  }

  items.forEach((x,i)=>{
    const node=document.createElement('div');
    node.className='enode'+(practiceMode?' practising':'')+(furtherMode?' cue-card':'');
    node.style.setProperty('--fc',c); node.style.setProperty('--fc-d',d);

    if(furtherMode){
      const cueHtml=x.cue.split('/').map(s=>s.trim()).join('<span class="cue-slash">/</span>');
      node.innerHTML=`<div class="enode-banner">
          <span class="enode-bnum">${i+1}</span>
          <span class="enode-blabel">${cap(k)}</span>
        </div>
        <div class="enode-stem">${cueHtml}</div>
        <span class="cue-trigger">[${x.trigger}]</span>`;
      if(furtherDone.has(cueKey(k,i))) node.classList.add('done');
    } else {
      node.innerHTML=`<div class="enode-banner">
          <span class="enode-bnum">${i+1}</span>
          <span class="enode-blabel">${cap(k)}</span>
        </div>
        <div class="enode-stem">${practiceMode ? blankStem(x.stem) : x.stem}</div>
        <div class="enode-tail">${x.tail}</div>`;
    }
    con.appendChild(node);

    const p=place(i);
    node.style.left=p.x+'px'; node.style.top=p.y+'px';

    if(furtherMode){
      // cue cards: click opens the completion card (no dragging in drill mode)
      node.addEventListener('click',()=>openCompletion(k,i,x,c,d));
      return; // skip drag wiring
    }

    let downX=0, downY=0, moved=false;
    const down=(px,py)=>{
      downX=px; downY=py; moved=false;
      dragEl=node; node.classList.add('dragging');
      const cr=con.getBoundingClientRect(), r=node.getBoundingClientRect();
      node.style.transform='none';
      node.style.left=(r.left-cr.left)+'px';
      node.style.top =(r.top -cr.top )+'px';
      dragDX=px-r.left; dragDY=py-r.top;
      hideHint();
    };
    node.addEventListener('mousedown',e=>{e.preventDefault();down(e.clientX,e.clientY);});
    node.addEventListener('touchstart',e=>{down(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  });

  const hint=document.createElement('div');
  hint.className='const-hint';
  hint.textContent = furtherMode ? 'Choose a card to complete — build it, then close for the next student'
                   : practiceMode ? 'Fill the gap in your head — then tap the card to check'
                   : 'Drag any expression to arrange your answer';
  con.appendChild(hint);
}

let dragMoved=false;
function moveNode(px,py){
  if(!dragEl) return;
  dragMoved=true;
  const con=document.getElementById('constellation');
  const cr=con.getBoundingClientRect();
  dragEl.style.left=(px-cr.left-dragDX)+'px';
  dragEl.style.top =(py-cr.top -dragDY)+'px';
}
document.addEventListener('mousemove',e=>{ if(dragEl) moveNode(e.clientX,e.clientY); });
document.addEventListener('touchmove',e=>{ if(dragEl){ moveNode(e.touches[0].clientX,e.touches[0].clientY);} },{passive:true});
document.addEventListener('mouseup',()=>{ if(dragEl){dragEl.classList.remove('dragging');dragEl=null; setTimeout(()=>dragMoved=false,0);} });
document.addEventListener('touchend',()=>{ if(dragEl){dragEl.classList.remove('dragging');dragEl=null; setTimeout(()=>dragMoved=false,0);} });
let hintGone=false;
function hideHint(){ if(hintGone)return; hintGone=true; document.querySelector('.const-hint')?.classList.add('hidden'); }

/* ── practice mode: hide one key word in each stem, tap to reveal ── */
let practiceMode=false;
// pick the most distinctive word to blank: longest content word, skipping function words
const STOPWORDS=new Set(['the','a','an','is','it','of','to','that','this','there','be','in','on',
  'and','or','but','as','so','if','far','my','i','one','no','not','are','was','were','been','being',
  'for','with','from','by','at','would','could','may','might','will','can','do','does','than','then',
  'few','people','deny','say','said','what','which','who','when','how','why','over','past','years']);
function blankStem(stem){
  // tokens keep their trailing punctuation; we blank one word inside
  const tokens=stem.split(/(\s+)/);           // keep whitespace tokens
  // candidate indices: real words, stripped of punctuation, not stopwords, length>=4, not the ellipsis
  const cand=[];
  tokens.forEach((t,idx)=>{
    const w=t.replace(/[^A-Za-z']/g,'').toLowerCase();
    if(w.length>=4 && !STOPWORDS.has(w) && !t.includes('…')) cand.push({idx,len:w.length});
  });
  if(!cand.length) return stem; // nothing safe to blank
  // choose the longest candidate (most distinctive/content-bearing)
  cand.sort((a,b)=>b.len-a.len);
  const pick=cand[0].idx;
  const original=tokens[pick];
  // preserve leading/trailing punctuation around the blanked word
  const lead=(original.match(/^[^A-Za-z']*/)||[''])[0];
  const trail=(original.match(/[^A-Za-z']*$/)||[''])[0];
  const word=original.slice(lead.length, original.length-trail.length);
  tokens[pick]=`${lead}<span class="gap" data-word="${word}">${word}</span>${trail}`;
  return tokens.join('');
}
function togglePractice(){
  practiceMode=!practiceMode;
  const btn=document.getElementById('qPractice');
  btn.textContent='Practice: '+(practiceMode?'on':'off');
  btn.classList.toggle('on',practiceMode);
  // re-layout current function with/without gaps
  if(curFn){
    const con=document.getElementById('constellation');
    con.querySelectorAll('.enode').forEach(nd=>nd.remove());
    con.querySelector('.const-hint')?.remove();
    layoutConstellation(curFam,curFn);
  }
}
// CSS reveal: tapping a .gap shows the word (handled in card click above)
document.addEventListener('click',e=>{
  const g=e.target.closest('.gap');
  if(g && practiceMode && !dragMoved) g.classList.add('revealed');
});

/* ── FURTHER PRACTICE: in-place production drill (class relay) ── */
let furtherMode=false;
let DRILLS={};                 // { functionId: [ {cue,trigger,models} ] }
const furtherDone=new Set();   // cueKey of completed cues (tick marks)
let ccCurrent=null;            // {k, i, item}
function cueKey(k,i){ return k+':'+i; }

function toggleFurther(){
  furtherMode=!furtherMode;
  const btn=document.getElementById('qFurther');
  btn.textContent = furtherMode ? '← Back to frames' : 'Further practice →';
  btn.classList.toggle('on',furtherMode);
  // Further and gap-practice are mutually exclusive
  if(furtherMode && practiceMode){
    practiceMode=false;
    const pb=document.getElementById('qPractice');
    pb.textContent='Practice: off'; pb.classList.remove('on');
  }
  // the question stays as context; hide Next/Practice noise while drilling? keep them, just re-layout
  if(curFn){
    const con=document.getElementById('constellation');
    con.querySelectorAll('.enode').forEach(nd=>nd.remove());
    con.querySelector('.const-hint')?.remove();
    layoutConstellation(curFam,curFn);
  }
}

function openCompletion(k,i,item,c,d){
  ccCurrent={k,i,item};
  const ov=document.getElementById('ccOverlay');
  const card=document.getElementById('ccCard');
  card.style.setProperty('--fc',c); card.style.setProperty('--fc-d',d);
  document.getElementById('ccLabel').textContent=cap(k);
  document.getElementById('ccCue').innerHTML=
    item.cue.split('/').map(s=>s.trim()).join('<span class="slash">/</span>');
  document.getElementById('ccTrigger').textContent='['+item.trigger+']';
  document.getElementById('ccAnswer').value='';
  document.getElementById('ccReveal').classList.remove('show');
  document.getElementById('ccAssess').classList.remove('show');
  document.getElementById('ccActions').style.display='block';
  document.getElementById('ccRevealBtn').style.display='block';
  ov.classList.add('show');
}
function ccReveal(){
  if(!ccCurrent) return;
  const it=ccCurrent.item;
  document.getElementById('ccModel').textContent=it.models[0];
  const alt=document.getElementById('ccAlt');
  if(it.models.length>1){ alt.textContent='Also valid: '+it.models.slice(1).join('  ·  '); alt.style.display='block'; }
  else alt.style.display='none';
  document.getElementById('ccReveal').classList.add('show');
  document.getElementById('ccActions').style.display='none';
  document.getElementById('ccAssess').classList.add('show');
}
function ccMark(got){
  if(!ccCurrent) return;
  // mark this cue as done (tick) regardless — the self-judgement is the student's own
  furtherDone.add(cueKey(ccCurrent.k, ccCurrent.i));
  ccCloseCard();
}
function ccCloseCard(){
  document.getElementById('ccOverlay').classList.remove('show');
  ccCurrent=null;
  // re-layout so the completed cue shows its tick, back to the spread for the next student
  if(curFn){
    const con=document.getElementById('constellation');
    con.querySelectorAll('.enode').forEach(nd=>nd.remove());
    con.querySelector('.const-hint')?.remove();
    layoutConstellation(curFam,curFn);
  }
}


function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const stage=document.querySelector('.stage'), wrap=document.querySelector('.wrap');
  const radial = id==='viewCapsule';
  stage.classList.toggle('no-scroll',radial);
  wrap.classList.toggle('full',radial);
  if(!radial) stage.scrollTo({top:0});
}
function setCrumb(){ document.getElementById('crumb').classList.add('show'); }
function goBack(){
  switchView('viewFamilies');
  document.getElementById('crumb').classList.remove('show');
  path={family:null,fn:null};
}
/* Context-aware back: if the student came from another INTUITY page, return there;
   otherwise fall back to the Vocabulary modal (this file's registered home). */
function smartBack(e){
  try{
    const ref=document.referrer;
    if(ref && new URL(ref).host===location.host){
      e.preventDefault(); history.back(); return false;
    }
  }catch(_){}
  return true; /* let the href (/?openModal=vocabulary) proceed */
}
window.addEventListener('resize',()=>{
  if(document.getElementById('viewCapsule').classList.contains('active') && path.fn){
    const con=document.getElementById('constellation');
    con.querySelectorAll('.enode').forEach(n=>n.remove());
    con.querySelector('.const-hint')?.remove();
    layoutConstellation(path.family,path.fn);
  }
});

/* ── boot: fetch the unified corpus, adapt, then render ── */
function corpusUrl(){
  const p=new URLSearchParams(location.search).get('json');
  return p || 'data/functional-english.json';
}
function questionsUrl(){
  const p=new URLSearchParams(location.search).get('questions');
  return p || 'data/functional-questions.json';
}
function drillsUrl(){
  const p=new URLSearchParams(location.search).get('drills');
  return p || 'data/functional-drills.json';
}
let QUESTIONS={};   // { functionId: [ "…", "…" ] }
(function boot(){
  const list=document.getElementById('familyList');
  Promise.all([
    fetch(corpusUrl()).then(r=>{ if(!r.ok) throw new Error('corpus HTTP '+r.status); return r.json(); }),
    fetch(questionsUrl()).then(r=> r.ok ? r.json() : {questions:{}}).catch(()=>({questions:{}})),
    fetch(drillsUrl()).then(r=> r.ok ? r.json() : {drills:{}}).catch(()=>({drills:{}}))
  ])
    .then(([corpus, q, dr])=>{
      CORPUS=adaptCorpus(corpus);
      QUESTIONS=(q && q.questions) ? q.questions : {};
      DRILLS=(dr && dr.drills) ? dr.drills : {};
      renderFamilies();
    })
    .catch(err=>{
      list.innerHTML=`<div style="color:rgba(255,255,255,.55);font-size:.85rem;padding:2rem 1rem;max-width:520px;">
        Couldn't load the phrase corpus (<code>${corpusUrl()}</code>). ${err.message}.<br><br>
        On the live site the JSON sits beside this page; opened straight from disk, some browsers block the fetch —
        run it through the deployed site or a local server.</div>`;
    });
})();

</script>
</body>
</html>
