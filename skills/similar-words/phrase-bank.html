<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTUITY — Phrase Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0d0d0d; --gold:#C9A961;
    /* the five families = the five hues INTUITY already owns */
    --evaluating:#3fbfb2;   --evaluating-d:#2a8b81;
    --reasoning:#f0a23c;    --reasoning-d:#c07a1f;
    --positioning:#e85a4f;  --positioning-d:#b83a31;
    --projecting:#9a6baa;   --projecting-d:#6d4a7c;
    --relating:#C9A961;     --relating-d:#9a7d3f;
    --ink:#2b2b30; --stance:#8a8a92;
  }
  html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}
  body{font-family:'DM Sans',sans-serif;color:#e5e5e7;-webkit-tap-highlight-color:transparent;}

  .header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;
    justify-content:space-between;padding:.7rem 1.15rem;height:52px;
    background:rgba(13,13,13,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);}
  .brand{display:flex;flex-direction:column;gap:1px;}
  .brand-t{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:-.01em;}
  .brand-s{font-size:.5rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.32);}
  .back-link{position:absolute;left:1.15rem;text-decoration:none;font-family:'Space Grotesk',sans-serif;
    font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);}
  .back-link:hover{color:rgba(255,255,255,.7);}
  .header .brand{margin:0 auto;align-items:center;}
  .crumb{position:absolute;right:1.15rem;font-family:'Space Grotesk',sans-serif;font-size:.56rem;
    font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);cursor:pointer;
    opacity:0;transition:opacity .2s;pointer-events:none;}
  .crumb.show{opacity:1;pointer-events:auto;}
  .crumb:hover{color:#fff;}

  .stage{position:fixed;top:52px;left:0;right:0;bottom:0;overflow-y:auto;
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent;}
  .stage::-webkit-scrollbar{width:5px;} .stage::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}
  .stage.no-scroll{overflow:hidden;}
  .wrap{max-width:1180px;margin:0 auto;padding:1.3rem 1.15rem 3rem;}
  .wrap.full{max-width:none;padding:0;}

  .lead{font-size:.8rem;color:rgba(255,255,255,.4);font-weight:500;margin:.1rem .3rem 1.15rem;line-height:1.5;max-width:640px;}
  .cap-inner{max-width:640px;margin:0 auto;}

  /* ── LEVEL 1 · FIVE FAMILY CARDS, ALL ON ONE SCREEN ── */
  .fam-carousel{position:relative;display:flex;align-items:stretch;gap:.4rem;}
  .fam-viewport{flex:1;min-width:0;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:.2rem 0 .3rem;}
  .fam-viewport::-webkit-scrollbar{display:none;}
  .families{display:flex;gap:.7rem;align-items:stretch;padding:0 .15rem;}
  .fam{position:relative;flex:0 0 calc((100% - 2.8rem)/5);min-width:0;scroll-snap-align:start;
    background:#fff;border-radius:1.1rem;padding:2.3rem .8rem 1rem .9rem;
    display:flex;flex-direction:column;
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 18px 45px -12px rgba(0,0,0,.55),0 6px 18px rgba(0,0,0,.35);}
  .fam::before{content:'';position:absolute;top:.9rem;left:.9rem;right:.8rem;height:8px;
    background-image:radial-gradient(circle, rgba(0,0,0,.12) 3px, transparent 3.5px);
    background-size:16px 8px;background-repeat:repeat-x;}
  .fam-head{position:absolute;top:1.1rem;left:-9px;display:flex;align-items:center;gap:.4rem;
    background:var(--fc);padding:.35rem .6rem .35rem .45rem;border-radius:.45rem .65rem .65rem .45rem;
    box-shadow:0 6px 14px -4px rgba(0,0,0,.35);z-index:2;max-width:calc(100% + 9px);}
  .fam-head::after{content:'';position:absolute;left:0;bottom:-8px;border-style:solid;border-width:8px 0 0 12px;
    border-color:var(--fc-d) transparent transparent transparent;filter:brightness(.75);}
  .fam-name{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.6rem;letter-spacing:.1em;
    text-transform:uppercase;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fam-purpose{font-size:.66rem;font-style:italic;color:var(--stance);margin:.35rem .1rem .8rem;
    line-height:1.4;min-height:2.6em;}
  /* ── inside each family card: 2-col catalogue, filling the card top-down ── */
  .fam-badges{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;align-content:start;}
  .fbadge{position:relative;min-width:0;display:flex;flex-direction:column;cursor:pointer;text-align:left;
    background:#faf9f7;border:1px solid rgba(0,0,0,.07);border-radius:.7rem;
    padding:.7rem .6rem .5rem;min-height:5.4rem;
    transition:transform .16s,box-shadow .18s,border-color .18s;}
  .fbadge:hover{transform:translateY(-2px);box-shadow:0 8px 18px -6px rgba(0,0,0,.18);
    border-color:color-mix(in srgb,var(--fc) 45%,transparent);}
  .fbadge:focus-visible{outline:2px solid var(--fc);outline-offset:2px;}
  .fbadge-tag{align-self:flex-start;font-family:'Space Grotesk',sans-serif;font-size:.4rem;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;color:var(--fc-d);
    background:color-mix(in srgb,var(--fc) 14%,#fff);border-radius:999px;padding:.12rem .4rem;margin-bottom:.4rem;}
  .fbadge-hero{flex:1;display:flex;align-items:center;font-family:'Space Grotesk',sans-serif;
    font-size:.66rem;font-weight:800;letter-spacing:.01em;text-transform:uppercase;color:var(--ink);
    line-height:1.15;word-break:break-word;}
  .fbadge-foot{display:flex;align-items:center;justify-content:flex-end;margin-top:.4rem;}
  .fbadge-open{flex-shrink:0;width:1.2rem;height:1.2rem;border-radius:50%;
    background:color-mix(in srgb,var(--fc) 16%,#fff);color:var(--fc-d);
    display:flex;align-items:center;justify-content:center;font-size:.66rem;line-height:1;font-weight:700;
    transition:background .16s;}
  .fbadge:hover .fbadge-open{background:color-mix(in srgb,var(--fc) 32%,#fff);}

  /* ── LEVEL 2 · FUNCTIONS within a family (kept for future radial use) ── */
  .fn-list{display:flex;flex-direction:column;gap:.55rem;}
  .fn-tile{position:relative;display:flex;align-items:center;justify-content:space-between;gap:.8rem;
    border-radius:.85rem;padding:.9rem 1.05rem;cursor:pointer;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
    border-left:4px solid var(--fc);transition:transform .16s,background .2s;}
  .fn-tile:hover{transform:translateX(3px);background:rgba(255,255,255,.055);}
  .fn-tile:focus-visible{outline:2px solid var(--fc);outline-offset:2px;}
  .fn-name{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.82rem;letter-spacing:.04em;
    text-transform:uppercase;color:#e5e5e7;}
  .fn-when{font-size:.68rem;font-style:italic;color:rgba(255,255,255,.4);margin-top:.15rem;}
  .fn-yield{flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:.56rem;font-weight:700;
    letter-spacing:.05em;color:var(--fc);background:color-mix(in srgb,var(--fc) 14%,transparent);
    border:1px solid color-mix(in srgb,var(--fc) 35%,transparent);border-radius:999px;padding:.25rem .6rem;white-space:nowrap;}

  /* ── LEVEL 2 · RADIAL CONSTELLATION ── */
  .constellation{position:relative;width:100%;height:calc(100vh - 52px);overflow:hidden;
    touch-action:none;}
  .spokes{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;}
  .spokes line{stroke:var(--fc);stroke-width:1.5;opacity:.28;}
  .hub{position:absolute;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:150px;height:150px;border-radius:50%;text-align:center;padding:1rem;
    background:radial-gradient(circle at 50% 40%, color-mix(in srgb,var(--fc) 26%,#141414), #101012 72%);
    border:2px solid var(--fc);box-shadow:0 0 0 8px color-mix(in srgb,var(--fc) 10%,transparent),0 18px 50px -12px rgba(0,0,0,.7);
    transform:translate(-50%,-50%);}
  .hub-fam{font-family:'Space Grotesk',sans-serif;font-size:.46rem;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;color:var(--fc);opacity:.85;}
  .hub-name{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:900;letter-spacing:.02em;
    text-transform:uppercase;color:#fff;line-height:1.05;margin:.25rem 0 .3rem;}
  .hub-when{font-size:.56rem;font-style:italic;color:rgba(255,255,255,.5);line-height:1.35;}

  .enode{position:absolute;z-index:2;width:168px;background:#fff;border-radius:.85rem;
    padding:.6rem .7rem .58rem;cursor:grab;transform:translate(-50%,-50%);
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 10px 26px -8px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.32);
    transition:box-shadow .18s;user-select:none;-webkit-user-select:none;}
  .enode:active{cursor:grabbing;}
  .enode.dragging{box-shadow:0 16px 40px -8px rgba(0,0,0,.6);z-index:20;}
  .enode-num{position:absolute;top:-.5rem;left:-.5rem;font-family:'Space Grotesk',sans-serif;font-weight:900;
    font-size:.6rem;color:var(--bg);background:var(--fc);width:1.35rem;height:1.35rem;border-radius:50%;
    display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.3);}
  .enode-stem{font-size:.82rem;font-weight:700;color:var(--ink);line-height:1.32;}
  .enode-tail{font-size:.68rem;font-style:italic;color:var(--stance);line-height:1.4;margin-top:.15rem;}
  .enode-frame{display:inline-block;margin-top:.4rem;font-family:'Space Grotesk',sans-serif;font-size:.42rem;
    font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fc-d);
    background:color-mix(in srgb,var(--fc) 12%,transparent);border-radius:999px;padding:.14rem .5rem;}
  .const-hint{position:absolute;bottom:1.1rem;left:50%;transform:translateX(-50%);z-index:4;
    font-size:.6rem;font-style:italic;color:rgba(255,255,255,.28);letter-spacing:.04em;pointer-events:none;
    transition:opacity .5s;}
  .const-hint.hidden{opacity:0;}


  /* carousel arrows + dots (galleries idiom) */
  .fam-arrow{flex-shrink:0;width:42px;height:42px;border-radius:50%;background:rgba(201,169,97,.22);
    border:1px solid rgba(201,169,97,.4);color:var(--gold);font-size:1.1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .25s;box-shadow:0 6px 16px rgba(0,0,0,.4);}
  .fam-arrow:hover:not(:disabled){background:rgba(201,169,97,.36);transform:scale(1.12);}
  .fam-arrow:disabled{opacity:.18;cursor:not-allowed;}
  .fam-dots{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:1rem;}
  .fam-dot{width:8px;height:8px;border-radius:50%;background:rgba(99,99,102,.32);cursor:pointer;transition:all .3s;}
  .fam-dot.active{background:var(--gold);transform:scale(1.45);box-shadow:0 0 10px rgba(201,169,97,.4);}
  .fam-dot:hover:not(.active){background:rgba(201,169,97,.45);}

  /* All five fit on wide → arrows and dots hidden; carousel only engages when narrower */
  .fam-arrow,.fam-dots{display:none;}

  /* view switching */
  .view{display:none;} .view.active{display:block;animation:fade .28s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @media(prefers-reduced-motion:reduce){.view.active{animation:none;} .fam:hover,.fn-tile:hover,.fbadge:hover{transform:none;} .fam-viewport{scroll-behavior:auto;}}

  /* below 1000px the five no longer fit → become a swipeable carousel */
  @media(max-width:1000px){
    .fam-arrow{display:flex;}
    .fam-dots{display:flex;}
    .fam{flex:0 0 calc((100% - 1.4rem)/3);}
    .fam-purpose{min-height:2.6em;}
  }
  @media(max-width:760px){
    .fam{flex:0 0 calc((100% - .7rem)/2);}
  }
  @media(max-width:520px){
    .fam{flex:0 0 100%;}
    .fam-badges{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
    .wrap{padding:1.3rem .6rem 3rem;}
  }
  @media(max-width:380px){
    .fam-badges{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header class="header">
  <a class="back-link" href="/?openModal=vocabulary" id="backLink" onclick="return smartBack(event)">← Back</a>
  <div class="brand"><span class="brand-t">Phrase Bank</span><span class="brand-s">Functional Language</span></div>
  <span class="crumb" id="crumb" onclick="goBack()">← Back</span>
</header>

<div class="stage">
  <div class="wrap">
    <!-- LEVEL 1 -->
    <div class="view active" id="viewFamilies">
      <p class="lead">Five families of moves. Swipe across, tap a function to see the expressions worth owning. A map to reach into — not a list to learn.</p>
      <div class="fam-carousel">
        <button class="fam-arrow" id="famPrev" aria-label="Previous">←</button>
        <div class="fam-viewport"><div class="families" id="familyList"></div></div>
        <button class="fam-arrow" id="famNext" aria-label="Next">→</button>
      </div>
      <div class="fam-dots" id="famDots"></div>
    </div>
    <!-- LEVEL 2 · radial constellation -->
    <div class="view" id="viewCapsule">
      <div class="constellation" id="constellation">
        <svg class="spokes" id="spokes"></svg>
        <div class="hub" id="hub">
          <div class="hub-fam" id="hubFam"></div>
          <div class="hub-name" id="hubName"></div>
          <div class="hub-when" id="hubWhen"></div>
        </div>
        <!-- expression cards injected here -->
      </div>
    </div>
  </div>
</div>

<script>
/* ══ CORPUS — fetched from the unified functional-english.json ═══
   One source of truth, shared with the speaking page. The adapter
   folds the flat functions[] into the family tree the bank renders,
   mapping {stem, connector, expanded} → {stem, tail, frame} + PREC. */
let CORPUS = {};
const FAM_ORDER=['evaluating','reasoning','positioning','projecting','relating'];

// derive a short "frame" tag from a stem's grammatical shape (for the register chip)
function frameOf(stem){
  const s=stem.trim().toLowerCase();
  if(/^(in my|from my|to my|as far as|as i see|personally|in general|by and large|broadly|on the whole|generally|more often|as a rule|in most)/.test(s)) return 'adverbial phrase';
  if(/\bthat\s*…?$/.test(s) || /\bthat\b/.test(s)) return 'clause frame';
  if(/^(this|it|there|one|a |the )/.test(s)) return 'noun-phrase frame';
  if(/,\s*…?$/.test(s)) return 'sentence opener';
  return 'set phrase';
}

function adaptCorpus(data){
  const out={};
  for(const [famKey,fam] of Object.entries(data.families)){
    out[famKey]={ name:fam.label, purpose:fam.purpose, functions:{} };
  }
  for(const fn of data.functions){
    const famKey=fn.family;
    if(!out[famKey]) continue;
    out[famKey].functions[fn.id]={
      label: fn.label,
      when: fn.when || 'to use this move',
      yield: fn.phrases.length,
      prec: fn.expanded || null,
      capsule: fn.phrases.map(p=>({
        stem: p.stem,
        tail: p.connector,
        frame: frameOf(p.stem)
      }))
    };
  }
  return out;
}

let path={family:null, fn:null};

const hue = fam => ({
  evaluating:['var(--evaluating)','var(--evaluating-d)'],
  reasoning:['var(--reasoning)','var(--reasoning-d)'],
  positioning:['var(--positioning)','var(--positioning-d)'],
  projecting:['var(--projecting)','var(--projecting-d)'],
  relating:['var(--relating)','var(--relating-d)'],
}[fam]);

/* LEVEL 1 — five-up family cards, four function-badges inside each */
function renderFamilies(){
  const el=document.getElementById('familyList');
  el.innerHTML=FAM_ORDER.map(fam=>{
    const F=CORPUS[fam], [c]=hue(fam);
    const badges=Object.entries(F.functions).map(([k,fn])=>{
      return `
      <button class="fbadge" style="--fc:${c}" onclick="openFn('${fam}','${k}')"
        aria-label="${cap(k)}, ${fn.yield} expressions">
        <span class="fbadge-tag">${fn.yield} expr.</span>
        <span class="fbadge-hero">${cap(k)}</span>
        <span class="fbadge-foot">
          <span class="fbadge-open">→</span>
        </span>
      </button>`;
    }).join('');
    return `<div class="fam" style="--fc:${c};--fc-d:${hue(fam)[1]}">
      <div class="fam-head"><span class="fam-name">${F.name}</span></div>
      <div class="fam-purpose">${F.purpose}</div>
      <div class="fam-badges">${badges}</div>
    </div>`;
  }).join('');
  initCarousel();
}

/* ── horizontal carousel: arrows + dots page the scroll-snap track ── */
function perPage(){
  const w=window.innerWidth;
  return w<=520?1 : w<=760?2 : w<=1000?3 : 5;
}
function pageCount(){ return Math.max(1, Math.ceil(FAM_ORDER.length/perPage())); }
function currentPage(vp){
  const cardW=vp.querySelector('.fam')?.offsetWidth||1;
  const gap=16;
  return Math.round(vp.scrollLeft/((cardW+gap)*perPage()));
}
function initCarousel(){
  const vp=document.querySelector('.fam-viewport');
  const prev=document.getElementById('famPrev');
  const next=document.getElementById('famNext');
  const dots=document.getElementById('famDots');
  const pages=pageCount();
  dots.innerHTML=Array.from({length:pages},(_,i)=>`<div class="fam-dot" data-p="${i}"></div>`).join('');
  const update=()=>{
    const p=currentPage(vp);
    dots.querySelectorAll('.fam-dot').forEach((d,i)=>d.classList.toggle('active',i===p));
    prev.disabled=vp.scrollLeft<=4;
    next.disabled=vp.scrollLeft>=vp.scrollWidth-vp.clientWidth-4;
  };
  const go=dir=>{
    const cardW=vp.querySelector('.fam')?.offsetWidth||1;
    vp.scrollBy({left:dir*(cardW+16)*perPage(),behavior:'smooth'});
  };
  prev.onclick=()=>go(-1);
  next.onclick=()=>go(1);
  vp.onscroll=update;
  dots.querySelectorAll('.fam-dot').forEach(d=>d.onclick=()=>{
    const cardW=vp.querySelector('.fam')?.offsetWidth||1;
    vp.scrollTo({left:(+d.dataset.p)*(cardW+16)*perPage(),behavior:'smooth'});
  });
  window.addEventListener('resize',()=>{dots.innerHTML='';initCarousel();},{once:true});
  update();
}

/* LEVEL 2 — capsule (exponents). Reached directly from a family badge. */
function openFn(fam,k){
  path={family:fam, fn:k};
  const F=CORPUS[fam], fn=F.functions[k], [c,d]=hue(fam);
  const con=document.getElementById('constellation');

  // hub
  const hub=document.getElementById('hub');
  hub.style.setProperty('--fc',c);
  document.getElementById('hubFam').textContent=F.name;
  document.getElementById('hubName').textContent=cap(k);
  document.getElementById('hubWhen').textContent=fn.when;

  // clear previous nodes + spokes + hint
  con.querySelectorAll('.enode').forEach(n=>n.remove());
  con.querySelector('.const-hint')?.remove();
  const svg=document.getElementById('spokes'); svg.innerHTML='';

  switchView('viewCapsule');

  // must render after view is visible so we can measure
  requestAnimationFrame(()=>layoutConstellation(fam,k));
  setCrumb();
}

let dragEl=null, dragDX=0, dragDY=0;
function layoutConstellation(fam,k){
  const F=CORPUS[fam], fn=F.functions[k], [c,d]=hue(fam);
  const con=document.getElementById('constellation');
  const svg=document.getElementById('spokes');
  const W=con.clientWidth, H=con.clientHeight;
  const cx=W/2, cy=H/2;

  // hub to centre
  const hub=document.getElementById('hub');
  hub.style.left=cx+'px'; hub.style.top=cy+'px';

  const items = fn.capsule.length ? fn.capsule
    : Array.from({length:fn.yield},(_,i)=>({stem:'…',tail:'expression '+(i+1)+' — not authored yet',frame:''}));
  const n=items.length;

  // ring geometry: keep everything inside the canvas with margin
  const twoRings = n>5;
  const margin=110;
  const maxR=Math.min(W/2, H/2)-margin;
  const rOuter = Math.max(180, maxR);
  const rInner = twoRings ? rOuter*0.58 : rOuter*0.9;

  items.forEach((x,i)=>{
    const node=document.createElement('div');
    node.className='enode'; node.style.setProperty('--fc',c); node.style.setProperty('--fc-d',d);
    node.innerHTML=`<div class="enode-num">${i+1}</div>
      <div class="enode-stem">${x.stem}</div>
      <div class="enode-tail">${x.tail}</div>
      ${x.frame?`<span class="enode-frame">${x.frame}</span>`:''}`;
    con.appendChild(node);

    // position: distribute around circle; alternate rings when many
    let ring, idxInRing, countInRing, startAngle;
    if(twoRings){
      const innerCount=Math.ceil(n/2), outerCount=n-innerCount;
      if(i<innerCount){ ring=rInner; idxInRing=i; countInRing=innerCount; startAngle=-90; }
      else { ring=rOuter; idxInRing=i-innerCount; countInRing=outerCount; startAngle=-90+(180/outerCount); }
    } else { ring=rInner; idxInRing=i; countInRing=n; startAngle=-90; }
    const ang=(startAngle + idxInRing*(360/countInRing))*Math.PI/180;
    const x0=cx+ring*Math.cos(ang), y0=cy+ring*Math.sin(ang);
    node.style.left=x0+'px'; node.style.top=y0+'px';
    node.dataset.cx=cx; node.dataset.cy=cy;

    // spoke
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',cx); line.setAttribute('y1',cy);
    line.setAttribute('x2',x0); line.setAttribute('y2',y0);
    line.style.stroke=`var(--fc)`; svg.appendChild(line);
    node._line=line;

    // drag
    const down=(px,py)=>{ dragEl=node; node.classList.add('dragging');
      const r=node.getBoundingClientRect(), cr=con.getBoundingClientRect();
      dragDX=px-(r.left+r.width/2 - cr.left); dragDY=py-(r.top+r.height/2 - cr.top); hideHint(); };
    node.addEventListener('mousedown',e=>{e.preventDefault();down(e.clientX,e.clientY);});
    node.addEventListener('touchstart',e=>{down(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  });
  svg.style.setProperty('--fc',c);

  // hint
  const hint=document.createElement('div');
  hint.className='const-hint'; hint.textContent='Drag any expression to arrange your own map';
  con.appendChild(hint);
}

function moveNode(px,py){
  if(!dragEl) return;
  const con=document.getElementById('constellation');
  const cr=con.getBoundingClientRect();
  const nx=px-cr.left-dragDX, ny=py-cr.top-dragDY;
  dragEl.style.left=nx+'px'; dragEl.style.top=ny+'px';
  if(dragEl._line){ dragEl._line.setAttribute('x2',nx); dragEl._line.setAttribute('y2',ny); }
}
document.addEventListener('mousemove',e=>{ if(dragEl) moveNode(e.clientX,e.clientY); });
document.addEventListener('touchmove',e=>{ if(dragEl){ moveNode(e.touches[0].clientX,e.touches[0].clientY);} },{passive:true});
document.addEventListener('mouseup',()=>{ if(dragEl){dragEl.classList.remove('dragging');dragEl=null;} });
document.addEventListener('touchend',()=>{ if(dragEl){dragEl.classList.remove('dragging');dragEl=null;} });
let hintGone=false;
function hideHint(){ if(hintGone)return; hintGone=true; document.querySelector('.const-hint')?.classList.add('hidden'); }

function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const stage=document.querySelector('.stage'), wrap=document.querySelector('.wrap');
  const radial = id==='viewCapsule';
  stage.classList.toggle('no-scroll',radial);
  wrap.classList.toggle('full',radial);
  if(!radial) stage.scrollTo({top:0});
}
function setCrumb(){ document.getElementById('crumb').classList.add('show'); }
function goBack(){
  switchView('viewFamilies');
  document.getElementById('crumb').classList.remove('show');
  path={family:null,fn:null};
}
/* Context-aware back: if the student came from another INTUITY page, return there;
   otherwise fall back to the Vocabulary modal (this file's registered home). */
function smartBack(e){
  try{
    const ref=document.referrer;
    if(ref && new URL(ref).host===location.host){
      e.preventDefault(); history.back(); return false;
    }
  }catch(_){}
  return true; /* let the href (/?openModal=vocabulary) proceed */
}
window.addEventListener('resize',()=>{
  if(document.getElementById('viewCapsule').classList.contains('active') && path.fn){
    const con=document.getElementById('constellation');
    con.querySelectorAll('.enode').forEach(n=>n.remove());
    document.getElementById('spokes').innerHTML='';
    con.querySelector('.const-hint')?.remove();
    layoutConstellation(path.family,path.fn);
  }
});

/* ── boot: fetch the unified corpus, adapt, then render ── */
function corpusUrl(){
  const p=new URLSearchParams(location.search).get('json');
  return p || 'data/functional-english.json';
}
(function boot(){
  const list=document.getElementById('familyList');
  fetch(corpusUrl())
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(data=>{ CORPUS=adaptCorpus(data); renderFamilies(); })
    .catch(err=>{
      list.innerHTML=`<div style="color:rgba(255,255,255,.55);font-size:.85rem;padding:2rem 1rem;max-width:520px;">
        Couldn't load the phrase corpus (<code>${corpusUrl()}</code>). ${err.message}.<br><br>
        On the live site the JSON sits beside this page; opened straight from disk, some browsers block the fetch —
        run it through the deployed site or a local server.</div>`;
    });
})();

</script>
