<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>INTUITY В· Proverbs</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   DESIGN SYSTEM
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
:root{
  --bg:          #0c0c0c;
  --surface:     #161616;
  --surf-raised: #1e1e1e;
  --border:      rgba(201,169,97,.13);
  --border-dim:  rgba(255,255,255,.05);
  --gold:        #C9A961;
  --gold-soft:   rgba(201,169,97,.15);
  --gold-glow:   rgba(201,169,97,.28);
  --ink:         #f0ede6;
  --ink-2:       rgba(240,237,230,.65);
  --ink-3:       rgba(240,237,230,.32);
  --green:       #6fcf8a;
  --green-soft:  rgba(111,207,138,.15);
  --red:         #e07b7b;
  --red-soft:    rgba(224,123,123,.15);
  --h: 56px;
  --f: 68px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;
  background:var(--bg);color:var(--ink);
  font-family:'Instrument Sans',sans-serif;
  -webkit-font-smoothing:antialiased}

body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 85%,rgba(201,169,97,.05) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 85% 15%,rgba(111,207,138,.04) 0%,transparent 65%);
}

/* в”Җв”Җ SHELL в”Җв”Җ */
.shell{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}

/* в”Җв”Җ HEADER в”Җв”Җ */
.hdr{
  flex-shrink:0;height:var(--h);
  background:rgba(12,12,12,.97);
  border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;
  position:relative;z-index:100;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}
.hdr-back{
  display:flex;align-items:center;
  padding:0 16px;border-right:1px solid var(--border);
  flex-shrink:0;
}
.hdr-back a{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  transition:color .15s;
}
.hdr-back a:hover{color:var(--gold)}
  display:flex;align-items:center;gap:10px;
  padding:0 20px;border-right:1px solid var(--border);
  flex-shrink:0;
}
.logo-word{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:16px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);
}
.logo-pipe{width:1px;height:16px;background:var(--border)}
.logo-tag{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;color:var(--ink-3);white-space:nowrap;
}
.hdr-center{
  flex:1;display:flex;align-items:center;justify-content:center;
  gap:8px;
}
.hdr-badge{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);padding:3px 8px;border-radius:3px;
  border:1px solid rgba(201,169,97,.3);background:rgba(201,169,97,.06);
}
.hdr-right{
  display:flex;align-items:center;
  padding:0 20px;border-left:1px solid var(--border);
  flex-shrink:0;gap:12px;
}
.score-chip{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:1.5px;color:var(--ink-3);
  display:flex;align-items:center;gap:5px;
}
.score-chip span{color:var(--gold);font-weight:500}

/* в”Җв”Җ PROGRESS BAR в”Җв”Җ */
.prog-bar{
  flex-shrink:0;height:2px;background:rgba(255,255,255,.04);
  position:relative;z-index:50;
}
.prog-fill{
  height:100%;background:var(--gold);
  box-shadow:0 0 8px var(--gold-glow);
  transition:width .4s cubic-bezier(.22,1,.36,1);
  width:0%;
}

/* в”Җв”Җ STAGE в”Җв”Җ */
.stage{
  flex:1;min-height:0;overflow:hidden;
  display:flex;align-items:stretch;justify-content:center;
  padding:0;
  position:relative;z-index:1;
}

/* в”Җв”Җ CARD в”Җв”Җ */
.card{
  width:100%;max-width:680px;
  background:var(--surface);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  border-radius:0;
  overflow:hidden;display:flex;flex-direction:column;
  position:relative;
}
@media(min-width:700px){
  .stage{align-items:center;padding:14px 16px calc(var(--f) + 10px)}
  .card{
    height:min(460px,calc(100vh - var(--h) - var(--f) - 36px));
    border:1px solid var(--border);
    border-radius:16px;
    box-shadow:0 0 0 1px rgba(255,255,255,.025) inset,
               0 28px 70px rgba(0,0,0,.6),
               0 4px 18px rgba(0,0,0,.35);
  }
}
.card-ledge{height:3px;flex-shrink:0;background:var(--gold);
  box-shadow:0 0 12px rgba(201,169,97,.4)}

/* slide-in animation */
@keyframes cardSlide{
  from{opacity:0;transform:translateX(28px) scale(.98)}
  to  {opacity:1;transform:none}
}
@keyframes cardSlideBack{
  from{opacity:0;transform:translateX(-28px) scale(.98)}
  to  {opacity:1;transform:none}
}
.card.anim-in   {animation:cardSlide     .3s cubic-bezier(.22,1,.36,1) both}
.card.anim-back {animation:cardSlideBack .3s cubic-bezier(.22,1,.36,1) both}

/* в”Җв”Җ CARD TOP в”Җв”Җ */
.card-top{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px 10px;
  border-bottom:1px solid var(--border-dim);
}
.card-num{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;color:var(--ink-3);
}
.card-tag{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  padding:3px 9px;border-radius:3px;
  border:1px solid rgba(201,169,97,.2);
  background:rgba(201,169,97,.07);color:var(--gold);
}

/* в”Җв”Җ SCENARIO в”Җв”Җ */
.scenario-zone{
  flex:1;min-height:0;
  display:flex;align-items:center;
  padding:16px 28px 12px;
}
@media(max-width:520px){.scenario-zone{padding:14px 18px 10px}}
.scenario-icon{
  font-size:clamp(22px,3.5vw,36px);margin-right:16px;flex-shrink:0;
  line-height:1;
}
.scenario-text{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(20px,3.8vw,38px);
  font-weight:600;line-height:1.28;
  letter-spacing:-.2px;color:var(--ink);
}

/* в”Җв”Җ OPTIONS в”Җв”Җ */
.options-zone{
  flex-shrink:0;
  display:flex;flex-direction:column;gap:0;
  padding:0 0 8px;
  border-top:1px solid var(--border-dim);
}
.opt-btn{
  display:flex;align-items:center;gap:14px;
  padding:11px 28px;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border-dim);
  cursor:pointer;transition:background .14s;text-align:left;
  width:100%;
}
.opt-btn:last-child{border-bottom:none}
.opt-btn:hover:not(.locked){background:rgba(255,255,255,.03)}
.opt-btn.locked{cursor:default}
@media(max-width:520px){.opt-btn{padding:11px 18px;gap:12px}}

.opt-letter{
  font-family:'DM Mono',monospace;font-weight:500;
  font-size:10px;letter-spacing:1.5px;
  flex-shrink:0;color:var(--ink-3);
  width:16px;
  transition:color .14s;
}
.opt-text{
  font-family:'Instrument Sans',sans-serif;font-size:clamp(13px,2.4vw,15px);
  font-weight:500;color:var(--ink-2);
  line-height:1.35;flex:1;
  transition:color .14s;
}
.opt-btn:hover:not(.locked) .opt-letter{color:var(--gold)}
.opt-btn:hover:not(.locked) .opt-text{color:var(--ink)}

/* correct / wrong states вҖ” colour only, no box */
.opt-btn.correct .opt-letter{color:var(--green)}
.opt-btn.correct .opt-text{color:var(--green);font-weight:600}
.opt-btn.correct{animation:optCorrect .4s ease both}

.opt-btn.wrong .opt-letter{color:var(--red)}
.opt-btn.wrong .opt-text{color:var(--red);text-decoration:line-through}
.opt-btn.wrong{animation:optWrong .3s ease both}

.opt-btn.reveal .opt-letter{color:var(--green)}
.opt-btn.reveal .opt-text{color:var(--green);font-weight:600}

@keyframes optCorrect{0%{transform:translateX(0)}40%{transform:translateX(4px)}100%{transform:translateX(0)}}
@keyframes optWrong{0%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}100%{transform:translateX(0)}}

/* в”Җв”Җ FEEDBACK STRIP в”Җв”Җ */
.feedback{
  flex-shrink:0;height:0;overflow:hidden;
  background:transparent;
  border-top:none;
  display:flex;align-items:center;gap:10px;
  padding:0 28px;
  transition:height .25s cubic-bezier(.22,1,.36,1);
  font-family:'Instrument Sans',sans-serif;font-size:13px;
  font-style:italic;color:var(--ink-2);
}
@media(max-width:520px){.feedback{padding:0 18px}}
.feedback.show{height:40px;border-top:1px solid var(--border-dim)}
.feedback-icon{font-style:normal;font-size:15px}
.feedback strong{font-style:normal;font-weight:600;color:var(--ink)}

/* в”Җв”Җ FOOTER в”Җв”Җ */
.ftr{
  flex-shrink:0;height:var(--f);
  background:rgba(12,12,12,.98);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  gap:12px;padding:0 16px;
  z-index:100;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}
.nav-btn{
  width:36px;height:36px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--border);
  font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
  color:var(--ink-3);cursor:pointer;transition:all .16s;
}
.nav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px var(--gold-glow)}
.nav-btn:disabled{opacity:.2;cursor:default}

.dots-row{
  display:flex;gap:4px;align-items:center;
  flex-wrap:wrap;justify-content:center;
  max-width:calc(100vw - 140px);
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.1);
  border:none;cursor:pointer;padding:0;flex-shrink:0;
  transition:all .2s cubic-bezier(.22,1,.36,1);
}
.dot.cur{width:18px;border-radius:3px;background:var(--gold);box-shadow:0 0 7px var(--gold-glow)}
.dot.done-ok {background:var(--green);opacity:.6}
.dot.done-err{background:var(--red);opacity:.5}
.dot.done-skip{background:rgba(201,169,97,.35)}

.ctr{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:1.5px;color:var(--ink-3);
  min-width:40px;text-align:center;flex-shrink:0;
}

/* в”Җв”Җ COMPLETE OVERLAY в”Җв”Җ */
.overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(8,8,8,.94);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;opacity:0;pointer-events:none;transition:opacity .4s;
}
.overlay.show{opacity:1;pointer-events:all}
.ov-em{font-size:48px;margin-bottom:2px}
.ov-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(36px,8vw,64px);letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);
}
.ov-score{
  font-family:'DM Mono',monospace;font-size:clamp(14px,3vw,18px);
  letter-spacing:2px;color:var(--ink-2);
}
.ov-bars{
  display:flex;gap:3px;margin:8px 0;
}
.ov-bar{width:12px;height:36px;border-radius:3px}
.ov-sub{
  font-family:'Instrument Sans',sans-serif;font-size:14px;
  color:var(--ink-3);text-align:center;max-width:300px;line-height:1.6;
}
.ov-btns{display:flex;gap:10px;margin-top:10px}
.ov-btn{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:14px;letter-spacing:2px;text-transform:uppercase;
  padding:11px 28px;border-radius:6px;cursor:pointer;transition:all .16s;
}
.ov-btn.primary{background:var(--gold);color:#0c0c0c;border:2px solid var(--gold);box-shadow:0 0 20px var(--gold-glow)}
.ov-btn.primary:hover{background:#b8943a}
.ov-btn.ghost{background:transparent;color:var(--ink-2);border:2px solid var(--border)}
.ov-btn.ghost:hover{border-color:var(--ink-2);color:var(--ink)}

/* responsive */
@media(max-width:600px){
  .logo-pipe,.logo-tag{display:none}
  .hdr-right{padding:0 12px}
}
</style>
</head>
<body>

<div class="shell">
  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-back"><a href="../../index.html?openModal=vocabulary">вҶҗ Back</a></div>
    <div class="hdr-logo">
      <span class="logo-word">INTUITY</span>
      <div class="logo-pipe"></div>
      <span class="logo-tag">Proverbs</span>
    </div>
    <div class="hdr-center">
      <span class="hdr-badge">Idiomatic Expressions В· B1вҖ“B2</span>
    </div>
    <div class="hdr-right">
      <div class="score-chip">вң“ <span id="scoreCorrect">0</span></div>
      <div class="score-chip">вң— <span id="scoreWrong">0</span></div>
    </div>
  </header>

  <!-- PROGRESS BAR -->
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>

  <!-- STAGE -->
  <main class="stage">
    <div class="card" id="card">
      <div class="card-ledge" id="cardLedge"></div>
      <div class="card-top">
        <span class="card-num" id="cardNum">1 / 35</span>
        <span class="card-tag">Which proverb fits?</span>
      </div>
      <div class="scenario-zone">
        <div class="scenario-icon" id="scenarioIcon">рҹ’¬</div>
        <div class="scenario-text" id="scenarioText">LoadingвҖҰ</div>
      </div>
      <div class="options-zone" id="optionsZone"></div>
      <div class="feedback" id="feedback">
        <span class="feedback-icon" id="fbIcon"></span>
        <span id="fbText"></span>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="ftr">
    <button class="nav-btn" id="btnP" onclick="prev()" disabled>вҖ№</button>
    <div class="dots-row" id="dotsRow"></div>
    <span class="ctr" id="ctr">1 / 35</span>
    <button class="nav-btn" id="btnN" onclick="next()">вҖә</button>
  </footer>
</div>

<!-- COMPLETE OVERLAY -->
<div class="overlay" id="overlay">
  <div class="ov-em" id="ovEm">рҹҺү</div>
  <div class="ov-title">Complete!</div>
  <div class="ov-score" id="ovScore">0 / 35 correct</div>
  <div class="ov-bars" id="ovBars"></div>
  <div class="ov-sub" id="ovSub">Well done! You've worked through all the proverbs.</div>
  <div class="ov-btns">
    <button class="ov-btn primary" onclick="restart()">вҶә Try Again</button>
    <button class="ov-btn ghost"   onclick="closeOverlay()">Review</button>
  </div>
</div>

<script>
/* в”Җв”Җв”Җ scenario icons в”Җв”Җв”Җ */
const ICONS = ['рҹ’¬','рҹҸӢпёҸ','рҹ’°','вҳҒпёҸ','рҹҗҰ','рҹҘҡ','рҹҳӨ','рҹ”§','рҹҸ ','рҹ§ ','рҹ’ё','рҹҚҪпёҸ','рҹҸӣпёҸ','рҹҢҠ','рҹҡ—','рҹ§№','рҹ’Қ','рҹҺө','вҡ пёҸ','рҹҚһ','вҳҖпёҸ','рҹ‘»','рҹҺҜ','рҹҺҒ','рҹ§Ҫ','рҹҢҝ','рҹҸҶ','рҹҗў','рҹ’Ә','рҹ‘ЁвҖҚрҹҚі','вҸ°','рҹӨІ','рҹӨқ','рҹҡӮ','рҹҸЁ'];

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   STATE
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
let slides = [];
let TOTAL = 0;

let order = [];
let results = {};
let cur = 0;
let animDir = 'in';

function init(){
  order = Array.from({length:TOTAL},(_,i)=>i);
  shuffle(order);
  results = {};
  cur = 0;
  renderDots();
  renderSlide('in');
}

/* в”Җв”Җв”Җ load data from external JSON в”Җв”Җв”Җ */
async function loadData(){
  const card = document.getElementById('card');
  card.style.opacity = '.4';
  try {
    const res = await fetch('./data/proverbs-quiz.json');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    slides = data.slides;
    TOTAL  = slides.length;
    card.style.opacity = '';
    init();
  } catch(err) {
    card.style.opacity = '';
    document.getElementById('scenarioText').textContent = 'вҡ  Could not load proverbs-data.json вҖ” make sure both files are in the same folder on a server.';
    document.getElementById('scenarioIcon').textContent = '';
    document.getElementById('optionsZone').innerHTML = '';
    console.error('Failed to load data:', err);
  }
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

/* в”Җв”Җв”Җ current slide data в”Җв”Җв”Җ */
function slideData(){return slides[order[cur]]}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   RENDER
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function renderSlide(dir='in'){
  const s = slideData();
  const card = document.getElementById('card');

  // animation
  card.classList.remove('anim-in','anim-back');
  void card.offsetWidth;
  card.classList.add(dir==='back'?'anim-back':'anim-in');

  // header info
  document.getElementById('cardNum').textContent = (cur+1)+' / '+TOTAL;
  document.getElementById('ctr').textContent     = (cur+1)+' / '+TOTAL;

  // ledge colour вҖ” cycle through a palette
  const palette=['#C9A961','#6fcf8a','#6ab0d8','#e07b7b','#b07dd4','#7ec8c8','#d4a07d'];
  document.getElementById('cardLedge').style.background = palette[order[cur]%palette.length];

  // icon + scenario
  document.getElementById('scenarioIcon').textContent = ICONS[order[cur]%ICONS.length];
  document.getElementById('scenarioText').textContent  = s.scenario;

  // options
  const zone = document.getElementById('optionsZone');
  zone.innerHTML = '';
  const letters = ['A','B','C'];
  const res = results[order[cur]];

  s.options.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt-btn';

    // apply states if already answered
    if(res){
      btn.classList.add('locked');
      if(i === s.correct){
        btn.classList.add(res==='correct'?'correct':'reveal');
      } else if(res==='wrong' && i===s._chosen){
        btn.classList.add('wrong');
      }
    }

    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    if(!res) btn.onclick = ()=>choose(i, btn, s);
    zone.appendChild(btn);
  });

  // feedback
  const fb = document.getElementById('feedback');
  const fbText = document.getElementById('fbText');
  const fbIcon = document.getElementById('fbIcon');
  if(res){
    fb.classList.add('show');
    if(res==='correct'){
      fbIcon.textContent='вң“';
      fbText.innerHTML=`<strong>${s.options[s.correct]}</strong> В· ${s.meaning}`;
    } else {
      fbIcon.textContent='вң—';
      fbText.innerHTML=`Correct: <strong>${s.options[s.correct]}</strong> В· ${s.meaning}`;
    }
  } else {
    fb.classList.remove('show');
    fbText.textContent='';
    fbIcon.textContent='';
  }

  updateProgress();
  updateNav();
  renderDots();
}

function choose(i, btn, s){
  const isCorrect = i === s.correct;
  const key = order[cur];

  s._chosen = i;
  results[key] = isCorrect?'correct':'wrong';

  // update score display
  updateScoreDisplay();

  // mark buttons
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b=>b.classList.add('locked'));

  if(isCorrect){
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    // reveal correct
    allBtns[s.correct].classList.add('reveal');
  }

  // feedback
  const fb = document.getElementById('feedback');
  const fbText = document.getElementById('fbText');
  const fbIcon = document.getElementById('fbIcon');
  fb.classList.add('show');
  if(isCorrect){
    fbIcon.textContent='вң“';
    fbText.innerHTML=`<strong>${s.options[s.correct]}</strong> В· ${s.meaning}`;
  } else {
    fbIcon.textContent='вң—';
    fbText.innerHTML=`Correct: <strong>${s.options[s.correct]}</strong> В· ${s.meaning}`;
  }

  renderDots();

  // auto-advance after 1.8s if not last
  const answered = Object.keys(results).length;
  if(answered===TOTAL){
    setTimeout(showComplete,1800);
  } else {
    setTimeout(()=>{
      if(cur<TOTAL-1) next();
    }, 1800);
  }
}

function updateScoreDisplay(){
  let ok=0,bad=0;
  Object.values(results).forEach(v=>{ if(v==='correct')ok++; else bad++; });
  document.getElementById('scoreCorrect').textContent=ok;
  document.getElementById('scoreWrong').textContent=bad;
}

function updateProgress(){
  const answered = Object.keys(results).length;
  document.getElementById('progFill').style.width = (answered/TOTAL*100)+'%';
}

function updateNav(){
  document.getElementById('btnP').disabled = cur<=0;
  document.getElementById('btnN').disabled = cur>=TOTAL-1;
}

function renderDots(){
  const row = document.getElementById('dotsRow');
  row.innerHTML='';
  order.forEach((_,i)=>{
    const d = document.createElement('button');
    d.className='dot';
    const key = order[i];
    const res = results[key];
    if(i===cur) d.classList.add('cur');
    else if(res==='correct') d.classList.add('done-ok');
    else if(res==='wrong')   d.classList.add('done-err');
    else if(res===null)      d.classList.add('done-skip');
    d.title='Slide '+(i+1);
    d.onclick=e=>{e.stopPropagation();goTo(i)};
    row.appendChild(d);
  });
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   NAVIGATION
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function goTo(i){
  if(i<0||i>=TOTAL)return;
  animDir = i>cur?'in':'back';
  cur=i;
  renderSlide(animDir);
}
function next(){if(cur<TOTAL-1)goTo(cur+1)}
function prev(){if(cur>0)goTo(cur-1)}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   COMPLETE
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function showComplete(){
  let ok=0;
  Object.values(results).forEach(v=>{ if(v==='correct')ok++; });
  const pct = Math.round(ok/TOTAL*100);

  document.getElementById('ovEm').textContent = pct===100?'рҹҸҶ':pct>=80?'рҹҺү':pct>=60?'рҹ‘Қ':'рҹ“ҡ';
  document.getElementById('ovScore').textContent = ok+' / '+TOTAL+' correct  ('+pct+'%)';
  document.getElementById('ovSub').textContent =
    pct===100?'Perfect! You know your proverbs!':
    pct>=80?'Excellent work вҖ” almost flawless!':
    pct>=60?'Good effort! A little more practice and you\'ll ace it.':
    'Keep going вҖ” review the expressions and try again!';

  // mini bar chart
  const bars = document.getElementById('ovBars');
  bars.innerHTML='';
  order.forEach((_,i)=>{
    const b=document.createElement('div');
    b.className='ov-bar';
    const res=results[order[i]];
    b.style.background=res==='correct'?'var(--green)':res==='wrong'?'var(--red)':'rgba(255,255,255,.12)';
    bars.appendChild(b);
  });

  document.getElementById('overlay').classList.add('show');
}

function restart(){
  document.getElementById('overlay').classList.remove('show');
  init();
}
function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  cur=0;
  renderSlide('in');
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   KEYBOARD + SWIPE
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key==='1'||e.key==='a')clickOpt(0);
  else if(e.key==='2'||e.key==='b')clickOpt(1);
  else if(e.key==='3'||e.key==='c')clickOpt(2);
  else if(e.key==='Escape'){document.getElementById('overlay').classList.remove('show')}
});

function clickOpt(i){
  const btns=document.querySelectorAll('.opt-btn');
  if(btns[i]&&!btns[i].classList.contains('locked'))btns[i].click();
}

let _tx=0,_ty=0;
document.addEventListener('touchstart',e=>{_tx=e.changedTouches[0].screenX;_ty=e.changedTouches[0].screenY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].screenX-_tx;
  const dy=e.changedTouches[0].screenY-_ty;
  if(Math.abs(dy)>Math.abs(dx))return;
  if(dx<-55)next();else if(dx>55)prev();
});

/* в”Җв”Җ START в”Җв”Җ */
loadData();
</script>
