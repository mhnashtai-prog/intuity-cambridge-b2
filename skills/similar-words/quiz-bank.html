<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTUITY — Quiz Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Lora:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0d0d0d; --gold:#C9A961;
    /* four families = four topic hues */
    --tenses:#3fbfb2;      --tenses-d:#2a8b81;
    --culture:#f0a23c;     --culture-d:#c07a1f;
    --grammar:#e85a4f;     --grammar-d:#b83a31;
    --vocabulary:#9a6baa;  --vocabulary-d:#6d4a7c;
    --ink:#2b2b30; --stance:#8a8a92;
    --good:#2a8b81; --good-bg:rgba(63,191,178,.14); --good-bd:rgba(63,191,178,.5);
    --bad:#b83a31; --bad-bg:rgba(232,90,79,.12); --bad-bd:rgba(232,90,79,.45);
  }
  html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}
  body{font-family:'DM Sans',sans-serif;color:#e5e5e7;-webkit-tap-highlight-color:transparent;position:relative;}

  /* ── ambient glow field — gives the glass panels something to refract ── */
  .glow-field{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .glow-field::before,.glow-field::after{content:'';position:absolute;border-radius:50%;filter:blur(90px);
    opacity:.35;transition:background .5s ease, opacity .5s ease;}
  .glow-field::before{width:46vw;height:46vw;top:-14vw;left:-10vw;background:radial-gradient(circle,var(--gc1,#3fbfb2),transparent 70%);}
  .glow-field::after{width:40vw;height:40vw;bottom:-16vw;right:-8vw;background:radial-gradient(circle,var(--gc2,#9a6baa),transparent 70%);}

  .header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;
    justify-content:space-between;padding:.7rem 1.15rem;height:52px;
    background:linear-gradient(180deg,rgba(20,20,22,.72),rgba(13,13,13,.55));
    backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);
    border-bottom:1px solid rgba(255,255,255,.08);
    box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 12px 30px -18px rgba(0,0,0,.6);}
  .brand{display:flex;flex-direction:column;gap:1px;}
  .brand-t{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:-.01em;}
  .brand-s{font-size:.5rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.32);}
  .back-link{position:absolute;left:1.15rem;text-decoration:none;font-family:'Space Grotesk',sans-serif;
    font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);}
  .back-link:hover{color:rgba(255,255,255,.7);}
  .header .brand{margin:0 auto;align-items:center;}
  .header-right{position:absolute;right:1.15rem;display:flex;align-items:center;gap:.6rem;}
  .score-chip{font-family:'Space Grotesk',sans-serif;font-size:.58rem;font-weight:800;letter-spacing:.06em;
    color:var(--gold);background:linear-gradient(135deg,rgba(201,169,97,.22),rgba(201,169,97,.08));
    backdrop-filter:blur(8px);border:1px solid rgba(201,169,97,.4);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
    border-radius:999px;padding:.32rem .7rem;white-space:nowrap;}
  .crumb{font-family:'Space Grotesk',sans-serif;font-size:.56rem;
    font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);cursor:pointer;
    opacity:0;transition:opacity .2s;pointer-events:none;}
  .crumb.show{opacity:1;pointer-events:auto;}
  .crumb:hover{color:#fff;}

  .stage{position:fixed;top:52px;left:0;right:0;bottom:0;overflow-y:auto;z-index:1;
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent;}
  .stage::-webkit-scrollbar{width:5px;} .stage::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}
  .stage.no-scroll{overflow:hidden;}
  .wrap{max-width:1180px;margin:0 auto;padding:1.3rem 1.15rem 3rem;}
  .wrap.full{max-width:none;padding:0;}

  .lead{font-size:.8rem;color:rgba(255,255,255,.4);font-weight:500;margin:.1rem .3rem 1.15rem;line-height:1.5;max-width:640px;}

  /* ── LEVEL 1 · FOUR TOPIC CARDS ── */
  .fam-carousel{position:relative;display:flex;align-items:stretch;gap:.4rem;}
  .fam-viewport{flex:1;min-width:0;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:.2rem 0 .3rem;}
  .fam-viewport::-webkit-scrollbar{display:none;}
  .families{display:flex;gap:.7rem;align-items:stretch;padding:0 .15rem;}
  .fam{position:relative;flex:0 0 calc((100% - 2.1rem)/4);min-width:0;scroll-snap-align:start;
    background:linear-gradient(165deg,rgba(255,255,255,.94),rgba(250,249,247,.8));
    backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
    border-radius:1.1rem;padding:2.3rem .8rem 1rem .9rem;
    border:1px solid rgba(255,255,255,.6);
    display:flex;flex-direction:column;transition:transform .2s,box-shadow .25s;
    box-shadow:0 1px 0 rgba(255,255,255,.95) inset,0 18px 45px -14px rgba(0,0,0,.6),0 6px 18px rgba(0,0,0,.4),
      0 0 0 1px color-mix(in srgb,var(--fc) 8%,transparent);}
  .fam:hover{box-shadow:0 1px 0 rgba(255,255,255,.95) inset,0 22px 55px -14px rgba(0,0,0,.65),0 8px 22px rgba(0,0,0,.4),
      0 0 0 1px color-mix(in srgb,var(--fc) 22%,transparent),0 0 32px -8px color-mix(in srgb,var(--fc) 45%,transparent);}
  .fam::before{content:'';position:absolute;top:.9rem;left:.9rem;right:.8rem;height:8px;
    background-image:radial-gradient(circle, rgba(0,0,0,.12) 3px, transparent 3.5px);
    background-size:16px 8px;background-repeat:repeat-x;}
  .fam-head{position:absolute;top:1.1rem;left:-9px;display:flex;align-items:center;gap:.4rem;
    background:linear-gradient(135deg,color-mix(in srgb,var(--fc) 92%,#fff),var(--fc));
    backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.35);
    padding:.35rem .6rem .35rem .45rem;border-radius:.45rem .65rem .65rem .45rem;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 6px 14px -4px rgba(0,0,0,.35);z-index:2;max-width:calc(100% + 9px);}
  .fam-head::after{content:'';position:absolute;left:0;bottom:-8px;border-style:solid;border-width:8px 0 0 12px;
    border-color:var(--fc-d) transparent transparent transparent;filter:brightness(.75);}
  .fam-name{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.6rem;letter-spacing:.1em;
    text-transform:uppercase;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fam-purpose{font-size:.66rem;font-style:italic;color:var(--stance);margin:.35rem .1rem .8rem;
    line-height:1.4;min-height:2.6em;}
  .fam-badges{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem .9rem;align-content:start;justify-items:center;}
  .fbadge{position:relative;min-width:0;width:80%;aspect-ratio:1/1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;cursor:pointer;
    background:linear-gradient(145deg,#fbfaf8,#f0efec);
    border:1px solid rgba(255,255,255,.6);border-radius:22%;
    padding:.4rem .35rem;
    box-shadow:5px 5px 12px rgba(163,157,145,.38),-5px -5px 12px rgba(255,255,255,.95),
      inset 0 0 0 1px rgba(255,255,255,.3);
    transition:box-shadow .28s cubic-bezier(.4,0,.2,1),transform .18s ease,background .28s ease;}
  .fbadge:hover{
    background:linear-gradient(145deg,#f0efec,#fbfaf8);
    box-shadow:inset 5px 5px 10px rgba(163,157,145,.4),inset -5px -5px 10px rgba(255,255,255,.95),
      0 0 0 1px color-mix(in srgb,var(--fc) 35%,transparent);}
  .fbadge:active{
    box-shadow:inset 6px 6px 12px rgba(163,157,145,.45),inset -6px -6px 12px rgba(255,255,255,.9);}
  .fbadge:focus-visible{outline:2px solid var(--fc);outline-offset:2px;}
  .fbadge-tag{position:absolute;top:.35rem;left:.35rem;z-index:1;font-family:'Space Grotesk',sans-serif;font-size:.33rem;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;color:var(--stance);
    background:rgba(0,0,0,.04);
    border-radius:999px;padding:.09rem .32rem;
    transition:color .22s,background .22s;}
  .fbadge:hover .fbadge-tag{color:var(--fc-d);background:color-mix(in srgb,var(--fc) 16%,transparent);}
  .fbadge-hero{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;
    font-size:.56rem;font-weight:800;letter-spacing:.01em;text-transform:uppercase;color:var(--ink);
    line-height:1.2;word-break:break-word;transition:color .22s;}
  .fbadge:hover .fbadge-hero{color:var(--fc-d);}
  .fbadge-foot{position:absolute;bottom:.35rem;right:.35rem;z-index:1;display:flex;}
  .fbadge-open{flex-shrink:0;width:.92rem;height:.92rem;border-radius:50%;
    background:linear-gradient(145deg,#fbfaf8,#f0efec);color:var(--stance);
    box-shadow:2px 2px 5px rgba(163,157,145,.4),-2px -2px 5px rgba(255,255,255,.9);
    display:flex;align-items:center;justify-content:center;font-size:.54rem;line-height:1;font-weight:700;
    transition:background .22s,color .22s,box-shadow .22s,transform .22s;}
  .fbadge:hover .fbadge-open{background:var(--fc);color:#fff;transform:scale(1.1);
    box-shadow:inset 1px 1px 3px rgba(0,0,0,.2),0 0 10px -2px color-mix(in srgb,var(--fc) 70%,transparent);}


  /* ── LEVEL 2 · CONSTELLATION — question centre, answer options orbiting ── */
  .constellation{position:relative;width:100%;height:calc(100vh - 52px);overflow:hidden;touch-action:none;}
  .q-centre{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;
    width:min(46%,540px);text-align:center;pointer-events:none;}
  .q-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:.16em;
    text-transform:uppercase;color:var(--fc);opacity:.9;margin-bottom:.4rem;}
  .q-progress{font-size:.6rem;color:rgba(255,255,255,.35);letter-spacing:.04em;margin-bottom:.7rem;}
  .q-text{font-family:'Lora',serif;font-style:italic;font-weight:500;
    font-size:clamp(1.05rem,2vw,1.55rem);line-height:1.4;color:#fff;
    text-shadow:0 2px 20px rgba(0,0,0,.8);}
  .q-controls{pointer-events:auto;display:flex;align-items:center;justify-content:center;gap:.55rem;margin-top:1.1rem;flex-wrap:wrap;}
  .q-next{font-family:'Space Grotesk',sans-serif;font-size:.58rem;
    font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fc);
    background:linear-gradient(135deg,color-mix(in srgb,var(--fc) 20%,transparent),color-mix(in srgb,var(--fc) 8%,transparent));
    backdrop-filter:blur(10px);
    border:1px solid color-mix(in srgb,var(--fc) 45%,transparent);border-radius:999px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 6px 16px -8px rgba(0,0,0,.5);
    padding:.5rem 1.1rem;cursor:pointer;transition:background .18s,transform .18s,box-shadow .18s;}
  .q-next:hover{background:linear-gradient(135deg,color-mix(in srgb,var(--fc) 34%,transparent),color-mix(in srgb,var(--fc) 14%,transparent));
    transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 10px 20px -8px rgba(0,0,0,.55),0 0 18px -6px color-mix(in srgb,var(--fc) 55%,transparent);}
  .q-restart{font-family:'Space Grotesk',sans-serif;font-size:.58rem;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.6);
    background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.18);border-radius:999px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.1);
    padding:.5rem 1rem;cursor:pointer;transition:all .18s;}
  .q-restart:hover{color:#fff;border-color:rgba(255,255,255,.32);background:rgba(255,255,255,.14);}

  /* option cards — white poster with family-hue ribbon banner */
  .enode{position:absolute;z-index:2;width:250px;
    background:linear-gradient(160deg,rgba(255,255,255,.95),rgba(250,249,247,.82));
    backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%);
    border-radius:.9rem;
    padding:2.2rem .85rem .8rem;cursor:pointer;transform:translate(-50%,-50%);
    box-shadow:0 1px 0 rgba(255,255,255,.95) inset,0 10px 26px -8px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.32),
      0 0 0 1px color-mix(in srgb,var(--fc) 10%,transparent);
    transition:box-shadow .18s,transform .18s,border-color .18s,background .2s;user-select:none;-webkit-user-select:none;
    border:2px solid transparent;}
  .enode:hover:not(.disabled){transform:translate(-50%,-50%) scale(1.03);
    box-shadow:inset 3px 3px 8px rgba(0,0,0,.06),inset -3px -3px 8px rgba(255,255,255,.7),
      0 16px 34px -8px rgba(0,0,0,.6),0 6px 16px rgba(0,0,0,.35),
      0 0 0 1px color-mix(in srgb,var(--fc) 35%,transparent),0 0 24px -6px color-mix(in srgb,var(--fc) 45%,transparent);}
  .enode.disabled{cursor:default;}
  .enode-banner{position:absolute;top:.75rem;left:-6px;display:flex;align-items:center;gap:.3rem;
    background:var(--fc);padding:.2rem .5rem .2rem .3rem;border-radius:.35rem .5rem .5rem .35rem;
    box-shadow:0 4px 10px -3px rgba(0,0,0,.4);z-index:3;}
  .enode-banner::after{content:'';position:absolute;left:0;bottom:-6px;border-style:solid;border-width:6px 0 0 9px;
    border-color:var(--fc-d) transparent transparent transparent;filter:brightness(.75);}
  .enode-bnum{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:.52rem;color:var(--fc);
    background:#fff;width:.95rem;height:.95rem;border-radius:.25rem;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;}
  .enode-blabel{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.44rem;letter-spacing:.09em;
    text-transform:uppercase;color:#fff;white-space:nowrap;}
  .enode-stem{font-size:.82rem;font-weight:700;color:var(--ink);line-height:1.32;}
  .enode.correct{border-color:var(--good-bd);box-shadow:0 0 0 3px rgba(63,191,178,.18),0 10px 26px -8px rgba(0,0,0,.55);}
  .enode.correct .enode-banner{background:var(--good);}
  .enode.correct .enode-banner::after{border-color:var(--good) transparent transparent transparent;}
  .enode.incorrect{border-color:var(--bad-bd);box-shadow:0 0 0 3px rgba(232,90,79,.16),0 10px 26px -8px rgba(0,0,0,.55);}
  .enode.incorrect .enode-banner{background:var(--bad);}
  .enode.incorrect .enode-banner::after{border-color:var(--bad) transparent transparent transparent;}
  .enode.faded{opacity:.55;}
  .const-hint{position:absolute;bottom:1.1rem;left:50%;transform:translateX(-50%);z-index:4;
    font-size:.6rem;font-style:italic;color:rgba(255,255,255,.28);letter-spacing:.04em;pointer-events:none;
    transition:opacity .5s;}
  .const-hint.hidden{opacity:0;}

  /* ── the "game" overlay: choosing → this refined result card → next ── */
  .qc-overlay{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
    background:rgba(8,8,10,.6);backdrop-filter:blur(6px) saturate(120%);-webkit-backdrop-filter:blur(6px) saturate(120%);
    padding:1rem;}
  .qc-overlay.show{display:flex;animation:qcfade .35s ease;}
  @keyframes qcfade{from{opacity:0;}to{opacity:1;}}
  .qc-card{position:relative;width:min(480px,94%);
    background:linear-gradient(160deg,rgba(255,255,255,.97),rgba(250,249,247,.92));
    backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
    border-radius:1.25rem;border:1px solid rgba(255,255,255,.6);
    padding:2.7rem 1.7rem 1.6rem;
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 30px 70px -15px rgba(0,0,0,.7),0 0 0 1px color-mix(in srgb,var(--fc) 12%,transparent);
    animation:qcpop .4s cubic-bezier(.22,1,.36,1);}
  @keyframes qcpop{from{opacity:0;transform:translateY(18px) scale(.94);}to{opacity:1;transform:none;}}
  .qc-banner{position:absolute;top:1rem;left:-8px;display:flex;align-items:center;gap:.4rem;
    background:linear-gradient(135deg,color-mix(in srgb,var(--fc) 92%,#fff),var(--fc));
    backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.35);
    padding:.32rem .7rem .32rem .5rem;border-radius:.4rem .6rem .6rem .4rem;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 5px 12px -4px rgba(0,0,0,.35);}
  .qc-banner::after{content:'';position:absolute;left:0;bottom:-8px;border-style:solid;border-width:8px 0 0 12px;
    border-color:var(--fc-d) transparent transparent transparent;filter:brightness(.75);}
  .qc-blabel{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.5rem;letter-spacing:.1em;
    text-transform:uppercase;color:#fff;}
  .qc-task{font-family:'Space Grotesk',sans-serif;font-size:.54rem;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;color:var(--fc-d);margin-bottom:.6rem;}
  .qc-question{font-family:'Lora',serif;font-style:italic;font-weight:500;font-size:1rem;color:var(--ink);
    line-height:1.45;margin-bottom:1.1rem;}
  .qc-chosen{display:flex;align-items:center;gap:.7rem;padding:1rem 1.1rem;border-radius:.9rem;
    background:rgba(0,0,0,.03);border:1.5px solid rgba(0,0,0,.08);transition:all .2s;}
  .qc-chosen.good{background:var(--good-bg);border-color:var(--good-bd);}
  .qc-chosen.bad{background:var(--bad-bg);border-color:var(--bad-bd);}
  .qc-chosen-icon{flex-shrink:0;width:1.7rem;height:1.7rem;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:.9rem;font-weight:900;color:#fff;background:var(--stance);}
  .qc-chosen.good .qc-chosen-icon{background:var(--good);}
  .qc-chosen.bad .qc-chosen-icon{background:var(--bad);}
  .qc-chosen-text{font-size:1.02rem;font-weight:700;color:var(--ink);line-height:1.35;}
  .qc-explain{margin-top:1.1rem;padding:.9rem 1.05rem;border-radius:.8rem;font-size:.78rem;line-height:1.55;
    background:rgba(0,0,0,.025);border:1px solid rgba(0,0,0,.06);color:var(--stance);}
  .qc-actions{margin-top:1.4rem;display:flex;flex-direction:column;gap:.6rem;}
  .qc-primary{font-family:'Space Grotesk',sans-serif;font-size:.66rem;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;padding:.85rem;border-radius:.8rem;cursor:pointer;border:none;color:#0d0d0d;
    background:linear-gradient(135deg,#e4c98a,var(--gold));
    box-shadow:0 10px 22px -8px rgba(201,169,97,.5);transition:transform .16s,box-shadow .16s;}
  .qc-primary:hover{transform:translateY(-1px);box-shadow:0 14px 26px -8px rgba(201,169,97,.6);}
  .qc-close{font-family:'Space Grotesk',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;padding:.7rem;border-radius:.8rem;cursor:pointer;
    background:transparent;border:1px solid rgba(0,0,0,.14);color:var(--stance);transition:all .15s;}
  .qc-close:hover{background:rgba(0,0,0,.04);color:var(--ink);}

  .fam-arrow{flex-shrink:0;width:42px;height:42px;border-radius:50%;background:rgba(201,169,97,.22);
    border:1px solid rgba(201,169,97,.4);color:var(--gold);font-size:1.1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .25s;box-shadow:0 6px 16px rgba(0,0,0,.4);}
  .fam-arrow:hover:not(:disabled){background:rgba(201,169,97,.36);transform:scale(1.12);}
  .fam-arrow:disabled{opacity:.18;cursor:not-allowed;}
  .fam-dots{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:1rem;}
  .fam-dot{width:8px;height:8px;border-radius:50%;background:rgba(99,99,102,.32);cursor:pointer;transition:all .3s;}
  .fam-dot.active{background:var(--gold);transform:scale(1.45);box-shadow:0 0 10px rgba(201,169,97,.4);}
  .fam-dot:hover:not(.active){background:rgba(201,169,97,.45);}
  .fam-arrow,.fam-dots{display:none;}

  .view{display:none;} .view.active{display:block;animation:fade .28s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @media(prefers-reduced-motion:reduce){.view.active{animation:none;} .fam:hover,.fbadge:hover,.enode:hover{transform:none;} .fam-viewport{scroll-behavior:auto;}}

  @media(max-width:1000px){
    .fam-arrow{display:flex;}
    .fam-dots{display:flex;}
    .fam{flex:0 0 calc((100% - 1.4rem)/3);}
  }
  @media(max-width:760px){
    .fam{flex:0 0 calc((100% - .7rem)/2);}
  }
  @media(max-width:520px){

        {q:"Which verb means 'to speak in a complaining, unhappy way'?", options:["whispered","mumbled","whined","announced"], correct:2, explain:"'Whined' describes a complaining, high-pitched way of speaking."},
        {q:"Which verb best replaces 'looked' to mean 'stared angrily'?", options:["glanced","glared","peeked","observed"], correct:1, explain:"'Glared' specifically means to look at someone with anger."},
        {q:"Which verb means 'to eat quickly and greedily'?", options:["nibbled","devoured","sipped","tasted"], correct:1, explain:"'Devoured' means to eat something fast and hungrily."},
        {q:"Which verb best replaces 'said' to mean 'said something quietly and hesitantly'?", options:["shouted","murmured","declared","announced"], correct:1, explain:"'Murmured' describes speaking softly and indistinctly."}
      ]},
      news: { label:'News', when:'vocabulary around journalism and current events', questions:[
        {q:"What is the main story title on the front page of a newspaper called?", options:["byline","headline","caption","editorial"], correct:1, explain:"The 'headline' is the large title text introducing a news story."},
        {q:"A person who writes news articles is called a ___.", options:["publisher","journalist","editor","broadcaster"], correct:1, explain:"A 'journalist' is someone who researches and writes news stories."},
        {q:"Which word describes a news story that has not yet been confirmed?", options:["verified","unconfirmed","breaking","exclusive"], correct:1, explain:"'Unconfirmed' means the information hasn't been officially verified yet."},
        {q:"The section of a newspaper giving the writer's opinion is called the ___.", options:["headline","editorial","obituary","classifieds"], correct:1, explain:"An 'editorial' is an article expressing the opinion of the publication."},
        {q:"'Breaking news' refers to ___.", options:["old news","news that just happened","fake news","local news"], correct:1, explain:"'Breaking news' describes an important story that is developing right now."}
      ]}
    }
  }
};
const FAM_ORDER=['tenses','culture','grammar','vocabulary'];

const hue = fam => ({
  tenses:['var(--tenses)','var(--tenses-d)'],
  culture:['var(--culture)','var(--culture-d)'],
  grammar:['var(--grammar)','var(--grammar-d)'],
  vocabulary:['var(--vocabulary)','var(--vocabulary-d)'],
}[fam]);

let path={family:null, fn:null};
let score={correct:0, total:0};

function setGlow(fam){
  const gf=document.getElementById('glowField');
  if(!gf) return;
  if(fam){
    const [c,d]=hue(fam);
    gf.style.setProperty('--gc1', `var(--${fam})`);
    gf.style.setProperty('--gc2', `var(--${fam}-d)`);
  } else {
    gf.style.setProperty('--gc1', '#3fbfb2');
    gf.style.setProperty('--gc2', '#9a6baa');
  }
}

function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* LEVEL 1 — four-up topic cards, function badges inside each */
function renderFamilies(){
  const el=document.getElementById('familyList');
  el.innerHTML=FAM_ORDER.map(fam=>{
    const F=QUIZ[fam], [c]=hue(fam);
    const badges=Object.entries(F.functions).map(([k,fn])=>{
      return `
      <button class="fbadge" style="--fc:${c}" onclick="openFn('${fam}','${k}')"
        aria-label="${fn.label}, ${fn.questions.length} questions">
        <span class="fbadge-tag">${fn.questions.length} Q.</span>
        <span class="fbadge-hero">${fn.label}</span>
        <span class="fbadge-foot">
          <span class="fbadge-open">→</span>
        </span>
      </button>`;
    }).join('');
    return `<div class="fam" style="--fc:${c};--fc-d:${hue(fam)[1]}">
      <div class="fam-head"><span class="fam-name">${F.name}</span></div>
      <div class="fam-purpose">${F.purpose}</div>
      <div class="fam-badges">${badges}</div>
    </div>`;
  }).join('');
  initCarousel();
}

/* ── horizontal carousel: arrows + dots page the scroll-snap track ── */
function perPage(){
  const w=window.innerWidth;
  return w<=520?1 : w<=760?2 : w<=1000?3 : 4;
}
function pageCount(){ return Math.max(1, Math.ceil(FAM_ORDER.length/perPage())); }
function currentPage(vp){
  const cardW=vp.querySelector('.fam')?.offsetWidth||1;
  const gap=16;
  return Math.round(vp.scrollLeft/((cardW+gap)*perPage()));
}
function initCarousel(){
  const vp=document.querySelector('.fam-viewport');
  const prev=document.getElementById('famPrev');
  const next=document.getElementById('famNext');
  const dots=document.getElementById('famDots');
  const pages=pageCount();
  dots.innerHTML=Array.from({length:pages},(_,i)=>`<div class="fam-dot" data-p="${i}"></div>`).join('');
  const update=()=>{
    const p=currentPage(vp);
    dots.querySelectorAll('.fam-dot').forEach((d,i)=>d.classList.toggle('active',i===p));
    prev.disabled=vp.scrollLeft<=4;
    next.disabled=vp.scrollLeft>=vp.scrollWidth-vp.clientWidth-4;
  };
  const go=dir=>{
    const cardW=vp.querySelector('.fam')?.offsetWidth||1;
    vp.scrollBy({left:dir*(cardW+16)*perPage(),behavior:'smooth'});
  };
  prev.onclick=()=>go(-1);
  next.onclick=()=>go(1);
  vp.onscroll=update;
  dots.querySelectorAll('.fam-dot').forEach(d=>d.onclick=()=>{
    const cardW=vp.querySelector('.fam')?.offsetWidth||1;
    vp.scrollTo({left:(+d.dataset.p)*(cardW+16)*perPage(),behavior:'smooth'});
  });
  window.addEventListener('resize',()=>{dots.innerHTML='';initCarousel();},{once:true});
  update();
}

/* LEVEL 2 — constellation: question at centre, answer options orbiting */
let curFam=null, curFn=null, qOrder=[], qIdx=0, answered=false;

function openFn(fam,k){
  path={family:fam, fn:k};
  curFam=fam; curFn=k;
  const F=QUIZ[fam], fn=F.functions[k], [c,d]=hue(fam);
  const con=document.getElementById('constellation');
  con.style.setProperty('--fc',c);
  con.style.setProperty('--fc-d',d);
  setGlow(fam);
  clearTimeout(pendingOverlayTimer);
  closeOverlay();

  qOrder = shuffle(fn.questions.map((_,i)=>i));
  qIdx = 0;
  answered = false;

  switchView('viewCapsule');
  requestAnimationFrame(()=>renderQuestion());
  setCrumb();
}

function currentQuestion(){
  const fn=QUIZ[curFam].functions[curFn];
  return fn.questions[qOrder[qIdx]];
}

function updateScoreChip(){
  document.getElementById('scoreChip').textContent = `✓ ${score.correct} / ${score.total}`;
}

function renderQuestion(){
  const F=QUIZ[curFam], fn=F.functions[curFn], [c,d]=hue(curFam);
  const con=document.getElementById('constellation');
  con.querySelectorAll('.enode').forEach(n=>n.remove());
  con.querySelector('.const-hint')?.remove();

  document.getElementById('qEyebrow').textContent = fn.label+' · '+F.name;
  document.getElementById('qProgress').textContent = `Question ${qIdx+1} of ${qOrder.length}`;
  const item=currentQuestion();
  document.getElementById('qText').textContent = item.q;
  answered=false;

  const W=con.clientWidth, H=con.clientHeight;
  const cx=W/2, cy=H/2;
  const n=item.options.length;
  const half = Math.ceil(n/2);
  const rightCount = n - half;
  const rx = Math.min(W*0.32, 460);
  const ry = Math.min(H*0.4, 260);

  function place(i){
    const onLeft = i < half;
    const idx = onLeft ? i : i - half;
    const count = onLeft ? half : rightCount;
    const angMax = 65 * Math.PI/180;
    const yMaxFrac = Math.sin(angMax);
    const t = count>1 ? (idx/(count-1))*2 - 1 : 0;
    const yFrac = t*yMaxFrac;
    const xFrac = Math.sqrt(Math.max(0, 1 - yFrac*yFrac));
    const baseX = onLeft ? -xFrac : xFrac;
    return { x: cx + baseX*rx, y: cy + yFrac*ry };
  }

  item.options.forEach((opt,i)=>{
    const node=document.createElement('div');
    node.className='enode';
    node.style.setProperty('--fc',c); node.style.setProperty('--fc-d',d);
    node.innerHTML=`<div class="enode-banner">
        <span class="enode-bnum">${String.fromCharCode(65+i)}</span>
        <span class="enode-blabel">Answer</span>
      </div>
      <div class="enode-stem">${opt}</div>`;
    con.appendChild(node);
    const p=place(i);
    node.style.left=p.x+'px'; node.style.top=p.y+'px';
    node.addEventListener('click',()=>selectOption(i,node));
    node.dataset.idx=i;
  });

  const hint=document.createElement('div');
  hint.className='const-hint';
  hint.textContent='Tap an answer to check it';
  con.appendChild(hint);
}

function selectOption(i,node){
  if(answered) return;
  answered=true;
  const item=currentQuestion();
  const correctIdx=item.correct;
  const isRight = i===correctIdx;

  score.total++;
  if(isRight) score.correct++;
  updateScoreChip();

  document.querySelectorAll('.enode').forEach(n=>{
    n.classList.add('disabled');
    const idx=+n.dataset.idx;
    if(idx===correctIdx) n.classList.add('correct');
    else if(idx===i) n.classList.add('incorrect');
    else n.classList.add('faded');
  });

  document.querySelector('.const-hint')?.classList.add('hidden');

  // let the board's own reaction play out for a beat before the refined result opens —
  // choosing → (board reacts) → game / result
  clearTimeout(pendingOverlayTimer);
  pendingOverlayTimer = setTimeout(()=>openOverlay(item,i,isRight), 550);
}

let pendingOverlayTimer=null;

function openOverlay(item,i,isRight){
  const F=QUIZ[curFam], fn=F.functions[curFn], [c,d]=hue(curFam);
  const ov=document.getElementById('qcOverlay');
  const card=document.getElementById('qcCard');
  card.style.setProperty('--fc',c); card.style.setProperty('--fc-d',d);
  document.getElementById('qcLabel').textContent=fn.label;
  document.getElementById('qcTask').textContent = isRight ? 'Nice — that checks out' : 'Not quite';
  document.getElementById('qcQuestion').textContent = item.q;

  const chosen=document.getElementById('qcChosen');
  chosen.classList.remove('good','bad');
  chosen.classList.add(isRight?'good':'bad');
  document.getElementById('qcIcon').textContent = isRight ? '✓' : '✕';
  document.getElementById('qcChosenText').textContent = isRight
    ? item.options[i]
    : `${item.options[i]}  →  ${item.options[item.correct]}`;

  document.getElementById('qcExplain').textContent = item.explain;
  ov.classList.add('show');
}

function closeOverlay(){
  document.getElementById('qcOverlay').classList.remove('show');
}

function advanceFromOverlay(){
  closeOverlay();
  nextQuestion();
}

function nextQuestion(){
  clearTimeout(pendingOverlayTimer);
  closeOverlay();
  if(!qOrder.length) return;
  qIdx = (qIdx+1) % qOrder.length;
  if(qIdx===0) qOrder = shuffle(qOrder);
  renderQuestion();
}

function restartTopic(){
  if(!curFn) return;
  clearTimeout(pendingOverlayTimer);
  closeOverlay();
  const fn=QUIZ[curFam].functions[curFn];
  qOrder = shuffle(fn.questions.map((_,i)=>i));
  qIdx=0;
  renderQuestion();
}

function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const stage=document.querySelector('.stage'), wrap=document.querySelector('.wrap');
  const radial = id==='viewCapsule';
  stage.classList.toggle('no-scroll',radial);
  wrap.classList.toggle('full',radial);
  if(!radial) stage.scrollTo({top:0});
}
function setCrumb(){ document.getElementById('crumb').classList.add('show'); }
function goBack(){
  clearTimeout(pendingOverlayTimer);
  closeOverlay();
  switchView('viewFamilies');
  document.getElementById('crumb').classList.remove('show');
  path={family:null,fn:null};
  curFam=null; curFn=null;
  setGlow(null);
}
function smartBack(e){
  try{
    const ref=document.referrer;
    if(ref && new URL(ref).host===location.host){
      e.preventDefault(); history.back(); return false;
    }
  }catch(_){}
  return true;
}
window.addEventListener('resize',()=>{
  if(document.getElementById('viewCapsule').classList.contains('active') && path.fn){
    renderQuestion();
  }
});

renderFamilies();
updateScoreChip();
</script>
</body>
