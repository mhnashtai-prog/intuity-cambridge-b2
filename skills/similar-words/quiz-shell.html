<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>INTUITY · Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:          #0c0c0c;
  --surface:     #161616;
  --border:      rgba(201,169,97,.13);
  --border-dim:  rgba(255,255,255,.05);
  --gold:        #C9A961;
  --gold-soft:   rgba(201,169,97,.15);
  --gold-glow:   rgba(201,169,97,.28);
  --ink:         #f0ede6;
  --ink-2:       rgba(240,237,230,.65);
  --ink-3:       rgba(240,237,230,.28);
  --green:       #6fcf8a;
  --red:         #e07b7b;
  --h: 44px;
  --f: 52px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;
  background:var(--bg);color:var(--ink);
  font-family:'Instrument Sans',sans-serif;
  -webkit-font-smoothing:antialiased}

body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 90%,rgba(201,169,97,.06) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 10%,rgba(111,207,138,.04) 0%,transparent 60%);
}

/* ── SHELL ── */
.shell{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;height:var(--h);
  background:rgba(12,12,12,.97);
  border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;
  position:relative;z-index:100;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}
.hdr-back{
  display:flex;align-items:center;
  padding:0 14px;border-right:1px solid var(--border);flex-shrink:0;
}
.hdr-back a{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;transition:color .15s;
}
.hdr-back a:hover{color:var(--gold)}
.hdr-logo{
  display:flex;align-items:center;gap:8px;
  padding:0 14px;border-right:1px solid var(--border);flex-shrink:0;
}
.logo-word{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:14px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);
}
.logo-pipe{width:1px;height:14px;background:var(--border)}
.logo-tag{
  font-family:'DM Mono',monospace;font-size:8px;
  letter-spacing:2px;text-transform:uppercase;color:var(--ink-3);white-space:nowrap;
}
.hdr-center{flex:1;display:flex;align-items:center;justify-content:center}
.hdr-badge{
  font-family:'DM Mono',monospace;font-size:8px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);padding:2px 7px;border-radius:3px;
  border:1px solid rgba(201,169,97,.25);background:rgba(201,169,97,.06);
}
.hdr-right{
  display:flex;align-items:center;
  padding:0 14px;border-left:1px solid var(--border);
  flex-shrink:0;gap:10px;
}
.score-chip{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:1px;color:var(--ink-3);
  display:flex;align-items:center;gap:4px;
}
.score-chip span{color:var(--gold);font-weight:500}

/* ── PROGRESS BAR ── */
.prog-bar{flex-shrink:0;height:2px;background:rgba(255,255,255,.04)}
.prog-fill{
  height:100%;background:var(--gold);
  box-shadow:0 0 8px var(--gold-glow);
  transition:width .4s cubic-bezier(.22,1,.36,1);width:0%;
}

/* ── STAGE ── */
.stage{
  flex:1;min-height:0;overflow:hidden;
  display:flex;align-items:stretch;justify-content:center;
  position:relative;z-index:1;
}

/* ── CARD ── */
.card{
  width:100%;max-width:680px;
  background:var(--surface);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}
@media(min-width:700px){
  .stage{align-items:center;padding:12px 16px calc(var(--f) + 8px)}
  .card{
    height:min(480px,calc(100vh - var(--h) - var(--f) - 32px));
    border:1px solid var(--border);border-radius:16px;
    box-shadow:0 0 0 1px rgba(255,255,255,.025) inset,
               0 28px 70px rgba(0,0,0,.6),0 4px 18px rgba(0,0,0,.35);
  }
}

/* slide animations */
@keyframes cardSlide    {from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
@keyframes cardSlideBack{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:none}}
.card.anim-in  {animation:cardSlide     .28s cubic-bezier(.22,1,.36,1) both}
.card.anim-back{animation:cardSlideBack .28s cubic-bezier(.22,1,.36,1) both}

/* ── POSTER ZONE ── */
.poster-zone{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:12px 20px 10px;
  position:relative;gap:8px;
}
.poster-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;flex-shrink:0;
}
.poster-num{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;color:var(--ink-3);
}
.poster-tag{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);opacity:.7;
}
.kw{font-family:'Bebas Neue',sans-serif;font-weight:400;display:inline;}

.poster-zone::before{
  content:'';position:absolute;left:0;top:18%;bottom:18%;
  width:3px;border-radius:0 2px 2px 0;
  background:var(--accent, var(--gold));
  box-shadow:0 0 12px var(--accent, var(--gold-glow));
  transition:background .3s;
}

/* ── SCENARIO ── */
.scenario-text{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,14vw,82px);
  font-weight:400;line-height:1.05;
  letter-spacing:.5px;color:var(--ink);display:block;
}
@media(max-width:699px){
  .scenario-text{font-size:clamp(58px,16vw,88px);line-height:1.0}
}

/* ── OPTIONS ── */
.options-zone{
  flex-shrink:0;display:flex;flex-direction:column;
  border-top:1px solid var(--border-dim);
}
.opt-btn{
  display:flex;align-items:center;gap:14px;
  padding:13px 24px;
  background:transparent;border:none;
  border-bottom:1px solid var(--border-dim);
  cursor:pointer;transition:background .12s;text-align:left;width:100%;
}
.opt-btn:last-child{border-bottom:none}
.opt-btn:hover:not(.locked){background:rgba(255,255,255,.03)}
.opt-btn.locked{cursor:default}
.opt-letter{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;
  flex-shrink:0;color:var(--ink-3);width:14px;transition:color .12s;
}
.opt-text{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(17px,4.8vw,24px);
  font-weight:600;letter-spacing:.2px;
  color:var(--ink-2);line-height:1.2;flex:1;transition:color .12s;
}
.opt-btn:hover:not(.locked) .opt-letter{color:var(--gold)}
.opt-btn:hover:not(.locked) .opt-text{color:var(--ink)}
.opt-btn.correct .opt-letter,.opt-btn.correct .opt-text{color:var(--green)}
.opt-btn.correct .opt-text{font-weight:600}
.opt-btn.correct{animation:optCorrect .35s ease both}
.opt-btn.wrong .opt-letter,.opt-btn.wrong .opt-text{color:var(--red)}
.opt-btn.wrong .opt-text{text-decoration:line-through;font-weight:600}
.opt-btn.wrong{animation:optWrong .3s ease both}
.opt-btn.reveal .opt-letter,.opt-btn.reveal .opt-text{color:var(--green)}
.opt-btn.reveal .opt-text{font-weight:600}

@keyframes optCorrect{0%{transform:translateX(0)}40%{transform:translateX(4px)}100%{transform:translateX(0)}}
@keyframes optWrong{0%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}100%{transform:translateX(0)}}

/* ── FEEDBACK ── */
.feedback{
  flex-shrink:0;height:0;overflow:hidden;
  display:flex;align-items:center;gap:8px;padding:0 24px;
  transition:height .22s cubic-bezier(.22,1,.36,1);
  font-family:'Instrument Sans',sans-serif;font-size:12px;
  font-style:italic;color:var(--ink-2);border-top:none;
}
.feedback.show{height:36px;border-top:1px solid var(--border-dim)}
.feedback-icon{font-style:normal;font-size:13px}
.feedback strong{font-style:normal;font-weight:600;color:var(--ink)}

/* ── FOOTER ── */
.ftr{
  flex-shrink:0;height:var(--f);
  background:rgba(12,12,12,.98);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:0 14px;z-index:100;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}
.nav-btn{
  width:32px;height:32px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--border);
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;
  color:var(--ink-3);cursor:pointer;transition:all .16s;
}
.nav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px var(--gold-glow)}
.nav-btn:disabled{opacity:.2;cursor:default}
.dots-row{
  display:flex;gap:4px;align-items:center;flex-wrap:wrap;
  justify-content:center;max-width:calc(100vw - 120px);
}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.1);
  border:none;cursor:pointer;padding:0;flex-shrink:0;
  transition:all .2s cubic-bezier(.22,1,.36,1);
}
.dot.cur{width:16px;border-radius:3px;background:var(--gold);box-shadow:0 0 7px var(--gold-glow)}
.dot.done-ok {background:var(--green);opacity:.6}
.dot.done-err{background:var(--red);opacity:.5}
.ctr{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:1.5px;color:var(--ink-3);
  min-width:36px;text-align:center;flex-shrink:0;
}

/* ── COMPLETE OVERLAY ── */
.overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(8,8,8,.94);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;opacity:0;pointer-events:none;transition:opacity .4s;
}
.overlay.show{opacity:1;pointer-events:all}
.ov-em{font-size:44px;margin-bottom:2px}
.ov-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(36px,8vw,64px);letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);
}
.ov-score{
  font-family:'DM Mono',monospace;font-size:clamp(13px,3vw,17px);
  letter-spacing:2px;color:var(--ink-2);
}
.ov-bars{display:flex;gap:3px;margin:8px 0;flex-wrap:wrap;justify-content:center;max-width:320px}
.ov-bar{width:10px;height:32px;border-radius:3px}
.ov-sub{
  font-family:'Instrument Sans',sans-serif;font-size:13px;
  color:var(--ink-3);text-align:center;max-width:280px;line-height:1.6;
}
.ov-btns{display:flex;gap:10px;margin-top:10px}
.ov-btn{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  padding:10px 26px;border-radius:6px;cursor:pointer;transition:all .16s;
}
.ov-btn.primary{background:var(--gold);color:#0c0c0c;border:2px solid var(--gold);box-shadow:0 0 20px var(--gold-glow)}
.ov-btn.primary:hover{background:#b8943a}
.ov-btn.ghost{background:transparent;color:var(--ink-2);border:2px solid var(--border)}
.ov-btn.ghost:hover{border-color:var(--ink-2);color:var(--ink)}

/* ── MODE TOGGLE ── */
.mode-toggle{
  display:flex;align-items:center;gap:8px;
  padding:0 14px;border-left:1px solid var(--border);
  flex-shrink:0;
}
.mode-lbl{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--ink-3);transition:color .2s;min-width:34px;text-align:right;
}
.mode-lbl.active{color:var(--gold)}
.toggle{
  width:38px;height:20px;border-radius:10px;
  background:var(--surface);
  border:1px solid var(--border);
  position:relative;cursor:pointer;
  transition:background .22s,border-color .22s;
  outline:none;flex-shrink:0;
}
.toggle.on{background:rgba(201,169,97,.18);border-color:var(--gold)}
.toggle-dot{
  position:absolute;top:3px;left:3px;
  width:12px;height:12px;border-radius:50%;
  background:var(--ink-3);
  transition:transform .22s cubic-bezier(.22,1,.36,1),background .22s;
}
.toggle.on .toggle-dot{transform:translateX(18px);background:var(--gold)}

@media(max-width:480px){.logo-pipe,.logo-tag,.hdr-badge{display:none}}
.build-zone{
  flex-shrink:0;
  display:flex;flex-wrap:wrap;
  gap:8px;align-content:flex-start;
  padding:14px 20px 14px;
  border-top:1px solid var(--border-dim);
  min-height:56px;
}
.word-chip{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(15px,4vw,20px);
  font-weight:700;letter-spacing:.3px;
  padding:7px 14px;border-radius:6px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  color:var(--ink-2);cursor:grab;
  user-select:none;touch-action:none;
  transition:background .12s,border-color .12s,transform .12s;
}
.word-chip:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18)}
.word-chip.dragging{opacity:.35;transform:scale(.96)}
.word-chip.over{border-color:var(--gold);background:rgba(201,169,97,.12)}
.word-chip.correct-pos{color:var(--green);border-color:rgba(111,207,138,.4);background:rgba(111,207,138,.08)}
.word-chip.wrong-pos  {color:var(--red);  border-color:rgba(224,123,123,.35);background:rgba(224,123,123,.08);text-decoration:line-through}

@keyframes chipPop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
.word-chip.correct-pos{animation:chipPop .3s ease both}
</style>
</head>
<body>

<div class="shell">
  <header class="hdr">
    <div class="hdr-back"><a href="../../index.html?openModal=vocabulary">← Back</a></div>
    <div class="hdr-logo">
      <span class="logo-word">INTUITY</span>
      <div class="logo-pipe"></div>
      <span class="logo-tag" id="logoTag">Quiz</span>
    </div>
    <div class="hdr-center">
      <span class="hdr-badge" id="hdrBadge">B2</span>
    </div>
    <div class="hdr-right">
      <div class="score-chip">✓ <span id="scoreCorrect">0</span></div>
      <div class="score-chip">✗ <span id="scoreWrong">0</span></div>
    </div>
    <div class="mode-toggle">
      <span class="mode-lbl active" id="modeLbl">QUIZ</span>
      <button class="toggle" id="modeBtn" onclick="toggleMode()" aria-label="Toggle mode">
        <div class="toggle-dot"></div>
      </button>
      <span class="mode-lbl" id="modeLblR" style="min-width:34px;text-align:left">BUILD</span>
    </div>
  </header>

  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>

  <main class="stage">
    <div class="card" id="card">
      <div class="poster-zone" id="posterZone">
        <div class="poster-meta">
          <span class="poster-num" id="cardNum">1 / 35</span>
          <span class="poster-tag" id="posterTag">Choose the correct word</span>
        </div>
        <div class="scenario-text" id="scenarioText">Loading…</div>
      </div>
      <div class="options-zone" id="optionsZone"></div>
      <div class="build-zone"   id="buildZone" style="display:none"></div>
      <div class="feedback" id="feedback">
        <span class="feedback-icon" id="fbIcon"></span>
        <span id="fbText"></span>
      </div>
    </div>
  </main>

  <footer class="ftr">
    <button class="nav-btn" id="btnP" onclick="prev()" disabled>‹</button>
    <div class="dots-row" id="dotsRow"></div>
    <span class="ctr" id="ctr">1 / 35</span>
    <button class="nav-btn" id="btnCheck" onclick="checkBuild()"
      style="display:none;font-family:DM Mono,monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;width:auto;padding:0 10px;color:var(--gold);border-color:rgba(201,169,97,.3)">
      CHECK
    </button>
    <button class="nav-btn" id="btnN" onclick="next()">›</button>
  </footer>
</div>

<div class="overlay" id="overlay">
  <div class="ov-em" id="ovEm">🎉</div>
  <div class="ov-title">Complete!</div>
  <div class="ov-score" id="ovScore">0 / 35 correct</div>
  <div class="ov-bars" id="ovBars"></div>
  <div class="ov-sub" id="ovSub"></div>
  <div class="ov-btns">
    <button class="ov-btn primary" onclick="restart()">↺ Try Again</button>
    <button class="ov-btn ghost"   onclick="closeOverlay()">Review</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   URL PARAMETER — ?json=path/to/data.json
   Falls back to default if not provided
═══════════════════════════════════════════ */
function getJsonPath(){
  const params = new URLSearchParams(window.location.search);
  return params.get('json') || './data/prepositions-quiz.json';
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let slides = [], TOTAL = 0;
let order = [], results = {}, shuffledOpts = {}, correctTexts = {};
let cur = 0, animDir = 'in';
let appMode = 'quiz'; // 'quiz' | 'build'

/* ── BUILD mode state ── */
let buildWords   = {};  // { slideIndex: [current word order] }
let buildChecked = {};  // { slideIndex: true }

const KW_COLORS = ['#C9A961','#6ab0d8','#a8d86a','#e07b7b','#b07dd4','#6fcf8a','#d4936a','#7ec8c8'];
const ACCENT_PAL = ['#C9A961','#6ab0d8','#a8d86a','#e07b7b','#b07dd4','#6fcf8a','#d4936a','#7ec8c8'];

/* ═══════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════ */
async function loadData(){
  const card = document.getElementById('card');
  card.style.opacity = '.4';
  try{
    const path = getJsonPath();
    const res  = await fetch(path);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    slides = data.slides;
    TOTAL  = slides.length;
    card.style.opacity = '';
    // update header labels from JSON metadata
    if(data.title)    document.title = 'INTUITY · ' + data.title;
    if(data.title)    document.getElementById('logoTag').textContent  = data.title;
    if(data.level)    document.getElementById('hdrBadge').textContent = data.level;
    if(data.subtitle){ document.getElementById('posterTag').textContent = data.subtitle; window._quizSubtitle = data.subtitle; }
    init();
  } catch(err){
    card.style.opacity = '';
    document.getElementById('scenarioText').textContent =
      '⚠ Could not load data. Check the ?json= path and make sure you are on a server.';
    document.getElementById('optionsZone').innerHTML = '';
    console.error('loadData failed:', err);
  }
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
function init(){
  order = Array.from({length:TOTAL},(_,i)=>i);
  shuffle(order);
  shuffledOpts = {};
  correctTexts = {};
  buildWords   = {};
  buildChecked = {};
  slides.forEach((s,i)=>{
    correctTexts[i] = s.options[s.correct];
    const arr = [...s.options];
    shuffle(arr);
    shuffledOpts[i] = arr;
    // BUILD: split the correct answer into words, shuffle them
    const words = correctTexts[i].split(/\s+/);
    const bw = [...words]; shuffle(bw);
    buildWords[i] = bw;
  });
  results = {};
  cur = 0;
  renderDots();
  renderSlide('in');
}

/* ── MODE TOGGLE ── */
function toggleMode(){
  appMode = appMode==='quiz' ? 'build' : 'quiz';
  const btn = document.getElementById('modeBtn');
  const lbl = document.getElementById('modeLbl');
  const lblR= document.getElementById('modeLblR');
  btn.classList.toggle('on', appMode==='build');
  lbl.classList.toggle('active', appMode==='quiz');
  lblR.classList.toggle('active', appMode==='build');
  document.getElementById('btnCheck').style.display = appMode==='build' ? '' : 'none';
  document.getElementById('posterTag').textContent  = appMode==='build'
    ? 'Order the words'
    : (window._quizSubtitle || 'Choose the correct answer');
  renderSlide(animDir);
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function slideData(){ return slides[order[cur]] }

function renderSlide(dir='in'){
  const s = slideData();
  const card = document.getElementById('card');

  card.classList.remove('anim-in','anim-back');
  void card.offsetWidth;
  card.classList.add(dir==='back'?'anim-back':'anim-in');

  document.getElementById('cardNum').textContent = (cur+1)+' / '+TOTAL;
  document.getElementById('ctr').textContent     = (cur+1)+' / '+TOTAL;
  document.getElementById('posterTag').textContent = appMode==='build'
    ? 'Order the words'
    : (window._quizSubtitle || 'Choose the correct answer');

  // accent + keyword colour — same index, same palette
  const idx    = order[cur] % KW_COLORS.length;
  const kwCol  = KW_COLORS[idx];
  const accent = ACCENT_PAL[idx];
  document.getElementById('posterZone').style.setProperty('--accent', accent);

  // scenario with keyword highlighted
  const raw    = s.scenario;
  const kw     = s.keyword || '';
  const esc_html = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let scenHtml = esc_html;
  if(kw){
    const esc_kw = kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const rx  = new RegExp('(?<![\\w])(' + esc_kw + ')(?![\\w])','i');
    scenHtml  = esc_html.replace(rx, `<span class="kw" style="color:${kwCol}">$1</span>`);
    if(scenHtml === esc_html){
      const rx2 = new RegExp('(' + esc_kw + ')','i');
      scenHtml  = esc_html.replace(rx2, `<span class="kw" style="color:${kwCol}">$1</span>`);
    }
  }
  document.getElementById('scenarioText').innerHTML = scenHtml;

  const slideIdx = order[cur];

  // show/hide zones based on mode
  document.getElementById('optionsZone').style.display = appMode==='quiz' ? '' : 'none';
  document.getElementById('buildZone').style.display   = appMode==='build' ? '' : 'none';

  if(appMode==='quiz'){
    renderQuizOptions(s, slideIdx);
  } else {
    renderBuildZone(slideIdx);
  }

  // feedback
  const fb     = document.getElementById('feedback');
  const fbText = document.getElementById('fbText');
  const fbIcon = document.getElementById('fbIcon');
  const res    = results[slideIdx];
  const bChecked = buildChecked[slideIdx];

  if(appMode==='quiz' && res){
    const correctTxt = correctTexts[slideIdx];
    fb.classList.add('show');
    fbIcon.textContent = res==='correct' ? '✓' : '✗';
    fbText.innerHTML   = res==='correct'
      ? `<strong>${correctTxt}</strong> · ${s.meaning}`
      : `Correct: <strong>${correctTxt}</strong> · ${s.meaning}`;
  } else if(appMode==='build' && bChecked){
    const correctTxt = correctTexts[slideIdx];
    fb.classList.add('show');
    const words    = buildWords[slideIdx];
    const correct  = correctTxt.split(/\s+/);
    const allRight = words.every((w,i)=>w===correct[i]);
    fbIcon.textContent = allRight ? '✓' : '✗';
    fbText.innerHTML   = allRight
      ? `<strong>${correctTxt}</strong> · ${s.meaning}`
      : `Answer: <strong>${correctTxt}</strong> · ${s.meaning}`;
  } else {
    fb.classList.remove('show');
    fbText.textContent=''; fbIcon.textContent='';
  }

  updateProgress();
  updateNav();
  renderDots();
}

/* ── QUIZ OPTIONS ── */
function renderQuizOptions(s, slideIdx){
  const zone = document.getElementById('optionsZone');
  zone.innerHTML = '';
  const letters = ['A','B','C','D'];
  const res      = results[slideIdx];
  const opts     = shuffledOpts[slideIdx];
  const correctTxt = correctTexts[slideIdx];

  opts.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    const isCorrect = opt === correctTxt;
    if(res){
      btn.classList.add('locked');
      if(isCorrect) btn.classList.add(res==='correct'?'correct':'reveal');
      else if(res==='wrong' && opt===results[slideIdx+'_chosen']) btn.classList.add('wrong');
    }
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    if(!res) btn.onclick = ()=>choose(opt, btn, slideIdx);
    zone.appendChild(btn);
  });
}

/* ── BUILD ZONE ── */
function renderBuildZone(slideIdx){
  const zone    = document.getElementById('buildZone');
  zone.innerHTML = '';
  const words   = buildWords[slideIdx];
  const correct = correctTexts[slideIdx].split(/\s+/);
  const checked = buildChecked[slideIdx];

  words.forEach((word, i)=>{
    const chip = document.createElement('span');
    chip.className  = 'word-chip';
    chip.textContent = word;
    chip.dataset.idx = i;
    if(checked){
      chip.classList.add(word === correct[i] ? 'correct-pos' : 'wrong-pos');
    }
    // desktop drag
    chip.draggable = !checked;
    chip.addEventListener('dragstart', buildDragStart);
    chip.addEventListener('dragover',  buildDragOver);
    chip.addEventListener('drop',      buildDrop);
    chip.addEventListener('dragend',   buildDragEnd);
    // touch
    chip.addEventListener('touchstart', buildTouchStart, {passive:false});
    chip.addEventListener('touchmove',  buildTouchMove,  {passive:false});
    chip.addEventListener('touchend',   buildTouchEnd,   {passive:false});
    zone.appendChild(chip);
  });
}

/* ── BUILD DRAG ── */
let bDragIdx = null, bSlideIdx = null;

function buildDragStart(e){
  bDragIdx  = parseInt(e.target.dataset.idx);
  bSlideIdx = order[cur];
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function buildDragOver(e){
  e.preventDefault();
  e.target.closest('.word-chip')?.classList.add('over');
}
function buildDrop(e){
  e.preventDefault();
  const target = e.target.closest('.word-chip');
  if(!target) return;
  target.classList.remove('over');
  const dropIdx = parseInt(target.dataset.idx);
  if(bDragIdx===null || dropIdx===bDragIdx) return;
  const arr = buildWords[bSlideIdx];
  [arr[bDragIdx], arr[dropIdx]] = [arr[dropIdx], arr[bDragIdx]];
  renderBuildZone(bSlideIdx);
}
function buildDragEnd(e){
  e.target.classList.remove('dragging');
  document.querySelectorAll('.word-chip.over').forEach(c=>c.classList.remove('over'));
  bDragIdx = null;
}

/* ── BUILD TOUCH ── */
let bTouchIdx=null, bTouchSlide=null, bTouchEl=null;
function buildTouchStart(e){
  e.preventDefault();
  bTouchEl    = e.target.closest('.word-chip');
  bTouchIdx   = parseInt(bTouchEl.dataset.idx);
  bTouchSlide = order[cur];
  bTouchEl.classList.add('dragging');
}
function buildTouchMove(e){
  e.preventDefault();
  const t    = e.touches[0];
  const el   = document.elementFromPoint(t.clientX, t.clientY);
  const chip = el?.closest('.word-chip');
  document.querySelectorAll('.word-chip.over').forEach(c=>c.classList.remove('over'));
  if(chip && chip !== bTouchEl) chip.classList.add('over');
}
function buildTouchEnd(e){
  e.preventDefault();
  const t    = e.changedTouches[0];
  const el   = document.elementFromPoint(t.clientX, t.clientY);
  const chip = el?.closest('.word-chip');
  if(chip && chip !== bTouchEl){
    const dropIdx = parseInt(chip.dataset.idx);
    const arr = buildWords[bTouchSlide];
    [arr[bTouchIdx], arr[dropIdx]] = [arr[dropIdx], arr[bTouchIdx]];
  }
  document.querySelectorAll('.word-chip.over,.word-chip.dragging').forEach(c=>{
    c.classList.remove('over','dragging');
  });
  renderBuildZone(bTouchSlide);
  bTouchIdx=null; bTouchEl=null;
}

/* ── CHECK BUILD ── */
function checkBuild(){
  const slideIdx = order[cur];
  buildChecked[slideIdx] = true;
  renderBuildZone(slideIdx);
  // show feedback
  const correctTxt = correctTexts[slideIdx];
  const words   = buildWords[slideIdx];
  const correct = correctTxt.split(/\s+/);
  const allRight = words.every((w,i)=>w===correct[i]);
  const fb     = document.getElementById('feedback');
  const fbText = document.getElementById('fbText');
  const fbIcon = document.getElementById('fbIcon');
  fb.classList.add('show');
  fbIcon.textContent = allRight ? '✓' : '✗';
  fbText.innerHTML   = allRight
    ? `<strong>${correctTxt}</strong> · ${slides[slideIdx].meaning}`
    : `Answer: <strong>${correctTxt}</strong> · ${slides[slideIdx].meaning}`;
  // update score
  const outcome = allRight ? 'correct' : 'wrong';
  if(!results[slideIdx]){
    results[slideIdx] = outcome;
    updateScoreDisplay();
    renderDots();
    const answered = Object.keys(results).filter(k=>!k.includes('_')).length;
    if(answered===TOTAL) setTimeout(showComplete, 1800);
    else if(allRight) setTimeout(()=>{ if(cur<TOTAL-1) next(); }, 1800);
  }
}

/* ═══════════════════════════════════════════
   ANSWER
═══════════════════════════════════════════ */
function choose(chosenText, btn, slideIdx){
  const s          = slides[slideIdx];
  const correctTxt = correctTexts[slideIdx];
  const isCorrect  = chosenText === correctTxt;

  results[slideIdx]            = isCorrect ? 'correct' : 'wrong';
  results[slideIdx+'_chosen']  = chosenText;

  updateScoreDisplay();

  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b=>b.classList.add('locked'));

  if(isCorrect){
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b=>{
      if(b.querySelector('.opt-text').textContent === correctTxt) b.classList.add('reveal');
    });
  }

  const fb     = document.getElementById('feedback');
  const fbText = document.getElementById('fbText');
  const fbIcon = document.getElementById('fbIcon');
  fb.classList.add('show');
  if(isCorrect){
    fbIcon.textContent='✓';
    fbText.innerHTML=`<strong>${correctTxt}</strong> · ${s.meaning}`;
  } else {
    fbIcon.textContent='✗';
    fbText.innerHTML=`Correct: <strong>${correctTxt}</strong> · ${s.meaning}`;
  }

  renderDots();

  const answered = Object.keys(results).filter(k=>!k.includes('_')).length;
  if(answered===TOTAL){
    setTimeout(showComplete, 1800);
  } else {
    setTimeout(()=>{ if(cur<TOTAL-1) next(); }, 1800);
  }
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function goTo(i){
  if(i<0||i>=TOTAL)return;
  animDir = i>cur?'in':'back';
  cur=i; renderSlide(animDir);
}
function next(){ if(cur<TOTAL-1) goTo(cur+1) }
function prev(){ if(cur>0)       goTo(cur-1) }

function updateNav(){
  document.getElementById('btnP').disabled = cur<=0;
  document.getElementById('btnN').disabled = cur>=TOTAL-1;
}

function updateProgress(){
  const answered = Object.keys(results).filter(k=>!k.includes('_')).length;
  document.getElementById('progFill').style.width = (answered/TOTAL*100)+'%';
}

function updateScoreDisplay(){
  let ok=0,bad=0;
  Object.entries(results).forEach(([k,v])=>{
    if(k.includes('_'))return;
    if(v==='correct')ok++; else bad++;
  });
  document.getElementById('scoreCorrect').textContent=ok;
  document.getElementById('scoreWrong').textContent=bad;
}

function renderDots(){
  const row=document.getElementById('dotsRow');
  row.innerHTML='';
  order.forEach((_,i)=>{
    const d=document.createElement('button');
    d.className='dot';
    const res=results[order[i]];
    if(i===cur)           d.classList.add('cur');
    else if(res==='correct') d.classList.add('done-ok');
    else if(res==='wrong')   d.classList.add('done-err');
    d.title='Question '+(i+1);
    d.onclick=e=>{e.stopPropagation();goTo(i)};
    row.appendChild(d);
  });
}

/* ═══════════════════════════════════════════
   COMPLETE
═══════════════════════════════════════════ */
function showComplete(){
  let ok=0;
  Object.entries(results).forEach(([k,v])=>{ if(!k.includes('_')&&v==='correct')ok++; });
  const pct=Math.round(ok/TOTAL*100);
  document.getElementById('ovEm').textContent    = pct===100?'🏆':pct>=80?'🎉':pct>=60?'👍':'📚';
  document.getElementById('ovScore').textContent = ok+' / '+TOTAL+' correct  ('+pct+'%)';
  document.getElementById('ovSub').textContent   =
    pct===100?'Perfect score!':
    pct>=80?'Excellent — almost flawless!':
    pct>=60?'Good effort. Review the ones you missed.':
    'Keep practising — try again!';

  const bars=document.getElementById('ovBars');
  bars.innerHTML='';
  order.forEach((_,i)=>{
    const b=document.createElement('div');
    b.className='ov-bar';
    const res=results[order[i]];
    b.style.background=res==='correct'?'var(--green)':res==='wrong'?'var(--red)':'rgba(255,255,255,.1)';
    bars.appendChild(b);
  });

  document.getElementById('overlay').classList.add('show');
}

function restart(){
  document.getElementById('overlay').classList.remove('show');
  init();
}
function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  cur=0; renderSlide('in');
}

/* ═══════════════════════════════════════════
   KEYBOARD + SWIPE
═══════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){ e.preventDefault(); if(appMode==='build') checkBuild(); }
  else if(e.key==='1'||e.key==='a') clickOpt(0);
  else if(e.key==='2'||e.key==='b') clickOpt(1);
  else if(e.key==='3'||e.key==='c') clickOpt(2);
  else if(e.key==='Escape') document.getElementById('overlay').classList.remove('show');
});
function clickOpt(i){
  const btns=document.querySelectorAll('.opt-btn');
  if(btns[i]&&!btns[i].classList.contains('locked')) btns[i].click();
}
let _tx=0;
document.addEventListener('touchstart',e=>{_tx=e.changedTouches[0].screenX},{passive:true});
document.addEventListener('touchend',e=>{
  if(appMode==='build') return; // don't swipe-navigate while dragging chips
  const dx=e.changedTouches[0].screenX-_tx;
  if(Math.abs(dx)>55){ if(dx<0)next(); else prev(); }
});

/* ── START ── */
loadData();
</script>
