<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>INTUITY · Speaking Part 2 — Compare & Contrast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0f17; --bg2:#12141f; --panel:rgba(255,255,255,.035);
    --panel-b:rgba(255,255,255,.08); --ink:#eef1f6; --ink2:#aeb6c6; --ink3:#6b7689;
    --gold:#C9A961; --link:#4a90d9;
    /* three stages → three locked STAGE_ACCENTS */
    --sim:#3d9e95;   --sim-bg:rgba(61,158,149,.12);  --sim-b:rgba(61,158,149,.4);
    --dif:#e8723a;   --dif-bg:rgba(232,114,58,.12);   --dif-b:rgba(232,114,58,.4);
    --opi:#7b5ea7;   --opi-bg:rgba(123,94,167,.14);   --opi-b:rgba(123,94,167,.45);
    --display:'Bebas Neue',sans-serif; --mono:'IBM Plex Mono',monospace; --sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(circle at 50% -10%,#1a1d2b 0%,var(--bg2) 42%,var(--bg) 100%);
    color:var(--ink); font-family:var(--sans);
    min-height:100dvh; display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  /* ── header ── */
  .top{display:flex;align-items:center;gap:14px;padding:18px 22px 12px;max-width:1080px;margin:0 auto;width:100%}
  .brand{font-family:var(--display);font-size:clamp(26px,5vw,34px);letter-spacing:.16em;color:var(--gold);line-height:1}
  .brand small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.34em;color:var(--ink3);margin-top:3px}
  .task-tag{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ink2);
    border:.5px solid var(--panel-b);padding:6px 12px;border-radius:999px;background:var(--panel)}

  /* ── stage rail (the 3-step process made visible) ── */
  .rail{display:flex;gap:8px;justify-content:center;padding:4px 18px 16px;max-width:1080px;margin:0 auto;width:100%;flex-wrap:wrap}
  .badge{
    --c:var(--ink3); --cbg:var(--panel); --cb:var(--panel-b);
    display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;
    border:1px solid var(--cb);background:var(--cbg);border-radius:14px;
    padding:11px 18px;transition:transform .16s,border-color .16s,background .16s;
    flex:1 1 0;min-width:150px;max-width:300px;
  }
  .badge:hover{transform:translateY(-2px)}
  .badge .step{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--c);
    width:24px;height:24px;border:1.5px solid var(--cb);border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .badge .lbl{display:flex;flex-direction:column;line-height:1.15}
  .badge .lbl b{font-family:var(--display);font-size:18px;letter-spacing:.08em;color:var(--c);font-weight:400}
  .badge .lbl span{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase}
  .badge[data-stage="similarities"]{--c:var(--sim);--cbg:var(--sim-bg);--cb:var(--sim-b)}
  .badge[data-stage="differences"]{--c:var(--dif);--cbg:var(--dif-bg);--cb:var(--dif-b)}
  .badge[data-stage="opinionSpeculation"]{--c:var(--opi);--cbg:var(--opi-bg);--cb:var(--opi-b)}
  .badge.active{transform:translateY(-2px);box-shadow:0 6px 26px -10px var(--c)}
  .badge.active .step{background:var(--c);color:#0d0f17;border-color:var(--c)}
  .badge:not(.active){filter:saturate(.55) opacity(.78)}

  /* ── stage / poster body ── */
  .stage-wrap{flex:1;display:flex;flex-direction:column;max-width:1080px;margin:0 auto;width:100%;padding:0 18px 8px}
  .theme{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);
    text-align:center;margin-bottom:10px;min-height:13px}

  /* two images side by side */
  .photos{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}
  .photo{
    position:relative;aspect-ratio:4/3;border-radius:16px;overflow:hidden;
    border:.5px solid var(--panel-b);
    background:
      linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,0)),
      repeating-linear-gradient(45deg,rgba(255,255,255,.02) 0 14px,transparent 14px 28px),
      var(--bg2);
    display:flex;align-items:center;justify-content:center;
  }
  .photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
  .photo.has-img img{display:block}
  .photo.has-img .ph{display:none}
  .ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--ink3)}
  .ph svg{width:34px;height:34px;opacity:.5}
  .ph span{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase}
  .photo .tag{position:absolute;left:10px;bottom:10px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;
    color:var(--ink);background:rgba(13,15,23,.62);backdrop-filter:blur(6px);
    border:.5px solid var(--panel-b);padding:3px 9px;border-radius:8px}

  /* phrase scaffold (revealed by active badge) */
  .scaffold{
    border:1px solid var(--ac-b,var(--panel-b));background:var(--ac-bg,var(--panel));
    border-radius:16px;padding:16px 16px 6px;margin-top:6px;
    animation:rise .26s cubic-bezier(.32,.72,0,1);
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .scaffold-hd{display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .scaffold-hd .dot{width:9px;height:9px;border-radius:50%;background:var(--ac,var(--gold))}
  .scaffold-hd h3{font-family:var(--display);font-size:21px;letter-spacing:.09em;color:var(--ac,var(--gold));font-weight:400}
  .scaffold-hd .count{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--ink3)}

  .lines{display:flex;flex-direction:column;gap:9px;padding-bottom:12px}
  .line{
    display:flex;gap:11px;align-items:flex-start;
    background:rgba(255,255,255,.025);border:.5px solid var(--panel-b);
    border-left:2.5px solid var(--ac,var(--gold));
    border-radius:10px;padding:11px 13px;font-size:14.5px;line-height:1.5;
  }
  .line .n{font-family:var(--mono);font-size:10px;color:var(--ink3);padding-top:3px;flex-shrink:0;min-width:16px}
  .line .txt{color:var(--ink)}
  .line .txt .exp{color:var(--ink2);font-style:italic}
  .line .kind{margin-left:auto;font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ac);border:.5px solid var(--ac-b);border-radius:6px;padding:2px 6px;flex-shrink:0;align-self:flex-start}
  .line.empty{justify-content:center;color:var(--ink3);font-family:var(--mono);font-size:11px;
    border-left-color:var(--panel-b);font-style:italic;letter-spacing:.04em}

  /* ── stage 3: speculation monologue ── */
  .spec-q{
    display:flex;gap:10px;align-items:flex-start;
    background:var(--opi-bg);border:.5px solid var(--opi-b);border-left:2.5px solid var(--opi);
    border-radius:10px;padding:11px 14px;margin-bottom:14px;
  }
  .spec-q .qmark{font-family:var(--display);font-size:22px;line-height:.8;color:var(--opi);flex-shrink:0}
  .spec-q .qtxt{font-size:15px;font-weight:600;color:var(--ink);line-height:1.45}
  .spec-q .qtxt small{display:block;font-family:var(--mono);font-size:8.5px;font-weight:400;letter-spacing:.14em;
    text-transform:uppercase;color:var(--opi);margin-bottom:3px}

  .mono{display:flex;flex-direction:column;gap:12px;padding-bottom:8px}
  .mono-run{
    background:rgba(255,255,255,.025);border:.5px solid var(--panel-b);border-left:2.5px solid var(--opi);
    border-radius:10px;padding:13px 15px;font-size:16px;line-height:1.65;color:var(--ink);
  }
  .mono-run.run-b{border-left-color:var(--opi);opacity:.96}
  /* slot roles — connective grammar taught by colour */
  .r-opener,.r-pivot{color:var(--gold);font-weight:600}
  .r-frame{color:var(--opi-strong,#a489c9);font-weight:600}
  .r-reason{color:var(--sim);font-weight:700}
  .r-concession{color:var(--dif);font-weight:700}
  .r-prop{color:var(--ink)}
  .r-end{color:var(--ink)}

  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;padding:10px 2px 4px}
  .legend .lg{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--ink2)}
  .legend .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}

  /* swap-bank: tappable alternatives for each slot */
  .bank{margin-top:10px;border-top:.5px solid var(--panel-b);padding-top:12px}
  .bank-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px}
  .bank-row .role-tag{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 7px;border-radius:6px;flex-shrink:0;min-width:78px;text-align:center}
  .bank-chip{font-size:12px;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.04);
    border:.5px solid var(--panel-b);color:var(--ink2);cursor:default}

  /* ── footer nav ── */
  .nav{display:flex;align-items:center;gap:16px;justify-content:center;padding:14px 18px 22px;max-width:1080px;margin:0 auto;width:100%}
  .arrow{
    width:48px;height:48px;border-radius:50%;border:1px solid var(--panel-b);background:var(--panel);
    color:var(--ink);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:transform .15s,border-color .15s,background .15s;
  }
  .arrow:hover:not(:disabled){transform:scale(1.06);border-color:var(--gold);color:var(--gold)}
  .arrow:disabled{opacity:.3;cursor:default}
  .progress{display:flex;align-items:center;gap:6px}
  .pip{width:8px;height:8px;border-radius:50%;background:var(--panel-b);transition:all .2s;cursor:pointer}
  .pip.on{background:var(--gold);transform:scale(1.35)}
  .counter{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--ink2);min-width:54px;text-align:center}

  @media(max-width:560px){
    .rail .badge .lbl span{display:none}
    .line{font-size:13.5px}
    .scaffold{padding:14px 12px 4px}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

  <header class="top">
    <div class="brand">INTUITY<small>SPEAKING · PART 2</small></div>
    <div class="task-tag">Compare &amp; Contrast</div>
  </header>

  <nav class="rail" id="rail">
    <div class="badge active" data-stage="similarities">
      <div class="step">1</div>
      <div class="lbl"><b>Similarities</b><span>What's alike</span></div>
    </div>
    <div class="badge" data-stage="differences">
      <div class="step">2</div>
      <div class="lbl"><b>Differences</b><span>What sets them apart</span></div>
    </div>
    <div class="badge" data-stage="opinionSpeculation">
      <div class="step">3</div>
      <div class="lbl"><b>Opinion &amp; Speculation</b><span>Your response</span></div>
    </div>
  </nav>

  <main class="stage-wrap">
    <div class="theme" id="theme"></div>
    <div class="photos">
      <div class="photo" id="photoA">
        <img alt=""><div class="ph">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.6"/><path d="M21 16l-5-5L5 19"/></svg>
          <span>Picture A</span>
        </div>
        <div class="tag">A</div>
      </div>
      <div class="photo" id="photoB">
        <img alt=""><div class="ph">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.6"/><path d="M21 16l-5-5L5 19"/></svg>
          <span>Picture B</span>
        </div>
        <div class="tag">B</div>
      </div>
    </div>
    <section class="scaffold" id="scaffold"></section>
  </main>

  <footer class="nav">
    <button class="arrow" id="prev" aria-label="Previous slide">‹</button>
    <div class="progress" id="pips"></div>
    <span class="counter" id="counter">1 / 10</span>
    <button class="arrow" id="next" aria-label="Next slide">›</button>
  </footer>

<script>
/* ── embedded fallback so the file opens standalone; JSON fetch overrides if served ── */
const FALLBACK = {
  slides: [{
    id:1, theme:"People enjoying themselves",
    images:[{src:"",alt:"",caption:"Picture A"},{src:"",alt:"",caption:"Picture B"}],
    similarities:[
      {stem:"In many ways the two pictures are identical —",expand:"they show people who appear to share the same goal."},
      {stem:"To some extent these pictures are very much alike;",expand:"they show people involved in a similar kind of activity."},
      {stem:"It seems they have something in common:",expand:"in both, people are clearly engaged with one another."},
      {stem:"Both pictures show people enjoying themselves.",expand:""},
      {stem:"In both photos, the people seem relaxed.",expand:""},
      {stem:"One similarity is that they are spending time together.",expand:""},
      {stem:"Both situations appear to involve teamwork.",expand:""},
      {stem:"In each picture, people are communicating actively.",expand:""},
      {stem:"The two scenes seem fairly similar overall.",expand:""}
    ],
    differences:[
      {stem:"However, the atmosphere in the second picture seems calmer.",expand:""},
      {stem:"Whereas the first photo looks busy, the second feels peaceful.",expand:""},
      {stem:"One major difference is the environment.",expand:""},
      {stem:"Unlike the people in the first image, the second group appears more focused.",expand:""},
      {stem:"The first situation seems more formal.",expand:""},
      {stem:"In contrast, the second picture looks more modern.",expand:""}
    ],
    opinionSpeculation:{
      question:"Why might these people have chosen to work in these places?",
      monologue:[
        [
          {t:"Starting with the first picture, ",role:"opener"},
          {t:"it is likely that ",role:"frame"},
          {t:"these people have chosen to work together in an office",role:"prop"},
          {t:" since ",role:"reason"},
          {t:"they probably need to share ideas and make decisions as a team",role:"prop"},
          {t:", although ",role:"concession"},
          {t:"this kind of setting can sometimes feel a little formal",role:"prop"},
          {t:".",role:"end"}
        ],
        [
          {t:"On the other hand, ",role:"pivot"},
          {t:"there is every chance that ",role:"frame"},
          {t:"the person in the café has decided to work alone",role:"prop"},
          {t:" since ",role:"reason"},
          {t:"a relaxed atmosphere may help them concentrate",role:"prop"},
          {t:", although ",role:"concession"},
          {t:"the noise around them could also be distracting",role:"prop"},
          {t:".",role:"end"}
        ]
      ],
      bank:{
        opener:["Starting with the first picture,","Looking at the first photo,","If I begin with picture one,"],
        frame:["it is likely that","there is every chance that","in all likelihood,","they might well"],
        reason:["since","because","as","given that"],
        concession:["although","even though","despite the fact that","while"],
        pivot:["On the other hand,","Turning to the second picture,","By contrast,","As for the other photo,"]
      }
    }
  }]
};
/* pad to 10 empty slides for the fallback so nav always spans 10 */
while(FALLBACK.slides.length<10){
  const id=FALLBACK.slides.length+1;
  FALLBACK.slides.push({id,theme:"",images:[{src:"",caption:"Picture A"},{src:"",caption:"Picture B"}],similarities:[],differences:[],opinionSpeculation:{question:"",monologue:[],bank:{}}});
}

const STAGE_META = {
  similarities:       {var:'--sim', label:'Similarities'},
  differences:        {var:'--dif', label:'Differences'},
  opinionSpeculation: {var:'--opi', label:'Opinion & Speculation'}
};
const LINK_WORDS = /\b(however|whereas|unlike|in contrast|both|in each|one similarity|one major difference|to some extent|in many ways|in all likelihood|there is every chance|it is likely|perhaps|maybe|might|may|in my view|personally|i feel|it seems to me|i suppose|i'd)\b/gi;

let DATA = FALLBACK, idx = 0, stage = 'similarities';

const $ = s => document.querySelector(s);
const els = {
  theme:$('#theme'), scaffold:$('#scaffold'), counter:$('#counter'), pips:$('#pips'),
  prev:$('#prev'), next:$('#next'), photoA:$('#photoA'), photoB:$('#photoB'), rail:$('#rail')
};

function colourLink(t){ return t.replace(LINK_WORDS, m=>`<span style="color:var(--link);font-weight:600">${m}</span>`); }

function setPhoto(el, img){
  const im = el.querySelector('img'), tag = el.querySelector('.tag');
  if(img && img.src){ im.src=img.src; im.alt=img.alt||''; el.classList.add('has-img'); }
  else el.classList.remove('has-img');
  if(tag && img && img.caption) tag.textContent = img.caption.replace(/^Picture\s*/i,'') || tag.textContent;
}

function renderPips(){
  els.pips.innerHTML='';
  DATA.slides.forEach((_,i)=>{
    const p=document.createElement('div'); p.className='pip'+(i===idx?' on':'');
    p.onclick=()=>{idx=i;render();}; els.pips.appendChild(p);
  });
}

const ROLE_LABEL = {opener:'Opener',frame:'Frame',reason:'Reason',concession:'Concession',pivot:'Pivot'};
const ROLE_COLOR = {opener:'var(--gold)',frame:'#a489c9',reason:'var(--sim)',concession:'var(--dif)',pivot:'var(--gold)'};

function renderMonologue(os){
  if(!os || !os.monologue || !os.monologue.length){
    return `<div class="line empty">No model answer yet for this slide — add it in the data file.</div>`;
  }
  const q = os.question
    ? `<div class="spec-q"><span class="qmark">?</span><div class="qtxt"><small>Speculation question</small>${os.question}</div></div>`
    : '';
  const runs = os.monologue.map((run,ri)=>{
    const inner = run.map(seg=>{
      const role = seg.role||'prop';
      return `<span class="r-${role}">${seg.t}</span>`;
    }).join('');
    return `<div class="mono-run ${ri===1?'run-b':''}">${inner}</div>`;
  }).join('');
  const legend = `<div class="legend">
    <div class="lg"><span class="sw" style="background:var(--gold)"></span>opener / pivot</div>
    <div class="lg"><span class="sw" style="background:#a489c9"></span>speculation frame</div>
    <div class="lg"><span class="sw" style="background:var(--sim)"></span>since · reason</div>
    <div class="lg"><span class="sw" style="background:var(--dif)"></span>although · concession</div>
  </div>`;
  let bank = '';
  if(os.bank && Object.keys(os.bank).length){
    const rows = Object.entries(os.bank).map(([role,opts])=>{
      const col = ROLE_COLOR[role]||'var(--ink2)';
      const chips = opts.map(o=>`<span class="bank-chip">${o}</span>`).join('');
      return `<div class="bank-row"><span class="role-tag" style="color:${col};border:.5px solid ${col};">${ROLE_LABEL[role]||role}</span>${chips}</div>`;
    }).join('');
    bank = `<div class="bank">${rows}</div>`;
  }
  return q + `<div class="mono">${runs}</div>` + legend + bank;
}

function renderScaffold(){
  const slide = DATA.slides[idx];
  const meta = STAGE_META[stage];
  els.scaffold.style.setProperty('--ac', `var(${meta.var})`);
  els.scaffold.style.setProperty('--ac-b', `var(${meta.var}-b)`);
  els.scaffold.style.setProperty('--ac-bg', `var(${meta.var}-bg)`);

  // stage 3 — speculation monologue (different shape)
  if(stage==='opinionSpeculation'){
    const os = slide.opinionSpeculation || {};
    const parts = (os.monologue||[]).reduce((n,r)=>n+r.filter(s=>['reason','concession','frame','opener','pivot'].includes(s.role)).length,0);
    els.scaffold.innerHTML = `
      <div class="scaffold-hd">
        <span class="dot"></span><h3>${meta.label}</h3>
        <span class="count">${os.monologue&&os.monologue.length?'worked model':'—'}</span>
      </div>
      ${renderMonologue(os)}`;
    return;
  }

  // stages 1 & 2 — phrase lists
  const list = slide[stage] || [];
  let rows;
  if(!list.length){
    rows = `<div class="line empty">No phrases yet for this slide — add them in the data file.</div>`;
  } else {
    rows = list.map((item,i)=>{
      const stem = colourLink(item.stem||'');
      const exp  = item.expand ? ` <span class="exp">${colourLink(item.expand)}</span>` : '';
      const kind = item.type ? `<span class="kind">${item.type}</span>` : '';
      return `<div class="line"><span class="n">${String(i+1).padStart(2,'0')}</span><span class="txt">${stem}${exp}</span>${kind}</div>`;
    }).join('');
  }
  els.scaffold.innerHTML = `
    <div class="scaffold-hd">
      <span class="dot"></span><h3>${meta.label}</h3>
      <span class="count">${list.length} phrase${list.length!==1?'s':''}</span>
    </div>
    <div class="lines">${rows}</div>`;
}

function render(){
  const slide = DATA.slides[idx];
  els.theme.textContent = slide.theme || '';
  setPhoto(els.photoA, slide.images?.[0]);
  setPhoto(els.photoB, slide.images?.[1]);
  els.counter.textContent = `${idx+1} / ${DATA.slides.length}`;
  els.prev.disabled = idx===0;
  els.next.disabled = idx===DATA.slides.length-1;
  document.querySelectorAll('.pip').forEach((p,i)=>p.classList.toggle('on',i===idx));
  renderScaffold();
}

/* badge clicks → reveal that stage */
els.rail.querySelectorAll('.badge').forEach(b=>{
  b.onclick=()=>{
    stage=b.dataset.stage;
    els.rail.querySelectorAll('.badge').forEach(x=>x.classList.toggle('active',x===b));
    renderScaffold();
  };
});
els.prev.onclick=()=>{ if(idx>0){idx--;render();} };
els.next.onclick=()=>{ if(idx<DATA.slides.length-1){idx++;render();} };
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') els.prev.click();
  if(e.key==='ArrowRight') els.next.click();
  if(e.key==='1') els.rail.children[0].click();
  if(e.key==='2') els.rail.children[1].click();
  if(e.key==='3') els.rail.children[2].click();
});

/* try to load external JSON (works when served); fall back to embedded */
fetch('part2-compare-data.json')
  .then(r=>r.ok?r.json():Promise.reject())
  .then(j=>{ if(j&&Array.isArray(j.slides)&&j.slides.length){ DATA=j; } })
  .catch(()=>{})
  .finally(()=>{ renderPips(); render(); });
</script>
</body>
</html>
