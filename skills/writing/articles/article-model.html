<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Article Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f0efec;--ink:#111111;--white:#ffffff;--acc:#b8620a;--acc-lt:#fdf3e8;--c-teal:#3d9e95;--c-coral:#e8723a;--c-rose:#c94f6d;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.topic-label{font-size:0.65rem;font-weight:700;color:rgba(0,0,0,0.32);letter-spacing:0.04em;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}
.view-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.15rem;padding:0.42rem 1rem;background:rgba(240,239,236,0.88);border-bottom:1px solid rgba(0,0,0,0.06)}
.vbtn{background:transparent;border:none;padding:0.3rem 0.9rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.6rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s}
.vbtn.active{background:var(--ink);color:#fff}
.content-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.1rem 1.1rem 1rem}
.content-area::-webkit-scrollbar{width:4px}
.content-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
/* SKELETON */
.skel-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}
.sec-block{background:var(--white);border-radius:1.2rem;overflow:hidden;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 10px 28px rgba(0,0,0,0.09);animation:blkIn 0.38s cubic-bezier(0.22,1,0.36,1) both}
.sec-block:nth-child(2){animation-delay:0.07s}.sec-block:nth-child(3){animation-delay:0.13s}
@keyframes blkIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sec-hd{display:flex;align-items:center;gap:0.65rem;padding:0.8rem 1.1rem 0.7rem;border-bottom:1px solid rgba(0,0,0,0.05)}
.sec-num{flex-shrink:0;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;color:#fff;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%)}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase}
.sec-sub{font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:600;font-style:italic;color:rgba(0,0,0,0.3);margin-left:auto;white-space:nowrap}
.skel-row{display:flex;align-items:stretch;padding:0.7rem 1.1rem 0.65rem;border-bottom:1px dashed rgba(0,0,0,0.06);gap:0.6rem}
.skel-line{width:3px;border-radius:2px;flex-shrink:0;opacity:0.4}
.skel-text{font-family:'Instrument Sans',sans-serif;font-size:0.86rem;font-weight:400;line-height:1.55;color:rgba(0,0,0,0.75);flex:1;transition:opacity 0.2s}
.shuf-row{display:flex;justify-content:flex-end;padding:0.3rem 1.1rem 0.38rem;border-bottom:1px solid rgba(0,0,0,0.05)}
.shuf-btn{background:none;border:none;font-family:'Barlow Condensed',sans-serif;font-size:0.56rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.22);cursor:pointer;display:flex;align-items:center;gap:0.22rem;transition:color 0.2s}
.shuf-btn:hover{color:rgba(0,0,0,0.48)}
.shuf-icon{display:inline-block;transition:transform 0.4s}
.shuf-btn.spin .shuf-icon{transform:rotate(360deg)}
.phrases-list{padding:0.65rem 1.1rem 0.8rem;display:flex;flex-direction:column;gap:0.28rem}
.phrase-row{display:flex;align-items:flex-start;gap:0.45rem;padding:0.25rem 0;border-bottom:1px dashed rgba(0,0,0,0.05)}
.phrase-row:last-child{border-bottom:none}
.phrase-arr{flex-shrink:0;font-size:0.58rem;margin-top:0.28rem;opacity:0.32}
.phrase-txt{font-family:'Instrument Sans',sans-serif;font-size:0.79rem;font-weight:400;line-height:1.45;color:rgba(0,0,0,0.6)}
/* Section colours */
.s-intro .sec-num{background:var(--c-teal)}.s-intro .sec-title{color:var(--c-teal)}.s-intro .skel-line{background:var(--c-teal)}.s-intro .phrase-arr{color:var(--c-teal)}
.s-args  .sec-num{background:var(--c-coral)}.s-args  .sec-title{color:var(--c-coral)}.s-args  .skel-line{background:var(--c-coral)}.s-args  .phrase-arr{color:var(--c-coral)}
.s-conc  .sec-num{background:var(--c-rose)}.s-conc  .sec-title{color:var(--c-rose)}.s-conc  .skel-line{background:var(--c-rose)}.s-conc  .phrase-arr{color:var(--c-rose)}
/* PRACTICE */
.prac-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}
.prac-q{background:var(--white);border-radius:1.1rem;padding:0.95rem 1.25rem;border-left:4px solid var(--acc);box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 20px rgba(0,0,0,0.08)}
.prac-qlabel{font-family:'Barlow Condensed',sans-serif;font-size:0.54rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:var(--acc);margin-bottom:0.3rem}
.prac-qtxt{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:700;font-style:italic;line-height:1.5;color:var(--ink)}
.prac-ctrl{background:var(--white);border-radius:1.1rem;padding:0.68rem 1.1rem;display:flex;align-items:center;justify-content:space-between;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 20px rgba(0,0,0,0.08)}
.pmt{display:flex;background:rgba(0,0,0,0.06);border-radius:2rem;padding:0.18rem;gap:0.1rem}
.pmt-btn{background:transparent;border:none;padding:0.25rem 0.72rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.pmt-btn.active{background:var(--ink);color:#fff}
.play-btn{display:flex;align-items:center;gap:0.35rem;padding:0.42rem 0.95rem;background:var(--acc);color:#fff;border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;flex-shrink:0}
.transcript{background:var(--white);border-radius:1.1rem;padding:0.95rem 1.25rem;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 20px rgba(0,0,0,0.08)}
.tr-label{font-family:'Barlow Condensed',sans-serif;font-size:0.54rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(0,0,0,0.18);margin-bottom:0.65rem}
.tr-line{font-family:'Instrument Sans',sans-serif;font-size:0.88rem;font-weight:400;line-height:1.65;color:rgba(0,0,0,0.7);padding:0.28rem 0;border-bottom:1px dashed rgba(0,0,0,0.05);transition:all 0.3s}
.tr-line:last-child{border-bottom:none}
.tr-line.active{color:var(--ink);font-weight:500;background:rgba(184,98,10,0.05);padding-left:0.4rem;margin-left:-0.4rem;border-radius:0.25rem}
.tr-line.done{color:rgba(0,0,0,0.28)}
/* OVERLAY */
.ov{position:fixed;inset:0;z-index:800;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 1.25rem 1rem;background:#16181d;opacity:0;pointer-events:none;transition:opacity 0.3s}
.ov.active{opacity:1;pointer-events:all}
.ov-top{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;flex-shrink:0}
.ov-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.32em;text-transform:uppercase;color:rgba(255,255,255,0.14)}
.ov-close{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.65rem;color:rgba(255,255,255,0.3)}
.ov-close:hover{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75)}
.ic{position:relative;width:min(480px,96vw);min-height:min(380px,72vw);background:#fff;border-radius:4px;display:flex;flex-direction:column;box-shadow:10px 16px 0 rgba(0,0,0,0.45),0 40px 90px rgba(0,0,0,0.65);transform:translateY(28px) scale(0.93);opacity:0;transition:transform 0.48s cubic-bezier(0.34,1.46,0.64,1),opacity 0.35s;flex-shrink:0}
.ov.active .ic{transform:translateY(0) scale(1);opacity:1}
.ic.se{animation:seIn 0.42s cubic-bezier(0.34,1.3,0.64,1) both}
@keyframes seIn{from{opacity:0;transform:translateX(44px) scale(0.96)}to{opacity:1;transform:none}}
.ic-stripe{position:absolute;left:0;top:0;bottom:0;width:7px;border-radius:4px 0 0 4px;transition:background 0.4s}
.ic-badge{position:absolute;top:-1rem;left:1.5rem;width:3rem;height:3rem;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:900;color:#fff;box-shadow:4px 5px 0 rgba(0,0,0,0.3);z-index:10;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,0 100%);transition:background 0.4s}
.ic-body{padding:1.7rem 1.7rem 0.5rem 2.1rem;flex:1;display:flex;flex-direction:column}
.ic-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:900;letter-spacing:0.04em;text-transform:uppercase;color:#0d0d0d;line-height:0.95;margin-top:1.3rem}
.ic-rule{width:3rem;height:4px;border-radius:2px;margin:0.6rem 0 0.75rem;transition:background 0.4s}
.ic-lines{flex:1;display:flex;flex-direction:column;gap:0.5rem}
.ic-line{font-family:'Instrument Sans',sans-serif;font-size:clamp(0.84rem,2.1vw,0.98rem);font-weight:400;line-height:1.65;color:rgba(0,0,0,0.52);opacity:0;transform:translateY(10px);transition:opacity 0.38s,transform 0.38s}
.ic-line.show{opacity:1;transform:none}
.ic-line.first{color:rgba(0,0,0,0.78);font-weight:500}
.ic-foot{display:flex;align-items:flex-end;justify-content:space-between;padding:0.5rem 1.7rem 0.85rem 2.1rem;flex-shrink:0}
.ic-icon{font-size:1.45rem;opacity:0.38;line-height:1}
.wave{display:flex;align-items:flex-end;gap:4px}
.wb{width:4px;border-radius:3px;animation:wvA 1.1s ease-in-out infinite;transition:background 0.4s}
.wb:nth-child(1){height:8px;animation-delay:0s}.wb:nth-child(2){height:18px;animation-delay:0.08s}
.wb:nth-child(3){height:28px;animation-delay:0.18s}.wb:nth-child(4){height:20px;animation-delay:0.12s}
.wb:nth-child(5){height:10px;animation-delay:0.04s}.wb:nth-child(6){height:22px;animation-delay:0.22s}
@keyframes wvA{0%,100%{transform:scaleY(0.25);opacity:0.2}50%{transform:scaleY(1);opacity:1}}
.wave.paused .wb{animation:none;transform:scaleY(0.25);opacity:0.15}
.ic-bline{height:6px;width:100%;flex-shrink:0;border-radius:0 0 4px 4px;transition:background 0.4s}
.ov-bottom{width:min(480px,96vw);margin-top:0.85rem;display:flex;flex-direction:column;gap:0.45rem;flex-shrink:0}
.prog-track{width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width 0.4s,background 0.4s}
.ov-ctrl{display:flex;align-items:center;justify-content:space-between}
.ov-ctr{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.2)}
.ov-btn{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);padding:0.3rem 0.85rem;border-radius:3px;color:rgba(255,255,255,0.38);cursor:pointer;transition:all 0.2s}
.ov-btn:hover{background:rgba(255,255,255,0.13);color:rgba(255,255,255,0.8)}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="article-question.html">← Questions</a>
    <span class="brand">INTUITY</span>
    <span class="topic-label" id="topicLabel">Article</span>
  </div>
  <div class="view-bar">
    <button class="vbtn active" data-v="skeleton" onclick="setView('skeleton')">Skeleton</button>
    <button class="vbtn"        data-v="practice" onclick="setView('practice')">Practice</button>
  </div>
  <div class="content-area" id="contentArea"></div>
  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Question</button>
      <button class="nb on" onclick="navTo('model')">Model</button>
      <button class="nb"    onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>
<div class="ov" id="listenOverlay">
  <div class="ov-top">
    <span class="ov-brand">INTUITY — Article</span>
    <button class="ov-close" onclick="stopPrac()">✕</button>
  </div>
  <div class="ic" id="ic">
    <div class="ic-stripe" id="icStripe"></div>
    <div class="ic-badge"  id="icBadge">01</div>
    <div class="ic-body">
      <div class="ic-title" id="icTitle">Introduction</div>
      <div class="ic-rule"  id="icRule"></div>
      <div class="ic-lines" id="icLines"></div>
    </div>
    <div class="ic-foot">
      <div class="ic-icon" id="icIcon">📝</div>
      <div class="wave" id="icWave">
        <div class="wb"></div><div class="wb"></div><div class="wb"></div>
        <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      </div>
    </div>
    <div class="ic-bline" id="icBline"></div>
  </div>
  <div class="ov-bottom">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="ov-ctrl">
      <span class="ov-ctr" id="ovCtr">Section 1 / 3</span>
      <button class="ov-btn" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
    </div>
  </div>
</div>
<script>
const SECTIONS=[
  {key:'intro',cls:'s-intro',accent:'#3d9e95',icon:'📢',label:'Introduction',sub:'Hook the reader',num:'01',
   skeleton:["Who has never thought of / pictured / imagined … ?","Why do so many people attach such importance to … ?","What is it about … that draws people to … ?"],
   phrases:["Who has never thought of / pictured / imagined … ?","Why do so many people attach such importance to … ?","What is it about … that draws people to … ?","Faced with the task of describing …, it is perfectly natural for people to …","There seems to be something irresistible about …","Few can resist the appeal of …","It's hard to deny that … plays a huge part in our lives."]},
  {key:'args',cls:'s-args',accent:'#e8723a',icon:'💬',label:'Arguments',sub:'Describe · Compare · Opinion · Mini-story',num:'02',
   skeleton:["For me personally, the best thing about … is …","One of the key things I love about … is …","I'll never forget the time when …"],
   phrases:["My ideal … features / would feature …","One of the key things I love about … is …","What makes it so special is …","As far as I'm concerned, … is of great importance.","Apart from …, another thing that really stands out is …","For me personally, the best thing about … is …","I'll never forget the time when …","If I had to choose one example, it would be …"]},
  {key:'conc',cls:'s-conc',accent:'#c94f6d',icon:'✨',label:'Conclusion',sub:'Leave a lasting impression',num:'03',
   skeleton:["In short, there's something truly unforgettable about …","Whether you love it or not, there's no denying that … leaves a lasting impression."],
   phrases:["It's hard to imagine life without …","If you haven't tried / seen / experienced …, make sure you do — you won't regret it!","In short, there's something truly unforgettable about …","Whether you love it or not, there's no denying that … leaves a lasting impression."]}
];
const SAMPLES={
  changes:[
    {sec:'Introduction',text:"Who has never experienced a change that turned their world upside down? Change is one of those things we all talk about but few of us truly welcome."},
    {sec:'Arguments',text:"For me personally, the most significant change was moving to a new city at sixteen. I'll never forget the time I walked into my new school, not knowing a single face. What makes it so special in retrospect is how much it forced me to grow."},
    {sec:'Conclusion',text:"In short, there's something truly unforgettable about the changes that challenge us most. Whether you love change or not, there's no denying that it leaves a lasting impression on who we become."}
  ],
  famous:[
    {sec:'Introduction',text:"If you could be famous for anything in the world, what would you choose? It's a question that tells you more about a person than almost any other."},
    {sec:'Arguments',text:"As far as I'm concerned, being famous for scientific discovery would be the greatest achievement. One of the key things I love about science is how a single idea can change millions of lives. If I had to choose one example, it would be someone like Marie Curie — celebrated not for fame itself, but for what she gave the world."},
    {sec:'Conclusion',text:"In short, there's something truly unforgettable about people who are famous for making a difference. Whether you agree or not, there's no denying that lasting fame means leaving something meaningful behind."}
  ],
  technology:[
    {sec:'Introduction',text:"Which piece of technology would our lives be better without? It's a provocative question — and the answer might surprise you."},
    {sec:'Arguments',text:"For me personally, the best thing about imagining a world without social media is the mental space it would create. Apart from the obvious distractions, another thing that really stands out is how these platforms reshape the way we see ourselves. What makes it so concerning is how young people are most affected."},
    {sec:'Conclusion',text:"It's hard to imagine life without our smartphones, but perhaps that's exactly the problem. Whether you agree or not, there's no denying that some technologies leave a more complicated impression than their creators ever intended."}
  ],
  place:[
    {sec:'Introduction',text:"Is there a place so beautiful, so full of life and history, that everyone deserves to see it at least once? For me, the answer has always been the same."},
    {sec:'Arguments',text:"I'll never forget the time I first arrived in Sintra on a grey autumn morning. What makes it so special is the way the palaces emerge from the hillside mist like something from a fairy tale. For me personally, the best thing about the town is how it manages to feel both grand and intimate at the same time."},
    {sec:'Conclusion',text:"If you haven't visited Sintra yet, make sure you do — you won't regret it. In short, there's something truly unforgettable about a place that makes history feel completely alive."}
  ],
  health:[
    {sec:'Introduction',text:"Why do so many students find it so difficult to stay healthy? Between classes, deadlines, and social life, it can feel almost impossible — but a few small changes make all the difference."},
    {sec:'Arguments',text:"What makes the biggest difference, in my experience, is routine. One of the key things I've learned is that eating proper meals instead of snacking saves both time and energy. Apart from diet, another thing that really stands out is the power of walking — even twenty minutes a day changes your mood completely."},
    {sec:'Conclusion',text:"In short, staying healthy as a student isn't about dramatic lifestyle changes. Whether you start with sleep, food, or exercise, there's no denying that small steps leave a lasting impression on how you feel every single day."}
  ]
};
let question=null,view='skeleton',pMode='text',pActive=false,pPaused=false;
let synth=window.speechSynthesis,narrator=null,lineIdx=0;
async function init(){
  try{const sq=sessionStorage.getItem('currentArticleQuestion');if(sq)question=JSON.parse(sq);}catch(e){}
  document.getElementById('topicLabel').textContent=question?.title||'Article';
  render();
  const pick=v=>{const en=v.filter(x=>x.lang.startsWith('en'));const p=en.length?en:v;narrator=p.find(x=>x.name==='Google UK English Male')||p.find(x=>x.name==='Daniel')||p.find(x=>x.lang==='en-GB')||p[0]||null;};
  const v=synth.getVoices();if(v.length)pick(v);else synth.onvoiceschanged=()=>pick(synth.getVoices());
}
function setView(v2){stopPrac();view=v2;document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('active',b.dataset.v===v2));render();}
function render(){document.getElementById('contentArea').innerHTML=view==='skeleton'?renderSkel():renderPrac();}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]||'…';}
function renderSkel(){
  return'<div class="skel-wrap">'+SECTIONS.map((s,si)=>`
    <div class="sec-block ${s.cls}" id="sb${si}">
      <div class="sec-hd"><div class="sec-num">${s.num}</div><div class="sec-title">${s.label}</div><div class="sec-sub">${s.sub}</div></div>
      <div class="skel-row"><div class="skel-line"></div><div class="skel-text" id="sp${si}">${pick(s.skeleton)}</div></div>
      <div class="shuf-row"><button class="shuf-btn" id="sh${si}" onclick="shuf(${si})"><span class="shuf-icon">⟳</span> Shuffle</button></div>
      <div class="phrases-list">${s.phrases.map(p=>`<div class="phrase-row"><span class="phrase-arr">→</span><span class="phrase-txt">${p}</span></div>`).join('')}</div>
    </div>`).join('')+'</div>';
}
function shuf(si){
  const btn=document.getElementById('sh'+si);if(btn){btn.classList.add('spin');setTimeout(()=>btn.classList.remove('spin'),420);}
  const el=document.getElementById('sp'+si);if(!el)return;
  el.style.opacity='0';setTimeout(()=>{el.textContent=pick(SECTIONS[si].skeleton);el.style.opacity='1';},180);
}
function renderPrac(){
  const id=question?.id||'changes';const sample=SAMPLES[id]||SAMPLES.changes;
  const isT=pMode==='text';
  const lines=sample.map((s,i)=>`<div class="tr-line" id="tl${i}">${s.text}</div>`).join('');
  return`<div class="prac-wrap">
    <div class="prac-q"><div class="prac-qlabel">${question?.type||'Article'}</div><div class="prac-qtxt">${question?.title||'Article'}</div></div>
    <div class="prac-ctrl">
      <div class="pmt">
        <button class="pmt-btn ${pMode==='text'?'active':''}" onclick="setPM('text')">Read along</button>
        <button class="pmt-btn ${pMode==='listen'?'active':''}" onclick="setPM('listen')">Just listen</button>
      </div>
      <button class="play-btn" id="playBtn" onclick="startPrac()">▶ ${isT?'Read along':'Play'}</button>
    </div>
    <div class="transcript"><div class="tr-label">Model article — key sentences</div>${lines}</div>
  </div>`;
}
function setPM(m){if(m===pMode)return;stopPrac();pMode=m;render();}
const PAL=[{accent:'#3d9e95',icon:'📢'},{accent:'#e8723a',icon:'💬'},{accent:'#c94f6d',icon:'✨'}];
async function startPrac(){
  if(pActive){stopPrac();return;}
  const id=question?.id||'changes';const sample=SAMPLES[id]||SAMPLES.changes;
  pActive=true;pPaused=false;lineIdx=0;
  const btn=document.getElementById('playBtn');if(btn)btn.textContent='■ Stop';
  if(pMode==='listen')showOv(true);
  for(let i=0;i<sample.length;i++){
    if(!pActive)break;const s=sample[i];const pal=PAL[i];
    if(pMode==='listen'){
      showSecCard(s.sec,i,sample.length,pal);
      document.getElementById('progFill').style.width=Math.round(((i+1)/sample.length)*100)+'%';
      document.getElementById('progFill').style.background=pal.accent;
      document.getElementById('ovCtr').textContent=`Section ${i+1} / ${sample.length}`;
    }else{
      document.querySelectorAll('.tr-line').forEach((el,j)=>{el.classList.toggle('active',j===lineIdx);if(j<lineIdx)el.classList.add('done');});
      document.getElementById('tl'+lineIdx)?.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
    while(pPaused&&pActive)await w(150);
    if(!pActive)break;
    if(pMode==='listen')appendL(s.text,pal);
    await speak(s.text);
    if(pActive)await w(480);
    lineIdx++;
  }
  stopPrac();
  const btn2=document.getElementById('playBtn');if(btn2)btn2.textContent=pMode==='text'?'▶ Read along':'▶ Play';
}
function showSecCard(lbl,si,tot,pal){
  document.getElementById('icStripe').style.background=pal.accent;
  document.getElementById('icBadge').textContent=String(si+1).padStart(2,'0');
  document.getElementById('icBadge').style.background=pal.accent;
  document.getElementById('icTitle').textContent=lbl.toUpperCase();
  document.getElementById('icRule').style.background=pal.accent;
  document.getElementById('icBline').style.background=pal.accent;
  document.getElementById('icIcon').textContent=pal.icon;
  document.querySelectorAll('.wb').forEach(b=>b.style.background=pal.accent);
  document.getElementById('icLines').innerHTML='';
  const ic=document.getElementById('ic');ic.classList.remove('se');void ic.offsetWidth;ic.classList.add('se');
  document.getElementById('icWave').classList.remove('paused');
  document.getElementById('pauseBtn').textContent='⏸ Pause';
}
function appendL(text,pal){
  const stack=document.getElementById('icLines');
  const el=document.createElement('div');el.className='ic-line first';el.textContent=text;stack.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
}
function showOv(show){document.getElementById('listenOverlay').classList.toggle('active',show);if(!show)document.getElementById('icWave').classList.add('paused');}
function togglePause(){
  if(!pActive)return;pPaused=!pPaused;
  if(pPaused){synth.cancel();document.getElementById('pauseBtn').textContent='▶ Resume';document.getElementById('icWave').classList.add('paused');}
  else{document.getElementById('pauseBtn').textContent='⏸ Pause';document.getElementById('icWave').classList.remove('paused');}
}
function stopPrac(){
  pActive=false;pPaused=false;synth.cancel();showOv(false);
  const b=document.getElementById('playBtn');if(b)b.textContent=pMode==='text'?'▶ Read along':'▶ Play';
  document.querySelectorAll('.tr-line').forEach(el=>el.classList.remove('active','done'));
}
function speak(text){
  return new Promise(res=>{
    if(!pActive){res();return;}synth.cancel();
    setTimeout(()=>{if(!pActive){res();return;}const u=new SpeechSynthesisUtterance(text);u.voice=narrator;u.rate=0.88;u.pitch=1.05;u.volume=1;u.onend=()=>res();u.onerror=()=>res();synth.speak(u);},80);
  });
}
function w(ms){return new Promise(r=>setTimeout(r,ms));}
function navTo(d){if(d==='model')return;stopPrac();const m={question:'article-question.html',sample:'article-sample.html'};if(m[d])window.location.href=m[d];}
document.addEventListener('keydown',e=>{if(e.key==='Escape')stopPrac();});
init();
</script>
</body>
</html>
