<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Article Question — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f0efec;--ink:#111111;--white:#ffffff;--acc:#b8620a;--acc-lt:#fdf3e8;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.counter{font-family:'Instrument Sans',sans-serif;font-size:0.68rem;font-weight:500;color:rgba(0,0,0,0.3)}
.filter-bar{flex-shrink:0;display:flex;align-items:center;gap:0.22rem;padding:0.4rem 1.1rem;background:rgba(240,239,236,0.85);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.filter-bar::-webkit-scrollbar{display:none}
.ftab{background:transparent;border:none;padding:0.26rem 0.7rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase}
.ftab.active{background:var(--acc);color:#fff}
.stage{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.poster{position:absolute;width:min(400px,88vw);height:min(520px,82vh);background:var(--white);border-radius:1.6rem;display:flex;flex-direction:column;overflow:visible;box-shadow:5px 8px 0 rgba(0,0,0,0.06),0 24px 60px rgba(0,0,0,0.18);cursor:pointer;user-select:none;will-change:transform,opacity}
.mag-banner{flex-shrink:0;background:var(--acc);border-radius:1.6rem 1.6rem 0 0;padding:0.55rem 1.5rem 0.5rem;display:flex;align-items:center;justify-content:space-between}
.mag-label{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(255,255,255,0.7)}
.mag-tag{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.12);padding:0.15rem 0.5rem;border-radius:2rem}
.wanted-box{flex-shrink:0;margin:1rem 1.4rem 0;border:1.5px solid rgba(0,0,0,0.08);border-radius:0.85rem;overflow:hidden}
.wanted-head{background:rgba(0,0,0,0.025);padding:0.38rem 0.9rem;border-bottom:1px solid rgba(0,0,0,0.07);font-family:'Playfair Display',serif;font-size:0.68rem;font-weight:700;font-style:italic;color:rgba(0,0,0,0.35)}
.wanted-body{padding:0.9rem 1rem 0.95rem;display:flex;flex-direction:column;align-items:center;gap:0.5rem}
.type-chip{display:inline-flex;padding:0.18rem 0.6rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;background:var(--acc-lt);color:var(--acc)}
.article-title{font-family:'Playfair Display',serif;font-size:clamp(1.55rem,5.5vw,2rem);font-weight:900;line-height:1.05;color:var(--ink);text-align:center;letter-spacing:-0.01em}
.article-question{font-family:'Instrument Sans',sans-serif;font-size:0.84rem;font-weight:400;line-height:1.6;color:rgba(0,0,0,0.62);text-align:center}
.print-line{font-family:'Barlow',sans-serif;font-size:0.7rem;font-style:italic;color:rgba(0,0,0,0.32);text-align:center}
.card-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0.5rem 0.4rem 0}
.card-foot{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.3rem 0.85rem}
.card-nav-btn{background:none;border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.22);transition:all 0.2s}
.card-nav-btn:hover{background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.5)}
.card-nav-btn:disabled{opacity:0.12;cursor:default}
.card-dots{display:flex;gap:0.45rem;align-items:center}
.cdot{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,0.12);transition:all 0.32s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer}
.cdot.active{transform:scale(1.6);background:var(--acc)}
.cdot.done{background:rgba(0,0,0,0.28)}
.go-btn{display:flex;align-items:center;gap:0.4rem;padding:0.44rem 1.1rem;background:var(--acc);color:#fff;border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.go-btn:hover{opacity:0.88}
.accent-bar{height:5px;border-radius:0 0 1.6rem 1.6rem;background:var(--acc);flex-shrink:0}
.poster.active-card{z-index:60;transform:rotate(0deg) translate(0,0) scale(1) !important;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.poster.enter{animation:cardEnter 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes cardEnter{0%{opacity:0;transform:scale(0.72) translateY(-100px) rotate(-5deg)}65%{opacity:1;transform:scale(1.03) translateY(7px) rotate(0.5deg)}100%{opacity:1;transform:rotate(0deg) translate(0,0) scale(1)}}
.poster.exit-left{animation:exitLeft 0.42s cubic-bezier(0.6,0,0.8,1) both}
@keyframes exitLeft{0%{transform:rotate(0deg) translate(0,0) scale(1);opacity:1}100%{transform:rotate(-9deg) translate(-130%,22px) scale(0.88);opacity:0}}
.swipe-hint{position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);font-size:0.55rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.16);pointer-events:none;animation:hintFade 3.5s ease 1.2s forwards;white-space:nowrap}
@keyframes hintFade{0%{opacity:1}80%{opacity:1}100%{opacity:0}}
.empty-msg{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.22)}
@media(max-width:420px){.poster{width:min(340px,94vw);height:min(460px,80vh)}.article-title{font-size:1.45rem}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="../../../index.html?openModal=writing">← Writing</a>
    <span class="brand">INTUITY</span>
    <span class="counter" id="counterEl">1 / 5</span>
  </div>
  <div class="filter-bar">
    <button class="ftab active" data-cat="all"         onclick="setFilter('all')">All</button>
    <button class="ftab"        data-cat="personal"    onclick="setFilter('personal')">Personal</button>
    <button class="ftab"        data-cat="opinion"     onclick="setFilter('opinion')">Opinion</button>
    <button class="ftab"        data-cat="descriptive" onclick="setFilter('descriptive')">Descriptive</button>
    <button class="ftab"        data-cat="advice"      onclick="setFilter('advice')">Advice</button>
  </div>
  <div class="stage" id="stage">
    <div class="swipe-hint">tap card to continue</div>
  </div>
  <div class="foot">
    <div class="nav-pill">
      <button class="nb on" onclick="navTo('question')">Question</button>
      <button class="nb"    onclick="navTo('model')">Model</button>
      <button class="nb"    onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>
<script>
const QUESTIONS=[
  {id:'changes',title:'Changes!',question:'Some people love changes, others dislike them. What about you? Which changes in your life have had a big effect on you?',print:'The best articles will be printed next month.',category:'personal',type:'Personal / Reflective'},
  {id:'famous',title:'Being famous for something',question:'If you could be famous for something, what would you like to be famous for? Why?',print:'The best articles will be printed next month.',category:'opinion',type:'Hypothetical / Opinion'},
  {id:'technology',title:'Technology',question:'Which piece of technology would our lives be better without? Why?',print:'The best articles will be printed next month.',category:'opinion',type:'Opinion / Argument'},
  {id:'place',title:'A place worth visiting',question:'Is there a place in your country that you think everyone should visit? Describe it and explain why others should go.',print:'The best articles will be printed next month.',category:'descriptive',type:'Descriptive / Persuasive'},
  {id:'health',title:'Staying healthy as a student',question:'What advice would you give students who want to stay healthy while studying? Share your ideas.',print:'The best articles will be printed next month.',category:'advice',type:'Advice / Practical'},
];
let filtered=QUESTIONS.slice(),current=0,cards=[],touchStartX=0;
const AudioCtx=window.AudioContext||window.webkitAudioContext;let actx=null;
function ac(){if(!actx)actx=new AudioCtx();return actx;}
function tone(f,type,dur,vol,delay=0){try{const ctx=ac(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.value=f;const t=ctx.currentTime+delay;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.05);}catch(e){}}
function sndFlip(){tone(380,'sine',0.16,0.1);tone(520,'sine',0.12,0.07,0.09);}
function sndChoose(){tone(440,'sine',0.18,0.1);tone(550,'sine',0.14,0.08,0.1);tone(660,'sine',0.16,0.09,0.22);}
function setFilter(cat){
  document.querySelectorAll('.ftab').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  filtered=cat==='all'?QUESTIONS.slice():QUESTIONS.filter(q=>q.category===cat);
  current=0;render();
}
function buildCard(q,idx){
  const el=document.createElement('div');el.className='poster';
  el.innerHTML=`
    <div class="mag-banner"><span class="mag-label">Articles wanted</span><span class="mag-tag">English-language magazine</span></div>
    <div class="wanted-box">
      <div class="wanted-head">Articles wanted</div>
      <div class="wanted-body">
        <div class="type-chip">${q.type}</div>
        <div class="article-title">${q.title}</div>
        <div class="article-question">${q.question}</div>
        <div class="print-line">${q.print}</div>
      </div>
    </div>
    <div class="card-body"></div>
    <div class="card-foot">
      <button class="card-nav-btn" onclick="event.stopPropagation();if(current>0)jumpTo(current-1)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7L9 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="card-dots" id="dots${idx}"></div>
      <button class="go-btn" onclick="event.stopPropagation();chooseQuestion(${idx})">
        Study this
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 6h6M7 4l2 2-2 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="accent-bar"></div>`;
  el.onclick=()=>{if(current===idx)advance();};
  return el;
}
function buildDots(cardEl,activeIdx,total){
  const dr=cardEl.querySelector('.card-dots');if(!dr)return;dr.innerHTML='';
  for(let i=0;i<total;i++){const d=document.createElement('div');d.className='cdot'+(i===activeIdx?' active':i<activeIdx?' done':'');d.onclick=e=>{e.stopPropagation();jumpTo(i);};dr.appendChild(d);}
}
function render(){
  const stage=document.getElementById('stage');stage.innerHTML='<div class="swipe-hint">tap card to continue</div>';
  cards=[];current=0;
  if(!filtered.length){stage.innerHTML+='<div class="empty-msg">No questions in this category</div>';return;}
  filtered.forEach((q,i)=>{const el=buildCard(q,i);stage.appendChild(el);cards.push({el,q});});
  updateCounter();setTimeout(()=>activateCard(0,true),50);
}
function activateCard(idx,first=false){
  cards.forEach(({el},i)=>{
    if(i<idx){el.style.display='none';}
    else{const rel=i-idx;const ts=['rotate(0deg) translate(0,0) scale(1)','rotate(2deg) translate(6px,14px) scale(0.97)','rotate(-1.5deg) translate(-4px,24px) scale(0.94)','rotate(2.5deg) translate(8px,32px) scale(0.91)'];el.style.transition='transform 0.42s cubic-bezier(0.34,1.56,0.64,1)';el.style.transform=ts[Math.min(rel,3)];el.style.zIndex=60-rel*10;el.style.display='flex';el.style.flexDirection='column';}
    buildDots(el,idx,filtered.length);
    const pb=el.querySelector('.card-nav-btn');if(pb)pb.disabled=(idx===0);
  });
  const{el}=cards[idx];el.classList.add('active-card');
  if(first){el.classList.add('enter');setTimeout(()=>el.classList.remove('enter'),600);}
  updateCounter();
}
function advance(){
  if(current>=cards.length-1)return;sndFlip();
  const prev=cards[current];prev.el.classList.remove('active-card');prev.el.classList.add('exit-left');
  setTimeout(()=>{prev.el.style.display='none';prev.el.classList.remove('exit-left');},440);
  current++;setTimeout(()=>activateCard(current,false),80);
}
function jumpTo(idx){if(idx===current)return;sndFlip();cards.forEach(({el})=>{el.classList.remove('active-card');el.style.display='none';});current=idx;activateCard(idx,true);}
function updateCounter(){document.getElementById('counterEl').textContent=`${current+1} / ${filtered.length}`;}
function chooseQuestion(idx){sndChoose();sessionStorage.setItem('currentArticleQuestion',JSON.stringify(filtered[idx]));window.location.href='article-model.html';}
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{if(Math.abs(e.changedTouches[0].clientX-touchStartX)>55)advance();},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')advance();if(e.key==='ArrowLeft'&&current>0)jumpTo(current-1);if(e.key==='Enter')chooseQuestion(current);});
function navTo(dest){if(dest==='question')return;const m={model:'article-model.html',sample:'article-sample.html'};if(m[dest])window.location.href=m[dest];}
try{const last=JSON.parse(sessionStorage.getItem('currentArticleQuestion')||'{}');if(last.id){const idx=QUESTIONS.findIndex(q=>q.id===last.id);if(idx>-1)current=idx;}}catch(e){}
render();
</script>
</body>
</html>
