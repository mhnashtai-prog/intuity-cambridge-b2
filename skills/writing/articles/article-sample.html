<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Article Sample — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f0efec;--ink:#111111;--white:#ffffff;--acc:#b8620a;--acc-lt:#fdf3e8;--c-teal:#3d9e95;--c-teal-lt:#e4f4f2;--c-coral:#e8723a;--c-coral-lt:#fdf0ea;--c-rose:#c94f6d;--c-rose-lt:#faedf1;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.1rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.top-right{display:flex;align-items:center;gap:0.4rem}
.xray-btn{background:rgba(0,0,0,0.06);border:none;border-radius:2rem;padding:0.24rem 0.6rem;font-family:'Barlow Condensed',sans-serif;font-size:0.56rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.32);cursor:pointer;transition:all 0.2s}
.xray-btn.on{background:var(--ink);color:#fff}
.dots-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.45rem;padding:0.38rem 1.1rem;background:rgba(240,239,236,0.88);border-bottom:1px solid rgba(0,0,0,0.06)}
.sdot{width:26px;height:6px;border-radius:3px;cursor:pointer;transition:all 0.28s cubic-bezier(0.34,1.56,0.64,1);background:rgba(0,0,0,0.12)}
.sdot.active{width:40px}
.sdot.s0.active{background:var(--c-teal)}
.sdot.s1.active{background:var(--c-coral)}
.sdot.s2.active{background:var(--c-rose)}
.view-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.32rem 1.1rem;background:rgba(240,239,236,0.78);border-bottom:1px solid rgba(0,0,0,0.05)}
.vt{display:flex;gap:0.1rem;background:rgba(0,0,0,0.06);border-radius:2rem;padding:0.18rem}
.vtbtn{background:transparent;border:none;padding:0.22rem 0.72rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.vtbtn.active{background:var(--ink);color:#fff}
.rhet-btn{background:transparent;border:none;padding:0.22rem 0.7rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.56rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.26);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.rhet-btn.on{background:rgba(184,98,10,0.12);color:var(--acc)}
.content-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1.1rem 1.2rem}
.content-area::-webkit-scrollbar{width:4px}
.content-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
/* ARTICLE CARD */
.art-card{background:var(--white);border-radius:1.3rem;overflow:hidden;box-shadow:3px 5px 0 rgba(0,0,0,0.05),0 16px 48px rgba(0,0,0,0.11);max-width:480px;margin:0 auto;animation:cIn 0.38s cubic-bezier(0.22,1,0.36,1) both}
@keyframes cIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:none}}
.art-masthead{background:var(--acc);padding:0.65rem 1.4rem;display:flex;align-items:center;justify-content:space-between}
.mast-mag{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(255,255,255,0.65)}
.mast-type{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.12);padding:0.14rem 0.48rem;border-radius:2rem}
.art-title-block{padding:0.9rem 1.4rem 0.7rem;border-bottom:1.5px solid rgba(0,0,0,0.06)}
.art-q-prompt{font-family:'Barlow',sans-serif;font-size:0.7rem;font-weight:400;font-style:italic;color:rgba(0,0,0,0.35);margin-bottom:0.3rem}
.art-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:var(--ink);line-height:1.1}
.art-body{padding:0.8rem 1.4rem 1.2rem;display:flex;flex-direction:column;gap:0}
/* SECTION */
.art-section{padding:0.7rem 0;border-bottom:1px dashed rgba(0,0,0,0.07);animation:secIn 0.35s ease both}
@keyframes secIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
.art-section:last-child{border-bottom:none}
.sec-pill{display:inline-flex;align-items:center;padding:0.14rem 0.52rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:0.45rem}
.sec-txt p{font-family:'Instrument Sans',sans-serif;font-size:0.88rem;font-weight:400;line-height:1.72;color:rgba(0,0,0,0.74);margin-bottom:0.4rem}
.sec-txt p:last-child{margin-bottom:0}
.sc0 .sec-pill{background:var(--c-teal-lt);color:var(--c-teal)}.sc0 .sec-txt{border-left:3px solid var(--c-teal);padding-left:0.75rem}
.sc1 .sec-pill{background:var(--c-coral-lt);color:var(--c-coral)}.sc1 .sec-txt{border-left:3px solid var(--c-coral);padding-left:0.75rem}
.sc2 .sec-pill{background:var(--c-rose-lt);color:var(--c-rose)}.sc2 .sec-txt{border-left:3px solid var(--c-rose);padding-left:0.75rem}
/* X-RAY: rhetorical devices */
.xray-on .rq{background:rgba(184,98,10,0.14);border-radius:3px;padding:0 2px;font-weight:600;color:rgba(0,0,0,0.85);cursor:help;position:relative}
.xray-on .rq::after{content:attr(data-label);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:0.46rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;padding:0.16rem 0.38rem;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:200}
.xray-on .rq:hover::after{opacity:1}
/* highlight rhetorical phrases */
.xray-on .hp{background:rgba(61,158,149,0.1);border-radius:3px;padding:0 2px;font-weight:500}
/* FULL TEXT */
.full-card{background:var(--white);border-radius:1.3rem;padding:1.2rem 1.5rem 1.5rem;max-width:480px;margin:0 auto;box-shadow:3px 5px 0 rgba(0,0,0,0.05),0 16px 48px rgba(0,0,0,0.11);animation:cIn 0.35s ease both;font-family:'Instrument Sans',sans-serif;font-size:0.88rem;line-height:1.72;color:rgba(0,0,0,0.74)}
.full-card p{margin-bottom:0.75rem}
.full-card p:last-child{margin-bottom:0}
.full-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;color:var(--ink);margin-bottom:0.9rem;padding-bottom:0.75rem;border-bottom:1.5px dashed rgba(0,0,0,0.08)}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="article-question.html">← Questions</a>
    <span class="brand">INTUITY</span>
    <div class="top-right">
      <button class="xray-btn" id="xrayBtn" onclick="toggleXray()">X-Ray</button>
    </div>
  </div>
  <div class="dots-bar" id="dotsBar">
    <div class="sdot s0 active" onclick="scrollTo(0)"></div>
    <div class="sdot s1"        onclick="scrollTo(1)"></div>
    <div class="sdot s2"        onclick="scrollTo(2)"></div>
  </div>
  <div class="view-bar">
    <div class="vt">
      <button class="vtbtn active" data-v="sections" onclick="setView('sections')">Sections</button>
      <button class="vtbtn"        data-v="full"     onclick="setView('full')">Full text</button>
    </div>
    <button class="rhet-btn" id="rhetBtn" onclick="toggleRhet()">Rhetoric</button>
  </div>
  <div class="content-area" id="contentArea"></div>
  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Question</button>
      <button class="nb"    onclick="navTo('model')">Model</button>
      <button class="nb on" onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>
<script>
const SAMPLES={
  changes:{
    title:'Changes!',type:'Personal / Reflective',
    sections:[
      {label:'Introduction',text:`<p>Who has never experienced a change that turned their world upside down? Change is one of those things we all talk about but few of us truly welcome — yet it is often the most unexpected changes that shape us the most.</p>`},
      {label:'Arguments',text:`<p>For me personally, the most significant change was moving to a new city at the age of sixteen. I'll never forget the time I walked into my new school, not knowing a single face. At first, it felt like a punishment. What makes it so special in retrospect is how much it forced me to grow — I had to make friends, navigate new streets, and discover who I was when no one already knew me.</p><p>One of the key things I love about change, looking back, is that it reveals something about your character. As far as I'm concerned, it is in moments of discomfort that we find out what we are really made of.</p>`},
      {label:'Conclusion',text:`<p>In short, there's something truly unforgettable about the changes that challenge us most. Whether you love change or not, there's no denying that it leaves a lasting impression on who we become — and sometimes the biggest disruptions turn out to be the greatest gifts.</p>`},
    ]
  },
  famous:{
    title:'Being famous for something',type:'Hypothetical / Opinion',
    sections:[
      {label:'Introduction',text:`<p>If you could be famous for anything in the world, what would you choose? It's a question that tells you more about a person than almost any other — and the answer, I think, says everything about what we truly value.</p>`},
      {label:'Arguments',text:`<p>As far as I'm concerned, being famous for scientific discovery would be the greatest achievement imaginable. One of the key things I love about science is how a single idea can change millions of lives — often long after the person who had it is gone. If I had to choose one example, it would be someone like Marie Curie, celebrated not for fame itself, but for what she gave the world.</p><p>Apart from the legacy it creates, another thing that really stands out about this kind of fame is how it inspires others. What makes it so special is the ripple effect — every great scientist who becomes famous probably encourages dozens of young people to follow the same path.</p>`},
      {label:'Conclusion',text:`<p>In short, there's something truly unforgettable about people who are famous for making a genuine difference. Whether you agree with my choice or not, there's no denying that lasting fame — the kind worth having — means leaving something meaningful behind long after the applause has faded.</p>`},
    ]
  },
  technology:{
    title:'Technology',type:'Opinion / Argument',
    sections:[
      {label:'Introduction',text:`<p>Which piece of technology would our lives be better without? It's a provocative question in a world where we carry our phones like a second heartbeat — and the answer might surprise you.</p>`},
      {label:'Arguments',text:`<p>For me personally, the best thing about imagining a world without social media is the mental space it would create. What makes it so concerning is how these platforms were designed to keep us scrolling — not to make us happier. Apart from the obvious distractions, another thing that really stands out is how they reshape the way we see ourselves, always comparing our private reality to someone else's curated highlight reel.</p><p>I'll never forget the time I went two weeks without Instagram while travelling. By day three, I was reading books again. By day seven, I was having conversations I'd remember. One of the key things I realised is that the technology we think we need is often the thing standing between us and the life we actually want.</p>`},
      {label:'Conclusion',text:`<p>It's hard to imagine life without our smartphones, but perhaps that's exactly the problem. Whether you agree or not, there's no denying that some technologies leave a more complicated impression than their creators ever intended — and maybe it's time we decided who is really in control.</p>`},
    ]
  },
  place:{
    title:'A place worth visiting',type:'Descriptive / Persuasive',
    sections:[
      {label:'Introduction',text:`<p>Is there a place so beautiful, so full of life and history, that everyone deserves to see it at least once? For me, the answer has always been the same: Sintra, a small town tucked into the hills just outside Lisbon.</p>`},
      {label:'Arguments',text:`<p>I'll never forget the time I first arrived there on a grey autumn morning. What makes it so special is the way the palaces emerge from the hillside mist like something from a fairy tale — the vivid yellows and pinks of the Pena Palace against a sky full of low cloud is an image I will carry with me always.</p><p>For me personally, the best thing about Sintra is how it manages to feel both grand and intimate at the same time. You can wander through royal gardens, stumble upon hidden chapels, and stop at a small café for a warm pastry, all within an hour. Apart from its beauty, another thing that really stands out is how accessible it is — just forty minutes by train from Lisbon.</p>`},
      {label:'Conclusion',text:`<p>If you haven't visited Sintra yet, make sure you do — you won't regret it. In short, there's something truly unforgettable about a place that makes history feel completely alive, as if the kings and queens who once lived there have only just stepped outside.</p>`},
    ]
  },
  health:{
    title:'Staying healthy as a student',type:'Advice / Practical',
    sections:[
      {label:'Introduction',text:`<p>Why do so many students find it so difficult to stay healthy? Between classes, deadlines, and a social life that seems to demand its own full-time schedule, it can feel almost impossible — but a few small changes really do make all the difference.</p>`},
      {label:'Arguments',text:`<p>What makes the biggest difference, in my experience, is routine. One of the key things I've learned is that eating proper meals instead of relying on snacks saves both time and energy — and your brain, it turns out, works considerably better when it's been fed. If you often skip breakfast, try preparing something simple the night before. It sounds obvious, but for most students it's genuinely transformative.</p><p>Apart from diet, another thing that really stands out is the power of walking. You don't need a gym membership — walking to class, taking the stairs, or spending twenty minutes outside at lunchtime changes your mood in ways that a double espresso simply cannot match.</p>`},
      {label:'Conclusion',text:`<p>In short, staying healthy as a student isn't about dramatic lifestyle changes or expensive wellness routines. Whether you start with sleep, food, or movement, there's no denying that small, consistent steps leave a lasting impression on how you feel — and ultimately, on how you perform.</p>`},
    ]
  }
};

/* Rhetorical device patterns */
const RHET_PATTERNS=[
  {re:/Who has never[^?]+\?|Why do so many[^?]+\?|Which piece[^?]+\?|Is there a place[^?]+\?|If you could[^?]+\?|What makes[^?]+\?/g, label:'rhet. question'},
  {re:/\byou\b|\bwe\b|\byour\b|\bour\b/g, label:'direct address'},
  {re:/I'll never forget|For me personally|As far as I'm concerned|In my experience/g, label:'personal voice'},
  {re:/In short,|Whether you[^,]+,|It's hard to (deny|imagine)/g, label:'conclusion move'},
  {re:/What makes it so special|One of the key things|Apart from[^,]+,/g, label:'argument phrase'},
];
/* Phrase highlight patterns (from INTUITY phrase bank) */
const PHRASE_PAT=[
  /Who has never thought of|pictured|imagined/g,
  /Why do so many people/g,
  /What is it about/g,
  /There seems to be something irresistible/g,
  /Few can resist the appeal/g,
  /It's hard to deny that/g,
  /My ideal|would feature/g,
  /One of the key things I love/g,
  /What makes it so special/g,
  /As far as I'm concerned/g,
  /Apart from|another thing that really stands out/g,
  /For me personally/g,
  /I'll never forget the time/g,
  /If I had to choose one example/g,
  /It's hard to imagine life without/g,
  /make sure you do — you won't regret it/g,
  /In short, there's something truly unforgettable/g,
  /Whether you love it or not/g,
  /Whether you agree/g,
  /leaves a lasting impression/g,
];

let question=null,view='sections',xrayOn=false,rhetOn=false;
let sectionEls=[];

function init(){
  try{const sq=sessionStorage.getItem('currentArticleQuestion');if(sq)question=JSON.parse(sq);}catch(e){}
  render();
}

function setView(v){view=v;document.querySelectorAll('.vtbtn').forEach(b=>b.classList.toggle('active',b.dataset.v===v));document.getElementById('dotsBar').style.display=v==='sections'?'flex':'none';render();}
function toggleXray(){xrayOn=!xrayOn;document.getElementById('xrayBtn').classList.toggle('on',xrayOn);render();}
function toggleRhet(){rhetOn=!rhetOn;document.getElementById('rhetBtn').classList.toggle('on',rhetOn);render();}

function processText(html){
  let t=html;
  if(rhetOn){
    RHET_PATTERNS.forEach(({re,label})=>{t=t.replace(re,m=>`<span class="rq" data-label="${label}">${m}</span>`);});
  }
  if(xrayOn){
    PHRASE_PAT.forEach(re=>{t=t.replace(re,m=>`<span class="hp">${m}</span>`);});
  }
  return t;
}

function render(){
  const id=question?.id||'changes';
  const sample=SAMPLES[id]||SAMPLES.changes;
  const area=document.getElementById('contentArea');
  if(view==='sections'){
    let html=`<div class="art-card ${xrayOn||rhetOn?'xray-on':''}">
      <div class="art-masthead"><span class="mast-mag">English-language magazine</span><span class="mast-type">${sample.type}</span></div>
      <div class="art-title-block"><div class="art-q-prompt">${question?.question?.split('?')[0]}?</div><div class="art-title">${sample.title}</div></div>
      <div class="art-body">`;
    sample.sections.forEach((sec,i)=>{
      html+=`<div class="art-section sc${i}" id="asec${i}">
        <div class="sec-pill">${sec.label}</div>
        <div class="sec-txt">${processText(sec.text)}</div>
      </div>`;
    });
    html+=`</div></div>`;
    area.innerHTML=html;
    sectionEls=Array.from(area.querySelectorAll('.art-section'));
    area.addEventListener('scroll',onScroll,{passive:true});
  }else{
    const paras=sample.sections.flatMap(s=>{
      const d=document.createElement('div');d.innerHTML=s.text;
      return Array.from(d.querySelectorAll('p')).map(p=>p.innerHTML);
    });
    const processed=paras.map(p=>`<p>${processText(p)}</p>`).join('');
    area.innerHTML=`<div class="full-card ${xrayOn||rhetOn?'xray-on':''}"><div class="full-title">${sample.title}</div>${processed}</div>`;
  }
}

function onScroll(){
  const area=document.getElementById('contentArea');
  const mid=area.scrollTop+area.clientHeight*0.38;
  let active=0;sectionEls.forEach((el,i)=>{if(el.offsetTop<=mid)active=i;});
  document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('active',i===active));
}

function scrollTo(i){
  const el=document.getElementById('asec'+i);if(!el)return;
  const area=document.getElementById('contentArea');area.scrollTo({top:el.offsetTop-8,behavior:'smooth'});
  document.querySelectorAll('.sdot').forEach((d,j)=>d.classList.toggle('active',j===i));
}

function navTo(d){if(d==='sample')return;const m={question:'article-question.html',model:'article-model.html'};if(m[d])window.location.href=m[d];}
init();
</script>
</body>
</html>
