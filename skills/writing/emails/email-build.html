
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Email Build — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --c-teal:#3d9e95;--c-coral:#e8723a;--c-purple:#7b5ea7;--c-rose:#c94f6d;--c-gold:#c08b2f;
  --dt-accent:var(--c-teal);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.1rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.top-right{display:flex;align-items:center;gap:0.4rem}
.view-tog-btn{background:rgba(0,0,0,0.06);border:none;border-radius:2rem;padding:0.25rem 0.65rem;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s}
.view-tog-btn.on{background:var(--ink);color:#fff}
.reset-btn{background:transparent;border:none;font-size:0.65rem;color:rgba(0,0,0,0.25);cursor:pointer;padding:0.2rem;transition:color 0.2s}
.reset-btn:hover{color:rgba(0,0,0,0.5)}

/* PROGRESS BAR (dual-slot) */
.progress-bar-wrap{flex-shrink:0;padding:0 1.1rem 0;background:rgba(240,239,236,0.9);border-bottom:1px solid rgba(0,0,0,0.06)}
.progress-slots{display:flex;gap:4px;padding:0.5rem 0}
.progress-slot{flex:1;height:5px;border-radius:3px;background:rgba(0,0,0,0.08);overflow:hidden;position:relative}
.progress-fill{position:absolute;inset:0;border-radius:3px;transition:background 0.35s,transform 0.4s cubic-bezier(0.34,1.56,0.64,1);transform:scaleX(0);transform-origin:left}
.progress-slot.done .progress-fill{transform:scaleX(1)}
.progress-slot.active .progress-fill{animation:slotPulse 1.6s ease-in-out infinite}
@keyframes slotPulse{0%,100%{opacity:0.5;transform:scaleX(0.55)}50%{opacity:1;transform:scaleX(1)}}
/* slot colours */
.pslot-0 .progress-fill{background:var(--c-teal)} .pslot-1 .progress-fill{background:var(--c-coral)}
.pslot-2 .progress-fill{background:var(--c-purple)} .pslot-3 .progress-fill{background:var(--c-rose)}

/* CONTENT */
.content-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1.1rem 1rem}
.content-area::-webkit-scrollbar{width:4px}
.content-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

/* FOOTER */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}

/* ══ QUESTION CARD ══ */
.q-card{background:var(--white);border-radius:1.1rem;padding:1rem 1.3rem;max-width:480px;margin:0 auto 1rem;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 10px 28px rgba(0,0,0,0.09);border-left:4px solid var(--dt-accent)}
.q-label{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:0.35rem;color:var(--dt-accent)}
.q-text{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:700;font-style:italic;line-height:1.55;color:var(--ink)}

/* ══ STAGE CARD ══ */
.stage-card{background:var(--white);border-radius:1.1rem;padding:1rem 1.2rem 1.1rem;max-width:480px;margin:0 auto 0.85rem;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 10px 28px rgba(0,0,0,0.09);transition:box-shadow 0.25s;animation:stageIn 0.38s cubic-bezier(0.22,1,0.36,1) both}
@keyframes stageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.stage-card.active-stage{box-shadow:4px 6px 0 rgba(0,0,0,0.06),0 16px 40px rgba(0,0,0,0.14)}
.stage-card.completed{opacity:0.6}
.stage-card.completed .stage-options{display:none}
.stage-header{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.75rem}
.stage-num{flex-shrink:0;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;color:#fff;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%)}
.stage-title{font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase}
.stage-chosen{flex:1;font-family:'Instrument Sans',sans-serif;font-size:0.8rem;font-weight:400;line-height:1.5;color:rgba(0,0,0,0.6);display:none;padding:0.4rem 0.6rem;border-radius:0.5rem;background:rgba(0,0,0,0.03);cursor:pointer}
.stage-card.completed .stage-chosen{display:block}
.stage-card.completed .stage-header{margin-bottom:0.3rem}
.stage-options{display:flex;flex-direction:column;gap:0.42rem}
.opt-btn{display:flex;align-items:flex-start;gap:0.5rem;padding:0.65rem 0.8rem;border:1.5px solid rgba(0,0,0,0.08);border-radius:0.85rem;background:transparent;cursor:pointer;transition:all 0.22s;text-align:left;width:100%}
.opt-btn:hover{border-color:var(--dt-accent);background:rgba(0,0,0,0.02)}
.opt-btn.selected{border-color:var(--dt-accent);background:rgba(0,0,0,0.02)}
.opt-letter{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.07);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:900;color:rgba(0,0,0,0.35);transition:all 0.2s;margin-top:0.02rem}
.opt-btn.selected .opt-letter{background:var(--dt-accent);color:#fff}
.opt-text{font-family:'Instrument Sans',sans-serif;font-size:0.8rem;font-weight:400;line-height:1.5;color:rgba(0,0,0,0.65)}
.confirm-btn{margin-top:0.65rem;width:100%;padding:0.55rem;background:var(--dt-accent);border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:#fff;cursor:pointer;transition:opacity 0.2s;opacity:0;pointer-events:none}
.confirm-btn.ready{opacity:1;pointer-events:all}
.confirm-btn:hover{opacity:0.88}

/* Colour system per section */
.sc-0{--dt-accent:var(--c-teal)}.sc-0 .stage-num{background:var(--c-teal)}.sc-0 .stage-title{color:var(--c-teal)}
.sc-1{--dt-accent:var(--c-coral)}.sc-1 .stage-num{background:var(--c-coral)}.sc-1 .stage-title{color:var(--c-coral)}
.sc-2{--dt-accent:var(--c-purple)}.sc-2 .stage-num{background:var(--c-purple)}.sc-2 .stage-title{color:var(--c-purple)}
.sc-3{--dt-accent:var(--c-rose)}.sc-3 .stage-num{background:var(--c-rose)}.sc-3 .stage-title{color:var(--c-rose)}

/* ══ TEXT VIEW ══ */
.text-view-card{background:var(--white);border-radius:1.3rem;padding:1.2rem 1.5rem 1.5rem;max-width:480px;margin:0 auto;box-shadow:3px 5px 0 rgba(0,0,0,0.05),0 16px 48px rgba(0,0,0,0.11);animation:stageIn 0.35s ease both}
.text-view-q{font-family:'Playfair Display',serif;font-size:0.85rem;font-style:italic;color:rgba(0,0,0,0.45);line-height:1.5;margin-bottom:1.1rem;padding-bottom:0.85rem;border-bottom:1.5px dashed rgba(0,0,0,0.08)}
.text-view-body{display:flex;flex-direction:column;gap:0.6rem}
.tv-section{display:flex;flex-direction:column;gap:0.2rem}
.tv-section-label{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;opacity:0.38}
.tv-section-text{font-family:'Instrument Sans',sans-serif;font-size:0.88rem;font-weight:400;line-height:1.68;color:rgba(0,0,0,0.75)}
/* link-word highlight */
.lw{color:#4a90d9;font-weight:600}
.tv-empty{color:rgba(0,0,0,0.2);font-style:italic;font-size:0.8rem}
.text-view-actions{display:flex;gap:0.5rem;justify-content:center;margin-top:1rem}
.tva-btn{padding:0.42rem 1.1rem;border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.tva-primary{background:var(--ink);color:#fff}
.tva-primary:hover{opacity:0.85}
.tva-secondary{background:rgba(0,0,0,0.07);color:rgba(0,0,0,0.45)}
.tva-secondary:hover{background:rgba(0,0,0,0.12)}

.done-banner{background:var(--white);border-radius:1.1rem;padding:1.2rem 1.4rem;max-width:480px;margin:0 auto 1rem;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 10px 28px rgba(0,0,0,0.09);text-align:center;animation:stageIn 0.4s ease both}
.done-banner h3{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink);margin-bottom:0.3rem}
.done-banner p{font-size:0.78rem;color:rgba(0,0,0,0.4);margin-bottom:0.85rem}
.done-banner-btns{display:flex;gap:0.5rem;justify-content:center}

.loading-msg{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.25);letter-spacing:0.12em;text-transform:uppercase;text-align:center;padding:3rem}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="email-question.html">← Questions</a>
    <span class="brand">INTUITY</span>
    <div class="top-right">
      <button class="view-tog-btn" id="viewTogBtn" onclick="toggleView()">Text</button>
      <button class="reset-btn"    onclick="resetBuild()" title="Start over">↺</button>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-slots" id="progressSlots">
      <div class="progress-slot pslot-0"><div class="progress-fill"></div></div>
      <div class="progress-slot pslot-1"><div class="progress-fill"></div></div>
      <div class="progress-slot pslot-2"><div class="progress-fill"></div></div>
      <div class="progress-slot pslot-3"><div class="progress-fill"></div></div>
    </div>
  </div>

  <div class="content-area" id="contentArea">
    <div class="loading-msg" id="loadingMsg">Loading…</div>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"     onclick="navTo('question')">Question</button>
      <button class="nb"     onclick="navTo('plan')">Plan</button>
      <button class="nb"     onclick="navTo('model')">Model</button>
      <button class="nb on"  onclick="navTo('build')">Build</button>
      <button class="nb"     onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>

<script>
/* ══ SECTION CONFIG ══ */
const FORMAL_LABELS   = ['Opening','Main Content','Details / Ask','Closing'];
const INFORMAL_LABELS = ['Opening','Main Message','Suggestion / Plan','Sign-off'];
const SECTION_KEYS    = ['opening','main','details','closing'];

const FORMAL_TYPE_MAP = {
  Application:'application', Request:'request', Complaint:'complaint',
  Proposal:'proposal', Recommendation:'recommendation',
};
const INFORMAL_TYPE_MAP = {
  Congratulate:'congratulate', Invite:'invite', Apologise:'apologise',
  Advise:'advise', Arrange:'arrange',
};

/* ══ LINKING WORDS ══ */
const LINK_WORDS=['However','Nevertheless','Furthermore','Moreover','In addition','Therefore','As a result','Although','Despite','In conclusion','On the other hand','Additionally','Consequently','That said','What is more'];
function colourLinker(text){
  let t=text;
  LINK_WORDS.forEach(w=>{t=t.replace(new RegExp(`\\b${w}\\b`,'g'),`<span class="lw">${w}</span>`);});
  return t;
}

/* ══ STATE ══ */
let question=null, optData=null;
let choices=[null,null,null,null];
let currentSection=0, showingText=false;
const SESS_KEY='emailBuildChoices';

/* ══ SOUND ══ */
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ac(){if(!actx)actx=new AudioCtx();return actx;}
function tone(f,type,dur,vol,delay=0){try{const ctx=ac(),osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type=type;osc.frequency.value=f;const t=ctx.currentTime+delay;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);osc.start(t);osc.stop(t+dur+0.05);}catch(e){}}
function sndSelect(){tone(520,'sine',0.14,0.1);tone(660,'sine',0.1,0.06,0.08);}
function sndConfirm(){tone(440,'sine',0.18,0.1);tone(550,'sine',0.14,0.08,0.1);tone(660,'sine',0.16,0.09,0.22);}
function sndDone(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.22,0.09,i*0.08));}

/* ══ INIT ══ */
async function init(){
  try{
    const sq=sessionStorage.getItem('currentEmailQuestion');
    if(sq)question=JSON.parse(sq);

    /* try to restore build progress */
    const savedChoices=sessionStorage.getItem(SESS_KEY);
    if(savedChoices){
      try{
        const sc=JSON.parse(savedChoices);
        if(sc.questionId===question?.id){
          choices=sc.choices;
          currentSection=choices.filter(c=>c!==null).length;
        }
      }catch(e){}
    }

    const r=await fetch('data/email-build-options.json');
    const all=await r.json();

    const formality=question?.formality||'formal';
    const typeMap=formality==='formal'?FORMAL_TYPE_MAP:INFORMAL_TYPE_MAP;
    const pool=all[formality]||{};
    const typeKey=typeMap[question?.type||'']||Object.keys(pool)[0]||'';
    const samples=pool[typeKey]||[];
    optData=samples[0]||null;

    document.getElementById('loadingMsg')?.remove();
    if(!optData){
      document.getElementById('contentArea').innerHTML='<div class="loading-msg">No build data available for this question type.</div>';
      return;
    }
    renderBuild();
  }catch(e){
    document.getElementById('loadingMsg').textContent='⚠ Could not load build data';
    console.error(e);
  }
}

function getLabels(){return(question?.formality||'formal')==='formal'?FORMAL_LABELS:INFORMAL_LABELS;}

/* ══ RENDER BUILD (STAGES VIEW) ══ */
function renderBuild(){
  if(showingText){renderText();return;}
  const area=document.getElementById('contentArea');
  const labels=getLabels();
  let html='';

  /* question card */
  html+=`<div class="q-card" style="--dt-accent:${getSectionColor(currentSection)}">
    <div class="q-label">${question?.type||'Email'} · ${question?.formality||'formal'}</div>
    <div class="q-text">${optData.question||question?.question||'Build your email'}</div>
  </div>`;

  /* stage cards */
  SECTION_KEYS.forEach((key,i)=>{
    const isCompleted=choices[i]!==null;
    const isActive=i===currentSection;
    const isLocked=i>currentSection;
    const sectionOpts=optData.sections[key]||[];
    const chosen=choices[i];
    const cardClass=`stage-card sc-${i}${isCompleted?' completed':''}${isActive?' active-stage':''}`;

    html+=`<div class="${cardClass}" id="scard${i}">
      <div class="stage-header">
        <div class="stage-num">${String(i+1).padStart(2,'0')}</div>
        <div class="stage-title">${labels[i]}</div>
      </div>`;

    if(isCompleted){
      html+=`<div class="stage-chosen" onclick="reopenSection(${i})" title="Tap to change">${colourLinker(chosen)}</div>`;
    } else if(!isLocked){
      html+=`<div class="stage-options" id="sopts${i}">`;
      sectionOpts.forEach((opt,oi)=>{
        html+=`<button class="opt-btn" id="opt${i}_${oi}" onclick="selectOpt(${i},${oi})">
          <div class="opt-letter">${String.fromCharCode(65+oi)}</div>
          <div class="opt-text">${opt}</div>
        </button>`;
      });
      html+=`</div>
      <button class="confirm-btn" id="confirmBtn${i}" onclick="confirmSection(${i})">Confirm →</button>`;
    }

    html+=`</div>`;
  });

  /* done banner */
  if(currentSection>=4){
    html+=`<div class="done-banner">
      <h3>Email complete ✓</h3>
      <p>You've built all four sections. Review your full email below.</p>
      <div class="done-banner-btns">
        <button class="tva-btn tva-primary" onclick="resetBuild()">Start again</button>
        <button class="tva-btn tva-secondary" onclick="toggleView()">View email</button>
      </div>
    </div>`;
  }

  area.innerHTML=html;
  updateProgress();

  /* scroll active card into view */
  if(currentSection<4){
    const activeCard=document.getElementById('scard'+currentSection);
    if(activeCard)setTimeout(()=>activeCard.scrollIntoView({behavior:'smooth',block:'center'}),100);
  }
}

/* ══ OPTION SELECT ══ */
let selectedOpt={};
function selectOpt(sIdx,oIdx){
  sndSelect();
  selectedOpt[sIdx]=oIdx;
  /* update button states */
  const opts=document.querySelectorAll(`[id^="opt${sIdx}_"]`);
  opts.forEach((btn,i)=>btn.classList.toggle('selected',i===oIdx));
  const confirm=document.getElementById('confirmBtn'+sIdx);
  if(confirm)confirm.classList.add('ready');
}

function confirmSection(sIdx){
  const oIdx=selectedOpt[sIdx];if(oIdx===undefined)return;
  sndConfirm();
  const key=SECTION_KEYS[sIdx];
  choices[sIdx]=(optData.sections[key]||[])[oIdx]||'';
  if(sIdx===3)sndDone();
  currentSection=Math.min(sIdx+1,4);
  saveProgress();
  renderBuild();
}

function reopenSection(sIdx){
  choices[sIdx]=null;
  delete selectedOpt[sIdx];
  currentSection=sIdx;
  saveProgress();
  renderBuild();
}

function resetBuild(){
  choices=[null,null,null,null];selectedOpt={};currentSection=0;
  sessionStorage.removeItem(SESS_KEY);
  renderBuild();
}

function saveProgress(){
  sessionStorage.setItem(SESS_KEY,JSON.stringify({questionId:question?.id,choices}));
}

/* ══ PROGRESS BAR ══ */
function updateProgress(){
  document.querySelectorAll('.progress-slot').forEach((slot,i)=>{
    slot.classList.toggle('done',choices[i]!==null);
    slot.classList.toggle('active',i===currentSection&&choices[i]===null&&currentSection<4);
  });
}

/* ══ TEXT VIEW ══ */
function toggleView(){
  showingText=!showingText;
  document.getElementById('viewTogBtn').classList.toggle('on',showingText);
  document.getElementById('viewTogBtn').textContent=showingText?'Stages':'Text';
  renderBuild();
}

function renderText(){
  const labels=getLabels();
  const area=document.getElementById('contentArea');
  let html=`<div class="text-view-card">
    <div class="text-view-q">${optData.question||question?.question||''}</div>
    <div class="text-view-body">`;
  const hasAny=choices.some(c=>c!==null);
  if(!hasAny){
    html+=`<div class="tv-empty">No sentences chosen yet. Go back to Stages to build your email.</div>`;
  }else{
    choices.forEach((c,i)=>{
      if(!c)return;
      html+=`<div class="tv-section">
        <div class="tv-section-label" style="color:${getSectionColor(i)}">${labels[i]}</div>
        <div class="tv-section-text">${colourLinker(c)}</div>
      </div>`;
    });
  }
  html+=`</div>
    <div class="text-view-actions">
      <button class="tva-btn tva-secondary" onclick="toggleView()">← Back to Stages</button>
      <button class="tva-btn tva-primary" onclick="navTo('sample')">See sample →</button>
    </div>
  </div>`;
  area.innerHTML=html;
  updateProgress();
}

function getSectionColor(i){
  return['#3d9e95','#e8723a','#7b5ea7','#c94f6d'][i]||'#3d9e95';
}

/* ══ NAV ══ */
function navTo(dest){
  if(dest==='build')return;
  const map={question:'email-question.html',plan:'email-plan.html',model:'email-model.html',sample:'email-sample.html'};
  if(map[dest])window.location.href=map[dest];
}

init();
</script>
</body>
</html>
