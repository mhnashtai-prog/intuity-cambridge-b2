<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Email Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --c-teal:#3d9e95;--c-teal-lt:#e4f4f2;--c-teal-mid:#8dccc7;
  --c-coral:#e8723a;--c-coral-lt:#fdf0ea;--c-coral-mid:#f5ad87;
  --c-purple:#7b5ea7;--c-purple-lt:#f0ecf8;--c-purple-mid:#b9a3d3;
  --c-rose:#c94f6d;--c-rose-lt:#faedf1;--c-rose-mid:#e89db0;
  --c-gold:#c08b2f;--c-gold-lt:#fdf6e3;--c-gold-mid:#e4c073;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}

/* REGISTER TOGGLE */
.register-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.35rem;padding:0.4rem 1.25rem;background:rgba(240,239,236,0.9);border-bottom:1px solid rgba(0,0,0,0.06)}
.reg-btn{display:flex;align-items:center;gap:0.3rem;padding:0.28rem 0.9rem;border-radius:2rem;border:none;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.22s;background:transparent;color:rgba(0,0,0,0.3)}
.reg-btn:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.reg-btn.active{background:var(--ink);color:#fff}
.reg-divider{width:1px;height:16px;background:rgba(0,0,0,0.1)}

/* TYPE TABS */
.topic-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.topic-tabs::-webkit-scrollbar{display:none}
.ttab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.ttab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ttab.active{background:var(--ink);color:#fff}

/* VIEW BAR */
.view-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.15rem;padding:0.4rem 1rem;background:rgba(240,239,236,0.6);border-bottom:1px solid rgba(0,0,0,0.06)}
.vbtn{background:transparent;border:none;padding:0.3rem 0.9rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.6rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s}
.vbtn:hover{color:rgba(0,0,0,0.55)}
.vbtn.active{background:var(--ink);color:#fff}

/* CONTENT AREA */
.content-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.2rem 1.1rem 1rem}
.content-area::-webkit-scrollbar{width:4px}
.content-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px}

/* FOOTER */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ══ SKELETON ══ */
.skel-wrap{display:flex;flex-direction:column;align-items:center;max-width:440px;margin:0 auto}
.skel-banner{width:100%;background:var(--white);border-radius:1.3rem;overflow:hidden;box-shadow:3px 5px 0 rgba(0,0,0,0.06),0 16px 40px rgba(0,0,0,0.12);animation:bannerIn 0.38s cubic-bezier(0.22,1,0.36,1) both;display:flex;flex-direction:column}
@keyframes bannerIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.skel-row{display:flex;align-items:stretch;border-bottom:1px solid rgba(0,0,0,0.05)}
.skel-row:last-of-type{border-bottom:none}
.skel-strip{width:4px;flex-shrink:0}
.skel-num{flex-shrink:0;width:38px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Sans',sans-serif;font-size:0.85rem;font-weight:400;color:rgba(0,0,0,0.12);padding:0 0.1rem}
.skel-content{flex:1;padding:1.1rem 1.1rem 1.1rem 0.2rem;display:flex;flex-direction:column;gap:0.18rem}
.skel-section-label{font-family:'Instrument Sans',sans-serif;font-size:0.52rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:rgba(0,0,0,0.22);margin-bottom:0.08rem}
.skel-key-phrase{font-family:'Instrument Sans',sans-serif;font-size:0.88rem;font-weight:400;line-height:1.5;color:rgba(0,0,0,0.82)}
.skel-footer{display:flex;justify-content:flex-end;padding:0.55rem 0.85rem 0.65rem;border-top:1px solid rgba(0,0,0,0.05)}
.shuffle-btn{display:flex;align-items:center;gap:0.3rem;padding:0.28rem 0.75rem;background:var(--ink);border:none;border-radius:2rem;font-family:'Instrument Sans',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#fff;cursor:pointer;transition:background 0.18s}
.shuffle-btn:hover{background:rgba(17,17,17,0.78)}
.shuffle-btn:active{transform:scale(0.96)}
.shuffle-icon{font-size:0.8rem;display:inline-block;transition:transform 0.4s}
.shuffle-btn.spinning .shuffle-icon{transform:rotate(360deg)}

/* Section colour strips */
.sr-opening  .skel-strip{background:var(--c-teal)}   .sr-opening  .skel-section-label{color:var(--c-teal)}
.sr-main     .skel-strip{background:var(--c-coral)}  .sr-main     .skel-section-label{color:var(--c-coral)}
.sr-details  .skel-strip{background:var(--c-purple)} .sr-details  .skel-section-label{color:var(--c-purple)}
.sr-closing  .skel-strip{background:var(--c-rose)}   .sr-closing  .skel-section-label{color:var(--c-rose)}

/* ══ PHRASES ══ */
.phrases-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:1.2rem}
.phrase-group{background:var(--white);border-radius:1.1rem;overflow:hidden;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08)}
.phrase-group-head{padding:0.7rem 1.2rem 0.55rem;display:flex;align-items:center;gap:0.6rem;border-bottom:1px solid rgba(0,0,0,0.06)}
.phrase-group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phrase-group-title{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase}
.phrase-group-body{padding:0.8rem 1.2rem 1rem;display:flex;flex-direction:column;gap:0.4rem}
.phrase-row{display:flex;align-items:flex-start;gap:0.5rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;line-height:1.45;color:rgba(0,0,0,0.62);padding:0.3rem 0;border-bottom:1px dashed rgba(0,0,0,0.06)}
.phrase-row:last-child{border-bottom:none}
.phrase-arrow{flex-shrink:0;font-size:0.65rem;margin-top:0.28rem;opacity:0.35}
.pg-teal  .phrase-group-dot{background:var(--c-teal)}  .pg-teal  .phrase-group-title{color:var(--c-teal)}  .pg-teal  .phrase-arrow{color:var(--c-teal)}
.pg-coral .phrase-group-dot{background:var(--c-coral)} .pg-coral .phrase-group-title{color:var(--c-coral)} .pg-coral .phrase-arrow{color:var(--c-coral)}
.pg-purple .phrase-group-dot{background:var(--c-purple)} .pg-purple .phrase-group-title{color:var(--c-purple)} .pg-purple .phrase-arrow{color:var(--c-purple)}
.pg-rose  .phrase-group-dot{background:var(--c-rose)}  .pg-rose  .phrase-group-title{color:var(--c-rose)}  .pg-rose  .phrase-arrow{color:var(--c-rose)}
.pg-gold  .phrase-group-dot{background:var(--c-gold)}  .pg-gold  .phrase-group-title{color:var(--c-gold)}  .pg-gold  .phrase-arrow{color:var(--c-gold)}

/* ══ PRACTICE ══ */
.practice-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}
.practice-q{background:var(--white);border-radius:1.1rem;padding:1.1rem 1.4rem;border-left:4px solid var(--c-gold);box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08)}
.practice-q-label{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:var(--c-gold);margin-bottom:0.4rem}
.practice-q-text{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;font-style:italic;line-height:1.5;color:var(--ink)}
.practice-controls-row{display:flex;align-items:center;justify-content:space-between;gap:0.75rem;background:var(--white);border-radius:1.1rem;padding:0.75rem 1.1rem;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08)}
.practice-mode-toggle{display:flex;align-items:center;background:rgba(0,0,0,0.06);border-radius:2rem;padding:0.2rem;gap:0.1rem}
.pmt-btn{background:transparent;border:none;padding:0.26rem 0.75rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.pmt-btn.active{background:var(--ink);color:#fff}
.play-btn{display:flex;align-items:center;gap:0.4rem;padding:0.44rem 1rem;background:var(--ink);color:#fff;border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.play-btn.text-mode{background:rgba(0,0,0,0.07);color:rgba(0,0,0,0.45)}
.transcript-wrap{background:var(--white);border-radius:1.1rem;padding:1rem 1.4rem;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08)}
.transcript-label{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(0,0,0,0.2);margin-bottom:0.75rem}
.transcript-line{font-family:'Instrument Sans',sans-serif;font-size:0.88rem;font-weight:400;line-height:1.6;color:rgba(0,0,0,0.72);padding:0.35rem 0;border-bottom:1px dashed rgba(0,0,0,0.05);transition:all 0.35s ease;border-radius:0.25rem}
.transcript-line:last-child{border-bottom:none}
.transcript-line.active{color:var(--ink);font-weight:500;background:rgba(192,139,47,0.06);padding-left:0.5rem;margin-left:-0.5rem}
.transcript-line.done{color:rgba(0,0,0,0.32)}

/* ══ INFOGRAPHIC LISTEN OVERLAY ══ */
.listen-overlay{position:fixed;inset:0;z-index:800;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 1.25rem 1rem;background:#16181d;opacity:0;pointer-events:none;transition:opacity 0.3s ease}
.listen-overlay.active{opacity:1;pointer-events:all}
.lo-topbar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;flex-shrink:0}
.lo-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.32em;text-transform:uppercase;color:rgba(255,255,255,0.15)}
.lo-close-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.65rem;color:rgba(255,255,255,0.3);transition:all 0.2s}
.lo-close-btn:hover{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75)}
.infographic-card{position:relative;width:min(480px,96vw);min-height:min(420px,80vw);background:#ffffff;border-radius:4px;overflow:visible;display:flex;flex-direction:column;box-shadow:6px 6px 0 rgba(255,255,255,0.04),10px 16px 0 rgba(0,0,0,0.45),0 40px 90px rgba(0,0,0,0.65);transform:translateY(28px) scale(0.93);transition:transform 0.48s cubic-bezier(0.34,1.46,0.64,1),opacity 0.35s ease;opacity:0;flex-shrink:0}
.listen-overlay.active .infographic-card{transform:translateY(0) scale(1);opacity:1}
.infographic-card.section-enter{animation:sectionSlideIn 0.42s cubic-bezier(0.34,1.3,0.64,1) both}
@keyframes sectionSlideIn{from{opacity:0;transform:translateX(44px) scale(0.96)}to{opacity:1;transform:translateX(0) scale(1)}}
.info-left-stripe{position:absolute;left:0;top:0;bottom:0;width:7px;border-radius:4px 0 0 4px;transition:background 0.4s;z-index:5}
.info-bottom-line{height:6px;width:100%;flex-shrink:0;border-radius:0 0 4px 4px;transition:background 0.4s}
.info-num-badge{position:absolute;top:-1rem;left:1.6rem;width:3.4rem;height:3.4rem;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:#fff;transition:background 0.4s;box-shadow:4px 5px 0 rgba(0,0,0,0.3),0 10px 24px rgba(0,0,0,0.35);z-index:10;clip-path:polygon(0 0,calc(100% - 11px) 0,100% 11px,100% 100%,0 100%)}
.info-card-body{padding:1.8rem 1.8rem 0 2.2rem;display:flex;flex-direction:column;flex:1;overflow:hidden}
.info-section-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.8rem,6vw,2.8rem);font-weight:900;letter-spacing:0.04em;text-transform:uppercase;color:#0d0d0d;line-height:0.95;margin-top:1.5rem;margin-bottom:0}
.info-title-rule{width:3.5rem;height:4px;border-radius:2px;margin:0.7rem 0 0.85rem;flex-shrink:0;transition:background 0.4s}
.info-sentences-stack{flex:1;display:flex;flex-direction:column;gap:0.6rem;overflow:hidden}
.info-sentence-line{font-family:'Instrument Sans',sans-serif;font-size:clamp(0.88rem,2.3vw,1.02rem);font-weight:400;line-height:1.65;color:rgba(0,0,0,0.55);opacity:0;transform:translateY(10px);transition:opacity 0.4s,transform 0.4s}
.info-sentence-line.visible{opacity:1;transform:translateY(0)}
.info-sentence-line.first{color:rgba(0,0,0,0.78);font-weight:500}
.info-card-foot{display:flex;align-items:flex-end;justify-content:space-between;padding:0.6rem 1.8rem 1rem 2.2rem;flex-shrink:0}
.info-icon{font-size:1.6rem;opacity:0.4;line-height:1}
.info-wave{display:flex;align-items:flex-end;gap:4px}
.info-wave-bar{width:4px;border-radius:3px;animation:waveAnim 1.1s ease-in-out infinite;transition:background 0.4s}
.info-wave-bar:nth-child(1){height:8px;animation-delay:0s}
.info-wave-bar:nth-child(2){height:18px;animation-delay:0.08s}
.info-wave-bar:nth-child(3){height:30px;animation-delay:0.18s}
.info-wave-bar:nth-child(4){height:22px;animation-delay:0.12s}
.info-wave-bar:nth-child(5){height:11px;animation-delay:0.04s}
.info-wave-bar:nth-child(6){height:24px;animation-delay:0.22s}
.info-wave-bar:nth-child(7){height:16px;animation-delay:0.09s}
@keyframes waveAnim{0%,100%{transform:scaleY(0.28);opacity:0.22}50%{transform:scaleY(1);opacity:1}}
.info-wave.paused .info-wave-bar{animation:none;transform:scaleY(0.28);opacity:0.15}
.lo-bottom{width:min(480px,96vw);margin-top:0.9rem;display:flex;flex-direction:column;gap:0.5rem;flex-shrink:0}
.info-progress-track{width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.info-progress-fill{height:100%;border-radius:2px;transition:width 0.4s,background 0.4s}
.lo-controls-row{display:flex;align-items:center;justify-content:space-between}
.lo-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.2)}
.lo-btns{display:flex;align-items:center;gap:0.4rem}
.lo-btn{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);padding:0.3rem 0.85rem;border-radius:3px;color:rgba(255,255,255,0.38);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.lo-btn:hover{background:rgba(255,255,255,0.13);color:rgba(255,255,255,0.8)}
.lo-btn.primary{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.65)}
.lo-btn.primary:hover{background:rgba(255,255,255,0.18);color:#fff}

.loading-msg{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.25);letter-spacing:0.12em;text-transform:uppercase;text-align:center;padding:3rem}
@media(max-width:480px){.info-card-body{padding:1.3rem 1.4rem 0.5rem 1.7rem}.info-card-foot{padding:0.5rem 1.4rem 0.8rem 1.7rem}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="email-question.html">← Questions</a>
    <span class="brand">INTUITY</span>
    <div style="width:60px"></div>
  </div>

  <div class="register-bar">
    <button class="reg-btn active" id="regFormal"   onclick="setRegister('formal')">🎩 Formal</button>
    <div class="reg-divider"></div>
    <button class="reg-btn"        id="regInformal" onclick="setRegister('informal')">😊 Informal</button>
  </div>

  <div class="topic-tabs" id="topicTabs"></div>

  <div class="view-bar">
    <button class="vbtn active" data-view="skeleton" onclick="setView('skeleton')">Skeleton</button>
    <button class="vbtn"        data-view="phrases"  onclick="setView('phrases')">Phrases</button>
    <button class="vbtn"        data-view="practice" onclick="setView('practice')">Practice</button>
  </div>

  <div class="content-area" id="contentArea">
    <div class="loading-msg" id="loadingMsg">Loading…</div>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"     onclick="navTo('question')">Question</button>
      <button class="nb"     onclick="navTo('plan')">Plan</button>
      <button class="nb on"  onclick="navTo('model')">Model</button>
      <button class="nb"     onclick="navTo('build')">Build</button>
      <button class="nb"     onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>

<!-- INFOGRAPHIC LISTEN OVERLAY -->
<div class="listen-overlay" id="listenOverlay">
  <div class="lo-topbar">
    <span class="lo-brand">INTUITY — Model Answer</span>
    <button class="lo-close-btn" onclick="stopPractice()">✕</button>
  </div>
  <div class="infographic-card" id="infographicCard">
    <div class="info-left-stripe" id="infoLeftStripe"></div>
    <div class="info-num-badge"   id="infoNumBadge">01</div>
    <div class="info-card-body">
      <div class="info-section-title"  id="infoSectionTitle">Opening</div>
      <div class="info-title-rule"     id="infoTitleRule"></div>
      <div class="info-sentences-stack" id="infoSentencesStack"></div>
    </div>
    <div class="info-card-foot">
      <div class="info-icon" id="infoIcon">✉️</div>
      <div class="info-wave" id="infoWave">
        <div class="info-wave-bar"></div><div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div><div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div><div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div>
      </div>
    </div>
    <div class="info-bottom-line" id="infoBottomLine"></div>
  </div>
  <div class="lo-bottom">
    <div class="info-progress-track">
      <div class="info-progress-fill" id="infoProgressFill" style="width:0%"></div>
    </div>
    <div class="lo-controls-row">
      <span class="lo-counter" id="infoCounter">Section 1 / 4</span>
      <div class="lo-btns">
        <button class="lo-btn primary" id="infoPauseBtn" onclick="togglePausePractice()">⏸ Pause</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ══ TYPE → STRUCTURE KEY MAPS ══ */
const FORMAL_TYPES = {
  'Application':    'job_application',
  'Request':        'requesting_information',
  'Complaint':      'complaint',
  'Proposal':       'explaining_justifying',
  'Recommendation': 'comparison_recommendation',
};
const INFORMAL_TYPES = {
  'Congratulate': 'reacting_to_news',
  'Invite':       'invitation',
  'Apologise':    'apology',
  'Advise':       'giving_advice',
  'Arrange':      'arranging_plans',
};
const SECTION_COLORS = [
  {accent:'#3d9e95',icon:'✉️'},{accent:'#e8723a',icon:'📝'},
  {accent:'#7b5ea7',icon:'💡'},{accent:'#c94f6d',icon:'✅'},
];
const PHRASE_COLORS = ['pg-teal','pg-coral','pg-purple','pg-rose','pg-gold'];
const SKEL_SECTIONS = [
  {label:'Opening',     color:'sr-opening', key:'opening'},
  {label:'Main Content',color:'sr-main',    key:'main'},
  {label:'Details / Ask',color:'sr-details',key:'closing'},  /* use closing phrases for 3rd section as well */
  {label:'Closing',     color:'sr-closing', key:'closing'},
];

/* ══ STATE ══ */
let structFormal=null, structInformal=null;
let samplesFormal=[], samplesInformal=[];
let currentRegister='formal', currentType='Application', currentView='skeleton';
let practiceMode='text', practiceActive=false, practicePaused=false;
let synth=window.speechSynthesis, narrator=null;
let globalLineIdx=0;

/* ══ INIT ══ */
async function init(){
  try{
    /* restore register from session */
    try{
      const sq=JSON.parse(sessionStorage.getItem('currentEmailQuestion')||'{}');
      if(sq.formality)currentRegister=sq.formality;
      if(sq.type){
        const typeMap=currentRegister==='formal'?FORMAL_TYPES:INFORMAL_TYPES;
        if(Object.keys(typeMap).includes(sq.type))currentType=sq.type;
      }
    }catch(e){}

    const [r1,r2,r3,r4]=await Promise.all([
      fetch('data/emails-structure-formal.json'),
      fetch('data/emails-structure-informal.json'),
      fetch('data/samples-formal.json'),
      fetch('data/samples-informal.json'),
    ]);
    structFormal   = (await r1.json()).formal   || {};
    structInformal = (await r2.json()).informal || {};
    samplesFormal  = (await r3.json()).emails   || [];
    samplesInformal= (await r4.json()).emails   || [];

    document.getElementById('loadingMsg')?.remove();
    document.getElementById('regFormal').classList.toggle('active',  currentRegister==='formal');
    document.getElementById('regInformal').classList.toggle('active',currentRegister==='informal');
    buildTabs();
    render();
  }catch(e){
    document.getElementById('loadingMsg').textContent='⚠ Could not load data';
    console.error(e);
  }
}

function setRegister(reg){
  stopPractice();
  currentRegister=reg;
  document.getElementById('regFormal').classList.toggle('active',  reg==='formal');
  document.getElementById('regInformal').classList.toggle('active',reg==='informal');
  const types=Object.keys(reg==='formal'?FORMAL_TYPES:INFORMAL_TYPES);
  currentType=types[0];
  buildTabs();render();
}

function buildTabs(){
  const types=Object.keys(currentRegister==='formal'?FORMAL_TYPES:INFORMAL_TYPES);
  document.getElementById('topicTabs').innerHTML=types.map(t=>
    `<button class="ttab ${t===currentType?'active':''}" onclick="switchType('${t}')">${t}</button>`
  ).join('');
}
function switchType(t){stopPractice();currentType=t;buildTabs();render();}
function setView(v){stopPractice();currentView=v;document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));render();}

/* ══ RENDER ══ */
function render(){
  const area=document.getElementById('contentArea');
  if(currentView==='skeleton')     area.innerHTML=renderSkeleton();
  else if(currentView==='phrases') area.innerHTML=renderPhrases();
  else                              area.innerHTML=renderPractice();
}

/* ══ SKELETON ══ */
function getStruct(){
  const typeMap=currentRegister==='formal'?FORMAL_TYPES:INFORMAL_TYPES;
  const key=typeMap[currentType];
  const pool=currentRegister==='formal'?structFormal:structInformal;
  return pool[key]||null;
}
function pickRandom(arr){return arr[Math.floor(Math.random()*arr.length)]||'…';}
function getAllPhrases(struct,sectionKey){
  const sec=struct?.sections?.[sectionKey];
  if(!sec?.phrases)return[];
  return sec.phrases;
}

function buildSkelRow(sec,struct,idx){
  const phrases=getAllPhrases(struct,sec.key);
  const phrase=phrases.length?pickRandom(phrases):'…';
  return`<div class="skel-row ${sec.color}">
    <div class="skel-strip"></div>
    <div class="skel-num">${String(idx+1).padStart(2,'0')}</div>
    <div class="skel-content">
      <div class="skel-section-label">${sec.label}</div>
      <div style="display:flex;align-items:flex-start">
        <div style="flex-shrink:0;width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.18);margin-top:0.52rem;margin-right:0.55rem"></div>
        <div class="skel-key-phrase">${phrase}</div>
      </div>
    </div>
  </div>`;
}

function renderSkeleton(){
  const struct=getStruct();
  if(!struct)return`<div class="loading-msg">No structure data available</div>`;
  const rows=SKEL_SECTIONS.map((sec,i)=>buildSkelRow(sec,struct,i)).join('');
  return`<div class="skel-wrap"><div class="skel-banner" id="skelBanner">
    ${rows}
    <div class="skel-footer">
      <button class="shuffle-btn" id="shuffleBtn" onclick="shuffleSkeleton()">
        <span class="shuffle-icon">⟳</span> Shuffle
      </button>
    </div>
  </div></div>`;
}

function shuffleSkeleton(){
  const btn=document.getElementById('shuffleBtn');
  if(btn){btn.classList.add('spinning');setTimeout(()=>btn.classList.remove('spinning'),400);}
  const banner=document.getElementById('skelBanner');if(!banner)return;
  const footer=banner.querySelector('.skel-footer');
  const struct=getStruct();
  banner.innerHTML=SKEL_SECTIONS.map((sec,i)=>buildSkelRow(sec,struct,i)).join('');
  banner.appendChild(footer);
}

/* ══ PHRASES ══ */
function renderPhrases(){
  const struct=getStruct();
  if(!struct?.sections)return`<div class="loading-msg">No phrases available</div>`;
  let h='<div class="phrases-wrap">';
  const sections=struct.sections;
  Object.entries(sections).forEach(([key,sec],i)=>{
    const color=PHRASE_COLORS[i%PHRASE_COLORS.length];
    h+=`<div class="phrase-group ${color}">
      <div class="phrase-group-head"><div class="phrase-group-dot"></div>
        <div class="phrase-group-title">${sec.label||key}</div></div>
      <div class="phrase-group-body">
        ${(sec.phrases||[]).map(p=>`<div class="phrase-row"><span class="phrase-arrow">→</span><span>${p}</span></div>`).join('')}
      </div></div>`;
  });
  return h+'</div>';
}

/* ══ PRACTICE ══ */
function getSample(){
  const pool=currentRegister==='formal'?samplesFormal:samplesInformal;
  const typeMap=currentRegister==='formal'?FORMAL_TYPES:INFORMAL_TYPES;
  const structKey=typeMap[currentType];
  /* match by topic or id */
  return pool.find(s=>s.id===structKey||s.topic===currentType)||(pool[0]||null);
}

function extractSections(html){
  const div=document.createElement('div');div.innerHTML=html;
  return Array.from(div.querySelectorAll('.email-section')).map(sec=>({
    label:sec.querySelector('.section-heading')?.textContent||'',
    sentences:Array.from(sec.querySelectorAll('.section-content p')).map(p=>p.textContent.trim()).filter(Boolean),
  }));
}

function renderPractice(){
  const sample=getSample();
  if(!sample)return`<div class="loading-msg">No practice sample available</div>`;
  const html=sample.styles?.default||sample.content||'';
  const sections=extractSections(html);
  let lineIdx=0,transcriptLines='';
  sections.forEach((sec,si)=>{
    sec.sentences.forEach((text,ti)=>{
      transcriptLines+=`<div class="transcript-line" id="tl${lineIdx}">${text}</div>`;
      lineIdx++;
    });
  });
  const isText=practiceMode==='text';
  return`<div class="practice-wrap">
    <div class="practice-q">
      <div class="practice-q-label">${currentType} · ${currentRegister}</div>
      <div class="practice-q-text">${sample.title||'Email Sample'}</div>
    </div>
    <div class="practice-controls-row">
      <div class="practice-mode-toggle">
        <button class="pmt-btn ${practiceMode==='text'?'active':''}"   data-pm="text"   onclick="setPracticeMode('text')">Read along</button>
        <button class="pmt-btn ${practiceMode==='listen'?'active':''}" data-pm="listen" onclick="setPracticeMode('listen')">Just listen</button>
      </div>
      <button class="play-btn ${isText?'text-mode':''}" id="playBtn" onclick="startPractice()">▶ ${isText?'Read along':'Play'}</button>
    </div>
    <div class="transcript-wrap" id="transcriptWrap">
      <div class="transcript-label">Model answer</div>
      ${transcriptLines}
    </div>
  </div>`;
}

function setPracticeMode(m){if(m===practiceMode)return;stopPractice();practiceMode=m;render();}

/* ══ PRACTICE PLAY ══ */
async function getVoice(){
  return new Promise(res=>{
    const load=()=>{
      const v=synth.getVoices();
      const f=v.find(x=>x.name==='Google UK English Male')||v.find(x=>x.name==='Daniel')||v.find(x=>x.lang==='en-GB')||v.find(x=>x.lang.startsWith('en'))||v[0]||null;
      res(f);
    };
    if(synth.getVoices().length)load();else synth.onvoiceschanged=load;
  });
}

async function startPractice(){
  if(practiceActive){stopPractice();return;}
  const sample=getSample();if(!sample)return;
  const html=sample.styles?.default||sample.content||'';
  const sections=extractSections(html);
  if(!sections.length)return;
  practiceActive=true;practicePaused=false;
  narrator=await getVoice();
  const btn=document.getElementById('playBtn');
  if(btn){btn.textContent='■ Stop';btn.classList.remove('text-mode');}
  if(practiceMode==='listen')showListenOverlay(true);
  globalLineIdx=0;
  for(let si=0;si<sections.length;si++){
    if(!practiceActive)break;
    const section=sections[si];
    const palette=SECTION_COLORS[si%SECTION_COLORS.length];
    if(practiceMode==='listen'){
      showSectionCard(section,si,sections.length,palette);
      document.getElementById('infoProgressFill').style.width=Math.round(((si+1)/sections.length)*100)+'%';
      document.getElementById('infoProgressFill').style.background=palette.accent;
      document.getElementById('infoCounter').textContent=`Section ${si+1} / ${sections.length}`;
    }
    for(let ti=0;ti<section.sentences.length;ti++){
      if(!practiceActive)break;
      while(practicePaused&&practiceActive)await wait(150);
      if(!practiceActive)break;
      const text=section.sentences[ti];
      if(practiceMode==='text'){
        document.querySelectorAll('.transcript-line').forEach((el,j)=>{
          el.classList.toggle('active',j===globalLineIdx);
          if(j<globalLineIdx)el.classList.add('done');
        });
        const cur=document.getElementById('tl'+globalLineIdx);
        if(cur)cur.scrollIntoView({behavior:'smooth',block:'nearest'});
      }else{
        appendSentenceToCard(text,ti===0,palette);
      }
      await speakLine(text);
      if(practiceActive&&!practicePaused)await wait(practiceMode==='listen'?400:280);
      globalLineIdx++;
    }
    if(practiceActive&&si<sections.length-1&&!practicePaused)await wait(practiceMode==='listen'?700:300);
  }
  if(practiceActive){
    if(practiceMode==='text')document.querySelectorAll('.transcript-line').forEach(el=>{el.classList.remove('active');el.classList.add('done');});
    stopPractice();
    const btn=document.getElementById('playBtn');
    if(btn){btn.textContent=practiceMode==='text'?'▶ Read along':'▶ Play again';if(practiceMode==='text')btn.classList.add('text-mode');}
  }
}

function showSectionCard(section,sectionIdx,totalSections,palette){
  const numStr=String(sectionIdx+1).padStart(2,'0');
  document.getElementById('infoLeftStripe').style.background=palette.accent;
  document.getElementById('infoNumBadge').textContent=numStr;
  document.getElementById('infoNumBadge').style.background=palette.accent;
  document.getElementById('infoSectionTitle').textContent=(section.label||'').toUpperCase();
  document.getElementById('infoTitleRule').style.background=palette.accent;
  document.getElementById('infoBottomLine').style.background=palette.accent;
  document.getElementById('infoIcon').textContent=palette.icon;
  document.querySelectorAll('.info-wave-bar').forEach(b=>b.style.background=palette.accent);
  document.getElementById('infoSentencesStack').innerHTML='';
  const card=document.getElementById('infographicCard');
  card.classList.remove('section-enter');void card.offsetWidth;card.classList.add('section-enter');
  document.getElementById('infoWave').classList.remove('paused');
  document.getElementById('infoPauseBtn').textContent='⏸ Pause';
}

function appendSentenceToCard(text,isFirst,palette){
  const stack=document.getElementById('infoSentencesStack');
  const line=document.createElement('div');
  line.className='info-sentence-line'+(isFirst?' first':'');
  line.textContent=text;stack.appendChild(line);
  requestAnimationFrame(()=>requestAnimationFrame(()=>line.classList.add('visible')));
  line.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function showListenOverlay(show){
  const ov=document.getElementById('listenOverlay');
  if(show){ov.classList.add('active');}
  else{ov.classList.remove('active');const w=document.getElementById('infoWave');if(w)w.classList.add('paused');}
}

function togglePausePractice(){
  if(!practiceActive)return;
  const btn=document.getElementById('infoPauseBtn');
  if(practicePaused){practicePaused=false;if(btn)btn.textContent='⏸ Pause';document.getElementById('infoWave').classList.remove('paused');}
  else{practicePaused=true;synth.cancel();if(btn)btn.textContent='▶ Resume';document.getElementById('infoWave').classList.add('paused');}
}

function stopPractice(){
  practiceActive=false;practicePaused=false;synth.cancel();showListenOverlay(false);
  const btn=document.getElementById('playBtn');
  if(btn){btn.textContent=practiceMode==='text'?'▶ Read along':'▶ Play';btn.classList.toggle('text-mode',practiceMode==='text');}
  document.querySelectorAll('.transcript-line').forEach(el=>el.classList.remove('active','done'));
}

function speakLine(text){
  return new Promise(res=>{
    if(!practiceActive){res();return;}
    synth.cancel();
    setTimeout(()=>{
      if(!practiceActive){res();return;}
      const utt=new SpeechSynthesisUtterance(text);
      utt.voice=narrator;utt.rate=0.88;utt.pitch=1.05;utt.volume=1;
      utt.onend=()=>res();utt.onerror=()=>res();
      synth.speak(utt);
    },80);
  });
}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

/* ══ FOOTER NAV ══ */
function navTo(dest){
  if(dest==='model')return;stopPractice();
  const map={question:'email-question.html',plan:'email-plan.html',build:'email-build.html',sample:'email-sample.html'};
  if(map[dest])window.location.href=map[dest];
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')stopPractice();});

init();
</script>
</body>
</html>
