<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Email Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;--rule:rgba(0,0,0,0.07);
  /* blue-slate = Email Model stage identity */
  --acc:#4a7fb5;--acc-d:#2f5f8e;--acc-lt:rgba(74,127,181,0.08);--acc-mid:rgba(74,127,181,0.35);
  /* bone role colours */
  --intro:#3d9e95;--body-c:#e8723a;--end-c:#7b5ea7;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.topic-label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-align:right;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}

/* ── REGISTER BAR ── */
.register-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.35rem;padding:0.4rem 1.25rem;background:rgba(240,239,236,0.9);border-bottom:1px solid rgba(0,0,0,0.06)}
.reg-btn{display:flex;align-items:center;gap:0.3rem;padding:0.28rem 0.9rem;border-radius:2rem;border:none;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.22s;background:transparent;color:rgba(0,0,0,0.3)}
.reg-btn:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.reg-btn.active{background:var(--ink);color:#fff}
.reg-divider{width:1px;height:16px;background:rgba(0,0,0,0.1)}

/* ── TYPE TABS ── */
.topic-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.topic-tabs::-webkit-scrollbar{display:none}
.ttab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.ttab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ttab.active{background:var(--ink);color:#fff}

/* ── STAGE ── */
.stage{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding-top:1.4rem}
/* Card wrapper — flag hangs above, poster fills below */
.card-wrap{position:relative;width:min(420px,88vw);display:flex;flex-direction:column;padding-top:0.2rem;max-height:calc(min(540px,78vh) + 0.2rem)}

/* ── FOOTER NAV ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ══ POSTER CARD — matches Essay/Review geometry ══ */
.poster{
  width:100%;
  height:min(540px,78vh);
  background:var(--white);
  border-radius:1.4rem;
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
  flex-shrink:0;
  box-shadow:
    0 2px 0 rgba(255,255,255,0.8) inset,
    4px 6px 0 rgba(0,0,0,0.06),
    0 20px 50px rgba(0,0,0,0.18),
    0 4px 12px rgba(0,0,0,0.1);
  animation:cardUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardUp{
  0%  {opacity:0;transform:scale(0.92) translateY(20px)}
  65% {opacity:1;transform:scale(1.01) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes boneIn{
  0%  {opacity:0;transform:translateY(-4px)}
  100%{opacity:1;transform:translateY(0)}
}
.bone-drawer.open .drawer-body{animation:boneIn 0.22s cubic-bezier(0.22,1,0.36,1) both}

/* ── FLAG bookmark — sits on card-wrap, above poster top edge ── */
.flag{position:absolute;top:0;left:1.8rem;width:56px;z-index:20;display:flex;flex-direction:column;align-items:center}
.flag-body{width:100%;padding:0.5rem 0 0.35rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.15rem;position:relative;background:var(--acc)}
.flag-num{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.02em}
.flag-label{font-family:'Barlow Condensed',sans-serif;font-size:0.42rem;font-weight:900;color:rgba(255,255,255,0.75);letter-spacing:0.14em;text-transform:uppercase;line-height:1}
.flag-body::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:9px;background:var(--acc);clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%)}

/* ── Register badge top-right ── */
.type-badge{position:absolute;top:1rem;right:1.3rem;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:var(--acc);opacity:0.6;transition:color 0.3s}

/* ── SCROLL AREA ── */
.card-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:3.2rem}
.card-scroll::-webkit-scrollbar{width:3px}
.card-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

/* ── SLIDE NAV ── */
.slide-nav{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.2rem;padding:0.55rem 1rem 0.5rem}
.slide-arrow{background:none;border:1.5px solid rgba(0,0,0,0.12);width:2rem;height:2rem;border-radius:50%;font-size:0.8rem;cursor:pointer;color:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.slide-arrow:hover:not(:disabled){border-color:rgba(0,0,0,0.3);color:var(--ink)}
.slide-arrow:disabled{opacity:0.25;cursor:default}
.page-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.1em;color:rgba(0,0,0,0.28)}

/* ── ACCENT BAR ── */
.accent-bar{height:4px;background:var(--acc);flex-shrink:0;border-radius:0 0 1.4rem 1.4rem;opacity:0.7}

/* ══ SKELETON / BONES — identical to Essay/Review ══ */
.anatomy-wrap{padding:0 0 1.2rem}
.bone{display:flex;align-items:stretch;border-bottom:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:background 0.18s;overflow:hidden}
.bone:first-child{border-top:1px solid rgba(0,0,0,0.06)}
.bone:hover{background:rgba(0,0,0,0.015)}
.bone.open{background:rgba(0,0,0,0.02)}
.bone-num-col{width:4rem;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem 0;gap:0.22rem;background:currentColor;transition:width 0.18s}
.bone-num{font-family:'Barlow Condensed',sans-serif;font-size:1.75rem;font-weight:900;line-height:1;letter-spacing:-0.02em;color:#fff}
.bone-role-tag{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.65)}
.bone-content{flex:1;min-width:0;padding:0.85rem 0.5rem 0.85rem 0.9rem}
.bone-label{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1rem,3.8vw,1.3rem);font-weight:900;letter-spacing:0.03em;text-transform:uppercase;line-height:1.05;color:var(--ink);margin-bottom:0.18rem}
.bone-purpose{font-family:'Barlow',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.28);margin-bottom:0.2rem}
.bone-preview{font-family:'Instrument Sans',sans-serif;font-style:italic;font-size:0.78rem;line-height:1.45;color:rgba(0,0,0,0.26);overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.bone-chevron{font-size:0.5rem;opacity:0.2;transition:transform 0.3s,opacity 0.2s;align-self:center;flex-shrink:0;margin-right:0.9rem;margin-left:0.3rem}
.bone.open .bone-chevron{transform:rotate(180deg);opacity:0.45}

/* ── DRAWER ── */
.bone-drawer{overflow:hidden;max-height:0;transition:max-height 0.42s cubic-bezier(0.4,0,0.2,1)}
.bone-drawer.open{max-height:600px}
.drawer-body{padding:0.7rem 1.1rem 1rem 1rem;border-left:4px solid currentColor;margin-left:4rem;border-top:1px solid rgba(0,0,0,0.05)}
.drawer-section-label{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;background:rgba(0,0,0,0.04);border-radius:3px;padding:0.15rem 0.4rem;display:inline-block;color:rgba(0,0,0,0.35);margin-bottom:0.5rem;margin-top:0.8rem}
.drawer-section-label:first-child{margin-top:0}
.drawer-line{font-family:'Instrument Sans',sans-serif;font-size:0.82rem;line-height:1.65;color:rgba(0,0,0,0.72);padding:0.28rem 0;border-bottom:1px solid rgba(0,0,0,0.05);display:flex;gap:0.5rem;align-items:baseline}
.drawer-line:last-child{border-bottom:none}
.drawer-bullet{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:0.5rem}
.dph{font-style:italic;font-weight:600;opacity:0.5}
.drawer-phrase-item{font-family:'Instrument Sans',sans-serif;font-size:0.79rem;font-style:italic;line-height:1.6;color:rgba(0,0,0,0.52);padding:0.22rem 0;border-bottom:1px dashed rgba(0,0,0,0.05);display:flex;gap:0.45rem;align-items:baseline}
.drawer-phrase-item:last-child{border-bottom:none}
.phrase-arrow{font-size:0.65rem;font-style:normal;font-weight:900;flex-shrink:0;margin-top:0.34rem}

/* ── Bone role colours ── */
.bone-intro{color:var(--intro)}
.bone-intro .bone-num{color:#fff}
.bone-intro .bone-label{color:var(--intro)}
.bone-intro .drawer-bullet{background:var(--intro)}
.bone-intro .phrase-arrow{color:var(--intro)}
.bone-intro.open,.bone-intro:hover{background:rgba(61,158,149,0.04)}

.bone-body{color:var(--body-c)}
.bone-body .bone-num{color:#fff}
.bone-body .bone-label{color:var(--body-c)}
.bone-body .drawer-bullet{background:var(--body-c)}
.bone-body .phrase-arrow{color:var(--body-c)}
.bone-body.open,.bone-body:hover{background:rgba(232,114,58,0.04)}

.bone-end{color:var(--end-c)}
.bone-end .bone-num{color:#fff}
.bone-end .bone-label{color:var(--end-c)}
.bone-end .drawer-bullet{background:var(--end-c)}
.bone-end .phrase-arrow{color:var(--end-c)}
.bone-end.open,.bone-end:hover{background:rgba(123,94,167,0.04)}

.anatomy-footer{margin:1.1rem 1rem 0 3.8rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(0,0,0,0.06);padding-top:0.6rem}
.anatomy-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:900;letter-spacing:0.22em;color:rgba(0,0,0,0.07)}
.anatomy-level{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(0,0,0,0.1)}

/* ══ PHRASES — identical to Essay/Review ══ */
.phrases-display{padding:0 0 1.5rem;font-family:'Barlow',sans-serif}
.pcat{display:flex;flex-direction:column;border-bottom:1px solid rgba(0,0,0,0.06)}
.pcat:first-child{border-top:1px solid rgba(0,0,0,0.06)}
.pcat-slab{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem 0.75rem 0}
.pcat-letter{width:4rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:#fff;background:currentColor;align-self:stretch;min-height:2.8rem}
.pcat-label{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink);line-height:1.1}
.pcat-intro{color:var(--intro)}
.pcat-body{color:var(--body-c)}
.pcat-end{color:var(--end-c)}
.pcat-wrap{margin-left:4rem;padding:0 1rem 0.9rem 0.85rem;border-left:3px solid rgba(0,0,0,0.08)}
.pcat-intro .pcat-wrap{border-left-color:rgba(61,158,149,0.25)}
.pcat-body .pcat-wrap{border-left-color:rgba(232,114,58,0.25)}
.pcat-end .pcat-wrap{border-left-color:rgba(123,94,167,0.25)}
.psub{margin-bottom:0.85rem;padding-top:0.5rem}
.psub:first-child{padding-top:0.6rem}
.psub-title{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;background:rgba(0,0,0,0.04);border-radius:3px;display:inline-block;padding:0.12rem 0.38rem;color:rgba(0,0,0,0.35);margin-bottom:0.45rem}
.phrase-list{list-style:none;padding:0;margin:0}
.phrase-item{font-family:'Instrument Sans',sans-serif;font-size:0.79rem;font-style:italic;line-height:1.6;color:rgba(0,0,0,0.65);margin-bottom:0.3rem;padding-left:1.1rem;position:relative;border-bottom:1px dashed rgba(0,0,0,0.05);padding-bottom:0.2rem}
.phrase-item:last-child{border-bottom:none;margin-bottom:0}
.phrase-item::before{content:"→";position:absolute;left:0;color:currentColor;font-weight:900;font-style:normal;font-size:0.65rem;top:0.32rem}

/* ══ PRACTICE — transcript view (text mode) ══ */
.practice-wrap{padding:0.75rem 0 1.25rem}
.practice-question{background:rgba(74,127,181,0.07);border-left:4px solid var(--acc);border-radius:0.75rem;padding:0.9rem 1rem;margin:0 1rem 0.85rem}
.practice-question-label{font-size:0.6rem;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;color:rgba(0,0,0,0.32);margin-bottom:0.28rem;font-family:'Barlow Condensed',sans-serif}
.practice-question-text{font-size:0.92rem;font-weight:700;color:var(--ink);line-height:1.4;font-family:'Instrument Sans',sans-serif}
.practice-controls{display:flex;align-items:center;gap:0.75rem;padding:0.55rem 1rem;margin-bottom:0.6rem}
.play-btn{display:flex;align-items:center;gap:0.45rem;padding:0.45rem 0.95rem;background:var(--ink);color:#fff;border:none;border-radius:2rem;font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:background 0.2s;font-family:'Barlow Condensed',sans-serif;flex-shrink:0}
.play-btn:hover{background:rgba(0,0,0,0.75)}
.practice-caption{font-size:0.74rem;font-style:italic;color:rgba(0,0,0,0.35);flex:1;line-height:1.4;font-family:'Instrument Sans',sans-serif}
.practice-answer{background:rgba(0,0,0,0.015);border:1px solid rgba(0,0,0,0.06);border-radius:0.75rem;padding:0.85rem 1rem;margin:0 1rem}
.practice-answer-label{font-size:0.56rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:rgba(0,0,0,0.26);margin-bottom:0.4rem;font-family:'Barlow Condensed',sans-serif}
.answer-line{display:flex;align-items:flex-start;gap:0.6rem;padding:0.38rem 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.answer-line:last-child{border-bottom:none}
.answer-line.played .answer-text{opacity:0.32}
.answer-marker{flex-shrink:0;width:6px;height:6px;border-radius:50%;margin-top:0.46rem;background:rgba(0,0,0,0.14);transition:background 0.3s}
.answer-line.active .answer-marker{background:var(--acc)}
.answer-line.played .answer-marker{background:rgba(0,0,0,0.07)}
.answer-text{font-size:0.83rem;line-height:1.6;color:var(--ink);font-family:'Instrument Sans',sans-serif}
.answer-section-tag{display:inline-block;font-size:0.54rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:0.1rem 0.42rem;border-radius:2rem;margin-left:0.4rem;vertical-align:middle;opacity:0.8;font-family:'Barlow Condensed',sans-serif}
.tag-intro{background:rgba(61,158,149,0.12);color:var(--intro)}
.tag-body{background:rgba(232,114,58,0.12);color:var(--body-c)}
.tag-end{background:rgba(123,94,167,0.12);color:var(--end-c)}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <a class="back-link" href="email-question.html">← Questions</a>
    <span class="brand">INTUITY</span>
    <span class="topic-label" id="topicLabel">Email</span>
  </div>

  <!-- Register toggle — unique to Email -->
  <div class="register-bar">
    <button class="reg-btn active" id="regFormal"   onclick="setRegister('formal')">🎩 Formal</button>
    <div class="reg-divider"></div>
    <button class="reg-btn"        id="regInformal" onclick="setRegister('informal')">😊 Informal</button>
  </div>

  <!-- Type tabs -->
  <div class="topic-tabs" id="tabsContainer"></div>

  <div class="stage">
    <div class="card-wrap">

      <!-- Flag hangs from card-wrap — above the poster, never clipped -->
      <div class="flag">
        <div class="flag-body">
          <span class="flag-num" id="flagNum">03</span>
          <span class="flag-label">Email</span>
        </div>
      </div>

      <div class="poster" id="posterCard">

        <!-- Register badge top-right -->
        <div class="type-badge" id="typeBadge">Formal</div>

        <!-- Scrollable content -->
        <div class="card-scroll" id="contentArea"></div>

        <!-- Slide navigation (view switching) -->
        <div class="slide-nav">
          <button class="slide-arrow" id="btnPrev" onclick="navigate(-1)">←</button>
          <div class="page-counter" id="pageCounter">Skeleton</div>
          <button class="slide-arrow" id="btnNext" onclick="navigate(1)">→</button>
        </div>

        <!-- Blue accent bar at base -->
        <div class="accent-bar"></div>
      </div>

    </div><!-- /card-wrap -->
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    data-mode="question" onclick="navTo('question')">Question</button>
      <button class="nb"    data-mode="plan"     onclick="navTo('plan')">Plan</button>
      <button class="nb on" data-mode="model"    onclick="navTo('model')">Model</button>
      <button class="nb"    data-mode="build"    onclick="navTo('build')">Build</button>
      <button class="nb"    data-mode="sample"   onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>

<script>
/* ══ SOUND ENGINE — identical to Essay/Review ══ */
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ac(){if(!actx)actx=new AudioCtx();return actx;}
function tone(freq,type,dur,vol,delay=0){
  try{const ctx=ac(),osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;const t=ctx.currentTime+delay;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);osc.start(t);osc.stop(t+dur+0.05);}catch(e){}
}
function sndOpen(){tone(420,'sine',0.14,0.09);tone(560,'sine',0.1,0.06,0.07);}
function sndClose(){tone(560,'sine',0.1,0.07);tone(380,'sine',0.14,0.05,0.08);}
function sndSwitch(){tone(500,'triangle',0.08,0.08);tone(660,'triangle',0.06,0.05,0.05);}
function sndDone(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.22,0.08,i*0.07));}

/* ══ TYPE MAPS ══ */
const FORMAL_TYPES={
  'Application':    'job_application',
  'Request':        'requesting_information',
  'Complaint':      'complaint',
  'Proposal':       'explaining_justifying',
  'Recommendation': 'comparison_recommendation',
};
const INFORMAL_TYPES={
  'Congratulate': 'reacting_to_news',
  'Invite':       'invitation',
  'Apologise':    'apology',
  'Advise':       'giving_advice',
  'Arrange':      'arranging_plans',
};

/* ══ VIEW CYCLE — Skeleton → Phrases → Practice ══ */
const VIEWS=['skeleton','phrases','practice'];
const VIEW_LABELS=['Skeleton','Phrases','Practice'];

/* ══ STATE ══ */
let structFormal=null, structInformal=null;
let samplesFormal=[], samplesInformal=[];
let currentRegister='formal', currentType='Application', currentView=0;
let practiceActive=false, practiceSynth=window.speechSynthesis, practiceNarrator=null;
let globalLineIdx=0;
const exploredBones=new Set();

/* ══ INIT ══ */
async function init(){
  try{
    const sq=JSON.parse(sessionStorage.getItem('currentEmailQuestion')||'{}');
    if(sq.formality)currentRegister=sq.formality;
    if(sq.type){
      const typeMap=currentRegister==='formal'?FORMAL_TYPES:INFORMAL_TYPES;
      if(Object.keys(typeMap).includes(sq.type))currentType=sq.type;
    }
  }catch(e){}

  try{
    const[r1,r2,r3,r4]=await Promise.all([
      fetch('data/emails-structure-formal.json'),
      fetch('data/emails-structure-informal.json'),
      fetch('data/samples-formal.json'),
      fetch('data/samples-informal.json'),
    ]);
    structFormal  =(await r1.json()).formal  ||{};
    structInformal=(await r2.json()).informal||{};
    samplesFormal =(await r3.json()).emails  ||[];
    samplesInformal=(await r4.json()).emails ||[];

    document.getElementById('regFormal').classList.toggle('active',  currentRegister==='formal');
    document.getElementById('regInformal').classList.toggle('active',currentRegister==='informal');
    renderTabs();
    renderContent();
    updateNav();
    updateFlag();
  }catch(e){
    document.getElementById('contentArea').innerHTML=
      '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.3);font-family:Barlow,sans-serif">⚠ Could not load data</div>';
  }
}

/* ══ REGISTER ══ */
function setRegister(reg){
  stopPractice();exploredBones.clear();
  currentRegister=reg;
  document.getElementById('regFormal').classList.toggle('active',  reg==='formal');
  document.getElementById('regInformal').classList.toggle('active',reg==='informal');
  document.getElementById('typeBadge').textContent=reg==='formal'?'Formal':'Informal';
  const types=Object.keys(reg==='formal'?FORMAL_TYPES:INFORMAL_TYPES);
  currentType=types[0];
  currentView=0;
  renderTabs();renderContent();updateNav();updateFlag();
}

/* ══ TABS ══ */
function renderTabs(){
  const types=Object.keys(currentRegister==='formal'?FORMAL_TYPES:INFORMAL_TYPES);
  document.getElementById('tabsContainer').innerHTML=types.map(t=>
    `<button class="ttab ${t===currentType?'active':''}" onclick="switchType('${t}')">${t}</button>`
  ).join('');
}
function switchType(t){
  stopPractice();exploredBones.clear();sndSwitch();
  currentType=t;currentView=0;
  renderTabs();renderContent();updateNav();updateFlag();
}

function updateFlag(){ /* flag is always 03 — Model is the third page */ }

/* ══ NAV — cycles through Skeleton / Phrases / Practice ══ */
function navigate(dir){
  stopPractice();
  const next=currentView+dir;
  if(next>=0&&next<VIEWS.length){currentView=next;sndSwitch();}
  renderContent();updateNav();
}
function updateNav(){
  document.getElementById('btnPrev').disabled=currentView===0;
  document.getElementById('btnNext').disabled=currentView===VIEWS.length-1;
  document.getElementById('pageCounter').textContent=VIEW_LABELS[currentView];
}

/* ══ RENDER ══ */
function renderContent(){
  const area=document.getElementById('contentArea');
  area.scrollTop=0;
  const view=VIEWS[currentView];
  if(view==='skeleton')     area.innerHTML=renderSkeleton();
  else if(view==='phrases') area.innerHTML=renderPhrases();
  else                       area.innerHTML=renderPractice();
}

/* ══ DATA HELPERS ══ */
function getStruct(){
  const typeMap=currentRegister==='formal'?FORMAL_TYPES:INFORMAL_TYPES;
  const key=typeMap[currentType];
  const pool=currentRegister==='formal'?structFormal:structInformal;
  return pool[key]||null;
}
function getSample(){
  const pool=currentRegister==='formal'?samplesFormal:samplesInformal;
  const typeMap=currentRegister==='formal'?FORMAL_TYPES:INFORMAL_TYPES;
  const structKey=typeMap[currentType];
  return pool.find(s=>s.id===structKey||s.topic===currentType)||(pool[0]||null);
}
function extractSections(html){
  const div=document.createElement('div');div.innerHTML=html;
  return Array.from(div.querySelectorAll('.email-section')).map(sec=>({
    label:sec.querySelector('.section-heading')?.textContent||'',
    sentences:Array.from(sec.querySelectorAll('.section-content p')).map(p=>p.textContent.trim()).filter(Boolean),
  }));
}
function fmtLine(s){return s?s.replace(/\[([^\]]+)\]/g,'<span class="dph">[$1]</span>'):''}
function fmtPrev(s){return s?s.replace(/\[([^\]]+)\]/g,'<em>[$1]</em>'):''}

/* ══ BONE ROLE ══ */
function boneRole(label,idx,total){
  const t=label.toLowerCase();
  if(idx===0||t.includes('open')||t.includes('intro'))return'intro';
  if(idx===total-1||t.includes('clos')||t.includes('sign')||t.includes('valediction'))return'end';
  return'body';
}
function bonePurpose(label,role){
  if(role==='intro')return'Salutation · Opening line · Purpose';
  if(role==='end')  return'Closing remark · Sign-off';
  const t=label.toLowerCase();
  if(t.includes('main')||t.includes('reason')||t.includes('request'))return'Main point with supporting detail';
  if(t.includes('detail')||t.includes('inform')||t.includes('elaborat'))return'Expand with specific information';
  if(t.includes('ask')||t.includes('question')||t.includes('enquir'))return'Specific ask or enquiry';
  if(t.includes('compli')||t.includes('issue')||t.includes('concern'))return'Complaint with evidence & impact';
  return'Develop with detail & register';
}

/* ══ TOGGLE BONE ══ */
function toggleBone(i){
  const b=document.getElementById('ebone-'+i),d=document.getElementById('ebdrawer-'+i);
  if(!b||!d)return;
  const open=b.classList.contains('open');
  b.classList.toggle('open',!open);
  d.classList.toggle('open',!open);
  if(!open){
    sndOpen();exploredBones.add(i);
    const total=document.querySelectorAll('.bone').length;
    if(exploredBones.size>=total)setTimeout(sndDone,300);
  }else sndClose();
}

/* ══ RENDER SKELETON ══ */
function renderSkeleton(){
  const struct=getStruct();
  if(!struct?.sections)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35);font-family:Barlow,sans-serif">No structure data available</div>';
  const sectionEntries=Object.entries(struct.sections);
  const total=sectionEntries.length;
  let h='<div class="anatomy-wrap">';
  sectionEntries.forEach(([key,sec],i)=>{
    const role=boneRole(sec.label||key,i,total);
    const purpose=bonePurpose(sec.label||key,role);
    const num=String(i+1).padStart(2,'0');
    const phrases=sec.phrases||[];
    const preview=phrases[0]||'';
    const roleTag=role==='intro'?'A':role==='body'?'B':'C';
    h+=`<div class="bone bone-${role}" id="ebone-${i}" onclick="toggleBone(${i})">
      <div class="bone-num-col"><div class="bone-num">${num}</div><div class="bone-role-tag">${roleTag}</div></div>
      <div class="bone-content">
        <div class="bone-label">${sec.label||key}</div>
        <div class="bone-purpose">${purpose}</div>
        <div class="bone-preview">${fmtPrev(preview)}</div>
      </div>
      <div class="bone-chevron">▼</div>
    </div>
    <div class="bone-drawer" id="ebdrawer-${i}">
      <div class="drawer-body">
        <div class="drawer-section-label">Key phrases</div>
        ${phrases.map(p=>`<div class="drawer-phrase-item"><div class="phrase-arrow">→</div><div>${fmtLine(p)}</div></div>`).join('')}
      </div>
    </div>`;
  });
  h+=`<div class="anatomy-footer">
    <div class="anatomy-brand">INTUITY</div>
    <div class="anatomy-level">Cambridge B2 · ${currentRegister==='formal'?'Formal':'Informal'} · ${currentType}</div>
  </div>`;
  return h+'</div>';
}

/* ══ RENDER PHRASES ══ */
function renderPhrases(){
  const struct=getStruct();
  if(!struct?.sections)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35);font-family:Barlow,sans-serif">No phrases available</div>';
  const sectionEntries=Object.entries(struct.sections);
  const total=sectionEntries.length;
  let h='<div class="phrases-display">';
  sectionEntries.forEach(([key,sec],i)=>{
    const role=boneRole(sec.label||key,i,total);
    const letter=role==='intro'?'A':role==='body'?'B':'C';
    h+=`<div class="pcat pcat-${role}">
      <div class="pcat-slab"><div class="pcat-letter">${letter}</div><div class="pcat-label">${sec.label||key}</div></div>
      <div class="pcat-wrap"><div class="psub">
        <ul class="phrase-list">
          ${(sec.phrases||[]).map(p=>`<li class="phrase-item">${p}</li>`).join('')}
        </ul>
      </div></div>
    </div>`;
  });
  return h+'</div>';
}

/* ══ RENDER PRACTICE ══ */
function renderPractice(){
  const sample=getSample();
  if(!sample)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35);font-family:Barlow,sans-serif">No practice sample available</div>';
  const html=sample.styles?.default||sample.content||'';
  const sections=extractSections(html);
  let lineIdx=0;
  let answerLines='';
  sections.forEach((sec,si)=>{
    const role=boneRole(sec.label,si,sections.length);
    sec.sentences.forEach((text,ti)=>{
      const isFirst=ti===0;
      const tag=isFirst?`<span class="answer-section-tag tag-${role}">${sec.label||role}</span>`:'';
      answerLines+=`<div class="answer-line" id="aline${lineIdx}">
        <div class="answer-marker"></div>
        <div class="answer-text">${text}${tag}</div>
      </div>`;
      lineIdx++;
    });
  });
  return`<div class="practice-wrap">
    <div class="practice-question">
      <div class="practice-question-label">${currentType} · ${currentRegister}</div>
      <div class="practice-question-text">${sample.title||'Email Sample'}</div>
    </div>
    <div class="practice-controls">
      <button class="play-btn" id="playPracticeBtn" onclick="startPractice()">▶ Play</button>
      <div class="practice-caption" id="practiceCaption">Press Play to hear the model answer</div>
    </div>
    <div class="practice-answer">
      <div class="practice-answer-label">Model Answer</div>
      ${answerLines}
    </div>
  </div>`;
}

/* ══ PRACTICE AUDIO ══ */
async function getPracticeVoice(){
  return new Promise(resolve=>{
    const load=()=>{const v=practiceSynth.getVoices();resolve(v.find(x=>x.name==='Google UK English Male')||v.find(x=>x.name==='Daniel')||v.find(x=>x.lang==='en-GB')||v.find(x=>x.lang.startsWith('en'))||v[0]||null);};
    if(practiceSynth.getVoices().length)load();else practiceSynth.onvoiceschanged=load;
  });
}

async function startPractice(){
  if(practiceActive){stopPractice();return;}
  const sample=getSample();if(!sample)return;
  const html=sample.styles?.default||sample.content||'';
  const sections=extractSections(html);
  if(!sections.length)return;
  practiceActive=true;
  practiceNarrator=await getPracticeVoice();
  const btn=document.getElementById('playPracticeBtn'),cap=document.getElementById('practiceCaption');
  if(btn)btn.textContent='■ Stop';
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played','active'));
  let lineIdx=0;
  for(let si=0;si<sections.length;si++){
    if(!practiceActive)break;
    const section=sections[si];
    for(let ti=0;ti<section.sentences.length;ti++){
      if(!practiceActive)break;
      const text=section.sentences[ti];
      const lineEl=document.getElementById('aline'+lineIdx);
      if(cap)cap.textContent=text;
      document.querySelectorAll('.answer-line').forEach((l,j)=>{
        l.classList.toggle('active',j===lineIdx);
        if(j<lineIdx)l.classList.add('played');
      });
      if(lineEl)lineEl.scrollIntoView({behavior:'smooth',block:'nearest'});
      await speakLine(text);
      if(lineEl)lineEl.classList.add('played');
      if(practiceActive)await wait(500);
      lineIdx++;
    }
  }
  if(practiceActive){stopPractice();const cap=document.getElementById('practiceCaption');if(cap)cap.textContent='Complete. Press Play to repeat.';}
}

function stopPractice(){
  practiceActive=false;practiceSynth.cancel();
  const btn=document.getElementById('playPracticeBtn'),cap=document.getElementById('practiceCaption');
  if(btn){btn.textContent='▶ Play';}
  if(cap)cap.textContent='Press Play to hear the model answer';
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played','active'));
}

function speakLine(text){
  return new Promise(resolve=>{
    if(!practiceActive){resolve();return;}
    practiceSynth.cancel();
    setTimeout(()=>{
      if(!practiceActive){resolve();return;}
      const utt=new SpeechSynthesisUtterance(text);
      utt.voice=practiceNarrator;utt.rate=0.88;utt.pitch=1.05;utt.volume=1;
      utt.onend=()=>resolve();utt.onerror=()=>resolve();
      practiceSynth.speak(utt);
    },80);
  });
}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

/* ══ FOOTER NAV ══ */
function navTo(dest){
  if(dest==='model')return;stopPractice();
  const map={question:'email-question.html',plan:'email-plan.html',build:'email-build.html',sample:'email-sample.html'};
  if(map[dest])window.location.href=map[dest];
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')navigate(-1);
  if(e.key==='ArrowRight')navigate(1);
  if(e.key==='Escape')stopPractice();
});

init();
</script>
