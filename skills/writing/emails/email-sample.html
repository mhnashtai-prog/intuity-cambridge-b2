<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Email Sample — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --c-teal:#3d9e95;--c-teal-lt:#e4f4f2;
  --c-coral:#e8723a;--c-coral-lt:#fdf0ea;
  --c-purple:#7b5ea7;--c-purple-lt:#f0ecf8;
  --c-rose:#c94f6d;--c-rose-lt:#faedf1;
  --c-gold:#c08b2f;--c-gold-lt:#fdf6e3;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.1rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.top-right{display:flex;align-items:center;gap:0.5rem}
.xray-btn{background:rgba(0,0,0,0.06);border:none;border-radius:2rem;padding:0.25rem 0.65rem;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s}
.xray-btn.on{background:var(--ink);color:#fff}

/* STYLE SWITCHER */
.style-bar{flex-shrink:0;display:flex;align-items:center;gap:0.2rem;padding:0.38rem 1.1rem;background:rgba(240,239,236,0.9);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.style-bar::-webkit-scrollbar{display:none}
.style-btn{background:transparent;border:none;padding:0.26rem 0.7rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.style-btn:hover{color:rgba(0,0,0,0.55)}
.style-btn.active{background:var(--ink);color:#fff}

/* SECTION DOTS */
.dots-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.38rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06)}
.sdot{width:28px;height:6px;border-radius:3px;cursor:pointer;transition:all 0.28s cubic-bezier(0.34,1.56,0.64,1);background:rgba(0,0,0,0.12);flex-shrink:0}
.sdot.active{width:42px}
.sdot.s0{} .sdot.s0.active{background:var(--c-teal)}
.sdot.s1{} .sdot.s1.active{background:var(--c-coral)}
.sdot.s2{} .sdot.s2.active{background:var(--c-purple)}
.sdot.s3{} .sdot.s3.active{background:var(--c-rose)}

/* VIEW TOGGLE */
.view-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.32rem 1.1rem;background:rgba(240,239,236,0.7);border-bottom:1px solid rgba(0,0,0,0.05)}
.view-toggle{display:flex;gap:0.1rem;background:rgba(0,0,0,0.06);border-radius:2rem;padding:0.18rem}
.vtbtn{background:transparent;border:none;padding:0.22rem 0.75rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.vtbtn.active{background:var(--ink);color:#fff}
.phrase-toggle-btn{background:transparent;border:none;padding:0.22rem 0.7rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.phrase-toggle-btn.on{background:var(--c-gold);color:#fff}

/* CONTENT */
.content-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1.1rem 1.2rem}
.content-area::-webkit-scrollbar{width:4px}
.content-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

/* FOOTER */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}

/* EMAIL CARD */
.email-card{background:var(--white);border-radius:1.3rem;overflow:hidden;box-shadow:3px 5px 0 rgba(0,0,0,0.05),0 16px 48px rgba(0,0,0,0.11);max-width:480px;margin:0 auto;animation:cardIn 0.38s cubic-bezier(0.22,1,0.36,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:none}}
.email-meta{padding:1rem 1.4rem 0.8rem;border-bottom:1.5px solid rgba(0,0,0,0.06)}
.email-type-label{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:0.35rem;opacity:0.55}
.email-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;font-style:italic;line-height:1.4;color:var(--ink)}
.email-body{padding:0.9rem 1.4rem 1.2rem;display:flex;flex-direction:column;gap:0}

/* SECTION */
.email-section{padding:0.75rem 0;border-bottom:1px dashed rgba(0,0,0,0.07);animation:secIn 0.35s ease both}
@keyframes secIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.email-section:last-child{border-bottom:none}
.section-label-pill{display:inline-flex;align-items:center;gap:0.3rem;padding:0.15rem 0.55rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:0.5rem}
.section-text p{font-family:'Instrument Sans',sans-serif;font-size:0.88rem;font-weight:400;line-height:1.68;color:rgba(0,0,0,0.74);margin-bottom:0.45rem}
.section-text p:last-child{margin-bottom:0}

/* X-RAY: discourse markers */
.xray-on .dm{background:rgba(201,169,97,0.22);border-radius:3px;padding:0 2px;font-weight:600;color:rgba(0,0,0,0.85);cursor:help;position:relative}
.xray-on .dm::after{content:attr(data-label);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;padding:0.18rem 0.4rem;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:200}
.xray-on .dm:hover::after{opacity:1}

/* SECTION COLOURS */
.sc-0 .section-label-pill{background:var(--c-teal-lt);color:var(--c-teal)} .sc-0 .section-text{border-left:3px solid var(--c-teal);padding-left:0.75rem}
.sc-1 .section-label-pill{background:var(--c-coral-lt);color:var(--c-coral)} .sc-1 .section-text{border-left:3px solid var(--c-coral);padding-left:0.75rem}
.sc-2 .section-label-pill{background:var(--c-purple-lt);color:var(--c-purple)} .sc-2 .section-text{border-left:3px solid var(--c-purple);padding-left:0.75rem}
.sc-3 .section-label-pill{background:var(--c-rose-lt);color:var(--c-rose)} .sc-3 .section-text{border-left:3px solid var(--c-rose);padding-left:0.75rem}

/* PHRASES OVERLAY */
.phrases-shelf{max-width:480px;margin:0 auto;margin-top:0.85rem;display:none;flex-direction:column;gap:0.8rem;animation:cardIn 0.3s ease both}
.phrases-shelf.visible{display:flex}
.phrase-chip-group{background:var(--white);border-radius:1rem;overflow:hidden;box-shadow:2px 3px 0 rgba(0,0,0,0.04),0 8px 20px rgba(0,0,0,0.07)}
.pcg-head{padding:0.55rem 1.1rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;border-bottom:1px solid rgba(0,0,0,0.05)}
.pcg-body{padding:0.55rem 1.1rem 0.75rem;display:flex;flex-wrap:wrap;gap:0.35rem}
.phrase-chip{display:inline-block;background:rgba(0,0,0,0.04);border-radius:2rem;padding:0.25rem 0.7rem;font-family:'Instrument Sans',sans-serif;font-size:0.75rem;font-weight:400;color:rgba(0,0,0,0.65);line-height:1.4}
.pcg-0 .pcg-head{color:var(--c-teal)} .pcg-1 .pcg-head{color:var(--c-coral)} .pcg-2 .pcg-head{color:var(--c-purple)} .pcg-3 .pcg-head{color:var(--c-rose)}

/* FULL TEXT VIEW */
.full-text-card{background:var(--white);border-radius:1.3rem;padding:1.2rem 1.5rem 1.5rem;max-width:480px;margin:0 auto;box-shadow:3px 5px 0 rgba(0,0,0,0.05),0 16px 48px rgba(0,0,0,0.11);animation:cardIn 0.35s ease both;font-family:'Instrument Sans',sans-serif;font-size:0.88rem;line-height:1.72;color:rgba(0,0,0,0.74)}
.full-text-card p{margin-bottom:0.75rem}
.full-text-card p:last-child{margin-bottom:0}

.loading-msg{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.25);letter-spacing:0.12em;text-transform:uppercase;text-align:center;padding:3rem}
.no-q-wrap{display:flex;flex-direction:column;align-items:center;gap:0.8rem;padding:2.5rem 1rem;text-align:center}
.no-q-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.28)}
.no-q-sub{font-size:0.78rem;color:rgba(0,0,0,0.2)}
.go-btn{padding:0.5rem 1.3rem;background:var(--ink);color:#fff;border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="email-question.html">← Questions</a>
    <span class="brand">INTUITY</span>
    <div class="top-right">
      <button class="xray-btn" id="xrayBtn" onclick="toggleXray()">X-Ray</button>
    </div>
  </div>

  <div class="style-bar" id="styleBar">
    <button class="style-btn active" data-style="default"       onclick="switchStyle('default')">Default</button>
    <button class="style-btn"        data-style="alternative1"  onclick="switchStyle('alternative1')">Style B</button>
    <button class="style-btn"        data-style="alternative2"  onclick="switchStyle('alternative2')">Style C</button>
  </div>

  <div class="dots-bar" id="dotsBar">
    <div class="sdot s0 active" data-si="0" onclick="scrollToSection(0)"></div>
    <div class="sdot s1"        data-si="1" onclick="scrollToSection(1)"></div>
    <div class="sdot s2"        data-si="2" onclick="scrollToSection(2)"></div>
    <div class="sdot s3"        data-si="3" onclick="scrollToSection(3)"></div>
  </div>

  <div class="view-bar">
    <div class="view-toggle">
      <button class="vtbtn active" data-v="sections" onclick="setView('sections')">Sections</button>
      <button class="vtbtn"        data-v="full"      onclick="setView('full')">Full text</button>
    </div>
    <button class="phrase-toggle-btn" id="phraseToggle" onclick="togglePhrases()">Phrases</button>
  </div>

  <div class="content-area" id="contentArea">
    <div class="loading-msg" id="loadingMsg">Loading…</div>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"     onclick="navTo('question')">Question</button>
      <button class="nb"     onclick="navTo('plan')">Plan</button>
      <button class="nb"     onclick="navTo('model')">Model</button>
      <button class="nb"     onclick="navTo('build')">Build</button>
      <button class="nb on"  onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>

<script>
/* ══ SECTION LABELS ══ */
const FORMAL_LABELS   = ['Opening','Main Details','Action / Request','Closing'];
const INFORMAL_LABELS = ['Opening','Main Message','Suggestion / Plan','Sign-off'];

/* ══ STATE ══ */
let question=null, currentSample=null, allSamples=[], structData=null;
let currentStyle='default', currentView='sections';
let xrayOn=false, phrasesOn=false;
let sectionEls=[];

/* ══ DISCOURSE MARKER PATTERNS ══ */
const DM_PATTERNS=[
  {re:/\b(However|Nevertheless|Despite this|On the other hand|In contrast|That said)\b/g,label:'contrast'},
  {re:/\b(Furthermore|Moreover|In addition|Additionally|What is more)\b/g,label:'addition'},
  {re:/\b(Therefore|As a result|Consequently|Thus|Hence)\b/g,label:'result'},
  {re:/\b(I am writing to|I would like to|I am pleased to|I look forward to)\b/g,label:'function'},
  {re:/\b(In conclusion|To conclude|To summarise|In summary)\b/g,label:'conclusion'},
  {re:/\b(Regarding|With regard to|With reference to|Concerning)\b/g,label:'topic'},
  {re:/\b(Although|Even though|While|Whereas|Despite)\b/g,label:'concession'},
  {re:/\b(In order to|So as to|With the aim of)\b/g,label:'purpose'},
];
function markupDM(text){
  let t=text;
  DM_PATTERNS.forEach(({re,label})=>{
    t=t.replace(re,m=>`<span class="dm" data-label="${label}">${m}</span>`);
  });
  return t;
}

/* ══ INIT ══ */
async function init(){
  try{
    const sq=sessionStorage.getItem('currentEmailQuestion');
    if(sq)question=JSON.parse(sq);

    const formality=question?.formality||'formal';
    const typeMap={
      formal:   {Application:'job_application',Request:'requesting_information',Complaint:'complaint',Proposal:'explaining_justifying',Recommendation:'comparison_recommendation'},
      informal: {Congratulate:'reacting_to_news',Invite:'invitation',Apologise:'apology',Advise:'giving_advice',Arrange:'arranging_plans'},
    };

    const samplesFile=formality==='formal'?'data/samples-formal.json':'data/samples-informal.json';
    const structFile =formality==='formal'?'data/emails-structure-formal.json':'data/emails-structure-informal.json';

    const [r1,r2]=await Promise.all([fetch(samplesFile),fetch(structFile)]);
    const sd=await r1.json();
    allSamples=sd.emails||[];
    const structAll=await r2.json();
    const pool=structAll[formality]||{};

    /* match sample to question */
    if(question?.id){
      const structKey=typeMap[formality]?.[question.type];
      currentSample=allSamples.find(s=>s.id===structKey||s.id===question.id)||allSamples[0]||null;
      if(structKey)structData=pool[structKey]||null;
    }else{
      currentSample=allSamples[0]||null;
    }

    document.getElementById('loadingMsg')?.remove();
    if(!currentSample){showNoQuestion();return;}
    render();
  }catch(e){
    document.getElementById('loadingMsg').textContent='⚠ Could not load sample';
    console.error(e);
  }
}

function showNoQuestion(){
  document.getElementById('contentArea').innerHTML=`<div class="no-q-wrap">
    <div class="no-q-title">No question selected</div>
    <div class="no-q-sub">Choose a question to see a matching sample email.</div>
    <button class="go-btn" onclick="window.location.href='email-question.html'">← Choose a question</button>
  </div>`;
}

/* ══ RENDER ══ */
function render(){
  if(currentView==='sections') renderSections();
  else renderFull();
}

/* Parse .email-section elements from HTML string */
function parseSections(html){
  const div=document.createElement('div');div.innerHTML=html;
  const secs=div.querySelectorAll('.email-section');
  if(secs.length)return Array.from(secs).map(s=>({
    label:s.querySelector('.section-heading')?.textContent.trim()||'',
    html:s.querySelector('.section-content')?.innerHTML||s.innerHTML||'',
  }));
  /* fallback: split by <p> groupings */
  const paras=Array.from(div.querySelectorAll('p')).map(p=>p.outerHTML);
  if(!paras.length)return[{label:'',html:div.innerHTML}];
  const chunk=Math.ceil(paras.length/4);
  return[0,1,2,3].map(i=>({label:'',html:paras.slice(i*chunk,(i+1)*chunk).join('')}));
}

function getFormality(){return question?.formality||'formal';}
function getLabels(){return getFormality()==='formal'?FORMAL_LABELS:INFORMAL_LABELS;}

function renderSections(){
  const styleHtml=currentSample?.styles?.[currentStyle]||currentSample?.content||'';
  const sections=parseSections(styleHtml);
  const labels=getLabels();
  const area=document.getElementById('contentArea');
  const colorClass=getFormality()==='formal'?'':'';

  let html=`<div class="email-card ${xrayOn?'xray-on':''}" id="emailCard">
    <div class="email-meta">
      <div class="email-type-label" style="color:${getTypeColor()}">${question?.type||''} · ${getFormality()}</div>
      <div class="email-title">${currentSample.title||'Email Model'}</div>
    </div>
    <div class="email-body" id="emailBody">`;

  sections.forEach((sec,i)=>{
    const label=labels[i]||sec.label||`Section ${i+1}`;
    const processed=xrayOn?markupDM(sec.html):sec.html;
    html+=`<div class="email-section sc-${i}" data-si="${i}" id="esec${i}">
      <div class="section-label-pill">${label}</div>
      <div class="section-text">${processed}</div>
    </div>`;
  });

  html+=`</div></div>`;

  if(phrasesOn)html+=renderPhrasesHTML();
  area.innerHTML=html;
  sectionEls=Array.from(area.querySelectorAll('.email-section'));
  setupScrollSpy();
}

function renderFull(){
  const styleHtml=currentSample?.styles?.[currentStyle]||currentSample?.content||'';
  const div=document.createElement('div');div.innerHTML=styleHtml;
  const paras=Array.from(div.querySelectorAll('p')).map(p=>p.textContent.trim()).filter(Boolean);
  const processed=paras.map(p=>`<p>${xrayOn?markupDM(p):p}</p>`).join('');
  document.getElementById('contentArea').innerHTML=`<div class="full-text-card ${xrayOn?'xray-on':''}">${processed}</div>`;
}

/* ══ PHRASES ══ */
function renderPhrasesHTML(){
  if(!structData?.sections)return'';
  const labels=getLabels();
  let h='<div class="phrases-shelf visible">';
  Object.entries(structData.sections).forEach(([key,sec],i)=>{
    h+=`<div class="phrase-chip-group pcg-${i}">
      <div class="pcg-head">${labels[i]||sec.label||key}</div>
      <div class="pcg-body">${(sec.phrases||[]).slice(0,6).map(p=>`<span class="phrase-chip">${p}</span>`).join('')}</div>
    </div>`;
  });
  return h+'</div>';
}

function togglePhrases(){
  phrasesOn=!phrasesOn;
  document.getElementById('phraseToggle').classList.toggle('on',phrasesOn);
  render();
}

/* ══ STYLE SWITCHER ══ */
function switchStyle(s){
  currentStyle=s;
  document.querySelectorAll('.style-btn').forEach(b=>b.classList.toggle('active',b.dataset.style===s));
  render();
}

/* ══ VIEW TOGGLE ══ */
function setView(v){
  currentView=v;
  document.querySelectorAll('.vtbtn').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  document.getElementById('dotsBar').style.display=v==='sections'?'flex':'none';
  render();
}

/* ══ X-RAY ══ */
function toggleXray(){
  xrayOn=!xrayOn;
  document.getElementById('xrayBtn').classList.toggle('on',xrayOn);
  render();
}

/* ══ SCROLL SPY + DOTS ══ */
function setupScrollSpy(){
  const area=document.getElementById('contentArea');
  area.addEventListener('scroll',onScroll,{passive:true});
}
function onScroll(){
  const area=document.getElementById('contentArea');
  const mid=area.scrollTop+area.clientHeight*0.38;
  let active=0;
  sectionEls.forEach((el,i)=>{if(el.offsetTop<=mid)active=i;});
  setActiveDot(active);
}
function setActiveDot(i){
  document.querySelectorAll('.sdot').forEach((d,j)=>d.classList.toggle('active',j===i));
}
function scrollToSection(i){
  const el=document.getElementById('esec'+i);if(!el)return;
  const area=document.getElementById('contentArea');
  area.scrollTo({top:el.offsetTop-8,behavior:'smooth'});
  setActiveDot(i);
}

/* ══ TYPE COLOUR ══ */
function getTypeColor(){
  const map={Application:'#3d9e95',Request:'#e8723a',Complaint:'#c94f6d',Proposal:'#7b5ea7',Recommendation:'#c08b2f',Congratulate:'#3d9e95',Invite:'#e8723a',Apologise:'#c94f6d',Advise:'#7b5ea7',Arrange:'#c08b2f'};
  return map[question?.type]||'#999';
}

/* ══ FOOTER NAV ══ */
function navTo(dest){
  if(dest==='sample')return;
  const map={question:'email-question.html',plan:'email-plan.html',model:'email-model.html',build:'email-build.html'};
  if(map[dest])window.location.href=map[dest];
}

init();
</script>
</body>
</html>
