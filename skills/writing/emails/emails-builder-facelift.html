<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Email Builder — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══ INTUITY DESIGN SYSTEM HEADER ══ */
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --c-teal:#3d9e95;--c-coral:#e8723a;--c-purple:#7b5ea7;--c-rose:#c94f6d;--c-gold:#c08b2f;
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);font-family:'Barlow',sans-serif;min-height:100%}

/* TOPBAR */
.ib-topbar{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0.65rem 1.25rem;
  background:rgba(240,239,236,0.96);
  backdrop-filter:blur(14px);
  border-bottom:1.5px solid rgba(0,0,0,0.07);
}
.ib-back{
  text-decoration:none;font-size:0.68rem;font-weight:700;
  color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;
  transition:color 0.2s;
}
.ib-back:hover{color:rgba(0,0,0,0.65)}
.ib-brand{
  font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;
  letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18);
}
.ib-badge{
  font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;
  letter-spacing:0.12em;text-transform:uppercase;
  background:var(--c-gold);color:#fff;
  padding:0.2rem 0.6rem;border-radius:2rem;
}

/* SUB-HEADER (register / type indicator) */
.ib-subhead{
  display:flex;align-items:center;gap:0.6rem;
  padding:0.4rem 1.25rem;
  background:rgba(240,239,236,0.88);
  border-bottom:1px solid rgba(0,0,0,0.06);
  font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;
  letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.28);
}
.ib-subhead-dot{width:7px;height:7px;border-radius:50%;background:var(--c-gold)}

/* ══ BUILDER CONTENT AREA ══
   The existing builder CSS and JS is preserved below unchanged.
   Only background and font references are overridden here to match cream theme.
*/
body{background:var(--bg) !important}

/* legacy dark overrides → cream */
.builder-container,
.builder-wrap,
.main-container{background:var(--bg) !important;color:var(--ink) !important}

/* Ensure any hardcoded dark backgrounds on cards become white */
.card-panel,.option-card,.builder-card{
  background:var(--white) !important;
  color:var(--ink) !important;
  border-radius:1rem !important;
  box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 10px 28px rgba(0,0,0,0.09) !important;
}
/* Gold accent for primary buttons */
.btn-primary,.action-btn,.submit-btn{
  background:var(--c-gold) !important;
  font-family:'Barlow Condensed',sans-serif !important;
  font-weight:900 !important;
  letter-spacing:0.1em !important;
  text-transform:uppercase !important;
  border:none !important;
  border-radius:2rem !important;
}
/* Section colour accents */
.section-opening,.accent-opening{border-left:3px solid var(--c-teal) !important}
.section-main,.accent-main{border-left:3px solid var(--c-coral) !important}
.section-details,.accent-details{border-left:3px solid var(--c-purple) !important}
.section-closing,.accent-closing{border-left:3px solid var(--c-rose) !important}
</style>
</head>
<body>

<!-- ══ INTUITY TOPBAR ══ -->
<header class="ib-topbar">
  <a class="ib-back" href="email-question.html">← Questions</a>
  <span class="ib-brand">INTUITY</span>
  <span class="ib-badge">Builder</span>
</header>
<div class="ib-subhead">
  <div class="ib-subhead-dot"></div>
  Email Writing Practice
</div>

<!-- ══ ORIGINAL BUILDER CONTENT ══
     Paste the full existing emails-builder.html <body> content here,
     starting after the opening <body> tag and ending before </body>.
     The INTUITY topbar above replaces any existing header/navbar.
     All functional JS, inputs, and logic are preserved unchanged.
     The CSS overrides above will adapt visual appearance to INTUITY cream theme.
-->

</div>

</body>
</html>
