<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Desk — INTUITY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0c0c0c; --paper:#e8e6e0; --gold:#C9A961; --link:#4a90d9;
    --dim:#8a8880; --faint:#3a3a3a; --amber:#BA7517;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--ink); color:var(--paper);
    font-family:'Instrument Sans',sans-serif;
    overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  .cond{font-family:'Barlow Condensed',sans-serif;letter-spacing:.18em}

  /* ---------- top bar ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:5;
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(14px + env(safe-area-inset-top)) 20px 12px;
  }
  header a{color:var(--dim);text-decoration:none;font-size:12px}
  #deskTag{color:var(--gold);font-size:12px;font-weight:500}
  #paraTag{color:var(--dim);font-size:12px}

  /* ---------- stage ---------- */
  #stage{
    height:100%; display:flex; flex-direction:column;
    justify-content:center; padding:78px 26px 128px;
    max-width:640px; margin:0 auto;
  }
  #paraLabel{color:var(--gold);font-size:12px;font-weight:500;margin-bottom:14px}
  #paraText{
    font-size:clamp(19px,2.6vh,23px); line-height:1.78; font-weight:400;
    overflow-y:auto; max-height:52vh; padding-right:4px;
  }
  #paraText::-webkit-scrollbar{width:0}

  /* the x-ray: skeleton gold, linkers blue, flesh quiet */
  #paraText .discourse, #paraText .frame{color:var(--gold)}
  #paraText .opinion{color:var(--gold);font-style:italic}
  #paraText .causal{color:var(--link)}

  #anotherWay{
    margin-top:22px; align-self:flex-start;
    background:none; border:0.5px solid var(--faint); border-radius:999px;
    color:var(--dim); font-family:'Barlow Condensed',sans-serif;
    letter-spacing:.15em; font-size:12px; padding:8px 18px; cursor:pointer;
  }
  #anotherWay:active{color:var(--gold);border-color:var(--gold)}

  /* ---------- shelf chips ---------- */
  #shelf{
    position:fixed; left:0; right:0; bottom:calc(56px + env(safe-area-inset-bottom));
    padding:0 20px; max-width:640px; margin:0 auto;
  }
  #shelfLabel{
    display:flex; align-items:center; justify-content:space-between;
    color:var(--faint); font-size:11px; margin-bottom:9px;
  }
  #dealBtn{background:none;border:none;color:var(--dim);font-size:11px;
    font-family:'Barlow Condensed',sans-serif;letter-spacing:.15em;cursor:pointer;padding:4px}
  #chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{
    border:0.5px solid var(--faint); border-radius:999px;
    padding:7px 15px; font-size:13.5px; color:#c9c7c0; line-height:1.35;
  }
  .chip:active{border-color:var(--gold);color:var(--gold)}

  /* ---------- paragraph dots + hint ---------- */
  footer{
    position:fixed; left:0; right:0; bottom:0;
    padding:0 0 calc(14px + env(safe-area-inset-bottom)); text-align:center; z-index:5;
  }
  #dots{display:flex;gap:10px;justify-content:center;margin-bottom:9px}
  #dots span{width:8px;height:8px;border-radius:50%;border:1px solid var(--faint)}
  #dots span.on{background:var(--gold);border-color:var(--gold)}
  #hint{color:var(--faint);font-size:11px}

  /* ---------- tap zones ---------- */
  .zone{position:fixed;top:70px;bottom:150px;width:22%;z-index:4}
  #zPrev{left:0} #zNext{right:0}

  /* ---------- picker (only when no essay chosen) ---------- */
  #picker{
    position:fixed; inset:0; background:var(--ink); z-index:10;
    overflow-y:auto; padding:calc(30px + env(safe-area-inset-top)) 24px 40px;
    display:none;
  }
  #picker h1{
    font-family:'Barlow Condensed',sans-serif; font-weight:500;
    color:var(--gold); font-size:15px; letter-spacing:.3em; text-align:center;
    margin-bottom:6px;
  }
  #picker p{color:var(--dim);font-size:12px;text-align:center;letter-spacing:.1em;margin-bottom:26px}
  .pick{
    display:block; width:100%; text-align:left; cursor:pointer;
    background:#141414; border:0.5px solid #222; border-radius:12px;
    padding:15px 18px; margin-bottom:10px; color:var(--paper);
    font-family:'Instrument Sans',sans-serif; font-size:15px;
  }
  .pick small{display:block;color:var(--dim);font-size:12px;margin-top:4px}
  .pick:active{border-color:var(--gold)}

  @media (prefers-reduced-motion:no-preference){
    #paraText, #paraLabel{transition:opacity .18s ease}
    .fading{opacity:0}
  }
</style>
</head>
<body>

<div id="picker" aria-label="Choose an essay"></div>

<header>
  <a href="essay-question.html">&#8592; WRITING</a>
  <span id="deskTag" class="cond">DESK</span>
  <span id="paraTag" class="cond"></span>
</header>

<main id="stage">
  <div id="paraLabel" class="cond"></div>
  <div id="paraText"></div>
  <button id="anotherWay" type="button">ANOTHER WAY &#10227;</button>
</main>

<div id="shelf">
  <div id="shelfLabel">
    <span class="cond" id="shelfName">FROM THE SHELF</span>
    <button id="dealBtn" type="button">DEAL 3 MORE &#10227;</button>
  </div>
  <div id="chips"></div>
</div>

<footer>
  <div id="dots"></div>
  <div id="hint" class="cond">TAP SIDES TO MOVE &#183; SCREEN STAYS ON</div>
</footer>

<div class="zone" id="zPrev" aria-label="Previous paragraph"></div>
<div class="zone" id="zNext" aria-label="Next paragraph"></div>

<script>
(function(){
  'use strict';

  /* ---------------- state ---------------- */
  var samples = null, pools = null;
  var essay = null;                       // current sample object
  var styleKeys = ['default','alternative1','alternative2'];
  var styleIdx = 0, paraIdx = 0, paras = [];

  var PARA_NAMES = ['OPENING','FIRST POINT','SECOND POINT','THIRD POINT','CLOSING'];

  /* ---------------- boot ---------------- */
  Promise.all([
    fetch('data/samples.json').then(function(r){return r.json();}),
    fetch('data/essay-cards-models.json').then(function(r){return r.json();})
  ]).then(function(res){
    samples = res[0].opinion || [];
    pools = res[1];
    var wanted = new URLSearchParams(location.search).get('id')
              || sessionStorage.getItem('intuityDeskId');
    var found = null;
    for (var i=0;i<samples.length;i++) if (samples[i].id===wanted) found=samples[i];
    if (found) start(found); else showPicker();
  }).catch(function(){
    document.getElementById('paraText').textContent =
      'Could not load the essay data. Check data/samples.json is reachable.';
  });

  /* ---------------- picker ---------------- */
  function showPicker(){
    var box = document.getElementById('picker');
    var html = '<h1>DESK MODE</h1><p class="cond">PICK YOUR ESSAY &#183; PHONE BESIDE PAPER</p>';
    box.innerHTML = html;
    samples.forEach(function(s){
      var b = document.createElement('button');
      b.className = 'pick'; b.type = 'button';
      b.innerHTML = escapeHtml(s.question) + '<small>' + escapeHtml(s.topic||'') + '</small>';
      b.addEventListener('click', function(){ box.style.display='none'; start(s); });
      box.appendChild(b);
    });
    box.style.display = 'block';
  }

  /* ---------------- core ---------------- */
  function start(s){
    essay = s;
    sessionStorage.setItem('intuityDeskId', s.id);
    styleIdx = 0;
    paraIdx = parseInt(sessionStorage.getItem('intuityDeskPara:'+s.id)||'0',10) || 0;
    document.getElementById('deskTag').textContent =
      'DESK \u00B7 ' + (s.title||'ESSAY').toUpperCase();
    loadStyle();
    requestWake();
  }

  function loadStyle(){
    var html = (essay.styles && essay.styles[styleKeys[styleIdx]]) || '';
    var doc = new DOMParser().parseFromString(html,'text/html');
    paras = Array.prototype.slice.call(doc.querySelectorAll('p'));
    if (paraIdx >= paras.length) paraIdx = 0;
    buildDots();
    render();
  }

  function render(){
    var label = document.getElementById('paraLabel');
    var text = document.getElementById('paraText');
    text.classList.add('fading'); label.classList.add('fading');
    setTimeout(function(){
      label.textContent = 'PARA ' + (paraIdx+1) + ' \u00B7 ' +
        (PARA_NAMES[paraIdx] || 'PARAGRAPH');
      text.innerHTML = paras[paraIdx] ? paras[paraIdx].innerHTML : '';
      document.getElementById('paraTag').textContent =
        (paraIdx+1) + ' OF ' + paras.length;
      updateDots();
      dealChips();
      sessionStorage.setItem('intuityDeskPara:'+essay.id, String(paraIdx));
      text.classList.remove('fading'); label.classList.remove('fading');
      text.scrollTop = 0;
    }, 120);
  }

  function go(step){
    var n = paraIdx + step;
    if (n < 0 || n >= paras.length) return;
    paraIdx = n; render();
  }

  function anotherWay(){
    styleIdx = (styleIdx + 1) % styleKeys.length;
    loadStyle();
  }

  /* ---------------- dots ---------------- */
  function buildDots(){
    var d = document.getElementById('dots'); d.innerHTML='';
    paras.forEach(function(){ d.appendChild(document.createElement('span')); });
  }
  function updateDots(){
    var ds = document.getElementById('dots').children;
    for (var i=0;i<ds.length;i++) ds[i].className = i<=paraIdx ? 'on' : '';
  }

  /* ---------------- the shelf ---------------- */
  function flatten(x, out){
    out = out || [];
    if (typeof x === 'string'){ if (x.trim()) out.push(x.trim()); }
    else if (Array.isArray(x)) x.forEach(function(v){ flatten(v,out); });
    else if (x && typeof x === 'object'){
      Object.keys(x).forEach(function(k){
        if (k !== 'move' && k !== 'label') flatten(x[k],out);
      });
    }
    return out;
  }

  function poolFor(i){
    try{
      var sh = pools.shared, op = pools.types.opinion;
      if (i === 0)
        return { name:'WAYS TO OPEN',
                 items: flatten([op.open.hinge, op.open.aim, sh.view.opinion]) };
      if (i === paras.length - 1)
        return { name:'WAYS TO CLOSE',
                 items: flatten([op.close.summary, op.close.stance, op.close.verdict]) };
      var sp = i===1 ? sh.signpost.first
             : i===2 ? sh.signpost.addition
             : sh.signpost.turn;
      return { name:'WAYS TO SIGNPOST',
               items: flatten([sp, op.argue.keyOpen, op.argue.keyMore]) };
    }catch(e){ return {name:'FROM THE SHELF', items:[]}; }
  }

  function dealChips(){
    var p = poolFor(paraIdx);
    document.getElementById('shelfName').textContent = p.name;
    var box = document.getElementById('chips'); box.innerHTML='';
    shuffle(p.items).slice(0,3).forEach(function(t){
      var c = document.createElement('span');
      c.className = 'chip'; c.textContent = t;
      box.appendChild(c);
    });
  }

  function shuffle(a){
    a = a.slice();
    for (var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1)), t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }

  /* ---------------- input ---------------- */
  document.getElementById('zNext').addEventListener('click', function(){ go(1); });
  document.getElementById('zPrev').addEventListener('click', function(){ go(-1); });
  document.getElementById('anotherWay').addEventListener('click', anotherWay);
  document.getElementById('dealBtn').addEventListener('click', dealChips);
  document.addEventListener('keydown', function(e){
    if (e.key==='ArrowRight') go(1);
    if (e.key==='ArrowLeft') go(-1);
    if (e.key==='a' || e.key==='A') anotherWay();
  });
  var tX=null;
  document.addEventListener('touchstart',function(e){ tX=e.touches[0].clientX; },{passive:true});
  document.addEventListener('touchend',function(e){
    if (tX===null) return;
    var dx = e.changedTouches[0].clientX - tX; tX=null;
    if (Math.abs(dx) > 60) go(dx < 0 ? 1 : -1);
  },{passive:true});

  /* ---------------- wake lock ---------------- */
  var lock = null;
  function requestWake(){
    if (!('wakeLock' in navigator)) return;
    navigator.wakeLock.request('screen')
      .then(function(l){ lock = l; })
      .catch(function(){ /* denied: fine, hint text stays honest enough */ });
  }
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'visible' && essay) requestWake();
  });

  /* ---------------- util ---------------- */
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
})();
</script>
</body>
</html>
