<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Practice — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700;1,900&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════
   TOKENS
═══════════════════════════════ */
:root {
  --bg: #10111a;
  --white: #FAFAF8;
  --ink: #0d0d18;

  /* Section colours */
  --c-intro:   #3d9e95;
  --c-body1:   #e8723a;
  --c-body2:   #8b7ba8;
  --c-body3:   #C9A961;
  --c-conc:    #e05a2b;
  --c-phrase:  #2d6fe8;

  --panel: rgba(16,17,26,0.96);
}

*,*::before,*::after { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
html,body {
  width:100%;height:100%;overflow:hidden;position:fixed;
  background:var(--bg);
  font-family:'Instrument Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════
   QUESTION SELECTOR SCREEN
═══════════════════════════════ */
.q-screen {
  position:fixed;inset:0;z-index:10;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem 1.5rem;
  gap:1rem;
  transition:opacity 0.35s,transform 0.35s;
}
.q-screen.hidden {
  opacity:0;pointer-events:none;transform:translateY(-20px);
}
.q-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(0.58rem,2vw,0.68rem);
  font-weight:900;letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(255,255,255,0.25);margin-bottom:0.25rem;
}
.q-heading {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(2rem,8vw,3.2rem);
  font-weight:900;letter-spacing:0.04em;line-height:0.95;
  color:var(--white);text-align:center;
}
.type-tabs {
  display:flex;gap:0.4rem;flex-wrap:wrap;justify-content:center;
  margin:0.25rem 0;
}
.type-tab {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:2rem;padding:0.3rem 0.8rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.65rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);cursor:pointer;transition:all 0.2s;
}
.type-tab.active {
  background:var(--white);color:var(--ink);border-color:var(--white);
}
.q-list {
  display:flex;flex-direction:column;gap:0.5rem;
  width:100%;max-width:500px;
}
.q-item {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:1rem;
  padding:0.875rem 1.1rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(0.9rem,3vw,1.05rem);
  font-weight:700;font-style:italic;
  color:rgba(255,255,255,0.65);
  cursor:pointer;transition:all 0.2s;
  line-height:1.3;
}
.q-item:hover {
  background:rgba(255,255,255,0.08);
  color:var(--white);border-color:rgba(255,255,255,0.2);
  transform:translateX(4px);
}
.q-item-num {
  font-family:'DM Mono',monospace;font-size:0.55rem;
  font-weight:400;font-style:normal;letter-spacing:0.12em;
  color:rgba(255,255,255,0.2);display:block;margin-bottom:0.2rem;
}

/* ═══════════════════════════════
   BANNER STAGE — fullscreen
═══════════════════════════════ */
.banner-stage {
  position:fixed;inset:0;z-index:20;
  background:#16181d;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:1.25rem 1rem 0.75rem;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s;
}
.banner-stage.active {
  opacity:1;pointer-events:all;
}

/* ── TOP ROW ── */
.bs-toprow {
  width:100%;max-width:500px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:0.75rem;flex-shrink:0;
}
.bs-back {
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  padding:0.3rem 0.75rem;border-radius:2rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.62rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.2s;
}
.bs-back:hover { color:var(--white);background:rgba(255,255,255,0.1); }
.bs-qtext {
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.6rem;font-weight:700;font-style:italic;
  color:rgba(255,255,255,0.2);
  max-width:260px;text-align:right;line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}

/* ── SENTENCE PROGRESS DOTS ── */
.bs-dots {
  display:flex;gap:5px;align-items:center;
  margin-bottom:0.75rem;flex-shrink:0;flex-wrap:wrap;
  justify-content:center;width:100%;max-width:500px;
}
.bs-dot {
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  transition:all 0.3s cubic-bezier(0.22,1,0.36,1);
  flex-shrink:0;
}
.bs-dot.active {
  transform:scale(1.5);
  box-shadow:0 0 8px currentColor;
}
.bs-dot.done { opacity:0.45; }

/* ── THE BANNER CARD ── */
.banner-card {
  position:relative;
  width:min(500px,96vw);
  background:var(--white);
  border-radius:6px;
  overflow:visible;
  display:flex;flex-direction:column;
  box-shadow:
    8px 8px 0 rgba(255,255,255,0.03),
    14px 20px 0 rgba(0,0,0,0.5),
    0 50px 100px rgba(0,0,0,0.7);
  flex-shrink:0;

  /* Entry animation */
  opacity:0;
  transform:translateX(60px) scale(0.95);
  transition:
    opacity 0.42s cubic-bezier(0.22,1,0.36,1),
    transform 0.42s cubic-bezier(0.22,1,0.36,1);
}
.banner-card.visible {
  opacity:1;transform:translateX(0) scale(1);
}
.banner-card.exit-left {
  opacity:0;transform:translateX(-60px) scale(0.95);
  transition:opacity 0.22s ease,transform 0.22s ease;
}
.banner-card.exit-right {
  opacity:0;transform:translateX(80px) scale(0.95);
  transition:opacity 0.22s ease,transform 0.22s ease;
}

/* Left accent stripe */
.bc-stripe {
  position:absolute;left:0;top:0;bottom:0;
  width:8px;border-radius:6px 0 0 6px;
  transition:background 0.35s;
  z-index:5;
}

/* Number badge — cut-corner style */
.bc-badge {
  position:absolute;top:-1.1rem;left:1.5rem;
  width:3.6rem;height:3.6rem;
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.5rem;font-weight:900;color:#fff;
  box-shadow:5px 6px 0 rgba(0,0,0,0.35),0 12px 28px rgba(0,0,0,0.4);
  z-index:10;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);
  transition:background 0.35s;
}

/* Sentence type tag */
.bc-type-tag {
  position:absolute;top:-1.1rem;right:1.2rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.58rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;
  padding:0.22rem 0.7rem;border-radius:3px;
  border-left:3px solid currentColor;
  z-index:10;
}
.tag-intro    { background:rgba(61,158,149,0.15);color:var(--c-intro); }
.tag-body     { background:rgba(232,114,58,0.15);color:var(--c-body1); }
.tag-conclusion { background:rgba(139,123,168,0.15);color:var(--c-body2); }
.tag-plain    { background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.35); }

/* Card body */
.bc-body {
  padding:2.2rem 1.8rem 0.6rem 2.4rem;
  display:flex;flex-direction:column;
  flex:1;
}

/* Section label */
.bc-section-label {
  font-family:'DM Mono',monospace;
  font-size:0.52rem;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;
  margin-bottom:0.5rem;
  transition:color 0.35s;
}

/* KEY PHRASE — the star of the show */
.bc-key-phrase {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(1.5rem,5.5vw,2.1rem);
  font-weight:900;letter-spacing:0.02em;
  line-height:1.05;
  color:var(--ink);
  margin-bottom:0.5rem;

  /* phrase words animate in */
  overflow:hidden;
}
.bc-key-phrase .kw {
  display:inline-block;
  opacity:0;transform:translateY(100%);
  transition:opacity 0.3s,transform 0.35s cubic-bezier(0.22,1,0.36,1);
}
.bc-key-phrase .kw.in { opacity:1;transform:translateY(0); }

/* Rule line */
.bc-rule {
  width:3rem;height:4px;border-radius:2px;
  margin-bottom:0.8rem;transition:background 0.35s;flex-shrink:0;
}

/* FULL SENTENCE — the supporting text */
.bc-sentence {
  font-family:'Instrument Sans',sans-serif;
  font-size:clamp(0.9rem,2.8vw,1.05rem);
  font-weight:400;line-height:1.65;
  color:rgba(0,0,0,0.55);
  padding-top:0.65rem;
  border-top:1px dashed rgba(0,0,0,0.1);
  opacity:0;transform:translateY(8px);
  transition:opacity 0.4s 0.25s,transform 0.4s 0.25s;
}
.bc-sentence.in { opacity:1;transform:translateY(0); }
/* highlight the key phrase within the sentence */
.bc-sentence .ph-highlight {
  color:var(--ink);font-weight:600;
}

/* Card footer */
.bc-footer {
  display:flex;align-items:center;justify-content:space-between;
  padding:0.6rem 1.8rem 0.9rem 2.4rem;
}
.bc-icon { font-size:1.5rem;opacity:0.35;line-height:1; }
.bc-wave {
  display:flex;align-items:flex-end;gap:3px;height:28px;
}
.bc-wave-bar {
  width:4px;border-radius:3px;
  animation:bcWave 1.1s ease-in-out infinite;
  transition:background 0.35s;
}
.bc-wave-bar:nth-child(1){height:7px;animation-delay:0s}
.bc-wave-bar:nth-child(2){height:16px;animation-delay:0.07s}
.bc-wave-bar:nth-child(3){height:26px;animation-delay:0.15s}
.bc-wave-bar:nth-child(4){height:19px;animation-delay:0.1s}
.bc-wave-bar:nth-child(5){height:10px;animation-delay:0.04s}
.bc-wave-bar:nth-child(6){height:22px;animation-delay:0.19s}
.bc-wave-bar:nth-child(7){height:13px;animation-delay:0.08s}
@keyframes bcWave {
  0%,100%{transform:scaleY(0.25);opacity:0.18}
  50%{transform:scaleY(1);opacity:1}
}
.bc-wave.paused .bc-wave-bar {
  animation:none;transform:scaleY(0.25);opacity:0.12;
}

/* Bottom colour line */
.bc-bottom-line {
  height:7px;width:100%;border-radius:0 0 6px 6px;
  transition:background 0.35s;flex-shrink:0;
}

/* ── PROGRESS BAR + CONTROLS ── */
.bs-bottom {
  width:min(500px,96vw);
  margin-top:0.875rem;
  display:flex;flex-direction:column;gap:0.5rem;
  flex-shrink:0;
}
.bs-prog-track {
  width:100%;height:3px;
  background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;
}
.bs-prog-fill {
  height:100%;border-radius:2px;
  transition:width 0.4s cubic-bezier(0.22,1,0.36,1),background 0.4s;
}
.bs-controls {
  display:flex;align-items:center;justify-content:space-between;
  gap:0.5rem;
}
.bs-counter {
  font-family:'DM Mono',monospace;
  font-size:0.58rem;font-weight:400;letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(255,255,255,0.2);
}
.bs-btns { display:flex;gap:0.4rem;align-items:center; }
.bs-btn {
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.62rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.08);
  padding:0.32rem 0.9rem;border-radius:3px;
  color:rgba(255,255,255,0.38);cursor:pointer;
  transition:all 0.2s;white-space:nowrap;
}
.bs-btn:hover { background:rgba(255,255,255,0.13);color:rgba(255,255,255,0.8); }
.bs-btn.primary {
  background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.65);
}
.bs-btn.primary:hover { background:rgba(255,255,255,0.18);color:#fff; }
.bs-btn.next-btn {
  background:var(--white);color:var(--ink);
  border-color:var(--white);
}
.bs-btn.next-btn:hover { background:rgba(255,255,255,0.88); }

/* ── TAP-ANYWHERE HINT ── */
.tap-hint {
  position:absolute;bottom:0.3rem;left:0;right:0;
  text-align:center;
  font-family:'DM Mono',monospace;
  font-size:0.55rem;letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(255,255,255,0.12);
  pointer-events:none;
  animation:hintFade 2.5s ease-in-out infinite;
}
@keyframes hintFade { 0%,100%{opacity:0.5}50%{opacity:1} }

/* ── SWIPE HINT ARROWS ── */
.swipe-prev, .swipe-next {
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:rgba(255,255,255,0.2);
  cursor:pointer;transition:all 0.2s;
  z-index:30;
}
.swipe-prev { left:0.5rem; }
.swipe-next { right:0.5rem; }
.swipe-prev:hover, .swipe-next:hover {
  background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);
}
.swipe-prev:disabled, .swipe-next:disabled { opacity:0.1;cursor:not-allowed; }

/* ── COMPLETE OVERLAY ── */
.complete-overlay {
  position:fixed;inset:0;z-index:50;
  background:rgba(16,17,26,0.97);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0.875rem;padding:2rem;
  opacity:0;pointer-events:none;
  transition:opacity 0.4s;
}
.complete-overlay.show { opacity:1;pointer-events:all; }
.co-emoji { font-size:3.5rem;line-height:1; }
.co-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(2.5rem,10vw,4rem);
  font-weight:900;letter-spacing:0.06em;
  color:var(--white);text-align:center;line-height:0.95;
}
.co-sub {
  font-family:'Instrument Sans',sans-serif;
  font-size:0.9rem;color:rgba(255,255,255,0.4);
  text-align:center;line-height:1.6;max-width:320px;
}
.co-btns { display:flex;gap:0.6rem;flex-wrap:wrap;justify-content:center;margin-top:0.5rem; }
.co-btn {
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.82rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;
  padding:0.6rem 1.5rem;border-radius:2rem;border:none;cursor:pointer;transition:all 0.2s;
}
.co-btn.primary {
  background:var(--white);color:var(--ink);
}
.co-btn.secondary {
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.12);
}
.co-btn:hover { transform:translateY(-2px); }

/* ─ particles ─ */
.pt {
  position:fixed;pointer-events:none;z-index:60;
  border-radius:2px;animation:ptFly 1s ease-out forwards;
}
@keyframes ptFly {
  0%{opacity:1;transform:translateY(0) rotate(0deg);}
  100%{opacity:0;transform:translateY(-180px) rotate(540deg);}
}

@media(max-width:400px){
  .bc-key-phrase{font-size:1.3rem;}
  .bc-body{padding:1.8rem 1.3rem 0.5rem 2rem;}
  .bc-footer{padding:0.5rem 1.3rem 0.75rem 2rem;}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════
     QUESTION SELECTOR SCREEN
═══════════════════════════════ -->
<div class="q-screen" id="qScreen">
  <div class="q-title">INTUITY · Essay Practice</div>
  <div class="q-heading">PICK A<br>QUESTION</div>

  <div class="type-tabs" id="typeTabs"></div>
  <div class="q-list" id="qList"></div>
</div>

<!-- ═══════════════════════════════
     BANNER STAGE
═══════════════════════════════ -->
<div class="banner-stage" id="bannerStage">

  <!-- Side nav arrows -->
  <button class="swipe-prev" id="btnPrev" onclick="prevSentence()">←</button>
  <button class="swipe-next" id="btnNext" onclick="nextSentence()">→</button>

  <!-- Top row -->
  <div class="bs-toprow">
    <button class="bs-back" onclick="goBack()">← Questions</button>
    <div class="bs-qtext" id="bsQText"></div>
  </div>

  <!-- Progress dots -->
  <div class="bs-dots" id="bsDots"></div>

  <!-- THE BANNER CARD -->
  <div class="banner-card" id="bannerCard">
    <div class="bc-stripe" id="bcStripe"></div>
    <div class="bc-badge" id="bcBadge">01</div>
    <div class="bc-type-tag" id="bcTypeTag"></div>
    <div class="bc-body">
      <div class="bc-section-label" id="bcSectionLabel"></div>
      <div class="bc-key-phrase" id="bcKeyPhrase"></div>
      <div class="bc-rule" id="bcRule"></div>
      <div class="bc-sentence" id="bcSentence"></div>
    </div>
    <div class="bc-footer">
      <div class="bc-icon" id="bcIcon">✍️</div>
      <div class="bc-wave" id="bcWave">
        <div class="bc-wave-bar"></div>
        <div class="bc-wave-bar"></div>
        <div class="bc-wave-bar"></div>
        <div class="bc-wave-bar"></div>
        <div class="bc-wave-bar"></div>
        <div class="bc-wave-bar"></div>
        <div class="bc-wave-bar"></div>
      </div>
    </div>
    <div class="bc-bottom-line" id="bcBottomLine"></div>
  </div>

  <!-- Bottom progress + controls -->
  <div class="bs-bottom">
    <div class="bs-prog-track">
      <div class="bs-prog-fill" id="bsProgFill" style="width:0%"></div>
    </div>
    <div class="bs-controls">
      <span class="bs-counter" id="bsCounter">1 / 1</span>
      <div class="bs-btns">
        <button class="bs-btn primary" id="btnPlayPause" onclick="togglePlay()">▶ Play</button>
        <button class="bs-btn next-btn" id="btnNextCard" onclick="nextSentence()">Next →</button>
      </div>
    </div>
  </div>

  <div class="tap-hint">tap anywhere · swipe to navigate</div>
</div>

<!-- ═══════════════════════════════
     COMPLETE OVERLAY
═══════════════════════════════ -->
<div class="complete-overlay" id="completeOverlay">
  <div class="co-emoji">🏆</div>
  <div class="co-title">ESSAY<br>ABSORBED</div>
  <div class="co-sub" id="coSub">You heard every sentence of the model answer. That's how you build it into your memory.</div>
  <div class="co-btns">
    <button class="co-btn primary" onclick="replayAll()">↺ Replay</button>
    <button class="co-btn secondary" onclick="goBack()">← New Question</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════
   PRACTICE DATA
═══════════════════════════════════ */
const PRACTICE_DATA = {
  'for-against': {
    label:'For & Against',
    questions:[
      { question:"Should school uniforms be compulsory?", answer:[
        {text:"In my view, this is a topic that divides opinion quite sharply.",phrase:"In my view,",phraseType:"intro",label:"Opening Phrase",icon:"🌍"},
        {text:"First of all, the way I see it, the key benefit is that uniforms reduce pressure on students to wear expensive or fashionable clothes.",phrase:"First of all, the way I see it, the key benefit is that",phraseType:"body",label:"Advantage 1",icon:"✅"},
        {text:"Everyone looks the same, so no one feels left out.",phrase:null,phraseType:"plain",label:"Supporting Detail",icon:"💬"},
        {text:"Secondly, another clear benefit is that uniforms help create a sense of belonging and school identity.",phrase:"Secondly, another clear benefit is that",phraseType:"body",label:"Advantage 2",icon:"✅"},
        {text:"On the other hand, the main drawback is that uniforms take away students' freedom of self-expression.",phrase:"On the other hand, the main drawback is that",phraseType:"body",label:"Disadvantage",icon:"⚖️"},
        {text:"Clothes are one of the ways teenagers define who they are.",phrase:null,phraseType:"plain",label:"Supporting Detail",icon:"💬"},
        {text:"Overall, I believe the benefits of school uniforms outweigh the drawbacks, especially in large, diverse schools.",phrase:"Overall, I believe the benefits outweigh the drawbacks",phraseType:"conclusion",label:"Conclusion",icon:"🏁"}
      ]},
      { question:"Are video games good or bad for young people?", answer:[
        {text:"From my perspective, video games are far more complex than people often assume.",phrase:"From my perspective,",phraseType:"intro",label:"Opening Phrase",icon:"🌍"},

/* ═══════════════════════════════════
   SECTION COLOUR MAP
═══════════════════════════════════ */
const PALETTE = {
  intro:      { stripe:'#3d9e95', badge:'#3d9e95', rule:'#3d9e95', prog:'#3d9e95', label:'#3d9e95' },
  body:       { stripe:'#e8723a', badge:'#e8723a', rule:'#e8723a', prog:'#e8723a', label:'#e8723a' },
  conclusion: { stripe:'#8b7ba8', badge:'#8b7ba8', rule:'#8b7ba8', prog:'#8b7ba8', label:'#8b7ba8' },
  plain:      { stripe:'#6b7280', badge:'#6b7280', rule:'#6b7280', prog:'#6b7280', label:'#6b7280' }
};
function getPalette(phraseType){ return PALETTE[phraseType] || PALETTE.plain; }

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
let currentTypeKey = 'for-against';
let currentQ = null;
let currentIdx = 0;
let isPlaying = false;
let synth = window.speechSynthesis;
let voice = null;
let playTimer = null;

/* ═══════════════════════════════════
   VOICE
═══════════════════════════════════ */
function loadVoice(){
  const load = ()=>{
    const v = synth.getVoices();
    voice = v.find(x=>x.name==='Google UK English Male')
          ||v.find(x=>x.name==='Daniel')
          ||v.find(x=>x.lang==='en-GB')
          ||v.find(x=>x.lang.startsWith('en'))
          ||v[0]||null;
  };
  if(synth.getVoices().length) load();
  else synth.onvoiceschanged = load;
}

/* ═══════════════════════════════════
   BUILD QUESTION SELECTOR
═══════════════════════════════════ */
function buildSelector(){
  // Type tabs
  const tabs = document.getElementById('typeTabs');
  tabs.innerHTML = Object.entries(PRACTICE_DATA).map(([k,v])=>
    `<button class="type-tab${k===currentTypeKey?' active':''}" onclick="switchType('${k}')">${v.label}</button>`
  ).join('');

  // Question list
  const list = document.getElementById('qList');
  const qs = PRACTICE_DATA[currentTypeKey].questions;
  list.innerHTML = qs.map((q,i)=>
    `<div class="q-item" onclick="startQuestion(${i})">
       <span class="q-item-num">Q${i+1}</span>
       ${q.question}
     </div>`
  ).join('');
}

function switchType(key){
  currentTypeKey = key;
  buildSelector();
}

/* ═══════════════════════════════════
   START A QUESTION
═══════════════════════════════════ */
function startQuestion(idx){
  currentQ = PRACTICE_DATA[currentTypeKey].questions[idx];
  currentIdx = 0;
  isPlaying = false;

  // Hide selector, show stage
  document.getElementById('qScreen').classList.add('hidden');
  document.getElementById('bannerStage').classList.add('active');

  // Set question text in topbar
  document.getElementById('bsQText').textContent = currentQ.question;

  // Build dots
  buildDots();

  // Show first card
  showCard(0, 'right');
}

function goBack(){
  stopPlay();
  document.getElementById('bannerStage').classList.remove('active');
  document.getElementById('completeOverlay').classList.remove('show');
  document.getElementById('qScreen').classList.remove('hidden');
  // Reset card state
  const card = document.getElementById('bannerCard');
  card.classList.remove('visible','exit-left','exit-right');
}

/* ═══════════════════════════════════
   BUILD DOTS
═══════════════════════════════════ */
function buildDots(){
  const c = document.getElementById('bsDots');
  const sentences = currentQ.answer;
  c.innerHTML = sentences.map((s,i)=>{
    const pal = getPalette(s.phraseType);
    return `<div class="bs-dot" id="dot${i}" style="background:${pal.stripe};color:${pal.stripe}"></div>`;
  }).join('');
}

function updateDots(active){
  currentQ.answer.forEach((_,i)=>{
    const d = document.getElementById('dot'+i);
    if(!d) return;
    d.classList.toggle('active', i===active);
    d.classList.toggle('done', i<active);
  });
}

/* ═══════════════════════════════════
   SHOW A CARD
═══════════════════════════════════ */
function showCard(idx, direction='right'){
  if(!currentQ) return;
  const sentences = currentQ.answer;
  if(idx < 0 || idx >= sentences.length) return;

  currentIdx = idx;
  const s = sentences[idx];
  const pal = getPalette(s.phraseType);

  // Exit current card
  const card = document.getElementById('bannerCard');
  card.classList.remove('visible');
  card.classList.add(direction==='right'?'exit-left':'exit-right');

  setTimeout(()=>{
    card.classList.remove('exit-left','exit-right');

    // ── Colour everything ──
    document.getElementById('bcStripe').style.background = pal.stripe;
    document.getElementById('bcBadge').style.background = pal.badge;
    document.getElementById('bcBadge').textContent = String(idx+1).padStart(2,'0');
    document.getElementById('bcRule').style.background = pal.rule;
    document.getElementById('bcBottomLine').style.background = pal.stripe;
    document.getElementById('bcSectionLabel').textContent = s.label || '';
    document.getElementById('bcSectionLabel').style.color = pal.label;
    document.getElementById('bcIcon').textContent = s.icon || '✍️';
    document.querySelectorAll('.bc-wave-bar').forEach(b=>b.style.background=pal.stripe);

    // ── Type tag ──
    const tagEl = document.getElementById('bcTypeTag');
    tagEl.textContent = s.label || s.phraseType;
    tagEl.className = 'bc-type-tag tag-'+(s.phraseType||'plain');

    // ── Key phrase (animated word-by-word) ──
    const kpEl = document.getElementById('bcKeyPhrase');
    if(s.phrase){
      // Split phrase into words, each animates in
      const words = s.phrase.split(' ');
      kpEl.innerHTML = words.map((w,wi)=>
        `<span class="kw" style="transition-delay:${wi*55}ms">${w}&nbsp;</span>`
      ).join('');
      // If no phrase: show the start of the sentence large
    } else {
      // Plain sentence — show first 6 words large as the "headline"
      const allWords = s.text.split(' ');
      const headWords = allWords.slice(0,6);
      const rest = allWords.slice(6).join(' ');
      kpEl.innerHTML = headWords.map((w,wi)=>
        `<span class="kw" style="transition-delay:${wi*55}ms">${w}&nbsp;</span>`
      ).join('');
    }

    // ── Full sentence (appears after phrase) ──
    const sentEl = document.getElementById('bcSentence');
    sentEl.classList.remove('in');
    // Highlight the phrase within the sentence
    if(s.phrase){
      const escaped = s.phrase.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const highlighted = s.text.replace(
        new RegExp(`(${escaped})`,'i'),
        `<span class="ph-highlight">$1</span>`
      );
      sentEl.innerHTML = highlighted;
    } else {
      sentEl.textContent = s.text;
    }

    // ── Progress bar ──
    const pct = Math.round(((idx+1)/sentences.length)*100);
    document.getElementById('bsProgFill').style.width = pct+'%';
    document.getElementById('bsProgFill').style.background = pal.prog;
    document.getElementById('bsCounter').textContent = `${idx+1} / ${sentences.length}`;

    // ── Nav buttons ──
    document.getElementById('btnPrev').disabled = idx===0;
    document.getElementById('btnNext').disabled = idx===sentences.length-1;
    const nxtCard = document.getElementById('btnNextCard');
    if(idx===sentences.length-1){
      nxtCard.textContent = 'Finish ✓';
      nxtCard.onclick = showComplete;
    } else {
      nxtCard.textContent = 'Next →';
      nxtCard.onclick = nextSentence;
    }

    // ── Wave ──
    document.getElementById('bcWave').classList.remove('paused');

    // ── Slide card in ──
    card.classList.remove('visible');
    void card.offsetWidth;

    requestAnimationFrame(()=>{
      card.classList.add('visible');
      // Animate phrase words in
      setTimeout(()=>{
        card.querySelectorAll('.kw').forEach(kw=>kw.classList.add('in'));
      }, 80);
      // Animate full sentence in after phrase
      setTimeout(()=>{
        sentEl.classList.add('in');
      }, 350);
    });

    // Update dots
    updateDots(idx);

  }, 220); // wait for exit anim
}

/* ═══════════════════════════════════
   NAVIGATION
═══════════════════════════════════ */
function nextSentence(){
  if(!currentQ) return;
  if(currentIdx >= currentQ.answer.length-1){ showComplete(); return; }
  stopPlay();
  showCard(currentIdx+1, 'right');
}

function prevSentence(){
  if(currentIdx <= 0) return;
  stopPlay();
  showCard(currentIdx-1, 'left');
}

/* ═══════════════════════════════════
   AUTO PLAY
═══════════════════════════════════ */
function togglePlay(){
  if(isPlaying){ stopPlay(); return; }
  startPlay();
}

async function startPlay(){
  if(!currentQ) return;
  isPlaying = true;
  const btn = document.getElementById('btnPlayPause');
  btn.textContent = '⏸ Pause';

  const sentences = currentQ.answer;
  for(let i = currentIdx; i < sentences.length; i++){
    if(!isPlaying) break;
    showCard(i, i===currentIdx?'right':'right');
    await wait(500); // let card animate in
    if(!isPlaying) break;
    await speakText(sentences[i].text);
    if(!isPlaying) break;
    await wait(700);
  }

  if(isPlaying){
    stopPlay();
    showComplete();
  }
}

function stopPlay(){
  isPlaying = false;
  synth.cancel();
  clearTimeout(playTimer);
  const btn = document.getElementById('btnPlayPause');
  if(btn) btn.textContent = '▶ Play';
  document.getElementById('bcWave').classList.add('paused');
}

function speakText(text){
  return new Promise(resolve=>{
    if(!isPlaying){ resolve(); return; }
    synth.cancel();
    document.getElementById('bcWave').classList.remove('paused');
    setTimeout(()=>{
      if(!isPlaying){ resolve(); return; }
      const utt = new SpeechSynthesisUtterance(text);
      utt.voice = voice;
      utt.rate = 0.86;
      utt.pitch = 1.05;
      utt.volume = 1;
      utt.onend = ()=>resolve();
      utt.onerror = ()=>resolve();
      synth.speak(utt);
    }, 100);
  });
}

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ═══════════════════════════════════
   COMPLETE
═══════════════════════════════════ */
function showComplete(){
  stopPlay();
  document.getElementById('completeOverlay').classList.add('show');
  // Particles
  const cols = ['#3d9e95','#e8723a','#8b7ba8','#C9A961','#ffffff'];
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      const p = document.createElement('div');
      p.className='pt';
      p.style.cssText=`
        left:${10+Math.random()*80}vw;
        top:${20+Math.random()*60}vh;
        background:${cols[Math.floor(Math.random()*cols.length)]};
        width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-duration:${0.7+Math.random()*0.6}s;
        animation-delay:${Math.random()*0.3}s;
      `;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),1500);
    }, i*60);
  }
}

function replayAll(){
  document.getElementById('completeOverlay').classList.remove('show');
  currentIdx = 0;
  showCard(0,'right');
  startPlay();
}

/* ═══════════════════════════════════
   SWIPE
═══════════════════════════════════ */
let _tx=0, _ty=0;
document.addEventListener('touchstart',e=>{
  _tx=e.changedTouches[0].screenX;
  _ty=e.changedTouches[0].screenY;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!document.getElementById('bannerStage').classList.contains('active')) return;
  const dx=e.changedTouches[0].screenX-_tx;
  const dy=Math.abs(e.changedTouches[0].screenY-_ty);
  if(Math.abs(dx)>50 && dy<60){
    if(dx<0) nextSentence();
    else prevSentence();
  }
});

/* Tap on card to advance */
document.getElementById('bannerCard').addEventListener('click',()=>{
  if(!isPlaying) nextSentence();
});

/* ═══════════════════════════════════
   KEYBOARD
═══════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') nextSentence();
  if(e.key==='ArrowLeft') prevSentence();
  if(e.key===' '){ e.preventDefault(); togglePlay(); }
  if(e.key==='Escape') goBack();
});

/* ═══════════════════════════════════
   BOOT
═══════════════════════════════════ */
loadVoice();
buildSelector();
</script>
