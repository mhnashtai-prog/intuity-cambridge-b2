<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Paragraph Builder — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS — identical to Question / Plan ── */
:root{
  --bg:#f0efec;
  --ink:#111111;
  --white:#ffffff;
  --c-teal:#3d9e95;   --c-teal-lt:#e4f4f2;   --c-teal-mid:#8dccc7;
  --c-coral:#e8723a;  --c-coral-lt:#fdf0ea;  --c-coral-mid:#f5ad87;
  --c-purple:#7b5ea7; --c-purple-lt:#f0ecf8; --c-purple-mid:#b9a3d3;
  --c-rose:#c94f6d;   --c-rose-lt:#faedf1;   --c-rose-mid:#e89db0;
  --c-gold:#c08b2f;   --c-gold-lt:#fdf6e3;   --c-gold-mid:#e4c073;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}

/* ── SHELL — same as Question / Plan ── */
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}

/* ── VIEW TOGGLE ── */
.view-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0.5rem 1.25rem;border-bottom:1px solid rgba(0,0,0,0.06);background:rgba(240,239,236,0.8)}
.vb-pill{display:flex;background:rgba(0,0,0,0.05);border-radius:2rem;padding:0.2rem}
.vb-btn{background:transparent;border:none;padding:0.35rem 1.25rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s}
.vb-btn.on{background:var(--ink);color:#fff}

/* ── CONTENT AREA ── */
.stage{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1.25rem;display:flex;flex-direction:column;align-items:center;gap:0.75rem}
.stage::-webkit-scrollbar{width:4px}
.stage::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px}

/* ── QUESTION BANNER ── */
.q-banner{width:100%;max-width:480px;background:rgba(61,158,149,0.07);border-left:4px solid var(--c-teal);border-radius:0 0.75rem 0.75rem 0;padding:0.7rem 1rem}
.q-label{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:var(--c-teal);margin-bottom:0.2rem}
.q-text{font-family:'Instrument Sans',sans-serif;font-size:0.82rem;font-style:italic;color:rgba(0,0,0,0.6);line-height:1.5}

/* ── SENTENCE CARD ── */
.read-wrap{width:100%;max-width:480px}
.read-banner{width:100%;background:var(--white);border-radius:1.3rem;overflow:hidden;box-shadow:3px 5px 0 rgba(0,0,0,0.06),0 16px 40px rgba(0,0,0,0.1);animation:bannerIn 0.35s cubic-bezier(0.22,1,0.36,1) both}
@keyframes bannerIn{from{opacity:0;transform:translateY(8px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}

.sent-row{display:flex;align-items:stretch;border-bottom:1px solid rgba(0,0,0,0.05)}
.sent-row:last-of-type{border-bottom:none}
.sent-row.new-row{animation:rowIn 0.35s cubic-bezier(0.22,1,0.36,1) both}
@keyframes rowIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.sent-strip{width:4px;flex-shrink:0}
.sent-num{flex-shrink:0;width:32px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Sans',sans-serif;font-size:0.75rem;font-weight:400;color:rgba(0,0,0,0.14)}
.sent-content{flex:1;padding:0.825rem 1rem 0.825rem 0.2rem}
.sent-label{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:0.18rem}
.sent-text{font-family:'Instrument Sans',sans-serif;font-size:0.9rem;font-weight:400;line-height:1.6;color:rgba(0,0,0,0.82)}

/* linking + opener highlights */
.lw{font-weight:700;color:var(--c-coral)}
.ow{font-weight:700;color:var(--c-teal)}

/* section colours */
.sc-teal   .sent-strip{background:var(--c-teal)}  .sc-teal   .sent-label{color:var(--c-teal)}
.sc-coral  .sent-strip{background:var(--c-coral)} .sc-coral  .sent-label{color:var(--c-coral)}
.sc-purple .sent-strip{background:var(--c-purple)}.sc-purple .sent-label{color:var(--c-purple)}
.sc-gold   .sent-strip{background:var(--c-gold)}  .sc-gold   .sent-label{color:var(--c-gold)}

/* pending */
.sent-row.pending .sent-strip{background:rgba(0,0,0,0.05)}
.sent-row.pending .sent-label{color:rgba(0,0,0,0.15)}
.sent-row.pending .sent-text{color:rgba(0,0,0,0.18)}

/* card footer */
.read-foot{display:flex;align-items:center;justify-content:space-between;padding:0.55rem 1rem;border-top:1px solid rgba(0,0,0,0.05)}
.foot-counter{font-family:'Instrument Sans',sans-serif;font-size:0.68rem;color:rgba(0,0,0,0.25)}
.foot-btn{background:transparent;border:1px solid rgba(0,0,0,0.1);padding:0.3rem 0.875rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.38);cursor:pointer;transition:all 0.2s}
.foot-btn:hover:not(:disabled){border-color:var(--c-teal);color:var(--c-teal)}
.foot-btn:disabled{opacity:0.2;cursor:not-allowed}
.foot-btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}
.foot-btn.primary:hover{background:rgba(0,0,0,0.8)}

/* state */
.state-msg{font-family:'Instrument Sans',sans-serif;font-size:0.9rem;color:rgba(0,0,0,0.3);text-align:center;padding:3rem 1rem;line-height:1.6}
.state-msg a{color:var(--c-teal)}

/* ── FOOTER NAV — identical to Question / Plan ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

@media(max-width:768px){
  .stage{padding:0.75rem 1rem}
  .nb{padding:0.3rem 0.6rem;font-size:0.55rem;min-height:26px}
}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <a href="../../../index.html?openModal=writing&submenu=essays" class="back-link">← Essays</a>
    <span class="brand">INTUITY</span>
    <div style="width:28px"></div>
  </div>

  <div class="view-bar">
    <div class="vb-pill">
      <button class="vb-btn on">Read</button>
      <button class="vb-btn" onclick="goToBuild()">Build</button>
    </div>
  </div>

  <div class="stage" id="contentArea">
    <div class="state-msg">Loading…</div>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb" onclick="navTo('question')">Question</button>
      <button class="nb" onclick="navTo('plan')">Plan</button>
      <button class="nb" onclick="navTo('model')">Model</button>
      <button class="nb on">Build</button>
      <button class="nb" onclick="navTo('sample')">Sample</button>
    </div>
  </div>

</div>
<script>
/* ── LINKING WORDS ── */
const LINK_WORDS=['For example','For instance','However','Therefore','Thus','Hence','As a result','Consequently','Moreover','Furthermore','In addition','Nevertheless','Nonetheless','On the other hand','In contrast','Similarly','Likewise','In fact','Indeed','Specifically','This is because','This happens because','Given that','Since','Although','While','Whereas','By comparison','Compared to','Unlike','In other words','That is to say','Put simply','To say it another way'];

/* ── MOVE CLASSIFIER ── */
const MOVE_DETECT=[
  {label:'Reason',sc:'sc-teal',re:/^(this is because|this happens because|given that|since\b)/i},
  {label:'Example',sc:'sc-coral',re:/^(for example|for instance|to illustrate)/i},
  {label:'Result',sc:'sc-gold',re:/^(as a result|therefore|thus|consequently|hence)/i},
  {label:'Contrast',sc:'sc-purple',re:/^(however|on the other hand|in contrast|nevertheless)/i},
  {label:'Reformulation',sc:'sc-teal',re:/^(in other words|put simply|to say it another way)/i},
];

/* ── OPENER PHRASES ── */
const OPENER_STARTS=['The main advantage','One key benefit','It is clear that','While there are many','One of the most','One strong argument','Furthermore','Moreover','In addition','To begin with','Firstly','Secondly','Additionally','What is more'];

/* ── STATE ── */
let buildsData=null,essayId=null,question='',sentences=[],revealed=0;

/* ── LOAD ── */
async function load(){
  const p=new URLSearchParams(window.location.search);
  essayId=p.get('essay')||sessionStorage.getItem('currentEssayId');
  question=sessionStorage.getItem('currentEssayQuestion')||'';
  try{
    const r=await fetch('data/samples-build.json');
    buildsData=await r.json();
  }catch(e){
    show('<div class="state-msg">⚠️ Could not load paragraph data.</div>');
    return;
  }
  if(!essayId||!buildsData[essayId]){
    show(`<div class="state-msg">No essay selected.<br>Please start from the <a href="essay-question.html">question selector</a>.</div>`);
    return;
  }
  buildSentences();render();
}

function buildSentences(){
  const essay=buildsData[essayId];
  const bodyPara=essay[1];
  const raw=bodyPara?bodyPara.sentences:[];
  sentences=raw.map((text,i)=>{
    if(i===0)return{text,label:'Topic Sentence',sc:'sc-teal'};
    const move=MOVE_DETECT.find(m=>m.re.test(text.trim()));
    return{text,label:move?move.label:'Supporting',sc:move?move.sc:'sc-purple'};
  });
  revealed=1;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function hlText(text,idx){
  const escaped=esc(text);
  if(idx===0){
    for(const op of OPENER_STARTS){
      if(text.startsWith(op)){
        return `<span class="ow">${esc(op)}</span>${hlLinks(esc(text.slice(op.length)))}`;
      }
    }
  }
  return hlLinks(escaped);
}

function hlLinks(escaped){
  const p=new RegExp(`(${LINK_WORDS.join('|')})`, 'gi');
  return escaped.replace(p,'<span class="lw">$1</span>');
}

function show(html){document.getElementById('contentArea').innerHTML=html;}

function render(){
  const prevDis=revealed<=1?'disabled':'';
  const nextDis=revealed>=sentences.length?'disabled':'';
  const isLast=revealed>=sentences.length;
  let rows='';
  sentences.forEach((s,i)=>{
    const isPending=i>=revealed;
    const isNew=i===revealed-1&&revealed>1;
    const scCls=isPending?'':s.sc;
    rows+=`
      <div class="sent-row ${scCls} ${isPending?'pending':''} ${isNew?'new-row':''}">
        <div class="sent-strip"></div>
        <div class="sent-num">${String(i+1).padStart(2,'0')}</div>
        <div class="sent-content">
          <div class="sent-label">${isPending?'—':s.label}</div>
          <div class="sent-text">${isPending?'· · ·':hlText(s.text,i)}</div>
        </div>
      </div>`;
  });
  show(`
    <div class="q-banner">
      <div class="q-label">Body Paragraph 1</div>
      <div class="q-text">${question?`"${esc(question)}"`:''}</div>
    </div>
    <div class="read-wrap">
      <div class="read-banner">
        ${rows}
        <div class="read-foot">
          <button class="foot-btn" onclick="step(-1)" ${prevDis}>← Back</button>
          <span class="foot-counter">${revealed} / ${sentences.length}</span>
          <button class="foot-btn primary" onclick="step(1)" ${nextDis}>
            ${isLast?'✓ Done':'Next →'}
          </button>
        </div>
      </div>
    </div>`);
}

function step(dir){
  const next=revealed+dir;
  if(next<1||next>sentences.length)return;
  revealed=next;render();
}

function goToBuild(){
  if(essayId)sessionStorage.setItem('currentEssayId',essayId);
  if(question)sessionStorage.setItem('currentEssayQuestion',question);
  window.location.href='essay-build-deep.html';
}

function navTo(page){
  const map={question:'essay-question.html',plan:'essay-plan.html',model:'essay-model.html',sample:'essay-sample.html'};
  if(map[page])window.location.href=map[page];
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')step(1);
  if(e.key==='ArrowLeft')step(-1);
});

load();
</script>
</body>
</html>
