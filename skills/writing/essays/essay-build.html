<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Build — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;--rule:rgba(0,0,0,0.07);
  --acc:#c94f6d; /* build = rose */
  --gold:#C9A961;--gold-d:#9B7D3A;--gold-l:#E8D4A0;
  --settled:rgba(13,13,13,0.82);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.topic-label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-align:right;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}

/* ── STAGE ── */
.stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* ── FOOTER NAV ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.foot.hidden{visibility:hidden;opacity:0;pointer-events:none;height:0;padding:0;border:none;overflow:hidden}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ── POSTER CARD ── */
.poster{
  width:min(460px,92vw);height:min(580px,84vh);
  background:var(--white);border-radius:1.4rem;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
  box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,4px 6px 0 rgba(0,0,0,0.06),0 20px 50px rgba(0,0,0,0.18),0 4px 12px rgba(0,0,0,0.1);
  animation:cardUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardUp{
  0%{opacity:0;transform:scale(0.92) translateY(20px)}
  65%{opacity:1;transform:scale(1.01) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

/* ── FLAG ── */
.flag{position:absolute;top:-2px;left:1.8rem;width:44px;z-index:10;display:flex;flex-direction:column;align-items:center}
.flag-body{width:100%;padding:0.35rem 0 0.25rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.1rem;position:relative;background:var(--acc)}
.flag-num{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.02em}
.flag-label{font-family:'Barlow Condensed',sans-serif;font-size:0.38rem;font-weight:900;color:rgba(255,255,255,0.75);letter-spacing:0.14em;text-transform:uppercase;line-height:1}
.flag-body::after{content:'';position:absolute;bottom:-7px;left:0;right:0;height:8px;background:var(--acc);clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%)}

/* ── CARD HEADER (question + controls) ── */
.card-head{
  flex-shrink:0;padding:2.4rem 1rem 0.5rem;
  display:flex;flex-direction:column;gap:0.4rem;
  border-bottom:1px solid rgba(0,0,0,0.06);
}

/* Question banner */
.question-banner{display:none;align-items:baseline;gap:0.5rem;padding:0 0.2rem}
.question-banner.visible{display:flex}
.qb-label{font-family:'Barlow Condensed',sans-serif;font-size:0.46rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:var(--acc);opacity:0.7;white-space:nowrap;flex-shrink:0}
.qb-text{font-family:'Instrument Sans',sans-serif;font-size:0.72rem;font-weight:500;color:rgba(0,0,0,0.55);line-height:1.4}

/* Controls row */
.controls-row{display:flex;align-items:center;gap:0.5rem}
.bar-track{flex:1;height:3px;background:rgba(0,0,0,0.07);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:var(--acc);border-radius:2px;transition:width 0.55s cubic-bezier(0.4,0,0.2,1)}
.progress-label{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;color:rgba(0,0,0,0.28);white-space:nowrap;transition:color 0.3s}
.progress-label.done{color:var(--acc)}

/* Essay select */
.essay-select-wrap{display:flex;align-items:center;gap:0.35rem}
.essay-select-wrap label{font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.28);white-space:nowrap}
.essay-select{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;border:1px solid rgba(0,0,0,0.15);border-radius:6px;padding:0.2rem 0.45rem;background:#fff;color:var(--ink);cursor:pointer;outline:none;transition:border-color 0.2s}
.essay-select:focus{border-color:var(--acc)}

/* View toggle */
.view-toggle{display:flex;align-items:center;background:rgba(0,0,0,0.05);border-radius:2rem;padding:0.18rem;gap:0.08rem;flex-shrink:0}
.vt-btn{background:transparent;border:none;padding:0.22rem 0.6rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.54rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.vt-btn.active{background:var(--ink);color:#fff}
.vt-btn:hover:not(.active){color:rgba(0,0,0,0.6)}

/* Menu */
.menu-wrap{position:relative;flex-shrink:0}
.menu-btn{background:rgba(0,0,0,0.06);border:none;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background 0.18s}
.menu-btn:hover{background:rgba(0,0,0,0.12)}
.menu-dots{display:flex;gap:3px}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:rgba(0,0,0,0.45)}
.menu-dropdown{position:absolute;top:calc(100% + 0.4rem);right:0;background:#fff;border-radius:0.75rem;box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.12);min-width:170px;padding:0.4rem;z-index:300;display:none}
.menu-dropdown.open{display:block;animation:menuFade 0.18s ease-out}
@keyframes menuFade{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.menu-item{padding:0.55rem 0.75rem;border-radius:0.5rem;font-family:'Barlow',sans-serif;font-size:0.75rem;font-weight:600;color:rgba(0,0,0,0.65);cursor:pointer;transition:all 0.15s}
.menu-item:hover{background:rgba(0,0,0,0.04)}

/* ── TEXT CANVAS ── */
.report-canvas{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1.2rem 1.5rem;display:none}
.report-canvas.active{display:block}
.report-canvas::-webkit-scrollbar{width:3px}
.report-canvas::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.75rem;font-size:0.82rem;color:rgba(0,0,0,0.28);text-align:center;line-height:1.6}

.section-block{margin-bottom:1.5rem;transition:opacity 0.4s}
.section-block+.section-block{padding-top:1.5rem;border-top:1.5px solid rgba(0,0,0,0.05)}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;text-transform:uppercase;letter-spacing:0.14em;color:rgba(0,0,0,0.2);margin-bottom:0.6rem;display:flex;align-items:center;gap:0.4rem;transition:color 0.4s}
.section-label .check{opacity:0;transform:scale(0);transition:opacity 0.4s,transform 0.4s cubic-bezier(0.34,1.56,0.64,1);color:var(--acc)}
.section-block.complete .section-label{color:var(--acc)}
.section-block.complete .section-label .check{opacity:1;transform:scale(1)}
.prose{font-family:'DM Sans',sans-serif;font-size:0.9rem;line-height:2;color:var(--settled);font-weight:400;display:inline}
.prose-wrap{line-height:2}
.anchor-text{color:var(--ink);font-weight:500}
.placed-sentence{display:inline;background:rgba(201,169,97,0.12);border-bottom:1.5px solid var(--gold);padding-bottom:1px;color:rgba(0,0,0,0.82);animation:placeIn 0.45s cubic-bezier(0.22,1,0.36,1) both}
.link-word{color:#4a90d9;font-style:normal}
@keyframes placeIn{from{opacity:0;background:rgba(201,169,97,0.45)}to{opacity:1;background:rgba(201,169,97,0.12)}}

/* DOTS TRIGGER */
.dots-trigger{--dt-accent:#C9A961;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.13);background:#fff;cursor:pointer;vertical-align:middle;margin-left:0.45rem;gap:2.5px;transition:border-color 0.18s,background 0.18s,transform 0.15s,box-shadow 0.18s;flex-shrink:0;position:relative;top:-1px}
.dots-trigger:hover{border-color:var(--dt-accent);background:var(--dt-accent);transform:scale(1.15);box-shadow:0 3px 14px rgba(0,0,0,0.18)}
.dots-trigger:active{transform:scale(0.95);box-shadow:none}
.dots-trigger .dt-dot{width:3px;height:3px;border-radius:50%;background:rgba(0,0,0,0.4);transition:background 0.18s}
.dots-trigger:hover .dt-dot{background:#fff}
.part-chip{display:inline-flex;align-items:center;height:16px;padding:0 0.4rem;border-radius:3px;background:rgba(0,0,0,0.05);font-family:'Barlow Condensed',sans-serif;font-size:0.44rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.35);vertical-align:middle;margin-left:0.45rem;position:relative;top:-1px}
.dots-trigger.pending{opacity:0.28;pointer-events:none}

/* ── ACCENT BAR ── */
.accent-bar{height:4px;background:var(--acc);flex-shrink:0;border-radius:0 0 1.4rem 1.4rem;opacity:0.7}

/* ══════════════════════════════
   INFOGRAPHIC MODAL — unchanged
══════════════════════════════ */
.inf-backdrop{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0);pointer-events:none;transition:background 0.25s ease}
.inf-backdrop.active{background:rgba(0,0,0,0.55);pointer-events:all}
.inf-modal{position:fixed;left:50%;top:50%;z-index:700;transform:translate(-50%,-50%) scale(0.93);opacity:0;pointer-events:none;transition:opacity 0.22s cubic-bezier(0.4,0,0.2,1),transform 0.26s cubic-bezier(0.34,1.2,0.64,1);width:min(480px,calc(100vw - 2rem));border-radius:1.25rem;overflow:hidden;background:#fff;box-shadow:8px 14px 0 rgba(0,0,0,0.45),0 32px 72px rgba(0,0,0,0.65)}
.inf-modal.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
.inf-head{position:relative;overflow:hidden;padding:1.4rem 1.6rem 1.25rem}
.inf-ghost{position:absolute;right:-0.5rem;bottom:-1.1rem;font-family:'Barlow Condensed',sans-serif;font-size:clamp(6.5rem,20vw,9rem);font-weight:900;line-height:1;color:rgba(255,255,255,0.18);letter-spacing:-0.05em;pointer-events:none;user-select:none}
.inf-step{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.65);display:block;margin-bottom:0.35rem}
.inf-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.9rem,5.5vw,2.6rem);font-weight:900;letter-spacing:0.03em;text-transform:uppercase;color:#fff;line-height:1}
.inf-sublabel-row{display:flex;align-items:center;gap:0.5rem;margin-top:0.55rem}
.inf-sublabel-badge{display:inline-flex;align-items:center;height:20px;padding:0 0.6rem;border-radius:4px;background:rgba(255,255,255,0.22);font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:#fff}
.inf-part-indicator{display:flex;gap:4px}
.inf-part-pip{width:18px;height:3px;border-radius:2px;background:rgba(255,255,255,0.25)}
.inf-part-pip.active{background:rgba(255,255,255,0.9)}
.inf-close{position:absolute;top:0.85rem;right:0.85rem;background:rgba(255,255,255,0.18);border:none;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.65rem;color:#fff;z-index:2;transition:background 0.18s}
.inf-close:hover{background:rgba(255,255,255,0.35)}
.inf-body{padding:1.1rem 1.5rem 1.35rem;max-height:calc(100vh - 16rem);overflow-y:auto;-webkit-overflow-scrolling:touch}
.inf-prompt{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.28);display:block;margin-bottom:0.55rem}
.inf-anchor-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.46rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,0,0,0.22);display:block;margin-bottom:0.42rem}
.inf-anchor{font-family:'DM Sans',sans-serif;font-size:clamp(0.9rem,2.2vw,1.03rem);font-weight:500;line-height:1.78;color:#0d0d0d;border-bottom:1.5px solid rgba(0,0,0,0.07);padding-bottom:0.85rem;margin-bottom:0.75rem;display:block}
.inf-opts{display:flex;flex-direction:column;gap:0.42rem}
.inf-opt{display:block;width:100%;text-align:left;font-family:'DM Sans',sans-serif;font-size:clamp(0.82rem,1.9vw,0.92rem);line-height:1.65;color:rgba(0,0,0,0.72);padding:0.68rem 0.95rem;border:1.5px solid rgba(0,0,0,0.08);border-radius:0.65rem;background:#fff;cursor:pointer;transition:border-color 0.18s,background 0.18s,transform 0.13s;animation:optIn 0.35s cubic-bezier(0.22,1,0.36,1) both}
.inf-opt:nth-child(2){animation-delay:0.07s}
.inf-opt:nth-child(3){animation-delay:0.14s}
@keyframes optIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.inf-opt:hover{transform:translateX(3px)}
.inf-opt:active{transform:translateX(1px)}
.inf-letter{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.4);margin-right:0.5rem;flex-shrink:0;vertical-align:middle;transition:background 0.18s,color 0.18s}
@media(max-width:600px){
  .inf-modal{left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%!important;max-width:100%!important;border-radius:1.25rem 1.25rem 0 0!important;transform:translateY(110%)!important;transition:opacity 0.22s ease,transform 0.3s cubic-bezier(0.32,0.72,0,1)!important}
  .inf-modal.open{transform:translateY(0)!important;opacity:1}
}

/* ══════════════════════════════
   STAGES OVERLAY — stays dark
══════════════════════════════ */
.stages-overlay{position:fixed;inset:0;z-index:800;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;background:#0c0c0c;opacity:0;pointer-events:none;transition:opacity 0.32s ease;overflow:hidden}
.stages-overlay.active{opacity:1;pointer-events:all}
.so-stage-area{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(env(safe-area-inset-top),0.75rem) 1.25rem max(env(safe-area-inset-bottom),0.75rem);gap:0.75rem;box-sizing:border-box;overflow:hidden}
.so-topbar{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;flex-shrink:0}
.so-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;letter-spacing:0.38em;text-transform:uppercase;color:rgba(255,255,255,0.1)}
.so-close-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.65rem;color:rgba(255,255,255,0.3);transition:all 0.18s}
.so-close-btn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8)}
.so-nav-strip{width:100%;max-width:520px;display:flex;gap:0.35rem;flex-shrink:0;margin-bottom:0.5rem;flex-wrap:wrap;justify-content:center}
.so-nav-pip{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:0.3rem 0.7rem;font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.25);cursor:pointer;transition:all 0.18s;white-space:nowrap}
.so-nav-pip:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.25)}
.so-nav-pip.current{color:#fff;border-color:var(--pip-accent,#C9A961)}
.so-nav-pip.done{color:rgba(255,255,255,0.55);border-color:rgba(255,255,255,0.2)}
.stage-card{position:relative;width:min(500px,96vw);max-height:calc(100vh - 12rem);background:#fff;border-radius:20px;overflow:hidden;flex-shrink:1;display:flex;flex-direction:column;box-shadow:0 0 0 1px rgba(255,255,255,0.06),8px 14px 0 rgba(0,0,0,0.45),0 32px 72px rgba(0,0,0,0.65)}
.stage-card.card-enter{animation:cardSlide 0.42s cubic-bezier(0.34,1.2,0.64,1) both}
.stage-card.card-prev{animation:cardPrev 0.38s cubic-bezier(0.34,1.2,0.64,1) both}
@keyframes cardSlide{from{opacity:0;transform:translateX(52px) scale(0.95)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes cardPrev{from{opacity:0;transform:translateX(-52px) scale(0.95)}to{opacity:1;transform:translateX(0) scale(1)}}
.sc-header{position:relative;flex-shrink:0;padding:1.5rem 1.6rem 1.35rem;overflow:hidden;background:var(--sc-accent,#C9A961);transition:background 0.35s}
.sc-ghost-num{position:absolute;right:-0.6rem;bottom:-1.2rem;font-family:'Barlow Condensed',sans-serif;font-size:clamp(7rem,24vw,9.5rem);font-weight:900;line-height:1;color:rgba(255,255,255,0.18);letter-spacing:-0.05em;pointer-events:none;user-select:none}
.sc-step-label{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;letter-spacing:0.24em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:0.45rem;display:block}
.sc-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,6vw,2.8rem);font-weight:900;letter-spacing:0.03em;text-transform:uppercase;color:#fff;line-height:1}
.sc-part-row{display:flex;align-items:center;gap:0.55rem;margin-top:0.6rem}
.sc-part-badge{display:inline-flex;align-items:center;height:19px;padding:0 0.55rem;border-radius:4px;background:rgba(255,255,255,0.2);font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:#fff}
.sc-part-pips{display:flex;gap:4px}
.sc-part-pip{width:18px;height:3px;border-radius:2px;background:rgba(255,255,255,0.25)}
.sc-part-pip.active{background:rgba(255,255,255,0.9)}
.sc-body{flex:1;padding:0 1.6rem 0.6rem;display:flex;flex-direction:column;gap:0.5rem;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sc-anchor-label{font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,0,0,0.22);padding-top:0.9rem;display:block}
.sc-anchor{font-family:'DM Sans',sans-serif;font-size:clamp(1.02rem,2.8vw,1.2rem);font-weight:500;line-height:1.82;color:#0d0d0d;padding:0.35rem 0 0.85rem;border-bottom:1.5px solid rgba(0,0,0,0.07)}
.sc-prompt{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.28);padding-top:0.6rem;display:block}
.sc-opts-zone{display:flex;flex-direction:column;gap:0.45rem;padding:0.5rem 0 0.25rem}
.sc-opt-btn{display:block;width:100%;text-align:left;font-family:'DM Sans',sans-serif;font-size:clamp(0.82rem,2vw,0.93rem);line-height:1.65;color:rgba(0,0,0,0.72);padding:0.7rem 0.95rem;border:1.5px solid rgba(0,0,0,0.09);border-radius:10px;background:#fff;cursor:pointer;transition:border-color 0.18s,background 0.18s,transform 0.15s;animation:optIn 0.38s cubic-bezier(0.22,1,0.36,1) both}
.sc-opt-btn:nth-child(2){animation-delay:0.07s}
.sc-opt-btn:nth-child(3){animation-delay:0.14s}
.sc-opt-btn:hover{border-color:var(--sc-accent,#C9A961);background:rgba(201,169,97,0.05);transform:translateX(3px)}
.sc-opt-btn:active{transform:translateX(1px)}
.sc-opt-letter{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.4);margin-right:0.5rem;flex-shrink:0;vertical-align:middle;transition:background 0.18s,color 0.18s}
.sc-opt-btn:hover .sc-opt-letter{background:var(--sc-accent,#C9A961);color:#fff}
.sc-placed-row{display:flex;align-items:flex-start;gap:0.55rem;padding:0.75rem 0;animation:placeIn 0.38s cubic-bezier(0.22,1,0.36,1) both}
.sc-placed-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:0.42rem}
.sc-placed-text{font-family:'DM Sans',sans-serif;font-size:clamp(0.82rem,2vw,0.96rem);font-weight:400;line-height:1.72;color:rgba(0,0,0,0.62)}
.sc-dots-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 0 0.5rem}
.sc-dots-btn{display:flex;align-items:center;justify-content:center;gap:4px;width:52px;height:52px;border-radius:50%;border:2px solid var(--sc-btn-accent,rgba(0,0,0,0.18));background:#fff;cursor:pointer;transition:border-color 0.22s,background 0.22s,transform 0.18s,box-shadow 0.22s}
.sc-dots-btn:hover{background:var(--sc-btn-accent,#C9A961);border-color:var(--sc-btn-accent,#C9A961);transform:scale(1.12);box-shadow:0 4px 18px rgba(0,0,0,0.15)}
.sc-dots-btn:active{transform:scale(0.95);box-shadow:none}
.sc-dots-btn .sd-dot{width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,0.35);transition:background 0.22s}
.sc-dots-btn:hover .sd-dot{background:#fff}
.sc-dots-hint{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:rgba(0,0,0,0.22);margin-top:0.5rem;text-align:center}
.sc-foot{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.6rem 1.1rem;border-top:1px solid rgba(0,0,0,0.06)}
.sc-foot-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.2)}
.sc-foot-nav{display:flex;gap:0.5rem;align-items:center}
.sc-prev-btn,.sc-next-btn{display:flex;align-items:center;gap:0.38rem;padding:0.42rem 1rem;border-radius:50px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.3s,background 0.2s}
.sc-prev-btn{background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.5)}
.sc-prev-btn:hover{background:rgba(0,0,0,0.1)}
.sc-next-btn{background:#0d0d0d;color:#fff}
.sc-next-btn:hover{background:rgba(13,13,13,0.78)}
.sc-prev-btn:disabled,.sc-next-btn:disabled{opacity:0.2;cursor:default}
.so-bottom{width:min(500px,96vw);margin-top:0.75rem;display:flex;flex-direction:column;gap:0.4rem;flex-shrink:0;position:relative;z-index:1}
.so-progress-track{width:100%;height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.so-progress-fill{height:100%;border-radius:2px;transition:width 0.45s,background 0.35s}
.so-bottom-row{display:flex;align-items:center;justify-content:space-between}
.so-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.15)}
.so-hint{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.13)}

/* ── CELEBRATION ── */
.celebration{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.celebration.show{animation:celebPop 2.8s ease forwards}
@keyframes celebPop{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.celeb-pill{background:var(--ink);color:#fff;padding:1rem 2.25rem;border-radius:3rem;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;box-shadow:0 12px 48px rgba(0,0,0,0.35);animation:celebScale 0.45s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes celebScale{from{transform:scale(0.7)}to{transform:scale(1)}}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
  <a class="back-link" href="../../../index.html?openModal=writing">← Writing</a>
    <span class="brand">INTUITY</span>
    <span class="topic-label" id="topicLabel">Build</span>
  </div>

  <div class="stage">
    <div class="poster" id="posterCard">

      <div class="flag">
        <div class="flag-body">
          <span class="flag-num">04</span>
          <span class="flag-label">Build</span>
        </div>
      </div>

      <!-- Card header: question + controls -->
      <div class="card-head">
        <div class="question-banner" id="questionBanner">
          <span class="qb-label">Question</span>
          <span class="qb-text" id="qbText"></span>
        </div>
        <div class="controls-row">
          <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
          <div class="progress-label" id="progressLabel">select an essay</div>
          <div class="essay-select-wrap">
            <label for="essayPicker">Essay</label>
            <select class="essay-select" id="essayPicker" onchange="loadEssay(this.value)">
              <option value="">— select —</option>
            </select>
          </div>
          <div class="view-toggle">
            <button class="vt-btn active" id="vtText"   onclick="setView('text')">Text</button>
            <button class="vt-btn"        id="vtStages" onclick="setView('stages')">Stages</button>
          </div>
          <div class="menu-wrap">
            <div class="menu-btn" onclick="toggleMenu()">
              <div class="menu-dots"><span></span><span></span><span></span></div>
            </div>
            <div class="menu-dropdown" id="menuDropdown">
              <div class="menu-item" onclick="revealAll()">Reveal all sentences</div>
              <div class="menu-item" onclick="resetAll()">Reset essay</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Text canvas -->
      <div class="report-canvas active" id="reportCanvas">
        <div class="state-msg">Select an essay above,<br>then tap ••• to begin.</div>
      </div>

      <div class="accent-bar"></div>
    </div>
  </div>

  <div class="foot" id="footNav">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Question</button>
      <button class="nb"    onclick="navTo('plan')">Plan</button>
      <button class="nb"    onclick="navTo('model')">Model</button>
      <button class="nb on">Build</button>
      <button class="nb"    onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>

<!-- INFOGRAPHIC MODAL -->
<div class="inf-backdrop" id="infBackdrop" onclick="closeInfModal()"></div>
<div class="inf-modal" id="infModal">
  <div class="inf-head" id="infHead">
    <button class="inf-close" onclick="closeInfModal()">&#x2715;</button>
    <div class="inf-ghost" id="infGhost">01</div>
    <span class="inf-step" id="infStep">Section 1</span>
    <div class="inf-title" id="infTitle">Introduction</div>
    <div class="inf-sublabel-row" id="infSublabelRow" style="display:none">
      <span class="inf-sublabel-badge" id="infSublabelBadge"></span>
      <div class="inf-part-indicator" id="infPartIndicator"></div>
    </div>
  </div>
  <div class="inf-body">
    <span class="inf-prompt" id="infPrompt" style="display:none"></span>
    <span class="inf-anchor-lbl" id="infAnchorLbl">Anchor sentence</span>
    <span class="inf-anchor" id="infAnchor"></span>
    <div class="inf-opts" id="infOpts"></div>
  </div>
</div>

<!-- STAGES OVERLAY -->
<div class="stages-overlay" id="stagesOverlay">
  <div class="so-stage-area">
    <div class="so-topbar">
      <span class="so-brand">INTUITY — Build Essay</span>
      <button class="so-close-btn" onclick="closeStages()">&#x2715;</button>
    </div>
    <div class="so-nav-strip" id="soNavStrip"></div>
    <div class="stage-card" id="stageCard">
      <div class="sc-header" id="scHeader">
        <div class="sc-ghost-num" id="scGhostNum">01</div>
        <span class="sc-step-label" id="scStepLabel">Section 1</span>
        <div class="sc-title" id="scTitle">Introduction</div>
        <div class="sc-part-row" id="scPartRow" style="display:none">
          <span class="sc-part-badge" id="scPartBadge"></span>
          <div class="sc-part-pips" id="scPartPips"></div>
        </div>
      </div>
      <div class="sc-body">
        <span class="sc-anchor-label" id="scAnchorLabel">Anchor sentence</span>
        <div class="sc-anchor" id="scAnchor"></div>
        <span class="sc-prompt" id="scPrompt" style="display:none"></span>
        <div class="sc-opts-zone" id="scOptsZone"></div>
      </div>
      <div class="sc-foot">
        <span class="sc-foot-counter" id="scFootCounter">1 / 1</span>
        <div class="sc-foot-nav">
          <button class="sc-prev-btn" id="scPrevBtn" onclick="goCard(-1)">&#x2190; Prev</button>
          <button class="sc-next-btn" id="scNextBtn" onclick="goCard(1)">Next &#x2192;</button>
        </div>
      </div>
    </div>
    <div class="so-bottom">
      <div class="so-progress-track"><div class="so-progress-fill" id="soProgressFill" style="width:0%"></div></div>
      <div class="so-bottom-row">
        <span class="so-counter" id="soCounter">1 / 1</span>
        <span class="so-hint" id="soHint"></span>
      </div>
    </div>
  </div>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-pill">Essay built &#x2736;</div>
</div>

<script>

const STAGE_ACCENTS = ['#3d9e95','#e8723a','#7b5ea7','#c94f6d','#c08b2f'];
const ESSAY_LABELS = {
  'gap-year':'Gap Year',
  'technology-social-interaction':'Technology & Social Interaction',
  'work-money-enjoyment':'Work: Money vs Enjoyment',
  'childhood-obesity':'Childhood Obesity',
  'social-media-addiction':'Social Media Addiction',
  'online-learning':'Online Learning',
  'fashion-industry':'Fashion Industry'
};

let allData = null, buildData = null, essayId = '';
let pillPlaced = {};
let currentView = 'text';
let stageSectionIdx = 0;
let stageDualPart = 0;
let infModalSi = -1, infModalPart = -1;

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function normaliseKey(s){ return String(s).toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }
function findKey(all, rawId){
  if(all[rawId] !== undefined) return rawId;
  const n = normaliseKey(rawId);
  return Object.keys(all).find(k => normaliseKey(k) === n)
      || Object.keys(all).find(k => normaliseKey(k).includes(n) || n.includes(normaliseKey(k)))
      || null;
}
function hexToRgb(hex){
  return parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16);
}
function isDualDone(si){ const p=pillPlaced[si]; return p&&p[0]&&p[1]; }
function isSectionDone(si){
  if(!buildData)return false;
  const sec=buildData[si];
  if(sec.type==='dual')return isDualDone(si);
  return !!pillPlaced[si];
}
function totalSlots(){
  if(!buildData)return 0;
  return buildData.reduce((acc,sec)=>acc+(sec.type==='dual'?2:1),0);
}
function doneSlots(){
  if(!buildData)return 0;
  return buildData.reduce((acc,sec,si)=>{
    if(sec.type==='dual'){const p=pillPlaced[si];return acc+(p&&p[0]?1:0)+(p&&p[1]?1:0);}
    return acc+(pillPlaced[si]?1:0);
  },0);
}

async function init(){
  /* Read sessionStorage */
  try{
    const saved=sessionStorage.getItem('currentQuestion');
    if(saved){
      const q=JSON.parse(saved);
      const label=q.topic||q.topicLabel||(q.mainQuestion||q.question||'').substring(0,35);
      if(label)document.getElementById('topicLabel').textContent=label.toUpperCase();
    }
  }catch(e){}

  try{
    const r=await fetch('data/essay-build-options.json');
    if(!r.ok)throw new Error('essay-build-options.json not found (HTTP '+r.status+')');
    allData=await r.json();
  }catch(err){
    document.getElementById('reportCanvas').innerHTML=
      '<div class="state-msg">Could not load build data.<br><small style="opacity:0.35;margin-top:0.5rem;display:block">'+err.message+'</small></div>';
    return;
  }
  const sel=document.getElementById('essayPicker');
  Object.keys(allData).forEach(k=>{
    const o=document.createElement('option');
    o.value=k;o.textContent=ESSAY_LABELS[k]||k;sel.appendChild(o);
  });
  try{essayId=sessionStorage.getItem('currentEssayId')||'';}catch(e){}
  if(essayId){
    const matched=findKey(allData,essayId);
    if(matched){sel.value=matched;loadEssay(matched);return;}
  }
  if(Object.keys(allData).length){
    const first=Object.keys(allData)[0];
    sel.value=first;loadEssay(first);
  }
}

function loadEssay(id){
  if(!id||!allData)return;
  essayId=id;
  try{sessionStorage.setItem('currentEssayId',id);}catch(e){}
  const entry=allData[id];
  if(!entry||!entry.sections||!entry.sections.length){
    document.getElementById('reportCanvas').innerHTML='<div class="state-msg">No build data for this essay yet.</div>';
    return;
  }
  buildData=entry.sections;
  pillPlaced={};
  buildData.forEach((sec,i)=>{
    if(sec.type==='dual')pillPlaced[i]={0:false,1:false};
    else pillPlaced[i]=false;
  });
  if(entry.mainQuestion){
    document.getElementById('qbText').textContent=entry.mainQuestion;
    document.getElementById('questionBanner').classList.add('visible');
  }else{
    document.getElementById('questionBanner').classList.remove('visible');
  }
  closeInfModal();
  if(document.getElementById('stagesOverlay').classList.contains('active')){
    stageSectionIdx=0;stageDualPart=0;loadCard(0,0);
  }
  renderCanvas();
  updateProgress();
}

function renderCanvas(){
  if(!buildData)return;
  document.getElementById('reportCanvas').innerHTML=
    buildData.map((sec,si)=>{
      const sectionDone=isSectionDone(si);
      if(sec.type==='dual')return renderDualSection(sec,si,sectionDone);
      return renderStandardSection(sec,si,sectionDone);
    }).join('');
}

function renderStandardSection(sec,si,done){
  return '<div class="section-block'+(done?' complete':'')+'" id="sec-'+si+'">'
    +'<div class="section-label">'+esc(sec.label)+'<span class="check"> &#x2736;</span></div>'
    +'<div class="prose-wrap">'
      +'<span class="prose anchor-text" id="prose-'+si+'">'+esc(sec.anchor)+'</span>'
      +(pillPlaced[si]
        ?'<span class="placed-sentence" id="placed-'+si+'">'+colourLinker(pillPlaced[si])+'</span>'
        :'<button class="dots-trigger" id="dots-'+si+'" style="--dt-accent:'+STAGE_ACCENTS[si%STAGE_ACCENTS.length]+'" onclick="openInfModal('+si+')" aria-label="Choose sentence for section '+(si+1)+'">'
          +'<span class="dt-dot"></span><span class="dt-dot"></span><span class="dt-dot"></span>'
          +'</button>')
    +'</div>'
    +'</div>';
}

function renderDualSection(sec,si,done){
  const p=pillPlaced[si];
  const part0done=p&&p[0];
  const part1done=p&&p[1];
  const part0seg=part0done
    ?'<span class="placed-sentence" id="placed-'+si+'-0">'+colourLinker(p[0])+'</span>'
    :'<button class="dots-trigger" id="dots-'+si+'-0" style="--dt-accent:'+STAGE_ACCENTS[si%STAGE_ACCENTS.length]+'" onclick="openDualModal('+si+',0)" aria-label="'+esc(sec.parts[0].sublabel)+'">'
      +'<span class="dt-dot"></span><span class="dt-dot"></span><span class="dt-dot"></span>'
      +'</button>';
  let part1seg;
  if(part1done){
    part1seg='<span class="placed-sentence" id="placed-'+si+'-1">'+colourLinker(p[1])+'</span>';
  }else if(part0done){
    part1seg='<button class="dots-trigger" id="dots-'+si+'-1" style="--dt-accent:'+STAGE_ACCENTS[si%STAGE_ACCENTS.length]+'" onclick="openDualModal('+si+',1)" aria-label="'+esc(sec.parts[1].sublabel)+'">'
      +'<span class="dt-dot"></span><span class="dt-dot"></span><span class="dt-dot"></span>'
      +'</button>';
  }else{
    part1seg='<button class="dots-trigger pending" id="dots-'+si+'-1" aria-label="Complete hook first" title="Complete the hook first">'
      +'<span class="dt-dot"></span><span class="dt-dot"></span><span class="dt-dot"></span>'
      +'</button>';
  }
  return '<div class="section-block'+(done?' complete':'')+'" id="sec-'+si+'">'
    +'<div class="section-label">'+esc(sec.label)+'<span class="check"> &#x2736;</span></div>'
    +'<div class="prose-wrap">'+part0seg+part1seg+'</div>'
    +'</div>';
}

function openInfModal(si){
  if(pillPlaced[si])return;
  infModalSi=si;infModalPart=-1;
  const sec=buildData[si];
  const accent=STAGE_ACCENTS[si%STAGE_ACCENTS.length];
  _buildInfHeader(accent,si,sec.label,null,-1,1);
  document.getElementById('infAnchorLbl').style.display='block';
  document.getElementById('infAnchor').textContent=sec.anchor;
  document.getElementById('infPrompt').style.display='none';
  const optsEl=document.getElementById('infOpts');
  optsEl.innerHTML='';
  sec.options.forEach((o,i)=>{optsEl.appendChild(_makeInfOpt(o,i,accent,()=>placeFromModal(si,i)));});
  _openInfModalEl();
}

function openDualModal(si,partIdx){
  const p=pillPlaced[si];
  if(p&&p[partIdx])return;
  if(partIdx===1&&!(p&&p[0]))return;
  infModalSi=si;infModalPart=partIdx;
  const sec=buildData[si];
  const part=sec.parts[partIdx];
  const accent=STAGE_ACCENTS[si%STAGE_ACCENTS.length];
  const totalParts=sec.parts.length;
  _buildInfHeader(accent,si,sec.label,part.sublabel,partIdx,totalParts);
  const anchorLbl=document.getElementById('infAnchorLbl');
  const anchorEl=document.getElementById('infAnchor');
  if(partIdx===1&&p&&p[0]){
    anchorLbl.textContent='Previously chosen';anchorLbl.style.display='block';
    anchorEl.innerHTML=colourLinker(p[0]);anchorEl.style.display='block';
  }else{anchorLbl.style.display='none';anchorEl.style.display='none';}
  const promptEl=document.getElementById('infPrompt');
  promptEl.textContent=part.prompt;promptEl.style.display='block';
  const optsEl=document.getElementById('infOpts');
  optsEl.innerHTML='';
  part.options.forEach((o,i)=>{optsEl.appendChild(_makeInfOpt(o,i,accent,()=>placeFromDualModal(si,partIdx,i)));});
  _openInfModalEl();
}

function _buildInfHeader(accent,si,label,sublabel,partIdx,totalParts){
  document.getElementById('infHead').style.background=accent;
  document.getElementById('infGhost').textContent=String(si+1).padStart(2,'0');
  document.getElementById('infStep').textContent='Section '+(si+1);
  document.getElementById('infTitle').textContent=label.toUpperCase();
  const sublabelRow=document.getElementById('infSublabelRow');
  if(sublabel!==null){
    document.getElementById('infSublabelBadge').textContent=sublabel;
    const pip=document.getElementById('infPartIndicator');pip.innerHTML='';
    for(let i=0;i<totalParts;i++){
      const d=document.createElement('div');
      d.className='inf-part-pip'+(i===partIdx?' active':'');pip.appendChild(d);
    }
    sublabelRow.style.display='flex';
  }else{sublabelRow.style.display='none';}
}

function _makeInfOpt(text,i,accent,handler){
  const btn=document.createElement('button');
  btn.className='inf-opt';btn.style.animationDelay=(i*0.07)+'s';
  btn.innerHTML='<span class="inf-letter">'+String.fromCharCode(65+i)+'</span>'+colourLinker(text);
  btn.onmouseover=()=>{
    btn.style.borderColor=accent;btn.style.background='rgba('+hexToRgb(accent)+',0.06)';
    btn.querySelector('.inf-letter').style.background=accent;btn.querySelector('.inf-letter').style.color='#fff';
  };
  btn.onmouseout=()=>{
    btn.style.borderColor='rgba(0,0,0,0.08)';btn.style.background='#fff';
    btn.querySelector('.inf-letter').style.background='rgba(0,0,0,0.06)';btn.querySelector('.inf-letter').style.color='rgba(0,0,0,0.4)';
  };
  btn.onclick=handler;return btn;
}

function _openInfModalEl(){
  document.getElementById('infBackdrop').classList.add('active');
  document.getElementById('infModal').classList.add('open');
}
function closeInfModal(){
  infModalSi=-1;infModalPart=-1;
  document.getElementById('infModal').classList.remove('open');
  document.getElementById('infBackdrop').classList.remove('active');
}

function placeFromModal(si,optIdx){
  if(pillPlaced[si])return;
  const text=(buildData[si].options[optIdx]||'').trim();
  if(!text)return;
  closeInfModal();pillPlaced[si]=text;
  const dotsBtn=document.getElementById('dots-'+si);
  if(dotsBtn){const placed=document.createElement('span');placed.className='placed-sentence';placed.id='placed-'+si;placed.innerHTML=colourLinker(text);dotsBtn.replaceWith(placed);}
  document.getElementById('sec-'+si)?.classList.add('complete');
  updateProgress();checkAllDone();
}

function placeFromDualModal(si,partIdx,optIdx){
  const p=pillPlaced[si];if(p[partIdx])return;
  const text=(buildData[si].parts[partIdx].options[optIdx]||'').trim();
  if(!text)return;
  closeInfModal();pillPlaced[si][partIdx]=text;
  const dotsId='dots-'+si+'-'+partIdx;
  const dotsBtn=document.getElementById(dotsId);
  if(dotsBtn){const placed=document.createElement('span');placed.className='placed-sentence';placed.id='placed-'+si+'-'+partIdx;placed.innerHTML=colourLinker(text);dotsBtn.replaceWith(placed);}
  if(partIdx===0){
    const pendingBtn=document.getElementById('dots-'+si+'-1');
    if(pendingBtn&&pendingBtn.classList.contains('pending')){
      pendingBtn.classList.remove('pending');pendingBtn.style.setProperty('--dt-accent',STAGE_ACCENTS[si%STAGE_ACCENTS.length]);
      pendingBtn.onclick=()=>openDualModal(si,1);
    }
  }
  if(pillPlaced[si][0]&&pillPlaced[si][1])document.getElementById('sec-'+si)?.classList.add('complete');
  updateProgress();checkAllDone();
}

function checkAllDone(){
  if(buildData&&buildData.every((_,i)=>isSectionDone(i)))setTimeout(celebrate,400);
}

function openStages(){
  if(!buildData)return;
  let start=buildData.findIndex((_,i)=>!isSectionDone(i));
  if(start<0)start=0;
  stageSectionIdx=start;stageDualPart=0;
  if(buildData[start]&&buildData[start].type==='dual'){
    const p=pillPlaced[start];stageDualPart=(p&&p[0]&&!p[1])?1:0;
  }
  document.getElementById('stagesOverlay').classList.add('active');
  document.getElementById('footNav').classList.add('hidden');
  closeInfModal();buildNavStrip();loadCard(stageSectionIdx,0);
}

function closeStages(){
  document.getElementById('stagesOverlay').classList.remove('active');
  document.getElementById('footNav').classList.remove('hidden');
  currentView='text';
  document.getElementById('vtText').classList.add('active');
  document.getElementById('vtStages').classList.remove('active');
  document.getElementById('reportCanvas').classList.add('active');
}

function buildNavStrip(){
  const strip=document.getElementById('soNavStrip');strip.innerHTML='';
  buildData.forEach((sec,si)=>{
    const pip=document.createElement('button');pip.className='so-nav-pip';pip.textContent=sec.label;
    pip.onclick=()=>jumpCard(si);strip.appendChild(pip);
  });
  updateNavStrip();
}

function updateNavStrip(){
  const pips=document.querySelectorAll('.so-nav-pip');
  pips.forEach((pip,si)=>{
    const accent=STAGE_ACCENTS[si%STAGE_ACCENTS.length];
    pip.classList.toggle('current',si===stageSectionIdx);
    pip.classList.toggle('done',isSectionDone(si)&&si!==stageSectionIdx);
    pip.style.setProperty('--pip-accent',si===stageSectionIdx?accent:'rgba(255,255,255,0.2)');
    if(si===stageSectionIdx)pip.style.color='#fff';else pip.style.color='';
  });
}

function jumpCard(si){
  const dir=si>stageSectionIdx?1:(si<stageSectionIdx?-1:0);
  stageSectionIdx=si;stageDualPart=0;
  if(buildData[si]&&buildData[si].type==='dual'){
    const p=pillPlaced[si];stageDualPart=(p&&p[0]&&!p[1])?1:0;
  }
  loadCard(si,dir);
}

function goCard(dir){
  const sec=buildData[stageSectionIdx];
  if(sec&&sec.type==='dual'&&dir===1){
    if(stageDualPart===0&&pillPlaced[stageSectionIdx][0]&&!pillPlaced[stageSectionIdx][1]){stageDualPart=1;loadCard(stageSectionIdx,0);return;}
    if(stageDualPart===0&&!pillPlaced[stageSectionIdx][0])return;
  }
  const next=stageSectionIdx+dir;
  if(next<0||next>=buildData.length)return;
  stageSectionIdx=next;stageDualPart=0;loadCard(next,dir);
}

function loadCard(si,dir){
  if(!buildData||si>=buildData.length)return;
  const sec=buildData[si];
  const accent=STAGE_ACCENTS[si%STAGE_ACCENTS.length];
  const total=buildData.length;
  document.getElementById('scHeader').style.setProperty('--sc-accent',accent);
  document.getElementById('scGhostNum').textContent=String(si+1).padStart(2,'0');
  document.getElementById('scStepLabel').textContent='Section '+(si+1);
  document.getElementById('scStepLabel').style.color=accent;
  document.getElementById('scTitle').textContent=sec.label.toUpperCase();
  const partRow=document.getElementById('scPartRow');
  const anchorLbl=document.getElementById('scAnchorLabel');
  const anchorEl=document.getElementById('scAnchor');
  const promptEl=document.getElementById('scPrompt');
  const zone=document.getElementById('scOptsZone');
  if(sec.type==='dual'){
    const part=sec.parts[stageDualPart];
    document.getElementById('scPartBadge').textContent=part.sublabel;
    const pipsEl=document.getElementById('scPartPips');pipsEl.innerHTML='';
    sec.parts.forEach((_,pi)=>{const d=document.createElement('div');d.className='sc-part-pip'+(pi===stageDualPart?' active':'');pipsEl.appendChild(d);});
    partRow.style.display='flex';
    const p=pillPlaced[si];
    if(stageDualPart===1&&p&&p[0]){anchorLbl.textContent='Previously chosen';anchorLbl.style.display='block';anchorEl.innerHTML=colourLinker(p[0]);anchorEl.style.display='block';}
    else{anchorLbl.style.display='none';anchorEl.style.display='none';}
    promptEl.textContent=part.prompt;promptEl.style.display='block';
    zone.innerHTML='';
    const placed=p&&p[stageDualPart];
    if(placed){
      const row=document.createElement('div');row.className='sc-placed-row';
      row.innerHTML='<div class="sc-placed-dot" style="background:'+accent+'"></div><div class="sc-placed-text">'+colourLinker(placed)+'</div>';
      zone.appendChild(row);
    }else{
      const wrap=document.createElement('div');wrap.className='sc-dots-wrap';
      const dotsBtn=document.createElement('button');dotsBtn.className='sc-dots-btn';dotsBtn.style.setProperty('--sc-btn-accent',accent);
      dotsBtn.innerHTML='<span class="sd-dot"></span><span class="sd-dot"></span><span class="sd-dot"></span>';
      dotsBtn.onclick=()=>revealStageOptsDual(si,stageDualPart,accent,zone,wrap);
      const hint=document.createElement('div');hint.className='sc-dots-hint';hint.textContent='tap to see options';
      wrap.appendChild(dotsBtn);wrap.appendChild(hint);zone.appendChild(wrap);
    }
  }else{
    partRow.style.display='none';
    anchorLbl.textContent='Anchor sentence';anchorLbl.style.display='block';
    anchorEl.textContent=sec.anchor;anchorEl.style.display='block';
    promptEl.style.display='none';
    zone.innerHTML='';
    const placed=!!pillPlaced[si];
    if(placed){
      const row=document.createElement('div');row.className='sc-placed-row';
      row.innerHTML='<div class="sc-placed-dot" style="background:'+accent+'"></div><div class="sc-placed-text">'+colourLinker(pillPlaced[si])+'</div>';
      zone.appendChild(row);
    }else{
      const wrap=document.createElement('div');wrap.className='sc-dots-wrap';
      const dotsBtn=document.createElement('button');dotsBtn.className='sc-dots-btn';dotsBtn.style.setProperty('--sc-btn-accent',accent);
      dotsBtn.innerHTML='<span class="sd-dot"></span><span class="sd-dot"></span><span class="sd-dot"></span>';
      dotsBtn.onclick=()=>revealStageOpts(si,accent,zone,wrap);
      const hint=document.createElement('div');hint.className='sc-dots-hint';hint.textContent='tap to see options';
      wrap.appendChild(dotsBtn);wrap.appendChild(hint);zone.appendChild(wrap);
    }
  }
  document.getElementById('scFootCounter').textContent=(si+1)+' / '+total;
  const prevBtn=document.getElementById('scPrevBtn');const nextBtn=document.getElementById('scNextBtn');
  prevBtn.disabled=si===0&&(sec.type!=='dual'||stageDualPart===0);
  nextBtn.textContent=si===total-1&&(sec.type!=='dual'||stageDualPart===sec.parts.length-1)?'Finish \u2736':'Next \u2192';
  nextBtn.disabled=false;
  const donePct=Math.round((doneSlots()/Math.max(totalSlots(),1))*100);
  document.getElementById('soProgressFill').style.background=accent;
  document.getElementById('soProgressFill').style.width=donePct+'%';
  document.getElementById('soCounter').textContent=(si+1)+' / '+total;
  const secDone=isSectionDone(si);
  const partDone=sec.type==='dual'?!!(pillPlaced[si]&&pillPlaced[si][stageDualPart]):secDone;
  document.getElementById('soHint').textContent=partDone?'Part complete \u2736':'Tap \u2022\u2022\u2022 to reveal choices';
  if(dir!==0){
    const cardEl=document.getElementById('stageCard');
    cardEl.classList.remove('card-enter','card-prev');void cardEl.offsetWidth;
    cardEl.classList.add(dir>0?'card-enter':'card-prev');
  }
  updateNavStrip();
}

function revealStageOpts(si,accent,zone,dotsWrap){
  dotsWrap.style.transition='opacity 0.18s,transform 0.18s';dotsWrap.style.opacity='0';dotsWrap.style.transform='scale(0.9)';
  setTimeout(()=>{
    zone.innerHTML='';
    buildData[si].options.forEach((o,i)=>{
      const btn=document.createElement('button');btn.className='sc-opt-btn';btn.style.setProperty('--sc-accent',accent);btn.style.animationDelay=(i*0.07)+'s';
      btn.innerHTML='<span class="sc-opt-letter">'+String.fromCharCode(65+i)+'</span>'+colourLinker(o);
      btn.onclick=()=>placeStage(si,i);zone.appendChild(btn);
    });
    document.getElementById('soHint').textContent='Choose a sentence to continue';
  },180);
}

function revealStageOptsDual(si,partIdx,accent,zone,dotsWrap){
  dotsWrap.style.transition='opacity 0.18s,transform 0.18s';dotsWrap.style.opacity='0';dotsWrap.style.transform='scale(0.9)';
  setTimeout(()=>{
    zone.innerHTML='';
    buildData[si].parts[partIdx].options.forEach((o,i)=>{
      const btn=document.createElement('button');btn.className='sc-opt-btn';btn.style.setProperty('--sc-accent',accent);btn.style.animationDelay=(i*0.07)+'s';
      btn.innerHTML='<span class="sc-opt-letter">'+String.fromCharCode(65+i)+'</span>'+colourLinker(o);
      btn.onclick=()=>placeStageDual(si,partIdx,i);zone.appendChild(btn);
    });
    document.getElementById('soHint').textContent='Choose a sentence to continue';
  },180);
}

function placeStage(si,optIdx){
  if(pillPlaced[si])return;
  const text=(buildData[si].options[optIdx]||'').trim();if(!text)return;
  pillPlaced[si]=text;
  const dotsBtn=document.getElementById('dots-'+si);
  if(dotsBtn){const placed=document.createElement('span');placed.className='placed-sentence';placed.id='placed-'+si;placed.innerHTML=colourLinker(text);dotsBtn.replaceWith(placed);}
  document.getElementById('sec-'+si)?.classList.add('complete');
  updateProgress();loadCard(si,0);checkAllDone();
}

function placeStageDual(si,partIdx,optIdx){
  const p=pillPlaced[si];if(p[partIdx])return;
  const text=(buildData[si].parts[partIdx].options[optIdx]||'').trim();if(!text)return;
  pillPlaced[si][partIdx]=text;
  const dotsId='dots-'+si+'-'+partIdx;const dotsBtn=document.getElementById(dotsId);
  if(dotsBtn){const placed=document.createElement('span');placed.className='placed-sentence';placed.id='placed-'+si+'-'+partIdx;placed.innerHTML=colourLinker(text);dotsBtn.replaceWith(placed);}
  if(partIdx===0){
    const pendingBtn=document.getElementById('dots-'+si+'-1');
    if(pendingBtn&&pendingBtn.classList.contains('pending')){
      pendingBtn.classList.remove('pending');pendingBtn.style.setProperty('--dt-accent',STAGE_ACCENTS[si%STAGE_ACCENTS.length]);pendingBtn.onclick=()=>openDualModal(si,1);
    }
  }
  if(pillPlaced[si][0]&&pillPlaced[si][1])document.getElementById('sec-'+si)?.classList.add('complete');
  updateProgress();
  if(partIdx===0&&!pillPlaced[si][1]){stageDualPart=1;loadCard(si,0);}else{loadCard(si,0);}
  checkAllDone();
}

function setView(v){
  currentView=v;
  document.getElementById('vtText').classList.toggle('active',v==='text');
  document.getElementById('vtStages').classList.toggle('active',v==='stages');
  document.getElementById('reportCanvas').classList.toggle('active',v==='text');
  if(v==='stages')openStages();else closeInfModal();
}

function revealAll(){
  closeMenu();if(!buildData)return;
  buildData.forEach((sec,si)=>{
    if(sec.type==='dual'){
      sec.parts.forEach((part,pi)=>{
        if(!pillPlaced[si][pi]){
          const text=part.options[0]||'';if(!text)return;
          pillPlaced[si][pi]=text;
          const dotsBtn=document.getElementById('dots-'+si+'-'+pi);
          if(dotsBtn){const placed=document.createElement('span');placed.className='placed-sentence';placed.innerHTML=colourLinker(text);dotsBtn.replaceWith(placed);}
        }
      });
      if(pillPlaced[si][0]&&pillPlaced[si][1])document.getElementById('sec-'+si)?.classList.add('complete');
    }else{
      if(pillPlaced[si])return;
      const text=sec.options[0]||'';if(!text)return;
      pillPlaced[si]=text;
      const dotsBtn=document.getElementById('dots-'+si);
      if(dotsBtn){const placed=document.createElement('span');placed.className='placed-sentence';placed.innerHTML=colourLinker(text);dotsBtn.replaceWith(placed);}
      document.getElementById('sec-'+si)?.classList.add('complete');
    }
  });
  updateProgress();
  if(document.getElementById('stagesOverlay').classList.contains('active')){loadCard(stageSectionIdx,0);updateNavStrip();}
  setTimeout(celebrate,350);
}

function resetAll(){
  closeMenu();closeInfModal();if(!buildData)return;
  buildData.forEach((sec,si)=>{
    if(sec.type==='dual')pillPlaced[si]={0:false,1:false};else pillPlaced[si]=false;
  });
  if(document.getElementById('stagesOverlay').classList.contains('active')){stageSectionIdx=0;stageDualPart=0;loadCard(0,0);updateNavStrip();}
  renderCanvas();updateProgress();
}

function updateProgress(){
  const total=totalSlots();const done=doneSlots();
  document.getElementById('barFill').style.width=(total>0?(done/total)*100:0)+'%';
  const lbl=document.getElementById('progressLabel');
  if(done===0){lbl.textContent='tap \u2022\u2022\u2022 to begin';lbl.classList.remove('done');}
  else if(done===total){lbl.textContent='complete \u2736';lbl.classList.add('done');}
  else{lbl.textContent=done+' / '+total+' sentences';lbl.classList.remove('done');}
}

function celebrate(){
  const el=document.getElementById('celebration');
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2900);
}

function toggleMenu(){document.getElementById('menuDropdown').classList.toggle('open');}
function closeMenu(){document.getElementById('menuDropdown').classList.remove('open');}

function navTo(dest){
  if(essayId)try{sessionStorage.setItem('currentEssayId',essayId);}catch(e){}
  const map={question:'essay-question.html',plan:'essay-plan.html',model:'essay-model.html',sample:'essay-sample.html'};
  if(map[dest])window.location.href=map[dest];
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.menu-btn')&&!e.target.closest('.menu-dropdown'))closeMenu();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeMenu();closeInfModal();
    if(document.getElementById('stagesOverlay').classList.contains('active'))closeStages();}
  if(document.getElementById('stagesOverlay').classList.contains('active')){
    if(e.key==='ArrowRight'){e.preventDefault();goCard(1);}
    if(e.key==='ArrowLeft'){e.preventDefault();goCard(-1);}
  }
});

const LINK_PHRASES=[
  'The explanation lies in the fact that ','This can be attributed to the fact that ',
  'This can be explained by the fact that ','This is largely due to the fact that ',
  'This stems from the fact that ','This stems from the need for ','This stems from ',
  'The reason for this is that ','The reason is that ','This is rooted in ',
  'This problem exists because ','This happens because ','This occurs because ',
  'This is because ','This leads to ','This results in ','As a consequence, ',
  'The key disadvantage is ','The key disadvantage of ','A major drawback is ',
  'A major drawback of ','The main disadvantage is ','The main disadvantage of ',
  'For example, ','For instance, ','To illustrate, ','As an example, ',
  'As a result, ','As a result ','Consequently, ','Therefore, ','However, ',
  'Nevertheless, ','Furthermore, ','Hence, ','Thus, ','That said, ',
  'By taking these steps, ','Should schools implement these measures, ',
  'Were these policies adopted widely, ',
];
function colourLinker(text){
  const prefix=' ';
  const body=text.startsWith(' ')?text.slice(1):text;
  let html=esc(body);
  for(const phrase of LINK_PHRASES){
    const escaped=esc(phrase);const idx=html.indexOf(escaped);
    if(idx!==-1){html=html.slice(0,idx)+'<em class="link-word">'+escaped+'</em>'+html.slice(idx+escaped.length);break;}
  }
  const midPhrases=['For example, ','For instance, ','To illustrate, ','As an example, ','As a result, ','Consequently, ','Therefore, ','However, ','Nevertheless, ','Furthermore, ','Hence, ','Thus, ','That said, ','By taking these steps, ','Should schools implement these measures, ','Were these policies adopted widely, ','Another strong point is that ','It is also worth noting that '];
  for(const phrase of midPhrases){
    const escaped=esc(phrase);
    html=html.replace(new RegExp('(?<!<em class="link-word">)'+escaped.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<em class="link-word">'+escaped+'</em>');
  }
  return prefix+html;
}
