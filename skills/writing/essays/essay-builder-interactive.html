<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--white:#FAFAF8;--ink:#0d0d0d;--rule:rgba(0,0,0,0.07);
  --teal:#3d9e95;--teal-d:#2e7870;--teal-mid:#8dccc7;
  --coral:#e8723a;--coral-d:#c05520;--coral-mid:#f5ad87;
  --purple:#7b5ea7;--purple-d:#5e4582;--purple-mid:#b9a3d3;
  --rose:#c94f6d;--rose-d:#a33455;--rose-mid:#e89db0;
  --gold:#c08b2f;--gold-d:#9a6c1e;--gold-mid:#e4c073;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--white);border-radius:0;max-width:900px;margin:0 auto;box-shadow:0 0 60px rgba(0,0,0,0.12)}

/* HEADER */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.97);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:10;position:relative}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}

/* TABS */
.card-tabs{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.55rem 1.25rem;background:var(--white);border-bottom:1px solid var(--rule);overflow-x:auto}
.tab-btn{background:transparent;border:none;border-bottom:3px solid transparent;padding:0.45rem 0.875rem;font-size:0.68rem;font-weight:800;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;font-family:'Barlow Condensed',sans-serif}
.tab-btn:hover{color:rgba(0,0,0,0.6)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}

/* CONTENT */
.card-content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--white)}
.content-header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:0.75rem 1.5rem 0.55rem;border-bottom:2px solid rgba(0,0,0,0.06)}
.content-title{font-size:0.65rem;font-weight:700;color:rgba(0,0,0,0.35);text-transform:uppercase;letter-spacing:0.12em;font-family:'Barlow Condensed',sans-serif}
.view-toggle{display:flex;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);border-radius:7px;padding:0.2rem;gap:0.2rem}
.toggle-btn{padding:0.3rem 0.7rem;background:transparent;border:none;border-radius:5px;color:rgba(0,0,0,0.45);font-size:0.6rem;font-weight:800;cursor:pointer;transition:all 0.25s;text-transform:uppercase;letter-spacing:0.06em;font-family:'Barlow Condensed',sans-serif}
.toggle-btn:hover{color:rgba(0,0,0,0.7)}
.toggle-btn.active{background:var(--ink);color:#fff}

/* SCROLL AREA */
.infographic{flex:1;padding:1rem 1.5rem;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.infographic::-webkit-scrollbar{width:5px}
.infographic::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2.5px}

/* SKELETON */
.skeleton-display .paragraph-block{margin-bottom:0.875rem}
.skeleton-display .paragraph-title{color:rgba(0,0,0,0.5);margin-bottom:0.35rem;font-weight:800;font-size:0.68rem;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.08em;text-transform:uppercase}
.skeleton-display .paragraph-title.intro{color:var(--teal)}
.skeleton-display .paragraph-title.body{color:var(--coral)}
.skeleton-display .paragraph-title.conclusion{color:var(--purple)}
.skeleton-display .paragraph-text{color:rgba(0,0,0,0.8);line-height:1.45;margin-bottom:0.225rem;font-size:0.78rem;font-family:'Instrument Sans',sans-serif}
.skeleton-display .paragraph-text .listing-marker{color:var(--ink);font-weight:700;font-style:italic}
.skeleton-display .divider{height:1px;background:rgba(0,0,0,0.08);margin:0.65rem 0}

/* PHRASES */
.phrases-display{font-family:'Barlow',sans-serif;color:rgba(0,0,0,0.9)}
.phrase-category{margin-bottom:1.5rem}
.category-title{font-size:0.72rem;font-weight:900;color:rgba(0,0,0,0.9);margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.1em;padding-bottom:0.4rem;border-bottom:2px solid rgba(0,0,0,0.2);font-family:'Barlow Condensed',sans-serif}
.category-title.intro{color:var(--teal);border-bottom-color:var(--teal)}
.category-title.body{color:var(--coral);border-bottom-color:var(--coral)}
.category-title.conclusion{color:var(--purple);border-bottom-color:var(--purple)}
.subcategory{margin-bottom:1.125rem}
.subcategory-title{font-size:0.68rem;font-weight:800;color:rgba(0,0,0,0.6);margin-bottom:0.6rem;text-transform:uppercase;letter-spacing:0.06em;font-family:'Barlow Condensed',sans-serif}
.phrase-list{list-style:none;padding:0}
.phrase-item{font-size:0.78rem;line-height:1.6;color:rgba(0,0,0,0.75);margin-bottom:0.5rem;padding-left:0.875rem;position:relative;font-family:'Instrument Sans',sans-serif}
.phrase-item:before{content:"→";position:absolute;left:0;color:var(--teal);font-weight:700}

/* PRACTICE */
.practice-display{display:flex;flex-direction:column;gap:1.25rem}
.practice-question{background:rgba(61,158,149,0.07);border-left:4px solid var(--teal);border-radius:0.75rem;padding:1rem 1.25rem}
.practice-question-label{font-size:0.6rem;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;color:var(--teal);margin-bottom:0.35rem;font-family:'Barlow Condensed',sans-serif}
.practice-question-text{font-size:1rem;font-weight:700;color:var(--ink);line-height:1.4;font-family:'Instrument Sans',sans-serif}
.practice-answer{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.06);border-radius:0.75rem;padding:1.1rem 1.25rem;position:relative}
.practice-answer-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:rgba(0,0,0,0.3);margin-bottom:0.5rem;font-family:'Barlow Condensed',sans-serif}
.answer-line{display:flex;align-items:flex-start;gap:0.75rem;padding:0.45rem 0;border-bottom:1px solid rgba(0,0,0,0.05);cursor:pointer;border-radius:0.4rem;transition:background 0.15s}
.answer-line:last-child{border-bottom:none}
.answer-line:hover{background:rgba(0,0,0,0.02)}
.answer-line.played .answer-text{opacity:0.38}
.answer-marker{flex-shrink:0;width:6px;height:6px;border-radius:50%;margin-top:0.45rem;background:rgba(0,0,0,0.18);transition:background 0.3s}
.answer-line.has-phrase .answer-marker{background:var(--teal)}
.answer-line.played .answer-marker{background:rgba(0,0,0,0.1)}
.answer-text{font-size:0.88rem;line-height:1.6;color:var(--ink);font-family:'Instrument Sans',sans-serif}
.answer-phrase-tag{display:inline-block;font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:0.15rem 0.5rem;border-radius:2rem;margin-left:0.4rem;vertical-align:middle;opacity:0.75;font-family:'Barlow Condensed',sans-serif}
.tag-intro{background:rgba(61,158,149,0.12);color:var(--teal)}
.tag-body{background:rgba(232,114,58,0.12);color:var(--coral)}
.tag-conclusion{background:rgba(123,94,167,0.12);color:var(--purple)}
.practice-controls{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.25rem;background:rgba(0,0,0,0.02);border-radius:0.75rem;flex-shrink:0}
.play-practice-btn{display:flex;align-items:center;gap:0.5rem;padding:0.55rem 1.1rem;background:var(--ink);color:#fff;border:none;border-radius:2rem;font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;font-family:'Barlow Condensed',sans-serif}
.play-practice-btn:hover{background:rgba(0,0,0,0.8)}
.play-practice-btn:disabled{opacity:0.35;cursor:not-allowed}
.practice-caption{font-size:0.78rem;font-style:italic;color:rgba(0,0,0,0.38);flex:1;line-height:1.4;min-height:1.2em;transition:color 0.3s;font-family:'Instrument Sans',sans-serif}
.practice-caption.speaking{color:rgba(0,0,0,0.7)}

/* SLIDE NAV */
.slide-nav{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.75rem;padding:0.75rem 1.25rem;background:var(--white);border-top:1px solid var(--rule)}
.slide-arrow{background:transparent;border:2px solid rgba(0,0,0,0.15);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;font-size:1.3rem;color:rgba(0,0,0,0.6)}
.slide-arrow:hover:not(:disabled){background:var(--teal);border-color:var(--teal);color:#fff}
.slide-arrow:disabled{opacity:0.25;cursor:not-allowed}
.page-counter{font-size:0.875rem;font-weight:700;color:rgba(0,0,0,0.4);min-width:72px;text-align:center;font-family:'Barlow Condensed',sans-serif}

/* FOOTER NAV */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.97);border-top:1px solid var(--rule)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* BANNER */
.fly-banner{position:fixed;z-index:900;pointer-events:none;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:0.6rem;padding:2rem 2.2rem;border-radius:1.6rem;background:#fff;border-left:12px solid var(--teal);box-shadow:0 40px 100px rgba(0,0,0,0.30),0 10px 30px rgba(0,0,0,0.18),0 2px 8px rgba(0,0,0,0.10);font-family:'Instrument Sans',sans-serif;font-size:1.75rem;font-weight:700;line-height:1.45;color:var(--ink);text-align:left;width:min(360px,88vw);height:min(360px,88vw);overflow:hidden}
.fly-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;border-radius:1.6rem 1.6rem 0 0}
.fly-banner::after{content:attr(data-label);display:block;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:900;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:0.15rem}
.fly-banner.type-intro{border-left-color:var(--teal)}.fly-banner.type-intro::before{background:var(--teal)}.fly-banner.type-intro::after{color:var(--teal)}
.fly-banner.type-body{border-left-color:var(--coral)}.fly-banner.type-body::before{background:var(--coral)}.fly-banner.type-body::after{color:var(--coral)}
.fly-banner.type-conclusion{border-left-color:var(--purple)}.fly-banner.type-conclusion::before{background:var(--purple)}.fly-banner.type-conclusion::after{color:var(--purple)}
.fly-banner.phase-float{animation:bannerFloat 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes bannerFloat{0%{opacity:0;transform:scale(0.6) translateY(-60px)}65%{opacity:1;transform:scale(1.04) translateY(6px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.fly-banner.phase-hover{animation:bannerBob 1.8s ease-in-out infinite}
@keyframes bannerBob{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1) translateY(-7px)}}
.answer-text.landing{animation:textSettle 0.28s ease both}
@keyframes textSettle{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .shell{max-width:100%}
  .infographic{padding:0.875rem 1.1rem}
  .tab-btn{padding:0.375rem 0.7rem;font-size:0.6rem}
  .nb{padding:0.3rem 0.6rem;font-size:0.55rem;min-height:26px}
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a href="essay-question-selector.html" class="back-link">← Back</a>
    <span class="brand">INTUITY</span>
    <div style="width:28px"></div>
  </div>

  <div class="card-tabs" id="tabsContainer"></div>

  <div class="card-content">
    <div class="content-header">
      <div class="content-title" id="contentTitle">Loading…</div>
      <div class="view-toggle">
        <button class="toggle-btn active" data-mode="skeleton" onclick="setViewMode('skeleton')">Skeleton</button>
        <button class="toggle-btn" data-mode="phrases" onclick="setViewMode('phrases')">Phrases</button>
        <button class="toggle-btn" data-mode="practice" onclick="setViewMode('practice')">Practice</button>
      </div>
    </div>
    <div class="infographic" id="contentArea"></div>
  </div>

  <div class="slide-nav">
    <button class="slide-arrow" id="btnPrev" onclick="navigate(-1)">←</button>
    <div class="page-counter" id="pageCounter">1 / 1</div>
    <button class="slide-arrow" id="btnNext" onclick="navigate(1)">→</button>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="switchMode('question')">Question</button>
      <button class="nb"    onclick="switchMode('plan')">Plan</button>
      <button class="nb on" onclick="switchMode('model')">Model</button>
      <button class="nb"    onclick="switchMode('build')">Build</button>
      <button class="nb"    onclick="switchMode('sample')">Sample</button>
    </div>
  </div>
</div>

<script>
/* ══ STATE ══ */
let skeletonData=null,phraseData=null,currentType='for-against',currentVariation=0,currentPracticeQuestion=0,viewMode='skeleton';

/* ══ PRACTICE DATA ══ */
const PRACTICE_DATA={
  'for-against':[
    {question:"Should school uniforms be compulsory?",answer:[{text:"In my view, this is a topic that divides opinion quite sharply.",phrase:"In my view,",phraseType:"intro",label:"Opening phrase"},{text:"First of all, the way I see it, the key benefit is that uniforms reduce pressure on students to wear expensive or fashionable clothes.",phrase:"First of all, the way I see it, the key benefit is that",phraseType:"body",label:"First advantage"},{text:"Everyone looks the same, so no one feels left out.",phrase:null},{text:"Secondly, another clear benefit is that uniforms help create a sense of belonging and school identity.",phrase:"Secondly, another clear benefit is that",phraseType:"body",label:"Second advantage"},{text:"On the other hand, the main drawback is that uniforms take away students' freedom of self-expression.",phrase:"On the other hand, the main drawback is that",phraseType:"body",label:"Disadvantage"},{text:"Clothes are one of the ways teenagers define who they are.",phrase:null},{text:"Overall, I believe the benefits of school uniforms outweigh the drawbacks, especially in large, diverse schools.",phrase:"Overall, I believe the benefits outweigh the drawbacks",phraseType:"conclusion",label:"Conclusion"}]},
    {question:"Are video games good or bad for young people?",answer:[{text:"From my perspective, video games are far more complex than people often assume.",phrase:"From my perspective,",phraseType:"intro",label:"Opening phrase"},{text:"To begin with, one major advantage is that many games develop problem-solving skills, concentration, and teamwork.",phrase:"To begin with, one major advantage is that",phraseType:"body",label:"First advantage"},{text:"Some games require real strategic thinking and cooperation.",phrase:null},{text:"Furthermore, another benefit worth noting is that gaming can help young people connect socially, especially during difficult times.",phrase:"Furthermore, another benefit worth noting is that",phraseType:"body",label:"Second advantage"},{text:"That said, the primary disadvantage is that excessive gaming can lead to addiction and sleep problems.",phrase:"That said, the primary disadvantage is that",phraseType:"body",label:"Disadvantage"},{text:"Without limits, some teenagers spend entire nights playing.",phrase:null},{text:"All things considered, I believe the advantages outweigh the disadvantages, as long as gaming is kept in balance with other activities.",phrase:"All things considered, I believe the advantages outweigh the disadvantages",phraseType:"conclusion",label:"Conclusion"}]}
  ],
  'problems-solutions':[
    {question:"Why do so many teenagers not get enough sleep, and what can be done?",answer:[{text:"This is a problem that affects millions of young people around the world.",phrase:null},{text:"First and foremost, one major problem is that teenagers use their phones late at night, making it almost impossible to fall asleep.",phrase:"First and foremost, one major problem is that",phraseType:"body",label:"First problem"},{text:"The blue light from screens tricks the brain into thinking it is still daytime.",phrase:null},{text:"Furthermore, another significant difficulty is that academic pressure leads many students to study deep into the night.",phrase:"Furthermore, another significant difficulty is that",phraseType:"body",label:"Second problem"},{text:"One possible solution would be to introduce a technology curfew at home, with phones switched off at a set time each evening.",phrase:"One possible solution would be to",phraseType:"body",label:"Solution"},{text:"To sum up, a combination of family habits and school policies is needed to address this growing problem.",phrase:"To sum up, a combination of measures is needed",phraseType:"conclusion",label:"Conclusion"}]}
  ],
  'agree-disagree':[
    {question:"Celebrities are bad role models for teenagers. Do you agree?",answer:[{text:"There is an ongoing debate about the influence celebrities have on young people, and I think it is worth examining carefully.",phrase:"There is an ongoing debate about",phraseType:"intro",label:"Opening"},{text:"One strong argument in favour of this view is that many celebrities promote unrealistic body images and materialistic values.",phrase:"One strong argument in favour is that",phraseType:"body",label:"Argument for"},{text:"Social media amplifies these messages to millions of impressionable teenagers.",phrase:null},{text:"On the other hand, critics argue that many celebrities use their platform positively — campaigning for mental health, the environment, or social justice.",phrase:"On the other hand, critics argue that",phraseType:"body",label:"Counter-argument"},{text:"In my opinion, I broadly agree with this statement, but only when it applies to celebrities who prioritise fame over responsibility.",phrase:"In my opinion, I broadly agree — but",phraseType:"conclusion",label:"Position"},{text:"To sum up, while both sides make valid points, the influence of celebrity culture requires much more critical discussion in schools.",phrase:"To sum up, while both sides make valid points",phraseType:"conclusion",label:"Conclusion"}]}
  ],
  'opinion':[
    {question:"Should mobile phones be allowed in class?",answer:[{text:"I firmly believe that mobile phones in the classroom do more harm than good.",phrase:"I firmly believe that",phraseType:"intro",label:"Opening"},{text:"Firstly, one key reason is that phones are an enormous source of distraction, constantly pulling students' attention away from the lesson.",phrase:"Firstly, one key reason is that",phraseType:"body",label:"First reason"},{text:"Secondly, another important point is that social media and messaging apps create social pressures that make learning almost impossible.",phrase:"Secondly, another important point is that",phraseType:"body",label:"Second reason"},{text:"Some people might argue that phones are useful tools for research and learning apps.",phrase:"Some people might argue that",phraseType:"body",label:"Counter-argument"},{text:"However, I believe that dedicated school devices are a far better solution than personal phones.",phrase:"However, I believe that",phraseType:"body",label:"Rebuttal"},{text:"In conclusion, I believe that mobile phones should be stored away during lessons to protect both concentration and wellbeing.",phrase:"In conclusion, I believe that",phraseType:"conclusion",label:"Conclusion"}]}
  ],
  'cause-effect':[
    {question:"Why do so many teenagers feel stressed, and what are the effects?",answer:[{text:"Stress among teenagers has reached levels that many experts now describe as a public health crisis.",phrase:null},{text:"One of the main causes is that academic pressure has intensified enormously, with exams starting younger and competition for university places growing fiercer.",phrase:"One of the main causes is that",phraseType:"body",label:"First cause"},{text:"A further contributing factor is that social media creates constant comparisons, making many teenagers feel inadequate.",phrase:"A further contributing factor is that",phraseType:"body",label:"Second cause"},{text:"As a result, anxiety disorders and depression have become alarmingly common among young people.",phrase:"As a result,",phraseType:"body",label:"Effect"},{text:"To sum up, it is clear that both academic and social pressures are combining to create a generation under serious psychological strain.",phrase:"To sum up, it is clear that",phraseType:"conclusion",label:"Conclusion"}]}
  ],
  'speculation':[
    {question:"Will classrooms still exist in twenty years?",answer:[{text:"Over the past few years, there has been a growing trend towards online and hybrid learning.",phrase:"Over the past few years, there has been a growing trend towards",phraseType:"intro",label:"Trend introduction"},{text:"One main reason for this shift is that technology has made it possible to learn anything, from anywhere, often for free.",phrase:"One main reason for this shift is that",phraseType:"body",label:"Cause"},{text:"It is likely that artificial intelligence will increasingly personalise learning, making the traditional one-teacher-thirty-students model feel outdated.",phrase:"It is likely that",phraseType:"body",label:"Prediction"},{text:"On balance, this trend will bring both exciting possibilities and real risks — particularly for children who need the structure and social environment that only a classroom provides.",phrase:"On balance, this trend will bring both",phraseType:"conclusion",label:"Conclusion"}]}
  ]
};

const listingMarkers={first:["Firstly, it seems to me that","First and foremost, it is widely believed that","To begin with, I believe that"],second:["Secondly, it is often suggested that","Furthermore, I would argue that","Moreover, it is worth noting that"],third:["On the other hand, in my view,","However, critics may argue that","Nevertheless, it is widely recognised that"],counter:["Some people might argue that","Admittedly, it is my sincere belief that","While it could be argued that"]};
function getRandomItem(arr){return arr[Math.floor(Math.random()*arr.length)]}
function getListingPrefix(index,total){if(index===0)return null;if(index===1)return getRandomItem(listingMarkers.first);if(index===2)return getRandomItem(listingMarkers.second);if(index===3&&total>=4)return getRandomItem(listingMarkers.third);if(index===total-1)return null;return getRandomItem(listingMarkers.second);}

/* ══ INIT ══ */
async function init(){
  try{
    const [r1,r2]=await Promise.all([fetch('data/complete-essay-phrase-bank.json'),fetch('data/complete-essay-phrase-bank1.json')]);
    skeletonData=await r1.json();phraseData=await r2.json();
    renderTabs();renderContent();updateNav();
  }catch(e){
    document.getElementById('contentArea').innerHTML='<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35);font-family:Barlow,sans-serif">⚠ Failed to load data</div>';
  }
}

/* ══ TABS ══ */
function renderTabs(){
  const c=document.getElementById('tabsContainer');
  const types=Object.keys(skeletonData).filter(k=>k!=='meta');
  c.innerHTML=types.map(k=>`<button class="tab-btn ${k===currentType?'active':''}" onclick="switchType('${k}')">${skeletonData[k].label}</button>`).join('');
}
function switchType(type){currentType=type;currentVariation=0;currentPracticeQuestion=0;stopPractice();renderTabs();renderContent();updateNav();}

/* ══ RENDER ══ */
function renderContent(){
  const area=document.getElementById('contentArea');
  if(viewMode==='skeleton'){
    const variation=skeletonData[currentType].skeletons[currentVariation];
    document.getElementById('contentTitle').textContent=`${skeletonData[currentType].label} — ${variation.name}`;
    area.innerHTML=renderSkeleton(variation);
  }else if(viewMode==='phrases'){
    document.getElementById('contentTitle').textContent=skeletonData[currentType].label;
    area.innerHTML=renderPhrases(currentType);
  }else{
    document.getElementById('contentTitle').textContent=`${skeletonData[currentType].label} — Phrase Practice`;
    area.innerHTML=renderPractice(currentType);
    attachPracticeControls();
  }
}

function renderSkeleton(variation){
  let h='<div class="skeleton-display">';
  variation.skeleton.forEach((para,i)=>{
    h+='<div class="paragraph-block">';
    const t=para.title.toLowerCase();
    const c=t.includes('intro')||t.includes('opening')?'intro':t.includes('conclu')||t.includes('closing')?'conclusion':'body';
    h+=`<div class="paragraph-title ${c}">${para.emoji||''} ${para.title}</div>`;
    const prefix=getListingPrefix(i,variation.skeleton.length);
    para.lines.forEach((line,li)=>{
      if(prefix&&li===0&&line){h+=`<div class="paragraph-text"><span class="listing-marker">${prefix}</span> ${line.charAt(0).toLowerCase()+line.slice(1)}</div>`;}
      else{h+=`<div class="paragraph-text">${line||'&nbsp;'}</div>`;}
    });
    if(i<variation.skeleton.length-1)h+='</div><div class="divider"></div>';else h+='</div>';
  });
  return h+'</div>';
}

function renderPhrases(type){
  if(!phraseData[type]||!phraseData[type].categories)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35)">No phrase bank available.</div>';
  let h='<div class="phrases-display">';
  phraseData[type].categories.forEach(cat=>{
    const t=cat.title.toLowerCase();
    const c=t.includes('intro')||t.includes('opening')?'intro':t.includes('conclu')||t.includes('closing')?'conclusion':'body';
    h+=`<div class="phrase-category"><div class="category-title ${c}">${cat.title}</div>`;
    cat.subcategories.forEach(sub=>{
      h+=`<div class="subcategory"><div class="subcategory-title">${sub.subtitle}</div><ul class="phrase-list">`;
      sub.phrases.forEach(p=>{h+=`<li class="phrase-item">${p}</li>`;});
      h+='</ul></div>';
    });
    h+='</div>';
  });
  return h+'</div>';
}

function renderPractice(type){
  const set=PRACTICE_DATA[type];
  if(!set||!set.length)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35)">Practice coming soon for this type.</div>';
  const data=set[currentPracticeQuestion];
  let h=`<div class="practice-display">
    <div class="practice-question">
      <div class="practice-question-label">Question ${currentPracticeQuestion+1} of ${set.length}</div>
      <div class="practice-question-text">${data.question}</div>
    </div>
    <div class="practice-controls">
      <button class="play-practice-btn" id="playPracticeBtn" onclick="startPractice()">▶ Play</button>
      <div class="practice-caption" id="practiceCaption">Press Play to hear the model answer</div>
    </div>
    <div class="practice-answer">
      <div class="practice-answer-label">Model Answer — watch for the phrase banners</div>`;
  data.answer.forEach((line,i)=>{
    const hasPhrase=!!line.phrase;
    h+=`<div class="answer-line ${hasPhrase?'has-phrase':''}" id="answerLine${i}"><div class="answer-marker"></div><div class="answer-text" id="answerText${i}">${line.text}${hasPhrase?`<span class="answer-phrase-tag tag-${line.phraseType||'body'}">${line.label||'phrase'}</span>`:''}</div></div>`;
  });
  h+='</div></div>';return h;
}

/* ══ PRACTICE AUDIO ══ */
let practiceActive=false,practiceSynth=window.speechSynthesis,practiceNarrator=null,silentPractice=null,currentBanner=null;

async function getPracticeVoice(){
  return new Promise(resolve=>{
    const load=()=>{
      const v=practiceSynth.getVoices();
      const found=v.find(x=>x.name==='Google UK English Male')||v.find(x=>x.name==='Daniel')||v.find(x=>x.lang==='en-GB')||v.find(x=>x.lang.startsWith('en'))||v[0]||null;
      resolve(found);
    };
    if(practiceSynth.getVoices().length)load();else{practiceSynth.onvoiceschanged=load;}
  });
}

function stopPractice(){
  practiceActive=false;
  if(silentPractice){clearTimeout(silentPractice);silentPractice=null;}
  practiceSynth.cancel();
  if(currentBanner){currentBanner.remove();currentBanner=null;}
  const btn=document.getElementById('playPracticeBtn');
  const cap=document.getElementById('practiceCaption');
  if(btn){btn.textContent='▶ Play';btn.disabled=false;}
  if(cap){cap.textContent='Press Play to hear the model answer';cap.classList.remove('speaking');}
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
}

async function startPractice(){
  if(practiceActive){stopPractice();return;}
  const data=PRACTICE_DATA[currentType][currentPracticeQuestion];
  if(!data)return;
  practiceActive=true;
  practiceNarrator=await getPracticeVoice();
  const btn=document.getElementById('playPracticeBtn');
  const cap=document.getElementById('practiceCaption');
  btn.textContent='■ Stop';
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
  for(let i=0;i<data.answer.length;i++){
    if(!practiceActive)break;
    const line=data.answer[i];
    const lineEl=document.getElementById(`answerLine${i}`);
    if(cap){cap.textContent=line.text;cap.classList.add('speaking');}
    if(line.phrase&&line.phraseType){
      launchBanner(line.phrase,lineEl,`type-${line.phraseType}`,line.label||'Key Phrase',()=>{});
      await speakLine(line.text);
    }else{await speakLine(line.text);}
    if(lineEl)lineEl.classList.add('played');
    if(practiceActive)await wait(600);
  }
  if(practiceActive){stopPractice();if(cap){cap.textContent='Complete. Press Play to repeat.';cap.classList.remove('speaking');}}
}

function speakLine(text){
  return new Promise(resolve=>{
    if(!practiceActive){resolve();return;}
    practiceSynth.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    utt.voice=practiceNarrator;utt.rate=0.88;utt.pitch=1.05;utt.volume=1;
    utt.onend=()=>resolve();utt.onerror=()=>resolve();
    practiceSynth.speak(utt);
  });
}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function attachPracticeControls(){}

/* ══ BANNER ══ */
function launchBanner(htmlText,slotEl,typeClass,label,onLanded){
  if(currentBanner){currentBanner.remove();currentBanner=null;}
  const banner=document.createElement('div');
  banner.className=`fly-banner ${typeClass}`;
  banner.innerHTML=htmlText;
  banner.setAttribute('data-label',label);
  banner.style.visibility='hidden';banner.style.left='0px';banner.style.top='0px';
  document.body.appendChild(banner);
  const bw=banner.offsetWidth,bh=banner.offsetHeight,vw=window.innerWidth,vh=window.innerHeight;
  banner.style.left=Math.round((vw-bw)/2)+'px';banner.style.top=Math.round((vh-bh)/2)+'px';
  banner.style.visibility='visible';
  void banner.offsetWidth;banner.classList.add('phase-float');
  setTimeout(()=>{
    banner.classList.remove('phase-float');void banner.offsetWidth;banner.classList.add('phase-hover');
    currentBanner=banner;onLanded&&onLanded();
  },550);
}

/* ══ VIEW MODE ══ */
function setViewMode(mode){
  stopPractice();if(mode==='practice')currentPracticeQuestion=0;
  viewMode=mode;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  renderContent();updateNav();
}

/* ══ NAV ══ */
function navigate(dir){
  stopPractice();
  if(viewMode==='skeleton'){
    const t=skeletonData[currentType];
    currentVariation=Math.max(0,Math.min(currentVariation+dir,t.skeletons.length-1));
  }else if(viewMode==='practice'){
    const set=PRACTICE_DATA[currentType]||[];
    const next=currentPracticeQuestion+dir;
    if(next>=0&&next<set.length){currentPracticeQuestion=next;}
    else{
      const types=Object.keys(skeletonData).filter(k=>k!=='meta');
      const idx=types.indexOf(currentType)+dir;
      if(idx>=0&&idx<types.length){currentType=types[idx];currentVariation=0;currentPracticeQuestion=dir>0?0:(PRACTICE_DATA[types[idx]]||[]).length-1;renderTabs();}
    }
  }else{
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const idx=types.indexOf(currentType)+dir;
    if(idx>=0&&idx<types.length){switchType(types[idx]);return;}
  }
  renderContent();updateNav();
}

function updateNav(){
  const prev=document.getElementById('btnPrev'),next=document.getElementById('btnNext'),ctr=document.getElementById('pageCounter');
  if(viewMode==='skeleton'){
    const t=skeletonData[currentType];
    prev.disabled=currentVariation===0;next.disabled=currentVariation===t.skeletons.length-1;
    ctr.textContent=`${currentVariation+1} / ${t.skeletons.length}`;
  }else if(viewMode==='practice'){
    const set=PRACTICE_DATA[currentType]||[];
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const typeIdx=types.indexOf(currentType);
    prev.disabled=(currentPracticeQuestion===0&&typeIdx===0);
    next.disabled=(currentPracticeQuestion===set.length-1&&typeIdx===types.length-1);
    ctr.textContent=`Q ${currentPracticeQuestion+1} / ${set.length}`;
  }else{
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const idx=types.indexOf(currentType);
    prev.disabled=idx===0;next.disabled=idx===types.length-1;
    ctr.textContent=`${idx+1} / ${types.length}`;
  }
}

/* ══ FOOTER NAV ══ */
function switchMode(mode){
  const map={question:'essay-question-selector.html',plan:'essay-plan.html',build:'essay-builder-interactive.html',sample:'essay-master.html'};
  if(map[mode])window.location.href=map[mode];
}

document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')navigate(-1);if(e.key==='ArrowRight')navigate(1);});

init();
</script>
