<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Builder — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0c;--gold:#C9A961;--gold-d:#9B7D3A;--gold-l:#E8D4A0;
  --white:#FAFAF8;--ink:#0d0d0d;
  --teal:#5ab5ac;--teal-d:#4a9a92;
  --coral:#f89643;--coral-d:#e67e2e;
  --purple:#8b7ba8;--purple-d:#726291;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;}
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:2vh 3vw;}
.card{width:100%;height:100%;max-width:900px;max-height:95vh;background:var(--white);border-radius:1.5rem;box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));z-index:5;}

/* HEADER */
.card-brand{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.875rem 1.25rem 0.625rem;margin-top:3px;position:relative;border-bottom:1px solid rgba(0,0,0,0.06);}
.home-link{text-decoration:none;font-size:0.875rem;font-weight:600;color:var(--gold);transition:all 0.2s;padding:0.35rem 0.5rem;border-radius:0.5rem;}
.home-link:hover{background:rgba(201,169,97,0.1);}
.brand-word{position:absolute;left:50%;transform:translateX(-50%);font-size:0.58rem;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.18);}
.menu-btn{background:#000;border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.menu-dots{display:flex;gap:3px;}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:#fff;}

/* TABS */
.card-tabs{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.625rem 1.25rem;background:var(--white);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto;}
.tab-btn{background:transparent;border:none;border-bottom:3px solid transparent;padding:0.45rem 0.875rem;font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.4);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;}
.tab-btn:hover{color:rgba(0,0,0,0.6);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* CONTENT */
.card-content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.content-header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:0.825rem 1.75rem 0.625rem;border-bottom:2px solid rgba(0,0,0,0.06);}
.content-title{font-size:0.68rem;font-weight:600;color:rgba(0,0,0,0.4);text-transform:uppercase;letter-spacing:0.1em;}
.view-toggle{display:flex;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);border-radius:7px;padding:0.225rem;gap:0.225rem;}
.toggle-btn{padding:0.35rem 0.75rem;background:transparent;border:none;border-radius:5px;color:rgba(0,0,0,0.5);font-size:0.65rem;font-weight:800;cursor:pointer;transition:all 0.25s;text-transform:uppercase;letter-spacing:0.05em;}
.toggle-btn:hover{color:rgba(0,0,0,0.7);}
.toggle-btn.active{background:#000;color:var(--gold);}

/* SCROLLABLE */
.infographic{flex:1;padding:1rem 1.75rem;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}
.infographic::-webkit-scrollbar{width:5px;}
.infographic::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2.5px;}

/* SKELETON */
.skeleton-display .paragraph-block{margin-bottom:0.875rem;}
.skeleton-display .paragraph-title{color:rgba(0,0,0,0.5);margin-bottom:0.35rem;font-weight:700;font-size:0.68rem;}
.skeleton-display .paragraph-title.intro{color:#5ab5ac;}
.skeleton-display .paragraph-title.body{color:#f89643;}
.skeleton-display .paragraph-title.conclusion{color:#8b7ba8;}
.skeleton-display .paragraph-text{color:rgba(0,0,0,0.8);line-height:1.45;margin-bottom:0.225rem;font-size:0.7rem;}
.skeleton-display .paragraph-text .listing-marker{color:#000;font-weight:700;font-style:italic;}
.skeleton-display .divider{height:1px;background:rgba(0,0,0,0.1);margin:0.65rem 0;}

/* PHRASES */
.phrases-display{font-family:'Inter',sans-serif;color:rgba(0,0,0,0.9);}
.phrase-category{margin-bottom:1.5rem;}
.category-title{font-size:0.75rem;font-weight:800;color:rgba(0,0,0,0.9);margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.08em;padding-bottom:0.4rem;border-bottom:2px solid rgba(0,0,0,0.2);}
.category-title.intro{color:#5ab5ac;border-bottom-color:#5ab5ac;}
.category-title.body{color:#f89643;border-bottom-color:#f89643;}
.category-title.conclusion{color:#8b7ba8;border-bottom-color:#8b7ba8;}
.subcategory{margin-bottom:1.125rem;}
.subcategory-title{font-size:0.7rem;font-weight:700;color:rgba(0,0,0,0.7);margin-bottom:0.6rem;text-transform:uppercase;letter-spacing:0.05em;}
.phrase-list{list-style:none;padding:0;}
.phrase-item{font-size:0.75rem;line-height:1.6;color:rgba(0,0,0,0.8);margin-bottom:0.5rem;padding-left:0.875rem;position:relative;}
.phrase-item:before{content:"→";position:absolute;left:0;color:var(--gold);font-weight:700;}

/* ── PRACTICE MODE ── */
.practice-display{display:flex;flex-direction:column;gap:1.25rem;}

.practice-question{
  background:rgba(201,169,97,0.08);
  border-left:4px solid var(--gold);
  border-radius:0.75rem;
  padding:1rem 1.25rem;
}
.practice-question-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:0.35rem;}
.practice-question-text{font-size:1rem;font-weight:700;color:var(--ink);line-height:1.4;}

.practice-answer{
  background:rgba(0,0,0,0.03);
  border:1px solid rgba(0,0,0,0.07);
  border-radius:0.75rem;
  padding:1.1rem 1.25rem;
  position:relative;
}
.practice-answer-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:rgba(0,0,0,0.3);margin-bottom:0.5rem;}

/* Each sentence row */
.answer-line{
  display:flex;align-items:flex-start;gap:0.75rem;
  padding:0.45rem 0;
  border-bottom:1px solid rgba(0,0,0,0.05);
  cursor:pointer;
  border-radius:0.4rem;
  transition:background 0.15s;
}
.answer-line:last-child{border-bottom:none;}
.answer-line:hover{background:rgba(0,0,0,0.03);}
.answer-line.played .answer-text{opacity:0.38;}

.answer-marker{
  flex-shrink:0;
  width:6px;height:6px;border-radius:50%;
  margin-top:0.45rem;
  background:rgba(0,0,0,0.18);
  transition:background 0.3s;
}
.answer-line.has-phrase .answer-marker{ background:var(--gold); }
.answer-line.played .answer-marker{ background:rgba(0,0,0,0.1); }

.answer-text{font-size:0.88rem;line-height:1.6;color:var(--ink);font-family:'DM Sans',sans-serif;}
.answer-phrase-tag{
  display:inline-block;
  font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;
  padding:0.15rem 0.5rem;border-radius:2rem;
  margin-left:0.4rem;vertical-align:middle;
  opacity:0.75;
}
.tag-intro{background:rgba(90,181,172,0.12);color:var(--teal);}
.tag-body{background:rgba(248,150,67,0.12);color:var(--coral);}
.tag-conclusion{background:rgba(139,123,168,0.12);color:var(--purple);}

/* Play strip */
.practice-controls{
  display:flex;align-items:center;gap:0.75rem;
  padding:0.75rem 1.25rem;
  background:rgba(0,0,0,0.03);
  border-radius:0.75rem;
  flex-shrink:0;
}
.play-practice-btn{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.55rem 1.1rem;
  background:#000;color:var(--gold);
  border:none;border-radius:2rem;
  font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;
  cursor:pointer;transition:all 0.2s;
}
.play-practice-btn:hover{background:rgba(0,0,0,0.8);}
.play-practice-btn:disabled{opacity:0.35;cursor:not-allowed;}
.practice-caption{
  font-size:0.78rem;font-style:italic;color:rgba(0,0,0,0.4);
  flex:1;line-height:1.4;
  min-height:1.2em;
  transition:color 0.3s;
}
.practice-caption.speaking{color:rgba(0,0,0,0.7);}

/* NAV */
.slide-nav{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.75rem;padding:0.825rem 1.25rem;background:var(--white);border-top:1px solid rgba(0,0,0,0.06);}
.slide-arrow{background:transparent;border:2px solid rgba(0,0,0,0.15);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;font-size:1.3rem;color:rgba(0,0,0,0.6);}
.slide-arrow:hover:not(:disabled){background:var(--gold);border-color:var(--gold);color:#fff;}
.slide-arrow:disabled{opacity:0.25;cursor:not-allowed;}
.page-counter{font-size:0.875rem;font-weight:600;color:rgba(0,0,0,0.5);min-width:72px;text-align:center;}

/* FOOTER */
.card-nav{flex-shrink:0;display:flex;justify-content:center;padding:0.65rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.75rem);background:var(--white);border-top:1px solid rgba(0,0,0,0.06);}
.nav-pill{display:flex;gap:0.15rem;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.3rem 0.35rem;}
.nb{background:transparent;border:none;padding:0.45rem 0.875rem;border-radius:1.5rem;font-size:0.65rem;letter-spacing:0.02em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.24s;white-space:nowrap;min-height:33px;font-weight:500;}
.nb.on{background:var(--ink);color:var(--gold);font-weight:700;}

/* ══ BANNER SYSTEM (from essay-plan) ══ */
.fly-banner {
  position: fixed;
  z-index: 900;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 0.6rem;
  padding: 2rem 2.2rem;
  border-radius: 1.6rem;
  background: #fff;
  border-left: 12px solid var(--teal);
  box-shadow: 0 40px 100px rgba(0,0,0,0.30), 0 10px 30px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
  font-family: 'DM Sans', sans-serif;
  font-size: 1.75rem; font-weight: 700; line-height: 1.45;
  color: var(--ink);
  text-align: left;
  width: min(360px, 88vw);
  height: min(360px, 88vw);
  overflow: hidden;
  position: relative;
}
.fly-banner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  border-radius: 1.6rem 1.6rem 0 0;
}
.fly-banner::after {
  content: attr(data-label);
  display: block;
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.14em;
  margin-bottom: 0.15rem;
}
.fly-banner.type-intro      { border-left-color:var(--teal); }
.fly-banner.type-intro::before { background:var(--teal); }
.fly-banner.type-intro::after  { color:var(--teal); }
.fly-banner.type-body       { border-left-color:var(--coral); }
.fly-banner.type-body::before  { background:var(--coral); }
.fly-banner.type-body::after   { color:var(--coral); }
.fly-banner.type-conclusion { border-left-color:var(--purple); }
.fly-banner.type-conclusion::before { background:var(--purple); }
.fly-banner.type-conclusion::after  { color:var(--purple); }

.fly-banner.phase-float { animation: bannerFloat 0.55s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes bannerFloat {
  0%   { opacity:0; transform:scale(0.6) translateY(-60px); }
  65%  { opacity:1; transform:scale(1.04) translateY(6px); }
  100% { opacity:1; transform:scale(1) translateY(0); }
}
.fly-banner.phase-hover { animation: bannerBob 1.8s ease-in-out infinite; }
@keyframes bannerBob {
  0%,100% { transform:scale(1) translateY(0); }
  50%     { transform:scale(1) translateY(-7px); }
}
.fly-banner.phase-dive {
  animation: bannerDive 0.52s cubic-bezier(0.6,0,0.8,1) both;
}
@keyframes bannerDive {
  0%   { opacity:1;   transform:scale(1)    translateY(0) translateX(0); }
  55%  { opacity:1;   transform:scale(0.72) translateY(var(--dive-y)) translateX(var(--dive-x)); }
  85%  { opacity:0.8; transform:scale(0.28) translateY(calc(var(--dive-y)*1.08)) translateX(var(--dive-x)); }
  100% { opacity:1;   transform:scale(0.18) translateY(calc(var(--dive-y)*1.1))  translateX(var(--dive-x)); }
}
/* Banner stays visible until replaced by next banner */
.fly-banner.phase-settled {
  opacity: 1;
  transform: scale(0.18) translateY(var(--dive-y)) translateX(var(--dive-x));
  z-index: 900; /* Keep on top */
}

/* Support text settle */
.answer-text.landing { animation: textSettle 0.28s ease both; }
@keyframes textSettle {
  from { opacity:0; transform:translateY(4px); }
  to   { opacity:1; transform:translateY(0); }
}

@media(max-width:768px){
  .shell{padding:1vh 2vw;}
  .card{max-width:100%;border-radius:1rem;}
  .infographic{padding:0.875rem 1.3rem;}
  .tab-btn{padding:0.375rem 0.7rem;font-size:0.6rem;}
}
</style>
</head>

</div>

/* ══ LISTING MARKERS ══ */
const listingMarkers = {
  first:["Firstly, it seems to me that","First and foremost, it is widely believed that","To begin with, I believe that"],
  second:["Secondly, it is often suggested that","Furthermore, I would argue that","Moreover, it is worth noting that"],
  third:["On the other hand, in my view,","However, critics may argue that","Nevertheless, it is widely recognised that"],
  counter:["Some people might argue that","Admittedly, it is my sincere belief that","While it could be argued that"]
};
function getRandomItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function getListingPrefix(index, total){
  if(index===0) return null;
  if(index===1) return getRandomItem(listingMarkers.first);
  if(index===2) return getRandomItem(listingMarkers.second);
  if(index===3&&total>=4) return getRandomItem(listingMarkers.third);
  if(index===total-1) return null;
  return getRandomItem(listingMarkers.second);
}

/* ══ INIT ══ */
async function init(){
  try{
    const [r1,r2] = await Promise.all([
      fetch('data/complete-essay-phrase-bank.json'),
      fetch('data/complete-essay-phrase-bank1.json')
    ]);
    skeletonData = await r1.json();
    phraseData   = await r2.json();
    renderTabs();
    renderContent();
    updateNav();
  } catch(e){
    console.error(e);
    document.getElementById('contentArea').innerHTML =
      '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">⚠️ Failed to load data</div>';
  }
}

/* ══ TABS ══ */
function renderTabs(){
  const c = document.getElementById('tabsContainer');
  const types = Object.keys(skeletonData).filter(k=>k!=='meta');
  c.innerHTML = types.map(k=>`
    <button class="tab-btn ${k===currentType?'active':''}" onclick="switchType('${k}')">
      ${skeletonData[k].label}
    </button>`).join('');
}

function switchType(type){
  currentType = type;
  currentVariation = 0;
  currentPracticeQuestion = 0;
  stopPractice();
  renderTabs();
  renderContent();
  updateNav();
}

/* ══ RENDER ══ */
function renderContent(){
  const area = document.getElementById('contentArea');
  if(viewMode==='skeleton'){
    const variation = skeletonData[currentType].skeletons[currentVariation];
    document.getElementById('contentTitle').textContent =
      `${skeletonData[currentType].label} — ${variation.name}`;
    area.innerHTML = renderSkeleton(variation);
  } else if(viewMode==='phrases'){
    document.getElementById('contentTitle').textContent = skeletonData[currentType].label;
    area.innerHTML = renderPhrases(currentType);
  } else {
    document.getElementById('contentTitle').textContent =
      `${skeletonData[currentType].label} — Phrase Practice`;
    area.innerHTML = renderPractice(currentType);
    attachPracticeControls();
  }
}

function renderSkeleton(variation){
  let h='<div class="skeleton-display">';
  variation.skeleton.forEach((para,i)=>{
    h+='<div class="paragraph-block">';
    const t=para.title.toLowerCase();
    const c=t.includes('intro')||t.includes('opening')?'intro':t.includes('conclu')||t.includes('closing')?'conclusion':'body';
    h+=`<div class="paragraph-title ${c}">${para.emoji||''} ${para.title}</div>`;
    const prefix=getListingPrefix(i,variation.skeleton.length);
    para.lines.forEach((line,li)=>{
      if(prefix&&li===0&&line){
        h+=`<div class="paragraph-text"><span class="listing-marker">${prefix}</span> ${line.charAt(0).toLowerCase()+line.slice(1)}</div>`;
      } else {
        h+=`<div class="paragraph-text">${line||'&nbsp;'}</div>`;
      }
    });
    if(i<variation.skeleton.length-1) h+='</div><div class="divider"></div>';
    else h+='</div>';
  });
  return h+'</div>';
}

function renderPhrases(type){
  if(!phraseData[type]||!phraseData[type].categories)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">No phrase bank available.</div>';
  let h='<div class="phrases-display">';
  phraseData[type].categories.forEach(cat=>{
    const t=cat.title.toLowerCase();
    const c=t.includes('intro')||t.includes('opening')?'intro':t.includes('conclu')||t.includes('closing')?'conclusion':'body';
    h+=`<div class="phrase-category"><div class="category-title ${c}">${cat.title}</div>`;
    cat.subcategories.forEach(sub=>{
      h+=`<div class="subcategory"><div class="subcategory-title">${sub.subtitle}</div><ul class="phrase-list">`;
      sub.phrases.forEach(p=>{ h+=`<li class="phrase-item">${p}</li>`; });
      h+='</ul></div>';
    });
    h+='</div>';
  });
  return h+'</div>';
}

/* ══ PRACTICE RENDER ══ */
function renderPractice(type){
  const set = PRACTICE_DATA[type];
  if(!set||!set.length) return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">Practice coming soon for this type.</div>';
  const data = set[currentPracticeQuestion];

  let h = `<div class="practice-display">
    <div class="practice-question">
      <div class="practice-question-label">Question ${currentPracticeQuestion+1} of ${set.length}</div>
      <div class="practice-question-text">${data.question}</div>
    </div>
    <div class="practice-controls">
      <button class="play-practice-btn" id="playPracticeBtn" onclick="startPractice()">▶ Play</button>
      <div class="practice-caption" id="practiceCaption">Press Play to hear the model answer</div>
    </div>
    <div class="practice-answer">
      <div class="practice-answer-label">Model Answer — watch for the phrase banners</div>`;

  data.answer.forEach((line, i) => {
    const hasPhrase = !!line.phrase;
    h += `<div class="answer-line ${hasPhrase?'has-phrase':''}" id="answerLine${i}">
      <div class="answer-marker"></div>
      <div class="answer-text" id="answerText${i}">${line.text}${hasPhrase?`<span class="answer-phrase-tag tag-${line.phraseType||'body'}">${line.label||'phrase'}</span>`:''}</div>
    </div>`;
  });

  h += '</div></div>';
  return h;
}

/* ══ PRACTICE AUDIO ══ */
let practiceActive = false;
let practiceSynth  = window.speechSynthesis;
let practiceNarrator = null;
let silentPractice = null;
let currentBanner = null; // Track visible banner

async function getPracticeVoice(){
  return new Promise(resolve=>{
    const load = ()=>{
      const v = practiceSynth.getVoices();
      const found =
        v.find(x=>x.name==='Google UK English Male') ||
        v.find(x=>x.name==='Daniel') ||
        v.find(x=>x.lang==='en-GB') ||
        v.find(x=>x.lang.startsWith('en')) ||
        v[0] || null;
      resolve(found);
    };
    if(practiceSynth.getVoices().length) load();
    else { practiceSynth.onvoiceschanged = load; }
  });
}

function stopPractice(){
  practiceActive = false;
  if(silentPractice){ clearTimeout(silentPractice); silentPractice=null; }
  practiceSynth.cancel();
  if(currentBanner){ currentBanner.remove(); currentBanner=null; }
  const btn = document.getElementById('playPracticeBtn');
  const cap = document.getElementById('practiceCaption');
  if(btn){ btn.textContent='▶ Play'; btn.disabled=false; }
  if(cap){ cap.textContent='Press Play to hear the model answer'; cap.classList.remove('speaking'); }
  // Reset all lines
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
}

async function startPractice(){
  if(practiceActive){ stopPractice(); return; }

  const data = PRACTICE_DATA[currentType][currentPracticeQuestion];
  if(!data) return;

  practiceActive = true;
  practiceNarrator = await getPracticeVoice();

  const btn = document.getElementById('playPracticeBtn');
  const cap = document.getElementById('practiceCaption');
  btn.textContent = '■ Stop';

  // Reset lines
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));

  for(let i=0; i<data.answer.length; i++){
    if(!practiceActive) break;
    const line = data.answer[i];
    const lineEl = document.getElementById(`answerLine${i}`);
    const textEl = document.getElementById(`answerText${i}`);

    // Update caption
    if(cap){ cap.textContent = line.text; cap.classList.add('speaking'); }

    // If phrase — launch banner BEFORE speaking
    if(line.phrase && line.phraseType){
      launchBanner(
        line.phrase,
        lineEl,
        `type-${line.phraseType}`,
        line.label || 'Key Phrase',
        () => { /* banner has landed */ }
      );
      // Speak in parallel — voice starts while banner floats
      await speakLine(line.text);
    } else {
      await speakLine(line.text);
    }

    // Mark played — text fades gently
    if(lineEl) lineEl.classList.add('played');

    // Brief pause between lines
    if(practiceActive) await wait(600);
  }

  if(practiceActive){
    stopPractice();
    if(cap){ cap.textContent='Complete. Press Play to repeat.'; cap.classList.remove('speaking'); }
  }
}

function speakLine(text){
  return new Promise(resolve=>{
    if(!practiceActive){ resolve(); return; }
    practiceSynth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.voice  = practiceNarrator;
    utt.rate   = 0.88;
    utt.pitch  = 1.05;
    utt.volume = 1;
    utt.onend   = ()=>resolve();
    utt.onerror = ()=>resolve();
    practiceSynth.speak(utt);
  });
}

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function attachPracticeControls(){
  // nothing extra needed — onclick is inline
}

/* ══ BANNER SYSTEM ══ */
function launchBanner(htmlText, slotEl, typeClass, label, onLanded){
  // Remove previous banner immediately when new one launches
  if(currentBanner){
    currentBanner.remove();
    currentBanner = null;
  }

  const banner = document.createElement('div');
  banner.className = `fly-banner ${typeClass}`;
  banner.innerHTML = htmlText;
  banner.setAttribute('data-label', label);

  banner.style.visibility='hidden';
  banner.style.left='0px';
  banner.style.top='0px';
  document.body.appendChild(banner);

  const bw=banner.offsetWidth, bh=banner.offsetHeight;
  const vw=window.innerWidth,  vh=window.innerHeight;
  banner.style.left = Math.round((vw-bw)/2)+'px';
  banner.style.top  = Math.round((vh-bh)/2)+'px';
  banner.style.visibility='visible';

  void banner.offsetWidth;
  banner.classList.add('phase-float');

  setTimeout(()=>{
    banner.classList.remove('phase-float');
    void banner.offsetWidth;
    banner.classList.add('phase-hover');

    setTimeout(()=>{
      const slotRect   = slotEl.getBoundingClientRect();
      const bannerRect = banner.getBoundingClientRect();
      const diveX = (slotRect.left+slotRect.width/2)  - (bannerRect.left+bannerRect.width/2);
      const diveY = (slotRect.top+slotRect.height/2)  - (bannerRect.top+bannerRect.height/2);
      banner.style.setProperty('--dive-x',`${diveX}px`);
      banner.style.setProperty('--dive-y',`${diveY}px`);
      banner.classList.remove('phase-hover');
      void banner.offsetWidth;
      banner.classList.add('phase-dive');

      setTimeout(()=>{
        onLanded && onLanded();
        // Banner stays settled — no fadeout, no removal
        void banner.offsetWidth;
        banner.classList.remove('phase-dive');
        banner.classList.add('phase-settled');
        currentBanner = banner; // Track this banner
      }, 480);

    }, 4000); // hover duration — 4s for reading

  }, 520);
}

/* ══ VIEW MODE ══ */
function setViewMode(mode){
  stopPractice();
  if(mode==='practice') currentPracticeQuestion=0;
  viewMode = mode;
  document.querySelectorAll('.toggle-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode===mode);
  });
  renderContent();
  updateNav();
}

/* ══ NAV ══ */
function navigate(dir){
  stopPractice();
  if(viewMode==='skeleton'){
    const t=skeletonData[currentType];
    currentVariation=Math.max(0,Math.min(currentVariation+dir,t.skeletons.length-1));
  } else if(viewMode==='practice'){
    const set=PRACTICE_DATA[currentType]||[];
    const next=currentPracticeQuestion+dir;
    if(next>=0&&next<set.length){
      currentPracticeQuestion=next;
    } else {
      // At boundary — navigate to next/prev essay type
      const types=Object.keys(skeletonData).filter(k=>k!=='meta');
      const idx=types.indexOf(currentType)+dir;
      if(idx>=0&&idx<types.length){
        currentType=types[idx];
        currentVariation=0;
        currentPracticeQuestion = dir>0 ? 0 : (PRACTICE_DATA[types[idx]]||[]).length-1;
        renderTabs();
      }
    }
  } else {
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const idx=types.indexOf(currentType)+dir;
    if(idx>=0&&idx<types.length){ switchType(types[idx]); return; }
  }
  renderContent(); updateNav();
}

function updateNav(){
  const prev=document.getElementById('btnPrev');
  const next=document.getElementById('btnNext');
  const ctr =document.getElementById('pageCounter');
  if(viewMode==='skeleton'){
    const t=skeletonData[currentType];
    prev.disabled=currentVariation===0;
    next.disabled=currentVariation===t.skeletons.length-1;
    ctr.textContent=`${currentVariation+1} / ${t.skeletons.length}`;
  } else if(viewMode==='practice'){
    const set=PRACTICE_DATA[currentType]||[];
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const typeIdx=types.indexOf(currentType);
    // Disable prev only if first question of first type; next only if last question of last type
    prev.disabled=(currentPracticeQuestion===0&&typeIdx===0);
    next.disabled=(currentPracticeQuestion===set.length-1&&typeIdx===types.length-1);
    ctr.textContent=`Q ${currentPracticeQuestion+1} / ${set.length}`;
  } else {
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const idx=types.indexOf(currentType);
    prev.disabled=idx===0; next.disabled=idx===types.length-1;
    ctr.textContent=`${idx+1} / ${types.length}`;
  }
}

/* ══ MODE SWITCHING ══ */
function switchMode(mode){
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
  const map={question:'essay-question-selector.html',plan:'essay-plan.html',build:'essay-builder-interactive.html',sample:'essay-master.html'};
  if(map[mode]) window.location.href=map[mode];
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') navigate(-1);
  if(e.key==='ArrowRight') navigate(1);
});

init();
