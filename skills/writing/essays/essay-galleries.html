<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTUITY — Essay Galleries</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --gold:#C9A961; --gold-glow:rgba(201,169,97,.4);
    --sec1:#3fbfb2; --sec1-d:#2a8b81;   /* introduction */
    --sec2:#f0a23c; --sec2-d:#c07a1f;   /* body */
    --sec3:#e85a4f; --sec3-d:#b83a31;   /* conclusion */
  }
  html,body{width:100%;height:100%;overflow:hidden;background:#0d0d0d;}
  body{font-family:'DM Sans',sans-serif;color:#e5e5e7;user-select:none;-webkit-user-select:none;}

  .header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;
    padding:.65rem 1.25rem;background:rgba(13,13,13,.88);backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,.06);height:50px;}
  .back-link{text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.6rem;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);transition:color .2s;}
  .back-link:hover{color:rgba(255,255,255,.7);}

  .mode-selector{display:flex;gap:0;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);
    border-radius:999px;padding:.18rem;}
  .mode-btn{font-family:'Space Grotesk',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;padding:.3rem .85rem;border-radius:999px;border:none;background:transparent;
    color:rgba(255,255,255,.3);cursor:pointer;transition:all .25s;}
  .mode-btn:hover{color:rgba(255,255,255,.7);}
  .mode-btn.active{background:rgba(255,255,255,.13);color:#fff;}
  .stage.introduction .mode-btn[data-mode="introduction"].active{color:var(--sec1);}
  .stage.body .mode-btn[data-mode="body"].active{color:var(--sec2);}
  .stage.conclusion .mode-btn[data-mode="conclusion"].active{color:var(--sec3);}

  .type-badge{font-family:'Space Grotesk',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;padding:.28rem .8rem;border-radius:999px;border:1px solid rgba(201,169,97,.4);
    background:rgba(201,169,97,.12);color:var(--gold);min-width:90px;text-align:center;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:150px;}

  .stage{position:fixed;top:50px;left:0;right:0;bottom:0;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;padding:.9rem;gap:.6rem;overflow:hidden;}

  .question-bar{width:100%;max-width:820px;display:flex;align-items:center;gap:.6rem;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:.9rem;
    padding:.6rem .9rem;cursor:pointer;transition:border-color .2s;flex-shrink:0;}
  .question-bar:hover{border-color:rgba(201,169,97,.4);}
  .question-bar .qtext{flex:1;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;
    color:#e5e5e7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .question-bar .qtext.placeholder{color:rgba(255,255,255,.35);font-weight:500;}
  .question-bar .qchange{font-family:'Space Grotesk',sans-serif;font-size:.52rem;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:var(--gold);flex-shrink:0;white-space:nowrap;}

  .picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
    z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
  .picker-overlay.open{display:flex;}
  .picker-panel{width:100%;max-width:640px;max-height:80vh;background:#161618;border:1px solid rgba(201,169,97,.25);
    border-radius:1.1rem;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.6);}
  .picker-head{padding:1rem 1.2rem .7rem;border-bottom:1px solid rgba(255,255,255,.06);
    font-family:'Space Grotesk',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:rgba(255,255,255,.5);}
  .picker-list{overflow-y:auto;padding:.5rem;}
  .picker-item{padding:.7rem .9rem;border-radius:.6rem;cursor:pointer;transition:background .18s;
    display:flex;flex-direction:column;gap:.15rem;}
  .picker-item:hover{background:rgba(255,255,255,.05);}
  .picker-item.selected{background:rgba(201,169,97,.14);}
  .picker-item .pq{font-size:.86rem;font-weight:600;color:#e5e5e7;}
  .picker-item .pt{font-family:'Space Grotesk',sans-serif;font-size:.5rem;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--gold);opacity:.75;}

  .carousel-wrap{position:relative;width:100%;max-width:820px;flex:1;min-height:0;
    display:flex;flex-direction:column;}
  .slides-container{position:relative;width:100%;flex:1;min-height:0;overflow:visible;}
  .slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    opacity:0;transform:translateX(60px);
    transition:opacity .42s cubic-bezier(.4,0,.2,1),transform .42s cubic-bezier(.4,0,.2,1);pointer-events:none;}
  .slide.active{opacity:1;transform:translateX(0);pointer-events:auto;z-index:10;}
  .slide.exit-left{opacity:0;transform:translateX(-60px);pointer-events:none;}

  .rcard{position:relative;width:100%;height:100%;max-height:100%;background:#ffffff;border-radius:1.25rem;
    padding:2.1rem 1.9rem 1.4rem 2.1rem;display:flex;flex-direction:column;
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset, 0 18px 45px -12px rgba(0,0,0,.55), 0 6px 18px rgba(0,0,0,.35);}
  .rcard::before{content:'';position:absolute;top:1rem;left:2.1rem;right:1.9rem;height:8px;
    background-image:radial-gradient(circle, rgba(0,0,0,.12) 3px, transparent 3.5px);
    background-size:18px 8px;background-repeat:repeat-x;}
  .rhead{position:absolute;top:1.35rem;left:-14px;display:flex;align-items:center;gap:.7rem;
    background:var(--pc);padding:.5rem 1.05rem .5rem .85rem;border-radius:.55rem .8rem .8rem .55rem;
    box-shadow:0 6px 14px -4px rgba(0,0,0,.35);z-index:2;}
  .rhead::after{content:'';position:absolute;left:0;bottom:-10px;border-style:solid;border-width:10px 0 0 15px;
    border-color:var(--pc-d) transparent transparent transparent;filter:brightness(.75);}
  .rnum{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:1.15rem;color:var(--pc);background:#fff;
    width:2.2rem;height:2.2rem;border-radius:.55rem;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.18);flex-shrink:0;}
  .rtitle{display:flex;flex-direction:column;gap:.1rem;}
  .rtitle-main{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.82rem;letter-spacing:.16em;
    text-transform:uppercase;color:#ffffff;}
  .rtitle-sub{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.56rem;letter-spacing:.1em;
    text-transform:uppercase;color:rgba(255,255,255,.85);}

  .rbody{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;
    margin-top:3.2rem;overflow-y:auto;padding:0 .3rem;}
  .rbody::-webkit-scrollbar{width:3px;}
  .rbody::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}
  .rphrase{font-family:'DM Sans',sans-serif;font-size:clamp(1.05rem,2.4vw,1.5rem);line-height:1.62;
    font-weight:500;color:#2b2b30;text-align:center;}
  .rphrase .fill{font-weight:700;color:var(--pc-d);}
  .rphrase .fill.underlined{border-bottom:2px solid rgba(0,0,0,.18);}

  .empty-state{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:.9rem;text-align:center;padding:2rem;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.12);
    border-radius:1.25rem;}
  .empty-state p{font-size:.9rem;color:rgba(255,255,255,.45);max-width:360px;}
  .empty-cta{font-family:'Space Grotesk',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;padding:.55rem 1.3rem;border-radius:999px;border:1px solid var(--gold);
    color:var(--gold);background:rgba(201,169,97,.1);cursor:pointer;transition:all .2s;}
  .empty-cta:hover{background:rgba(201,169,97,.2);}

  .nav-arrows{position:absolute;top:50%;left:-6px;right:-6px;transform:translateY(-50%);display:flex;
    justify-content:space-between;pointer-events:none;z-index:20;}
  .arrow-btn{pointer-events:all;width:42px;height:42px;border-radius:50%;background:rgba(201,169,97,.22);
    border:1px solid rgba(201,169,97,.4);color:var(--gold);font-size:1.1rem;display:flex;align-items:center;
    justify-content:center;cursor:pointer;transition:all .25s;box-shadow:0 6px 16px rgba(0,0,0,.4);}
  .arrow-btn:hover:not(:disabled){background:rgba(201,169,97,.36);transform:scale(1.12);}
  .arrow-btn:disabled{opacity:.18;cursor:not-allowed;}

  .dot-nav{height:46px;display:flex;align-items:center;justify-content:center;gap:.4rem;
    flex-wrap:wrap;padding:0 1rem;flex-shrink:0;overflow:hidden;}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(99,99,102,.32);cursor:pointer;
    transition:all .3s;flex-shrink:0;}
  .dot.active{background:var(--gold);transform:scale(1.45);box-shadow:0 0 10px var(--gold-glow);}
  .dot:hover:not(.active){background:rgba(201,169,97,.45);}

  .loading-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:#0d0d0d;z-index:999;transition:opacity .6s;}
  .loading-screen.fade{opacity:0;pointer-events:none;}
  .ld{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:ld 1.2s ease-in-out infinite;}
  @keyframes ld{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.3)}}

  @media(max-width:600px){
    .rcard{padding:1.9rem 1.3rem 1.1rem 1.5rem;}
    .rphrase{font-size:clamp(.95rem,4.2vw,1.2rem);}
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen"><div class="ld"></div></div>

<header class="header">
  <a class="back-link" href="/?openModal=writing">← Writing</a>
  <div class="mode-selector">
    <button class="mode-btn active" data-mode="introduction">Introduction</button>
    <button class="mode-btn" data-mode="body">Body</button>
    <button class="mode-btn" data-mode="conclusion">Conclusion</button>
  </div>
  <div class="type-badge" id="typeBadge">Pick a question</div>
</header>

<div class="stage introduction" id="stage">
  <div class="question-bar" id="questionBar">
    <span class="qtext placeholder" id="qtext">No question selected — tap to choose one</span>
    <span class="qchange">Change</span>
  </div>

  <div class="carousel-wrap">
    <div class="slides-container" id="slidesContainer"></div>
    <div class="nav-arrows">
      <button class="arrow-btn" id="prevBtn">←</button>
      <button class="arrow-btn" id="nextBtn">→</button>
    </div>
  </div>
  <div class="dot-nav" id="dotNav"></div>
</div>

<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-panel">
    <div class="picker-head">Choose an essay question</div>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>

<script>
const QUESTIONS_URL = 'data/essay-questions.json';
const CARDS_URL      = 'data/essay-cards-models.json';
const VARIANTS_PER_SLOT_INTRO = 14;
const VARIANTS_PER_SLOT_BODY  = 5;
const VARIANTS_PER_SLOT_CONCL = 12;

const BUCKET_LABEL = { first:'First point', addition:'Further point', turn:'Counterpoint' };
const SECTION_META = {
  introduction: { color:'var(--sec1)', dark:'var(--sec1-d)', title:'Introduction' },
  body:         { color:'var(--sec2)', dark:'var(--sec2-d)', title:'Body' },
  conclusion:   { color:'var(--sec3)', dark:'var(--sec3-d)', title:'Conclusion' },
};

let questions = [];
let cardsData = null;
let selectedQuestion = null;
let section = 'introduction';
let slides = [];
let current = 0, prev = -1, busy = false;

async function loadAll() {
  try {
    const [qRes, cRes] = await Promise.allSettled([
      fetch(QUESTIONS_URL).then(r => r.ok ? r.json() : null),
      fetch(CARDS_URL).then(r => r.ok ? r.json() : null),
    ]);
    if (qRes.status === 'fulfilled' && qRes.value) questions = qRes.value.questions || [];
    if (cRes.status === 'fulfilled' && cRes.value) cardsData = cRes.value;
  } catch (e) { console.error('Load failed', e); }

  renderPickerList();
  document.getElementById('loadingScreen').classList.add('fade');
  setTimeout(() => {
    document.getElementById('loadingScreen').style.display = 'none';
    rebuild();
  }, 500);
}

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function keyOf(x){ return (x && x.t) ? x.t : x; }

function fillTopic(rawText, fillWord) {
  const parts = rawText.split('...');
  if (parts.length === 1) return rawText;
  const span = `<span class="fill underlined">${fillWord}</span>`;
  return parts.join(span);
}

// Introduction & Conclusion combine several template pieces that each carry
// their own "..." blank, so the SAME fill value can appear 2-3 times in one
// sentence — use the short label here to keep that readable.
function genIntroSlides(q, type) {
  const SH = cardsData.shared;
  const out = [];
  const seen = new Set();
  let guard = 0;
  while (out.length < VARIANTS_PER_SLOT_INTRO && guard < 200) {
    guard++;
    const bg = pick(SH.background);
    const hinge = pick(type.open.hinge);
    const aim = pick(type.open.aim);
    const raw = `${bg} ${hinge} ... . ${aim}`;
    if (seen.has(raw)) continue;
    seen.add(raw);
    out.push({ text: fillTopic(raw, q.topicShort), label: 'Paraphrased hook' });
  }
  return out;
}

// Body lines each carry exactly ONE blank, so the fuller topicPhrase reads
// naturally and gives richer, more specific paraphrasing.
function genBodySlides(q, type) {
  const SH = cardsData.shared;
  const viewPool = SH.view[type.viewFlavour] || SH.view.opinion;
  const out = [];
  for (let i = 0; i < 3; i++) {
    const signpostKey = type.argue.signpostPlan[i];
    const keyPool = type.argue[type.argue.bodyPlan[i]] || [];
    const label = BUCKET_LABEL[signpostKey] || `Point ${i+1}`;
    const seen = new Set();
    let guard = 0;
    while (out.filter(s => s.slot === i).length < VARIANTS_PER_SLOT_BODY && guard < 200) {
      guard++;
      const sp = pick(SH.signpost[signpostKey] || []);
      const vw = pick(viewPool);
      const ky = keyOf(pick(keyPool));
      const raw = `${sp}, ${vw} ${ky}`;
      if (seen.has(raw)) continue;
      seen.add(raw);
      out.push({ text: fillTopic(raw, q.topicPhrase), label, slot: i });
    }
  }
  return out;
}

// Conclusion verdicts can carry 1-2 blanks in one sentence — short label again.
function genConclusionSlides(q, type) {
  const out = [];
  const seen = new Set();
  let guard = 0;
  while (out.length < VARIANTS_PER_SLOT_CONCL && guard < 200) {
    guard++;
    const summary = pick(type.close.summary);
    const stance = pick(type.close.stance);
    const verdict = pick(type.close.verdict);
    const raw = `${summary} ${stance} ${verdict}`;
    if (seen.has(raw)) continue;
    seen.add(raw);
    out.push({ text: fillTopic(raw, q.topicShort), label: 'Restated verdict' });
  }
  return out;
}

function rebuild() {
  slides = []; current = 0; prev = -1;

  const stage = document.getElementById('stage');
  stage.className = `stage ${section}`;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === section));

  const badge = document.getElementById('typeBadge');
  const qtext = document.getElementById('qtext');

  if (!selectedQuestion || !cardsData) {
    badge.textContent = 'Pick a question';
    qtext.textContent = 'No question selected — tap to choose one';
    qtext.classList.add('placeholder');
    paint(true);
    return;
  }

  const type = cardsData.types[selectedQuestion.essayType];
  badge.textContent = (type?.label) || selectedQuestion.essayType;
  qtext.textContent = selectedQuestion.mainQuestion;
  qtext.classList.remove('placeholder');

  if (!type) { paint(true); return; }

  if (section === 'introduction') slides = genIntroSlides(selectedQuestion, type);
  else if (section === 'body')    slides = genBodySlides(selectedQuestion, type);
  else                            slides = genConclusionSlides(selectedQuestion, type);

  paint(slides.length === 0);
  show(0, 'none');
}

function paint(empty) {
  const container = document.getElementById('slidesContainer');
  const dotNav = document.getElementById('dotNav');
  const meta = SECTION_META[section];

  if (empty) {
    container.innerHTML = `<div class="slide active"><div class="empty-state">
      <p>${!selectedQuestion ? 'Choose an essay question to generate a paraphrase gallery for it.' : 'No templates found for this essay type yet.'}</p>
      ${!selectedQuestion ? '<button class="empty-cta" onclick="openPicker()">Choose a question</button>' : ''}
    </div></div>`;
    dotNav.innerHTML = '';
    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = true;
    return;
  }

  container.innerHTML = slides.map((s,i) => `
    <div class="slide" data-idx="${i}">
      <div class="rcard" style="--pc:${meta.color};--pc-d:${meta.dark}">
        <div class="rhead">
          <div class="rnum">${String(i+1).padStart(2,'0')}</div>
          <div class="rtitle">
            <div class="rtitle-main">${meta.title}</div>
            <div class="rtitle-sub">${s.label}</div>
          </div>
        </div>
        <div class="rbody"><div class="rphrase">${s.text}</div></div>
      </div>
    </div>`).join('');

  dotNav.innerHTML = slides.map((_,i) => `<div class="dot" data-dot="${i}"></div>`).join('');
  dotNav.querySelectorAll('.dot').forEach(d =>
    d.addEventListener('click', e => { e.stopPropagation(); jump(+d.dataset.dot); }));
}

function show(idx, dir) {
  if (!slides.length) return;
  const els = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');

  if (prev >= 0 && prev !== idx && els[prev]) {
    els[prev].classList.remove('active');
    if (dir !== 'none') {
      els[prev].classList.add('exit-left');
      setTimeout(() => els[prev]?.classList.remove('exit-left'), 480);
    }
  }
  if (els[idx]) {
    if (dir === 'forward') els[idx].style.cssText = 'transform:translateX(60px);opacity:0';
    else if (dir === 'back') els[idx].style.cssText = 'transform:translateX(-60px);opacity:0';
    else els[idx].style.cssText = '';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      els[idx].classList.add('active');
      els[idx].style.cssText = '';
    }));
  }
  dots.forEach((d,i) => d.classList.toggle('active', i === idx));
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === slides.length-1;
  prev = idx; current = idx;
}
function next(){ if(busy||current>=slides.length-1) return; busy=true; show(current+1,'forward'); setTimeout(()=>busy=false,480); }
function back(){ if(busy||current<=0) return; busy=true; show(current-1,'back'); setTimeout(()=>busy=false,480); }
function jump(idx){ if(busy) return; busy=true; show(idx, idx>current?'forward':'back'); setTimeout(()=>busy=false,480); }

function renderPickerList() {
  const list = document.getElementById('pickerList');
  list.innerHTML = questions.map(q => `
    <div class="picker-item ${selectedQuestion?.id===q.id?'selected':''}" data-id="${q.id}">
      <div class="pt">${q.essayType.replace('-', ' & ')}</div>
      <div class="pq">${q.mainQuestion}</div>
    </div>`).join('');
  list.querySelectorAll('.picker-item').forEach(it =>
    it.addEventListener('click', () => {
      selectedQuestion = questions.find(q => q.id === it.dataset.id) || null;
      closePicker();
      rebuild();
    }));
}
function openPicker(){ document.getElementById('pickerOverlay').classList.add('open'); renderPickerList(); }
function closePicker(){ document.getElementById('pickerOverlay').classList.remove('open'); }

document.getElementById('prevBtn').addEventListener('click', e => { e.stopPropagation(); back(); });
document.getElementById('nextBtn').addEventListener('click', e => { e.stopPropagation(); next(); });
document.getElementById('questionBar').addEventListener('click', openPicker);
document.getElementById('pickerOverlay').addEventListener('click', e => { if (e.target.id === 'pickerOverlay') closePicker(); });

document.querySelectorAll('.mode-btn').forEach(b =>
  b.addEventListener('click', e => { e.stopPropagation(); section = b.dataset.mode; rebuild(); }));

const wrap = document.querySelector('.carousel-wrap');
let tx=0, ty=0;
wrap.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
wrap.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) dx < 0 ? next() : back();
}, {passive:true});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); back(); }
  if (e.key === 'Escape') closePicker();
});

loadAll();
</script>
</body>
</html>
