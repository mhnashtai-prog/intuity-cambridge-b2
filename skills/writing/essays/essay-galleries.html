<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTUITY — Essay Models</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --gold:#C9A961; --gold-glow:rgba(201,169,97,.4);
    --plum:#7a4a8a; --plum-d:#5d3769; --plum-soft:rgba(122,74,138,.14);
    --ink:#2b2b30; --stance:#93939b;
    --sec1:#3fbfb2; --sec1-d:#2a8b81;
    --sec2:#f0a23c; --sec2-d:#c07a1f;
    --sec3:#e85a4f; --sec3-d:#b83a31;
  }
  html,body{width:100%;height:100%;overflow:hidden;background:#0d0d0d;}
  body{font-family:'DM Sans',sans-serif;color:#e5e5e7;user-select:none;-webkit-user-select:none;}

  .header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;
    padding:.65rem 1.25rem;background:rgba(13,13,13,.88);backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,.06);height:50px;}
  .back-link{text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.6rem;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);transition:color .2s;}
  .back-link:hover{color:rgba(255,255,255,.7);}

  .mode-selector{display:flex;gap:0;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);
    border-radius:999px;padding:.18rem;}
  .mode-btn{font-family:'Space Grotesk',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;padding:.3rem .8rem;border-radius:999px;border:none;background:transparent;
    color:rgba(255,255,255,.3);cursor:pointer;transition:all .25s;}
  .mode-btn:hover{color:rgba(255,255,255,.7);}
  .mode-btn.active{background:rgba(255,255,255,.13);color:#fff;}
  .mode-btn[data-mode="skeleton"].active{color:#c79bd6;}
  .mode-btn[data-mode="introduction"].active{color:var(--sec1);}
  .mode-btn[data-mode="body"].active{color:var(--sec2);}
  .mode-btn[data-mode="conclusion"].active{color:var(--sec3);}

  .type-badge{font-family:'Space Grotesk',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;padding:.28rem .8rem;border-radius:999px;border:1px solid rgba(201,169,97,.4);
    background:rgba(201,169,97,.12);color:var(--gold);min-width:90px;text-align:center;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:180px;}

  .type-chips-bar{position:fixed;top:50px;left:0;right:0;z-index:95;height:38px;display:flex;align-items:center;
    background:rgba(13,13,13,.82);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.05);
    overflow-x:auto;scrollbar-width:none;}
  .type-chips-bar::-webkit-scrollbar{display:none;}
  .type-chips{display:flex;gap:.4rem;padding:0 .9rem;white-space:nowrap;}
  .type-chip{flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-size:.58rem;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;padding:.32rem .75rem;border-radius:999px;
    border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);
    cursor:pointer;transition:all .2s;}
  .type-chip:hover{border-color:rgba(201,169,97,.4);color:#fff;}
  .type-chip.active{background:rgba(201,169,97,.18);border-color:var(--gold);color:var(--gold);}

  .stage{position:fixed;top:88px;left:0;right:0;bottom:0;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;padding:.8rem;gap:.55rem;overflow:hidden;}

  .question-bar{width:100%;max-width:1180px;display:flex;align-items:center;gap:.6rem;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:.9rem;
    padding:.55rem .9rem;cursor:pointer;transition:border-color .2s;flex-shrink:0;}
  .question-bar:hover{border-color:rgba(201,169,97,.4);}
  .question-bar .qtext{flex:1;font-size:.82rem;font-weight:600;color:#e5e5e7;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .question-bar .qtext.placeholder{color:rgba(255,255,255,.35);font-weight:500;}
  .question-bar .qchange{font-family:'Space Grotesk',sans-serif;font-size:.52rem;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:var(--gold);flex-shrink:0;}

  /* register legend — the grammar, named once, quietly */
  .legend{width:100%;max-width:1180px;display:flex;align-items:center;gap:1.1rem;flex-shrink:0;
    padding:0 .35rem;font-family:'Space Grotesk',sans-serif;font-size:.5rem;font-weight:700;
    letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.28);}
  .legend .sw{display:inline-block;width:.55rem;height:.55rem;border-radius:2px;margin-right:.32rem;
    vertical-align:-1px;}
  .legend .k-lk .sw{background:#b57cc7;} .legend .k-ep .sw{background:#8a8a92;}
  .legend .k-af .sw{background:#e5e5e7;} .legend .k-sl .sw{background:var(--gold);}

  .carousel-wrap{position:relative;width:100%;max-width:1180px;flex:1;min-height:0;display:flex;flex-direction:column;}
  .slides-container{position:relative;width:100%;flex:1;min-height:0;overflow:visible;}
  .slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    opacity:0;transform:translateX(60px);
    transition:opacity .42s cubic-bezier(.4,0,.2,1),transform .42s cubic-bezier(.4,0,.2,1);pointer-events:none;}
  .slide.active{opacity:1;transform:translateX(0);pointer-events:auto;z-index:10;}
  .slide.exit-left{opacity:0;transform:translateX(-60px);pointer-events:none;}
  .rgroup{display:flex;gap:1rem;width:100%;height:100%;}

  /* ── section rcard (Introduction / Body / Conclusion views) ── */
  .rcard{position:relative;flex:1;min-width:0;height:100%;background:#fff;border-radius:1.25rem;
    padding:1.9rem 1.2rem 1.2rem 1.35rem;display:flex;flex-direction:column;
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 18px 45px -12px rgba(0,0,0,.55),0 6px 18px rgba(0,0,0,.35);}
  .rcard::before{content:'';position:absolute;top:.9rem;left:1.35rem;right:1.2rem;height:8px;
    background-image:radial-gradient(circle, rgba(0,0,0,.12) 3px, transparent 3.5px);
    background-size:16px 8px;background-repeat:repeat-x;}
  .rhead{position:absolute;top:1.15rem;left:-10px;display:flex;align-items:center;gap:.55rem;
    background:var(--pc);padding:.4rem .8rem .4rem .65rem;border-radius:.5rem .7rem .7rem .5rem;
    box-shadow:0 6px 14px -4px rgba(0,0,0,.35);z-index:2;}
  .rhead::after{content:'';position:absolute;left:0;bottom:-9px;border-style:solid;border-width:9px 0 0 13px;
    border-color:var(--pc-d) transparent transparent transparent;filter:brightness(.75);}
  .rnum{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:.95rem;color:var(--pc);background:#fff;
    width:1.85rem;height:1.85rem;border-radius:.5rem;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.18);flex-shrink:0;}
  .rtitle{display:flex;flex-direction:column;gap:.1rem;min-width:0;}
  .rtitle-main{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.66rem;letter-spacing:.13em;
    text-transform:uppercase;color:#fff;white-space:nowrap;}
  .rtitle-sub{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.48rem;letter-spacing:.08em;
    text-transform:uppercase;color:rgba(255,255,255,.85);white-space:nowrap;}
  .rbody{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;margin-top:2.7rem;
    overflow-y:auto;padding:0 .2rem;}
  .rphrase{font-size:clamp(.84rem,1.5vw,1.06rem);line-height:1.62;font-weight:500;color:var(--ink);text-align:center;}

  /* ── skeleton card (whole-essay spine, one per page) ── */
  .skcard{position:relative;width:min(680px,100%);height:100%;background:#fff;border-radius:1.25rem;
    padding:1.5rem 1.9rem 1.1rem 1.6rem;display:flex;flex-direction:column;
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 22px 55px -14px rgba(0,0,0,.6),0 8px 20px rgba(0,0,0,.35);}
  .sk-title-row{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
    padding-bottom:.55rem;border-bottom:2px solid var(--plum-soft);}
  .sk-title{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:1.05rem;letter-spacing:.06em;
    text-transform:uppercase;color:var(--plum-d);}
  .sk-badge{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:.8rem;color:#fff;background:var(--plum);
    width:1.7rem;height:1.7rem;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .sk-spine{flex:1;min-height:0;overflow-y:auto;position:relative;padding:.9rem 0 .3rem 2.2rem;}
  .sk-spine::-webkit-scrollbar{width:3px;} .sk-spine::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}
  .sk-spine::before{content:'';position:absolute;left:.78rem;top:1.2rem;bottom:1rem;width:2px;
    background:linear-gradient(var(--plum-soft),var(--plum),var(--plum-soft));border-radius:2px;}
  .sk-node{position:relative;margin-bottom:1.15rem;}
  .sk-node:last-child{margin-bottom:.2rem;}
  .sk-node::before{content:attr(data-n);position:absolute;left:-2.2rem;top:-.05rem;width:1.55rem;height:1.55rem;
    border-radius:50%;background:var(--plum);color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:800;
    font-size:.62rem;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px #fff;}
  .sk-eyebrow{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.5rem;letter-spacing:.16em;
    text-transform:uppercase;color:var(--plum);opacity:.75;margin-bottom:.3rem;}
  .sk-line{font-size:.92rem;line-height:1.68;font-weight:500;color:var(--ink);margin-bottom:.4rem;}
  .sk-foot{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding-top:.6rem;
    border-top:1px solid rgba(0,0,0,.06);}
  .sk-foot .brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.55rem;letter-spacing:.4em;
    color:rgba(0,0,0,.25);}
  .sk-foot .cid{font-size:.55rem;font-style:italic;color:rgba(0,0,0,.3);}

  /* ── the three-register grammar — one rule set, both card kinds ── */
  .lk{font-weight:700;color:var(--plum);}
  .ep{color:var(--stance);font-style:italic;font-weight:500;}
  .af{color:var(--ink);font-weight:600;}
  .sl{color:#a8873a;font-weight:700;border-bottom:2px dotted rgba(201,169,97,.55);padding:0 .05rem;}
  .sl.open{letter-spacing:.15em;}

  .nav-arrows{position:absolute;top:50%;left:-6px;right:-6px;transform:translateY(-50%);display:flex;
    justify-content:space-between;pointer-events:none;z-index:20;}
  .arrow-btn{pointer-events:all;width:42px;height:42px;border-radius:50%;background:rgba(201,169,97,.22);
    border:1px solid rgba(201,169,97,.4);color:var(--gold);font-size:1.1rem;display:flex;align-items:center;
    justify-content:center;cursor:pointer;transition:all .25s;box-shadow:0 6px 16px rgba(0,0,0,.4);}
  .arrow-btn:hover:not(:disabled){background:rgba(201,169,97,.36);transform:scale(1.12);}
  .arrow-btn:disabled{opacity:.18;cursor:not-allowed;}
  .dot-nav{height:42px;display:flex;align-items:center;justify-content:center;gap:.4rem;flex-shrink:0;}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(99,99,102,.32);cursor:pointer;transition:all .3s;}
  .dot.active{background:var(--gold);transform:scale(1.45);box-shadow:0 0 10px var(--gold-glow);}
  .dot:hover:not(.active){background:rgba(201,169,97,.45);}

  .picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
    z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
  .picker-overlay.open{display:flex;}
  .picker-panel{width:100%;max-width:640px;max-height:80vh;background:#161618;border:1px solid rgba(201,169,97,.25);
    border-radius:1.1rem;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.6);}
  .picker-head{padding:1rem 1.2rem .7rem;border-bottom:1px solid rgba(255,255,255,.06);
    font-family:'Space Grotesk',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:rgba(255,255,255,.5);}
  .picker-list{overflow-y:auto;padding:.5rem;}
  .picker-item{padding:.7rem .9rem;border-radius:.6rem;cursor:pointer;transition:background .18s;
    display:flex;flex-direction:column;gap:.15rem;}
  .picker-item:hover{background:rgba(255,255,255,.05);}
  .picker-item.selected{background:rgba(201,169,97,.14);}
  .picker-item .pq{font-size:.86rem;font-weight:600;color:#e5e5e7;}
  .picker-item .pt{font-family:'Space Grotesk',sans-serif;font-size:.5rem;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--gold);opacity:.75;}
  .picker-none{padding:.7rem .9rem;border-radius:.6rem;cursor:pointer;font-size:.78rem;font-style:italic;
    color:rgba(255,255,255,.4);}
  .picker-none:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);}

  @media(max-width:860px){
    .rgroup{flex-direction:column;overflow-y:auto;gap:.7rem;}
    .rcard{flex:none;height:auto;min-height:180px;}
    .legend{gap:.7rem;flex-wrap:wrap;}
    .skcard{padding:1.2rem 1.1rem .9rem 1.2rem;}
    .sk-line{font-size:.85rem;}
  }
  @media(prefers-reduced-motion:reduce){
    .slide{transition:none;}
  }
</style>
</head>
<body>

<header class="header">
  <a class="back-link" href="/?openModal=writing">← Writing</a>
  <div class="mode-selector">
    <button class="mode-btn active" data-mode="skeleton">Skeleton</button>
    <button class="mode-btn" data-mode="introduction">Introduction</button>
    <button class="mode-btn" data-mode="body">Body</button>
    <button class="mode-btn" data-mode="conclusion">Conclusion</button>
  </div>
  <div class="type-badge" id="typeBadge">For &amp; Against</div>
</header>

<div class="type-chips-bar"><div class="type-chips" id="typeChips"></div></div>

<div class="stage" id="stage">
  <div class="question-bar" id="questionBar">
    <span class="qtext placeholder" id="qtext">Browsing the pure model — tap to pour a question into it</span>
    <span class="qchange" id="qchange">Choose</span>
  </div>
  <div class="legend">
    <span class="k-lk"><span class="sw"></span>Sequencer</span>
    <span class="k-ep"><span class="sw"></span>Stance</span>
    <span class="k-af"><span class="sw"></span>Argument frame</span>
    <span class="k-sl"><span class="sw"></span>Your content</span>
  </div>
  <div class="carousel-wrap">
    <div class="slides-container" id="slidesContainer"></div>
    <div class="nav-arrows">
      <button class="arrow-btn" id="prevBtn" aria-label="Previous">←</button>
      <button class="arrow-btn" id="nextBtn" aria-label="Next">→</button>
    </div>
  </div>
  <div class="dot-nav" id="dotNav"></div>
</div>

<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-panel">
    <div class="picker-head" id="pickerHead">Choose a question</div>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>

<script>
/* ══ THE GRAMMAR ═══════════════════════════════════════════
   Every line = SEQUENCER + STANCE + ARGUMENT FRAME + SLOT.
   Helpers wrap each register in its class; the CSS legend
   above names them once. Slots ({topic} etc.) fill from the
   selected question, or render as a gold ellipsis when the
   pure model is being browsed. Corrections applied:
   • "by and far" → "generally speaking," (FA-3, FA-4, PS-1, PS-3, CE-3, CE-5)
   • collision strips (OP-3, OP-6, ST-1, ST-3)
   • comma after every sequencer (built into lk())
   • PS body stance frames re-cast as PROPOSING frames
   • frames lowercase after the sequencer                    */
const lk = t => `<span class="lk">${t},</span> `;
const ep = t => `<span class="ep">${t}</span> `;
const af = t => `<span class="af">${t}</span> `;
const sl = k => `<span class="sl" data-k="${k}">…</span>`;
const raw = t => t + ' ';

const D = { types: {

'for-against': { label:'For & Against', code:'FA', cards:[
 {open: af('These days,')+sl('claim')+raw(',')+ep('although')+sl('counter')+raw('.')+af('Therefore, it is vital that we analyse the pros and cons of')+sl('topic')+raw('.'),
  argue:[ lk('To begin with')+ep('it is often argued that')+af('the main argument in favour of')+sl('topic')+af('is that')+sl('pro1')+raw('.'),
          lk('Furthermore')+ep('it is commonly known that')+af('one positive aspect of')+sl('topic')+af('is that')+sl('pro2')+raw('.'),
          lk('Yet')+ep('it is often maintained that')+af('the key disadvantage of')+sl('topic')+af('is that')+sl('con1')+raw('.')],
  close: lk('In conclusion')+ep('it is felt that')+af('the advantages of')+sl('topic')+af('outweigh the disadvantages, particularly for')+sl('verdict')+raw('.')},
 {open: af('Nowadays,')+sl('claim')+raw(',')+ep('in spite of')+sl('counterNP')+raw('.')+af('Therefore, it is vitally important to consider the advantages and disadvantages of')+sl('topic')+raw('.'),
  argue:[ lk('To begin with')+ep('it is often maintained that')+af('one benefit of')+sl('topic')+af('is that')+sl('pro1')+raw('.'),
          lk('In addition')+ep('it is widely held that')+af('the main advantage is that')+sl('pro2')+raw('.'),
          lk('Yet')+ep('it is often argued that')+af('the argument against it is that')+sl('con1')+raw('.')],
  close: lk('In conclusion')+ep('it seems to me that')+af('the positive aspects of')+sl('topic')+af('outweigh the drawbacks.')},
 {open: af('Few people would deny that')+sl('claim')+raw(',')+ep('despite the fact that')+sl('counter')+raw('.')+af('Therefore, it is vital that we analyse the pros and cons of')+sl('topic')+raw('.'),
  argue:[ lk('First of all')+ep('generally speaking,')+af('one positive aspect of')+sl('topic')+af('is that')+sl('pro1')+raw('.'),
          lk('Secondly')+ep('as a broad generalisation,')+af('the main advantage is that')+sl('pro2')+raw('.'),
          lk('Nevertheless')+ep('it is commonly known that')+af('the obvious drawback is that')+sl('con1')+raw('.')],
  close: lk('To sum up')+ep('it seems that')+af('even though there are concerns about')+sl('con1short')+raw(',')+af('there should be room for')+sl('verdict')+raw('.')},
 {open: af('It is widely recognised that')+sl('claim')+raw(',')+ep('although')+sl('counter')+raw('.')+af('Therefore, it is vitally important to consider the advantages and disadvantages of')+sl('topic')+raw('.'),
  argue:[ lk('To begin with')+ep('it is widely held that')+af('one positive aspect of')+sl('topic')+af('is that')+sl('pro1')+raw('.'),
          lk('What is more')+ep('generally speaking,')+af('the main argument in favour is that')+sl('pro2')+raw('.'),
          lk('However')+ep('it is often maintained that')+af('the argument against it is that')+sl('con1')+raw('.')],
  close: lk('On the whole')+ep('it seems to me that')+af('the advantages of')+sl('topic')+af('outweigh the disadvantages.')},
 {open: af('It is generally assumed that')+sl('claim')+raw(',')+ep('despite the fact that')+sl('counter')+raw('.')+af('Consequently, it is essential that we study the arguments in favour and against')+sl('topic')+raw('.'),
  argue:[ lk('First of all')+ep('it is widely held that')+af('the main advantage is that')+sl('pro1')+raw('.'),
          lk('In addition')+ep('it is often argued that')+af('one positive aspect is that')+sl('pro2')+raw('.'),
          lk('However')+ep('it is commonly known that')+af('the obvious drawback is that')+sl('con1')+raw('.')],
  close: lk('In conclusion')+ep('it seems that')+af('even though there are concerns about')+sl('con1short')+raw(',')+af('there should be room for')+sl('verdict')+raw('.')},
 {open: af('Few people would deny that')+sl('claim')+raw(',')+ep('in spite of')+sl('counterNP')+raw('.')+af('Therefore, it is vital that we analyse the pros and cons of')+sl('topic')+raw('.'),
  argue:[ lk('Firstly')+ep('it is often argued that')+af('the main argument in favour of')+sl('topic')+af('is that')+sl('pro1')+raw('.'),
          lk('Moreover')+ep('it is widely held that')+af('one positive aspect is that')+sl('pro2')+raw('.'),
          lk('Nevertheless')+ep('it is commonly known that')+af('the obvious drawback is that')+sl('con1')+raw('.')],
  close: lk('In conclusion')+ep('it seems that')+af('even though there are concerns about')+sl('con1short')+raw(',')+af('there should be room for')+sl('verdict')+raw('.')}
]},

'problem-solution': { label:'Problems & Solutions', code:'PS', cards:[
 {open: af('There is a growing recognition that')+sl('claim')+raw(',')+ep('in order to')+sl('aim')+raw('.')+af('Consequently, this essay will suggest ways to address')+sl('topic')+raw('.'),
  argue:[ lk('In the first place')+ep('generally speaking,')+af('the best way to tackle this is to')+sl('sol1')+raw('.'),
          lk('Furthermore')+ep('a strong case can be made that')+af('another practical measure would be to')+sl('sol2')+raw('.'),
          lk('What is more')+ep('it is worth considering that')+af('another way forward would be to')+sl('sol3')+raw('.')],

     r3:'real friendships can be crowded out by online ones',
     verdict:'a more cautious approach to teenage use' }},
 { id:'op-english', type:'opinion',
   mainQuestion:'Is learning English still worth the effort in the age of translation apps?',
   fills:{
     claim:'translation technology is now remarkably capable',
     cause:'apps can render whole conversations in seconds',
     trend:'reliance on instant translation',
     position:'learning the language remains firmly worthwhile',
     topic:'the value of learning English today',
     r1:'genuine understanding lives in nuance a machine still misses',
     r2:'speaking a language builds trust that translation cannot',
     r3:'the mental flexibility gained from learning outlasts any single tool',
     verdict:'the enduring worth of real fluency' }},

 { id:'st-ai-work', type:'speculation-trends',
   mainQuestion:'How will artificial intelligence change the way we work?',
   fills:{
     claim:'artificial intelligence is entering more and more workplaces',
     cause:'the technology is improving at an extraordinary pace',
     trend:'the spread of AI tools at work',
     topic:'the future of work',
     p1:'routine tasks will increasingly be handled by machines',
     p2:'the most valued skills may shift towards judgement and creativity',
     p3:'entirely new kinds of jobs will appear that we cannot yet name',
     verdict:'a workplace transformed within a decade' }},
 { id:'st-cities', type:'speculation-trends',
   mainQuestion:'What might cities look like in fifty years?',
   fills:{
     claim:'cities are changing faster than at any time in living memory',
     cause:'climate pressure and new technology are reshaping urban life',
     trend:'the reinvention of city living',
     topic:'the cities of the future',
     p1:'green space may be woven into buildings rather than set apart from them',
     p2:'private cars could give way to shared, driverless transport',
     p3:'work and home may dissolve into the same shared spaces',
     verdict:'a very different urban landscape' }}
];

/* ── STATE ── */
const BODY_LABELS = ['First point','Further point','Counterpoint'];
const SECTION_META = {
  introduction:{color:'var(--sec1)',dark:'var(--sec1-d)',title:'Introduction'},
  body:{color:'var(--sec2)',dark:'var(--sec2-d)',title:'Body'},
  conclusion:{color:'var(--sec3)',dark:'var(--sec3-d)',title:'Conclusion'},
};
let type='for-against', mode='skeleton', question=null;
let pages=[], current=0, prev=-1, busy=false;
const CARDS_PER_PAGE=3;

function fill(html){
  if(!question) return html; /* pure model: gold ellipses stand */
  return html.replace(/<span class="sl" data-k="(\w+)">…<\/span>/g,(m,k)=>{
    const v=question.fills[k];
    return v?`<span class="sl">${v}</span>`:m;
  });
}
function chunk(a,s){const o=[];for(let i=0;i<a.length;i+=s)o.push(a.slice(i,i+s));return o;}

function renderTypeChips(){
  const bar=document.getElementById('typeChips');
  bar.innerHTML=Object.keys(D.types).map(k=>
    `<div class="type-chip ${k===type?'active':''}" data-type="${k}">${D.types[k].label}</div>`).join('');
  bar.querySelectorAll('.type-chip').forEach(c=>c.addEventListener('click',()=>{
    type=c.dataset.type;
    if(question&&question.type!==type)question=null;
    renderTypeChips();rebuild();
  }));
}

function rebuild(){
  pages=[];current=0;prev=-1;
  const t=D.types[type];
  document.getElementById('typeBadge').textContent=t.label;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  const qtext=document.getElementById('qtext');
  if(question){qtext.textContent=question.mainQuestion;qtext.classList.remove('placeholder');
    document.getElementById('qchange').textContent='Change';}
  else{qtext.textContent='Browsing the pure model — tap to pour a question into it';
    qtext.classList.add('placeholder');document.getElementById('qchange').textContent='Choose';}

  if(mode==='skeleton'){
    pages=t.cards.map((c,i)=>({skeleton:c,idx:i}));
  }else if(mode==='introduction'){
    pages=chunk(t.cards.map((c,i)=>({text:fill(c.open),label:t.code+'-'+(i+1)})),CARDS_PER_PAGE);
  }else if(mode==='body'){
    pages=t.cards.map((c,i)=>c.argue.map((l,j)=>({text:fill(l),label:t.code+'-'+(i+1)+' · '+BODY_LABELS[j]})));
  }else{
    pages=chunk(t.cards.map((c,i)=>({text:fill(c.close),label:t.code+'-'+(i+1)})),CARDS_PER_PAGE);
  }
  paint();show(0,'none');
}

function paint(){
  const container=document.getElementById('slidesContainer');
  const dotNav=document.getElementById('dotNav');
  const t=D.types[type];

  if(mode==='skeleton'){
    container.innerHTML=pages.map((p,pi)=>{
      const c=p.skeleton,n=p.idx+1;
      return `<div class="slide" data-idx="${pi}">
        <div class="skcard">
          <div class="sk-title-row"><div class="sk-title">${t.label}</div><div class="sk-badge">${n}</div></div>
          <div class="sk-spine">
            <div class="sk-node" data-n="01"><div class="sk-eyebrow">Open · Introduction</div>
              <div class="sk-line">${fill(c.open)}</div></div>
            <div class="sk-node" data-n="02"><div class="sk-eyebrow">Argue · Body</div>
              ${c.argue.map(l=>`<div class="sk-line">${fill(l)}</div>`).join('')}</div>
            <div class="sk-node" data-n="03"><div class="sk-eyebrow">Close · Conclusion</div>
              <div class="sk-line">${fill(c.close)}</div></div>
          </div>
          <div class="sk-foot"><span class="brand">INTUITY</span><span class="cid">${t.code}-${n} · © Majid Nashtai 2026</span></div>
        </div>
      </div>`;
    }).join('');
  }else{
    const meta=SECTION_META[mode];
    container.innerHTML=pages.map((pg,pi)=>`
      <div class="slide" data-idx="${pi}">
        <div class="rgroup">
          ${pg.map((s,j)=>{
            const num=mode==='body'?j+1:pi*CARDS_PER_PAGE+j+1;
            return `<div class="rcard" style="--pc:${meta.color};--pc-d:${meta.dark}">
              <div class="rhead"><div class="rnum">${String(num).padStart(2,'0')}</div>
                <div class="rtitle"><div class="rtitle-main">${meta.title}</div>
                <div class="rtitle-sub">${s.label}</div></div></div>
              <div class="rbody"><div class="rphrase">${s.text}</div></div>
            </div>`;
          }).join('')}
        </div>
      </div>`).join('');
  }
  dotNav.innerHTML=pages.map((_,i)=>`<div class="dot" data-dot="${i}"></div>`).join('');
  dotNav.querySelectorAll('.dot').forEach(d=>d.addEventListener('click',e=>{e.stopPropagation();jump(+d.dataset.dot);}));
}

function show(idx,dir){
  if(!pages.length)return;
  const els=document.querySelectorAll('.slide'),dots=document.querySelectorAll('.dot');
  if(prev>=0&&prev!==idx&&els[prev]){els[prev].classList.remove('active');
    if(dir!=='none'){els[prev].classList.add('exit-left');
      setTimeout(()=>els[prev]?.classList.remove('exit-left'),480);}}
  if(els[idx]){
    if(dir==='forward')els[idx].style.cssText='transform:translateX(60px);opacity:0';
    else if(dir==='back')els[idx].style.cssText='transform:translateX(-60px);opacity:0';
    else els[idx].style.cssText='';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{els[idx].classList.add('active');els[idx].style.cssText='';}));}
  dots.forEach((d,i)=>d.classList.toggle('active',i===idx));
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').disabled=idx===pages.length-1;
  prev=idx;current=idx;
}
function next(){if(busy||current>=pages.length-1)return;busy=true;show(current+1,'forward');setTimeout(()=>busy=false,480);}
function back(){if(busy||current<=0)return;busy=true;show(current-1,'back');setTimeout(()=>busy=false,480);}
function jump(i){if(busy)return;busy=true;show(i,i>current?'forward':'back');setTimeout(()=>busy=false,480);}

function openPicker(){
  const list=document.getElementById('pickerList');
  const qs=QUESTIONS.filter(q=>q.type===type);
  document.getElementById('pickerHead').textContent='Choose a question — '+D.types[type].label;
  list.innerHTML=(qs.length?qs.map(q=>`
    <div class="picker-item ${question?.id===q.id?'selected':''}" data-id="${q.id}">
      <div class="pt">${D.types[q.type].label}</div><div class="pq">${q.mainQuestion}</div>
    </div>`).join(''):`<div style="padding:1.2rem;color:rgba(255,255,255,.4);font-size:.82rem;">No questions authored for this type yet — the pure model is still fully browsable.</div>`)
    +`<div class="picker-none" id="pickerNone">Browse the pure model (no question)</div>`;
  list.querySelectorAll('.picker-item').forEach(it=>it.addEventListener('click',()=>{
    question=QUESTIONS.find(q=>q.id===it.dataset.id)||null;closePicker();rebuild();}));
  document.getElementById('pickerNone').addEventListener('click',()=>{question=null;closePicker();rebuild();});
  document.getElementById('pickerOverlay').classList.add('open');
}
function closePicker(){document.getElementById('pickerOverlay').classList.remove('open');}

document.getElementById('prevBtn').addEventListener('click',e=>{e.stopPropagation();back();});
document.getElementById('nextBtn').addEventListener('click',e=>{e.stopPropagation();next();});
document.getElementById('questionBar').addEventListener('click',openPicker);
document.getElementById('pickerOverlay').addEventListener('click',e=>{if(e.target.id==='pickerOverlay')closePicker();});
document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();mode=b.dataset.mode;rebuild();}));

const wrap=document.querySelector('.carousel-wrap');let tx=0,ty=0;
wrap.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
wrap.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy))dx<0?next():back();},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();back();}
  if(e.key==='Escape')closePicker();});

renderTypeChips();rebuild();
</script>
</body>
</html>
