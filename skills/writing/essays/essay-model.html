<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Bebas+Neue&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--white:#FAFAF8;--ink:#0d0d0d;--rule:rgba(0,0,0,0.07);
  --teal:#3d9e95;--teal-d:#2e7870;--teal-mid:#8dccc7;
  --coral:#e8723a;--coral-d:#c05520;--coral-mid:#f5ad87;
  --purple:#7b5ea7;--purple-d:#5e4582;--purple-mid:#b9a3d3;
  --rose:#c94f6d;--rose-d:#a33455;--rose-mid:#e89db0;
  --gold:#c08b2f;--gold-d:#9a6c1e;--gold-mid:#e4c073;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--white);max-width:900px;margin:0 auto;box-shadow:0 0 60px rgba(0,0,0,0.12)}

/* HEADER */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.97);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:10}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}

/* TABS */
.card-tabs{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.55rem 1.25rem;background:var(--white);border-bottom:1px solid var(--rule);overflow-x:auto}
.tab-btn{background:transparent;border:none;border-bottom:3px solid transparent;padding:0.45rem 0.875rem;font-size:0.68rem;font-weight:800;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;font-family:'Barlow Condensed',sans-serif}
.tab-btn:hover{color:rgba(0,0,0,0.6)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}

/* CONTENT */
.card-content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--white)}
.content-header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:0.75rem 1.5rem 0.55rem;border-bottom:2px solid rgba(0,0,0,0.06)}
.content-title{font-size:0.65rem;font-weight:700;color:rgba(0,0,0,0.35);text-transform:uppercase;letter-spacing:0.12em;font-family:'Barlow Condensed',sans-serif}
.view-toggle{display:flex;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);border-radius:7px;padding:0.2rem;gap:0.2rem}
.toggle-btn{padding:0.3rem 0.7rem;background:transparent;border:none;border-radius:5px;color:rgba(0,0,0,0.45);font-size:0.6rem;font-weight:800;cursor:pointer;transition:all 0.25s;text-transform:uppercase;letter-spacing:0.06em;font-family:'Barlow Condensed',sans-serif}
.toggle-btn:hover{color:rgba(0,0,0,0.7)}
.toggle-btn.active{background:var(--ink);color:#fff}

/* SCROLL AREA */
.infographic{flex:1;padding:0.75rem 1rem 1rem;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.infographic::-webkit-scrollbar{width:4px}
.infographic::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px}

/* ══════════════════════════════════════
   ANATOMY SKELETON — POSTER AESTHETIC
══════════════════════════════════════ */
.anatomy-plate{
  position:relative;
  padding:0.25rem 0.5rem 1.25rem 0;
}

/* Vertical spine */
.anatomy-plate::before{
  content:'';
  position:absolute;
  left:1.85rem;
  top:0.5rem;
  bottom:1.5rem;
  width:1px;
  background:linear-gradient(
    to bottom,
    transparent,
    rgba(0,0,0,0.1) 5%,
    rgba(0,0,0,0.1) 95%,
    transparent
  );
}

/* Each bone row */
.bone{
  position:relative;
  display:flex;
  align-items:stretch;
  margin-bottom:0.1rem;
  border-radius:0 0.6rem 0.6rem 0;
  cursor:pointer;
  transition:background 0.2s;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}
.bone:hover{background:rgba(0,0,0,0.025);}
.bone.open{background:rgba(0,0,0,0.025);}

/* Ghost number — background watermark */
.bone-ghost{
  position:absolute;
  right:0.25rem;
  top:50%;
  transform:translateY(-50%);
  font-family:'Bebas Neue',sans-serif;
  font-size:4.5rem;
  line-height:1;
  opacity:0.04;
  pointer-events:none;
  user-select:none;
  letter-spacing:-0.02em;
  z-index:0;
}

/* Number column */
.bone-num-col{
  width:1.85rem;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:0.85rem;
  position:relative;
  z-index:2;
}
.bone-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:0.95rem;
  line-height:1;
  letter-spacing:0.04em;
  transition:color 0.2s;
}
.bone-node{
  width:6px;height:6px;
  border-radius:50%;
  border:2px solid white;
  box-shadow:0 0 0 1px currentColor;
  margin-top:0.28rem;
  flex-shrink:0;
  transition:transform 0.2s;
}
.bone:hover .bone-node,
.bone.open .bone-node{transform:scale(1.5);}

/* Rib line from spine to content */
.bone-rib{
  position:absolute;
  left:1.6rem;
  top:1.5rem;
  width:0.65rem;
  height:1px;
  opacity:0.2;
  z-index:1;
}

/* Content */
.bone-content{
  flex:1;
  padding:0.65rem 0.4rem 0.55rem 0.55rem;
  min-width:0;
  position:relative;
  z-index:2;
}
.bone-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1rem,3.8vw,1.4rem);
  letter-spacing:0.04em;
  text-transform:uppercase;
  line-height:1;
  color:#0d0d0d;
  transition:color 0.2s;
}
.bone-purpose{
  font-family:'Barlow',sans-serif;
  font-size:0.55rem;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:rgba(0,0,0,0.3);
  margin-top:0.12rem;
  margin-bottom:0.3rem;
}
.bone-preview{
  font-family:'Crimson Text',Georgia,serif;
  font-style:italic;
  font-size:clamp(0.78rem,2.4vw,0.9rem);
  line-height:1.45;
  color:rgba(0,0,0,0.38);
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:1;
  -webkit-box-orient:vertical;
}
.bone-preview .bph{
  font-style:normal;
  font-weight:700;
  opacity:0.6;
}

/* Chevron */
.bone-chevron{
  font-size:0.6rem;
  opacity:0.22;
  transition:transform 0.3s,opacity 0.2s;
  align-self:center;
  flex-shrink:0;
  margin-right:0.4rem;
  z-index:2;
  font-family:sans-serif;
}
.bone.open .bone-chevron{transform:rotate(180deg);opacity:0.55;}

/* Divider */
.bone-divider{
  height:1px;
  margin-left:1.85rem;
  margin-bottom:0.1rem;
  background:linear-gradient(to right,rgba(0,0,0,0.07),transparent 70%);
}

/* ── DRAWER ── */
.bone-drawer{
  overflow:hidden;
  max-height:0;
  transition:max-height 0.38s cubic-bezier(0.4,0,0.2,1);
  margin-left:2.5rem;
  margin-right:0.25rem;
}
.bone-drawer.open{max-height:600px;}

.drawer-body{
  padding:0.5rem 0 0.9rem;
  border-left:1px solid rgba(0,0,0,0.08);
  padding-left:0.75rem;
}

/* Skeleton lines */
.drawer-section-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.52rem;
  font-weight:900;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:rgba(0,0,0,0.28);
  margin-bottom:0.45rem;
  margin-top:0.65rem;
}
.drawer-section-label:first-child{margin-top:0;}

.drawer-line{
  font-family:'Instrument Sans',sans-serif;
  font-size:clamp(0.74rem,2.3vw,0.84rem);
  line-height:1.65;
  color:rgba(0,0,0,0.65);
  padding:0.25rem 0;
  border-bottom:1px solid rgba(0,0,0,0.045);
  display:flex;
  gap:0.45rem;
  align-items:baseline;
}
.drawer-line:last-child{border-bottom:none;}
.drawer-bullet{
  width:4px;height:4px;
  border-radius:50%;
  flex-shrink:0;
  margin-top:0.5rem;
  opacity:0.45;
}
.dph{font-style:italic;opacity:0.5;}

/* Phrases sub-section */
.drawer-phrase-item{
  font-family:'Crimson Text',Georgia,serif;
  font-size:clamp(0.8rem,2.5vw,0.92rem);
  font-style:italic;
  line-height:1.6;
  color:rgba(0,0,0,0.55);
  padding:0.2rem 0;
  border-bottom:1px solid rgba(0,0,0,0.04);
  display:flex;
  gap:0.4rem;
  align-items:baseline;
}
.drawer-phrase-item:last-child{border-bottom:none;}
.phrase-arrow{
  font-size:0.6rem;
  font-style:normal;
  flex-shrink:0;
  margin-top:0.38rem;
  opacity:0.35;
}

/* ── COLOUR SYSTEM ── */
.bone-intro .bone-num{color:var(--teal);}
.bone-intro .bone-node{color:var(--teal);}
.bone-intro .bone-rib{background:var(--teal);}
.bone-intro .bone-ghost{color:var(--teal);}
.bone-intro:hover .bone-label,.bone-intro.open .bone-label{color:var(--teal);}
.bone-intro .bone-preview{color:rgba(61,158,149,0.65);}
.bone-intro .drawer-bullet{background:var(--teal);}
.bone-intro .phrase-arrow{color:var(--teal);}

.bone-body .bone-num{color:var(--coral);}
.bone-body .bone-node{color:var(--coral);}
.bone-body .bone-rib{background:var(--coral);}
.bone-body .bone-ghost{color:var(--coral);}
.bone-body:hover .bone-label,.bone-body.open .bone-label{color:var(--coral);}
.bone-body .bone-preview{color:rgba(232,114,58,0.65);}
.bone-body .drawer-bullet{background:var(--coral);}
.bone-body .phrase-arrow{color:var(--coral);}

.bone-end .bone-num{color:var(--purple);}
.bone-end .bone-node{color:var(--purple);}
.bone-end .bone-rib{background:var(--purple);}
.bone-end .bone-ghost{color:var(--purple);}
.bone-end:hover .bone-label,.bone-end.open .bone-label{color:var(--purple);}
.bone-end .bone-preview{color:rgba(123,94,167,0.65);}
.bone-end .drawer-bullet{background:var(--purple);}
.bone-end .phrase-arrow{color:var(--purple);}

/* Anatomy footer */
.anatomy-footer{
  margin-top:1.25rem;
  margin-left:1.85rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-top:1px solid rgba(0,0,0,0.07);
  padding-top:0.65rem;
}
.anatomy-brand{
  font-family:'Bebas Neue',sans-serif;
  font-size:0.9rem;
  letter-spacing:0.18em;
  color:rgba(0,0,0,0.08);
}
.anatomy-level{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.55rem;
  font-weight:700;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:rgba(0,0,0,0.12);
}

/* ══ PHRASES VIEW ══ */
.phrases-display{font-family:'Barlow',sans-serif;color:rgba(0,0,0,0.9)}
.phrase-category{margin-bottom:1.5rem}
.category-title{font-size:0.72rem;font-weight:900;color:rgba(0,0,0,0.9);margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.1em;padding-bottom:0.4rem;border-bottom:2px solid rgba(0,0,0,0.2);font-family:'Barlow Condensed',sans-serif}
.category-title.intro{color:var(--teal);border-bottom-color:var(--teal)}
.category-title.body{color:var(--coral);border-bottom-color:var(--coral)}
.category-title.conclusion{color:var(--purple);border-bottom-color:var(--purple)}
.subcategory{margin-bottom:1.125rem}
.subcategory-title{font-size:0.68rem;font-weight:800;color:rgba(0,0,0,0.6);margin-bottom:0.6rem;text-transform:uppercase;letter-spacing:0.06em;font-family:'Barlow Condensed',sans-serif}
.phrase-list{list-style:none;padding:0}
.phrase-item{font-size:0.78rem;line-height:1.6;color:rgba(0,0,0,0.75);margin-bottom:0.5rem;padding-left:0.875rem;position:relative;font-family:'Instrument Sans',sans-serif}
.phrase-item:before{content:"→";position:absolute;left:0;color:var(--teal);font-weight:700}

/* ══ PRACTICE ══ */
.practice-display{display:flex;flex-direction:column;gap:1.25rem}
.practice-question{background:rgba(61,158,149,0.07);border-left:4px solid var(--teal);border-radius:0.75rem;padding:1rem 1.25rem}
.practice-question-label{font-size:0.6rem;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;color:var(--teal);margin-bottom:0.35rem;font-family:'Barlow Condensed',sans-serif}
.practice-question-text{font-size:1rem;font-weight:700;color:var(--ink);line-height:1.4;font-family:'Instrument Sans',sans-serif}
.practice-answer{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.06);border-radius:0.75rem;padding:1.1rem 1.25rem;position:relative}
.practice-answer-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:rgba(0,0,0,0.3);margin-bottom:0.5rem;font-family:'Barlow Condensed',sans-serif}
.answer-line{display:flex;align-items:flex-start;gap:0.75rem;padding:0.45rem 0;border-bottom:1px solid rgba(0,0,0,0.05);border-radius:0.4rem;transition:background 0.15s}
.answer-line:last-child{border-bottom:none}
.answer-line.played .answer-text{opacity:0.38}
.answer-marker{flex-shrink:0;width:6px;height:6px;border-radius:50%;margin-top:0.45rem;background:rgba(0,0,0,0.18);transition:background 0.3s}
.answer-line.has-phrase .answer-marker{background:var(--teal)}
.answer-line.played .answer-marker{background:rgba(0,0,0,0.1)}
.answer-text{font-size:0.88rem;line-height:1.6;color:var(--ink);font-family:'Instrument Sans',sans-serif}
.answer-phrase-tag{display:inline-block;font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:0.15rem 0.5rem;border-radius:2rem;margin-left:0.4rem;vertical-align:middle;opacity:0.75;font-family:'Barlow Condensed',sans-serif}
.tag-intro{background:rgba(61,158,149,0.12);color:var(--teal)}
.tag-body{background:rgba(232,114,58,0.12);color:var(--coral)}
.tag-conclusion{background:rgba(123,94,167,0.12);color:var(--purple)}
.practice-controls{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.25rem;background:rgba(0,0,0,0.02);border-radius:0.75rem;flex-shrink:0}
.play-practice-btn{display:flex;align-items:center;gap:0.5rem;padding:0.55rem 1.1rem;background:var(--ink);color:#fff;border:none;border-radius:2rem;font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;font-family:'Barlow Condensed',sans-serif}
.play-practice-btn:hover{background:rgba(0,0,0,0.8)}
.practice-caption{font-size:0.78rem;font-style:italic;color:rgba(0,0,0,0.38);flex:1;line-height:1.4;min-height:1.2em;transition:color 0.3s;font-family:'Instrument Sans',sans-serif}
.practice-caption.speaking{color:rgba(0,0,0,0.7)}

/* ══ LISTEN OVERLAY ══ */
.listen-overlay{position:fixed;inset:0;z-index:800;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 1.25rem 1rem;background:#16181d;opacity:0;pointer-events:none;transition:opacity 0.3s}
.listen-overlay.active{opacity:1;pointer-events:all}
.lo-topbar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;flex-shrink:0}
.lo-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.32em;text-transform:uppercase;color:rgba(255,255,255,0.15)}
.lo-close-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.65rem;color:rgba(255,255,255,0.3);transition:all 0.2s}
.lo-close-btn:hover{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75)}
.infographic-card{position:relative;width:min(480px,96vw);min-height:min(380px,70vw);background:#ffffff;border-radius:4px;overflow:visible;display:flex;flex-direction:column;box-shadow:6px 6px 0 rgba(255,255,255,0.04),10px 16px 0 rgba(0,0,0,0.45),0 40px 90px rgba(0,0,0,0.65);transform:translateY(28px) scale(0.93);transition:transform 0.48s cubic-bezier(0.34,1.46,0.64,1),opacity 0.35s ease;opacity:0;flex-shrink:0}
.listen-overlay.active .infographic-card{transform:translateY(0) scale(1);opacity:1}
.infographic-card.section-enter{animation:sectionSlideIn 0.42s cubic-bezier(0.34,1.3,0.64,1) both}
@keyframes sectionSlideIn{from{opacity:0;transform:translateX(44px) scale(0.96)}to{opacity:1;transform:translateX(0) scale(1)}}
.info-left-stripe{position:absolute;left:0;top:0;bottom:0;width:7px;border-radius:4px 0 0 4px;transition:background 0.4s;z-index:5}
.info-bottom-line{height:6px;width:100%;flex-shrink:0;border-radius:0 0 4px 4px;transition:background 0.4s}
.info-num-badge{position:absolute;top:-1rem;left:1.6rem;width:3.4rem;height:3.4rem;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:#fff;transition:background 0.4s;box-shadow:4px 5px 0 rgba(0,0,0,0.3),0 10px 24px rgba(0,0,0,0.35);z-index:10;clip-path:polygon(0 0,calc(100% - 11px) 0,100% 11px,100% 100%,0 100%)}
.info-card-body{padding:1.8rem 1.8rem 0 2.2rem;display:flex;flex-direction:column;flex:1;overflow:hidden}
.info-section-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.8rem,6vw,2.8rem);font-weight:900;letter-spacing:0.04em;text-transform:uppercase;color:#0d0d0d;line-height:0.95;margin-top:1.5rem;margin-bottom:0}
.info-title-rule{width:3.5rem;height:4px;border-radius:2px;margin:0.7rem 0 0.85rem;flex-shrink:0;transition:background 0.4s}
.info-sentences-stack{flex:1;display:flex;flex-direction:column;gap:0.6rem;overflow:hidden}
.info-sentence-line{font-family:'Instrument Sans',sans-serif;font-size:clamp(0.88rem,2.3vw,1.02rem);font-weight:400;line-height:1.65;color:rgba(0,0,0,0.55);opacity:0;transform:translateY(10px);transition:opacity 0.4s,transform 0.4s}
.info-sentence-line.visible{opacity:1;transform:translateY(0)}
.info-sentence-line.first{color:rgba(0,0,0,0.78);font-weight:500}
.info-card-foot{display:flex;align-items:flex-end;justify-content:space-between;padding:0.6rem 1.8rem 1rem 2.2rem;flex-shrink:0}
.info-icon{font-size:1.6rem;opacity:0.4;transition:opacity 0.3s;line-height:1}
.info-wave{display:flex;align-items:flex-end;gap:4px}
.info-wave-bar{width:4px;border-radius:3px;animation:waveAnim 1.1s ease-in-out infinite;transition:background 0.4s}
.info-wave-bar:nth-child(1){height:8px;animation-delay:0s}
.info-wave-bar:nth-child(2){height:18px;animation-delay:0.08s}
.info-wave-bar:nth-child(3){height:30px;animation-delay:0.18s}
.info-wave-bar:nth-child(4){height:22px;animation-delay:0.12s}
.info-wave-bar:nth-child(5){height:11px;animation-delay:0.04s}
.info-wave-bar:nth-child(6){height:24px;animation-delay:0.22s}
.info-wave-bar:nth-child(7){height:16px;animation-delay:0.09s}
@keyframes waveAnim{0%,100%{transform:scaleY(0.28);opacity:0.22}50%{transform:scaleY(1);opacity:1}}
.info-wave.paused .info-wave-bar{animation:none;transform:scaleY(0.28);opacity:0.15}

/* ══ SKELETON HELPERS ══ */
function boneRole(title){
  const t=title.toLowerCase();
  if(t.includes('intro')||t.includes('opening'))return 'intro';
  if(t.includes('conclu')||t.includes('closing')||t.includes('summary'))return 'end';
  return 'body';
}

function bonePurpose(title,role){
  const t=title.toLowerCase();
  if(role==='intro')return 'Hook · Context · Thesis';
  if(role==='end')  return 'Summarise · Balance · Final view';
  if(t.includes('advantage')||t.includes('benefit')||t.includes('positive')||t.includes('strength')||t.includes('support')||t.includes('for')||t.includes('agree')||t.includes('justif'))return 'Positive point with evidence';
  if(t.includes('disadvantage')||t.includes('drawback')||t.includes('against')||t.includes('challenge')||t.includes('risk')||t.includes('problem')||t.includes('critic')||t.includes('negative'))return 'Difficulty or counter-view';
  if(t.includes('solution')||t.includes('measure')||t.includes('action'))return 'Concrete remedy';
  if(t.includes('cause')||t.includes('reason')||t.includes('factor')||t.includes('driver'))return 'Why this happens';
  if(t.includes('effect')||t.includes('impact')||t.includes('result')||t.includes('consequence'))return 'What follows from this';
  if(t.includes('predict')||t.includes('future')||t.includes('outlook'))return 'Future speculation';
  if(t.includes('opinion')||t.includes('view')||t.includes('position')||t.includes('personal')||t.includes('stance'))return 'Your position defended';
  if(t.includes('counter')||t.includes('alternative')||t.includes('acknowledg'))return 'Opposing view acknowledged';
  return 'Develop with support';
}

function fmtLine(str){
  if(!str)return '';
  return str.replace(/\[([^\]]+)\]/g,'<span class="dph">[$1]</span>');
}
function fmtPreview(str){
  if(!str)return '';
  return str.replace(/\[([^\]]+)\]/g,'<span class="bph">[$1]</span>');
}

function toggleBone(idx){
  const bone=document.getElementById('bone-'+idx);

  const isOpen=bone.classList.contains('open');

/* ══ RENDER SKELETON — ANATOMY POSTER ══ */
function renderSkeleton(variation){
  openBones=new Set();
  let h='<div class="anatomy-plate">';

  variation.skeleton.forEach((para,i)=>{
    const role=boneRole(para.title);
    const purpose=bonePurpose(para.title,role);
    const num=String(i+1).padStart(2,'0');
    const previewRaw=para.lines.find(l=>l&&l.trim())||'';
    const drawerLines=para.lines.filter(l=>l&&l.trim());

    // Find matching phrases from phraseData
    const matchPhrases=getMatchingPhrases(currentType,para.title,role);

    h+=`
      <div class="bone bone-${role}" id="bone-${i}" onclick="toggleBone(${i})">
        <div class="bone-ghost">${num}</div>
        <div class="bone-num-col">
          <div class="bone-num">${num}</div>
          <div class="bone-node"></div>
        </div>
        <div class="bone-rib"></div>
        <div class="bone-content">
          <div class="bone-label">${para.emoji||''} ${para.title}</div>
          <div class="bone-purpose">${purpose}</div>
          <div class="bone-preview">${fmtPreview(previewRaw)}</div>
        </div>
        <div class="bone-chevron">▼</div>
      </div>
      <div class="bone-drawer" id="bdrawer-${i}">
        <div class="drawer-body">
          <div class="drawer-section-label">Skeleton lines</div>
          ${drawerLines.map(line=>`
            <div class="drawer-line">
              <div class="drawer-bullet"></div>
              <div>${fmtLine(line)}</div>
            </div>`).join('')}
          ${matchPhrases.length?`
          <div class="drawer-section-label" style="margin-top:0.75rem">Key phrases</div>
          ${matchPhrases.slice(0,6).map(p=>`
            <div class="drawer-phrase-item">
              <div class="phrase-arrow">→</div>
              <div>${fmtLine(p)}</div>
            </div>`).join('')}
          `:''}
        </div>
      </div>
      ${i<variation.skeleton.length-1?'<div class="bone-divider"></div>':''}
    `;
  });

  h+=`
    <div class="anatomy-footer">
      <div class="anatomy-brand">INTUITY</div>
      <div class="anatomy-level">Cambridge B2 · ${variation.name}</div>
    </div>
  </div>`;
  return h;
}

/* ══ MATCH PHRASES from phraseData ══ */
function getMatchingPhrases(type,title,role){
  if(!phraseData||!phraseData[type]||!phraseData[type].categories)return[];
  const t=title.toLowerCase();
  const results=[];
  phraseData[type].categories.forEach(cat=>{
    const ct=cat.title.toLowerCase();
    // Match role to category
    const catIsIntro=ct.includes('intro');
    const catIsConc=ct.includes('conclu');
    const catIsBody=!catIsIntro&&!catIsConc;
    if(role==='intro'&&!catIsIntro)return;
    if(role==='end'&&!catIsConc)return;
    if(role==='body'&&!catIsBody)return;
    cat.subcategories.forEach(sub=>{
      const st=sub.subtitle.toLowerCase();
      // For body, try to narrow by keyword
      if(role==='body'){
        const wantAdv=t.includes('advantage')||t.includes('benefit')||t.includes('positive')||t.includes('strength')||t.includes('for')||t.includes('agree')||t.includes('justif')||t.includes('support');
        const wantDis=t.includes('disadvantage')||t.includes('drawback')||t.includes('against')||t.includes('negative')||t.includes('challenge')||t.includes('risk')||t.includes('problem')||t.includes('critic');
        const wantSol=t.includes('solution')||t.includes('measure')||t.includes('action');
        const wantCause=t.includes('cause')||t.includes('reason')||t.includes('factor')||t.includes('driver');
        const wantEffect=t.includes('effect')||t.includes('impact')||t.includes('result')||t.includes('consequence');
        const wantOpin=t.includes('opinion')||t.includes('view')||t.includes('position')||t.includes('personal');
        const wantCounter=t.includes('counter')||t.includes('alternative')||t.includes('acknowledg');
        if(wantAdv&&!(st.includes('advantage')||st.includes('benefit')||st.includes('positive')||st.includes('for')||st.includes('agree')||st.includes('support')||st.includes('justif')))return;
        if(wantDis&&!(st.includes('disadvantage')||st.includes('drawback')||st.includes('against')||st.includes('negative')||st.includes('challenge')||st.includes('problem')||st.includes('critic')))return;
        if(wantSol&&!st.includes('solution'))return;
        if(wantCause&&!st.includes('cause'))return;
        if(wantEffect&&!st.includes('effect'))return;
        if(wantOpin&&!(st.includes('opinion')||st.includes('personal')||st.includes('view')))return;
        if(wantCounter&&!(st.includes('counter')||st.includes('alternative')))return;
      }
      sub.phrases.forEach(p=>results.push(p));
    });
  });
  return results;
}

async function init(){

  }catch(e){}

/* ══ RENDER ══ */
function renderContent(){

    const variation=skeletonData[currentType].skeletons[currentVariation];
    document.getElementById('contentTitle').textContent=`${skeletonData[currentType].label} — ${variation.name}`;

  }else{
    document.getElementById('contentTitle').textContent=`${skeletonData[currentType].label} — Practice`;
    area.innerHTML=renderPractice(currentType);

function renderPhrases(type){
  if(!phraseData[type]||!phraseData[type].categories)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35)">No phrase bank available.</div>';
  let h='<div class="phrases-display">';
  phraseData[type].categories.forEach(cat=>{
    const t=cat.title.toLowerCase();
    const c=t.includes('intro')||t.includes('opening')?'intro':t.includes('conclu')||t.includes('closing')?'conclusion':'body';
    h+=`<div class="phrase-category"><div class="category-title ${c}">${cat.title}</div>`;
    cat.subcategories.forEach(sub=>{
      h+=`<div class="subcategory"><div class="subcategory-title">${sub.subtitle}</div><ul class="phrase-list">`;
      sub.phrases.forEach(p=>{h+=`<li class="phrase-item">${p}</li>`;});
      h+='</ul></div>';
    });
    h+='</div>';
  });
  return h+'</div>';
}

function renderPractice(type){
  const set=PRACTICE_DATA[type];
  if(!set||!set.length)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35)">Practice coming soon for this type.</div>';
  const data=set[currentPracticeQuestion];
  let h=`<div class="practice-display">
    <div class="practice-question">
      <div class="practice-question-label">Question ${currentPracticeQuestion+1} of ${set.length}</div>
      <div class="practice-question-text">${data.question}</div>

    </div>

      <div class="practice-answer-label">Model Answer</div>`;

  return h;
}

function appendSentenceToCard(text){
  const stack=document.getElementById('infoSentencesStack');
  const line=document.createElement('div');
  line.className='info-sentence-line'+(stack.children.length===0?' first':'');
  line.textContent=text;
  stack.appendChild(line);
  requestAnimationFrame(()=>requestAnimationFrame(()=>line.classList.add('visible')));
}

function buildSections(answer){
  const sections=[];let current=null;
  answer.forEach(line=>{
    if(line.phrase){
      current={label:line.label||line.phraseType||'Body',type:line.phraseType||'body',lines:[line]};
      sections.push(current);
    }else{
      if(!current){current={label:'Opening',type:'body',lines:[]};sections.push(current);}
      current.lines.push(line);
    }
  });
  return sections;
}

async function startPractice(){
  if(practiceActive){stopPractice();return;}
  const set=PRACTICE_DATA[currentType];
  if(!set)return;
  const data=set[currentPracticeQuestion];
  if(!data)return;
  practiceActive=true;practicePaused=false;
  practiceNarrator=await getPracticeVoice();
  const btn=document.getElementById('playPracticeBtn');
  if(btn)btn.textContent='■ Stop';
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
  showListenOverlay(true);
  const sections=buildSections(data.answer);
  for(let si=0;si<sections.length;si++){
    if(!practiceActive)break;
    const sec=sections[si];
    const palette=sectionPalette(si);
    showSectionCard(sec.label,si,sections.length,palette);
    document.getElementById('infoProgressFill').style.width=Math.round(((si+1)/sections.length)*100)+'%';
    document.getElementById('infoProgressFill').style.background=palette.accent;
    document.getElementById('infoCounter').textContent=`Section ${si+1} / ${sections.length}`;
    for(let li=0;li<sec.lines.length;li++){
      if(!practiceActive)break;
      while(practicePaused&&practiceActive)await wait(150);
      if(!practiceActive)break;
      appendSentenceToCard(sec.lines[li].text);
      await speakLine(sec.lines[li].text);
      if(practiceActive&&!practicePaused)await wait(300);
      const origIdx=data.answer.indexOf(sec.lines[li]);
      const lineEl=document.getElementById(`answerLine${origIdx}`);
      if(lineEl)lineEl.classList.add('played');
    }
    if(practiceActive&&si<sections.length-1)await wait(600);
  }
  if(practiceActive){
    stopPractice();
    const cap=document.getElementById('practiceCaption');
    if(cap){cap.textContent='Complete ✦ Press Play to repeat.';}
  }
}

function stopPractice(){
  practiceActive=false;practicePaused=false;
  practiceSynth.cancel();
  showListenOverlay(false);
  const btn=document.getElementById('playPracticeBtn');
  const cap=document.getElementById('practiceCaption');
  if(btn)btn.textContent='▶ Play';
  if(cap){cap.textContent='Press Play — full-screen phrase cards';cap.classList.remove('speaking');}
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
}

function togglePausePractice(){
  if(!practiceActive)return;
  const btn=document.getElementById('infoPauseBtn');
  if(practicePaused){
    practicePaused=false;
    if(btn)btn.textContent='⏸ Pause';
    document.getElementById('infoWave').classList.remove('paused');
  }else{
    practicePaused=true;
    practiceSynth.cancel();
    if(btn)btn.textContent='▶ Resume';
    document.getElementById('infoWave').classList.add('paused');
  }
}

function speakLine(text){
  return new Promise(resolve=>{
    if(!practiceActive){resolve();return;}
    practiceSynth.cancel();
    setTimeout(()=>{
      if(!practiceActive){resolve();return;}
      const utt=new SpeechSynthesisUtterance(text);
      utt.voice=practiceNarrator;utt.rate=0.88;utt.pitch=1.05;utt.volume=1;
      utt.onend=()=>resolve();utt.onerror=()=>resolve();
      practiceSynth.speak(utt);
    },80);
  });
}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

function setViewMode(mode){

  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));

/* ══ NAVIGATE ══ */
function navigate(dir){
  stopPractice();
  if(viewMode==='skeleton'){
    const t=skeletonData[currentType];
    currentVariation=Math.max(0,Math.min(currentVariation+dir,t.skeletons.length-1));
  }else if(viewMode==='practice'){
    const set=PRACTICE_DATA[currentType]||[];
    const next=currentPracticeQuestion+dir;
    if(next>=0&&next<set.length){currentPracticeQuestion=next;}
    else{
      const types=Object.keys(skeletonData).filter(k=>k!=='meta');
      const idx=types.indexOf(currentType)+dir;
      if(idx>=0&&idx<types.length){currentType=types[idx];currentVariation=0;currentPracticeQuestion=dir>0?0:(PRACTICE_DATA[types[idx]]||[]).length-1;renderTabs();}
    }
  }else{
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const idx=types.indexOf(currentType)+dir;
    if(idx>=0&&idx<types.length){switchType(types[idx]);return;}
  }
  renderContent();updateNav();
}

function updateNav(){
  const prev=document.getElementById('btnPrev'),next=document.getElementById('btnNext'),ctr=document.getElementById('pageCounter');
  if(viewMode==='skeleton'){
    const t=skeletonData[currentType];
    prev.disabled=currentVariation===0;next.disabled=currentVariation===t.skeletons.length-1;
    ctr.textContent=`${currentVariation+1} / ${t.skeletons.length}`;
  }else if(viewMode==='practice'){
    const set=PRACTICE_DATA[currentType]||[];
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const typeIdx=types.indexOf(currentType);
    prev.disabled=(currentPracticeQuestion===0&&typeIdx===0);
    next.disabled=(currentPracticeQuestion===set.length-1&&typeIdx===types.length-1);
    ctr.textContent=`Q ${currentPracticeQuestion+1} / ${set.length}`;
  }else{
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const idx=types.indexOf(currentType);
    prev.disabled=idx===0;next.disabled=idx===types.length-1;
    ctr.textContent=`${idx+1} / ${types.length}`;
  }
}

/* ══ FOOTER NAV ══ */
function switchMode(mode){
  if(mode==='build'){
    try{
      const saved=sessionStorage.getItem('currentQuestion');
      if(saved){const q=JSON.parse(saved);sessionStorage.setItem('currentEssayId',q.id||'');sessionStorage.setItem('currentEssayQuestion',q.mainQuestion||'');}
    }catch(e){}
  }
  const map={question:'essay-question.html',plan:'essay-plan.html',build:'essay-build.html',sample:'essay-sample.html'};
  if(map[mode])window.location.href=map[mode];
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&practiceActive)stopPractice();
  if(e.key==='ArrowLeft')navigate(-1);
  if(e.key==='ArrowRight')navigate(1);
});

init();
</script>
