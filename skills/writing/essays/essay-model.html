<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;--rule:rgba(0,0,0,0.07);
  /* purple = Model stage identity */
  --acc:#7b5ea7;--acc-d:#5e4582;--acc-lt:rgba(123,94,167,0.08);--acc-mid:rgba(123,94,167,0.35);
  /* essay-type palette (for tab active colours) */
  --c-teal:#3d9e95;--c-coral:#e8723a;--c-purple:#7b5ea7;--c-rose:#c94f6d;--c-gold:#c08b2f;
  /* bone role colours */
  --intro:#3d9e95;--body-c:#e8723a;--end-c:#7b5ea7;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── TOPBAR — identical to Plan ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.topic-label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-align:right;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}

/* ── TYPE TABS — identical to Plan ── */
.topic-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.topic-tabs::-webkit-scrollbar{display:none}
.ttab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.ttab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ttab.active{background:var(--ink);color:#fff}

/* ── STAGE ── */
.stage{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* ── FOOTER NAV — identical to Plan ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ── POSTER CARD — same geometry as Plan ── */
.poster{
  width:min(420px,90vw);
  height:min(540px,82vh);
  background:var(--white);
  border-radius:1.4rem;
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 2px 0 rgba(255,255,255,0.8) inset,
    4px 6px 0 rgba(0,0,0,0.06),
    0 20px 50px rgba(0,0,0,0.18),
    0 4px 12px rgba(0,0,0,0.1);
  animation:cardUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardUp{
  0%  {opacity:0;transform:scale(0.92) translateY(20px)}
  65% {opacity:1;transform:scale(1.01) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

/* Bone open animation */
@keyframes boneIn{
  0%  {opacity:0;transform:translateY(-4px)}
  100%{opacity:1;transform:translateY(0)}
}
.bone-drawer.open .drawer-body{animation:boneIn 0.22s cubic-bezier(0.22,1,0.36,1) both}

/* ── FLAG — same as Plan ── */
.flag{position:absolute;top:-2px;left:1.8rem;width:56px;z-index:10;display:flex;flex-direction:column;align-items:center}
.flag-body{width:100%;padding:0.5rem 0 0.35rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.15rem;position:relative;background:var(--acc)}
.flag-num{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.02em}
.flag-label{font-family:'Barlow Condensed',sans-serif;font-size:0.42rem;font-weight:900;color:rgba(255,255,255,0.75);letter-spacing:0.14em;text-transform:uppercase;line-height:1}
.flag-body::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:9px;background:var(--acc);clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%)}

/* ── TYPE BADGE top-right ── */
.type-badge{position:absolute;top:1rem;right:1.3rem;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:var(--acc);opacity:0.6;transition:color 0.3s}



/* ── SCROLL AREA ── */
.card-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:3.2rem}
.card-scroll::-webkit-scrollbar{width:3px}
.card-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

/* ── SLIDE NAV ── */
.slide-nav{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.2rem;padding:0.55rem 1rem 0.5rem}
.slide-arrow{background:none;border:1.5px solid rgba(0,0,0,0.12);width:2rem;height:2rem;border-radius:50%;font-size:0.8rem;cursor:pointer;color:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.slide-arrow:hover:not(:disabled){border-color:rgba(0,0,0,0.3);color:var(--ink)}
.slide-arrow:disabled{opacity:0.25;cursor:default}
.page-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.1em;color:rgba(0,0,0,0.28)}

/* ── ACCENT BAR ── */
.accent-bar{height:4px;background:var(--acc);flex-shrink:0;border-radius:0 0 1.4rem 1.4rem;opacity:0.7}

/* ══ SKELETON ══ */
.anatomy-wrap{padding:0 0 1.2rem}

.bone{
  display:flex;align-items:stretch;
  border-bottom:1px solid rgba(0,0,0,0.06);
  cursor:pointer;transition:background 0.18s;overflow:hidden;
}
.bone:first-child{border-top:1px solid rgba(0,0,0,0.06)}
.bone:hover{background:rgba(0,0,0,0.015)}
.bone.open{background:rgba(0,0,0,0.02)}

/* ── SOLID COLOUR SLAB ── */
.bone-num-col{
  width:4rem;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1rem 0;gap:0.22rem;
  background:currentColor; /* role colour fills the slab */
  transition:width 0.18s;
}
.bone-num{
  font-family:'Barlow Condensed',sans-serif;font-size:1.75rem;font-weight:900;
  line-height:1;letter-spacing:-0.02em;
  color:#fff;
}
.bone-role-tag{
  font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;
  letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(255,255,255,0.65);
}
/* node no longer needed — slab replaces it */
.bone-node{display:none}

.bone-content{flex:1;min-width:0;padding:0.85rem 0.5rem 0.85rem 0.9rem}

/* Label: ink colour — slab provides the colour signal */
.bone-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(1rem,3.8vw,1.3rem);font-weight:900;
  letter-spacing:0.03em;text-transform:uppercase;line-height:1.05;
  color:var(--ink);
  margin-bottom:0.18rem;
}

/* Purpose */
.bone-purpose{
  font-family:'Barlow',sans-serif;font-size:0.5rem;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;
  color:rgba(0,0,0,0.28);margin-bottom:0.2rem;
}

/* Preview */
.bone-preview{
  font-family:'Instrument Sans',sans-serif;font-style:italic;
  font-size:0.78rem;line-height:1.45;color:rgba(0,0,0,0.26);
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;
}

.bone-chevron{
  font-size:0.5rem;opacity:0.2;
  transition:transform 0.3s,opacity 0.2s;
  align-self:center;flex-shrink:0;margin-right:0.9rem;margin-left:0.3rem;
}
.bone.open .bone-chevron{transform:rotate(180deg);opacity:0.45}

/* ── DRAWER ── */
.bone-drawer{overflow:hidden;max-height:0;transition:max-height 0.42s cubic-bezier(0.4,0,0.2,1)}
.bone-drawer.open{max-height:600px}
.drawer-body{
  padding:0.7rem 1.1rem 1rem 1rem;
  border-left:4px solid currentColor;
  margin-left:4rem;
  border-top:1px solid rgba(0,0,0,0.05);
}

/* Drawer section labels: clearly distinct */
.drawer-section-label{
  font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;
  letter-spacing:0.2em;text-transform:uppercase;
  background:rgba(0,0,0,0.04);border-radius:3px;
  padding:0.15rem 0.4rem;display:inline-block;
  color:rgba(0,0,0,0.35);
  margin-bottom:0.5rem;margin-top:0.8rem;
}
.drawer-section-label:first-child{margin-top:0}

/* Skeleton lines: dark, readable, with bullet */
.drawer-line{
  font-family:'Instrument Sans',sans-serif;font-size:0.82rem;
  line-height:1.65;color:rgba(0,0,0,0.72);
  padding:0.28rem 0;border-bottom:1px solid rgba(0,0,0,0.05);
  display:flex;gap:0.5rem;align-items:baseline;
}
.drawer-line:last-child{border-bottom:none}
.drawer-bullet{
  width:5px;height:5px;border-radius:50%;
  flex-shrink:0;margin-top:0.5rem;
}
.dph{font-style:italic;font-weight:600;opacity:0.5}

/* Phrase items: italic, lighter, coloured arrow */
.drawer-phrase-item{
  font-family:'Instrument Sans',sans-serif;font-size:0.79rem;
  font-style:italic;line-height:1.6;
  color:rgba(0,0,0,0.52);
  padding:0.22rem 0;border-bottom:1px dashed rgba(0,0,0,0.05);
  display:flex;gap:0.45rem;align-items:baseline;
}
.drawer-phrase-item:last-child{border-bottom:none}
.phrase-arrow{font-size:0.65rem;font-style:normal;font-weight:900;flex-shrink:0;margin-top:0.34rem}

/* ── BONE ROLE COLOURS ──
   The slab uses background:currentColor, so setting color on .bone-* is enough.
   Drawer uses border-left:currentColor on .drawer-body for matching accent. */

.bone-intro { color:var(--intro) }
.bone-intro .bone-num  { color:#fff }
.bone-intro .bone-label{ color:var(--intro) }
.bone-intro .drawer-bullet { background:var(--intro) }
.bone-intro .phrase-arrow  { color:var(--intro) }
.bone-intro.open,.bone-intro:hover { background:rgba(61,158,149,0.04) }

.bone-body { color:var(--body-c) }
.bone-body .bone-num  { color:#fff }
.bone-body .bone-label{ color:var(--body-c) }
.bone-body .drawer-bullet { background:var(--body-c) }
.bone-body .phrase-arrow  { color:var(--body-c) }
.bone-body.open,.bone-body:hover { background:rgba(232,114,58,0.04) }

.bone-end { color:var(--end-c) }
.bone-end .bone-num  { color:#fff }
.bone-end .bone-label{ color:var(--end-c) }
.bone-end .drawer-bullet { background:var(--end-c) }
.bone-end .phrase-arrow  { color:var(--end-c) }
.bone-end.open,.bone-end:hover { background:rgba(123,94,167,0.04) }

.anatomy-footer{
  margin:1.1rem 1rem 0 3.8rem;
  display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid rgba(0,0,0,0.06);padding-top:0.6rem;
}
.anatomy-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:900;letter-spacing:0.22em;color:rgba(0,0,0,0.07)}
.anatomy-level{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(0,0,0,0.1)}

/* ══ PHRASES ══ */
.phrases-display{padding:0 0 1.5rem;font-family:'Barlow',sans-serif}

/* ── Category block — mirrors skeleton bone layout ── */
.pcat{display:flex;flex-direction:column;border-bottom:1px solid rgba(0,0,0,0.06)}
.pcat:first-child{border-top:1px solid rgba(0,0,0,0.06)}

.pcat-slab{
  display:flex;align-items:center;gap:0.75rem;
  padding:0.75rem 1rem 0.75rem 0;
}
.pcat-letter{
  width:4rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;
  color:#fff;
  background:currentColor;
  align-self:stretch;
  min-height:2.8rem;
}
.pcat-label{
  font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;
  letter-spacing:0.04em;text-transform:uppercase;color:var(--ink);
  line-height:1.1;
}

.pcat-intro{color:var(--intro)}
.pcat-intro .pcat-letter{color:#fff}
.pcat-intro .pcat-body{border-left-color:rgba(61,158,149,0.3)}

.pcat-body{color:var(--body-c)}
.pcat-body .pcat-letter{color:#fff}
.pcat-body .pcat-body{border-left-color:rgba(232,114,58,0.3)}

.pcat-end{color:var(--end-c)}
.pcat-end .pcat-letter{color:#fff}
.pcat-end .pcat-body{border-left-color:rgba(123,94,167,0.3)}

/* Note: .pcat-body (role class) and .pcat-body (content div) share name — rename content div */
.pcat-wrap{
  margin-left:4rem;
  padding:0 1rem 0.9rem 0.85rem;
  border-left:3px solid rgba(0,0,0,0.08);
}
.pcat-intro .pcat-wrap{border-left-color:rgba(61,158,149,0.25)}
.pcat-body .pcat-wrap{border-left-color:rgba(232,114,58,0.25)}
.pcat-end .pcat-wrap{border-left-color:rgba(123,94,167,0.25)}

/* Subcategory */
.psub{margin-bottom:0.85rem;padding-top:0.5rem}
.psub:first-child{padding-top:0.6rem}
.psub-title{
  font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;
  letter-spacing:0.18em;text-transform:uppercase;
  background:rgba(0,0,0,0.04);border-radius:3px;
  display:inline-block;padding:0.12rem 0.38rem;
  color:rgba(0,0,0,0.35);margin-bottom:0.45rem;
}

/* Phrase list */
.phrase-list{list-style:none;padding:0;margin:0}
.phrase-item{
  font-family:'Instrument Sans',sans-serif;font-size:0.79rem;
  font-style:italic;line-height:1.6;color:rgba(0,0,0,0.65);
  margin-bottom:0.3rem;padding-left:1.1rem;position:relative;
  border-bottom:1px dashed rgba(0,0,0,0.05);padding-bottom:0.2rem;
}
.phrase-item:last-child{border-bottom:none;margin-bottom:0}
.phrase-item::before{
  content:"→";position:absolute;left:0;
  color:currentColor;font-weight:900;font-style:normal;font-size:0.65rem;
  top:0.32rem;
}


</style>

<body>
<div class="shell">

  <div class="topbar">
    <a href="essay-question.html" class="back-link">← Essays</a>
    <span class="brand">INTUITY</span>
    <span class="topic-label" id="topicLabel">Model</span>
  </div>

  <div class="topic-tabs" id="tabsContainer"></div>

  <div class="stage" id="stage">
    <div class="poster" id="posterCard">

      <!-- Flag bookmark — purple, matching Model stage -->
      <div class="flag">
        <div class="flag-body">
          <span class="flag-num" id="flagNum">01</span>
          <span class="flag-label">Model</span>
        </div>
      </div>

      <!-- Type badge top-right -->
      <div class="type-badge" id="typeBadge">Essay</div>

      <!-- Scrollable content -->
      <div class="card-scroll" id="contentArea"></div>

      <!-- Slide navigation -->
      <div class="slide-nav">
        <button class="slide-arrow" id="btnPrev" onclick="navigate(-1)">←</button>
        <div class="page-counter" id="pageCounter">1 / 1</div>
        <button class="slide-arrow" id="btnNext" onclick="navigate(1)">→</button>
      </div>

      <!-- Purple accent bar at base -->
      <div class="accent-bar" id="accentBar"></div>
    </div>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="switchMode('question')">Question</button>
      <button class="nb"    onclick="switchMode('plan')">Plan</button>
      <button class="nb on" onclick="switchMode('model')">Model</button>
      <button class="nb"    onclick="switchMode('build')">Build</button>
      <button class="nb"    onclick="switchMode('sample')">Sample</button>
    </div>
  </div>
</div>


<script>
/* ══ SOUND ENGINE ══ */
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ac(){if(!actx)actx=new AudioCtx();return actx;}
function tone(freq,type,dur,vol,delay=0){
  try{const ctx=ac(),osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;const t=ctx.currentTime+delay;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);osc.start(t);osc.stop(t+dur+0.05);}catch(e){}
}
function sndOpen(){tone(420,'sine',0.14,0.09);tone(560,'sine',0.1,0.06,0.07);}
function sndClose(){tone(560,'sine',0.1,0.07);tone(380,'sine',0.14,0.05,0.08);}
function sndSwitch(){tone(500,'triangle',0.08,0.08);tone(660,'triangle',0.06,0.05,0.05);}
function sndDone(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.22,0.08,i*0.07));}

/* ══ TYPE COLOUR MAP ══ */
const TYPE_COLOR={
  'opinion':           {accent:'#3d9e95',label:'Opinion'},
  'for-against':       {accent:'#e8723a',label:'For & Against'},
  'problem-solution':  {accent:'#7b5ea7',label:'Problem & Solution'},
  'cause-effect':      {accent:'#c94f6d',label:'Cause & Effect'},
  'agree-disagree':    {accent:'#4a7fb5',label:'Agree & Disagree'},
  'speculation-trends':{accent:'#c08b2f',label:'Speculation & Trends'},
};

function applyTypeAccent(pal){
  /* Only the type badge and tab active state change per type.
     The card itself stays purple (Model stage identity). */
  const badge=document.getElementById('typeBadge');
  if(badge&&pal){badge.textContent=pal.label;badge.style.color=pal.accent;}
  document.querySelectorAll('.ttab').forEach(t=>{
    if(t.classList.contains('active'))t.style.background='';
  });
}

/* ══ STATE ══ */
let skeletonData=null,phraseData=null;
let currentType='for-against',currentVariation=0;



/* ══ HELPERS ══ */
function boneRole(title){const t=title.toLowerCase();if(t.includes('intro')||t.includes('opening'))return'intro';if(t.includes('conclu')||t.includes('closing')||t.includes('summary'))return'end';return'body';}
function bonePurpose(title,role){
  if(role==='intro')return'Hook · Context · Thesis';
  if(role==='end')return'Summarise · Balance · Final view';
  const t=title.toLowerCase();
  if(t.includes('advantage')||t.includes('benefit')||t.includes('positive'))return'Positive point with evidence';
  if(t.includes('disadvantage')||t.includes('drawback'))return'Difficulty or counter-view';
  if(t.includes('solution')||t.includes('measure')||t.includes('action'))return'Concrete remedy';
  if(t.includes('cause')||t.includes('factor')||t.includes('root'))return'Why this happens';
  if(t.includes('effect')||t.includes('impact')||t.includes('consequence'))return'What follows from this';
  if(t.includes('counter')||t.includes('criticism')||t.includes('addressing')||t.includes('balanced')||t.includes('alternative'))return'Opposing view acknowledged';
  if(t.includes('against')||t.includes('disagree')||t.includes('opponent'))return'Arguments against';
  if(t.includes('favour')||t.includes('justif')||t.includes('supporter'))return'Arguments in favour';
  if(t.includes('personal')||t.includes('conviction')||t.includes('stance'))return'Personal stance';
  if(t.includes('predict')||t.includes('future')||t.includes('trend')||t.includes('outlook'))return'Future outlook';
  if(t.includes('problem')||t.includes('challenge')||t.includes('concern'))return'Key difficulty';
  if(t.includes('first')||t.includes('primary'))return'First argument';
  if(t.includes('second')||t.includes('additional')||t.includes('supporting')||t.includes('reinforc'))return'Second argument';
  if(t.includes('third')||t.includes('further'))return'Third argument';
  if(t.includes('main')||t.includes('core')||t.includes('key')||t.includes('argument'))return'Main argument';
  if(t.includes('reason'))return'Supporting reason';
  if(t.includes('view')||t.includes('perspective')||t.includes('opinion'))return'My view';
  if(t.includes('evidence')||t.includes('example'))return'Supporting evidence';
  return'Develop with support';
}
function fmtLine(s){return s?s.replace(/\[([^\]]+)\]/g,'<span class="dph">[$1]</span>'):''}
function fmtPrev(s){return s?s.replace(/\[([^\]]+)\]/g,'<em>[$1]</em>'):''}

/* ══ TOGGLE BONE ══ */
/* Track explored bones for sndDone */
const exploredBones=new Set();

function toggleBone(i){
  const b=document.getElementById('bone-'+i),d=document.getElementById('bdrawer-'+i);
  if(!b||!d)return;
  const open=b.classList.contains('open');
  b.classList.toggle('open',!open);
  d.classList.toggle('open',!open);
  if(!open){
    sndOpen();
    exploredBones.add(i);
    // Check if all bones explored
    const total=document.querySelectorAll('.bone').length;
    if(exploredBones.size>=total)setTimeout(sndDone,300);
  } else {
    sndClose();
  }
}

/* ══ RENDER SKELETON ══ */
function renderSkeleton(variation){
  let h='<div class="anatomy-wrap">';
  variation.skeleton.forEach((para,i)=>{
    const role=boneRole(para.title);
    const purpose=bonePurpose(para.title,role);
    const num=String(i+1).padStart(2,'0');
    const preview=para.lines.find(l=>l&&l.trim())||'';
    const lines=para.lines.filter(l=>l&&l.trim());
    const phrases=getMatchingPhrases(currentType,para.title,role);
    h+=`<div class="bone bone-${role}" id="bone-${i}" onclick="toggleBone(${i})">
      <div class="bone-num-col"><div class="bone-num">${num}</div><div class="bone-role-tag">${role==="intro"?"A":role==="body"?"B":"C"}</div></div>
      <div class="bone-content">
        <div class="bone-label">${para.emoji||''} ${para.title}</div>
        <div class="bone-purpose">${purpose}</div>
        <div class="bone-preview">${fmtPrev(preview)}</div>
      </div>
      <div class="bone-chevron">▼</div>
    </div>
    <div class="bone-drawer" id="bdrawer-${i}">
      <div class="drawer-body">
        <div class="drawer-section-label">Skeleton lines</div>
        ${lines.map(l=>`<div class="drawer-line"><div class="drawer-bullet"></div><div>${fmtLine(l)}</div></div>`).join('')}
        ${phrases.length?`<div class="drawer-section-label" style="margin-top:.7rem">Key phrases</div>${phrases.slice(0,6).map(p=>`<div class="drawer-phrase-item"><div class="phrase-arrow">→</div><div>${fmtLine(p)}</div></div>`).join('')}`:''}
      </div>
    </div>`;
  });
  h+=`<div class="anatomy-footer"><div class="anatomy-brand">INTUITY</div><div class="anatomy-level">Cambridge B2 · ${variation.name}</div></div>`;
  return h+'</div>';
}

/* ══ MATCH PHRASES ══
   phraseData = essay-phrases-master.json
   Structure: phraseData.structures[type].sections[sectionKey].phrases.default[]
   Each section has role: "intro" | "body" | "end"
   We match the skeleton bone title to the best section key by keyword,
   then return all three alternative sets merged (15 phrases).
════════════════════════════════════════════════════════════════════════════ */
function getMatchingPhrases(type,title,role){
  if(!phraseData?.structures)return[];
  const typeData=phraseData.structures[type];
  if(!typeData?.sections)return[];

  const t=title.toLowerCase();
  const sections=typeData.sections;

  // Find the best matching section for this bone
  let bestKey=null;

  // Score each section by keyword overlap with bone title
  let bestScore=-1;
  for(const [key,sec] of Object.entries(sections)){
    if(sec.role!==role)continue; // must match role
    // Score: count keyword matches between section label/key and bone title
    const sl=(sec.label+' '+key).toLowerCase();
    let score=0;
    // Direct keyword matches
    const words=['advantage','disadvantage','problem','solution','cause','effect',
                 'agree','disagree','opinion','argument','counter','transition',
                 'bridge','thesis','introduction','conclusion','predict','trend',
                 'reason','belief','view','evidence','justif','support'];
    words.forEach(w=>{if(t.includes(w)&&sl.includes(w))score+=3;});
    // Opinion-specific body bones
    if((t.includes('first')||t.includes('primary')||t.includes('main')||t.includes('core'))
       &&(sl.includes('argument_1')||sl.includes('first')||sl.includes('argument 1')))score+=4;
    if((t.includes('second')||t.includes('additional')||t.includes('supporting')||t.includes('reinforc'))
       &&(sl.includes('argument_2')||sl.includes('second')||sl.includes('argument 2')))score+=4;
    if((t.includes('counter')||t.includes('addressing')||t.includes('balanced')||t.includes('alternative'))
       &&(sl.includes('counter')||sl.includes('acknowledg')))score+=4;
    // Partial matches
    if(sl.includes('intro')&&(t.includes('intro')||t.includes('opening')))score+=2;
    if(sl.includes('conclu')&&(t.includes('conclu')||t.includes('closing')))score+=2;
    if(sl.includes('thesis')&&t.includes('thesis'))score+=2;
    if(sl.includes('context')&&(t.includes('context')||t.includes('hook')))score+=1;
    // Generic body with no keyword → prefer first body section
    if(role==='body'&&score===0)score=0.5;
    if(score>bestScore){bestScore=score;bestKey=key;}
  }

  // If still no match for body (generic "Body Paragraph 1"), collect ALL body sections
  if(role==='body'&&bestScore<=0.5){
    const results=[];
    for(const sec of Object.values(sections)){
      if(sec.role!=='body')continue;
      if(sec.phrases){
        ['default','alt1','alt2'].forEach(k=>{
          if(sec.phrases[k])sec.phrases[k].forEach(p=>results.push(p));
        });
      }
    }
    return results;
  }

  if(!bestKey)return[];
  const sec=sections[bestKey];
  if(!sec?.phrases)return[];

  // Return all three alternative sets merged
  const results=[];
  ['default','alt1','alt2'].forEach(k=>{
    if(sec.phrases[k])sec.phrases[k].forEach(p=>results.push(p));
  });
  return results;
}

/* ══ INIT ══ */
async function init(){
  try{
    const saved=sessionStorage.getItem('currentQuestion');
    if(saved){
      const q=JSON.parse(saved);
      if(q.essayType&&TYPE_COLOR[q.essayType]){currentType=q.essayType;applyTypeAccent(TYPE_COLOR[q.essayType]);}
      const label=q.topic||q.title||q.topicLabel||(q.mainQuestion||'').split('.')[0].substring(0,32);
      if(label) document.getElementById('topicLabel').textContent=label.toUpperCase();
    }
  }catch(e){}

  try{
    const[r1,r2]=await Promise.all([
      fetch('data/essay-skeletons.json'),
      fetch('data/essay-phrases-master.json')
    ]);
    skeletonData=await r1.json();phraseData=await r2.json();
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    if(!types.includes(currentType))currentType=types[0];
    renderTabs();renderContent();updateNav();
  }catch(e){
    document.getElementById('contentArea').innerHTML='<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.3);font-family:Barlow,sans-serif">⚠ Could not load data</div>';
  }
}

/* ══ TABS ══ */
function renderTabs(){
  const c=document.getElementById('tabsContainer');
  const types=Object.keys(skeletonData).filter(k=>k!=='meta');
  c.innerHTML=types.map(k=>`<button class="ttab ${k===currentType?'active':''}" onclick="switchType('${k}')">${skeletonData[k].label}</button>`).join('');
  applyTypeAccent(TYPE_COLOR[currentType]);
}
function switchType(type){
  currentType=type;currentVariation=0;
  sndSwitch();
  renderTabs();renderContent();updateNav();updateFlag();
}

/* ══ RENDER ══ */
function renderContent(){
  const area=document.getElementById('contentArea');
  const v=skeletonData[currentType].skeletons[currentVariation];
  area.innerHTML=renderSkeleton(v);
  area.scrollTop=0;
  exploredBones.clear();
}



/* ══ NAVIGATE ══ */
function navigate(dir){
  const t=skeletonData[currentType];
  const prev=currentVariation;
  currentVariation=Math.max(0,Math.min(currentVariation+dir,t.skeletons.length-1));
  if(currentVariation!==prev)sndSwitch();
  renderContent();updateNav();updateFlag();
}
function updateFlag(){
  const el=document.getElementById('flagNum');
  if(el)el.textContent=String(currentVariation+1).padStart(2,'0');
}
function updateNav(){
  const t=skeletonData[currentType];
  const prev=document.getElementById('btnPrev'),next=document.getElementById('btnNext'),ctr=document.getElementById('pageCounter');
  prev.disabled=currentVariation===0;next.disabled=currentVariation===t.skeletons.length-1;
  ctr.textContent=`${currentVariation+1} / ${t.skeletons.length}`;
}

/* ══ FOOTER NAV ══ */
function switchMode(mode){
  if(mode==='build'){
    try{const saved=sessionStorage.getItem('currentQuestion');if(saved){const q=JSON.parse(saved);sessionStorage.setItem('currentEssayId',q.id||'');sessionStorage.setItem('currentEssayQuestion',q.mainQuestion||'');}}catch(e){}
  }
  const map={question:'essay-question.html',plan:'essay-plan.html',build:'essay-build.html',sample:'essay-sample.html'};
  if(map[mode])window.location.href=map[mode];
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')navigate(-1);if(e.key==='ArrowRight')navigate(1);
});

init();
</script>
