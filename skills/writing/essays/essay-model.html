<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;--rule:rgba(0,0,0,0.07);
  /* purple = Model stage identity */
  --acc:#7b5ea7;--acc-d:#5e4582;--acc-lt:rgba(123,94,167,0.08);--acc-mid:rgba(123,94,167,0.35);
  /* essay-type palette (for tab active colours) */
  --c-teal:#3d9e95;--c-coral:#e8723a;--c-purple:#7b5ea7;--c-rose:#c94f6d;--c-gold:#c08b2f;
  /* bone role colours */
  --intro:#3d9e95;--body-c:#e8723a;--end-c:#7b5ea7;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── TOPBAR — identical to Plan ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.topic-label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-align:right;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}

/* ── TYPE TABS — identical to Plan ── */
.topic-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.topic-tabs::-webkit-scrollbar{display:none}
.ttab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.ttab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ttab.active{background:var(--ink);color:#fff}

/* ── STAGE ── */
.stage{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* ── FOOTER NAV — identical to Plan ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ── POSTER CARD — same geometry as Plan ── */
.poster{
  width:min(420px,90vw);
  height:min(540px,82vh);
  background:var(--white);
  border-radius:1.4rem;
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 2px 0 rgba(255,255,255,0.8) inset,
    4px 6px 0 rgba(0,0,0,0.06),
    0 20px 50px rgba(0,0,0,0.18),
    0 4px 12px rgba(0,0,0,0.1);
  animation:cardUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardUp{
  0%  {opacity:0;transform:scale(0.92) translateY(20px)}
  65% {opacity:1;transform:scale(1.01) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

/* ── FLAG — same as Plan ── */
.flag{position:absolute;top:-2px;left:1.8rem;width:56px;z-index:10;display:flex;flex-direction:column;align-items:center}
.flag-body{width:100%;padding:0.5rem 0 0.35rem;display:flex;align-items:center;justify-content:center;position:relative;background:var(--acc)}
.flag-label{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;color:#fff;letter-spacing:0.12em;text-transform:uppercase;line-height:1}
.flag-body::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:9px;background:var(--acc);clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%)}

/* ── TYPE BADGE top-right ── */
.type-badge{position:absolute;top:1rem;right:1.3rem;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:var(--acc);opacity:0.6;transition:color 0.3s}

/* ── VIEW TOGGLE — inside card, below flag zone ── */
.view-toggle{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0.5rem 1.1rem 0.42rem;
  margin-top:2.6rem;/* clear the flag */
  border-bottom:1px solid var(--rule);
}
.view-label{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.28)}
.view-pill{display:flex;background:rgba(0,0,0,0.05);border-radius:999px;padding:0.18rem;gap:0.15rem}
.vp-btn{padding:0.26rem 0.78rem;border:none;border-radius:999px;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.36);background:transparent;cursor:pointer;transition:all 0.22s}
.vp-btn:hover{color:rgba(0,0,0,0.65)}
.vp-btn.active{background:var(--ink);color:#fff}

/* ── SCROLL AREA ── */
.card-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card-scroll::-webkit-scrollbar{width:3px}
.card-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

/* ══ SKELETON ══ */
.anatomy-wrap{padding:0.35rem 0 1.2rem}

.bone{
  display:flex;align-items:stretch;
  padding:0.8rem 1rem 0.8rem 0;
  border-bottom:1px solid rgba(0,0,0,0.05);
  cursor:pointer;transition:background 0.18s;
}
.bone:last-of-type{border-bottom:none}
.bone:hover{background:rgba(0,0,0,0.02)}
.bone.open{background:rgba(0,0,0,0.025)}

.bone-num-col{width:3.8rem;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:0.1rem;gap:0.3rem}

/* Numbers: always coloured, bold, visible */
.bone-num{
  font-family:'Barlow Condensed',sans-serif;font-size:1.65rem;font-weight:900;
  line-height:1;letter-spacing:-0.02em;
  transition:transform 0.2s;
}
.bone:hover .bone-num,.bone.open .bone-num{transform:scale(1.08)}

/* Node: always solid, coloured */
.bone-node{
  width:8px;height:8px;border-radius:50%;
  opacity:0.55;transition:opacity 0.2s,transform 0.2s;
}
.bone:hover .bone-node,.bone.open .bone-node{opacity:1;transform:scale(1.4)}

.bone-content{flex:1;min-width:0}

/* Label: always coloured, no hover needed */
.bone-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(1rem,3.8vw,1.35rem);font-weight:900;
  letter-spacing:0.03em;text-transform:uppercase;line-height:1.05;
  margin-bottom:0.18rem;
  transition:letter-spacing 0.2s;
}
.bone:hover .bone-label{letter-spacing:0.05em}

/* Purpose: slightly warmer */
.bone-purpose{
  font-family:'Barlow',sans-serif;font-size:0.52rem;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;
  color:rgba(0,0,0,0.3);margin-bottom:0.22rem;
}

/* Preview: italic, muted */
.bone-preview{
  font-family:'Instrument Sans',sans-serif;font-style:italic;
  font-size:0.79rem;line-height:1.45;color:rgba(0,0,0,0.26);
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;
}

.bone-chevron{font-size:0.55rem;opacity:0.25;transition:transform 0.3s,opacity 0.2s;align-self:center;flex-shrink:0;margin-left:0.4rem}
.bone.open .bone-chevron{transform:rotate(180deg);opacity:0.5}

/* ── DRAWER ── */
.bone-drawer{overflow:hidden;max-height:0;transition:max-height 0.38s cubic-bezier(0.4,0,0.2,1);margin-left:3.8rem}
.bone-drawer.open{max-height:600px}
.drawer-body{padding:0.6rem 1rem 1rem 0.85rem;border-left:3px solid rgba(0,0,0,0.07)}

/* Drawer section labels: clearly distinct */
.drawer-section-label{
  font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;
  letter-spacing:0.2em;text-transform:uppercase;
  background:rgba(0,0,0,0.04);border-radius:3px;
  padding:0.15rem 0.4rem;display:inline-block;
  color:rgba(0,0,0,0.35);
  margin-bottom:0.5rem;margin-top:0.8rem;
}
.drawer-section-label:first-child{margin-top:0}

/* Skeleton lines: dark, readable, with bullet */
.drawer-line{
  font-family:'Instrument Sans',sans-serif;font-size:0.82rem;
  line-height:1.65;color:rgba(0,0,0,0.72);
  padding:0.28rem 0;border-bottom:1px solid rgba(0,0,0,0.05);
  display:flex;gap:0.5rem;align-items:baseline;
}
.drawer-line:last-child{border-bottom:none}
.drawer-bullet{
  width:5px;height:5px;border-radius:50%;
  flex-shrink:0;margin-top:0.5rem;
}
.dph{font-style:italic;font-weight:600;opacity:0.5}

/* Phrase items: italic, lighter, coloured arrow */
.drawer-phrase-item{
  font-family:'Instrument Sans',sans-serif;font-size:0.79rem;
  font-style:italic;line-height:1.6;
  color:rgba(0,0,0,0.52);
  padding:0.22rem 0;border-bottom:1px dashed rgba(0,0,0,0.05);
  display:flex;gap:0.45rem;align-items:baseline;
}
.drawer-phrase-item:last-child{border-bottom:none}
.phrase-arrow{font-size:0.65rem;font-style:normal;font-weight:900;flex-shrink:0;margin-top:0.34rem}

/* ── BONE ROLE COLOURS — always on, not just hover ── */
/* Intro = teal */
.bone-intro .bone-num  { color:var(--intro) }
.bone-intro .bone-node { background:var(--intro) }
.bone-intro .bone-label{ color:var(--intro) }
.bone-intro .bone-purpose { color:rgba(61,158,149,0.55) }
.bone-intro .drawer-bullet { background:var(--intro) }
.bone-intro .phrase-arrow  { color:var(--intro) }
.bone-intro.open,.bone-intro:hover { background:rgba(61,158,149,0.04) }
.bone-intro .drawer-body { border-left-color:rgba(61,158,149,0.25) }

/* Body = coral */
.bone-body .bone-num  { color:var(--body-c) }
.bone-body .bone-node { background:var(--body-c) }
.bone-body .bone-label{ color:var(--body-c) }
.bone-body .bone-purpose { color:rgba(232,114,58,0.55) }
.bone-body .drawer-bullet { background:var(--body-c) }
.bone-body .phrase-arrow  { color:var(--body-c) }
.bone-body.open,.bone-body:hover { background:rgba(232,114,58,0.04) }
.bone-body .drawer-body { border-left-color:rgba(232,114,58,0.25) }

/* End = purple */
.bone-end .bone-num  { color:var(--end-c) }
.bone-end .bone-node { background:var(--end-c) }
.bone-end .bone-label{ color:var(--end-c) }
.bone-end .bone-purpose { color:rgba(123,94,167,0.55) }
.bone-end .drawer-bullet { background:var(--end-c) }
.bone-end .phrase-arrow  { color:var(--end-c) }
.bone-end.open,.bone-end:hover { background:rgba(123,94,167,0.04) }
.bone-end .drawer-body { border-left-color:rgba(123,94,167,0.25) }

.anatomy-footer{
  margin:1.1rem 1rem 0 3.8rem;
  display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid rgba(0,0,0,0.06);padding-top:0.6rem;
}
.anatomy-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:900;letter-spacing:0.22em;color:rgba(0,0,0,0.07)}
.anatomy-level{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(0,0,0,0.1)}

/* ══ PHRASES ══ */
.phrases-display{padding:0.85rem 1rem 1.5rem;font-family:'Barlow',sans-serif}
.phrase-category{margin-bottom:1.4rem}
.category-title{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.3);margin-bottom:0.7rem;padding-bottom:0.38rem;border-bottom:2px solid rgba(0,0,0,0.1)}
.subcategory{margin-bottom:1rem}
.subcategory-title{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:rgba(0,0,0,0.38);margin-bottom:0.5rem}
.phrase-list{list-style:none;padding:0}
.phrase-item{font-family:'Instrument Sans',sans-serif;font-size:0.79rem;line-height:1.6;color:rgba(0,0,0,0.68);margin-bottom:0.5rem;padding-left:1rem;position:relative}
.phrase-item::before{content:"→";position:absolute;left:0;color:var(--acc);font-weight:700}

/* ══ PRACTICE ══ */
.practice-display{display:flex;flex-direction:column;gap:1rem;padding:0.85rem 1rem 1.5rem}
.practice-question{background:var(--acc-lt);border-left:4px solid var(--acc);border-radius:0.75rem;padding:0.85rem 1rem}
.practice-question-label{font-family:'Barlow Condensed',sans-serif;font-size:0.54rem;font-weight:900;text-transform:uppercase;letter-spacing:0.14em;color:var(--acc);opacity:0.7;margin-bottom:0.28rem}
.practice-question-text{font-family:'Instrument Sans',sans-serif;font-size:0.9rem;font-weight:600;color:var(--ink);line-height:1.4}
.practice-controls{display:flex;align-items:center;gap:0.7rem;padding:0.65rem 1rem;background:rgba(0,0,0,0.025);border-radius:0.75rem}
.play-practice-btn{display:flex;align-items:center;gap:0.4rem;padding:0.45rem 1rem;background:var(--ink);color:#fff;border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.play-practice-btn:hover{background:rgba(0,0,0,0.75)}
.practice-caption{font-family:'Barlow',sans-serif;font-size:0.74rem;font-style:italic;color:rgba(0,0,0,0.32);flex:1;line-height:1.4}
.practice-answer{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.06);border-radius:0.75rem;padding:0.9rem 1rem}
.practice-answer-label{font-family:'Barlow Condensed',sans-serif;font-size:0.54rem;font-weight:800;text-transform:uppercase;letter-spacing:0.14em;color:rgba(0,0,0,0.26);margin-bottom:0.45rem}
.answer-line{display:flex;align-items:flex-start;gap:0.65rem;padding:0.38rem 0;border-bottom:1px solid rgba(0,0,0,0.04);transition:background 0.15s}
.answer-line:last-child{border-bottom:none}
.answer-line.played .answer-text{opacity:0.3}
.answer-marker{flex-shrink:0;width:6px;height:6px;border-radius:50%;margin-top:0.46rem;background:rgba(0,0,0,0.14);transition:background 0.3s}
.answer-line.has-phrase .answer-marker{background:var(--acc)}
.answer-line.played .answer-marker{background:rgba(0,0,0,0.07)}
.answer-text{font-family:'Instrument Sans',sans-serif;font-size:0.84rem;line-height:1.6;color:var(--ink)}
.answer-phrase-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:0.54rem;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;padding:0.1rem 0.42rem;border-radius:2rem;margin-left:0.32rem;vertical-align:middle;background:var(--acc-lt);color:var(--acc)}

/* ── SLIDE NAV — same style as Plan card-foot ── */
.slide-nav{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.5rem;padding:0.6rem 1.25rem;background:var(--white);border-top:1px solid var(--rule)}
.slide-arrow{background:transparent;border:2px solid rgba(0,0,0,0.12);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.22s;font-size:1rem;color:rgba(0,0,0,0.4)}
.slide-arrow:hover:not(:disabled){background:var(--acc);border-color:var(--acc);color:#fff}
.slide-arrow:disabled{opacity:0.18;cursor:not-allowed}
.page-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.28);min-width:60px;text-align:center}

/* ── ACCENT BAR — same as Plan ── */
.accent-bar{height:5px;flex-shrink:0;background:var(--acc);border-radius:0 0 1.4rem 1.4rem;transition:background 0.3s}

/* ── LISTEN OVERLAY ── */
.listen-overlay{position:fixed;inset:0;z-index:800;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 1.25rem 1rem;background:#16181d;opacity:0;pointer-events:none;transition:opacity 0.3s}
.listen-overlay.active{opacity:1;pointer-events:all}
.lo-topbar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;flex-shrink:0}
.lo-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.56rem;font-weight:900;letter-spacing:0.32em;text-transform:uppercase;color:rgba(255,255,255,0.14)}
.lo-close-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.65rem;color:rgba(255,255,255,0.3);transition:all 0.2s}
.lo-close-btn:hover{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75)}
.infographic-card{position:relative;width:min(480px,96vw);min-height:min(380px,70vw);background:#fff;border-radius:4px;display:flex;flex-direction:column;box-shadow:10px 16px 0 rgba(0,0,0,0.45),0 40px 90px rgba(0,0,0,0.65);transform:translateY(28px) scale(0.93);opacity:0;transition:transform 0.48s cubic-bezier(0.34,1.46,0.64,1),opacity 0.35s;flex-shrink:0}
.listen-overlay.active .infographic-card{transform:translateY(0) scale(1);opacity:1}
.infographic-card.section-enter{animation:secIn 0.42s cubic-bezier(0.34,1.3,0.64,1) both}
@keyframes secIn{from{opacity:0;transform:translateX(44px) scale(0.96)}to{opacity:1;transform:none}}
.info-left-stripe{position:absolute;left:0;top:0;bottom:0;width:7px;border-radius:4px 0 0 4px;transition:background 0.4s;z-index:5}
.info-bottom-line{height:6px;width:100%;flex-shrink:0;border-radius:0 0 4px 4px;transition:background 0.4s}
.info-num-badge{position:absolute;top:-1rem;left:1.6rem;width:3.4rem;height:3.4rem;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:#fff;transition:background 0.4s;box-shadow:4px 5px 0 rgba(0,0,0,0.3);z-index:10;clip-path:polygon(0 0,calc(100% - 11px) 0,100% 11px,100% 100%,0 100%)}
.info-card-body{padding:1.8rem 1.8rem 0 2.2rem;display:flex;flex-direction:column;flex:1;overflow:hidden}
.info-section-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.8rem,6vw,2.8rem);font-weight:900;letter-spacing:0.04em;text-transform:uppercase;color:#0d0d0d;line-height:0.95;margin-top:1.5rem}
.info-title-rule{width:3.5rem;height:4px;border-radius:2px;margin:0.7rem 0 0.85rem;flex-shrink:0;transition:background 0.4s}
.info-sentences-stack{flex:1;display:flex;flex-direction:column;gap:0.6rem;overflow:hidden}
.info-sentence-line{font-family:'Instrument Sans',sans-serif;font-size:clamp(0.88rem,2.3vw,1rem);font-weight:400;line-height:1.65;color:rgba(0,0,0,0.52);opacity:0;transform:translateY(10px);transition:opacity 0.4s,transform 0.4s}
.info-sentence-line.visible{opacity:1;transform:none}

<body>

  <div class="stage" id="stage">
    <div class="poster" id="posterCard">

</div>

<!-- LISTEN OVERLAY -->

  </div>

    <div class="info-left-stripe" id="infoLeftStripe"></div>
    <div class="info-num-badge" id="infoNumBadge">01</div>
    <div class="info-card-body">
      <div class="info-section-title" id="infoSectionTitle"></div>
      <div class="info-title-rule" id="infoTitleRule"></div>
      <div class="info-sentences-stack" id="infoSentencesStack"></div>
    </div>

        <div class="info-wave-bar"></div><div class="info-wave-bar"></div><div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div><div class="info-wave-bar"></div><div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div>
      </div>

      <span class="lo-counter" id="infoCounter">Section 1 / 1</span>
      <button class="lo-btn primary" id="infoPauseBtn" onclick="togglePausePractice()">⏸ Pause</button>
    </div>
  </div>
</div>

<script>
/* ══ TYPE COLOUR MAP ══ */
const TYPE_COLOR={
  'opinion':           {accent:'#3d9e95',label:'Opinion'},
  'for-against':       {accent:'#e8723a',label:'For & Against'},
  'problem-solution':  {accent:'#7b5ea7',label:'Problem & Solution'},
  'cause-effect':      {accent:'#c94f6d',label:'Cause & Effect'},
  'speculation-trends':{accent:'#c08b2f',label:'Speculation & Trends'},
};

function applyTypeAccent(pal){
  /* Only the type badge and tab active state change per type.
     The card itself stays purple (Model stage identity). */
  const badge=document.getElementById('typeBadge');
  if(badge&&pal){badge.textContent=pal.label;badge.style.color=pal.accent;}
  document.querySelectorAll('.ttab').forEach(t=>{
    if(t.classList.contains('active'))t.style.background='';
  });
}

/* ══ STATE ══ */
let skeletonData=null,phraseData=null;
let currentType='for-against',currentVariation=0,currentPracticeQuestion=0,viewMode='skeleton';
let practiceActive=false,practicePaused=false;
let practiceSynth=window.speechSynthesis,practiceNarrator=null;

/* ══ OVERLAY PALETTE ══ */
const SEC_COLORS=[{accent:'#7db87a',icon:'✍️'},{accent:'#e8723a',icon:'📝'},{accent:'#7b5ea7',icon:'💡'},{accent:'#c08b2f',icon:'⚖️'},{accent:'#c94f6d',icon:'✅'}];
function secPal(i){return SEC_COLORS[i%SEC_COLORS.length];}

/* ══ PRACTICE DATA ══ */
const PRACTICE_DATA={
  'for-against':[
    {question:"Should school uniforms be compulsory?",answer:[
      {text:"In my view, this is a topic that divides opinion quite sharply.",phrase:"In my view,",phraseType:"intro",label:"Opening phrase"},
      {text:"First of all, the way I see it, the key benefit is that uniforms reduce pressure on students to wear expensive clothes.",phrase:"First of all, the way I see it, the key benefit is that",phraseType:"body",label:"First advantage"},
      {text:"Everyone looks the same, so no one feels left out.",phrase:null},
      {text:"Secondly, another clear benefit is that uniforms help create a sense of belonging and school identity.",phrase:"Secondly, another clear benefit is that",phraseType:"body",label:"Second advantage"},
      {text:"On the other hand, the main drawback is that uniforms take away students' freedom of self-expression.",phrase:"On the other hand, the main drawback is that",phraseType:"body",label:"Disadvantage"},
      {text:"Overall, I believe the benefits of school uniforms outweigh the drawbacks, especially in large, diverse schools.",phrase:"Overall, I believe the benefits outweigh the drawbacks",phraseType:"conclusion",label:"Conclusion"}
    ]},
    {question:"Are video games good or bad for young people?",answer:[
      {text:"From my perspective, video games are far more complex than people often assume.",phrase:"From my perspective,",phraseType:"intro",label:"Opening phrase"},
      {text:"To begin with, one major advantage is that many games develop problem-solving skills, concentration, and teamwork.",phrase:"To begin with, one major advantage is that",phraseType:"body",label:"First advantage"},
      {text:"That said, the primary disadvantage is that excessive gaming can lead to addiction and sleep problems.",phrase:"That said, the primary disadvantage is that",phraseType:"body",label:"Disadvantage"},
      {text:"All things considered, I believe the advantages outweigh the disadvantages.",phrase:"All things considered, I believe the advantages outweigh the disadvantages",phraseType:"conclusion",label:"Conclusion"}
    ]},
    {question:"Should homework be banned?",answer:[
      {text:"The way I see it, homework is one of those issues that every student has an opinion on.",phrase:"The way I see it,",phraseType:"intro",label:"Opening phrase"},
      {text:"One obvious benefit of banning homework is that students would have more time to rest and pursue hobbies.",phrase:"One obvious benefit is that",phraseType:"body",label:"First advantage"},
      {text:"Having said that, one significant drawback is that homework reinforces what students learn in class.",phrase:"Having said that, one significant drawback is that",phraseType:"body",label:"Disadvantage"},
      {text:"On balance, I believe a compromise is needed — less homework, but more meaningful tasks.",phrase:"On balance, I believe a compromise is needed",phraseType:"conclusion",label:"Conclusion"}
    ]},
    {question:"Is it better to grow up with a pet or without one?",answer:[
      {text:"Personally, I believe that having a pet as a child can be one of the most enriching experiences imaginable.",phrase:"Personally, I believe that",phraseType:"intro",label:"Opening phrase"},
      {text:"The main benefit, in my opinion, is that pets teach children responsibility and empathy.",phrase:"The main benefit, in my opinion, is that",phraseType:"body",label:"First advantage"},
      {text:"Conversely, the downside is that pets require a great deal of time, money, and commitment.",phrase:"Conversely, the downside is that",phraseType:"body",label:"Disadvantage"},
      {text:"In conclusion, I would say the benefits of growing up with a pet outweigh the drawbacks.",phrase:"In conclusion, I would say the benefits outweigh the drawbacks",phraseType:"conclusion",label:"Conclusion"}
    ]}
  ],
  'opinion':[
    {question:"Should mobile phones be allowed in class?",answer:[
      {text:"I firmly believe that mobile phones in the classroom do more harm than good.",phrase:"I firmly believe that",phraseType:"intro",label:"Opening"},
      {text:"Firstly, one key reason is that phones are an enormous source of distraction.",phrase:"Firstly, one key reason is that",phraseType:"body",label:"First reason"},
      {text:"Some people might argue that phones are useful tools for research.",phrase:"Some people might argue that",phraseType:"body",label:"Counter-argument"},
      {text:"In conclusion, I believe that mobile phones should be stored away during lessons.",phrase:"In conclusion, I believe that",phraseType:"conclusion",label:"Conclusion"}
    ]},
    {question:"Is learning a foreign language worth the effort?",answer:[
      {text:"It is my strong view that learning a foreign language is one of the most valuable things a young person can do.",phrase:"It is my strong view that",phraseType:"intro",label:"Opening"},
      {text:"To begin with, one compelling argument is that speaking another language opens doors to new cultures.",phrase:"To begin with, one compelling argument is that",phraseType:"body",label:"First reason"},
      {text:"Admittedly, some might say that English is spoken everywhere, so other languages are unnecessary.",phrase:"Admittedly, some might say that",phraseType:"body",label:"Counter-argument"},
      {text:"To conclude, I believe that foreign language learning should be a priority in every school curriculum.",phrase:"To conclude, I believe that",phraseType:"conclusion",label:"Conclusion"}
    ]}
  ],
  'cause-effect':[
    {question:"Why do so many teenagers feel stressed, and what are the effects?",answer:[
      {text:"Stress among teenagers has reached levels that many experts now describe as a public health crisis.",phrase:null},
      {text:"One of the main causes is that academic pressure has intensified enormously.",phrase:"One of the main causes is that",phraseType:"body",label:"First cause"},
      {text:"As a result, anxiety disorders and depression have become alarmingly common among young people.",phrase:"As a result,",phraseType:"body",label:"Effect"},
      {text:"To sum up, it is clear that both academic and social pressures are creating a generation under serious strain.",phrase:"To sum up, it is clear that",phraseType:"conclusion",label:"Conclusion"}
    ]}
  ]
};

/* ══ HELPERS ══ */
function boneRole(title){const t=title.toLowerCase();if(t.includes('intro')||t.includes('opening'))return'intro';if(t.includes('conclu')||t.includes('closing')||t.includes('summary'))return'end';return'body';}
function bonePurpose(title,role){
  if(role==='intro')return'Hook · Context · Thesis';
  if(role==='end')return'Summarise · Balance · Final view';
  const t=title.toLowerCase();
  if(t.includes('advantage')||t.includes('benefit')||t.includes('positive'))return'Positive point with evidence';
  if(t.includes('disadvantage')||t.includes('drawback')||t.includes('against'))return'Difficulty or counter-view';
  if(t.includes('solution'))return'Concrete remedy';
  if(t.includes('cause')||t.includes('reason')||t.includes('factor'))return'Why this happens';
  if(t.includes('effect')||t.includes('impact'))return'What follows from this';
  if(t.includes('counter'))return'Opposing view acknowledged';
  return'Develop with support';
}
function fmtLine(s){return s?s.replace(/\[([^\]]+)\]/g,'<span class="dph">[$1]</span>'):''}
function fmtPrev(s){return s?s.replace(/\[([^\]]+)\]/g,'<em>[$1]</em>'):''}

/* ══ TOGGLE BONE ══ */
function toggleBone(i){
  const b=document.getElementById('bone-'+i),d=document.getElementById('bdrawer-'+i);
  if(!b||!d)return;
  const open=b.classList.contains('open');
  b.classList.toggle('open',!open);d.classList.toggle('open',!open);
}

/* ══ RENDER SKELETON ══ */
function renderSkeleton(variation){
  let h='<div class="anatomy-wrap">';
  variation.skeleton.forEach((para,i)=>{
    const role=boneRole(para.title);
    const purpose=bonePurpose(para.title,role);
    const num=String(i+1).padStart(2,'0');
    const preview=para.lines.find(l=>l&&l.trim())||'';
    const lines=para.lines.filter(l=>l&&l.trim());
    const phrases=getMatchingPhrases(currentType,para.title,role);
    h+=`<div class="bone bone-${role}" id="bone-${i}" onclick="toggleBone(${i})">
      <div class="bone-num-col"><div class="bone-num">${num}</div><div class="bone-node"></div></div>
      <div class="bone-content">
        <div class="bone-label">${para.emoji||''} ${para.title}</div>
        <div class="bone-purpose">${purpose}</div>
        <div class="bone-preview">${fmtPrev(preview)}</div>
      </div>
      <div class="bone-chevron">▼</div>
    </div>
    <div class="bone-drawer" id="bdrawer-${i}">
      <div class="drawer-body">
        <div class="drawer-section-label">Skeleton lines</div>
        ${lines.map(l=>`<div class="drawer-line"><div class="drawer-bullet"></div><div>${fmtLine(l)}</div></div>`).join('')}
        ${phrases.length?`<div class="drawer-section-label" style="margin-top:.7rem">Key phrases</div>${phrases.slice(0,6).map(p=>`<div class="drawer-phrase-item"><div class="phrase-arrow">→</div><div>${fmtLine(p)}</div></div>`).join('')}`:''}
      </div>
    </div>`;
  });
  h+=`<div class="anatomy-footer"><div class="anatomy-brand">INTUITY</div><div class="anatomy-level">Cambridge B2 · ${variation.name}</div></div>`;
  return h+'</div>';
}

/* ══ MATCH PHRASES ══ */
function getMatchingPhrases(type,title,role){
  if(!phraseData||!phraseData[type]?.categories)return[];
  const t=title.toLowerCase();const results=[];
  phraseData[type].categories.forEach(cat=>{
    const ct=cat.title.toLowerCase();
    const catIntro=ct.includes('intro');const catConc=ct.includes('conclu');const catBody=!catIntro&&!catConc;
    if(role==='intro'&&!catIntro)return;if(role==='end'&&!catConc)return;if(role==='body'&&!catBody)return;
    cat.subcategories.forEach(sub=>{
      const st=sub.subtitle.toLowerCase();
      if(role==='body'){
        const wA=t.includes('advantage')||t.includes('benefit')||t.includes('for ')||t.includes('agree');
        const wD=t.includes('disadvantage')||t.includes('drawback')||t.includes('against');
        const wS=t.includes('solution');const wC=t.includes('cause')||t.includes('reason');const wE=t.includes('effect')||t.includes('impact');
        if(wA&&!(st.includes('advantage')||st.includes('benefit')||st.includes('positive')||st.includes('for')||st.includes('agree')))return;
        if(wD&&!(st.includes('disadvantage')||st.includes('drawback')||st.includes('against')||st.includes('negative')))return;
        if(wS&&!st.includes('solution'))return;if(wC&&!st.includes('cause'))return;if(wE&&!st.includes('effect'))return;
      }
      sub.phrases.forEach(p=>results.push(p));
    });
  });
  return results;
}

/* ══ INIT ══ */
async function init(){
  try{
    const saved=sessionStorage.getItem('currentQuestion');
    if(saved){
      const q=JSON.parse(saved);
      if(q.essayType&&TYPE_COLOR[q.essayType]){currentType=q.essayType;applyTypeAccent(TYPE_COLOR[q.essayType]);}
    }
  }catch(e){}

  try{
    const[r1,r2]=await Promise.all([fetch('data/complete-essay-phrase-bank.json'),fetch('data/complete-essay-phrase-bank1.json')]);
    skeletonData=await r1.json();phraseData=await r2.json();
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    if(!types.includes(currentType))currentType=types[0];
    renderTabs();renderContent();updateNav();
  }catch(e){
    document.getElementById('contentArea').innerHTML='<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.3);font-family:Barlow,sans-serif">⚠ Could not load data</div>';
  }
}

/* ══ TABS ══ */
function renderTabs(){
  const c=document.getElementById('tabsContainer');
  const types=Object.keys(skeletonData).filter(k=>k!=='meta');
  c.innerHTML=types.map(k=>`<button class="ttab ${k===currentType?'active':''}" onclick="switchType('${k}')">${skeletonData[k].label}</button>`).join('');
  applyTypeAccent(TYPE_COLOR[currentType]);
}
function switchType(type){
  currentType=type;currentVariation=0;currentPracticeQuestion=0;
  stopPractice();renderTabs();renderContent();updateNav();
}

/* ══ RENDER ══ */
function renderContent(){
  const area=document.getElementById('contentArea');
  if(viewMode==='skeleton'){
    const v=skeletonData[currentType].skeletons[currentVariation];
    document.getElementById('viewLabel').textContent=`${skeletonData[currentType].label} — ${v.name}`;
    area.innerHTML=renderSkeleton(v);
  }else if(viewMode==='phrases'){
    document.getElementById('viewLabel').textContent=skeletonData[currentType].label;
    area.innerHTML=renderPhrases(currentType);
  }else{
    document.getElementById('viewLabel').textContent=`${skeletonData[currentType].label} — Practice`;
    area.innerHTML=renderPractice(currentType);
  }
  area.scrollTop=0;
}

function renderPhrases(type){
  if(!phraseData[type]?.categories)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.3)">No phrase bank available.</div>';
  let h='<div class="phrases-display">';
  phraseData[type].categories.forEach(cat=>{
    h+=`<div class="phrase-category"><div class="category-title">${cat.title}</div>`;
    cat.subcategories.forEach(sub=>{
      h+=`<div class="subcategory"><div class="subcategory-title">${sub.subtitle}</div><ul class="phrase-list">`;
      sub.phrases.forEach(p=>{h+=`<li class="phrase-item">${p}</li>`;});
      h+='</ul></div>';
    });
    h+='</div>';
  });
  return h+'</div>';
}

function renderPractice(type){
  const set=PRACTICE_DATA[type];
  if(!set?.length)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.3)">Practice coming soon for this type.</div>';
  const data=set[currentPracticeQuestion];
  let h=`<div class="practice-display">
    <div class="practice-question">
      <div class="practice-question-label">Question ${currentPracticeQuestion+1} of ${set.length}</div>
      <div class="practice-question-text">${data.question}</div>
    </div>
    <div class="practice-controls">
      <button class="play-practice-btn" id="playPracticeBtn" onclick="startPractice()">▶ Play</button>
      <div class="practice-caption" id="practiceCaption">Press Play — full-screen phrase cards</div>
    </div>
    <div class="practice-answer">
      <div class="practice-answer-label">Model Answer</div>`;
  data.answer.forEach((line,i)=>{
    const has=!!line.phrase;
    h+=`<div class="answer-line ${has?'has-phrase':''}" id="answerLine${i}">
      <div class="answer-marker"></div>
      <div class="answer-text">${line.text}${has?`<span class="answer-phrase-tag">${line.label||'phrase'}</span>`:''}</div>
    </div>`;
  });
  return h+'</div></div>';
}

/* ══ PRACTICE OVERLAY ══ */
async function getVoice(){
  return new Promise(res=>{
    const pick=v=>{const en=v.filter(x=>x.lang.startsWith('en'));const p=en.length?en:v;res(p.find(x=>x.name==='Google UK English Male')||p.find(x=>x.name==='Daniel')||p.find(x=>x.lang==='en-GB')||p[0]||null);};
    const v=practiceSynth.getVoices();if(v.length)pick(v);else practiceSynth.onvoiceschanged=()=>pick(practiceSynth.getVoices());
  });
}
function showOv(show){document.getElementById('listenOverlay').classList.toggle('active',show);if(!show)document.getElementById('infoWave').classList.add('paused');}
function showCard(label,si,tot,pal){
  document.getElementById('infoLeftStripe').style.background=pal.accent;
  document.getElementById('infoNumBadge').textContent=String(si+1).padStart(2,'0');
  document.getElementById('infoNumBadge').style.background=pal.accent;
  document.getElementById('infoSectionTitle').textContent=(label||'').toUpperCase();
  document.getElementById('infoTitleRule').style.background=pal.accent;
  document.getElementById('infoBottomLine').style.background=pal.accent;
  document.getElementById('infoIcon').textContent=pal.icon;
  document.querySelectorAll('.info-wave-bar').forEach(b=>b.style.background=pal.accent);
  document.getElementById('infoSentencesStack').innerHTML='';
  const card=document.getElementById('infographicCard');
  card.classList.remove('section-enter');void card.offsetWidth;card.classList.add('section-enter');
  document.getElementById('infoWave').classList.remove('paused');
  document.getElementById('infoPauseBtn').textContent='⏸ Pause';
}
function appendLine(text){
  const stack=document.getElementById('infoSentencesStack');
  const el=document.createElement('div');
  el.className='info-sentence-line'+(stack.children.length===0?' first':'');
  el.textContent=text;stack.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('visible')));
}
function buildSections(answer){
  const secs=[];let cur=null;
  answer.forEach(line=>{
    if(line.phrase){cur={label:line.label||'Body',lines:[line]};secs.push(cur);}
    else{if(!cur){cur={label:'Opening',lines:[]};secs.push(cur);}cur.lines.push(line);}
  });
  return secs;
}
async function startPractice(){
  if(practiceActive){stopPractice();return;}
  const set=PRACTICE_DATA[currentType];if(!set)return;
  const data=set[currentPracticeQuestion];if(!data)return;
  practiceActive=true;practicePaused=false;
  practiceNarrator=await getVoice();
  const btn=document.getElementById('playPracticeBtn');if(btn)btn.textContent='■ Stop';
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
  showOv(true);
  const secs=buildSections(data.answer);
  for(let si=0;si<secs.length;si++){
    if(!practiceActive)break;
    const sec=secs[si];const pal=secPal(si);
    showCard(sec.label,si,secs.length,pal);
    document.getElementById('infoProgressFill').style.width=Math.round(((si+1)/secs.length)*100)+'%';
    document.getElementById('infoProgressFill').style.background=pal.accent;
    document.getElementById('infoCounter').textContent=`Section ${si+1} / ${secs.length}`;
    for(let li=0;li<sec.lines.length;li++){
      if(!practiceActive)break;
      while(practicePaused&&practiceActive)await wait(150);
      if(!practiceActive)break;
      appendLine(sec.lines[li].text);
      await speakLine(sec.lines[li].text);
      if(practiceActive&&!practicePaused)await wait(300);
      const origIdx=data.answer.indexOf(sec.lines[li]);
      document.getElementById(`answerLine${origIdx}`)?.classList.add('played');
    }
    if(practiceActive&&si<secs.length-1)await wait(600);
  }
  if(practiceActive){stopPractice();const c=document.getElementById('practiceCaption');if(c)c.textContent='Complete ✦ Press Play to repeat.';}
}
function stopPractice(){
  practiceActive=false;practicePaused=false;practiceSynth.cancel();showOv(false);
  const btn=document.getElementById('playPracticeBtn');const cap=document.getElementById('practiceCaption');
  if(btn)btn.textContent='▶ Play';
  if(cap)cap.textContent='Press Play — full-screen phrase cards';
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
}
function togglePausePractice(){
  if(!practiceActive)return;
  const btn=document.getElementById('infoPauseBtn');
  if(practicePaused){practicePaused=false;if(btn)btn.textContent='⏸ Pause';document.getElementById('infoWave').classList.remove('paused');}
  else{practicePaused=true;practiceSynth.cancel();if(btn)btn.textContent='▶ Resume';document.getElementById('infoWave').classList.add('paused');}
}
function speakLine(text){
  return new Promise(res=>{
    if(!practiceActive){res();return;}
    practiceSynth.cancel();
    setTimeout(()=>{
      if(!practiceActive){res();return;}
      const u=new SpeechSynthesisUtterance(text);u.voice=practiceNarrator;u.rate=0.88;u.pitch=1.05;u.volume=1;
      u.onend=()=>res();u.onerror=()=>res();practiceSynth.speak(u);
    },80);
  });
}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

/* ══ VIEW MODE ══ */
function setViewMode(mode){
  stopPractice();if(mode==='practice')currentPracticeQuestion=0;
  viewMode=mode;
  document.querySelectorAll('.vp-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  renderContent();updateNav();
}

/* ══ NAVIGATE ══ */
function navigate(dir){
  stopPractice();
  if(viewMode==='skeleton'){
    const t=skeletonData[currentType];
    currentVariation=Math.max(0,Math.min(currentVariation+dir,t.skeletons.length-1));
  }else if(viewMode==='practice'){
    const set=PRACTICE_DATA[currentType]||[];const next=currentPracticeQuestion+dir;
    if(next>=0&&next<set.length){currentPracticeQuestion=next;}
    else{
      const types=Object.keys(skeletonData).filter(k=>k!=='meta');
      const idx=types.indexOf(currentType)+dir;
      if(idx>=0&&idx<types.length){currentType=types[idx];currentVariation=0;currentPracticeQuestion=dir>0?0:(PRACTICE_DATA[types[idx]]||[]).length-1;renderTabs();}
    }
  }else{
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const idx=types.indexOf(currentType)+dir;
    if(idx>=0&&idx<types.length){switchType(types[idx]);return;}
  }
  renderContent();updateNav();
}
function updateNav(){
  const prev=document.getElementById('btnPrev'),next=document.getElementById('btnNext'),ctr=document.getElementById('pageCounter');
  if(viewMode==='skeleton'){
    const t=skeletonData[currentType];
    prev.disabled=currentVariation===0;next.disabled=currentVariation===t.skeletons.length-1;
    ctr.textContent=`${currentVariation+1} / ${t.skeletons.length}`;
  }else if(viewMode==='practice'){
    const set=PRACTICE_DATA[currentType]||[];const types=Object.keys(skeletonData).filter(k=>k!=='meta');const ti=types.indexOf(currentType);
    prev.disabled=(currentPracticeQuestion===0&&ti===0);next.disabled=(currentPracticeQuestion===set.length-1&&ti===types.length-1);
    ctr.textContent=`Q ${currentPracticeQuestion+1} / ${set.length}`;
  }else{
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');const idx=types.indexOf(currentType);
    prev.disabled=idx===0;next.disabled=idx===types.length-1;
    ctr.textContent=`${idx+1} / ${types.length}`;
  }
}

/* ══ FOOTER NAV ══ */
function switchMode(mode){
  if(mode==='build'){
    try{const saved=sessionStorage.getItem('currentQuestion');if(saved){const q=JSON.parse(saved);sessionStorage.setItem('currentEssayId',q.id||'');sessionStorage.setItem('currentEssayQuestion',q.mainQuestion||'');}}catch(e){}
  }
  const map={question:'essay-question.html',plan:'essay-plan.html',build:'essay-build.html',sample:'essay-sample.html'};
  if(map[mode])window.location.href=map[mode];
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&practiceActive)stopPractice();
  if(e.key==='ArrowLeft')navigate(-1);if(e.key==='ArrowRight')navigate(1);
});

init();
</script>
