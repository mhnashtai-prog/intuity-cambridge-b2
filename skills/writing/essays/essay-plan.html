<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Plan — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --acc:#3d9e95;
  --intro:#3d9e95;--body-c:#e8723a;--end-c:#7b5ea7;
  --gold:#c08b2f;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.topic-label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-align:right;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}

.stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}

.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ── POSTER ── */
.poster{
  width:min(420px,90vw);height:min(540px,82vh);
  background:var(--white);border-radius:1.4rem;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
  box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,4px 6px 0 rgba(0,0,0,0.06),0 20px 50px rgba(0,0,0,0.18),0 4px 12px rgba(0,0,0,0.1);
  animation:cardUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardUp{
  0%{opacity:0;transform:scale(0.92) translateY(20px)}
  65%{opacity:1;transform:scale(1.01) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes boneIn{
  0%{opacity:0;transform:translateY(-4px)}
  100%{opacity:1;transform:translateY(0)}
}
.bone-drawer.open .drawer-body{animation:boneIn 0.22s cubic-bezier(0.22,1,0.36,1) both}

/* ── FLAG ── */
.flag{position:absolute;top:-2px;left:1.8rem;width:56px;z-index:10;display:flex;flex-direction:column;align-items:center}
.flag-body{width:100%;padding:0.5rem 0 0.35rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.15rem;position:relative;background:var(--acc)}
.flag-num{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.02em}
.flag-label{font-family:'Barlow Condensed',sans-serif;font-size:0.42rem;font-weight:900;color:rgba(255,255,255,0.75);letter-spacing:0.14em;text-transform:uppercase;line-height:1}
.flag-body::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:9px;background:var(--acc);clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%)}

/* ── TYPE BADGE ── */
.type-badge{position:absolute;top:1rem;right:1.3rem;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:var(--acc);opacity:0.6}

/* ── SCROLL ── */
.card-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:3.2rem}
.card-scroll::-webkit-scrollbar{width:3px}
.card-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

/* ── SLIDE NAV ── */
.slide-nav{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.2rem;padding:0.55rem 1rem 0.5rem}
.slide-arrow{background:none;border:1.5px solid rgba(0,0,0,0.12);width:2rem;height:2rem;border-radius:50%;font-size:0.8rem;cursor:pointer;color:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.slide-arrow:hover:not(:disabled){border-color:rgba(0,0,0,0.3);color:var(--ink)}
.slide-arrow:disabled{opacity:0.25;cursor:default}
.page-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.1em;color:rgba(0,0,0,0.28)}

.accent-bar{height:4px;background:var(--acc);flex-shrink:0;border-radius:0 0 1.4rem 1.4rem;opacity:0.7}

/* ══ BONES ══ */
.anatomy-wrap{padding:0 0 1.2rem}
.bone{display:flex;align-items:stretch;border-bottom:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:background 0.18s;overflow:hidden}
.bone:first-child{border-top:1px solid rgba(0,0,0,0.06)}
.bone:hover{background:rgba(0,0,0,0.015)}
.bone.open{background:rgba(0,0,0,0.02)}

.bone-num-col{width:4rem;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem 0;gap:0.22rem;background:currentColor}
.bone-num{font-family:'Barlow Condensed',sans-serif;font-size:1.75rem;font-weight:900;line-height:1;letter-spacing:-0.02em;color:#fff}
.bone-role-tag{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.65)}

.bone-content{flex:1;min-width:0;padding:0.85rem 0.5rem 0.85rem 0.9rem}
.bone-label{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1rem,3.8vw,1.3rem);font-weight:900;letter-spacing:0.03em;text-transform:uppercase;line-height:1.05;color:var(--ink);margin-bottom:0.18rem}
.bone-purpose{font-family:'Barlow',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.28);margin-bottom:0.2rem}
.bone-preview{font-family:'Caveat',cursive;font-size:0.95rem;line-height:1.3;color:rgba(0,0,0,0.3);overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}

.bone-chevron{font-size:0.5rem;opacity:0.2;transition:transform 0.3s,opacity 0.2s;align-self:center;flex-shrink:0;margin-right:0.9rem;margin-left:0.3rem}
.bone.open .bone-chevron{transform:rotate(180deg);opacity:0.45}

/* ── DRAWER ── */
.bone-drawer{overflow:hidden;max-height:0;transition:max-height 0.42s cubic-bezier(0.4,0,0.2,1)}
.bone-drawer.open{max-height:800px}
.drawer-body{padding:0.7rem 1rem 1rem 1rem;border-left:4px solid currentColor;margin-left:4rem;border-top:1px solid rgba(0,0,0,0.05)}

/* ── NOTE ROWS ── */
.note-row{display:flex;align-items:flex-start;gap:0.5rem;padding:0.18rem 0;position:relative}

/* Connecting line between expansion notes */
.note-row.has-line::before{
  content:'';position:absolute;
  left:0.62rem;top:1.5rem;bottom:-0.18rem;
  width:1.5px;background:currentColor;opacity:0.15;
}

/* Main point — 💡 */
.note-idea{
  font-family:'Caveat',cursive;font-size:1.25rem;font-weight:700;
  line-height:1.2;color:currentColor;
  padding:0.2rem 0 0.4rem;
  border-bottom:1px dashed rgba(0,0,0,0.07);
  margin-bottom:0.2rem;width:100%;
}

/* Expansion — ↳ */
.note-expand{
  font-family:'Caveat',cursive;font-size:1.05rem;font-weight:500;
  line-height:1.35;color:rgba(0,0,0,0.65);
  padding-left:0.2rem;
}

/* Example/Evidence — → with verb badge */
.note-example{
  font-family:'Caveat',cursive;font-size:1rem;font-weight:500;
  line-height:1.35;color:rgba(0,0,0,0.6);
  padding-left:0.2rem;
}
.verb-badge{
  display:inline-block;
  font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;
  letter-spacing:0.12em;text-transform:uppercase;
  background:currentColor;color:#fff;
  padding:0.08rem 0.35rem;border-radius:2px;
  vertical-align:middle;margin-left:0.3rem;opacity:0.75;
}

/* Reason/Result — ∵ */
.note-because{
  font-family:'Caveat',cursive;font-size:0.95rem;font-weight:400;
  line-height:1.3;color:rgba(0,0,0,0.45);
  font-style:italic;
}

/* Contrast — ⚖️ */
.note-contrast{
  font-family:'Caveat',cursive;font-size:1rem;font-weight:500;
  line-height:1.3;color:var(--gold);
}

/* Confirm — ✓ */
.note-confirm{
  font-family:'Caveat',cursive;font-size:1rem;font-weight:600;
  line-height:1.3;color:rgba(0,0,0,0.55);
}

/* Summary — 📝 */
.note-summary{
  font-family:'Caveat',cursive;font-size:1rem;font-weight:500;
  line-height:1.3;color:rgba(0,0,0,0.5);
}

/* Meta notes — (hook), (context) etc. */
.note-meta{
  font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:700;
  letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(0,0,0,0.28);padding:0.1rem 0.35rem;
  background:rgba(0,0,0,0.04);border-radius:3px;
  align-self:center;
}

/* Marker symbol */
.note-marker{
  width:1.4rem;flex-shrink:0;
  font-size:0.85rem;line-height:1;
  margin-top:0.22rem;text-align:center;
}
.note-marker.text-marker{
  font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;
  font-weight:900;color:currentColor;opacity:0.5;
}

/* Phrases CSS removed — phrases belong to Model page */

/* ── BONE ROLE COLOURS ── */
.bone-intro{color:var(--intro)}
.bone-intro .bone-num{color:#fff}
.bone-intro .bone-label{color:var(--intro)}
.bone-intro .phrase-arrow{color:var(--intro)}
.bone-intro.open,.bone-intro:hover{background:rgba(61,158,149,0.04)}

.bone-body{color:var(--body-c)}
.bone-body .bone-num{color:#fff}
.bone-body .bone-label{color:var(--body-c)}
.bone-body .phrase-arrow{color:var(--body-c)}
.bone-body.open,.bone-body:hover{background:rgba(232,114,58,0.04)}

.bone-end{color:var(--end-c)}
.bone-end .bone-num{color:#fff}
.bone-end .bone-label{color:var(--end-c)}
.bone-end .phrase-arrow{color:var(--end-c)}
.bone-end.open,.bone-end:hover{background:rgba(123,94,167,0.04)}

.anatomy-footer{margin:1rem 1rem 0 3.8rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(0,0,0,0.06);padding-top:0.5rem}
.anatomy-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;font-weight:900;letter-spacing:0.22em;color:rgba(0,0,0,0.07)}
.anatomy-type{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(0,0,0,0.12)}

/* ── NO DATA STATE ── */
.no-data{padding:2.5rem 1.5rem;text-align:center;font-family:'Caveat',cursive;font-size:1.1rem;color:rgba(0,0,0,0.25);line-height:1.6}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="essay-question.html">← Essays</a>
    <span class="brand">INTUITY</span>
    <span class="topic-label" id="topicLabel">Plan</span>
  </div>

  <div class="stage">
    <div class="poster" id="posterCard">
      <div class="flag">
        <div class="flag-body">
          <span class="flag-num" id="flagNum">01</span>
        </div>
      </div>
      <div class="type-badge" id="typeBadge">Plan</div>
      <div class="card-scroll" id="contentArea"></div>
      <div class="slide-nav">
        <button class="slide-arrow" id="btnPrev" onclick="navigate(-1)">←</button>
        <div class="page-counter" id="pageCounter">—</div>
        <button class="slide-arrow" id="btnNext" onclick="navigate(1)">→</button>
      </div>
      <div class="accent-bar"></div>
    </div>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Question</button>
      <button class="nb on" onclick="navTo('plan')">Plan</button>
      <button class="nb"    onclick="navTo('model')">Model</button>
      <button class="nb"    onclick="navTo('build')">Build</button>
      <button class="nb"    onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>

<script>
/* ══ SOUND ENGINE ══ */
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ac(){if(!actx)actx=new AudioCtx();return actx;}
function tone(freq,type,dur,vol,delay=0){
  try{const ctx=ac(),osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;const t=ctx.currentTime+delay;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);osc.start(t);osc.stop(t+dur+0.05);}catch(e){}
}
function sndDrop(){tone(360,'sine',0.18,0.12);tone(500,'sine',0.12,0.07,0.08);}
function sndOpen(){tone(420,'sine',0.14,0.09);tone(560,'sine',0.1,0.06,0.07);}
function sndClose(){tone(560,'sine',0.1,0.07);tone(380,'sine',0.14,0.05,0.08);}
function sndSwitch(){tone(500,'triangle',0.08,0.08);tone(660,'triangle',0.06,0.05,0.05);}
function sndDone(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.22,0.08,i*0.07));}

/* ══ TYPE COLOUR MAP ══ */
const TYPE_COLOR={
  'opinion':           {accent:'#3d9e95',label:'Opinion'},
  'for-against':       {accent:'#e8723a',label:'For & Against'},
  'problem-solution':  {accent:'#7b5ea7',label:'Problem & Solution'},
  'cause-effect':      {accent:'#c94f6d',label:'Cause & Effect'},
  'agree-disagree':    {accent:'#4a7fb5',label:'Agree & Disagree'},
  'speculation-trends':{accent:'#c08b2f',label:'Speculation & Trends'},
};

/* ══ STATE ══ */
let ideasData=null;
let currentQuestion=null; /* the full question object from ideas.json */
let currentType='opinion';
let currentId=null;
const exploredBones=new Set();

/* ══ HELPERS ══ */
function boneRole(title){
  const t=title.toLowerCase();
  if(t.includes('intro')||t.includes('p1'))return'intro';
  if(t.includes('conclu')||t.includes('p5')||t.includes('closing'))return'end';
  return'body';
}
function bonePurpose(title,role){
  if(role==='intro')return'Hook · Context · Thesis';
  if(role==='end')return'Summarise · Balance · Final view';
  const t=title.toLowerCase();
  if(t.includes('advantage')||t.includes('benefit'))return'Positive point';
  if(t.includes('disadvantage')||t.includes('drawback'))return'Difficulty';
  if(t.includes('solution')||t.includes('measure'))return'Concrete remedy';
  if(t.includes('cause')||t.includes('reason')||t.includes('factor'))return'Why this happens';
  if(t.includes('effect')||t.includes('impact')||t.includes('result'))return'What follows';
  if(t.includes('for -')||t.includes('favour')||t.includes('agree'))return'Arguments in favour';
  if(t.includes('against')||t.includes('disagree'))return'Arguments against';
  if(t.includes('mental')||t.includes('social')||t.includes('economic'))return'Broader impact';
  return'Develop with support';
}
function fmtLine(s){return s?s.replace(/\[([^\]]+)\]/g,'<span class="dph">[$1]</span>'):''}

/* ══ MARKER → CSS CLASS ══ */
function markerClass(marker){
  if(marker==='💡')return'note-idea';
  if(marker==='↳')return'note-expand';
  if(marker==='→')return'note-example';
  if(marker==='∵')return'note-because';
  if(marker==='⚖️')return'note-contrast';
  if(marker==='✓')return'note-confirm';
  if(marker==='📝')return'note-summary';
  return'note-meta'; /* (hook), (context), etc. */
}

function renderMarker(marker){
  /* For emoji markers show the emoji; for text markers show styled text */
  const emoji=['💡','↳','→','∵','⚖️','✓','📝'];
  if(emoji.includes(marker))return`<div class="note-marker">${marker}</div>`;
  /* text marker like (hook) */
  return`<div class="note-marker text-marker">›</div>`;
}

function renderNote(note){
  const cls=markerClass(note.marker);
  const isMeta=cls==='note-meta';

  if(isMeta){
    /* meta notes: tiny pill label + text */
    return`<div class="note-row">
      ${renderMarker(note.marker)}
      <span class="note-meta">${note.marker.replace(/[()]/g,'')}</span>
      <span style="font-family:'Caveat',cursive;font-size:1rem;color:rgba(0,0,0,0.5);padding-left:0.3rem;line-height:1.4">${note.text}</span>
    </div>`;
  }

  /* For expansion notes — add connecting line class */
  const lineClass=(note.marker==='↳')?'has-line':'';

  /* Verb badge for example notes */
  const verbBadge=note.verb?`<span class="verb-badge">${note.verb}</span>`:'';

  return`<div class="note-row ${lineClass}">
    ${renderMarker(note.marker)}
    <div class="${cls}">${note.text}${verbBadge}</div>
  </div>`;
}

/* ══ MATCH PHRASES ══
   For Plan page: match purely by role.
   Only show phrases for body bones — intro/conclusion bones skip phrases
   to avoid repetition and keep the drawer focused on the notes.
════════════════════════════════════════════════════════════════════════════ */


/* ══ TOGGLE BONE ══ */
function toggleBone(i){
  const b=document.getElementById('bone-'+i),d=document.getElementById('bdrawer-'+i);
  if(!b||!d)return;
  const open=b.classList.contains('open');
  b.classList.toggle('open',!open);
  d.classList.toggle('open',!open);
  if(!open){
    sndOpen();
    exploredBones.add(i);
    const total=document.querySelectorAll('.bone').length;
    if(exploredBones.size>=total)setTimeout(sndDone,300);
  }else{sndClose();}
}

/* ══ RENDER ══ */
function renderContent(){
  const area=document.getElementById('contentArea');
  exploredBones.clear();

  if(!currentQuestion){
    area.innerHTML=`<div class="no-data">No plan found for this question.<br>Navigate to a question first.</div>`;
    return;
  }

  const sections=currentQuestion.skeleton||[];
  const essayTypeKey=currentType; /* normalised key for phrase matching */

  let h='<div class="anatomy-wrap">';
  sections.forEach((sec,i)=>{
    const titleClean=sec.title.replace(/^P\d+:\s*/,'').trim(); /* strip "P2: " prefix */
    const role=boneRole(sec.title);
    const purpose=bonePurpose(sec.title,role);
    const num=String(i+1).padStart(2,'0');

    /* Preview: first non-meta note text */
    const firstNote=sec.notes?.find(n=>!n.marker.startsWith('('))||sec.notes?.[0];
    const preview=firstNote?.text||'';

    h+=`<div class="bone bone-${role}" id="bone-${i}" onclick="toggleBone(${i})">
      <div class="bone-num-col">
        <div class="bone-num">${num}</div>
        <div class="bone-role-tag">${role==='intro'?'A':role==='body'?'B':'C'}</div>
      </div>
      <div class="bone-content">
        <div class="bone-label">${titleClean}</div>
        <div class="bone-purpose">${purpose}</div>
        <div class="bone-preview">${preview}</div>
      </div>
      <div class="bone-chevron">▼</div>
    </div>
    <div class="bone-drawer" id="bdrawer-${i}">
      <div class="drawer-body">
        ${(sec.notes||[]).map(n=>renderNote(n)).join('')}

      </div>
    </div>`;
  });

  h+=`<div class="anatomy-footer">
    <div class="anatomy-brand">INTUITY</div>
    <div class="anatomy-type">${currentQuestion.essayType||''} · Cambridge B2</div>
  </div>`;
  h+='</div>';

  area.innerHTML=h;
  area.scrollTop=0;
}

/* ══ SET ACCENT COLOUR ══ */
function applyAccent(type){
  const pal=TYPE_COLOR[type]||TYPE_COLOR['opinion'];
  document.documentElement.style.setProperty('--acc',pal.accent);
  const badge=document.getElementById('typeBadge');
  if(badge)badge.textContent=pal.label;
}

/* ══ NAVIGATE — cycle through all questions ══ */
let allQuestions=[]; /* flat list of all question objects */
let currentQIdx=0;

function buildQuestionList(){
  allQuestions=[];
  if(!ideasData)return;
  Object.values(ideasData).forEach(typeObj=>{
    Object.values(typeObj).forEach(q=>{allQuestions.push(q);});
  });
}

function loadQuestion(q){
  currentQuestion=q;
  currentId=q.id;
  /* Normalise essayType to match TYPE_COLOR keys */
  const typeRaw=(q.essayType||'opinion').toLowerCase()
    .replace(/\s+&\s+/g,'-').replace(/\s+/g,'-')
    .replace('for-and-against','for-against')
    .replace('problems-and-solutions','problem-solution')
    .replace('problems-solutions','problem-solution')
    .replace('cause-and-effect','cause-effect')
    .replace('agree-and-disagree','agree-disagree')
    .replace('speculation','speculation-trends');
  currentType=typeRaw;
  applyAccent(currentType);
  /* Update topic label */
  document.getElementById('topicLabel').textContent=(q.question||q.topic||'').substring(0,40).toUpperCase();
  /* Update flag */
  document.getElementById('flagNum').textContent=String(currentQIdx+1).padStart(2,'0');
  renderContent();
  updateNav();
}

function navigate(dir){
  const next=Math.max(0,Math.min(currentQIdx+dir,allQuestions.length-1));
  if(next!==currentQIdx){
    currentQIdx=next;
    sndSwitch();
    loadQuestion(allQuestions[currentQIdx]);
  }
}

function updateNav(){
  const prev=document.getElementById('btnPrev'),next=document.getElementById('btnNext'),ctr=document.getElementById('pageCounter');
  if(prev)prev.disabled=currentQIdx===0;
  if(next)next.disabled=currentQIdx===allQuestions.length-1;
  if(ctr)ctr.textContent=`${currentQIdx+1} / ${allQuestions.length}`;
}

/* ══ INIT ══ */
async function init(){
  /* Read sessionStorage for current question */
  let savedId=null,savedType=null,savedQuestion=null;
  try{
    const saved=sessionStorage.getItem('currentQuestion');
    if(saved){
      const q=JSON.parse(saved);
      savedId=q.id||null;
      savedType=q.essayType||null;
      savedQuestion=q.mainQuestion||q.question||null;
      /* Show question in header immediately */
      if(savedQuestion)document.getElementById('topicLabel').textContent=savedQuestion.substring(0,40).toUpperCase();
    }
  }catch(e){}

  try{
    const r1=await fetch('data/ideas.json');
    ideasData=await r1.json();

    buildQuestionList();

    /* Find the question matching sessionStorage */
    let found=false;
    if(savedId){
      const idx=allQuestions.findIndex(q=>q.id===savedId);
      if(idx>=0){currentQIdx=idx;found=true;}
    }
    if(!found&&savedType){
      const typeNorm=savedType.toLowerCase().replace(/\s+/g,'-');
      const idx=allQuestions.findIndex(q=>{
        const t=(q.essayType||'').toLowerCase().replace(/\s+/g,'-');
        return t.includes(typeNorm)||typeNorm.includes(t);
      });
      if(idx>=0){currentQIdx=idx;found=true;}
    }

    loadQuestion(allQuestions[currentQIdx]);
    sndDrop();
  }catch(e){
    console.error(e);
    document.getElementById('contentArea').innerHTML=
      '<div class="no-data">⚠ Could not load plan data.<br>Check that ideas.json is deployed.</div>';
  }
}

/* ══ FOOTER NAV ══ */
function navTo(dest){
  if(dest==='plan')return;
  try{
    const saved=sessionStorage.getItem('currentQuestion');
    const q=saved?JSON.parse(saved):{};
    if(currentQuestion){q.id=currentQuestion.id;q.essayType=currentType;}
    sessionStorage.setItem('currentQuestion',JSON.stringify(q));
  }catch(e){}
  const map={question:'essay-question.html',model:'essay-model.html',build:'essay-build.html',sample:'essay-sample.html'};
  if(map[dest])window.location.href=map[dest];
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')navigate(-1);
  if(e.key==='ArrowRight')navigate(1);
});

init();
</script>
