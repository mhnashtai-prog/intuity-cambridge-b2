<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Plan — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --acc:#9a7d3f;
  --intro:#9a7d3f;--body-c:#9a7d3f;--end-c:#9a7d3f;
  --gold:#9a7d3f;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.topic-label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-align:right;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}

.stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}

.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ── POSTER ── */
.poster{
  width:min(420px,90vw);height:min(540px,82vh);
  background:var(--white);border-radius:1.4rem;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
  box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,4px 6px 0 rgba(0,0,0,0.06),0 20px 50px rgba(0,0,0,0.18),0 4px 12px rgba(0,0,0,0.1);
  animation:cardUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardUp{
  0%{opacity:0;transform:scale(0.92) translateY(20px)}
  65%{opacity:1;transform:scale(1.01) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes boneIn{
  0%{opacity:0;transform:translateY(-4px)}
  100%{opacity:1;transform:translateY(0)}
}
.bone-drawer.open .drawer-body{animation:boneIn 0.22s cubic-bezier(0.22,1,0.36,1) both}

/* ── FLAG ── */
.flag{position:absolute;top:-2px;left:1.8rem;width:56px;z-index:10;display:flex;flex-direction:column;align-items:center}
.flag-body{width:100%;padding:0.5rem 0 0.35rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.15rem;position:relative;background:var(--acc)}
.flag-num{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.02em}
.flag-label{font-family:'Barlow Condensed',sans-serif;font-size:0.42rem;font-weight:900;color:rgba(255,255,255,0.75);letter-spacing:0.14em;text-transform:uppercase;line-height:1}
.flag-body::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:9px;background:var(--acc);clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%)}

/* ── TYPE BADGE ── */
.type-badge{position:absolute;top:1rem;right:1.3rem;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:var(--acc);opacity:0.6}

/* ── SCROLL ── */
.card-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:3.2rem}
.card-scroll::-webkit-scrollbar{width:3px}
.card-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

/* ── SLIDE NAV ── */
.slide-nav{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.2rem;padding:0.55rem 1rem 0.5rem}
.slide-arrow{background:none;border:1.5px solid rgba(0,0,0,0.12);width:2rem;height:2rem;border-radius:50%;font-size:0.8rem;cursor:pointer;color:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.slide-arrow:hover:not(:disabled){border-color:rgba(0,0,0,0.3);color:var(--ink)}
.slide-arrow:disabled{opacity:0.25;cursor:default}
.page-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.1em;color:rgba(0,0,0,0.28)}

.accent-bar{height:4px;background:var(--acc);flex-shrink:0;border-radius:0 0 1.4rem 1.4rem;opacity:0.7}

/* ══ BONES ══ */
.anatomy-wrap{padding:0 0 1.2rem}
.bone{display:flex;align-items:stretch;border-bottom:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:background 0.18s;overflow:hidden}
.bone:first-child{border-top:1px solid rgba(0,0,0,0.06)}
.bone:hover{background:rgba(0,0,0,0.015)}
.bone.open{background:rgba(0,0,0,0.02)}

.bone-num-col{width:4rem;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem 0;gap:0.22rem;background:currentColor}
.bone-num{font-family:'Barlow Condensed',sans-serif;font-size:1.75rem;font-weight:900;line-height:1;letter-spacing:-0.02em;color:#fff}
.bone-role-tag{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.65)}

.bone-content{flex:1;min-width:0;padding:0.85rem 0.5rem 0.85rem 0.9rem}
.bone-label{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1rem,3.8vw,1.3rem);font-weight:900;letter-spacing:0.03em;text-transform:uppercase;line-height:1.05;color:var(--ink);margin-bottom:0.18rem}
.bone-purpose{font-family:'Barlow',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.28);margin-bottom:0.2rem}
.bone-preview{font-family:'Instrument Sans',sans-serif;font-size:0.95rem;line-height:1.3;color:rgba(0,0,0,0.3);overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}

.bone-chevron{font-size:0.5rem;opacity:0.2;transition:transform 0.3s,opacity 0.2s;align-self:center;flex-shrink:0;margin-right:0.9rem;margin-left:0.3rem}
.bone.open .bone-chevron{transform:rotate(180deg);opacity:0.45}

/* ── DRAWER ── */
.bone-drawer{overflow:hidden;max-height:0;transition:max-height 0.42s cubic-bezier(0.4,0,0.2,1)}
.bone-drawer.open{max-height:800px}
.drawer-body{padding:0.7rem 1rem 1rem 1rem;border-left:4px solid currentColor;margin-left:4rem;border-top:1px solid rgba(0,0,0,0.05)}

/* ── NOTE ROWS ── */
.note-row{display:flex;align-items:flex-start;gap:0.5rem;padding:0.18rem 0;position:relative}

/* Connecting line between expansion notes */
.note-row.has-line::before{
  content:'';position:absolute;
  left:0.62rem;top:1.5rem;bottom:-0.18rem;
  width:1.5px;background:currentColor;opacity:0.15;
}

/* Main point — 💡 */
.note-idea{
  font-family:'Instrument Sans',sans-serif;font-size:1.02rem;font-weight:500;
  line-height:1.35;color:#2c2c2a;
  padding:0.2rem 0 0.4rem;
  border-bottom:1px dashed rgba(0,0,0,0.07);
  margin-bottom:0.2rem;width:100%;
}

/* Expansion — ↳ */
.note-expand{
  font-family:'Instrument Sans',sans-serif;font-size:0.95rem;font-weight:400;
  line-height:1.4;color:#3a3a38;
  padding-left:0.2rem;
}

/* Example/Evidence — → with verb badge */
.note-example{
  font-family:'Instrument Sans',sans-serif;font-size:0.95rem;font-weight:400;
  line-height:1.4;color:#3a3a38;
  padding-left:0.2rem;
}
.verb-badge{
  display:inline-block;
  font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;
  letter-spacing:0.12em;text-transform:uppercase;
  background:currentColor;color:#fff;
  padding:0.08rem 0.35rem;border-radius:2px;
  vertical-align:middle;margin-left:0.3rem;opacity:0.75;
}

/* Reason/Result — ∵ */
.note-because{
  font-family:'Instrument Sans',sans-serif;font-size:0.92rem;font-weight:400;
  line-height:1.4;color:#3a3a38;
}

/* Contrast — ⚖️ */
.note-contrast{
  font-family:'Instrument Sans',sans-serif;font-size:0.92rem;font-weight:500;
  line-height:1.4;color:var(--gold);
}

/* Confirm — ✓ */
.note-confirm{
  font-family:'Instrument Sans',sans-serif;font-size:0.92rem;font-weight:500;
  line-height:1.4;color:#3a3a38;
}

/* Summary — 📝 */
.note-summary{
  font-family:'Instrument Sans',sans-serif;font-size:0.92rem;font-weight:400;
  line-height:1.4;color:#3a3a38;
}

/* Meta notes — (hook), (context) etc. */
.note-meta{
  font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:700;
  letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(0,0,0,0.28);padding:0.1rem 0.35rem;
  background:rgba(0,0,0,0.04);border-radius:3px;
  align-self:center;
}

/* Marker symbol */
.note-marker{
  width:1.4rem;flex-shrink:0;
  font-size:0.85rem;line-height:1;
  margin-top:0.22rem;text-align:center;
}
.note-marker.text-marker{
  font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;
  font-weight:900;color:currentColor;opacity:0.5;
}

/* Phrases CSS removed — phrases belong to Model page */

/* ── BONE ROLE COLOURS ── */
.bone-intro{color:var(--intro)}
.bone-intro .bone-num{color:#fff}
.bone-intro .bone-label{color:var(--intro)}
.bone-intro .phrase-arrow{color:var(--intro)}
.bone-intro.open,.bone-intro:hover{background:rgba(61,158,149,0.04)}

.bone-body{color:var(--body-c)}
.bone-body .bone-num{color:#fff}
.bone-body .bone-label{color:var(--body-c)}
.bone-body .phrase-arrow{color:var(--body-c)}
.bone-body.open,.bone-body:hover{background:rgba(232,114,58,0.04)}

.bone-end{color:var(--end-c)}
.bone-end .bone-num{color:#fff}
.bone-end .bone-label{color:var(--end-c)}
.bone-end .phrase-arrow{color:var(--end-c)}
.bone-end.open,.bone-end:hover{background:rgba(123,94,167,0.04)}

.anatomy-footer{margin:1rem 1rem 0 3.8rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(0,0,0,0.06);padding-top:0.5rem}
.anatomy-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;font-weight:900;letter-spacing:0.22em;color:rgba(0,0,0,0.07)}
.anatomy-type{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(0,0,0,0.12)}


/* ══ VIEW TOGGLE (Structure ⇄ Tour ⇄ List) ══ */
.view-toggle{position:absolute;top:0.95rem;left:50%;transform:translateX(-50%);z-index:11;
  display:flex;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.16rem}
.vt-btn{border:none;background:transparent;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:0.56rem;font-weight:900;
  letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.35);
  padding:0.3rem 0.7rem;border-radius:1.5rem;transition:all 0.22s}
.vt-btn.on{background:var(--ink);color:#fff}

/* ══ THE KEYS — three key ideas unlock the question ══ */
:root{ --t-intro:#9a7d3f; --t-intro-d:#7d6432; --t-end:#9a7d3f; --t-end-d:#7d6432;
       --k1:#a8894a; --k2:#9a7d3f; --k3:#8a6f36; }
.poster.temple-wide{width:min(1180px,95vw);height:min(660px,88vh)}
.keysview{display:flex;flex-direction:column;padding:0.55rem 1.2rem 1.1rem;min-height:100%;gap:0.55rem}

/* the question — a quiet dedication, not a slab */
.kq{align-self:center;max-width:94%;display:flex;align-items:baseline;gap:0.45rem;padding:0.1rem 0 0.15rem}
.kq-lock{font-size:0.62rem;opacity:0.45}
.kq-text{font-family:'Caveat',cursive;font-size:1.08rem;font-weight:600;color:rgba(30,28,25,0.85);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* intro / conclusion — badges + signalling words, hairline-framed */
.ksig{display:flex;align-items:baseline;gap:0.9rem;padding:0.4rem 0.2rem}
.ksig.intro{border-bottom:1.5px solid rgba(0,0,0,0.07)}
.ksig.concl{border-top:1.5px solid rgba(0,0,0,0.07)}
.ksig-badge{flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;
  letter-spacing:0.12em;text-transform:uppercase;color:#fff;border-radius:1rem;padding:0.2rem 0.6rem 0.22rem}
.ksig.intro .ksig-badge{background:var(--t-intro)}
.ksig.concl .ksig-badge{background:var(--t-end)}
.ksig-notes{flex:1;display:flex;flex-wrap:wrap;column-gap:1.1rem;row-gap:0;min-width:0;align-items:baseline}
.ks-note{font-family:'Instrument Sans',sans-serif;font-size:0.9rem;font-weight:400;line-height:1.35;color:#3a3a38}
.ks-note .m{opacity:0.45;font-size:0.72rem;margin-right:0.18rem}

/* the three keys — monumental, stretching to fill */
.keys-row{flex:1;min-height:0;display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:1.4rem;padding:0.35rem 0.3rem 0.15rem;align-items:stretch}
.key{display:grid;grid-template-columns:44px 1fr;grid-template-rows:auto auto 1fr auto;column-gap:0.7rem;height:100%;--kc:var(--k1)}
.key:nth-child(2){--kc:var(--k2)}
.key:nth-child(3){--kc:var(--k3)}
.k-head{grid-column:1;width:44px;height:44px;border-radius:50%;background:var(--kc);
  display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.k-head::after{content:none}
.k-num{font-family:'Instrument Sans',sans-serif;font-size:1.15rem;font-weight:600;color:#fff;letter-spacing:-0.01em}
.k-headside{grid-column:2;align-self:center;min-width:0}
.k-over{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:600;
  letter-spacing:0.18em;text-transform:uppercase;color:#8a8880;line-height:1.1}
.k-idea{font-family:'Instrument Sans',sans-serif;font-size:0.98rem;font-weight:500;line-height:1.3;color:#2c2c2a}
.k-neck{grid-column:1;width:6px;height:12px;background:var(--kc);justify-self:center;margin-top:-4px}
.k-rows{grid-column:1 / -1;display:grid;grid-template-columns:44px 1fr;column-gap:0.7rem;grid-auto-rows:1fr;min-height:0}
.k-seg{grid-column:1;width:6px;justify-self:center;background:var(--kc);
  display:flex;align-items:center;justify-content:center;min-height:34px;position:relative}
.k-row:nth-child(2) .k-seg{filter:brightness(0.92)}
.k-row:nth-child(3) .k-seg{filter:brightness(0.84)}
.k-row:nth-child(4) .k-seg{filter:brightness(0.76)}
.k-seg .sn{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:900;color:#fff}
.k-seg::after{content:none}
.k-row{display:contents}
.k-sup{grid-column:2;align-self:center;font-family:'Instrument Sans',sans-serif;font-size:0.95rem;font-weight:400;
  line-height:1.32;color:#2c2c2a;padding:0.24rem 0}
.mv{display:block;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:600;
  letter-spacing:0.18em;color:#9a7d3f;line-height:1.2;margin-bottom:1px}
.k-teeth{display:none}
.k-teeth i{display:block;height:6px;background:var(--kc);filter:brightness(0.7)}
.k-teeth i:nth-child(1){width:26px;margin-left:-11px}
.k-teeth i:nth-child(2){width:15px}
.k-teeth i:nth-child(3){width:21px;margin-left:-6px}

/* the key verb — bigger, bolder, in warm ink */
.kv{font-weight:600;font-style:normal}
.k-sup .kv{font-size:1.12em;color:#9a7d3f;letter-spacing:0.01em}
.k-idea .kv{font-size:1.06em}
.ks-note .kv{font-size:1.1em;color:rgba(25,22,18,0.95)}

.k-caption{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:800;
  letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,0,0,0.3);text-align:center;margin-top:0.15rem}

@media(min-width:820px){
  .keysview{padding:0.7rem 2rem 1.2rem;gap:0.7rem}
  .keys-row{gap:2.4rem;padding:0.6rem 0.6rem 0.2rem}
  .key{grid-template-columns:56px 1fr;column-gap:0.95rem}
  .k-head{width:56px;height:56px}
  .k-head::after{width:19px;height:19px;top:8px}
  .k-num{font-size:1.4rem}
  .k-over{font-size:0.72rem}
  .k-idea{font-size:1.12rem;line-height:1.35}
  .k-neck{width:7px;height:14px}
  .k-rows{grid-template-columns:56px 1fr;column-gap:0.95rem}
  .k-seg{width:7px;min-height:46px}
  .k-seg .sn{font-size:0.74rem}
  .k-seg::after{right:-8px;border-width:5.5px 0 5.5px 8px}
  .k-sup{font-size:1.02rem;line-height:1.22;padding:0.3rem 0}
  .k-teeth{width:18px;gap:3px}
  .k-teeth i:nth-child(1){width:32px;margin-left:-14px}
  .k-teeth i:nth-child(2){width:18px}
  .k-teeth i:nth-child(3){width:26px;margin-left:-8px}
  .kq-text{font-size:1.2rem}
  .ks-note{font-size:1.12rem}
}
@media(max-width:700px){
  .keys-row{grid-auto-flow:row;grid-auto-columns:unset;gap:1rem}
  .kq-text{font-size:0.86rem}
}


/* ══ THE TOUR — one card per paragraph, tap to walk the plan ══ */
.tourview{position:relative;min-height:100%;display:flex;flex-direction:column;padding:0.4rem 1.1rem 0.9rem}
.tour-sub{align-self:center;display:flex;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.14rem;margin-bottom:0.5rem}
.ts-btn{border:none;background:transparent;cursor:pointer;font-family:'Barlow Condensed',sans-serif;
  font-size:0.54rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(0,0,0,0.32);padding:0.26rem 0.75rem;border-radius:1.5rem;transition:all 0.22s}
.ts-btn.on{background:var(--ink);color:#fff}
.tour-stage{flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center}
.tcard{position:absolute;width:min(92%,340px);background:var(--white);border-radius:1.1rem;
  border:1.5px solid rgba(0,0,0,0.07);padding:1.1rem 1.2rem 0.9rem;
  box-shadow:3px 5px 0 rgba(0,0,0,0.05),0 14px 34px rgba(0,0,0,0.14);
  display:flex;flex-direction:column;gap:0.55rem;cursor:pointer;user-select:none;
  will-change:transform,opacity;--tc:var(--k1)}
.tcard-badge{align-self:flex-start;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;
  font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:#fff;
  background:var(--tc);border-radius:1rem;padding:0.2rem 0.62rem 0.22rem}
.tcard-purpose{font-family:'Barlow',sans-serif;font-size:0.5rem;font-weight:700;
  letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.28);margin-top:-0.25rem}
.tcard-idea{font-family:'Instrument Sans',sans-serif;font-size:1.08rem;font-weight:500;line-height:1.35;color:#2c2c2a}
.tcard-idea .kv{font-size:1.06em;color:var(--tc)}
.tcard-bullets{display:flex;flex-direction:column;gap:0.32rem;padding-left:0.85rem;
  border-left:3px solid var(--tc);margin-left:0.1rem}
.tcard-bullet{font-family:'Instrument Sans',sans-serif;font-size:0.95rem;font-weight:400;line-height:1.4;color:#3a3a38}
.tcard-bullet .kv{font-size:1.28em;color:#8a5215}
.tcard-tap{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:800;
  letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,0,0,0.22);text-align:center;margin-top:0.2rem}
.tcard.enter{animation:tcEnter 0.5s cubic-bezier(0.22,1,0.36,1) both}
@keyframes tcEnter{0%{opacity:0;transform:scale(0.78) translateY(-70px) rotate(-4deg)}
  65%{opacity:1;transform:scale(1.02) translateY(5px) rotate(0.6deg)}
  100%{opacity:1;transform:scale(1) translateY(0) rotate(0)}}
.tcard.exit{animation:tcExit 0.4s cubic-bezier(0.6,0,0.8,1) both}
@keyframes tcExit{0%{opacity:1;transform:none}100%{opacity:0;transform:rotate(-8deg) translateX(-120%) scale(0.9)}}
.tcard.speaking{animation:tcBob 2.2s ease-in-out infinite}
@keyframes tcBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.tour-dots{display:flex;justify-content:center;gap:0.45rem;padding-top:0.5rem}
.tdot{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,0.13);
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer}
.tdot.active{transform:scale(1.55)}
.tdot.done{background:rgba(0,0,0,0.3)}
.tour-replay{display:none;align-self:center;margin-top:0.4rem;background:var(--ink);color:#fff;
  border:none;border-radius:2rem;padding:0.42rem 1.1rem;font-family:'Barlow Condensed',sans-serif;
  font-size:0.6rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer}
.tour-replay.visible{display:block;animation:tcEnter 0.4s ease both}
@media(min-width:820px){
  .tcard{width:min(88%,380px);padding:1.3rem 1.4rem 1rem}
  .tcard-idea{font-size:1.7rem}
  .tcard-bullet{font-size:1.16rem}
}

/* ── NO DATA STATE ── */
.no-data{padding:2.5rem 1.5rem;text-align:center;font-family:'Instrument Sans',sans-serif;font-size:1.1rem;color:rgba(0,0,0,0.25);line-height:1.6}

/* ══ SECTION MODAL — tap a Keys section to see the full card ══ */
.ksig,.key{cursor:pointer;transition:opacity 0.18s,transform 0.18s}
.ksig:hover{opacity:0.85}
.key:hover{transform:translateY(-2px)}
.ksig:active,.key:active{transform:scale(0.985)}

.section-modal{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center}
.section-modal.open{display:flex}
.modal-backdrop{position:fixed;inset:0;background:rgba(15,13,10,0.5);display:flex;align-items:center;
  justify-content:center;padding:1.5rem;animation:modalFade 0.2s ease both}
@keyframes modalFade{from{opacity:0}to{opacity:1}}
.modal-card{position:relative;width:min(440px,92vw);max-height:82vh;overflow-y:auto;background:var(--white);
  border-radius:1.3rem;padding:1.7rem 1.5rem 1.4rem;
  box-shadow:4px 8px 0 rgba(0,0,0,0.06),0 30px 60px rgba(0,0,0,0.3);
  animation:modalUp 0.32s cubic-bezier(0.22,1,0.36,1) both;color:var(--ink)}
.modal-card::-webkit-scrollbar{width:3px}
.modal-card::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px}
@keyframes modalUp{0%{opacity:0;transform:scale(0.9) translateY(24px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.modal-close{position:absolute;top:0.8rem;right:0.8rem;width:1.9rem;height:1.9rem;border-radius:50%;
  border:none;background:rgba(0,0,0,0.06);cursor:pointer;font-size:0.8rem;color:rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;transition:background 0.18s}
.modal-close:hover{background:rgba(0,0,0,0.12)}
.modal-badgerow{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.35rem}
.modal-num{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;color:currentColor;opacity:0.55}
.modal-role{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.16em;
  text-transform:uppercase;color:#fff;background:currentColor;border-radius:1rem;padding:0.14rem 0.55rem 0.18rem}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;text-transform:uppercase;
  line-height:1.05;color:var(--ink);margin:0.2rem 0 0.15rem}
.modal-purpose{font-family:'Barlow',sans-serif;font-size:0.62rem;font-weight:700;letter-spacing:0.12em;
  text-transform:uppercase;color:rgba(0,0,0,0.32);margin-bottom:0.85rem;padding-bottom:0.75rem;
  border-bottom:1px dashed rgba(0,0,0,0.1)}
.modal-notes{display:flex;flex-direction:column;gap:0.15rem}
.modal-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding-top:0.7rem;
  border-top:1px solid rgba(0,0,0,0.06)}
.modal-nav-btn{background:rgba(0,0,0,0.05);border:none;border-radius:1.2rem;padding:0.32rem 0.75rem;
  font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:800;letter-spacing:0.08em;
  text-transform:uppercase;color:rgba(0,0,0,0.5);cursor:pointer;transition:all 0.18s}
.modal-nav-btn:hover:not(:disabled){background:rgba(0,0,0,0.1);color:var(--ink)}
.modal-nav-btn:disabled{opacity:0.25;cursor:default}
.modal-card.mrole-intro{color:var(--intro)}
.modal-card.mrole-body{color:var(--body-c)}
.modal-card.mrole-end{color:var(--end-c)}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
       <a class="back-link" href="/skills/writing/essays/essay-question">← Essays</a>
    <span class="brand">INTUITY</span>
    <span class="topic-label" id="topicLabel">Plan</span>
  </div>

  <div class="stage">
    <div class="poster" id="posterCard">
      <div class="flag">
        <div class="flag-body">
          <span class="flag-num" id="flagNum">01</span>
        </div>
      </div>
      <div class="type-badge" id="typeBadge">Plan</div>
      <div class="view-toggle">
        <button class="vt-btn on" id="vtTemple" onclick="setView('temple')">Structure</button>
        <button class="vt-btn" id="vtTour" onclick="setView('tour')">Tour</button>
        <button class="vt-btn" id="vtList" onclick="setView('list')">List</button>
      </div>
      <div class="card-scroll" id="contentArea"></div>
      <div class="slide-nav">
        <button class="slide-arrow" id="btnPrev" onclick="navigate(-1)">←</button>
        <div class="page-counter" id="pageCounter">—</div>
        <button class="slide-arrow" id="btnNext" onclick="navigate(1)">→</button>
      </div>
      <div class="accent-bar"></div>
    </div>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Question</button>
      <button class="nb on" onclick="navTo('plan')">Plan</button>
      <button class="nb"    onclick="navTo('model')">Model</button>
      <button class="nb"    onclick="navTo('build')">Build</button>
      <button class="nb"    onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>

<div class="section-modal" id="sectionModal"></div>

<script>
/* ══ SOUND ENGINE ══ */
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ac(){if(!actx)actx=new AudioCtx();return actx;}
function tone(freq,type,dur,vol,delay=0){
  try{const ctx=ac(),osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;const t=ctx.currentTime+delay;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);osc.start(t);osc.stop(t+dur+0.05);}catch(e){}
}
function sndDrop(){tone(360,'sine',0.18,0.12);tone(500,'sine',0.12,0.07,0.08);}
function sndOpen(){tone(420,'sine',0.14,0.09);tone(560,'sine',0.1,0.06,0.07);}
function sndClose(){tone(560,'sine',0.1,0.07);tone(380,'sine',0.14,0.05,0.08);}
function sndSwitch(){tone(500,'triangle',0.08,0.08);tone(660,'triangle',0.06,0.05,0.05);}
function sndDone(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.22,0.08,i*0.07));}

/* ══ TYPE COLOUR MAP ══ */
const TYPE_COLOR={
  'opinion':           {accent:'#3d9e95',label:'Opinion'},
  'for-against':       {accent:'#e8723a',label:'For & Against'},
  'problem-solution':  {accent:'#7b5ea7',label:'Problem & Solution'},
  'cause-effect':      {accent:'#c94f6d',label:'Cause & Effect'},
  'agree-disagree':    {accent:'#4a7fb5',label:'Agree & Disagree'},
  'speculation-trends':{accent:'#c08b2f',label:'Speculation & Trends'},
};

/* ══ STATE ══ */
let ideasData=null;
let currentQuestion=null; /* the full question object from ideas.json */
let currentType='opinion';
let currentId=null;
const exploredBones=new Set();

/* ══ HELPERS ══ */
function boneRole(title){
  const t=title.toLowerCase();
  if(t.includes('intro')||t.includes('p1'))return'intro';
  if(t.includes('conclu')||t.includes('p5')||t.includes('closing'))return'end';
  return'body';
}
function bonePurpose(title,role){
  if(role==='intro')return'Hook · Context · Thesis';
  if(role==='end')return'Summarise · Balance · Final view';
  const t=title.toLowerCase();
  if(t.includes('advantage')||t.includes('benefit'))return'Positive point';
  if(t.includes('disadvantage')||t.includes('drawback'))return'Difficulty';
  if(t.includes('solution')||t.includes('measure'))return'Concrete remedy';
  if(t.includes('cause')||t.includes('reason')||t.includes('factor'))return'Why this happens';
  if(t.includes('effect')||t.includes('impact')||t.includes('result'))return'What follows';
  if(t.includes('for -')||t.includes('favour')||t.includes('agree'))return'Arguments in favour';
  if(t.includes('against')||t.includes('disagree'))return'Arguments against';
  if(t.includes('mental')||t.includes('social')||t.includes('economic'))return'Broader impact';
  return'Develop with support';
}
function fmtLine(s){return s?s.replace(/\[([^\]]+)\]/g,'<span class="dph">[$1]</span>'):''}

/* ══ MARKER → CSS CLASS ══ */
function markerClass(marker){
  if(marker==='💡')return'note-idea';
  if(marker==='↳')return'note-expand';
  if(marker==='→')return'note-example';
  if(marker==='∵')return'note-because';
  if(marker==='⚖️')return'note-contrast';
  if(marker==='✓')return'note-confirm';
  if(marker==='📝')return'note-summary';
  return'note-meta'; /* (hook), (context), etc. */
}

function renderMarker(marker){
  /* For emoji markers show the emoji; for text markers show styled text */
  const emoji=['💡','↳','→','∵','⚖️','✓','📝'];
  if(emoji.includes(marker))return`<div class="note-marker">${marker}</div>`;
  /* text marker like (hook) */
  return`<div class="note-marker text-marker">›</div>`;
}

function renderNote(note){
  const cls=markerClass(note.marker);
  const isMeta=cls==='note-meta';

  if(isMeta){
    /* meta notes: tiny pill label + text */
    return`<div class="note-row">
      ${renderMarker(note.marker)}
      <span class="note-meta">${note.marker.replace(/[()]/g,'')}</span>
      <span style="font-family:'Instrument Sans',sans-serif;font-size:0.85rem;color:rgba(0,0,0,0.55);padding-left:0.3rem;line-height:1.45">${kv(note.text)}</span>
    </div>`;
  }

  /* For expansion notes — add connecting line class */
  const lineClass=(note.marker==='↳')?'has-line':'';

  /* Verb badge for example notes */
  const verbBadge=note.verb?`<span class="verb-badge">${note.verb}</span>`:'';

  return`<div class="note-row ${lineClass}">
    ${renderMarker(note.marker)}
    <div class="${cls}">${mvTag(note)}${kv(note.text)}${verbBadge}</div>
  </div>`;
}

/* ══ MATCH PHRASES ══
   For Plan page: match purely by role.
   Only show phrases for body bones — intro/conclusion bones skip phrases
   to avoid repetition and keep the drawer focused on the notes.
════════════════════════════════════════════════════════════════════════════ */


/* ══ TOGGLE BONE ══ */
function toggleBone(i){
  const b=document.getElementById('bone-'+i),d=document.getElementById('bdrawer-'+i);
  if(!b||!d)return;
  const open=b.classList.contains('open');
  b.classList.toggle('open',!open);
  d.classList.toggle('open',!open);
  if(!open){
    sndOpen();
    exploredBones.add(i);
    const total=document.querySelectorAll('.bone').length;
    if(exploredBones.size>=total)setTimeout(sndDone,300);
  }else{sndClose();}
}

const MOVE_LABEL={reason:'BECAUSE',example:'EXAMPLE',result:'RESULT',
  contrast:'CONTRAST',compare:'COMPARE',reformulate:'REFORMULATE'};
function mvTag(n){return n.move?`<span class="mv">${MOVE_LABEL[n.move]||n.move.toUpperCase()}</span>`:'';}
/* «verb» markers from ideas.json → bold key verbs (same convention as narrative samples) */
function kv(t){return String(t).replace(/«([^»]+)»/g,'<b class="kv">$1</b>');}
function kvPlain(t){return String(t).replace(/[«»]/g,'');}

/* ══ VIEW MODE (Keys = default) ══ */
let viewMode='temple';
function setView(v){
  if(v===viewMode)return;
  stopTour();
  closeSectionModal();
  viewMode=v;
  document.getElementById('vtTemple').classList.toggle('on',v==='temple');
  document.getElementById('vtTour').classList.toggle('on',v==='tour');
  document.getElementById('vtList').classList.toggle('on',v==='list');
  document.querySelector('.poster').classList.toggle('temple-wide',v==='temple'&&window.innerWidth>=820);
  renderContent();
}
window.setView=setView;

/* ══ SECTION MODAL — tap any Keys-view section (Intro / a Key / Conclusion) ══ */
function openSectionModal(idx){
  const sk=currentQuestion.skeleton||[];
  const sec=sk[idx];
  if(!sec)return;
  const role=boneRole(sec.title);
  const title=sec.title.replace(/^P\d+:\s*/,'').trim();
  const purpose=bonePurpose(sec.title,role);
  const roleLabel=role==='intro'?'Introduction':role==='end'?'Conclusion':'Body';
  const notesHtml=(sec.notes||[]).map(n=>renderNote(n)).join('');

  const modal=document.getElementById('sectionModal');
  modal.innerHTML=`<div class="modal-backdrop" onclick="closeSectionModal()">
    <div class="modal-card mrole-${role}" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeSectionModal()">✕</button>
      <div class="modal-badgerow">
        <span class="modal-num">${String(idx+1).padStart(2,'0')}</span>
        <span class="modal-role">${roleLabel}</span>
      </div>
      <div class="modal-title">${title}</div>
      <div class="modal-purpose">${purpose}</div>
      <div class="modal-notes">${notesHtml}</div>
      <div class="modal-nav">
        <button class="modal-nav-btn" id="modalPrev" onclick="openSectionModal(${idx-1})" ${idx<=0?'disabled':''}>← Prev</button>
        <button class="modal-nav-btn" id="modalNext" onclick="openSectionModal(${idx+1})" ${idx>=sk.length-1?'disabled':''}>Next →</button>
      </div>
    </div>
  </div>`;
  modal.classList.add('open');
  sndOpen();
}
function closeSectionModal(){
  const modal=document.getElementById('sectionModal');
  if(!modal||!modal.classList.contains('open'))return;
  modal.classList.remove('open');
  modal.innerHTML='';
  sndClose();
}
window.openSectionModal=openSectionModal;
window.closeSectionModal=closeSectionModal;
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeSectionModal();
});

/* ══ THE TOUR — walk the plan one paragraph at a time ══ */
let tourIdx=0, tourMode='explore', tourTimer=null, tourBusy=false;
const TOUR_COLORS=['#3fbfb2','#f0a23c','#e0862f','#c96d26','#e85a4f'];
function tourColor(i,total){
  if(i===0)return TOUR_COLORS[0];
  if(i===total-1)return TOUR_COLORS[4];
  return TOUR_COLORS[Math.min(i,3)];
}
function stopTour(){
  if(tourTimer){clearTimeout(tourTimer);tourTimer=null;}
  try{window.speechSynthesis.cancel();}catch(e){}
  tourBusy=false;
}
function tourAdapt(){
  const sk=currentQuestion.skeleton||[];
  return sk.map((sec,i)=>{
    const role=boneRole(sec.title);
    const title=sec.title.replace(/^P\d+:\s*/,'').trim();
    const idea=(sec.notes||[]).find(n=>n.marker==='💡');
    const bullets=(sec.notes||[]).filter(n=>n!==idea);
    return {num:String(i+1).padStart(2,'0'), title, role,
      purpose:bonePurpose(sec.title,role),
      idea: idea?idea.text:(bullets[0]?bullets[0].text:''),
      bullets:(idea?bullets:bullets.slice(1)).map(n=>n.text),
      color:tourColor(i,sk.length)};
  });
}
function tourSpeak(text){
  return new Promise(res=>{
    try{
      const synth=window.speechSynthesis; synth.cancel();
      const u=new SpeechSynthesisUtterance(text);
      const vs=synth.getVoices().filter(v=>v.lang.startsWith('en'));
      u.voice=vs.find(v=>v.name==='Google UK English Male')||vs.find(v=>v.lang==='en-GB')||vs[0]||null;
      u.rate=0.9; u.pitch=1.02;
      u.onend=()=>res(); u.onerror=()=>res();
      synth.speak(u);
    }catch(e){res();}
  });
}
function renderTour(area){
  stopTour(); tourIdx=0;
  const cards=tourAdapt();
  const dots=cards.map((_,i)=>`<div class="tdot${i===0?' active':''}" onclick="event.stopPropagation();tourJump(${i})"></div>`).join('');
  area.innerHTML=`<div class="tourview">
    <div class="tour-sub">
      <button class="ts-btn on" id="tsExplore" onclick="setTourMode('explore')">Explore</button>
      <button class="ts-btn" id="tsListen" onclick="setTourMode('listen')">Listen</button>
    </div>
    <div class="tour-stage" id="tourStage"></div>
    <div class="tour-dots" id="tourDots">${dots}</div>
    <button class="tour-replay" id="tourReplay" onclick="tourReplay()">↺ Walk it again</button>
  </div>`;
  tourShow(0,true);
  area.scrollTop=0;
}
function tourCardHTML(c){
  const bullets=c.bullets.map(b=>`<div class="tcard-bullet">${kv(b)}</div>`).join('');
  return `<div class="tcard enter" style="--tc:${c.color}" onclick="tourAdvance()">
    <span class="tcard-badge">${c.num} · ${c.title}</span>
    <div class="tcard-purpose">${c.purpose}</div>
    <div class="tcard-idea">${kv(c.idea)}</div>
    ${bullets?`<div class="tcard-bullets">${bullets}</div>`:''}
    <div class="tcard-tap">tap to continue</div>
  </div>`;
}
async function tourShow(idx,first=false){
  const cards=tourAdapt();
  const stage=document.getElementById('tourStage');
  if(!stage)return;
  tourIdx=idx;
  stage.innerHTML=tourCardHTML(cards[idx]);
  tourUpdateDots(cards.length);
  if(!first)sndOpen();
  if(tourMode==='listen'){
    const el=stage.querySelector('.tcard');
    const c=cards[idx];
    el.classList.add('speaking');
    const speech=`${c.title}. ${kvPlain(c.idea)}. ${c.bullets.map(kvPlain).join('. ')}`;
    await tourSpeak(speech);
    if(el)el.classList.remove('speaking');
    if(tourMode!=='listen')return;
    if(idx<cards.length-1){
      tourTimer=setTimeout(()=>{if(tourMode==='listen')tourAdvance();},1100);
    }else{ sndDone(); tourFinish(); }
  }else if(idx===cards.length-1){
    tourFinish();
  }
}
function tourFinish(){
  const r=document.getElementById('tourReplay');
  if(r)r.classList.add('visible');
}
function tourAdvance(){
  if(tourBusy)return;
  const cards=tourAdapt();
  if(tourIdx>=cards.length-1)return;
  if(tourTimer){clearTimeout(tourTimer);tourTimer=null;}
  try{window.speechSynthesis.cancel();}catch(e){}
  tourBusy=true;
  const el=document.querySelector('#tourStage .tcard');
  if(el){el.classList.remove('speaking','enter');el.classList.add('exit');}
  sndSwitch();
  setTimeout(()=>{tourBusy=false;tourShow(tourIdx+1);},280);
}
function tourJump(idx){
  if(idx===tourIdx)return;
  stopTour();
  tourShow(idx);
}
function tourReplay(){
  const r=document.getElementById('tourReplay');
  if(r)r.classList.remove('visible');
  stopTour();
  tourShow(0,true);
}
function setTourMode(m){
  if(m===tourMode)return;
  tourMode=m;
  document.getElementById('tsExplore').classList.toggle('on',m==='explore');
  document.getElementById('tsListen').classList.toggle('on',m==='listen');
  stopTour();
  const r=document.getElementById('tourReplay');
  if(r)r.classList.remove('visible');
  tourShow(0,true);
}
function tourUpdateDots(total){
  const d=document.getElementById('tourDots');
  if(!d)return;
  [...d.children].forEach((el,i)=>{
    el.className='tdot'+(i===tourIdx?' active':'')+(i<tourIdx?' done':'');
  });
}
window.tourAdvance=tourAdvance; window.tourJump=tourJump;
window.tourReplay=tourReplay; window.setTourMode=setTourMode;

/* ══ THE KEYS RENDERER ══ */
function renderTemple(area){
  const sk=currentQuestion.skeleton||[];
  if(sk.length<3){ renderList(area); return; }
  const intro=sk[0], concl=sk[sk.length-1], cols=sk.slice(1,-1);
  const q=currentQuestion.question||'';
  const bar=(sec,cls,num,title,idx)=>{
    const notes=(sec.notes||[]).map(n=>
      `<span class="ks-note"><span class="m">${n.marker}</span>${kv(n.text)}</span>`).join('');
    return `<div class="ksig ${cls}" onclick="openSectionModal(${idx})">
      <span class="ksig-badge">${num} ${title}</span>
      <div class="ksig-notes">${notes}</div></div>`;
  };
  const keyHTML=cols.map((sec,ci)=>{
    const title=sec.title.replace(/^P\d+:\s*/,'').trim();
    const idea=(sec.notes||[]).find(n=>n.marker==='💡');
    const sups=(sec.notes||[]).filter(n=>n!==idea);
    const rows=sups.map((n,i)=>`<div class="k-row">
        <div class="k-seg"></div>
        <div class="k-sup">${mvTag(n)}${kv(n.text)}</div></div>`).join('');
    const skIdx=ci+1;
    return `<div class="key" onclick="openSectionModal(${skIdx})">
      <div class="k-head"><span class="k-num">${String(ci+2).padStart(2,'0')}</span></div>
      <div class="k-headside">
        <div class="k-over">${title}</div>
        <div class="k-idea">${idea?kv(idea.text):''}</div>
      </div>
      <div class="k-neck"></div>
      <div class="k-rows">${rows}</div>
      <div class="k-teeth"><i></i><i></i><i></i></div>
    </div>`;
  }).join('');
  area.innerHTML=`<div class="keysview">
    <div class="kq"><span class="kq-lock">🔒</span><span class="kq-text">${q}</span></div>
    ${bar(intro,'intro','01','Intro',0)}
    <div class="keys-row">${keyHTML}</div>
    ${bar(concl,'concl',String(sk.length).padStart(2,'0'),'Conclusion',sk.length-1)}
    <div class="k-caption">Three key ideas unlock the question — tap any section for the full card</div>
  </div>`;
  area.scrollTop=0;
}

/* ══ RENDER ══ */
function renderContent(){
  const area=document.getElementById('contentArea');
  exploredBones.clear();

  if(!currentQuestion){
    area.innerHTML=`<div class="no-data">No plan found for this question.<br>Navigate to a question first.</div>`;
    return;
  }
  document.querySelector('.poster').classList.toggle('temple-wide',viewMode==='temple'&&window.innerWidth>=820);
  if(viewMode==='temple'){ renderTemple(area); return; }
  if(viewMode==='tour'){ renderTour(area); return; }
  renderList(area);
}

function renderList(area){
  const sections=currentQuestion.skeleton||[];
  const essayTypeKey=currentType; /* normalised key for phrase matching */

  let h='<div class="anatomy-wrap">';
  sections.forEach((sec,i)=>{
    const titleClean=sec.title.replace(/^P\d+:\s*/,'').trim(); /* strip "P2: " prefix */
    const role=boneRole(sec.title);
    const purpose=bonePurpose(sec.title,role);
    const num=String(i+1).padStart(2,'0');

    /* Preview: first non-meta note text */
    const firstNote=sec.notes?.find(n=>!n.marker.startsWith('('))||sec.notes?.[0];
    const preview=firstNote?.text||'';

    h+=`<div class="bone bone-${role}" id="bone-${i}" onclick="toggleBone(${i})">
      <div class="bone-num-col">
        <div class="bone-num">${num}</div>
        <div class="bone-role-tag">${role==='intro'?'A':role==='body'?'B':'C'}</div>
      </div>
      <div class="bone-content">
        <div class="bone-label">${titleClean}</div>
        <div class="bone-purpose">${purpose}</div>
        <div class="bone-preview">${kv(preview)}</div>
      </div>
      <div class="bone-chevron">▼</div>
    </div>
    <div class="bone-drawer" id="bdrawer-${i}">
      <div class="drawer-body">
        ${(sec.notes||[]).map(n=>renderNote(n)).join('')}

      </div>
    </div>`;
  });

  h+=`<div class="anatomy-footer">
    <div class="anatomy-brand">INTUITY</div>
    <div class="anatomy-type">${currentQuestion.essayType||''} · Cambridge B2</div>
  </div>`;
  h+='</div>';

  area.innerHTML=h;
  area.scrollTop=0;
}

/* ══ SET ACCENT COLOUR ══ */
function applyAccent(type){
  const pal=TYPE_COLOR[type]||TYPE_COLOR['opinion'];
  document.documentElement.style.setProperty('--acc',pal.accent);
  const badge=document.getElementById('typeBadge');
  if(badge)badge.textContent=pal.label;
}

/* ══ NAVIGATE — cycle through all questions ══ */
let allQuestions=[]; /* flat list of all question objects */
let currentQIdx=0;

function buildQuestionList(){
  allQuestions=[];
  if(!ideasData)return;
  Object.values(ideasData).forEach(typeObj=>{
    Object.values(typeObj).forEach(q=>{allQuestions.push(q);});
  });
}

function loadQuestion(q){
  stopTour();
  closeSectionModal();
  currentQuestion=q;
  currentId=q.id;
  /* Normalise essayType to match TYPE_COLOR keys */
  const typeRaw=(q.essayType||'opinion').toLowerCase()
    .replace(/\s+&\s+/g,'-').replace(/\s+/g,'-')
    .replace('for-and-against','for-against')
    .replace('problems-and-solutions','problem-solution')
    .replace('problems-solutions','problem-solution')
    .replace('cause-and-effect','cause-effect')
    .replace('agree-and-disagree','agree-disagree')
    .replace('speculation','speculation-trends');
  currentType=typeRaw;
  applyAccent(currentType);
  /* Update topic label */
  document.getElementById('topicLabel').textContent=(q.question||q.topic||'').substring(0,40).toUpperCase();
  /* Update flag */
  document.getElementById('flagNum').textContent=String(currentQIdx+1).padStart(2,'0');
  renderContent();
  updateNav();
}

function navigate(dir){
  const next=Math.max(0,Math.min(currentQIdx+dir,allQuestions.length-1));
  if(next!==currentQIdx){
    currentQIdx=next;
    sndSwitch();
    loadQuestion(allQuestions[currentQIdx]);
  }
}

function updateNav(){
  const prev=document.getElementById('btnPrev'),next=document.getElementById('btnNext'),ctr=document.getElementById('pageCounter');
  if(prev)prev.disabled=currentQIdx===0;
  if(next)next.disabled=currentQIdx===allQuestions.length-1;
  if(ctr)ctr.textContent=`${currentQIdx+1} / ${allQuestions.length}`;
}

/* ══ INIT ══ */
async function init(){
  /* Read sessionStorage for current question */
  let savedId=null,savedType=null,savedQuestion=null;
  try{
    const saved=sessionStorage.getItem('currentQuestion');
    if(saved){
      const q=JSON.parse(saved);
      savedId=q.id||null;
      savedType=q.essayType||null;
      savedQuestion=q.mainQuestion||q.question||null;
      /* Show question in header immediately */
      if(savedQuestion)document.getElementById('topicLabel').textContent=savedQuestion.substring(0,40).toUpperCase();
    }
  }catch(e){}

  try{
    const r1=await fetch('data/ideas.json');
    ideasData=await r1.json();

    buildQuestionList();

    /* Find the question matching sessionStorage */
    let found=false;
    if(savedId){
      const idx=allQuestions.findIndex(q=>q.id===savedId);
      if(idx>=0){currentQIdx=idx;found=true;}
    }
    if(!found&&savedType){
      const typeNorm=savedType.toLowerCase().replace(/\s+/g,'-');
      const idx=allQuestions.findIndex(q=>{
        const t=(q.essayType||'').toLowerCase().replace(/\s+/g,'-');
        return t.includes(typeNorm)||typeNorm.includes(t);
      });
      if(idx>=0){currentQIdx=idx;found=true;}
    }

    loadQuestion(allQuestions[currentQIdx]);
    sndDrop();
  }catch(e){
    console.error(e);
    document.getElementById('contentArea').innerHTML=
      '<div class="no-data">⚠ Could not load plan data.<br>Check that ideas.json is deployed.</div>';
  }
}

/* ══ FOOTER NAV ══ */
function navTo(dest){
  if(dest==='plan')return;
  try{
    const saved=sessionStorage.getItem('currentQuestion');
    const q=saved?JSON.parse(saved):{};
    if(currentQuestion){q.id=currentQuestion.id;q.essayType=currentType;}
    sessionStorage.setItem('currentQuestion',JSON.stringify(q));
  }catch(e){}
  const map={question:'essay-question.html',model:'essay-cards.html',build:'essay-build.html',sample:'essay-sample.html'};
  if(map[dest])window.location.href=map[dest];
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')navigate(-1);
  if(e.key==='ArrowRight')navigate(1);
});

init();
</script>
