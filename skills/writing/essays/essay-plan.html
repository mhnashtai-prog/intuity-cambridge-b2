<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Plan — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;
  --ink:#111111;
  --white:#ffffff;
  --c-teal:#3d9e95;   --c-teal-lt:#e4f4f2;   --c-teal-mid:#8dccc7;
  --c-coral:#e8723a;   --c-coral-lt:#fdf0ea;   --c-coral-mid:#f5ad87;
  --c-purple:#7b5ea7;  --c-purple-lt:#f0ecf8;  --c-purple-mid:#b9a3d3;
  --c-rose:#c94f6d;    --c-rose-lt:#faedf1;    --c-rose-mid:#e89db0;
  --c-gold:#c08b2f;    --c-gold-lt:#fdf6e3;    --c-gold-mid:#e4c073;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}

.shell{position:fixed;inset:0;display:flex;flex-direction:column}

.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.topic-label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-align:right;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}

.topic-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.topic-tabs::-webkit-scrollbar{display:none}
.ttab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.ttab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ttab.active{background:var(--ink);color:#fff}

.stage{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}

.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ══ POSTER CARD ══ */
.poster{
  position:absolute;
  width:min(400px,88vw);
  height:min(500px,80vh);
  background:var(--white);
  border-radius:1.4rem;
  display:flex;
  flex-direction:column;
  overflow:visible;
  box-shadow:
    0 2px 0 rgba(255,255,255,0.8) inset,
    4px 6px 0 rgba(0,0,0,0.06),
    0 20px 50px rgba(0,0,0,0.18),
    0 4px 12px rgba(0,0,0,0.1);
  cursor:pointer;
  user-select:none;
  will-change:transform,opacity;
}

.flag{position:absolute;top:-2px;left:1.8rem;width:56px;z-index:10;display:flex;flex-direction:column;align-items:center}
.flag-body{width:100%;padding:0.5rem 0 0.35rem;display:flex;align-items:center;justify-content:center;position:relative}
.flag-num{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.02em}
.flag-body::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:9px;background:inherit;clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%)}

.section-label{position:absolute;top:1.1rem;right:1.4rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;opacity:0.35}

.card-body{flex:1;display:flex;flex-direction:column;padding:3.8rem 1.8rem 1.4rem;gap:0}

.card-heading{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:900;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.32);margin-bottom:0.7rem}

.phrase{font-family:'Instrument Sans',sans-serif;font-size:0.95rem;font-style:normal;font-weight:400;line-height:1.6;color:rgba(0,0,0,0.78);padding-bottom:0.9rem;margin-bottom:0.9rem;border-bottom:1.5px dashed rgba(0,0,0,0.1)}

.idea-stem{font-family:'Barlow Condensed',sans-serif;font-size:1.75rem;font-weight:800;line-height:1.1;letter-spacing:0.01em;color:var(--ink);margin-bottom:0.8rem;text-transform:uppercase}

.continuations{display:flex;flex-direction:column;gap:0.5rem;padding-left:1.1rem;border-left:3px solid;margin-left:0.2rem;flex:1}
.cont-item{display:flex;align-items:flex-start;gap:0.5rem;font-family:'Barlow',sans-serif;font-size:0.82rem;font-weight:600;line-height:1.4;color:rgba(0,0,0,0.55)}
.cont-arrow{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:0.05rem;opacity:0.55}

.card-foot{display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1.4rem 0.85rem;flex-shrink:0}
.card-nav-btn{background:none;border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;color:rgba(0,0,0,0.28);transition:all 0.2s;flex-shrink:0}
.card-nav-btn:hover{background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.55)}
.card-nav-btn:disabled{opacity:0.18;cursor:default}
.card-dots{display:flex;gap:0.45rem;align-items:center}
.cdot{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,0.15);transition:all 0.32s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer}
.cdot.active{transform:scale(1.5)}
.cdot.done{background:rgba(0,0,0,0.3)}

.accent-bar{height:5px;border-radius:0 0 1.4rem 1.4rem;flex-shrink:0}

/* COLOUR THEMES */
.p-teal .flag-body{background:var(--c-teal)} .p-teal .section-label{color:var(--c-teal)} .p-teal .idea-stem{color:var(--c-teal)} .p-teal .continuations{border-color:var(--c-teal-mid)} .p-teal .cont-arrow{color:var(--c-teal)} .p-teal .accent-bar{background:var(--c-teal)} .p-teal .cdot.active{background:var(--c-teal)}
.p-coral .flag-body{background:var(--c-coral)} .p-coral .section-label{color:var(--c-coral)} .p-coral .idea-stem{color:var(--c-coral)} .p-coral .continuations{border-color:var(--c-coral-mid)} .p-coral .cont-arrow{color:var(--c-coral)} .p-coral .accent-bar{background:var(--c-coral)} .p-coral .cdot.active{background:var(--c-coral)}
.p-purple .flag-body{background:var(--c-purple)} .p-purple .section-label{color:var(--c-purple)} .p-purple .idea-stem{color:var(--c-purple)} .p-purple .continuations{border-color:var(--c-purple-mid)} .p-purple .cont-arrow{color:var(--c-purple)} .p-purple .accent-bar{background:var(--c-purple)} .p-purple .cdot.active{background:var(--c-purple)}
.p-rose .flag-body{background:var(--c-rose)} .p-rose .section-label{color:var(--c-rose)} .p-rose .idea-stem{color:var(--c-rose)} .p-rose .continuations{border-color:var(--c-rose-mid)} .p-rose .cont-arrow{color:var(--c-rose)} .p-rose .accent-bar{background:var(--c-rose)} .p-rose .cdot.active{background:var(--c-rose)}
.p-gold .flag-body{background:var(--c-gold)} .p-gold .section-label{color:var(--c-gold)} .p-gold .idea-stem{color:var(--c-gold)} .p-gold .continuations{border-color:var(--c-gold-mid)} .p-gold .cont-arrow{color:var(--c-gold)} .p-gold .accent-bar{background:var(--c-gold)} .p-gold .cdot.active{background:var(--c-gold)}

/* STACK */
.poster[data-stack="0"]{z-index:40;transform:rotate(-1.5deg)}
.poster[data-stack="1"]{z-index:30;transform:rotate(1.8deg) translate(7px,14px)}
.poster[data-stack="2"]{z-index:20;transform:rotate(-1deg) translate(-5px,26px)}
.poster[data-stack="3"]{z-index:10;transform:rotate(2.2deg) translate(9px,36px)}

.poster.active-card{z-index:60;transform:rotate(0deg) translate(0,0) scale(1) !important;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s ease;box-shadow:5px 7px 0 rgba(0,0,0,0.08),0 22px 55px rgba(0,0,0,0.22),0 5px 14px rgba(0,0,0,0.1)}
.poster.enter{animation:cardEnter 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes cardEnter{0%{opacity:0;transform:scale(0.72) translateY(-110px) rotate(-6deg)}65%{opacity:1;transform:scale(1.03) translateY(8px) rotate(0.8deg)}100%{opacity:1;transform:rotate(0deg) translate(0,0) scale(1)}}
.poster.exit-left{animation:exitLeft 0.45s cubic-bezier(0.6,0,0.8,1) both}
@keyframes exitLeft{0%{transform:rotate(0deg) translate(0,0) scale(1);opacity:1}100%{transform:rotate(-10deg) translate(-130%,25px) scale(0.88);opacity:0}}
.poster.active-card.speaking{animation:cardBob 2.2s ease-in-out infinite}
@keyframes cardBob{0%,100%{transform:rotate(0deg) translateY(0) scale(1)}50%{transform:rotate(0.25deg) translateY(-6px) scale(1.004)}}

/* MODE TOGGLE */
.mode-toggle{position:absolute;top:0.85rem;left:50%;transform:translateX(-50%);z-index:80;display:flex;background:rgba(255,255,255,0.82);backdrop-filter:blur(10px);border-radius:2rem;padding:0.2rem;gap:0.15rem;box-shadow:0 2px 12px rgba(0,0,0,0.12),0 1px 3px rgba(0,0,0,0.07);border:1px solid rgba(255,255,255,0.9)}
.mode-opt{padding:0.28rem 1rem;border-radius:1.75rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:rgba(0,0,0,0.32);cursor:pointer;border:none;background:transparent;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);user-select:none;white-space:nowrap}
.mode-opt:hover:not(.active){color:rgba(0,0,0,0.55)}
.mode-opt.active{background:var(--ink);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.18)}

.stop-btn{display:none;position:absolute;bottom:5rem;left:50%;transform:translateX(-50%);z-index:90;background:var(--ink);color:#fff;border:none;border-radius:2rem;padding:0.55rem 1.4rem;font-family:'Barlow',sans-serif;font-size:0.7rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.22);transition:transform 0.2s,box-shadow 0.2s;white-space:nowrap;align-items:center;gap:0.4rem}
.stop-btn:hover{transform:translateX(-50%) scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.stage.listen-mode .stop-btn{display:flex;animation:replayFadeIn 0.4s ease both}
.replay-btn{display:none;position:absolute;bottom:5rem;left:50%;transform:translateX(-50%);z-index:90;background:var(--ink);color:#fff;border:none;border-radius:2rem;padding:0.55rem 1.4rem;font-family:'Barlow',sans-serif;font-size:0.7rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.22);transition:transform 0.2s,box-shadow 0.2s;white-space:nowrap}
.replay-btn:hover{transform:translateX(-50%) scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.replay-btn.visible{display:flex;align-items:center;gap:0.4rem;animation:replayFadeIn 0.5s ease both}
@keyframes replayFadeIn{0%{opacity:0;transform:translateX(-50%) translateY(10px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
.stage.listen-mode .card-foot{opacity:0;pointer-events:none}
.stage.listen-mode .poster{cursor:default}

.listen-bar{position:absolute;bottom:0;left:1.8rem;right:1.8rem;height:3px;border-radius:2px;background:currentColor;opacity:0;transition:opacity 0.3s;transform-origin:left}
.stage.listen-mode .poster.active-card .listen-bar{opacity:0.35;animation:listenPulse 1.8s ease-in-out infinite}
@keyframes listenPulse{0%,100%{opacity:0.2;transform:scaleX(0.6)}50%{opacity:0.5;transform:scaleX(1)}}

.swipe-hint{position:absolute;bottom:3.2rem;left:50%;transform:translateX(-50%);font-size:0.58rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.2);pointer-events:none;animation:hintFade 3s ease 1.5s forwards;white-space:nowrap}
@keyframes hintFade{0%{opacity:1}80%{opacity:1}100%{opacity:0}}

.loading-msg{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.25);letter-spacing:0.12em;text-transform:uppercase}

@media(max-width:480px){
  .poster{width:min(340px,94vw);height:min(440px,78vh)}
  .idea-stem{font-size:1.6rem}
  .phrase{font-size:0.8rem}
  .flag-num{font-size:1.6rem}
}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <a class="back-link" href="essay-question-selector.html">← Back</a>
    <span class="brand">INTUITY</span>
    <span class="topic-label" id="topicLabel">—</span>
  </div>

  <div class="topic-tabs" id="topicTabs"></div>

  <div class="stage" id="stage">
    <div class="loading-msg" id="loadingMsg">Loading…</div>
    <div class="mode-toggle" id="modeToggle">
      <button class="mode-opt active" id="optExplore" onclick="setMode('explore')">Explore</button>
      <button class="mode-opt" id="optListen" onclick="setMode('listen')">Listen</button>
    </div>
    <button class="replay-btn" id="replayBtn" onclick="replayListen()">↺ Listen again</button>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb" onclick="navTo('question')">Question</button>
      <button class="nb on" onclick="navTo('plan')">Plan</button>
      <button class="nb" onclick="navTo('model')">Model</button>
      <button class="nb" onclick="navTo('build')">Build</button>
      <button class="nb" onclick="navTo('sample')">Sample</button>
    </div>
  </div>

</div>

<script>
// ── SOUND ENGINE ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function ac(){ if(!actx) actx = new AudioCtx(); return actx; }
function tone(freq,type,dur,vol,delay=0){
  try{const ctx=ac(),osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;const t=ctx.currentTime+delay;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);osc.start(t);osc.stop(t+dur+0.05);}catch(e){}
}
function sndDrop(){ tone(360,'sine',0.18,0.12); tone(500,'sine',0.12,0.07,0.08); }
function sndTap(){  tone(640,'triangle',0.06,0.1); tone(860,'triangle',0.04,0.07,0.04); }
function sndDone(){ [523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.22,0.09,i*0.07)); }

// ── DATA & CONFIG ──
const COLORS = ['p-teal','p-coral','p-purple','p-rose','p-gold'];
let planData = null;
let currentType = null;
let cards = [];
let current = 0;
let isPlaying = false;
let touchStartX = 0;
let playMode = 'explore';
let listenTimer = null;

// ── SPEECH ──
const synth = window.speechSynthesis;
let narrator = null;
async function initVoices(){
  await new Promise(res=>{
    let v=synth.getVoices();
    if(v.length){pick(v);res();return;}
    synth.onvoiceschanged=()=>{pick(synth.getVoices());res();}
  });
  function pick(v){
    const en=v.filter(x=>x.lang.startsWith('en'));
    const pool=en.length?en:v;
    narrator=pool.find(x=>x.name==='Google UK English Male')
      ||pool.find(x=>x.name==='Daniel')
      ||pool.find(x=>x.lang==='en-GB')
      ||pool[0]||null;
  }
}
let currentUtt=null;
function stopSpeech(){ synth.cancel(); currentUtt=null; }
function speak(text){
  return new Promise(res=>{
    stopSpeech();
    const utt=new SpeechSynthesisUtterance(text);
    utt.voice=narrator; utt.rate=0.88; utt.pitch=1.05; utt.volume=1;
    utt.onend=()=>res(); utt.onerror=()=>res();
    currentUtt=utt; synth.speak(utt);
  });
}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

// ── BUILD CARD ──
function buildCard(sec, idx, color){
  const el = document.createElement('div');
  el.className = `poster ${color}`;
  el.dataset.idx = idx;

  const flag = document.createElement('div'); flag.className='flag';
  const flagBody = document.createElement('div'); flagBody.className='flag-body';
  const flagNum = document.createElement('span'); flagNum.className='flag-num';
  flagNum.textContent = String(sec.num||idx+1).padStart(2,'0');
  flagBody.appendChild(flagNum); flag.appendChild(flagBody); el.appendChild(flag);

  const body = document.createElement('div'); body.className='card-body';

  const heading = document.createElement('div'); heading.className='card-heading';
  heading.textContent = sec.title||sec.label||'';
  body.appendChild(heading);

  const phrase = document.createElement('div'); phrase.className='phrase';
  phrase.textContent = sec.phrase||sec.opener||'';
  body.appendChild(phrase);

  const stem = document.createElement('div'); stem.className='idea-stem';
  stem.textContent = sec.idea||sec.stem||'';
  body.appendChild(stem);

  const bullets = sec.bullets||sec.points||[];
  if(bullets.length){
    const conts = document.createElement('div'); conts.className='continuations';
    bullets.forEach(b=>{
      const item = document.createElement('div'); item.className='cont-item';
      const arrow = document.createElement('span'); arrow.className='cont-arrow';
      arrow.innerHTML='<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 2L7.5 5.5L3.5 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      const txt = document.createElement('span'); txt.textContent = b;
      item.appendChild(arrow); item.appendChild(txt); conts.appendChild(item);
    });
    body.appendChild(conts);
  }
  el.appendChild(body);

  const foot = document.createElement('div'); foot.className='card-foot';
  const prevBtn = document.createElement('button'); prevBtn.className='card-nav-btn'; prevBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7L9 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  prevBtn.onclick=(e)=>{ e.stopPropagation(); if(current>0) jumpTo(current-1); };
  const dotsRow = document.createElement('div'); dotsRow.className='card-dots';
  const nextBtn = document.createElement('button'); nextBtn.className='card-nav-btn'; nextBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3L9 7L5 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  nextBtn.onclick=(e)=>{ e.stopPropagation(); advance(); };
  foot.appendChild(prevBtn); foot.appendChild(dotsRow); foot.appendChild(nextBtn);
  el.appendChild(foot);

  const bar = document.createElement('div'); bar.className='accent-bar'; el.appendChild(bar);
  el.onclick = ()=>{ if(current===idx) advance(); };
  return el;
}

// ── RENDER ──
function render(){
  const stage = document.getElementById('stage');
  stage.innerHTML='';

  const tog = document.createElement('div'); tog.className='mode-toggle'; tog.id='modeToggle';
  tog.innerHTML=`<button class="mode-opt ${playMode==='explore'?'active':''}" id="optExplore" onclick="setMode('explore')">Explore</button>
    <button class="mode-opt ${playMode==='listen'?'active':''}" id="optListen" onclick="setMode('listen')">Listen</button>`;
  stage.appendChild(tog);

  const hint=document.createElement('div'); hint.className='swipe-hint'; hint.textContent='tap to advance'; stage.appendChild(hint);

  const topic = planData[currentType];
  document.getElementById('topicLabel').textContent = topic.label || currentType;

  const sections = topic.sections || topic.ideas || [];
  cards=[]; current=0;

  sections.forEach((sec,i)=>{
    const el = buildCard(sec, i, COLORS[i % COLORS.length]);
    stage.appendChild(el);
    cards.push({el, section:sec});
  });

  const total = sections.length;
  cards.forEach(({el:ce})=>{
    const dotsRow = ce.querySelector('.card-dots');
    if(!dotsRow) return;
    dotsRow.innerHTML='';
    for(let i=0;i<total;i++){
      const d = document.createElement('div');
      d.className='cdot'+(i===0?' active':'');
      d.dataset.dotIdx = i;
      d.onclick=(e)=>{ e.stopPropagation(); jumpTo(parseInt(e.currentTarget.dataset.dotIdx)); };
      dotsRow.appendChild(d);
    }
  });

  setTimeout(()=>activateCard(0, true), 200);

  const rb = document.createElement('button'); rb.className='replay-btn'; rb.id='replayBtn';
  rb.onclick=replayListen; rb.innerHTML='↺ Listen again'; stage.appendChild(rb);

  const sb = document.createElement('button'); sb.className='stop-btn'; sb.id='stopBtn';
  sb.onclick=()=>setMode('explore'); sb.innerHTML='■ Stop'; stage.appendChild(sb);
}

// ── ACTIVATE CARD ──
async function activateCard(idx, firstTime=false){
  if(isPlaying) return;
  isPlaying=true;

  cards.forEach(({el:ce},i)=>{
    if(i < idx){
      ce.style.display='none';
    } else {
      const rel = i - idx;
      const transforms = [
        'rotate(0deg) translate(0,0) scale(1)',
        'rotate(2deg) translate(6px,12px) scale(0.97)',
        'rotate(-1.5deg) translate(-4px,22px) scale(0.94)',
        'rotate(2.5deg) translate(8px,30px) scale(0.91)',
      ];
      ce.style.transition='transform 0.42s cubic-bezier(0.34,1.56,0.64,1)';
      ce.style.transform=transforms[Math.min(rel,3)];
      ce.style.zIndex=60-rel*10;
      ce.style.display='flex';
      ce.style.flexDirection='column';
    }
  });

  await wait(firstTime ? 50 : 20);
  sndDrop();

  const {el, section} = cards[idx];
  el.classList.add('active-card');
  if(firstTime) el.classList.add('enter');
  await wait(firstTime ? 340 : 140);
  el.classList.remove('enter');
  updateDots();

  el.classList.add('speaking');
  if(playMode==='listen'){
    const speech = `${section.phrase||section.opener||''}. ${section.idea||section.stem||''}. ${(section.bullets||section.points||[]).join('. ')}`;
    await speak(speech);
  }
  el.classList.remove('speaking');
  isPlaying=false;

  if(playMode==='listen'){
    if(idx < cards.length-1){
      listenTimer=setTimeout(()=>{ if(playMode==='listen') advance(); }, 1400);
    } else {
      sndDone();
      const replayBtn = document.getElementById('replayBtn');
      if(replayBtn) replayBtn.classList.add('visible');
      const stopBtn = document.getElementById('stopBtn');
      if(stopBtn) stopBtn.style.display='none';
    }
  }
}

// ── ADVANCE ──
async function advance(){
  if(isPlaying) return;
  if(current >= cards.length-1) return;
  if(listenTimer){clearTimeout(listenTimer);listenTimer=null;}
  sndTap(); stopSpeech();
  const prev = cards[current];
  prev.el.classList.remove('active-card','speaking');
  prev.el.classList.add('exit-left');
  setTimeout(()=>{prev.el.style.display='none';prev.el.classList.remove('exit-left');},450);
  current++;
  await wait(110);
  activateCard(current, false);
}

// ── DOTS ──
function updateDots(){
  const activeCard = cards[current]?.el;
  if(!activeCard) return;
  const dots = activeCard.querySelectorAll('.cdot');
  dots.forEach((d,i)=>{
    d.className = 'cdot' + (i===current?' active':'') + (i<current?' done':'');
  });
  const btns = activeCard.querySelectorAll('.card-nav-btn');
  if(btns[0]) btns[0].disabled = (current===0);
  if(btns[1]) btns[1].disabled = (current===cards.length-1);
}
async function jumpTo(idx){
  if(isPlaying||idx===current) return;
  stopSpeech();
  cards.forEach(({el:ce})=>{ce.classList.remove('active-card','speaking');ce.style.display='none';});
  current=idx;
  activateCard(idx,true);
}

// ── TABS ──
function buildTabs(){
  const c=document.getElementById('topicTabs');
  const keys=Object.keys(planData);
  c.innerHTML=keys.map(k=>`
    <button class="ttab ${k===currentType?'active':''}" onclick="switchType('${k}')">
      ${planData[k].label}
    </button>`).join('');
}
function switchType(type){
  if(type===currentType) return;
  if(listenTimer){clearTimeout(listenTimer);listenTimer=null;}
  stopSpeech(); isPlaying=false;
  currentType=type;
  buildTabs(); render();
}

// ── REPLAY ──
function replayListen(){
  const replayBtn = document.getElementById('replayBtn');
  if(replayBtn) replayBtn.classList.remove('visible');
  const stopBtn = document.getElementById('stopBtn');
  if(stopBtn) stopBtn.style.display='';
  if(listenTimer){clearTimeout(listenTimer);listenTimer=null;}
  stopSpeech(); isPlaying=false;
  cards.forEach(({el:ce})=>{ce.classList.remove('active-card','speaking');ce.style.display='none';});
  current=0;
  activateCard(0, true);
}

// ── MODE ──
function setMode(mode){
  playMode = mode;
  const stage = document.getElementById('stage');
  const replayBtn = document.getElementById('replayBtn');
  if(replayBtn) replayBtn.classList.remove('visible');
  document.getElementById('optExplore').classList.toggle('active', mode==='explore');
  document.getElementById('optListen').classList.toggle('active', mode==='listen');
  if(mode==='listen'){
    stage.classList.add('listen-mode');
    if(listenTimer){clearTimeout(listenTimer);listenTimer=null;}
    stopSpeech(); isPlaying=false;
    cards.forEach(({el:ce})=>{ce.classList.remove('active-card','speaking');ce.style.display='none';});
    current=0;
    setTimeout(()=>activateCard(0, true), 50);
  } else {
    stage.classList.remove('listen-mode');
    if(listenTimer){clearTimeout(listenTimer);listenTimer=null;}
    stopSpeech(); isPlaying=false;
    updateDots();
  }
}

// ── SWIPE & KEYBOARD ──
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>55) advance();
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ') advance();
  if(e.key==='ArrowLeft'&&current>0) jumpTo(current-1);
});

// ── FOOTER NAV ──
function navTo(dest){
  if(dest==='plan') return;
  stopSpeech();
  try{
    const saved = sessionStorage.getItem('currentQuestion');
    const q = saved ? JSON.parse(saved) : {};
    q.id = currentType;
    sessionStorage.setItem('currentQuestion', JSON.stringify(q));
  } catch(e){}
  const map={
    question:'essay-question-selector.html',
    model:'essay-builder.html',
    build:'essay-builder-interactive.html',
    sample:'essay-master.html'
  };
  if(map[dest]) window.location.href=map[dest];
}

// ── INIT ──
async function init(){
  await initVoices();
  try{
    const r=await fetch('data/ideas.json');
    planData=await r.json();
    document.getElementById('loadingMsg').remove();

    // Sync with question selector
    try{
      const saved = sessionStorage.getItem('currentQuestion');
      if(saved){
        const q = JSON.parse(saved);
        if(q.id && planData[q.id]) currentType = q.id;
      }
    } catch(e){}

    if(!currentType) currentType = Object.keys(planData)[0];
    buildTabs();
    render();
  }catch(e){
    document.getElementById('loadingMsg').textContent='⚠ Could not load data';
  }
}
init();
</script>
