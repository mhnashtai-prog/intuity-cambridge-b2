<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Plan — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--white:#FAFAF8;--ink:#0d0d0d;--rule:rgba(0,0,0,0.07);
  --teal:#3d9e95;--teal-d:#2e7870;--teal-mid:#8dccc7;
  --coral:#e8723a;--coral-d:#c05520;--coral-mid:#f5ad87;
  --purple:#7b5ea7;--purple-d:#5e4582;--purple-mid:#b9a3d3;
  --rose:#c94f6d;--rose-d:#a33455;--rose-mid:#e89db0;
  --gold:#c08b2f;--gold-d:#9a6c1e;--gold-mid:#e4c073;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:10;position:relative}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.menu-btn{background:var(--ink);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.menu-btn:hover{background:rgba(0,0,0,0.8)}
.menu-dots{display:flex;gap:3px}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:#fff}
.menu-dropdown{position:absolute;top:calc(100% + 0.5rem);right:1rem;background:#fff;border-radius:0.75rem;box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.12);min-width:170px;padding:0.5rem;z-index:200;display:none}
.menu-dropdown.open{display:block;animation:menuIn 0.2s ease-out}
@keyframes menuIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.menu-item{padding:0.65rem 0.85rem;border-radius:0.5rem;font-size:0.78rem;font-weight:600;color:rgba(0,0,0,0.7);cursor:pointer;transition:all 0.15s;font-family:'Barlow',sans-serif}
.menu-item:hover{background:rgba(0,0,0,0.04)}

/* QUESTION STRIP */
.q-strip{flex-shrink:0;padding:0.5rem 1.25rem;border-bottom:1px solid var(--rule);background:rgba(201,169,97,0.04);display:none}
.q-text{font-family:'Instrument Sans',sans-serif;font-size:0.72rem;line-height:1.4;color:rgba(13,13,13,0.6);font-style:italic}

/* TOGGLE ROW */
.toggle-row{flex-shrink:0;padding:0.55rem 1.25rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;gap:0.75rem;background:rgba(240,239,236,0.8)}
.view-switch{display:flex;background:rgba(0,0,0,0.06);border-radius:2rem;padding:0.22rem;gap:0.18rem}
.switch-option{padding:0.3rem 1rem;border-radius:1.75rem;font-size:0.6rem;font-weight:800;color:rgba(0,0,0,0.38);cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);white-space:nowrap;user-select:none;font-family:'Barlow',sans-serif;letter-spacing:0.05em;text-transform:uppercase;border:none;background:transparent}
.switch-option:hover:not(.active){color:rgba(0,0,0,0.58)}
.switch-option.active{background:var(--ink);color:#fff;box-shadow:0 3px 12px rgba(0,0,0,0.2)}

.listen-all-btn{display:inline-flex;align-items:center;gap:0.35rem;padding:0.35rem 0.9rem;border-radius:2rem;background:var(--ink);color:#fff;border:none;font-family:'Barlow',sans-serif;font-size:0.62rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;box-shadow:0 3px 10px rgba(0,0,0,0.22);white-space:nowrap;user-select:none}
.listen-all-btn:hover{background:#1a1a1a;box-shadow:0 5px 16px rgba(0,0,0,0.3)}
.listen-all-btn:active{transform:scale(0.96)}
.listen-all-btn.playing{background:#c0392b}

.sound-toggle-btn{flex-shrink:0;background:transparent;border:1.5px solid rgba(0,0,0,0.12);border-radius:2rem;padding:0.3rem 0.65rem;font-size:1rem;cursor:pointer;transition:all 0.2s;line-height:1}
.sound-toggle-btn:hover{background:rgba(0,0,0,0.05)}
.sound-toggle-btn.muted{opacity:0.4}

/* PROGRESS BAR */
.progress-strip{flex-shrink:0;padding:0.45rem 1.25rem 0.5rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:0.9rem}
.progress-strip.hidden{display:none}
.bar-track{flex:1;height:3px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--coral),var(--purple));border-radius:3px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
.progress-label{font-size:0.6rem;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;color:rgba(0,0,0,0.28);white-space:nowrap;transition:color 0.3s;font-family:'Barlow Condensed',sans-serif}
.progress-label.done{color:var(--teal-d)}

/* PLAN CANVAS */
.plan-canvas{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2.5rem 1.75rem 2rem;display:flex;flex-direction:column;align-items:center;gap:3.5rem;background:#d8d6d2}
.plan-canvas::-webkit-scrollbar{width:4px}
.plan-canvas::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18);border-radius:2px}

/* FOOTER NAV */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* CELEBRATION */
.celebration{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.celebration.show{animation:celebPop 2.8s ease forwards}
@keyframes celebPop{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.celeb-pill{background:var(--ink);color:#fff;padding:1rem 2.25rem;border-radius:3rem;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;box-shadow:0 12px 48px rgba(0,0,0,0.45);animation:celebScale 0.45s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes celebScale{from{transform:scale(0.7)}to{transform:scale(1)}}

/* ════════════════════════════
   TORN PAPER CARDS
════════════════════════════ */
.para-plan{position:relative;width:100%;max-width:780px;padding-top:45px;opacity:0;transform:translateY(10px);animation:fadeIn 0.4s ease forwards}
.para-plan:nth-child(1){animation-delay:0.05s}
.para-plan:nth-child(2){animation-delay:0.13s}
.para-plan:nth-child(3){animation-delay:0.21s}
.para-plan:nth-child(4){animation-delay:0.29s}
.para-plan:nth-child(5){animation-delay:0.37s}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}

.para-plan.speaking .para-card{filter:drop-shadow(0 0 18px rgba(61,158,149,0.5)) drop-shadow(0 10px 28px rgba(0,0,0,0.24))}

/* PIN */
.para-pin{position:absolute;top:68px;left:50%;transform:translateX(-50%);width:18px;height:32px;z-index:20;pointer-events:none}
.para-pin::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#999,#555);box-shadow:0 3px 7px rgba(0,0,0,0.45)}
.para-pin::after{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:3px;height:18px;background:linear-gradient(to bottom,#777,#bbb);border-radius:0 0 2px 2px}

/* NUMBER TAG */
.para-tag{position:absolute;top:18px;left:20px;width:130px;height:130px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:52px;letter-spacing:-1px;box-shadow:0 8px 24px rgba(0,0,0,0.32);z-index:20}
.para-tag.tag-teal{background:linear-gradient(135deg,var(--teal),var(--teal-d));transform:rotate(-7deg)}
.para-tag.tag-coral{background:linear-gradient(135deg,var(--coral),var(--coral-d));transform:rotate(6deg)}
.para-tag.tag-purple{background:linear-gradient(135deg,var(--purple),var(--purple-d));transform:rotate(-8deg)}
.para-tag.tag-rose{background:linear-gradient(135deg,var(--rose),var(--rose-d));transform:rotate(5deg)}
.para-tag.tag-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));transform:rotate(-6deg)}

/* TORN PAPER */
.para-card{position:relative;width:100%;min-height:360px;padding:1.25rem 2rem 2.5rem;display:flex;flex-direction:column;justify-content:space-between;background-color:#f4f2ee;background-image:repeating-linear-gradient(90deg,rgba(0,0,0,0.012) 0px,rgba(0,0,0,0.012) 1px,transparent 1px,transparent 5px),repeating-linear-gradient(0deg,rgba(0,0,0,0.008) 0px,rgba(0,0,0,0.008) 1px,transparent 1px,transparent 5px);filter:drop-shadow(0 10px 28px rgba(0,0,0,0.24)) drop-shadow(0 2px 6px rgba(0,0,0,0.14));transition:filter 0.3s ease;clip-path:polygon(0% 2.5%,1.2% 1%,2.5% 3%,4% 1%,5.5% 3%,7% 1.5%,8.5% 3.5%,10% 1%,12% 3%,14% 1%,16% 2.5%,18% 0.8%,20% 2.8%,22% 1%,24% 3%,26% 1%,28% 2.5%,30% 0.8%,32% 2.8%,34% 1%,36% 3%,38% 1%,40% 2.5%,42% 0.8%,44% 2.8%,46% 1%,48% 2.5%,50% 0.5%,52% 2.5%,54% 1%,56% 2.8%,58% 0.8%,60% 2.5%,62% 1%,64% 3%,66% 1%,68% 2.8%,70% 0.8%,72% 2.5%,74% 1%,76% 3%,78% 1%,80% 2.5%,82% 1%,84% 3%,86% 1.5%,88% 3.5%,90% 1%,92% 3%,94% 1%,96% 3%,98% 1%,100% 2.5%,100% 97.5%,98.5% 99%,97% 97%,95% 99%,93% 97%,91% 99%,89% 97.5%,87% 99.5%,85% 97%,83% 99%,81% 97.5%,79% 99.5%,77% 97%,75% 99%,73% 97.5%,71% 99.5%,69% 97%,67% 99%,65% 97.5%,63% 99.5%,61% 97%,59% 99%,57% 97.5%,55% 99.5%,53% 97%,51% 99.5%,49% 97%,47% 99.5%,45% 97%,43% 99%,41% 97.5%,39% 99.5%,37% 97%,35% 99%,33% 97.5%,31% 99.5%,29% 97%,27% 99%,25% 97.5%,23% 99.5%,21% 97%,19% 99%,17% 97.5%,15% 99.5%,13% 97%,11% 99%,9% 97.5%,7% 99.5%,5% 97%,3% 99%,1.5% 97.5%,0% 99%)}
.para-card:hover{filter:drop-shadow(0 18px 44px rgba(0,0,0,0.28)) drop-shadow(0 4px 10px rgba(0,0,0,0.16))}

.type-teal .para-card{background-color:#eaf5f4}
.type-coral .para-card{background-color:#fdf4e8}
.type-purple .para-card{background-color:#f0ecf7}
.type-rose .para-card{background-color:#faedf1}
.type-gold .para-card{background-color:#fdf6e3}

/* CARD HEADER */
.para-card-header{display:flex;align-items:center;justify-content:space-between;padding-top:5rem;padding-bottom:0.65rem;margin-bottom:0.85rem;border-bottom:1px solid rgba(0,0,0,0.07)}
.para-card-title{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;text-align:center;flex:1}
.type-teal .para-card-title{color:var(--teal-d)}
.type-coral .para-card-title{color:var(--coral-d)}
.type-purple .para-card-title{color:var(--purple-d)}
.type-rose .para-card-title{color:var(--rose-d)}
.type-gold .para-card-title{color:var(--gold-d)}

/* CARD LISTEN BTN */
.card-listen-btn{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;transition:all 0.2s;font-size:0.75rem;user-select:none;background:rgba(0,0,0,0.07);color:rgba(0,0,0,0.45)}
.card-listen-btn:hover{background:rgba(0,0,0,0.13);transform:scale(1.1)}
.card-listen-btn.playing{background:var(--ink);color:#fff;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(61,158,149,0.5)}50%{box-shadow:0 0 0 6px rgba(61,158,149,0)}}

/* DIALOGUE BUBBLE */
.dialogue-bubble{display:none;border-left:3px solid rgba(0,0,0,0.12);border-radius:0 0.5rem 0.5rem 0;padding:0.55rem 0.85rem;margin-bottom:0.65rem;font-family:'Instrument Sans',sans-serif;font-size:0.76rem;line-height:1.6;color:rgba(0,0,0,0.6);font-style:italic;background:rgba(0,0,0,0.03);animation:fadeIn 0.3s ease}
.dialogue-bubble.show{display:block}
.type-teal .dialogue-bubble{border-left-color:var(--teal)}
.type-coral .dialogue-bubble{border-left-color:var(--coral)}
.type-purple .dialogue-bubble{border-left-color:var(--purple)}
.type-rose .dialogue-bubble{border-left-color:var(--rose)}
.type-gold .dialogue-bubble{border-left-color:var(--gold)}

/* MAIN ARG + SUPPORT */
.main-arg{font-family:'Instrument Sans',sans-serif;font-size:0.82rem;line-height:1.6;color:var(--ink);font-weight:600;margin-bottom:0.65rem;text-align:center}
.support-list{list-style:none;display:flex;flex-direction:column;gap:0.55rem;margin-top:0.25rem}
.support-item{display:flex;align-items:center;gap:0.65rem;font-family:'Barlow',sans-serif;font-size:0.88rem;line-height:1.6;color:rgba(13,13,13,0.75)}

/* REVEAL PILLS */
.reveal-btn{flex-shrink:0;display:inline-flex;align-items:center;gap:0.3rem;padding:0.28rem 0.7rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:#fff;cursor:pointer;border:none;white-space:nowrap;transition:transform 0.15s ease,box-shadow 0.15s ease;box-shadow:0 3px 10px rgba(0,0,0,0.20);user-select:none}
.reveal-btn::before{content:'▶';font-size:0.45rem;opacity:0.85}
.reveal-btn:hover{transform:scale(1.06);box-shadow:0 5px 14px rgba(0,0,0,0.25)}
.reveal-btn:active{transform:scale(0.95)}
.type-teal .reveal-btn{background:linear-gradient(135deg,var(--teal),var(--teal-d))}
.type-coral .reveal-btn{background:linear-gradient(135deg,var(--coral),var(--coral-d))}
.type-purple .reveal-btn{background:linear-gradient(135deg,var(--purple),var(--purple-d))}
.type-rose .reveal-btn{background:linear-gradient(135deg,var(--rose),var(--rose-d))}
.type-gold .reveal-btn{background:linear-gradient(135deg,var(--gold),var(--gold-d))}

.reveal-btn.done{width:14px;height:14px;padding:0;border-radius:50%;overflow:hidden;font-size:0;box-shadow:0 2px 6px rgba(0,0,0,0.18);cursor:default;transform:scale(1);flex-shrink:0}
.reveal-btn.done::before{display:none}

.support-text{display:none;font-size:0.88rem;font-weight:400;line-height:1.6}
.support-text.show{display:inline-block;animation:textSettle 0.25s ease both}
@keyframes textSettle{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* FLOATING BANNER */
.fly-banner{position:fixed;z-index:800;pointer-events:none;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:0.6rem;padding:2rem 2.2rem;border-radius:1.6rem;background:#fff;border-left:12px solid var(--teal);box-shadow:0 40px 100px rgba(0,0,0,0.30),0 10px 30px rgba(0,0,0,0.18),0 2px 8px rgba(0,0,0,0.10);font-family:'Instrument Sans',sans-serif;font-size:1.75rem;font-weight:700;line-height:1.45;color:var(--ink);text-align:left;width:min(360px,88vw);height:min(360px,88vw);overflow:hidden;position:relative}
.fly-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;border-radius:1.4rem 1.4rem 0 0;background:var(--teal)}
.fly-banner::after{content:attr(data-label);display:block;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:900;text-transform:uppercase;letter-spacing:0.14em;color:var(--teal);margin-bottom:0.15rem}

.fly-banner.type-teal{border-left-color:var(--teal)}.fly-banner.type-teal::before{background:var(--teal)}.fly-banner.type-teal::after{color:var(--teal)}
.fly-banner.type-coral{border-left-color:var(--coral)}.fly-banner.type-coral::before{background:var(--coral)}.fly-banner.type-coral::after{color:var(--coral)}
.fly-banner.type-purple{border-left-color:var(--purple)}.fly-banner.type-purple::before{background:var(--purple)}.fly-banner.type-purple::after{color:var(--purple)}
.fly-banner.type-rose{border-left-color:var(--rose)}.fly-banner.type-rose::before{background:var(--rose)}.fly-banner.type-rose::after{color:var(--rose)}
.fly-banner.type-gold{border-left-color:var(--gold)}.fly-banner.type-gold::before{background:var(--gold)}.fly-banner.type-gold::after{color:var(--gold)}

.fly-banner.phase-float{animation:bannerFloat 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes bannerFloat{0%{opacity:0;transform:scale(0.6) translateY(-60px)}65%{opacity:1;transform:scale(1.04) translateY(6px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.fly-banner.phase-hover{animation:bannerBob 1.8s ease-in-out infinite}
@keyframes bannerBob{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1) translateY(-7px)}}
.fly-banner.phase-dive{animation:bannerDive 0.52s cubic-bezier(0.6,0,0.8,1) both}
@keyframes bannerDive{0%{opacity:1;transform:scale(1) translateY(0) translateX(0)}55%{opacity:1;transform:scale(0.72) translateY(var(--dive-y)) translateX(var(--dive-x))}85%{opacity:0.5;transform:scale(0.28) translateY(calc(var(--dive-y) * 1.08)) translateX(var(--dive-x))}100%{opacity:0.3;transform:scale(0.18) translateY(calc(var(--dive-y) * 1.1)) translateX(var(--dive-x))}}
.fly-banner.phase-fadeout{animation:bannerFadeOut 0.5s ease both}
@keyframes bannerFadeOut{from{opacity:0.3}to{opacity:0}}

/* STATE MSG */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.75rem;font-size:0.8rem;color:rgba(0,0,0,0.3);text-align:center;line-height:1.6;padding:2rem;font-family:'Barlow',sans-serif}

@media(max-width:768px){
  .plan-canvas{padding:1.75rem 0.75rem 1.5rem;gap:2.25rem}
  .para-plan{max-width:100%;padding-top:35px}
  .para-card{padding:1.25rem 1.1rem 2rem;min-height:300px}
  .para-card-header{padding-top:4rem}
  .para-tag{width:100px;height:100px;font-size:40px;top:8px;left:14px}
  .nb{padding:0.3rem 0.6rem;font-size:0.55rem;min-height:28px}
}
@media(min-width:1024px){
  .plan-canvas{padding:3rem 3rem 2rem;gap:3.5rem}
  .para-plan{max-width:900px}
  .para-card{padding:1.75rem 2.25rem 2.75rem;min-height:400px}
}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <a class="back-link" href="essay-question-selector.html">← Back</a>
    <span class="brand">INTUITY</span>
    <div style="flex:1"></div>
    <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
      <div class="menu-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="menu-dropdown" id="menuDropdown">
      <div class="menu-item" onclick="revealAll()">Reveal all</div>
      <div class="menu-item" onclick="resetPlan()">Reset</div>
    </div>
  </div>

  <div class="q-strip" id="qStrip"><div class="q-text" id="qText"></div></div>

  <div class="toggle-row">
    <div class="view-switch">
      <button class="switch-option active" id="switchExplore" onclick="setViewMode('explore')">Explore</button>
      <button class="switch-option" id="switchFull" onclick="setViewMode('full')">Full Plan</button>
    </div>
    <button class="listen-all-btn" id="listenAllBtn" onclick="toggleFullAudio()"><span>▶</span> Listen</button>
    <button class="sound-toggle-btn" id="soundToggleBtn" onclick="toggleSound()">🔊</button>
  </div>

  <div class="progress-strip" id="progressStrip">
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="progress-label" id="progressLabel">tap to reveal</div>
  </div>

  <div class="plan-canvas" id="planCanvas"><div class="state-msg">Loading plan…</div></div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Question</button>
      <button class="nb on" onclick="navTo('plan')">Plan</button>
      <button class="nb"    onclick="navTo('model')">Model</button>
      <button class="nb"    onclick="navTo('build')">Build</button>
      <button class="nb"    onclick="navTo('sample')">Sample</button>
    </div>
  </div>

</div>

<div class="celebration" id="celebration"><div class="celeb-pill">Plan complete ✦</div></div>

<script>
// ══ COLOUR MAP FOR PARAGRAPH TYPES ══
const PARA_COLORS = ['type-teal','type-coral','type-purple','type-rose','type-gold'];
const TAG_COLORS  = ['tag-teal','tag-coral','tag-purple','tag-rose','tag-gold'];
const TYPE_COLORS = ['teal','coral','purple','rose','gold'];

// ══ STATE ══
let question=null,viewMode='explore',currentEssay=null,totalHidden=0,revealCount=0;
let audioPlaying=false,audioQueue=[],currentUtterance=null,audioCardIndex=-1;
let soundEnabled=true,silentTimer=null;

// ══ SOUND TOGGLE ══
function toggleSound(){
  soundEnabled=!soundEnabled;
  const btn=document.getElementById('soundToggleBtn');
  btn.textContent=soundEnabled?'🔊':'🔇';
  btn.classList.toggle('muted',!soundEnabled);
  if(!soundEnabled&&audioPlaying)synth.cancel();
}

// ══ SPEECH ══
const synth=window.speechSynthesis;
let narrator=null;
async function initVoices(){
  await new Promise(res=>{
    let v=synth.getVoices();
    if(v.length){pick(v);res();return;}
    synth.onvoiceschanged=()=>{pick(synth.getVoices());res();}
  });
  function pick(v){
    const en=v.filter(x=>x.lang.startsWith('en'));
    const pool=en.length?en:v;
    narrator=pool.find(x=>x.name==='Google UK English Male')||pool.find(x=>x.name==='Daniel')||pool.find(x=>x.lang==='en-GB')||pool[0]||null;
  }
}
function speak(text,onEnd){
  if(!synth){onEnd&&onEnd();return;}
  if(!soundEnabled){if(silentTimer)clearTimeout(silentTimer);silentTimer=setTimeout(()=>{onEnd&&onEnd();},6200);return;}
  synth.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.voice=narrator;utt.rate=0.88;utt.pitch=1.05;utt.volume=1;
  utt.onend=()=>{onEnd&&onEnd()};utt.onerror=()=>{onEnd&&onEnd()};
  currentUtterance=utt;synth.speak(utt);
}
function stopAudio(){
  synth.cancel();
  if(silentTimer){clearTimeout(silentTimer);silentTimer=null;}
  audioPlaying=false;audioQueue=[];currentUtterance=null;
  document.querySelectorAll('.para-plan.speaking').forEach(c=>c.classList.remove('speaking'));
  document.querySelectorAll('.card-listen-btn.playing').forEach(b=>{b.classList.remove('playing');b.innerHTML='▶';});
  document.querySelectorAll('.dialogue-bubble').forEach(b=>b.classList.remove('show'));
  const allBtn=document.getElementById('listenAllBtn');
  allBtn.classList.remove('playing');allBtn.innerHTML='<span>▶</span> Listen';
  audioCardIndex=-1;
}

// ══ LECTURE BUILDER ══
function buildLecture(para,essayQuestion,paraIndex){
  const title=para.title||`paragraph ${paraIndex+1}`;
  const notes=para.notes||[];
  const main=notes[0]?notes[0].text:'';
  const subs=notes.slice(1).map(n=>n.text).filter(Boolean);
  const t=title.toLowerCase();
  const sentences=[];
  if(t.includes('intro')||t.includes('opening')){
    const q=essayQuestion?`"${essayQuestion}"`:'this topic';
    sentences.push({text:`Let's begin with the introduction. The question is ${q}.`,caption:`Introduction — setting up the argument.`});
  }else if(t.includes('conclu')||t.includes('closing')){
    sentences.push({text:`Now for the conclusion — this is where we bring everything together.`,caption:`Conclusion — drawing the essay to a close.`});
  }else{
    sentences.push({text:`Now let's look at ${title}.`,caption:`${title}.`});
  }
  if(main){
    const starters=['The central idea here is that','The key argument is that','What we want to say is that','The main point to make is that','Here the argument is that'];
    const starter=starters[paraIndex%starters.length];
    sentences.push({text:`${starter} ${main}.`,caption:`${starter} ${main}.`});
  }
  const bridges=['To support this, we can add that','We can also point out that','A further point is that','It is also worth noting that','On top of that, we should mention that'];
  subs.forEach((sub,i)=>{
    const bridge=bridges[i%bridges.length];
    sentences.push({text:`${bridge} ${sub}.`,caption:`${bridge} ${sub}.`,revealIndex:i});
  });
  if(t.includes('intro')||t.includes('opening')) sentences.push({text:`That gives us a strong opening. Now let's develop the argument.`,caption:`A strong opening — ready to develop.`});
  else if(t.includes('conclu')||t.includes('closing')) sentences.push({text:`And that is how we close the essay — clearly and confidently.`,caption:`Essay complete.`});
  else sentences.push({text:`So that paragraph makes a clear, well-supported point.`,caption:`Paragraph complete.`});
  return sentences;
}

// ══ PLAY CARD AUDIO ══
function playCardAudio(paraIndex,cardWrapEl,onFinished){
  if(!currentEssay)return;
  const para=currentEssay.skeleton[paraIndex];
  const qText=document.getElementById('qText').textContent;
  const sequence=buildLecture(para,qText,paraIndex);
  const listenBtn=cardWrapEl.querySelector('.card-listen-btn');
  const bubble=cardWrapEl.querySelector('.dialogue-bubble');
  cardWrapEl.classList.add('speaking');
  cardWrapEl.scrollIntoView({behavior:'smooth',block:'center'});
  if(listenBtn){listenBtn.classList.add('playing');listenBtn.innerHTML='■';}
  let step=0;
  function runStep(){
    if(!audioPlaying||step>=sequence.length){
      cardWrapEl.classList.remove('speaking');
      if(listenBtn){listenBtn.classList.remove('playing');listenBtn.innerHTML='▶';}
      if(bubble){bubble.classList.remove('show');bubble.textContent='';}
      onFinished&&onFinished();return;
    }
    const s=sequence[step];
    if(bubble){bubble.textContent=s.caption;bubble.classList.add('show');}
    if(s.revealIndex!==undefined){
      const btns=cardWrapEl.querySelectorAll('.reveal-btn:not(.done)');
      if(btns.length>0)setTimeout(()=>btns[0].click(),320);
    }
    step++;speak(s.text,runStep);
  }
  runStep();
}

// ══ PER-CARD LISTEN ══
function toggleCardAudio(paraIndex){
  const cards=document.querySelectorAll('.para-plan');
  const cardEl=cards[paraIndex];if(!cardEl)return;
  if(audioPlaying&&audioCardIndex===paraIndex){stopAudio();return;}
  stopAudio();audioPlaying=true;audioCardIndex=paraIndex;
  playCardAudio(paraIndex,cardEl,()=>{audioPlaying=false;audioCardIndex=-1;});
}

// ══ FULL LISTEN ══
function toggleFullAudio(){
  const btn=document.getElementById('listenAllBtn');
  if(audioPlaying&&audioCardIndex===-1){stopAudio();return;}
  stopAudio();audioPlaying=true;audioCardIndex=-1;
  btn.classList.add('playing');btn.innerHTML='<span>■</span> Stop';
  const cards=document.querySelectorAll('.para-plan');
  let cardIdx=0;
  function playNext(){
    if(!audioPlaying||cardIdx>=cards.length){stopAudio();return;}
    const i=cardIdx++;playCardAudio(i,cards[i],playNext);
  }
  playNext();
}

// ══ BANNER ══
function launchBanner(htmlText,slotEl,typeClass,onLanded){
  const banner=document.createElement('div');
  banner.className=`fly-banner ${typeClass}`;
  banner.innerHTML=htmlText;
  const labelMap={'type-teal':'Introduction','type-coral':'Supporting Idea','type-purple':'Key Point','type-rose':'Argument','type-gold':'Conclusion'};
  banner.setAttribute('data-label',labelMap[typeClass]||'Key Point');
  banner.style.visibility='hidden';banner.style.left='0px';banner.style.top='0px';
  document.body.appendChild(banner);
  const bw=banner.offsetWidth,bh=banner.offsetHeight,vw=window.innerWidth,vh=window.innerHeight;
  banner.style.left=Math.round((vw-bw)/2)+'px';banner.style.top=Math.round((vh-bh)/2)+'px';
  banner.style.visibility='visible';
  void banner.offsetWidth;
  banner.classList.add('phase-float');
  setTimeout(()=>{
    banner.classList.remove('phase-float');void banner.offsetWidth;banner.classList.add('phase-hover');
    setTimeout(()=>{
      const slotRect=slotEl.getBoundingClientRect(),bannerRect=banner.getBoundingClientRect();
      const diveX=slotRect.left+slotRect.width/2-(bannerRect.left+bannerRect.width/2);
      const diveY=slotRect.top+slotRect.height/2-(bannerRect.top+bannerRect.height/2);
      banner.style.setProperty('--dive-x',`${diveX}px`);banner.style.setProperty('--dive-y',`${diveY}px`);
      banner.classList.remove('phase-hover');void banner.offsetWidth;banner.classList.add('phase-dive');
      setTimeout(()=>{
        onLanded&&onLanded();
        void banner.offsetWidth;banner.classList.add('phase-fadeout');
        setTimeout(()=>banner.remove(),520);
      },480);
    },5000);
  },520);
}

// ══ MENU ══
function toggleMenu(){document.getElementById('menuDropdown').classList.toggle('open')}
function closeMenu(){document.getElementById('menuDropdown').classList.remove('open')}
document.addEventListener('click',e=>{if(!e.target.closest('#menuDropdown')&&!e.target.closest('#menuBtn'))closeMenu();});
function revealAll(){closeMenu();document.querySelectorAll('.reveal-btn:not(.done)').forEach(btn=>btn.click());}
function resetPlan(){closeMenu();stopAudio();if(currentEssay)renderPlan(currentEssay);}

// ══ VIEW MODE ══
function setViewMode(mode){
  viewMode=mode;stopAudio();
  document.getElementById('switchExplore').classList.toggle('active',mode==='explore');
  document.getElementById('switchFull').classList.toggle('active',mode==='full');
  document.getElementById('progressStrip').classList.toggle('hidden',mode!=='explore');
  if(currentEssay)renderPlan(currentEssay);
}

// ══ PROGRESS ══
function updateProgress(){
  if(viewMode!=='explore')return;
  const pct=totalHidden>0?(revealCount/totalHidden)*100:0;
  document.getElementById('barFill').style.width=pct+'%';
  const lbl=document.getElementById('progressLabel');
  if(revealCount===0){lbl.textContent='tap to reveal';lbl.classList.remove('done');}
  else if(revealCount===totalHidden){lbl.textContent='complete ✦';lbl.classList.add('done');}
  else{lbl.textContent=`${revealCount} / ${totalHidden}`;lbl.classList.remove('done');}
}
function celebrate(){const el=document.getElementById('celebration');el.classList.remove('show');void el.offsetWidth;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2900);}

// ══ RENDER PLAN ══
function renderPlan(essay){
  currentEssay=essay;totalHidden=0;revealCount=0;
  const canvas=document.getElementById('planCanvas');
  canvas.innerHTML='';
  if(essay.question){document.getElementById('qText').textContent=essay.question;document.getElementById('qStrip').style.display='block';}

  (essay.skeleton||[]).forEach((para,i)=>{
    const colorIdx=i%5;
    const typeClass=PARA_COLORS[colorIdx];
    const tagClass=TAG_COLORS[colorIdx];
    const colorName=TYPE_COLORS[colorIdx];

    const wrap=document.createElement('div');wrap.className=`para-plan ${typeClass}`;

    const pin=document.createElement('div');pin.className='para-pin';wrap.appendChild(pin);

    const tag=document.createElement('div');tag.className=`para-tag ${tagClass}`;tag.textContent=String(i+1).padStart(2,'0');wrap.appendChild(tag);

    const card=document.createElement('div');card.className='para-card';

    const header=document.createElement('div');header.className='para-card-header';
    const titleEl=document.createElement('div');titleEl.className='para-card-title';titleEl.textContent=para.title||`Paragraph ${i+1}`;header.appendChild(titleEl);
    const listenBtn=document.createElement('button');listenBtn.className='card-listen-btn';listenBtn.innerHTML='▶';listenBtn.title='Listen';listenBtn.onclick=()=>toggleCardAudio(i);header.appendChild(listenBtn);
    card.appendChild(header);

    const bubble=document.createElement('div');bubble.className='dialogue-bubble';card.appendChild(bubble);

    if(para.notes&&para.notes.length>0){
      const mainNote=para.notes[0];
      const mainArg=document.createElement('div');mainArg.className='main-arg';mainArg.textContent=mainNote.text||'';card.appendChild(mainArg);

      if(para.notes.length>1){
        const list=document.createElement('ul');list.className='support-list';
        para.notes.slice(1).forEach(note=>{
          const item=document.createElement('li');item.className='support-item';
          const span=document.createElement('span');span.className='support-text';span.textContent=note.text||'';
          if(viewMode==='explore'){
            totalHidden++;
            const btn=document.createElement('button');btn.className='reveal-btn';btn.textContent='reveal';
            btn.onclick=function(){
              btn.classList.add('done');btn.onclick=null;revealCount++;updateProgress();
              launchBanner(note.text||'',item,`type-${colorName}`,()=>{
                span.classList.add('show');
                if(revealCount===totalHidden)setTimeout(celebrate,350);
              });
            };
            item.appendChild(btn);item.appendChild(span);
          }else{
            const dot=document.createElement('span');dot.style.cssText='flex-shrink:0;width:8px;height:8px;border-radius:50%;margin-top:0.35rem;opacity:0.4;background:currentColor;';
            item.appendChild(dot);span.classList.add('show');item.appendChild(span);
          }
          list.appendChild(item);
        });
        card.appendChild(list);
      }
    }
    wrap.appendChild(card);canvas.appendChild(wrap);
  });
  updateProgress();
}

// ══ NAV ══
function navTo(dest){
  if(dest==='plan')return;
  stopAudio();
  if(question)sessionStorage.setItem('currentQuestion',JSON.stringify(question));
  const map={question:'essay-question-selector.html',model:'essay-builder.html',build:'essay-builder-interactive.html',sample:'essay-master.html'};
  if(map[dest])window.location.href=map[dest];
}

// ══ INIT ══
async function init(){
  await initVoices();
  try{question=JSON.parse(sessionStorage.getItem('currentQuestion'));}catch(e){question=null;}
  if(!question){document.getElementById('planCanvas').innerHTML='<div class="state-msg">No question selected.<br>Return to Questions to choose one.</div>';return;}
  try{
    const res=await fetch('data/ideas.json');
    if(!res.ok)throw new Error('ideas.json not found');
    const data=await res.json();
    const pool=data.opinion||data.essays||data;
    const essay=Array.isArray(pool)?pool.find(e=>e.id===question.id):pool[question.id];
    if(!essay){document.getElementById('planCanvas').innerHTML=`<div class="state-msg">No plan for this question yet.<br><small style="opacity:0.35;margin-top:0.5rem;display:block;">id: ${question.id}</small></div>`;return;}
    renderPlan(essay);
  }catch(err){document.getElementById('planCanvas').innerHTML=`<div class="state-msg">Could not load ideas.json<br><small style="opacity:0.35;margin-top:0.5rem;display:block;">${err.message}</small></div>`;}
}
init();
</script>
</body>
</html>
