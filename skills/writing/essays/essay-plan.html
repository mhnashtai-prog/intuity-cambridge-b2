<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Plan — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #0c0c0c;
  --gold:    #C9A961;
  --gold-d:  #9B7D3A;
  --gold-l:  #E8D4A0;
  --white:   #FAFAF8;
  --ink:     #0d0d0d;
  --soft:    rgba(13,13,13,0.55);
  --settled: rgba(13,13,13,0.82);
  --rule:    rgba(0,0,0,0.07);
  --teal:    #5ab5ac;
  --teal-d:  #4a9a92;
  --coral:   #f89643;
  --coral-d: #e67e2e;
  --purple:  #8b7ba8;
  --purple-d:#726291;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; position:fixed; background:var(--bg); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }

.shell { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:2vh 3vw; }
.card { width:100%; height:100%; max-width:900px; max-height:95vh; background:var(--white); border-radius:1.5rem; box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4); display:flex; flex-direction:column; overflow:hidden; position:relative; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d)); z-index:5; }

/* ── Header ── */
.card-brand { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1.25rem 0.5rem; margin-top:3px; border-bottom:1px solid var(--rule); position:relative; z-index:10; }
.home-link { text-decoration:none; font-size:0.85rem; font-weight:600; color:var(--gold); padding:0.35rem 0.5rem; border-radius:0.5rem; transition:all 0.2s; }
.home-link:hover { background:rgba(201,169,97,0.1); color:var(--gold-d); }
.home-link:active { transform:scale(0.95); }
.brand-word { position:absolute; left:50%; transform:translateX(-50%); font-size:0.55rem; font-weight:800; letter-spacing:0.22em; text-transform:uppercase; color:rgba(0,0,0,0.18); pointer-events:none; }
.menu-btn { background:#000; border:none; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; }
.menu-btn:hover { background:rgba(0,0,0,0.8); }
.menu-btn:active { transform:scale(0.95); }
.menu-dots { display:flex; gap:3px; }
.menu-dots span { width:3px; height:3px; border-radius:50%; background:#fff; }

/* ── Menu dropdown ── */
.menu-dropdown { position:absolute; top:calc(100% + 0.5rem); right:1rem; background:#fff; border-radius:0.75rem; box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.12); min-width:190px; padding:0.5rem; z-index:200; display:none; }
.menu-dropdown.open { display:block; animation:menuIn 0.2s ease-out; }
@keyframes menuIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.menu-item { padding:0.65rem 0.85rem; border-radius:0.5rem; font-size:0.78rem; font-weight:500; color:rgba(0,0,0,0.7); cursor:pointer; transition:all 0.15s; }
.menu-item:hover { background:rgba(0,0,0,0.04); color:rgba(0,0,0,0.9); }

/* ── Progress bar ── */
.progress-strip { flex-shrink:0; padding:0.45rem 1.25rem 0.5rem; border-bottom:1px solid var(--rule); display:flex; align-items:center; gap:0.9rem; }
.progress-strip.hidden { display:none; }
.bar-track { flex:1; height:3px; background:rgba(0,0,0,0.08); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--teal),var(--coral),var(--purple)); border-radius:3px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }
.progress-label { font-size:0.6rem; font-weight:900; text-transform:uppercase; letter-spacing:0.08em; color:rgba(0,0,0,0.28); white-space:nowrap; transition:color 0.3s; }
.progress-label.done { color:var(--teal-d); }

/* ── Celebration ── */
.celebration { position:fixed; inset:0; z-index:900; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:0; }
.celebration.show { animation:celebPop 2.8s ease forwards; }
@keyframes celebPop { 0%{opacity:0} 15%{opacity:1} 75%{opacity:1} 100%{opacity:0} }
.celeb-pill { background:var(--ink); color:var(--gold); padding:1rem 2.25rem; border-radius:3rem; font-size:1rem; font-weight:800; letter-spacing:0.07em; text-transform:uppercase; box-shadow:0 12px 48px rgba(0,0,0,0.45); animation:celebScale 0.45s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes celebScale { from{transform:scale(0.7)} to{transform:scale(1)} }

/* ── Question strip ── */
.q-strip { flex-shrink:0; padding:0.5rem 1.25rem; border-bottom:1px solid var(--rule); background:rgba(201,169,97,0.03); }
.q-text { font-family:'DM Sans',sans-serif; font-size:0.75rem; line-height:1.4; color:var(--settled); font-style:italic; font-weight:400; }

/* ── Toggle + Listen row ── */
.toggle-row { flex-shrink:0; padding:0.55rem 1.25rem; border-bottom:1px solid var(--rule); display:flex; align-items:center; justify-content:space-between; gap:0.75rem; }
.view-switch { display:flex; background:rgba(0,0,0,0.05); border-radius:2rem; padding:0.25rem; gap:0.25rem; }
.switch-option { padding:0.32rem 1.1rem; border-radius:1.75rem; font-size:0.68rem; font-weight:800; color:rgba(0,0,0,0.38); cursor:pointer; transition:all 0.25s cubic-bezier(0.4,0,0.2,1); white-space:nowrap; user-select:none; }
.switch-option:hover:not(.active) { color:rgba(0,0,0,0.58); background:rgba(0,0,0,0.03); }
.switch-option.active { background:var(--ink); color:var(--gold); box-shadow:0 3px 12px rgba(0,0,0,0.2); }

/* ── Full Listen button ── */
.listen-all-btn {
  display: inline-flex; align-items: center; gap: 0.35rem;
  padding: 0.35rem 0.9rem;
  border-radius: 2rem;
  background: var(--ink);
  color: var(--gold);
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 0.62rem; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.22);
  white-space: nowrap;
  user-select: none;
}
.listen-all-btn:hover { background: #1a1a1a; box-shadow: 0 5px 16px rgba(0,0,0,0.3); }
.listen-all-btn:active { transform: scale(0.96); }
.listen-all-btn.playing { background: #c0392b; color: #fff; }
.listen-all-btn .btn-icon { font-size: 0.7rem; }

/* ── Plan canvas ── */
.plan-canvas {
  flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:2.5rem 1.75rem 2rem;
  display:flex; flex-direction:column; align-items:center; gap:3.5rem;
  background: #d6d6d4;
}
.plan-canvas::-webkit-scrollbar { width:4px; }
.plan-canvas::-webkit-scrollbar-track { background:transparent; }
.plan-canvas::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.18); border-radius:2px; }

/* ══════════════════════════════════════
   TORN PAPER WRAPPER
   ══════════════════════════════════════ */
.para-plan {
  position: relative;
  width: 100%;
  max-width: 780px;
  padding-top: 45px;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.4s ease forwards;
}
.para-plan:nth-child(1) { animation-delay:0.05s; }
.para-plan:nth-child(2) { animation-delay:0.13s; }
.para-plan:nth-child(3) { animation-delay:0.21s; }
.para-plan:nth-child(4) { animation-delay:0.29s; }
.para-plan:nth-child(5) { animation-delay:0.37s; }
@keyframes fadeIn { to { opacity:1; transform:translateY(0); } }

/* Active (playing) card glow */
.para-plan.speaking .para-card {
  filter: drop-shadow(0 0 18px rgba(201,169,97,0.5)) drop-shadow(0 10px 28px rgba(0,0,0,0.24));
}

/* ── Pin ── */
.para-pin {
  position: absolute;
  top: 68px; left: 50%;
  transform: translateX(-50%);
  width: 18px; height: 32px;
  z-index: 20; pointer-events: none;
}
.para-pin::before {
  content: ""; position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: linear-gradient(135deg, #999, #555);
  box-shadow: 0 3px 7px rgba(0,0,0,0.45);
}
.para-pin::after {
  content: ""; position: absolute;
  top: 10px; left: 50%; transform: translateX(-50%);
  width: 3px; height: 18px;
  background: linear-gradient(to bottom, #777, #bbb);
  border-radius: 0 0 2px 2px;
}

/* ── Number tag ── */
.para-tag {
  position: absolute;
  top: 18px; left: 20px;
  width: 130px; height: 130px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-family: 'Inter', sans-serif;
  font-weight: 900; font-size: 52px; letter-spacing: -1px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.32);
  z-index: 20;
}
.para-tag.tag-intro      { background:linear-gradient(135deg,var(--teal),var(--teal-d));     transform:rotate(-7deg); }
.para-tag.tag-body       { background:linear-gradient(135deg,var(--coral),var(--coral-d));   transform:rotate(6deg);  }
.para-tag.tag-conclusion { background:linear-gradient(135deg,var(--purple),var(--purple-d)); transform:rotate(-8deg); }

/* ── Torn paper card ── */
.para-card {
  position: relative;
  width: 100%;
  min-height: 360px;
  padding: 1.25rem 2rem 2.5rem;
  display: flex; flex-direction: column; justify-content: space-between;
  transition: filter 0.3s ease;

  background-color: #f4f2ee;
  background-image:
    repeating-linear-gradient(90deg, rgba(0,0,0,0.012) 0px, rgba(0,0,0,0.012) 1px, transparent 1px, transparent 5px),
    repeating-linear-gradient(0deg,  rgba(0,0,0,0.008) 0px, rgba(0,0,0,0.008) 1px, transparent 1px, transparent 5px);

  filter: drop-shadow(0 10px 28px rgba(0,0,0,0.24)) drop-shadow(0 2px 6px rgba(0,0,0,0.14));

  clip-path: polygon(
    0% 2.5%,   1.2% 1%,   2.5% 3%,   4% 1%,    5.5% 3%,   7% 1.5%,
    8.5% 3.5%, 10% 1%,    12% 3%,    14% 1%,    16% 2.5%,  18% 0.8%,
    20% 2.8%,  22% 1%,    24% 3%,    26% 1%,    28% 2.5%,  30% 0.8%,
    32% 2.8%,  34% 1%,    36% 3%,    38% 1%,    40% 2.5%,  42% 0.8%,
    44% 2.8%,  46% 1%,    48% 2.5%,  50% 0.5%,  52% 2.5%,  54% 1%,
    56% 2.8%,  58% 0.8%,  60% 2.5%,  62% 1%,    64% 3%,    66% 1%,
    68% 2.8%,  70% 0.8%,  72% 2.5%,  74% 1%,    76% 3%,    78% 1%,
    80% 2.5%,  82% 1%,    84% 3%,    86% 1.5%,  88% 3.5%,  90% 1%,
    92% 3%,    94% 1%,    96% 3%,    98% 1%,    100% 2.5%,

    100% 97.5%, 98.5% 99%, 97% 97%,   95% 99%,   93% 97%,   91% 99%,
    89% 97.5%,  87% 99.5%, 85% 97%,   83% 99%,   81% 97.5%, 79% 99.5%,
    77% 97%,    75% 99%,   73% 97.5%, 71% 99.5%, 69% 97%,   67% 99%,
    65% 97.5%,  63% 99.5%, 61% 97%,   59% 99%,   57% 97.5%, 55% 99.5%,
    53% 97%,    51% 99.5%, 49% 97%,   47% 99.5%, 45% 97%,   43% 99%,
    41% 97.5%,  39% 99.5%, 37% 97%,   35% 99%,   33% 97.5%, 31% 99.5%,
    29% 97%,    27% 99%,   25% 97.5%, 23% 99.5%, 21% 97%,   19% 99%,
    17% 97.5%,  15% 99.5%, 13% 97%,   11% 99%,   9% 97.5%,  7% 99.5%,
    5% 97%,     3% 99%,    1.5% 97.5%, 0% 99%
  );
}

.para-card:hover {
  filter: drop-shadow(0 18px 44px rgba(0,0,0,0.28)) drop-shadow(0 4px 10px rgba(0,0,0,0.16));
}

.para-plan.type-intro      .para-card { background-color: #eaf5f4; }
.para-plan.type-body       .para-card { background-color: #fdf4e8; }
.para-plan.type-conclusion .para-card { background-color: #f0ecf7; }

/* ── Card inner header ── */
.para-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 5rem;
  padding-bottom: 0.65rem;
  margin-bottom: 0.85rem;
  border-bottom: 1px solid rgba(0,0,0,0.07);
}

.para-card-title {
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-align: center;
  flex: 1;
}
.para-plan.type-intro      .para-card-title { color: var(--teal-d); }
.para-plan.type-body       .para-card-title { color: var(--coral-d); }
.para-plan.type-conclusion .para-card-title { color: var(--purple-d); }

/* ── Per-card listen button ── */
.card-listen-btn {
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.75rem;
  user-select: none;
  background: rgba(0,0,0,0.07);
  color: rgba(0,0,0,0.45);
}
.card-listen-btn:hover { background: rgba(0,0,0,0.13); color: rgba(0,0,0,0.7); transform: scale(1.1); }
.card-listen-btn:active { transform: scale(0.92); }
.card-listen-btn.playing {
  background: var(--ink);
  color: var(--gold);
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,169,97,0.5); }
  50%      { box-shadow: 0 0 0 6px rgba(201,169,97,0); }
}

/* ── Dialogue bubble (shown during audio) ── */
.dialogue-bubble {
  display: none;
  background: rgba(0,0,0,0.04);
  border-left: 3px solid rgba(0,0,0,0.12);
  border-radius: 0 0.5rem 0.5rem 0;
  padding: 0.6rem 0.85rem;
  margin-bottom: 0.65rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.76rem;
  line-height: 1.55;
  color: rgba(0,0,0,0.55);
  animation: fadeIn 0.3s ease;
}
.dialogue-bubble.show { display: block; }
.dialogue-bubble .speaker-a { color: rgba(0,0,0,0.38); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.2rem; }
.dialogue-bubble .speaker-b { color: rgba(0,0,0,0.38); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.2rem; margin-top: 0.45rem; }
.dialogue-bubble .line-a { color: rgba(0,0,0,0.5); font-style: italic; }
.dialogue-bubble .line-b { color: var(--ink); font-weight: 500; }
.type-intro      .dialogue-bubble { border-left-color: var(--teal); }
.type-body       .dialogue-bubble { border-left-color: var(--coral); }
.type-conclusion .dialogue-bubble { border-left-color: var(--purple); }

/* ── Main argument ── */
.main-arg {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--ink);
  font-weight: 600;
  margin-bottom: 0.65rem;
  text-align: center;
}

/* ── Supporting list ── */
.support-list {
  list-style: none;
  display: flex; flex-direction: column;
  gap: 0.55rem;
  margin-top: 0.25rem;
}

/* ── Each row: pill button + hidden text ── */
.support-item {
  display: flex; align-items: center; gap: 0.65rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem; line-height: 1.6;
  color: var(--settled);
}

/* The clickable pill */
.reveal-btn {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 0.3rem;
  padding: 0.28rem 0.7rem;
  border-radius: 2rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.58rem; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: #fff;
  cursor: pointer;
  border: none;
  white-space: nowrap;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 3px 10px rgba(0,0,0,0.20);
  user-select: none;
}
.reveal-btn::before { content: '▶'; font-size: 0.45rem; opacity: 0.85; }
.reveal-btn:hover  { transform: scale(1.06); box-shadow: 0 5px 14px rgba(0,0,0,0.25); }
.reveal-btn:active { transform: scale(0.95); }

.type-intro      .reveal-btn { background: linear-gradient(135deg, var(--teal),   var(--teal-d)); }
.type-body       .reveal-btn { background: linear-gradient(135deg, var(--coral),  var(--coral-d)); }
.type-conclusion .reveal-btn { background: linear-gradient(135deg, var(--purple), var(--purple-d)); }

.reveal-btn.done {
  width: 14px; height: 14px;
  padding: 0; border-radius: 50%;
  overflow: hidden; font-size: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  cursor: default; transform: scale(1);
  flex-shrink: 0;
}
.reveal-btn.done::before { display: none; }

/* Revealed text */
.support-text { display: none; font-size: 0.92rem; font-weight: 400; line-height: 1.6; }
.support-text.show {
  display: inline;
  animation: revealSlide 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes revealSlide {
  from { opacity:0; transform:translateX(-10px); }
  to   { opacity:1; transform:translateX(0); }
}

.verb { display:inline; color:var(--ink); font-weight:700; }

/* ── Footer nav ── */
.card-nav { flex-shrink:0; display:flex; justify-content:center; padding:0.6rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.65rem); border-top:1px solid var(--rule); background:var(--white); }
.nav-pill { display:flex; gap:0.15rem; background:rgba(10,10,10,0.06); border-radius:2rem; padding:0.3rem 0.35rem; }
.nb { background:transparent; border:none; padding:0.4rem 0.85rem; border-radius:1.5rem; font-family:'Inter',sans-serif; font-size:0.65rem; letter-spacing:0.02em; color:rgba(0,0,0,0.28); cursor:pointer; transition:all 0.24s cubic-bezier(0.4,0,0.2,1); white-space:nowrap; min-height:32px; font-weight:500; }
.nb.on { background:var(--ink); color:var(--gold); font-weight:700; }
.nb:hover:not(.on) { color:rgba(0,0,0,0.5); }

/* ── State message ── */
.state-msg { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:0.75rem; font-size:0.8rem; color:rgba(0,0,0,0.3); text-align:center; line-height:1.6; padding:2rem; }

/* ── Mobile ── */
@media(max-width:768px){
  .shell { padding:0; }
  .card { border-radius:0; max-height:100vh; }
  .card-brand { padding:0.55rem 0.875rem 0.4rem; }
  .home-link { font-size:0.7rem; padding:0.3rem 0.4rem; }
  .brand-word { font-size:0.45rem; }
  .menu-btn { width:26px; height:26px; }
  .q-strip { padding:0.45rem 0.875rem; }
  .q-text { font-size:0.65rem; }
  .toggle-row { padding:0.45rem 0.875rem; }
  .plan-canvas { padding:1.75rem 0.75rem 1.5rem; gap:2.25rem; }
  .para-plan { max-width:100%; padding-top:35px; }
  .para-card { padding:1.25rem 1.1rem 2rem; min-height:300px; }
  .para-card-header { padding-top:4rem; }
  .para-tag { width:100px; height:100px; font-size:40px; top:8px; left:14px; }
  .para-card-title { font-size:0.72rem; }
  .main-arg { font-size:0.72rem; }
  .support-item { font-size:0.65rem; }
  .nb { padding:0.3rem 0.6rem; font-size:0.55rem; min-height:28px; }
  .card-nav { padding:0.45rem 0.875rem; }
  .listen-all-btn { font-size:0.58rem; padding:0.3rem 0.75rem; }
}
@media(max-width:400px){
  .plan-canvas { padding:1.5rem 0.5rem 1.25rem; gap:2rem; }
  .para-plan { padding-top:30px; }
  .para-card { padding:1rem 0.875rem 2rem; min-height:280px; }
  .para-card-header { padding-top:3.75rem; }
  .para-tag { width:88px; height:88px; font-size:34px; }
  .main-arg { font-size:0.68rem; }
  .support-item { font-size:0.62rem; }
  .nb { padding:0.25rem 0.5rem; font-size:0.5rem; }
}
@media(min-width:1024px){
  .card { max-width:1100px; max-height:90vh; }
  .card-brand { padding:0.65rem 1.5rem 0.45rem; }
  .plan-canvas { padding:3rem 3rem 2rem; gap:3.5rem; }
  .para-plan { max-width:900px; }
  .para-card { padding:1.75rem 2.25rem 2.75rem; min-height:400px; }
  .para-card-title { font-size:1rem; }
  .main-arg { font-size:0.88rem; }
  .support-item { font-size:0.78rem; }
  .nb { font-size:0.6rem; padding:0.4rem 0.8rem; }
}
@media(min-width:1400px){
  .card { max-width:1300px; }
  .plan-canvas { padding:3.5rem 4rem 2.5rem; gap:4rem; }
  .para-plan { max-width:1000px; }
  .main-arg { font-size:0.95rem; }
  .support-item { font-size:0.82rem; }
}
</style>
</head>
<body>

<div class="shell">
<div class="card">

  <div class="card-brand">
    <a class="home-link" href="essay-question-selector.html">← Questions</a>
    <span class="brand-word">INTUITY</span>
    <div style="flex:1"></div>
    <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
      <div class="menu-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="menu-dropdown" id="menuDropdown">
      <div class="menu-item" onclick="revealAll()">Reveal all</div>
      <div class="menu-item" onclick="resetPlan()">Reset</div>
    </div>
  </div>

  <div class="q-strip" id="qStrip" style="display:none">
    <div class="q-text" id="qText"></div>
  </div>

  <div class="toggle-row">
    <div class="view-switch">
      <div class="switch-option active" id="switchExplore" onclick="setViewMode('explore')">Explore</div>
      <div class="switch-option" id="switchFull" onclick="setViewMode('full')">Full Plan</div>
    </div>
    <button class="listen-all-btn" id="listenAllBtn" onclick="toggleFullAudio()">
      <span class="btn-icon">▶</span> Listen
    </button>
  </div>

  <div class="progress-strip" id="progressStrip">
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="progress-label" id="progressLabel">tap to reveal</div>
  </div>

  <div class="plan-canvas" id="planCanvas">
    <div class="state-msg">Loading plan…</div>
  </div>

  <div class="card-nav">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">question</button>
      <button class="nb on" onclick="navTo('plan')">plan</button>
      <button class="nb"    onclick="navTo('model')">model</button>
      <button class="nb"    onclick="navTo('build')">build</button>
      <button class="nb"    onclick="navTo('sample')">sample</button>
    </div>
  </div>

</div>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-pill">Plan complete ✦</div>
</div>

<script>
// ==================== STATE ====================
let question     = null;
let viewMode     = 'explore';
let currentEssay = null;
let totalHidden  = 0;
let revealCount  = 0;

// Audio state
let audioPlaying    = false;
let audioQueue      = [];
let currentUtterance = null;
let audioCardIndex  = -1;  // which card is currently speaking (-1 = all)

// ==================== SPEECH UTILS ====================
const synth = window.speechSynthesis;

function getVoices() {
  return new Promise(resolve => {
    let v = synth.getVoices();
    if (v.length) { resolve(v); return; }
    synth.onvoiceschanged = () => resolve(synth.getVoices());
  });
}

let voiceA = null; // interviewer — slightly higher pitch
let voiceB = null; // student model — default

async function initVoices() {
  const voices = await getVoices();
  // Prefer English voices
  const en = voices.filter(v => v.lang.startsWith('en'));
  const pool = en.length ? en : voices;
  // A: pick a different voice from B if possible
  voiceB = pool.find(v => v.name.includes('Google UK')) ||
           pool.find(v => v.name.includes('Daniel'))    ||
           pool[0] || null;
  voiceA = pool.find(v => v !== voiceB && (v.name.includes('Samantha') || v.name.includes('Karen') || v.name.includes('Female') || v.gender === 'female')) ||
           pool.find(v => v !== voiceB) || voiceB;
}

function speak(text, isA, onEnd) {
  if (!synth) { onEnd && onEnd(); return; }
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.voice  = isA ? voiceA : voiceB;
  utt.rate   = isA ? 0.92 : 0.88;
  utt.pitch  = isA ? 1.15 : 1.0;
  utt.volume = 1;
  utt.onend  = () => { onEnd && onEnd(); };
  utt.onerror = () => { onEnd && onEnd(); };
  currentUtterance = utt;
  synth.speak(utt);
}

function stopAudio() {
  synth.cancel();
  audioPlaying = false;
  audioQueue   = [];
  currentUtterance = null;

  // Remove speaking state from all cards
  document.querySelectorAll('.para-plan.speaking').forEach(c => c.classList.remove('speaking'));
  document.querySelectorAll('.card-listen-btn.playing').forEach(b => {
    b.classList.remove('playing');
    b.innerHTML = '▶';
  });
  document.querySelectorAll('.dialogue-bubble').forEach(b => b.classList.remove('show'));

  const allBtn = document.getElementById('listenAllBtn');
  allBtn.classList.remove('playing');
  allBtn.innerHTML = '<span class="btn-icon">▶</span> Listen';
  audioCardIndex = -1;
}

// ==================== DIALOGUE BUILDER ====================
// Builds the A/B exchange for a single paragraph
function buildDialogue(para, essayQuestion, paraIndex) {
  const title  = para.title  || `paragraph ${paraIndex + 1}`;
  const notes  = para.notes  || [];
  const main   = notes[0]    ? notes[0].text  : '';
  const subs   = notes.slice(1).map(n => n.text).filter(Boolean);

  // Question A asks depends on paragraph type
  const t = title.toLowerCase();
  let questionA;
  if (t.includes('intro') || t.includes('opening')) {
    questionA = essayQuestion
      ? `So, the question is: ${essayQuestion}. How would you introduce this topic?`
      : `How would you open this essay?`;
  } else if (t.includes('conclu') || t.includes('closing')) {
    questionA = `How would you bring your essay to a close?`;
  } else {
    // Body — derive a natural discussion question from the main idea
    questionA = `Let's talk about ${title}. What's your main point here?`;
  }

  // B answers with main idea + model phrase
  const openers = [
    'Personally, I would argue that',
    'From my perspective,',
    'I firmly believe that',
    'In my view,',
    'I think the key point is that',
  ];
  const opener = openers[paraIndex % openers.length];
  const answerB = main ? `${opener} ${main}.` : `${opener} this is an important area to consider.`;

  // Follow-up exchange for supporting ideas
  const followUps = [];
  if (subs.length > 0) {
    const followQs = [
      `Can you give an example?`,
      `And what about the consequences of that?`,
      `Could you develop that idea a bit further?`,
      `How does that connect to the bigger picture?`,
    ];
    subs.forEach((sub, i) => {
      followUps.push({
        a: followQs[i % followQs.length],
        b: sub,
        revealIndex: i  // which reveal-btn to trigger
      });
    });
  }

  return { questionA, answerB, followUps };
}

// ==================== PLAY CARD AUDIO ====================
function playCardAudio(paraIndex, cardWrapEl, onFinished) {
  if (!currentEssay) return;
  const para   = currentEssay.skeleton[paraIndex];
  const qText  = document.getElementById('qText').textContent;
  const dialog = buildDialogue(para, qText, paraIndex);

  const listenBtn = cardWrapEl.querySelector('.card-listen-btn');
  const bubble    = cardWrapEl.querySelector('.dialogue-bubble');

  // Mark card as speaking
  cardWrapEl.classList.add('speaking');
  if (listenBtn) { listenBtn.classList.add('playing'); listenBtn.innerHTML = '■'; }

  // Scroll card into view
  cardWrapEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

  // Build sequence of utterances
  const sequence = [];

  // Opening A question
  sequence.push({ text: dialog.questionA, isA: true, label: 'A', line: dialog.questionA });
  // B main answer
  sequence.push({ text: dialog.answerB,   isA: false, label: 'B', line: dialog.answerB, reveal: null });

  // Follow-up pairs
  dialog.followUps.forEach((fu, i) => {
    sequence.push({ text: fu.a, isA: true,  label: 'A', line: fu.a });
    sequence.push({ text: fu.b, isA: false, label: 'B', line: fu.b, reveal: fu.revealIndex });
  });

  let step = 0;

  function runStep() {
    if (!audioPlaying || step >= sequence.length) {
      // Done
      cardWrapEl.classList.remove('speaking');
      if (listenBtn) { listenBtn.classList.remove('playing'); listenBtn.innerHTML = '▶'; }
      if (bubble) bubble.classList.remove('show');
      onFinished && onFinished();
      return;
    }

    const s = sequence[step];

    // Update dialogue bubble
    if (bubble) {
      bubble.classList.add('show');
      bubble.innerHTML = `
        <div class="speaker-${s.isA ? 'a' : 'b'}">${s.label}</div>
        <div class="line-${s.isA ? 'a' : 'b'}">${s.line}</div>`;
    }

    // Auto-reveal the matching support button when B speaks a supporting idea
    if (!s.isA && s.reveal !== null && s.reveal !== undefined) {
      const btns = cardWrapEl.querySelectorAll('.reveal-btn:not(.done)');
      if (btns.length > 0) {
        setTimeout(() => btns[0].click(), 300);
      }
    }

    step++;
    speak(s.text, s.isA, runStep);
  }

  runStep();
}

// ==================== PER-CARD LISTEN BUTTON ====================
function toggleCardAudio(paraIndex) {
  const cards = document.querySelectorAll('.para-plan');
  const cardEl = cards[paraIndex];
  if (!cardEl) return;

  const btn = cardEl.querySelector('.card-listen-btn');

  // If this card is already playing, stop
  if (audioPlaying && audioCardIndex === paraIndex) {
    stopAudio();
    return;
  }

  // Stop any existing audio first
  stopAudio();
  audioPlaying   = true;
  audioCardIndex = paraIndex;

  playCardAudio(paraIndex, cardEl, () => {
    audioPlaying   = false;
    audioCardIndex = -1;
  });
}

// ==================== FULL LISTEN ====================
function toggleFullAudio() {
  const btn = document.getElementById('listenAllBtn');

  if (audioPlaying && audioCardIndex === -1) {
    stopAudio();
    return;
  }

  stopAudio();
  audioPlaying   = true;
  audioCardIndex = -1;

  btn.classList.add('playing');
  btn.innerHTML = '<span class="btn-icon">■</span> Stop';

  const cards = document.querySelectorAll('.para-plan');
  let cardIdx = 0;

  function playNext() {
    if (!audioPlaying || cardIdx >= cards.length) {
      stopAudio();
      return;
    }
    const i = cardIdx++;
    playCardAudio(i, cards[i], playNext);
  }

  playNext();
}

// ==================== MENU ====================
function toggleMenu() {
  document.getElementById('menuDropdown').classList.toggle('open');
}
function closeMenu() {
  document.getElementById('menuDropdown').classList.remove('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#menuDropdown') && !e.target.closest('#menuBtn')) closeMenu();
});

// ==================== REVEAL ALL ====================
function revealAll() {
  closeMenu();
  document.querySelectorAll('.reveal-btn:not(.done)').forEach(btn => btn.click());
}

// ==================== RESET ====================
function resetPlan() {
  closeMenu();
  stopAudio();
  if (currentEssay) renderPlan(currentEssay);
}

// ==================== VIEW MODE ====================
function setViewMode(mode) {
  viewMode = mode;
  stopAudio();
  document.getElementById('switchExplore').classList.toggle('active', mode === 'explore');
  document.getElementById('switchFull').classList.toggle('active', mode === 'full');
  document.getElementById('progressStrip').classList.toggle('hidden', mode !== 'explore');
  if (currentEssay) renderPlan(currentEssay);
}

// ==================== PROGRESS ====================
function updateProgress() {
  if (viewMode !== 'explore') return;
  const pct = totalHidden > 0 ? (revealCount / totalHidden) * 100 : 0;
  document.getElementById('barFill').style.width = pct + '%';
  const lbl = document.getElementById('progressLabel');
  if (revealCount === 0) {
    lbl.textContent = 'tap to reveal';
    lbl.classList.remove('done');
  } else if (revealCount === totalHidden) {
    lbl.textContent = 'complete ✦';
    lbl.classList.add('done');
  } else {
    lbl.textContent = `${revealCount} / ${totalHidden}`;
    lbl.classList.remove('done');
  }
}

// ==================== CELEBRATE ====================
function celebrate() {
  const el = document.getElementById('celebration');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2900);
}

// ==================== RENDER PLAN ====================
function renderPlan(essay) {
  currentEssay = essay;
  totalHidden  = 0;
  revealCount  = 0;
  const canvas = document.getElementById('planCanvas');
  canvas.innerHTML = '';

  if (essay.question) {
    document.getElementById('qText').textContent = essay.question;
    document.getElementById('qStrip').style.display = 'block';
  }

  (essay.skeleton || []).forEach((para, i) => {

    const t = (para.title || '').toLowerCase();
    let typeClass = 'type-body';
    let tagClass  = 'tag-body';
    if (t.includes('intro') || t.includes('opening'))  { typeClass = 'type-intro';      tagClass = 'tag-intro'; }
    if (t.includes('conclu') || t.includes('closing')) { typeClass = 'type-conclusion'; tagClass = 'tag-conclusion'; }

    const wrap = document.createElement('div');
    wrap.className = `para-plan ${typeClass}`;

    // Pin
    const pin = document.createElement('div');
    pin.className = 'para-pin';
    wrap.appendChild(pin);

    // Number tag
    const tag = document.createElement('div');
    tag.className = `para-tag ${tagClass}`;
    tag.textContent = String(i + 1).padStart(2, '0');
    wrap.appendChild(tag);

    // Card
    const card = document.createElement('div');
    card.className = 'para-card';

    // Header: title + listen button
    const header = document.createElement('div');
    header.className = 'para-card-header';

    const titleEl = document.createElement('div');
    titleEl.className = 'para-card-title';
    titleEl.textContent = para.title || `Paragraph ${i + 1}`;
    header.appendChild(titleEl);

    const listenBtn = document.createElement('button');
    listenBtn.className = 'card-listen-btn';
    listenBtn.innerHTML = '▶';
    listenBtn.title = 'Listen to dialogue';
    listenBtn.onclick = () => toggleCardAudio(i);
    header.appendChild(listenBtn);

    card.appendChild(header);

    // Dialogue bubble (hidden until audio plays)
    const bubble = document.createElement('div');
    bubble.className = 'dialogue-bubble';
    card.appendChild(bubble);

    // Main argument
    if (para.notes && para.notes.length > 0) {
      const mainNote = para.notes[0];
      const mainArg  = document.createElement('div');
      mainArg.className = 'main-arg';
      let text = mainNote.text || '';
      if (mainNote.verb) {
        const re = new RegExp(`\\b(${mainNote.verb})\\b`, 'gi');
        text = text.replace(re, '<span class="verb">$1</span>');
      }
      mainArg.innerHTML = text;
      card.appendChild(mainArg);

      // Supporting ideas
      if (para.notes.length > 1) {
        const list = document.createElement('ul');
        list.className = 'support-list';

        para.notes.slice(1).forEach((note) => {
          const item = document.createElement('li');
          item.className = 'support-item';
          let s = note.text || '';
          if (note.verb) {
            const re = new RegExp(`\\b(${note.verb})\\b`, 'gi');
            s = s.replace(re, '<span class="verb">$1</span>');
          }
          const span = document.createElement('span');
          span.className = 'support-text';
          span.innerHTML = s;

          if (viewMode === 'explore') {
            totalHidden++;
            const btn = document.createElement('button');
            btn.className = 'reveal-btn';
            btn.textContent = 'reveal';
            btn.onclick = function() {
              span.classList.add('show');
              btn.classList.add('done');
              btn.onclick = null;
              revealCount++;
              updateProgress();
              if (revealCount === totalHidden) setTimeout(celebrate, 350);
            };
            item.appendChild(btn);
            item.appendChild(span);
          } else {
            const dot = document.createElement('span');
            dot.style.cssText = 'flex-shrink:0;width:8px;height:8px;border-radius:50%;margin-top:0.35rem;opacity:0.4;background:currentColor;';
            item.appendChild(dot);
            span.classList.add('show');
            item.appendChild(span);
          }
          list.appendChild(item);
        });
        card.appendChild(list);
      }
    }

    wrap.appendChild(card);
    canvas.appendChild(wrap);
  });

  updateProgress();
}

// ==================== NAVIGATION ====================
function navTo(dest) {
  if (dest === 'plan') return;
  stopAudio();
  if (question) sessionStorage.setItem('currentQuestion', JSON.stringify(question));
  const map = {
    question: 'essay-question-selector.html',
    model:    'essay-builder.html',
    build:    'essay-builder-interactive.html',
    sample:   'essay-master.html'
  };
  if (map[dest]) window.location.href = map[dest];
}

// ==================== INIT ====================
async function init() {
  await initVoices();

  try { question = JSON.parse(sessionStorage.getItem('currentQuestion')); }
  catch(e) { question = null; }

  if (!question) {
    document.getElementById('planCanvas').innerHTML =
      `<div class="state-msg">No question selected.<br>Return to Questions to choose one.</div>`;
    return;
  }

  try {
    const res = await fetch('data/ideas.json');
    if (!res.ok) throw new Error('ideas.json not found');
    const data = await res.json();
    const pool = data.opinion || data.essays || data;
    const essay = Array.isArray(pool)
      ? pool.find(e => e.id === question.id)
      : pool[question.id];

    if (!essay) {
      document.getElementById('planCanvas').innerHTML =
        `<div class="state-msg">No plan for this question yet.<br>
         <small style="opacity:0.35;margin-top:0.5rem;display:block;">id: ${question.id}</small></div>`;
      return;
    }
    renderPlan(essay);

  } catch(err) {
    document.getElementById('planCanvas').innerHTML =
      `<div class="state-msg">Could not load ideas.json<br>
       <small style="opacity:0.35;margin-top:0.5rem;display:block;">${err.message}</small></div>`;
  }
}

init();
</script>
</body>
</html>
