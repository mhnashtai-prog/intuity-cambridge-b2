<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Essay Questions — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --c-teal:#3d9e95;--c-teal-lt:#e4f4f2;--c-teal-mid:#8dccc7;
  --c-coral:#e8723a;--c-coral-lt:#fdf0ea;--c-coral-mid:#f5ad87;
  --c-purple:#7b5ea7;--c-purple-lt:#f0ecf8;--c-purple-mid:#b9a3d3;
  --c-rose:#c94f6d;--c-rose-lt:#faedf1;--c-rose-mid:#e89db0;
  --c-gold:#c08b2f;--c-gold-lt:#fdf6e3;--c-gold-mid:#e4c073;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}

.filter-bar{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.filter-bar::-webkit-scrollbar{display:none}
.ftab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.ftab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ftab.active{background:var(--ink);color:#fff}

.stage{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}

.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* POSTER CARD */
.poster{position:relative;width:min(400px,88vw);height:min(500px,80vh);background:var(--white);border-radius:1.4rem;display:flex;flex-direction:column;overflow:visible;box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,4px 6px 0 rgba(0,0,0,0.06),0 20px 50px rgba(0,0,0,0.18),0 4px 12px rgba(0,0,0,0.1);animation:cardEnter 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes cardEnter{0%{opacity:0;transform:scale(0.82) translateY(-60px) rotate(-3deg)}65%{opacity:1;transform:scale(1.02) translateY(6px) rotate(0.5deg)}100%{opacity:1;transform:scale(1) translateY(0) rotate(0deg)}}

.flag{position:absolute;top:-2px;left:1.8rem;width:56px;z-index:10;display:flex;flex-direction:column;align-items:center}
.flag-body{width:100%;padding:0.5rem 0 0.35rem;display:flex;align-items:center;justify-content:center;position:relative}
.flag-body::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:9px;background:inherit;clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%)}
.flag-num{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.02em}

.cat-label{position:absolute;top:1.1rem;right:1.4rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;opacity:0.35}

.card-body{flex:1;display:flex;flex-direction:column;padding:3.8rem 1.8rem 1rem;gap:0;overflow:hidden}
.type-tag{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,0,0,0.28);margin-bottom:0.7rem}
.question-text{font-family:'Instrument Sans',sans-serif;font-size:0.95rem;font-weight:400;line-height:1.6;color:rgba(0,0,0,0.78);padding-bottom:0.9rem;margin-bottom:0.85rem;border-bottom:1.5px dashed rgba(0,0,0,0.1);flex-shrink:0}
.stem{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;line-height:1.1;letter-spacing:0.01em;text-transform:uppercase;color:var(--ink);margin-bottom:0.8rem;flex-shrink:0}
.key-points{display:flex;flex-direction:column;gap:0.45rem;padding-left:1.1rem;border-left:3px solid;margin-left:0.2rem;flex:1;overflow:hidden}
.kp-item{display:flex;align-items:flex-start;gap:0.5rem;font-family:'Barlow',sans-serif;font-size:0.82rem;font-weight:600;line-height:1.35;color:rgba(0,0,0,0.55)}
.kp-arrow{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:0.05rem;opacity:0.55}

.card-foot{display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1.4rem 0.85rem;flex-shrink:0}
.card-nav-btn{background:none;border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.28);transition:all 0.2s}
.card-nav-btn:hover{background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.6)}
.card-nav-btn:disabled{opacity:0.15;cursor:default}
.card-counter{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:0.06em;color:rgba(0,0,0,0.25)}
.accent-bar{height:5px;border-radius:0 0 1.4rem 1.4rem;flex-shrink:0}

/* COLOUR THEMES */
.p-teal .flag-body{background:var(--c-teal)}.p-teal .cat-label{color:var(--c-teal)}.p-teal .stem{color:var(--c-teal)}.p-teal .key-points{border-color:var(--c-teal-mid)}.p-teal .kp-arrow{color:var(--c-teal)}.p-teal .accent-bar{background:var(--c-teal)}.p-teal .card-counter{color:var(--c-teal)}
.p-coral .flag-body{background:var(--c-coral)}.p-coral .cat-label{color:var(--c-coral)}.p-coral .stem{color:var(--c-coral)}.p-coral .key-points{border-color:var(--c-coral-mid)}.p-coral .kp-arrow{color:var(--c-coral)}.p-coral .accent-bar{background:var(--c-coral)}.p-coral .card-counter{color:var(--c-coral)}
.p-purple .flag-body{background:var(--c-purple)}.p-purple .cat-label{color:var(--c-purple)}.p-purple .stem{color:var(--c-purple)}.p-purple .key-points{border-color:var(--c-purple-mid)}.p-purple .kp-arrow{color:var(--c-purple)}.p-purple .accent-bar{background:var(--c-purple)}.p-purple .card-counter{color:var(--c-purple)}
.p-rose .flag-body{background:var(--c-rose)}.p-rose .cat-label{color:var(--c-rose)}.p-rose .stem{color:var(--c-rose)}.p-rose .key-points{border-color:var(--c-rose-mid)}.p-rose .kp-arrow{color:var(--c-rose)}.p-rose .accent-bar{background:var(--c-rose)}.p-rose .card-counter{color:var(--c-rose)}
.p-gold .flag-body{background:var(--c-gold)}.p-gold .cat-label{color:var(--c-gold)}.p-gold .stem{color:var(--c-gold)}.p-gold .key-points{border-color:var(--c-gold-mid)}.p-gold .kp-arrow{color:var(--c-gold)}.p-gold .accent-bar{background:var(--c-gold)}.p-gold .card-counter{color:var(--c-gold)}

.swipe-hint{position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);font-size:0.58rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.18);pointer-events:none;animation:hintFade 3.5s ease 1.5s forwards;white-space:nowrap}
@keyframes hintFade{0%{opacity:1}80%{opacity:1}100%{opacity:0}}
.loading-msg{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.25);letter-spacing:0.12em;text-transform:uppercase}
@media(max-width:480px){.poster{width:min(340px,94vw);height:min(445px,78vh)}.question-text{font-size:0.9rem}.stem{font-size:1.25rem}.flag-num{font-size:1.6rem}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="../../../index.html?openModal=writing&submenu=essays">← Essays</a>
    <span class="brand">INTUITY</span>
    <div style="width:60px"></div>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="stage" id="stage">
    <div class="loading-msg" id="loadingMsg">Loading…</div>
    <div class="swipe-hint">swipe to browse</div>
  </div>
  <div class="foot">
    <div class="nav-pill">
      <button class="nb on" onclick="navTo('question')">Question</button>
      <button class="nb"    onclick="navTo('plan')">Plan</button>
      <button class="nb"    onclick="navTo('model')">Model</button>
      <button class="nb"    onclick="navTo('build')">Build</button>
      <button class="nb"    onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>
<script>
const TYPE_COLOR={'opinion':'p-teal','for-against':'p-coral','problem-solution':'p-purple','cause-effect':'p-rose','speculation-trends':'p-gold'};
const TYPE_LABEL={'opinion':'Opinion','for-against':'For & Against','problem-solution':'Problem & Solution','cause-effect':'Cause & Effect','speculation-trends':'Speculation & Trends'};
const FILTERS=['all','opinion','for-against','problem-solution','cause-effect','speculation-trends'];
let allQs=[],filteredQs=[],current=0,activeFilter='all',touchStartX=0;

function buildFilterBar(){
  document.getElementById('filterBar').innerHTML=FILTERS.map(f=>{
    const count=f==='all'?allQs.length:allQs.filter(q=>(q.essayType||q.type||'')===f).length;
    const label=f==='all'?`All (${count})`:`${TYPE_LABEL[f]||f} (${count})`;
    return `<button class="ftab ${f===activeFilter?'active':''}" onclick="applyFilter('${f}')">${label}</button>`;
  }).join('');
}
function applyFilter(f){activeFilter=f;filteredQs=f==='all'?[...allQs]:allQs.filter(q=>(q.essayType||q.type||'')===f);current=0;buildFilterBar();if(filteredQs.length)showCard(0);}

function buildCard(q,idx,total){
  const color=TYPE_COLOR[q.essayType||q.type||'']||'p-teal';
  const typeLabel=TYPE_LABEL[q.essayType||q.type||'']||'Essay';
  const points=q.writingPoints||[];
  const el=document.createElement('div');
  el.className=`poster ${color}`;
  el.innerHTML=`
    <div class="flag"><div class="flag-body"><span class="flag-num">${String(idx+1).padStart(2,'0')}</span></div></div>
    <span class="cat-label">${typeLabel}</span>
    <div class="card-body">
      <div class="type-tag">Write a formal essay</div>
      <div class="question-text">${q.mainQuestion}</div>
      <div class="stem">Your essay should cover</div>
      <div class="key-points">${points.map(p=>`<div class="kp-item"><span class="kp-arrow"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 2L7.5 5.5L3.5 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>${p}</span></div>`).join('')}</div>
    </div>
    <div class="card-foot">
      <button class="card-nav-btn" onclick="go(-1)" ${idx===0?'disabled':''}><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7L9 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <span class="card-counter">${idx+1} / ${total}</span>
      <button class="card-nav-btn" onclick="go(1)" ${idx===total-1?'disabled':''}><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3L9 7L5 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <div class="accent-bar"></div>`;
  return el;
}

function showCard(idx){
  current=Math.max(0,Math.min(idx,filteredQs.length-1));
  const stage=document.getElementById('stage');
  const old=stage.querySelector('.poster');
  if(old)old.remove();
  const q=filteredQs[current];
  if(!q)return;
  stage.appendChild(buildCard(q,current,filteredQs.length));
  sessionStorage.setItem('currentQuestion',JSON.stringify({id:q.id,mainQuestion:q.mainQuestion,context:q.context||'',writingPoints:q.writingPoints||[],essayType:q.essayType||q.type||'opinion'}));
}
function go(dir){const n=current+dir;if(n<0||n>=filteredQs.length)return;showCard(n);}

document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-touchStartX;if(dx<-55)go(1);if(dx>55)go(-1);},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});

function navTo(dest){
  if(dest==='question')return;
  const map={plan:'essay-plan.html',model:'essay-builder.html',build:'essay-builder-interactive.html',sample:'essay-master.html'};
  if(map[dest])window.location.href=map[dest];
}

async function init(){
  try{
    const r=await fetch('data/essay-questions.json');
    if(!r.ok)throw new Error();
    const data=await r.json();
    allQs=data.questions||[];
    filteredQs=[...allQs];
    document.getElementById('loadingMsg').remove();
    buildFilterBar();
    let startIdx=0;
    try{const saved=sessionStorage.getItem('currentQuestion');if(saved){const q=JSON.parse(saved);if(q.id){const f=filteredQs.findIndex(x=>x.id===q.id);if(f>=0)startIdx=f;}}}catch(e){}
    if(filteredQs.length)showCard(startIdx);
  }catch(e){document.getElementById('loadingMsg').textContent='⚠ Could not load questions';}
}
init();
</script>
</body>
</html>
