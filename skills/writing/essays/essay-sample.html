<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Sample Essay — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;--rule:rgba(0,0,0,0.07);
  --acc:#7b5ea7; /* sample = lettuce green but purple as fallback */
  --gold:#C9A961;

  /* category colours — mirror the Model page's phrase families:
     discourse = signpost / linking words, opinion = view / stance phrases,
     causal    = reason → result chain (the "support move" layer) */
  --c-discourse:#2563EB; --c-discourse-bg:rgba(37,99,235,0.10);
  --c-opinion:#7b5ea7;   --c-opinion-bg:rgba(123,94,167,0.12);
  --c-causal:#1a8f5e;    --c-causal-bg:rgba(26,143,94,0.10);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.topic-label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-align:right;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}

/* ── STAGE ── */
.stage{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* ── FOOTER NAV ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ── POSTER CARD ── */
.poster{
  width:min(420px,90vw);height:min(560px,83vh);
  background:var(--white);border-radius:1.4rem;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
  box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,4px 6px 0 rgba(0,0,0,0.06),0 20px 50px rgba(0,0,0,0.18),0 4px 12px rgba(0,0,0,0.1);
  animation:cardUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardUp{
  0%{opacity:0;transform:scale(0.92) translateY(20px)}
  65%{opacity:1;transform:scale(1.01) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

/* ── FLAG ── */
.flag{position:absolute;top:-2px;left:1.8rem;width:56px;z-index:10;display:flex;flex-direction:column;align-items:center}
.flag-body{width:100%;padding:0.5rem 0 0.35rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.1rem;position:relative;background:var(--acc)}
.flag-num{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.02em}
.flag-label{font-family:'Barlow Condensed',sans-serif;font-size:0.42rem;font-weight:900;color:rgba(255,255,255,0.75);letter-spacing:0.14em;text-transform:uppercase;line-height:1}
.flag-body::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:9px;background:var(--acc);clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%)}

/* ── CARD TOOLBAR ── */
.card-toolbar{
  flex-shrink:0;padding:3.5rem 1rem 0.5rem;
  display:flex;align-items:center;gap:0.35rem;
  border-bottom:1px solid rgba(0,0,0,0.06);
  flex-wrap:wrap;
}

/* Style selector */
.style-btn{
  font-family:'Barlow Condensed',sans-serif;font-size:0.56rem;font-weight:900;
  letter-spacing:0.08em;text-transform:uppercase;
  padding:0.26rem 0.7rem;border-radius:999px;
  border:1.5px solid rgba(0,0,0,0.12);
  background:transparent;color:rgba(0,0,0,0.35);
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.style-btn:hover{border-color:rgba(0,0,0,0.25);color:rgba(0,0,0,0.65)}
.style-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
.style-btn.hidden{display:none}
.style-btn.guided{border-color:var(--acc);color:var(--acc)}
.style-btn.guided.active{background:var(--acc);border-color:var(--acc);color:#fff}

.toolbar-sep{width:1px;height:18px;background:rgba(0,0,0,0.08);flex-shrink:0;margin:0 0.1rem}

.toolbar-spacer{flex:1}

/* View toggle */
.view-toggle{display:flex;background:rgba(0,0,0,0.05);border-radius:999px;padding:0.18rem;gap:0.12rem}
.vt-btn{
  font-family:'Barlow Condensed',sans-serif;font-size:0.54rem;font-weight:900;
  letter-spacing:0.06em;text-transform:uppercase;
  padding:0.24rem 0.65rem;border-radius:999px;border:none;
  background:transparent;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;
}
.vt-btn:hover{color:rgba(0,0,0,0.65)}
.vt-btn.active{background:var(--ink);color:#fff}

/* X-Ray toggle — sits on its own row so it doesn't crowd style/view controls */
.xray-row{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:0.5rem;
  padding:0.4rem 1.2rem;border-bottom:1px solid rgba(0,0,0,0.05);
}
.xray-toggle{display:flex;align-items:center;gap:0.4rem}
.xray-switch{
  width:30px;height:17px;border-radius:999px;background:rgba(0,0,0,0.12);
  position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;
}
.xray-switch.on{background:var(--c-discourse)}
.xray-switch::after{
  content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;
  background:#fff;transition:transform 0.2s;box-shadow:0 1px 2px rgba(0,0,0,0.25);
}
.xray-switch.on::after{transform:translateX(13px)}
.xray-label{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.45)}
.legend{display:flex;gap:0.65rem;flex-wrap:wrap;justify-content:flex-end}
.legend-item{display:flex;align-items:center;gap:0.28rem;font-family:'Instrument Sans',sans-serif;font-size:0.62rem;color:rgba(0,0,0,0.42);white-space:nowrap}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-dot.discourse{background:var(--c-discourse)}
.legend-dot.opinion{background:var(--c-opinion)}
.legend-dot.causal{background:var(--c-causal)}
.legend.hidden,.xray-row .legend.hidden{display:none}

/* ── SCROLL AREA ── */
.card-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1.2rem 0.5rem}
.card-scroll::-webkit-scrollbar{width:3px}
.card-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

/* Essay text */
.para-label{
  font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;
  letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(0,0,0,0.28);margin-bottom:0.5rem;
}
.para-text{
  font-family:'Instrument Sans',sans-serif;
  font-size:0.88rem;line-height:1.8;
  color:rgba(0,0,0,0.78);font-weight:400;
  margin-bottom:1.4rem;
}
.para-text:last-child{margin-bottom:0}

/* ── CATEGORY HIGHLIGHTING (X-Ray) ──
   These classes are authored directly into samples.json content —
   discourse = signpost/linking words, opinion = personal-view phrases,
   causal = reason→result chain. Colour-coding them (rather than re-detecting
   markers with a separate word list) keeps this page in sync with whatever
   phrase families the Model page teaches. */
.xray-on .discourse{color:var(--c-discourse);font-weight:600;background:var(--c-discourse-bg);padding:0.05em 0.2em;border-radius:3px}
.xray-on .opinion{color:var(--c-opinion);font-weight:600;background:var(--c-opinion-bg);padding:0.05em 0.2em;border-radius:3px}
.xray-on .causal{color:var(--c-causal);font-weight:600;background:var(--c-causal-bg);padding:0.05em 0.2em;border-radius:3px}

/* ── PARA NAV ── */
.para-nav{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0.5rem 1rem;border-top:1px solid rgba(0,0,0,0.06);
}
.para-nav.hidden{display:none}
.para-arrow{
  background:none;border:1.5px solid rgba(0,0,0,0.12);
  width:1.9rem;height:1.9rem;border-radius:50%;
  font-size:0.75rem;cursor:pointer;color:rgba(0,0,0,0.35);
  display:flex;align-items:center;justify-content:center;transition:all 0.18s;
}
.para-arrow:hover:not(:disabled){border-color:rgba(0,0,0,0.3);color:var(--ink)}
.para-arrow:disabled{opacity:0.22;cursor:not-allowed}
.para-nav-label{
  font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.35);
}

/* ── ACCENT BAR ── */
.accent-bar{height:4px;background:var(--acc);flex-shrink:0;border-radius:0 0 1.4rem 1.4rem;opacity:0.7}

/* ── STATE MSG ── */
.state-msg{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:0.75rem;font-size:0.85rem;color:rgba(0,0,0,0.28);
  text-align:center;line-height:1.6;font-family:'Barlow',sans-serif;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;
  padding:0.45rem 1.1rem;border-radius:2rem;
  font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.06em;
  opacity:0;pointer-events:none;transition:opacity 0.25s;z-index:600;white-space:nowrap;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <a class='back-link' href='/skills/writing/essays/essay-question'>← Essays</a>
    <span class="brand">INTUITY</span>
    <span class="topic-label" id="topicLabel">Sample</span>
  </div>

  <div class="stage">
    <div class="poster" id="posterCard">

      <div class="flag">
        <div class="flag-body">
          <span class="flag-num">05</span>
        </div>
      </div>

      <!-- Toolbar: style selector + view toggle -->
      <div class="card-toolbar">
        <button class="style-btn active" id="styleDefault"  onclick="selectStyle('default')">Default</button>
        <button class="style-btn"        id="styleAlt1"     onclick="selectStyle('alternative1')">Alt 1</button>
        <button class="style-btn"        id="styleAlt2"     onclick="selectStyle('alternative2')">Alt 2</button>
        <button class="style-btn guided hidden" id="styleGuided" onclick="selectStyle('guided')">Guided</button>
        <div class="toolbar-spacer"></div>
        <div class="view-toggle">
          <button class="vt-btn active" id="vtFull"  onclick="setViewMode(true)">Full</button>
          <button class="vt-btn"        id="vtParas" onclick="setViewMode(false)">Paragraphs</button>
        </div>
      </div>

      <!-- X-Ray toggle + legend -->
      <div class="xray-row">
        <div class="xray-toggle" onclick="toggleXray()">
          <div class="xray-switch on" id="xraySwitch"></div>
          <span class="xray-label">X-Ray</span>
        </div>
        <div class="legend" id="legend">
          <span class="legend-item"><span class="legend-dot discourse"></span>Signpost</span>
          <span class="legend-item"><span class="legend-dot opinion"></span>View</span>
          <span class="legend-item"><span class="legend-dot causal"></span>Reason → Result</span>
        </div>
      </div>

      <!-- Content -->
      <div class="card-scroll" id="infographic">
        <div class="state-msg">Loading…</div>
      </div>

      <!-- Paragraph navigation (paragraphs mode only) -->
      <div class="para-nav hidden" id="paraNav">
        <button class="para-arrow" id="btnPrev" onclick="goPrev()" disabled>←</button>
        <div class="para-nav-label" id="paraLabel">Introduction</div>
        <button class="para-arrow" id="btnNext" onclick="goNext()">→</button>
      </div>

      <div class="accent-bar"></div>
    </div>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Question</button>
      <button class="nb"    onclick="navTo('plan')">Plan</button>
      <button class="nb"    onclick="navTo('model')">Model</button>
      <button class="nb"    onclick="navTo('build')">Build</button>
      <button class="nb on" onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══ STATE ══ */
let question=null,paragraphs=[],currentPara=0,currentStyle='default';
let xrayOn=true,fullTextMode=true;
let sampleData=null;
let paraLabels=['Introduction','Body 1','Body 2','Body 3','Conclusion']; /* fallback, overwritten from writingPoints */

/* ══ HELPERS ══ */
function extractParagraphs(html){
  const div=document.createElement('div');div.innerHTML=html;
  const ps=div.querySelectorAll('p');
  if(ps.length)return Array.from(ps).map(p=>p.innerHTML.trim()).filter(Boolean);
  return html.split(/\n\n+/).map(s=>s.trim()).filter(Boolean);
}

function titleCase(s){
  if(!s) return s;
  return s.charAt(0).toUpperCase()+s.slice(1);
}

/* Build paragraph labels from the Plan's writingPoints so the Sample page
   reads as a direct continuation of the Plan (Intro, then each writing point,
   then Conclusion) instead of generic "Body 1/2/3". Falls back gracefully
   if the point count doesn't match the paragraph count. */
function buildParaLabels(totalParas){
  const points = (question&&Array.isArray(question.writingPoints)&&question.writingPoints.length)
    ? question.writingPoints
    : (sampleData&&Array.isArray(sampleData.writingPoints)?sampleData.writingPoints:null);

  if(points && totalParas===points.length+2){
    return ['Introduction', ...points.map(p=>titleCase(p.replace(/\s*\(your own idea\)\s*/i,''))), 'Conclusion'];
  }
  /* fallback: generic numbering that still adapts to paragraph count */
  const labels=['Introduction'];
  for(let i=1;i<totalParas-1;i++) labels.push(`Body ${i}`);
  if(totalParas>1) labels.push('Conclusion');
  return labels;
}

/* ══ VIEW MODE ══ */
function setViewMode(isFull){
  fullTextMode=isFull;
  document.getElementById('vtFull').classList.toggle('active',isFull);
  document.getElementById('vtParas').classList.toggle('active',!isFull);
  document.getElementById('paraNav').classList.toggle('hidden',isFull);
  render();
}

/* ══ X-RAY TOGGLE ══ */
function toggleXray(){
  xrayOn=!xrayOn;
  document.getElementById('xraySwitch').classList.toggle('on',xrayOn);
  document.getElementById('legend').classList.toggle('hidden',!xrayOn);
  render();
}

/* ══ RENDER ══ */
function render(){
  const box=document.getElementById('infographic');
  if(!paragraphs.length){box.innerHTML='<div class="state-msg">No sample essay found for this question yet.</div>';return;}
  let html='';
  if(fullTextMode){
    html=paragraphs.map(para=>`<div class="para-text ${xrayOn?'xray-on':''}">${para}</div>`).join('');
    box.innerHTML=html;
  }else{
    const p=paragraphs[currentPara]||'';
    const label=paraLabels[currentPara]||`Paragraph ${currentPara+1}`;
    box.innerHTML=`<div class="para-label">${label}</div><div class="para-text ${xrayOn?'xray-on':''}">${p}</div>`;
    updateNav();
  }
}

/* ══ NAV ══ */
function updateNav(){
  document.getElementById('btnPrev').disabled=currentPara===0;
  document.getElementById('btnNext').disabled=currentPara>=paragraphs.length-1;
  document.getElementById('paraLabel').textContent=paraLabels[currentPara]||`Paragraph ${currentPara+1}`;
}
function goPrev(){if(currentPara>0){currentPara--;render();}}
function goNext(){if(currentPara<paragraphs.length-1){currentPara++;render();}}

/* ══ STYLE ══ */
function selectStyle(style){
  currentStyle=style;
  document.getElementById('styleDefault').classList.toggle('active',style==='default');
  document.getElementById('styleAlt1').classList.toggle('active',style==='alternative1');
  document.getElementById('styleAlt2').classList.toggle('active',style==='alternative2');
  document.getElementById('styleGuided').classList.toggle('active',style==='guided');
  if(sampleData){
    const html=sampleData.styles?.[style]||sampleData.styles?.default||sampleData.html||'';
    paragraphs=extractParagraphs(html);
    currentPara=0;
    paraLabels=buildParaLabels(paragraphs.length);
    render();
  }
}

/* ══ TOAST ══ */
let _tt;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2200);
}

/* ══ KEYBOARD + SWIPE ══ */
document.addEventListener('keydown',e=>{
  if(fullTextMode)return;
  if(e.key==='ArrowRight')goNext();
  if(e.key==='ArrowLeft')goPrev();
});
let _tx=0;
if('ontouchstart' in window){
  document.addEventListener('touchstart',e=>{_tx=e.changedTouches[0].screenX;});
  document.addEventListener('touchend',e=>{
    if(fullTextMode)return;
    const dx=e.changedTouches[0].screenX-_tx;
    if(dx<-50)goNext();if(dx>50)goPrev();
  });
}

/* ══ FOOTER NAV ══ */
function navTo(dest){
  if(dest==='sample')return;
  if(question)sessionStorage.setItem('currentQuestion',JSON.stringify(question));
  const map={question:'essay-question.html',plan:'essay-plan.html',model:'essay-cards.html',build:'essay-build.html'};
  if(map[dest])window.location.href=map[dest];
}

/* ══ INIT ══ */
async function init(){
  try{question=JSON.parse(sessionStorage.getItem('currentQuestion'));}catch(e){}

  /* Topic label */
  if(question){
    const label=question.topic||question.topicLabel||(question.mainQuestion||question.question||'').substring(0,35);
    if(label)document.getElementById('topicLabel').textContent=label.toUpperCase();
  }

  if(!question){
    document.getElementById('infographic').innerHTML='<div class="state-msg">No question selected.<br>Return to Questions to choose one.</div>';
    return;
  }

  const lookupId=question.questionId||question.id;

  /* Sample data */
  try{
    const res=await fetch('data/samples.json');
    if(!res.ok)throw new Error('samples.json not found');
    const data=await res.json();
    const pool=Array.isArray(data)?data:(data.opinion||data.samples||data.essays||[]);
    const match=pool.find(s=>s.id===lookupId);
    if(!match){
      document.getElementById('infographic').innerHTML=`<div class="state-msg">No sample essay for this question yet.</div>`;
      return;
    }
    sampleData=match;

    /* Show the Guided button only when this essay actually has a guided style authored */
    document.getElementById('styleGuided').classList.toggle('hidden', !match.styles?.guided);

    const html=match.styles?.default||match.html||match.text||'';
    paragraphs=extractParagraphs(html);
    paraLabels=buildParaLabels(paragraphs.length);
    render();
  }catch(err){
    document.getElementById('infographic').innerHTML=`<div class="state-msg">⚠ Could not load samples.json</div>`;
  }
}

init();
</script>
</body>
</html>
