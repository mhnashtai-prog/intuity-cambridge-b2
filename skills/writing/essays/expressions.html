<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expressions — INTUITY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f0efec; --card:#ffffff; --ink:#2c2c2a; --soft:#8a8880;
    --gold:#C9A961; --gold-d:#9a7d3f; --link:#4a90d9; --dark:#0c0c0c;
    --line:rgba(0,0,0,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg); color:var(--ink); min-height:100vh;
    font-family:'Instrument Sans',sans-serif;
    padding-bottom:90px;
  }
  .cond{font-family:'Barlow Condensed',sans-serif}

  /* ── top bar ── */
  header{
    position:sticky; top:0; z-index:20;
    background:rgba(240,239,236,0.95); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 18px;
  }
  header a{color:var(--soft); text-decoration:none; font-size:12px; letter-spacing:.12em}
  #title{color:var(--gold-d); font-size:13px; letter-spacing:.35em; font-weight:500}
  #pocketBtn{
    background:var(--dark); color:#e8e6e0; border:none; cursor:pointer;
    border-radius:999px; padding:7px 14px; display:flex; align-items:center; gap:8px;
    font-family:'Barlow Condensed',sans-serif; letter-spacing:.12em; font-size:12px;
  }
  #pocketBtn .n{
    background:var(--gold); color:var(--dark); border-radius:999px;
    min-width:18px; height:18px; display:flex; align-items:center; justify-content:center;
    font-size:11px; padding:0 5px;
  }
  #pocketBtn.pulse{animation:pulse .35s ease}
  @keyframes pulse{50%{transform:scale(1.08)}}
  @media (prefers-reduced-motion:reduce){#pocketBtn.pulse{animation:none}}

  main{max-width:680px; margin:0 auto; padding:18px 20px 30px}

  /* ── question strip ── */
  #qstrip{display:flex; align-items:center; gap:10px; margin-bottom:14px}
  .qnav{
    border:1px solid rgba(0,0,0,0.15); background:var(--card); color:var(--ink);
    width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:15px; flex:none;
  }
  .qnav:disabled{opacity:.25; cursor:default}
  #qpill{
    flex:1; background:var(--dark); border-radius:999px; padding:8px 16px;
    display:flex; align-items:center; gap:10px; min-width:0;
  }
  #qnum{color:var(--gold); font-size:11px; letter-spacing:.12em; flex:none}
  #qtext{color:#e8e6e0; font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  #styleDots{display:flex; gap:6px; flex:none}
  .sdot{
    width:26px; height:26px; border-radius:50%; cursor:pointer;
    border:1px solid rgba(0,0,0,0.15); background:var(--card); color:var(--soft);
    font-family:'Barlow Condensed',sans-serif; font-size:12px;
  }
  .sdot.on{background:var(--gold); border-color:var(--gold); color:var(--dark)}

  /* ── altitude switch ── */
  #altSeg{
    display:flex; justify-content:center; gap:2px; margin-bottom:20px;
  }
  #altSeg button{
    border:none; background:transparent; cursor:pointer; color:var(--soft);
    font-family:'Barlow Condensed',sans-serif; letter-spacing:.2em; font-size:12px;
    padding:7px 16px; border-radius:999px;
  }
  #altSeg button.on{background:var(--ink); color:var(--bg)}

  /* ── register grammar (the one costume) ── */
  .discourse,.frame{color:var(--gold-d); font-weight:500}
  .opinion{color:var(--gold-d); font-style:italic}
  .causal{color:var(--link)}
  span.tk{cursor:pointer; border-radius:3px; transition:background .15s}
  span.tk:hover{background:rgba(201,169,97,0.15)}
  span.tk.kept{border-bottom:2px dotted var(--gold)}

  /* ── TEXT altitude ── */
  .para{background:var(--card); border-radius:12px; padding:16px 20px; margin-bottom:12px}
  .plabel{color:var(--gold-d); font-size:11px; letter-spacing:.2em; margin-bottom:8px}
  .ptext{font-size:16.5px; line-height:1.8}

  /* ── SKELETON altitude ── */
  .skel .ptext{font-size:19px; line-height:1.9; color:#b9b7b0}
  .skel .gap{color:#cfcdc5; letter-spacing:.05em}

  /* ── SHELF altitude ── */
  .aisle{margin-bottom:22px}
  .aname{color:var(--gold-d); font-size:11px; letter-spacing:.22em; margin-bottom:10px}
  .chips{display:flex; flex-wrap:wrap; gap:8px}
  .chip{
    background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:7px 14px; font-size:13.5px; cursor:pointer; line-height:1.4;
    transition:border-color .15s;
  }
  .chip:hover{border-color:var(--gold)}
  .chip.kept{border:1px solid var(--gold); color:var(--gold-d)}

  #hint{
    text-align:center; color:#b0aea6; font-size:11px; letter-spacing:.15em;
    margin:6px 0 16px;
  }

  /* ── pocket drawer ── */
  #pback{
    position:fixed; inset:0; background:rgba(20,18,22,0.45); z-index:40;
    display:none; justify-content:flex-end;
  }
  #pback.on{display:flex}
  #ppanel{
    background:var(--dark); color:#e8e6e0; width:min(360px,92vw); height:100%;
    padding:20px 18px; display:flex; flex-direction:column;
  }
  #phead{display:flex; align-items:center; margin-bottom:6px}
  #phead h3{font-family:'Barlow Condensed',sans-serif; font-weight:500;
    letter-spacing:.25em; font-size:13px; color:var(--gold)}
  #pclose{margin-left:auto; border:none; background:rgba(255,255,255,0.08);
    color:#e8e6e0; width:30px; height:30px; border-radius:50%; cursor:pointer}
  #psub{color:#8a8880; font-size:11px; letter-spacing:.08em; margin-bottom:14px}
  #plist{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px}
  .pitem{
    background:#161616; border:0.5px solid #2a2a2a; border-radius:10px;
    padding:9px 12px; display:flex; align-items:flex-start; gap:9px;
  }
  .pmove{color:var(--gold); font-size:9.5px; letter-spacing:.12em;
    font-family:'Barlow Condensed',sans-serif; flex:none; margin-top:3px}
  .ptxt{flex:1; font-size:13px; line-height:1.45}
  .pdel{border:none; background:none; color:#5f5e5a; cursor:pointer; font-size:13px; flex:none}
  #pempty{color:#5f5e5a; font-style:italic; font-size:13px; text-align:center; padding:30px 10px; line-height:1.6}
  #pfoot{display:flex; gap:8px; margin-top:14px; padding-top:14px; border-top:0.5px solid #2a2a2a}
  #printBtn{
    flex:1; border:none; background:var(--gold); color:var(--dark); cursor:pointer;
    border-radius:8px; padding:11px; font-family:'Barlow Condensed',sans-serif;
    letter-spacing:.15em; font-size:12px; font-weight:600;
  }
  #printBtn:disabled{opacity:.35; cursor:default}
  #clearBtn{
    border:1px solid #3a3a3a; background:none; color:#8a8880; cursor:pointer;
    border-radius:8px; padding:11px 14px; font-family:'Barlow Condensed',sans-serif;
    letter-spacing:.12em; font-size:11px;
  }

  /* ── the printed card ── */
  #printCard{display:none}
  @media print{
    body>*{display:none !important}
    #printCard{display:block !important; font-family:'Instrument Sans',sans-serif; color:#1a1a1a}
    .pc{width:105mm; border:0.4mm solid #C9A961; border-radius:4mm; padding:8mm; margin:0 auto}
    .pc-brand{font-family:'Barlow Condensed',sans-serif; letter-spacing:.3em;
      font-size:9pt; color:#9a7d3f; text-align:center}
    .pc-title{text-align:center; font-size:8pt; color:#777; letter-spacing:.15em; margin:2mm 0 5mm}
    .pc-move{font-family:'Barlow Condensed',sans-serif; font-size:7.5pt; letter-spacing:.15em;
      color:#9a7d3f; margin:3.5mm 0 1mm}
    .pc-item{font-size:10pt; line-height:1.5; padding-left:3mm}
    .pc-foot{margin-top:5mm; text-align:center; font-size:7pt; color:#999; letter-spacing:.1em}
  }
</style>
</head>
<body>

<header>
  <a href="essay-question.html" class="cond">&#8592; WRITING</a>
  <span id="title" class="cond">EXPRESSIONS</span>
  <button id="pocketBtn" type="button">MY POCKET <span class="n" id="pcount">0</span></button>
</header>

<main>
  <div id="qstrip">
    <button class="qnav" id="qPrev" aria-label="Previous essay">&#8249;</button>
    <div id="qpill">
      <span id="qnum" class="cond">Q01</span>
      <span id="qtext"></span>
    </div>
    <div id="styleDots">
      <button class="sdot on" data-s="0">A</button>
      <button class="sdot" data-s="1">B</button>
      <button class="sdot" data-s="2">C</button>
    </div>
    <button class="qnav" id="qNext" aria-label="Next essay">&#8250;</button>
  </div>

  <div id="altSeg">
    <button data-a="text" class="on">TEXT</button>
    <button data-a="skeleton">SKELETON</button>
    <button data-a="shelf">SHELF</button>
  </div>

  <div id="hint" class="cond">TAP ANY EXPRESSION TO KEEP IT</div>
  <div id="stage"></div>
</main>

<div id="pback">
  <aside id="ppanel" aria-label="My pocket">
    <div id="phead"><h3>MY POCKET</h3><button id="pclose">&#10005;</button></div>
    <div id="psub">Expressions you chose. Yours to print, yours to use.</div>
    <div id="plist"></div>
    <div id="pfoot">
      <button id="clearBtn" type="button">CLEAR</button>
      <button id="printBtn" type="button">PRINT MY CARD</button>
    </div>
  </aside>
</div>

<div id="printCard"></div>

<script>
(function(){
  'use strict';

  /* ─────────────────── state ─────────────────── */
  var essays=[], pools=null;
  var qi=0, styleIdx=0, altitude='text';
  var STYLES=['default','alternative1','alternative2'];
  var PARA_NAMES=['OPENING','FIRST POINT','SECOND POINT','THIRD POINT','CLOSING'];
  var MOVE_OF={discourse:'SIGNPOST', frame:'FRAME', causal:'LINKER', opinion:'STANCE'};

  /* the pocket: [{t:text, m:move}] — the learner's chosen expressions */
  var pocket=loadPocket();
  function loadPocket(){
    try{ var p=JSON.parse(localStorage.getItem('intuityPocket')||'[]');
         return Array.isArray(p)?p:[]; }catch(e){ return []; }
  }
  function savePocket(){ try{ localStorage.setItem('intuityPocket',JSON.stringify(pocket)); }catch(e){} }
  function norm(s){ return s.replace(/\s+/g,' ').trim(); }
  function inPocket(t){ t=norm(t); return pocket.some(function(p){return p.t===t;}); }
  function togglePocket(t,m){
    t=norm(t); if(!t) return;
    var i=-1;
    for(var k=0;k<pocket.length;k++) if(pocket[k].t===t){ i=k; break; }
    if(i===-1) pocket.push({t:t,m:m||''}); else pocket.splice(i,1);
    savePocket(); syncCount(i===-1); markKept(); renderPocket();
  }
  function syncCount(pulse){
    var b=document.getElementById('pocketBtn');
    document.getElementById('pcount').textContent=pocket.length;
    if(pulse){ b.classList.remove('pulse'); void b.offsetWidth; b.classList.add('pulse'); }
  }

  /* ─────────────────── boot ─────────────────── */
  Promise.all([
    fetch('data/samples.json').then(function(r){return r.json();}),
    fetch('data/essay-cards-models.json').then(function(r){return r.json();})
  ]).then(function(res){
    essays=res[0].opinion||[];
    pools=res[1];
    var want=new URLSearchParams(location.search).get('id');
    if(want) essays.forEach(function(e,i){ if(e.id===want) qi=i; });
    syncCount(false); render();
  }).catch(function(){
    document.getElementById('stage').textContent='Could not load the essay data.';
  });

  /* ─────────────────── render dispatch ─────────────────── */
  function render(){
    var e=essays[qi];
    document.getElementById('qnum').textContent='Q'+String(qi+1).padStart(2,'0');
    document.getElementById('qtext').textContent=e.question||e.topic||'';
    document.getElementById('qPrev').disabled = qi===0;
    document.getElementById('qNext').disabled = qi===essays.length-1;
    var st=document.getElementById('stage');
    if(altitude==='shelf') st.innerHTML=shelfHTML();
    else st.innerHTML=textHTML(altitude==='skeleton');
    markKept();
  }

  function paras(){
    var html=(essays[qi].styles&&essays[qi].styles[STYLES[styleIdx]])||'';
    var doc=new DOMParser().parseFromString(html,'text/html');
    return Array.prototype.slice.call(doc.querySelectorAll('p'));
  }

  /* ── TEXT & SKELETON: same essay, two densities ── */
  function textHTML(skeleton){
    return paras().map(function(p,i){
      var body = skeleton ? skeletonOf(p) : tappable(p);
      return '<div class="para'+(skeleton?' skel':'')+'">'
        + '<div class="plabel cond">PARA '+(i+1)+' \u00B7 '+(PARA_NAMES[i]||'')+'</div>'
        + '<div class="ptext">'+body+'</div></div>';
    }).join('');
  }
  /* wrap every marked span so it can be tapped into the pocket */
  function tappable(p){
    var c=p.cloneNode(true);
    Array.prototype.forEach.call(c.querySelectorAll('span'),function(s){
      s.classList.add('tk');
      s.setAttribute('data-m', moveOfSpan(s));
    });
    return c.innerHTML;
  }
  /* skeleton = the same paragraph with its flesh reduced to quiet gaps */
  function skeletonOf(p){
    var c=p.cloneNode(true), out=[];
    Array.prototype.forEach.call(c.childNodes,function(n){
      if(n.nodeType===3){
        if(norm(n.textContent)) out.push('<span class="gap"> \u2026 </span>');
      }else if(n.nodeType===1){
        n.classList.add('tk');
        n.setAttribute('data-m', moveOfSpan(n));
        out.push(n.outerHTML);
      }
    });
    return out.join(' ');
  }
  function moveOfSpan(s){
    for(var k in MOVE_OF) if(s.classList.contains(k)) return MOVE_OF[k];
    return 'PHRASE';
  }

  /* ── SHELF: the whole stock, browsable, nothing dealt ── */
  function flatten(x,out){
    out=out||[];
    if(typeof x==='string'){ if(x.trim()) out.push(x.trim()); }
    else if(Array.isArray(x)) x.forEach(function(v){flatten(v,out);});
    else if(x&&typeof x==='object'){
      Object.keys(x).forEach(function(k){ if(k!=='move'&&k!=='label') flatten(x[k],out); });
    }
    return out;
  }
  function shelfHTML(){
    try{
      var sh=pools.shared, op=pools.types.opinion;
      var aisles=[
        ['WAYS TO OPEN','OPEN', flatten([op.open.aim, sh.view.opinion])],
        ['SIGNPOSTS \u00B7 FIRST','SIGNPOST', flatten(sh.signpost.first)],
        ['SIGNPOSTS \u00B7 ADDING','SIGNPOST', flatten(sh.signpost.addition)],
        ['SIGNPOSTS \u00B7 TURNING','SIGNPOST', flatten(sh.signpost.turn)],
        ['KEY MOVES','KEY', flatten([op.argue.keyOpen, op.argue.keyMore])],
        ['WAYS TO CLOSE','CLOSE', flatten([op.close.summary, op.close.stance, op.close.verdict])]
      ];
      return aisles.map(function(a){
        if(!a[2].length) return '';
        return '<div class="aisle"><div class="aname cond">'+a[0]+'</div>'
          + '<div class="chips">'
          + a[2].map(function(t){
              return '<span class="chip" data-m="'+a[1]+'">'+escapeHtml(t)+'</span>';
            }).join('')
          + '</div></div>';
      }).join('');
    }catch(e){ return '<div class="para">Shelf data unavailable.</div>'; }
  }

  /* keep-state markers, applied after every render */
  function markKept(){
    Array.prototype.forEach.call(document.querySelectorAll('#stage .tk, #stage .chip'),function(el){
      el.classList.toggle('kept', inPocket(el.textContent));
    });
  }

  /* ─────────────────── pocket drawer ─────────────────── */
  function renderPocket(){
    var list=document.getElementById('plist');
    if(!pocket.length){
      list.innerHTML='<div id="pempty">Nothing kept yet.<br>Tap any expression you like \u2014 in the text, the skeleton, or on the shelf.</div>';
    }else{
      list.innerHTML=pocket.map(function(p,i){
        return '<div class="pitem"><span class="pmove">'+escapeHtml(p.m||'PHRASE')+'</span>'
          + '<span class="ptxt">'+escapeHtml(p.t)+'</span>'
          + '<button class="pdel" data-i="'+i+'" aria-label="Remove">\u2715</button></div>';
      }).join('');
    }
    document.getElementById('printBtn').disabled = pocket.length===0;
    Array.prototype.forEach.call(list.querySelectorAll('.pdel'),function(b){
      b.addEventListener('click',function(){
        pocket.splice(parseInt(b.getAttribute('data-i'),10),1);
        savePocket(); syncCount(false); markKept(); renderPocket();
      });
    });
  }

  function printCard(){
    var groups={};
    pocket.forEach(function(p){
      var m=p.m||'PHRASE';
      (groups[m]=groups[m]||[]).push(p.t);
    });
    var d=new Date();
    var date=d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear();
    var html='<div class="pc"><div class="pc-brand">INTUITY</div>'
      + '<div class="pc-title">MY EXPRESSIONS \u00B7 CHOSEN BY ME</div>';
    Object.keys(groups).forEach(function(m){
      html+='<div class="pc-move">'+escapeHtml(m)+'</div>'
        + groups[m].map(function(t){ return '<div class="pc-item">'+escapeHtml(t)+'</div>'; }).join('');
    });
    html+='<div class="pc-foot">'+pocket.length+' expressions \u00B7 '+date+'</div></div>';
    document.getElementById('printCard').innerHTML=html;
    window.print();
  }

  /* ─────────────────── input wiring ─────────────────── */
  document.getElementById('stage').addEventListener('click',function(ev){
    var el=ev.target.closest('.tk, .chip');
    if(!el) return;
    togglePocket(el.textContent, el.getAttribute('data-m'));
  });
  document.getElementById('qPrev').addEventListener('click',function(){ if(qi>0){qi--; render();} });
  document.getElementById('qNext').addEventListener('click',function(){ if(qi<essays.length-1){qi++; render();} });
  Array.prototype.forEach.call(document.querySelectorAll('.sdot'),function(b){
    b.addEventListener('click',function(){
      styleIdx=parseInt(b.getAttribute('data-s'),10);
      Array.prototype.forEach.call(document.querySelectorAll('.sdot'),function(x){
        x.classList.toggle('on', x===b);
      });
      if(altitude!=='shelf') render();
    });
  });
  Array.prototype.forEach.call(document.querySelectorAll('#altSeg button'),function(b){
    b.addEventListener('click',function(){
      altitude=b.getAttribute('data-a');
      Array.prototype.forEach.call(document.querySelectorAll('#altSeg button'),function(x){
        x.classList.toggle('on', x===b);
      });
      render();
    });
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight' && qi<essays.length-1){ qi++; render(); }
    if(e.key==='ArrowLeft' && qi>0){ qi--; render(); }
  });
  document.getElementById('pocketBtn').addEventListener('click',function(){
    renderPocket(); document.getElementById('pback').classList.add('on');
  });
  document.getElementById('pclose').addEventListener('click',function(){
    document.getElementById('pback').classList.remove('on');
  });
  document.getElementById('pback').addEventListener('click',function(e){
    if(e.target.id==='pback') document.getElementById('pback').classList.remove('on');
  });
  document.getElementById('clearBtn').addEventListener('click',function(){
    pocket=[]; savePocket(); syncCount(false); markKept(); renderPocket();
  });
  document.getElementById('printBtn').addEventListener('click',printCard);

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
})();
</script>
</body>
</html>
