<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTUITY — Phrase Slides</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #C9A961;
      --gold-glow: rgba(201,169,97,0.35);
      --essay:  #3d9e95;
      --report: #4a7fb5;
      --review: #c94f6d;
      --email:  #7b5ea7;
      --essay-dim:  rgba(61,158,149,0.18);
      --report-dim: rgba(74,127,181,0.18);
      --review-dim: rgba(201,79,109,0.18);
      --email-dim:  rgba(123,94,167,0.18);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── BACK LINK ── */
    .back-link {
      position: fixed;
      top: 1.1rem; left: 1.25rem;
      z-index: 200;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
      display: flex; align-items: center; gap: .4rem;
      transition: color .3s;
      min-height: 44px;
    }
    .back-link:hover { color: rgba(255,255,255,.7); }

    /* ── TYPE BADGE (top-right) ── */
    .type-badge {
      position: fixed;
      top: 1.1rem; right: 1.25rem;
      z-index: 200;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: .3rem .8rem;
      border-radius: 999px;
      border: 1px solid;
      opacity: 0;
      transition: opacity .5s, background .5s, color .5s, border-color .5s;
    }
    .type-badge.visible { opacity: 1; }
    .type-badge.essay  { background: var(--essay-dim);  color: var(--essay);  border-color: var(--essay); }
    .type-badge.report { background: var(--report-dim); color: var(--report); border-color: var(--report); }
    .type-badge.review { background: var(--review-dim); color: var(--review); border-color: var(--review); }
    .type-badge.email  { background: var(--email-dim);  color: var(--email);  border-color: var(--email); }

    /* ── SLIDE STAGE ── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem 6rem;
      cursor: pointer;
    }

    /* Coloured ambient glow behind text */
    .stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 50%, var(--glow-color, transparent), transparent 70%);
      transition: background 1s;
      pointer-events: none;
    }

    /* ── SECTION LABEL (X-ray) ── */
    .section-label {
      font-family: 'DM Sans', sans-serif;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      margin-bottom: 1.5rem;
      transition: opacity .4s;
      text-align: center;
    }
    .section-label.visible { opacity: .75; }

    /* ── PHRASE TEXT ── */
    .phrase-wrap {
      max-width: 880px;
      width: 100%;
      text-align: center;
    }

    .phrase-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -.025em;
      text-transform: uppercase;
      color: #fff;
      transition: opacity .5s, transform .5s;
    }

    /* Size classes based on word count */
    .phrase-text.sz-s  { font-size: clamp(2.2rem, 7vw,  4.5rem); }
    .phrase-text.sz-m  { font-size: clamp(1.6rem, 5vw,  3.2rem); }
    .phrase-text.sz-l  { font-size: clamp(1.2rem, 3.8vw, 2.4rem); }
    .phrase-text.sz-xl { font-size: clamp(1rem,  3vw,  1.85rem); text-transform: none; font-weight: 700; letter-spacing: -.01em; }

    /* Gold placeholder highlight */
    .phrase-text .ph {
      color: var(--gold);
      text-shadow: 0 0 40px var(--gold-glow);
    }

    /* Slide enter/exit */
    .phrase-text.entering {
      opacity: 0;
      transform: translateY(18px);
    }
    .phrase-text.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .phrase-text.exiting {
      opacity: 0;
      transform: translateY(-14px);
    }

    /* ── PROGRESS BAR ── */
    .progress-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 2px;
      background: rgba(255,255,255,.12);
      width: 100%;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width linear;
    }

    /* ── BOTTOM CONTROLS ── */
    .controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: .9rem 1.4rem 1.1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Filter pills */
    .filters {
      display: flex;
      gap: .45rem;
      flex-wrap: wrap;
      pointer-events: all;
    }

    .pill {
      font-family: 'DM Sans', sans-serif;
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .3rem .75rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(0,0,0,.4);
      color: rgba(255,255,255,.4);
      cursor: pointer;
      transition: all .3s;
      min-height: 32px;
      display: flex; align-items: center;
    }
    .pill:hover { border-color: rgba(255,255,255,.4); color: rgba(255,255,255,.8); }
    .pill.active { color: #fff; border-color: var(--pill-color, var(--gold)); background: var(--pill-bg, rgba(201,169,97,.18)); }
    .pill[data-type="all"]    { --pill-color: var(--gold);   --pill-bg: rgba(201,169,97,.15); }
    .pill[data-type="essay"]  { --pill-color: var(--essay);  --pill-bg: var(--essay-dim); }
    .pill[data-type="report"] { --pill-color: var(--report); --pill-bg: var(--report-dim); }
    .pill[data-type="review"] { --pill-color: var(--review); --pill-bg: var(--review-dim); }
    .pill[data-type="email"]  { --pill-color: var(--email);  --pill-bg: var(--email-dim); }

    /* Auto toggle */
    .auto-toggle {
      pointer-events: all;
      display: flex;
      align-items: center;
      gap: .55rem;
      cursor: pointer;
    }
    .auto-label {
      font-family: 'DM Sans', sans-serif;
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
      transition: color .3s;
    }
    .auto-toggle.on .auto-label { color: rgba(255,255,255,.75); }

    .switch {
      width: 36px; height: 20px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      position: relative;
      transition: background .3s, border-color .3s;
    }
    .auto-toggle.on .switch {
      background: rgba(201,169,97,.3);
      border-color: var(--gold);
    }
    .switch::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,.4);
      transition: transform .3s, background .3s;
    }
    .auto-toggle.on .switch::after {
      transform: translateX(16px);
      background: var(--gold);
    }

    /* ── XRAY HINT (long-press hint, fades after first use) ── */
    .xray-hint {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, calc(-50% + 5rem));
      font-family: 'DM Sans', sans-serif;
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.2);
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s;
    }
    .xray-hint.hidden { opacity: 0; }

    /* ── MODE SELECTOR ── */
    .mode-selector {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      padding: .2rem;
    }

    .mode-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: .55rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .32rem .8rem;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.3);
      cursor: pointer;
      transition: all .3s;
      white-space: nowrap;
      min-height: 28px;
    }
    .mode-btn:hover { color: rgba(255,255,255,.65); }
    .mode-btn.active {
      background: rgba(255,255,255,.12);
      color: #fff;
    }

    /* ── COUNTER ── */
    .counter {
      display: none; /* now replaced by mode selector area */
    }

    .para-counter {
      position: absolute;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: .55rem;
      font-weight: 600;
      letter-spacing: .12em;
      color: rgba(255,255,255,.18);
      pointer-events: none;
      white-space: nowrap;
    }
      position: fixed;
      top: 1.1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: .55rem;
      font-weight: 600;
      letter-spacing: .12em;
      color: rgba(255,255,255,.18);
      pointer-events: none;
    }

    /* ── LOADING ── */
    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 999;
      transition: opacity .8s;
    }
    .loading-screen.fade { opacity: 0; pointer-events: none; }
    .loading-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: .2; transform: scale(.8); }
      50%      { opacity: 1;  transform: scale(1.3); }
    }

    @media (max-width: 600px) {
      .phrase-text.sz-s  { font-size: clamp(1.8rem, 9vw, 3rem); }
      .phrase-text.sz-m  { font-size: clamp(1.3rem, 6.5vw, 2.2rem); }
      .phrase-text.sz-l  { font-size: clamp(1rem, 5vw, 1.8rem); }
      .phrase-text.sz-xl { font-size: clamp(.9rem, 4vw, 1.4rem); }
      .controls { flex-direction: column; align-items: flex-start; gap: .6rem; }
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-dot"></div>
</div>

<div class="mode-selector" id="modeSelector">
  <button class="mode-btn active" data-mode="paragraph">Paragraph</button>
  <button class="mode-btn" data-mode="task">Task</button>
  <button class="mode-btn" data-mode="random">Random</button>
</div>

<a class="back-link" href="../../index.html?openModal=writing">← Writing</a>
<div class="type-badge" id="typeBadge"></div>

<div class="stage" id="stage">
  <div class="section-label" id="sectionLabel"></div>
  <div class="phrase-wrap">
    <div class="phrase-text entering" id="phraseText"></div>
  </div>
  <div class="para-counter" id="paraCounter"></div>
</div>

<div class="xray-hint" id="xrayHint">Hold to reveal section</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="controls">
  <div class="filters" id="filters">
    <div class="pill active" data-type="all">All</div>
    <div class="pill" data-type="essay">Essays</div>
    <div class="pill" data-type="report">Reports</div>
    <div class="pill" data-type="review">Reviews</div>
    <div class="pill" data-type="email">Emails</div>
  </div>
  <div class="auto-toggle" id="autoToggle">
    <span class="auto-label">Auto</span>
    <div class="switch"></div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const DATA_BASE = 'data1/';
const AUTO_INTERVAL = 5000;

const TYPE_GLOW = {
  essay:  'rgba(61,158,149,0.12)',
  report: 'rgba(74,127,181,0.12)',
  review: 'rgba(201,79,109,0.12)',
  email:  'rgba(123,94,167,0.12)'
};

// Section order for paragraph mode — one phrase per section, in logical paragraph order
const PARA_ORDER = {
  essay:  ['introduction_context','thesis_statement','advantages','disadvantages','conclusion'],
  report: ['introduction_purpose','general_view','praising','criticising','recommendation','conclusion'],
  review: ['introduction_opening','features','recommendation'],
  email:  ['opening_formal','body_formal','closing_formal']
};

const SOURCES = [
  { type:'essay',  file:'essay-hook.json',           key:'for_and_against',  sections:['introduction_context'] },
  { type:'essay',  file:'essay-thesis.json',          key:'for_and_against',  sections:['thesis_statement'] },
  { type:'essay',  file:'essay-full-structures.json', key:'for_and_against',  sections:['advantages','disadvantages','conclusion'] },
  { type:'report', file:'report-intro-purpose.json',  key:'formal_report',    sections:['introduction_purpose'] },
  { type:'report', file:'report-full-structures.json',key:'formal_report',    sections:['general_view','praising','criticising','recommendation','conclusion'] },
  { type:'review', file:'review-intro-opening.json',  key:'product_review',   sections:['introduction_opening'] },
  { type:'review', file:'review-full-structures.json',key:'product_review',   sections:['features','recommendation'] },
  { type:'email',  file:'email-opening.json',         key:'formal_email',     sections:['opening_formal'] },
  { type:'email',  file:'email-opening.json',         key:'informal_email',   sections:['opening_informal'] },
  { type:'email',  file:'email-body.json',            key:'formal_email',     sections:['body_formal'] },
  { type:'email',  file:'email-closing.json',         key:'formal_email',     sections:['closing_formal'] },
  { type:'email',  file:'email-closing.json',         key:'informal_email',   sections:['closing_informal'] },
];

// ─── STATE ────────────────────────────────────────────────
let allPhrases = [];        // [{type, section, text}]
let phrasesBySection = {};  // {essay:{introduction_context:[...], ...}, ...}
let sequence = [];          // current play sequence
let currentIndex = 0;
let currentFilter = 'all';
let currentMode = 'paragraph'; // 'random' | 'paragraph' | 'task'
let autoMode = false;
let autoTimer = null;
let xrayVisible = false;
let xrayHintShown = false;
let longPressTimer = null;
let transitioning = false;

// ─── LOAD DATA ────────────────────────────────────────────
async function loadAll() {
  const fetched = await Promise.allSettled(
    SOURCES.map(s => fetch(DATA_BASE + s.file).then(r => r.ok ? r.json() : null))
  );

  fetched.forEach((result, i) => {
    if (result.status !== 'fulfilled' || !result.value) return;
    const src = SOURCES[i];
    const struct = result.value?.structures?.[src.key];
    if (!struct?.sections) return;

    src.sections.forEach(sectionKey => {
      const section = struct.sections[sectionKey];
      if (!section?.phrases) return;

      if (!phrasesBySection[src.type]) phrasesBySection[src.type] = {};
      if (!phrasesBySection[src.type][sectionKey]) phrasesBySection[src.type][sectionKey] = [];

      Object.values(section.phrases).forEach(arr => {
        arr.forEach(text => {
          if (!text?.trim()) return;
          const p = { type: src.type, section: sectionKey, text: text.trim() };
          allPhrases.push(p);
          phrasesBySection[src.type][sectionKey].push(p);
        });
      });
    });
  });

  buildSequence();
  document.getElementById('loadingScreen').classList.add('fade');
  setTimeout(() => {
    document.getElementById('loadingScreen').style.display = 'none';
    showSlide(0);
  }, 800);
}

// ─── SEQUENCE BUILDERS ───────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickOne(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function buildSequence() {
  currentIndex = 0;
  const types = currentFilter === 'all'
    ? ['essay','report','review','email']
    : [currentFilter];

  if (currentMode === 'random') {
    // Flat random shuffle across all phrases of selected types
    const pool = allPhrases.filter(p => types.includes(p.type));
    sequence = shuffle([...pool]);

  } else if (currentMode === 'paragraph') {
    // Each "paragraph" = one phrase per section in order, for a random type
    // We build ~30 paragraphs, each from a randomly chosen type
    sequence = [];
    for (let i = 0; i < 30; i++) {
      const type = pickOne(types);
      const order = PARA_ORDER[type] || [];
      order.forEach((sec, si) => {
        const pool = phrasesBySection[type]?.[sec];
        if (!pool?.length) return;
        const phrase = pickOne(pool);
        sequence.push({
          ...phrase,
          paraIndex: i + 1,
          paraStep: si + 1,
          paraTotal: order.length,
          paraType: type
        });
      });
    }

  } else if (currentMode === 'task') {
    // All phrases grouped by type, sections in order, shuffled within each section
    sequence = [];
    types.forEach(type => {
      const order = PARA_ORDER[type] || [];
      order.forEach(sec => {
        const pool = phrasesBySection[type]?.[sec];
        if (!pool?.length) return;
        shuffle([...pool]).forEach(p => sequence.push(p));
      });
    });
  }
}

// ─── RENDER HELPERS ──────────────────────────────────────
function phraseHTML(text) {
  return text.replace(/\[([^\]]+)\]/g, '<span class="ph">$1</span>');
}

function sizeClass(text) {
  const words = text.replace(/\[([^\]]+)\]/g, '$1').split(/\s+/).length;
  if (words <= 8)  return 'sz-s';
  if (words <= 15) return 'sz-m';
  if (words <= 24) return 'sz-l';
  return 'sz-xl';
}

function humanSection(key) {
  const map = {
    introduction_context:  'Introduction',
    thesis_statement:      'Thesis',
    advantages:            'Advantages',
    disadvantages:         'Disadvantages',
    conclusion:            'Conclusion',
    introduction_purpose:  'Introduction',
    general_view:          'General View',
    praising:              'Praising',
    criticising:           'Criticising',
    recommendation:        'Recommendation',
    introduction_opening:  'Introduction',
    features:              'Features',
    opening_formal:        'Opening',
    opening_informal:      'Opening',
    body_formal:           'Body',
    closing_formal:        'Closing',
    closing_informal:      'Closing',
  };
  return map[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// ─── SHOW SLIDE ──────────────────────────────────────────
function showSlide(idx) {
  if (!sequence.length) return;
  const phrase = sequence[idx];

  const el      = document.getElementById('phraseText');
  const badge   = document.getElementById('typeBadge');
  const label   = document.getElementById('sectionLabel');
  const pCounter = document.getElementById('paraCounter');
  const stage   = document.getElementById('stage');

  el.className = `phrase-text ${sizeClass(phrase.text)} entering`;
  el.innerHTML = phraseHTML(phrase.text);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.classList.remove('entering');
    el.classList.add('visible');
  }));

  stage.style.setProperty('--glow-color', TYPE_GLOW[phrase.type] || 'transparent');

  badge.textContent = phrase.type.charAt(0).toUpperCase() + phrase.type.slice(1);
  badge.className = `type-badge visible ${phrase.type}`;

  label.textContent = humanSection(phrase.section);
  label.classList.toggle('visible', xrayVisible);

  // Paragraph counter — shown in paragraph mode
  if (currentMode === 'paragraph' && phrase.paraIndex != null) {
    pCounter.textContent = `${phrase.type.toUpperCase()}  ·  ${humanSection(phrase.section).toUpperCase()}  ·  ${phrase.paraStep} of ${phrase.paraTotal}`;
  } else if (currentMode === 'task') {
    pCounter.textContent = `${humanSection(phrase.section).toUpperCase()}  ·  ${idx + 1} / ${sequence.length}`;
  } else {
    pCounter.textContent = `${idx + 1} / ${sequence.length}`;
  }

  currentIndex = idx;
}

// ─── NAVIGATE ────────────────────────────────────────────
function goNext() {
  if (transitioning) return;
  transitioning = true;
  const el = document.getElementById('phraseText');
  el.classList.remove('visible');
  el.classList.add('exiting');
  setTimeout(() => {
    const next = (currentIndex + 1) % sequence.length;
    showSlide(next);
    transitioning = false;
  }, 280);
  resetAuto();
}

function goPrev() {
  if (transitioning) return;
  transitioning = true;
  const el = document.getElementById('phraseText');
  el.classList.remove('visible');
  el.classList.add('exiting');
  setTimeout(() => {
    const prev = (currentIndex - 1 + sequence.length) % sequence.length;
    showSlide(prev);
    transitioning = false;
  }, 280);
  resetAuto();
}

// ─── AUTO ────────────────────────────────────────────────
function startAuto() {
  stopAuto();
  const fill = document.getElementById('progressFill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  requestAnimationFrame(() => {
    fill.style.transition = `width ${AUTO_INTERVAL}ms linear`;
    fill.style.width = '100%';
  });
  autoTimer = setTimeout(() => { goNext(); if (autoMode) startAuto(); }, AUTO_INTERVAL);
}

function stopAuto() {
  if (autoTimer) clearTimeout(autoTimer);
  autoTimer = null;
  const fill = document.getElementById('progressFill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
}

function resetAuto() { if (autoMode) startAuto(); }

function toggleAuto() {
  autoMode = !autoMode;
  document.getElementById('autoToggle').classList.toggle('on', autoMode);
  autoMode ? startAuto() : stopAuto();
}

// ─── X-RAY ───────────────────────────────────────────────
function showXRay() {
  xrayVisible = true;
  document.getElementById('sectionLabel').classList.add('visible');
  if (!xrayHintShown) {
    xrayHintShown = true;
    document.getElementById('xrayHint').classList.add('hidden');
  }
}
function hideXRay() {
  xrayVisible = false;
  document.getElementById('sectionLabel').classList.remove('visible');
}

// ─── MODE SWITCH ─────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  buildSequence();
  showSlide(0);
  resetAuto();
}

// ─── INPUT ───────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

document.getElementById('stage').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartTime = Date.now();
  longPressTimer = setTimeout(showXRay, 400);
}, { passive: true });

document.getElementById('stage').addEventListener('touchend', e => {
  clearTimeout(longPressTimer);
  hideXRay();
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    dx < 0 ? goNext() : goPrev();
  } else if (dt < 350 && Math.abs(dx) < 15 && Math.abs(dy) < 15) {
    goNext();
  }
}, { passive: true });

document.getElementById('stage').addEventListener('mousedown', () => {
  longPressTimer = setTimeout(showXRay, 400);
});
document.getElementById('stage').addEventListener('mouseup', () => {
  clearTimeout(longPressTimer);
  hideXRay();
});
document.getElementById('stage').addEventListener('click', goNext);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); goPrev(); }
  if (e.key === 'a' || e.key === 'A') toggleAuto();
});

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', e => {
    e.stopPropagation();
    currentFilter = pill.dataset.type;
    document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.type === currentFilter));
    buildSequence();
    showSlide(0);
    resetAuto();
  });
});

document.getElementById('autoToggle').addEventListener('click', e => {
  e.stopPropagation();
  toggleAuto();
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    setMode(btn.dataset.mode);
  });
});

// ─── BOOT ─────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
