<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTUITY — Phrase Slides</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #C9A961; --gold-glow: rgba(201,169,97,0.4);
      --essay: #3d9e95; --report: #4a7fb5; --review: #c94f6d;
      --email: #7b5ea7; --article: #b8620a;
    }
    html, body { width:100%; height:100%; overflow:hidden; background:#0d0d0d; }
    body { font-family:'DM Sans',sans-serif; color:#e5e5e7; user-select:none; -webkit-user-select:none; }

    /* ── HEADER ── */
    .header {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; justify-content:space-between; align-items:center;
      padding:.65rem 1.25rem;
      background:rgba(13,13,13,.88); backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,.06); height:50px;
    }
    .back-link {
      text-decoration:none; font-family:'Space Grotesk',sans-serif;
      font-size:.6rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      color:rgba(255,255,255,.3); transition:color .2s;
    }
    .back-link:hover { color:rgba(255,255,255,.7); }

    /* Mode selector */
    .mode-selector {
      display:flex; gap:0;
      background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.1);
      border-radius:999px; padding:.18rem;
    }
    .mode-btn {
      font-family:'Space Grotesk',sans-serif; font-size:.56rem; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase;
      padding:.3rem .85rem; border-radius:999px; border:none;
      background:transparent; color:rgba(255,255,255,.3); cursor:pointer; transition:all .25s;
    }
    .mode-btn:hover { color:rgba(255,255,255,.7); }
    .mode-btn.active { background:rgba(255,255,255,.13); color:#fff; }

    /* Type badge */
    .type-badge {
      font-family:'Space Grotesk',sans-serif; font-size:.56rem; font-weight:700;
      letter-spacing:.12em; text-transform:uppercase;
      padding:.28rem .8rem; border-radius:999px; border:1px solid;
      min-width:72px; text-align:center; transition:all .4s;
    }
    .type-badge.essay   { color:var(--essay);   border-color:var(--essay);   background:rgba(61,158,149,.15); }
    .type-badge.report  { color:var(--report);  border-color:var(--report);  background:rgba(74,127,181,.15); }
    .type-badge.review  { color:var(--review);  border-color:var(--review);  background:rgba(201,79,109,.15); }
    .type-badge.email   { color:var(--email);   border-color:var(--email);   background:rgba(123,94,167,.15); }
    .type-badge.article { color:var(--article); border-color:var(--article); background:rgba(184,98,10,.15); }

    /* ── STAGE ── */
    .stage {
      position:fixed; top:50px; left:0; right:0; bottom:80px;
      display:flex; flex-direction:column; align-items:center; justify-content:center; padding:.75rem;
    }

    /* ── TOPIC / SECTION ROW ── */
    .context-row {
      display:flex; gap:.35rem; flex-wrap:wrap; justify-content:center;
      margin-bottom:.65rem; min-height:30px; align-items:center;
    }

    /* Topic chips */
    .topic-chip {
      font-family:'Space Grotesk',sans-serif; font-size:.52rem; font-weight:700;
      letter-spacing:.07em; text-transform:uppercase;
      padding:.28rem .75rem; border-radius:999px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.04); color:rgba(255,255,255,.45);
      cursor:pointer; transition:all .22s; white-space:nowrap;
    }
    .topic-chip:hover { border-color:rgba(255,255,255,.4); color:#fff; background:rgba(255,255,255,.08); }
    .stage.essay   .topic-chip.active { border-color:var(--essay);  background:rgba(61,158,149,.22);  color:var(--essay); }
    .stage.report  .topic-chip.active { border-color:var(--report); background:rgba(74,127,181,.22);  color:var(--report); }
    .stage.review  .topic-chip.active { border-color:var(--review); background:rgba(201,79,109,.22);  color:var(--review); }
    .stage.email   .topic-chip.active { border-color:var(--email);  background:rgba(123,94,167,.22);  color:var(--email); }
    .stage.article .topic-chip.active { border-color:var(--article);background:rgba(184,98,10,.22);   color:var(--article); }

    /* Active topic indicator — shown when topic chosen, section pills visible */
    .topic-indicator {
      display:none; align-items:center; gap:.4rem;
      font-family:'Space Grotesk',sans-serif; font-size:.52rem; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase;
      color:rgba(255,255,255,.28); cursor:pointer;
      margin-bottom:.1rem;
    }
    .topic-indicator.visible { display:flex; }
    .topic-indicator-label { transition:color .2s; }
    .topic-indicator:hover .topic-indicator-label { color:rgba(255,255,255,.6); }
    .topic-indicator-dot {
      width:6px; height:6px; border-radius:50%; flex-shrink:0;
    }
    .stage.essay   .topic-indicator-dot { background:var(--essay); }
    .stage.report  .topic-indicator-dot { background:var(--report); }
    .stage.review  .topic-indicator-dot { background:var(--review); }
    .stage.email   .topic-indicator-dot { background:var(--email); }
    .stage.article .topic-indicator-dot { background:var(--article); }

    /* Section pills */
    .sec-pill {
      font-family:'Space Grotesk',sans-serif; font-size:.52rem; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase;
      padding:.25rem .7rem; border-radius:999px; border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.3); color:rgba(255,255,255,.35);
      cursor:pointer; transition:all .25s; white-space:nowrap;
    }
    .sec-pill:hover { border-color:rgba(255,255,255,.35); color:rgba(255,255,255,.75); }
    .stage.essay   .sec-pill.active { border-color:var(--essay);   background:rgba(61,158,149,.2);  color:var(--essay); }
    .stage.report  .sec-pill.active { border-color:var(--report);  background:rgba(74,127,181,.2);  color:var(--report); }
    .stage.review  .sec-pill.active { border-color:var(--review);  background:rgba(201,79,109,.2);  color:var(--review); }
    .stage.email   .sec-pill.active { border-color:var(--email);   background:rgba(123,94,167,.2);  color:var(--email); }
    .stage.article .sec-pill.active { border-color:var(--article); background:rgba(184,98,10,.2);   color:var(--article); }

    /* ── SLIDE CARD ── */
    .slide-card {
      position:relative; width:100%; max-width:860px;
      flex:1; max-height:520px;
      background:linear-gradient(145deg,rgba(28,28,30,.97),rgba(18,18,20,.99));
      border-radius:1.25rem; border:1px solid rgba(201,169,97,.22); overflow:hidden;
      box-shadow:0 24px 70px rgba(0,0,0,.8), 0 0 80px rgba(201,169,97,.07);
      transition:border-color .5s;
    }
    .slide-card.essay   { border-color:rgba(61,158,149,.3); }
    .slide-card.report  { border-color:rgba(74,127,181,.3); }
    .slide-card.review  { border-color:rgba(201,79,109,.3); }
    .slide-card.email   { border-color:rgba(123,94,167,.3); }
    .slide-card.article { border-color:rgba(184,98,10,.3); }

    .slides-container { position:relative; width:100%; height:calc(100% - 54px); overflow:hidden; }

    .slide {
      position:absolute; top:0; left:0; width:100%; height:100%;
      padding:2.5rem 3.5rem;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transform:translateX(60px);
      transition:opacity .42s cubic-bezier(.4,0,.2,1), transform .42s cubic-bezier(.4,0,.2,1);
      pointer-events:none;
    }
    .slide.active { opacity:1; transform:translateX(0); pointer-events:auto; z-index:10; }
    .slide.exit-left { opacity:0; transform:translateX(-60px); pointer-events:none; }

    .phrase-text {
      font-family:'Space Grotesk',sans-serif; font-weight:800;
      line-height:1.25; text-align:center; color:#e5e5e7;
      text-transform:uppercase; letter-spacing:-.025em;
      max-width:95%; width:100%;
    }
    .phrase-text.size-small  { font-size:clamp(2.2rem,5.5vw,4rem); }
    .phrase-text.size-medium { font-size:clamp(1.6rem,4vw,2.9rem); }
    .phrase-text.size-large  { font-size:clamp(1.2rem,3vw,2.1rem); }
    .phrase-text.size-xlarge { font-size:clamp(1rem,2.4vw,1.6rem); text-transform:none; font-weight:700; letter-spacing:-.01em; }

    /* Gold placeholder */
    .phrase-text .hl {
      background:linear-gradient(135deg,#C9A961 0%,#FFD700 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; font-weight:900;
    }
    /* Resolved topic — brighter, type-coloured */
    .phrase-text .topic-resolved {
      font-weight:900; text-decoration:underline;
      text-underline-offset:4px; text-decoration-thickness:2px;
    }
    .stage.essay   .topic-resolved { color:var(--essay); -webkit-text-fill-color:var(--essay); }
    .stage.report  .topic-resolved { color:var(--report); -webkit-text-fill-color:var(--report); }
    .stage.review  .topic-resolved { color:var(--review); -webkit-text-fill-color:var(--review); }
    .stage.email   .topic-resolved { color:var(--email); -webkit-text-fill-color:var(--email); }
    .stage.article .topic-resolved { color:var(--article); -webkit-text-fill-color:var(--article); }

    /* Task mode */
    .task-text { max-width:88%; max-height:100%; overflow-y:auto; text-align:left; }
    .task-text::-webkit-scrollbar { width:4px; }
    .task-text::-webkit-scrollbar-thumb { background:rgba(201,169,97,.3); border-radius:4px; }
    .task-section { margin-bottom:1.4rem; padding-bottom:1.4rem; border-bottom:1px solid rgba(201,169,97,.1); }
    .task-section:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
    .task-section-label {
      font-family:'Space Grotesk',sans-serif; font-size:.54rem; font-weight:700;
      letter-spacing:.14em; text-transform:uppercase; color:var(--gold); opacity:.65; margin-bottom:.55rem;
    }
    .task-section-text {
      font-family:'DM Sans',sans-serif; font-size:clamp(.82rem,1.7vw,.98rem); line-height:1.8; color:#d1d5db;
    }
    .task-section-text .dm { color:#5b9bd5; font-weight:600; }

    .section-label {
      position:absolute; top:.85rem; left:50%; transform:translateX(-50%);
      font-family:'DM Sans',sans-serif; font-size:.54rem; font-weight:700;
      letter-spacing:.18em; text-transform:uppercase; color:var(--gold);
      opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; z-index:20;
    }
    .section-label.visible { opacity:.75; }

    .hold-hint {
      position:absolute; bottom:3.8rem; left:50%; transform:translateX(-50%);
      font-family:'DM Sans',sans-serif; font-size:.5rem; font-weight:600;
      letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.13);
      pointer-events:none; transition:opacity .8s; white-space:nowrap; z-index:5;
    }
    .hold-hint.hidden { opacity:0; }

    .nav-arrows {
      position:absolute; top:50%; left:0; right:0; transform:translateY(-50%);
      display:flex; justify-content:space-between; padding:0 .7rem;
      pointer-events:none; z-index:20;
    }
    .arrow-btn {
      pointer-events:all; width:42px; height:42px; border-radius:50%;
      background:rgba(201,169,97,.18); border:1px solid rgba(201,169,97,.35);
      color:var(--gold); font-size:1.1rem;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all .25s;
    }
    .arrow-btn:hover:not(:disabled) { background:rgba(201,169,97,.32); transform:scale(1.12); }
    .arrow-btn:disabled { opacity:.18; cursor:not-allowed; }

    .dot-nav {
      height:54px; display:flex; align-items:center; justify-content:center;
      gap:.42rem; background:rgba(0,0,0,.22); border-top:1px solid rgba(255,255,255,.04);
      flex-wrap:wrap; padding:0 1rem;
    }
    .dot {
      width:8px; height:8px; border-radius:50%;
      background:rgba(99,99,102,.32); cursor:pointer; transition:all .3s; flex-shrink:0;
    }
    .dot.active { background:var(--gold); transform:scale(1.45); box-shadow:0 0 10px var(--gold-glow); }
    .dot:hover:not(.active) { background:rgba(201,169,97,.45); }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      position:fixed; bottom:0; left:0; right:0; height:80px;
      padding:.65rem 1.25rem .85rem;
      display:flex; align-items:center; justify-content:space-between; gap:1rem;
      background:rgba(13,13,13,.88); backdrop-filter:blur(20px);
      border-top:1px solid rgba(255,255,255,.06);
    }
    .filters { display:flex; gap:.38rem; flex-wrap:wrap; }
    .pill {
      font-family:'Space Grotesk',sans-serif; font-size:.54rem; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase;
      padding:.28rem .75rem; border-radius:999px;
      border:1px solid rgba(255,255,255,.1); background:rgba(0,0,0,.3);
      color:rgba(255,255,255,.33); cursor:pointer; transition:all .25s;
      min-height:28px; display:flex; align-items:center;
    }
    .pill:hover { border-color:rgba(255,255,255,.3); color:rgba(255,255,255,.7); }
    .pill[data-type="all"].active     { color:var(--gold);    border-color:var(--gold);    background:rgba(201,169,97,.14); }
    .pill[data-type="essay"].active   { color:var(--essay);   border-color:var(--essay);   background:rgba(61,158,149,.14); }
    .pill[data-type="report"].active  { color:var(--report);  border-color:var(--report);  background:rgba(74,127,181,.14); }
    .pill[data-type="review"].active  { color:var(--review);  border-color:var(--review);  background:rgba(201,79,109,.14); }
    .pill[data-type="email"].active   { color:var(--email);   border-color:var(--email);   background:rgba(123,94,167,.14); }
    .pill[data-type="article"].active { color:var(--article); border-color:var(--article); background:rgba(184,98,10,.14); }

    .auto-row { display:flex; align-items:center; gap:.5rem; cursor:pointer; flex-shrink:0; }
    .auto-label {
      font-family:'Space Grotesk',sans-serif; font-size:.52rem; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.26); transition:color .3s;
    }
    .auto-row.on .auto-label { color:rgba(255,255,255,.7); }
    .switch {
      width:38px; height:21px; border-radius:999px;
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
      position:relative; transition:all .3s;
    }
    .auto-row.on .switch { background:rgba(201,169,97,.22); border-color:var(--gold); }
    .switch::after {
      content:''; position:absolute; top:2px; left:2px;
      width:15px; height:15px; border-radius:50%;
      background:rgba(255,255,255,.32); transition:transform .3s, background .3s;
    }
    .auto-row.on .switch::after { transform:translateX(17px); background:var(--gold); }

    .progress { position:fixed; bottom:80px; left:0; right:0; height:2px; background:rgba(255,255,255,.04); z-index:50; }
    .progress-fill { height:100%; background:var(--gold); width:0%; }

    .loading-screen { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#0d0d0d; z-index:999; transition:opacity .6s; }
    .loading-screen.fade { opacity:0; pointer-events:none; }
    .ld { width:7px; height:7px; border-radius:50%; background:var(--gold); animation:ld 1.2s ease-in-out infinite; }
    @keyframes ld { 0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.3)} }

    @media(max-width:600px){
      .slide { padding:2rem 1.5rem; }
      .phrase-text.size-small  { font-size:clamp(1.8rem,8vw,2.8rem); }
      .phrase-text.size-medium { font-size:clamp(1.3rem,6.5vw,2rem); }
      .phrase-text.size-large  { font-size:clamp(1rem,5vw,1.6rem); }
      .phrase-text.size-xlarge { font-size:clamp(.88rem,4vw,1.3rem); }
      .bottom-bar { flex-wrap:wrap; height:auto; padding:.55rem 1rem .7rem; gap:.5rem; }
      .stage { bottom:105px; }
      .progress { bottom:105px; }
      .context-row { gap:.28rem; }
      .topic-chip,.sec-pill { font-size:.48rem; padding:.22rem .58rem; }
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen"><div class="ld"></div></div>

<header class="header">
  <a class="back-link" href="../../../index.html?openModal=writing">← Writing</a>
  <div class="mode-selector">
    <button class="mode-btn active" data-mode="paragraph">Paragraph</button>
    <button class="mode-btn"        data-mode="task">Task</button>
  </div>
  <div class="type-badge essay" id="typeBadge">Essay</div>
</header>

<div class="stage essay" id="stage">
  <div class="context-row" id="contextRow"></div>

  <div class="slide-card essay" id="slideCard">
    <div class="section-label" id="sectionLabel"></div>
    <div class="slides-container" id="slidesContainer"></div>
    <div class="nav-arrows">
      <button class="arrow-btn" id="prevBtn">←</button>
      <button class="arrow-btn" id="nextBtn">→</button>
    </div>
    <div class="hold-hint" id="holdHint">Hold to reveal section</div>
    <div class="dot-nav" id="dotNav"></div>
  </div>
</div>

<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<div class="bottom-bar">
  <div class="filters">
    <div class="pill active" data-type="all">All</div>
    <div class="pill" data-type="essay">Essays</div>
    <div class="pill" data-type="report">Reports</div>
    <div class="pill" data-type="review">Reviews</div>
    <div class="pill" data-type="email">Emails</div>
    <div class="pill" data-type="article">Articles</div>
  </div>
  <div class="auto-row" id="autoRow">
    <span class="auto-label">Auto</span>
    <div class="switch"></div>
  </div>
</div>

<script>
const DATA_BASE = 'data1/';
const AUTO_MS   = 5500;

// ─── TOPICS PER TYPE ─────────────────────────────────────
const TOPICS = {
  essay: [
    'Social Media','Technology','Education','Environment',
    'Health','Transport','Work & Career','Food & Diet',
    'Travel','Sport','Money','Family'
  ],
  report: [
    'School Facilities','Local Transport','Sports Centre',
    'Town Centre','Library','Youth Club',
    'Online Services','Holiday Resort','Workplace'
  ],
  review: [
    'Film','TV Series','Restaurant','Hotel',
    'Book','Music Album','Video Game',
    'Theme Park','Sports Event','Concert'
  ],
  email: [
    'Job Application','Complaint','Invitation',
    'Apology','Request','Thank You',
    'Enquiry','Recommendation','News'
  ],
  article: [
    'Music','Food','Travel','Sport',
    'Fashion','Cinema','Nature','Books',
    'Friendship','City Life','Memories','Hobbies'
  ],
};

// ─── PHRASE SOURCES ───────────────────────────────────────
const PHRASE_SOURCES = {
  essay: [
    { file:'essay-hook.json',           key:'for_and_against', sections:['introduction_context'] },
    { file:'essay-thesis.json',         key:'for_and_against', sections:['thesis_statement'] },
    { file:'essay-full-structures.json',key:'for_and_against', sections:['advantages','disadvantages','conclusion'] },
  ],
  report: [
    { file:'report-intro-purpose.json',  key:'formal_report', sections:['introduction_purpose'] },
    { file:'report-full-structures.json',key:'formal_report', sections:['general_view','praising','criticising','recommendation','conclusion'] },
  ],
  review: [
    { file:'review-intro-opening.json',  key:'product_review', sections:['introduction_opening'] },
    { file:'review-full-structures.json',key:'product_review', sections:['features','recommendation'] },
  ],
  email: [
    { file:'email-opening.json', key:'formal_email',   sections:['opening_formal'] },
    { file:'email-opening.json', key:'informal_email', sections:['opening_informal'] },
    { file:'email-body.json',    key:'formal_email',   sections:['body_formal'] },
    { file:'email-closing.json', key:'formal_email',   sections:['closing_formal'] },
    { file:'email-closing.json', key:'informal_email', sections:['closing_informal'] },
  ],
  article: [
    { file:'article-phrases.json', key:'article', sections:['introduction','arguments','conclusion'] },
  ],
};

const MODEL_FILES = {
  essay:'essays-models.json', report:'reports-models.json',
  review:'reviews-models.json', email:'emails-models.json',
};

const SECTION_PILLS = {
  essay:   [
    { label:'Intro & Thesis', sections:['introduction_context','thesis_statement'] },
    { label:'Body 1',         sections:['advantages'] },
    { label:'Body 2',         sections:['disadvantages'] },
    { label:'Conclusion',     sections:['conclusion'] },
  ],
  report:  [
    { label:'Intro & Overview', sections:['introduction_purpose','general_view'] },
    { label:'Body 1',           sections:['praising'] },
    { label:'Body 2',           sections:['criticising'] },
    { label:'Recommendation',   sections:['recommendation'] },
    { label:'Conclusion',       sections:['conclusion'] },
  ],
  review:  [
    { label:'Intro',          sections:['introduction_opening'] },
    { label:'Body 1',         sections:['features'] },
    { label:'Recommendation', sections:['recommendation'] },
  ],
  email:   [
    { label:'Opening', sections:['opening_formal','opening_informal'] },
    { label:'Body',    sections:['body_formal'] },
    { label:'Closing', sections:['closing_formal','closing_informal'] },
  ],
  article: [
    { label:'Introduction', sections:['introduction'] },
    { label:'Body',         sections:['arguments'] },
    { label:'Conclusion',   sections:['conclusion'] },
  ],
};

const SEC_LABEL = {
  introduction_context:'Introduction', thesis_statement:'Thesis',
  advantages:'Advantages', disadvantages:'Disadvantages', conclusion:'Conclusion',
  introduction_purpose:'Introduction', general_view:'General View',
  praising:'Praising', criticising:'Criticising', recommendation:'Recommendation',
  introduction_opening:'Introduction', features:'Features',
  opening_formal:'Opening', opening_informal:'Opening',
  body_formal:'Body', closing_formal:'Closing', closing_informal:'Closing',
  introduction:'Introduction', arguments:'Body',
};

const PARA_ORDER = {
  essay:   ['introduction_context','thesis_statement','advantages','disadvantages','conclusion'],
  report:  ['introduction_purpose','general_view','praising','criticising','recommendation','conclusion'],
  review:  ['introduction_opening','features','recommendation'],
  email:   ['opening_formal','body_formal','closing_formal'],
  article: ['introduction','arguments','conclusion'],
};

// ─── STATE ────────────────────────────────────────────────
let phraseBank = {};
let modelBank  = {};
let slides     = [];
let current    = 0;
let prev       = -1;
let mode       = 'paragraph';
let filter     = 'all';
let activePill = null;
let activeTopic= null;   // the chosen topic string, or null
let topicPhase = false;  // true = showing topic chips, false = showing section pills
let autoOn     = false;
let autoTimer  = null;
let xray       = false;
let xrayDone   = false;
let longTimer  = null;
let busy       = false;

// ─── LOAD ────────────────────────────────────────────────
async function loadAll() {
  const flat = [];
  for (const [type, srcs] of Object.entries(PHRASE_SOURCES))
    srcs.forEach(s => flat.push({ type, ...s }));

  const phraseRes = await Promise.allSettled(
    flat.map(s => fetch(DATA_BASE + s.file).then(r => r.ok ? r.json() : null))
  );
  phraseRes.forEach((res, i) => {
    if (res.status !== 'fulfilled' || !res.value) return;
    const s = flat[i];
    const struct = res.value?.structures?.[s.key];
    if (!struct?.sections) return;
    if (!phraseBank[s.type]) phraseBank[s.type] = {};
    s.sections.forEach(sec => {
      const section = struct.sections[sec];
      if (!section?.phrases) return;
      if (!phraseBank[s.type][sec]) phraseBank[s.type][sec] = [];
      Object.values(section.phrases).forEach(arr =>
        arr.forEach(t => { if (t?.trim()) phraseBank[s.type][sec].push(t.trim()); })
      );
    });
  });

  const modelRes = await Promise.allSettled(
    Object.entries(MODEL_FILES).map(([type, file]) =>
      fetch(DATA_BASE + file).then(r => r.ok ? r.json() : null).then(d => ({ type, d }))
    )
  );
  modelRes.forEach(res => {
    if (res.status !== 'fulfilled' || !res.value?.d) return;
    modelBank[res.value.type] = res.value.d.samples || [];
  });

  build();
  document.getElementById('loadingScreen').classList.add('fade');
  setTimeout(() => {
    document.getElementById('loadingScreen').style.display = 'none';
    paint();
    show(0, 'none');
    renderContextRow();
  }, 700);
}

// ─── TOPIC SUBSTITUTION ──────────────────────────────────
// Replace [topic], [trend], [problem], [phenomenon] etc. with chosen topic
function resolveTopic(text, topic) {
  if (!topic) return text;
  // Replace any bracketed placeholder that represents the main subject
  return text.replace(/\[(topic|trend|problem|phenomenon|issue|statement|area|place)[^\]]*\]/gi, topic);
}

// ─── HELPERS ─────────────────────────────────────────────
function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }

function sizeClass(text) {
  const w = text.replace(/\[([^\]]+)\]/g,'$1').replace(/…/g,'x').split(/\s+/).length;
  if (w <= 8)  return 'size-small';
  if (w <= 16) return 'size-medium';
  if (w <= 28) return 'size-large';
  return 'size-xlarge';
}

function hlText(text, topic) {
  if (topic) {
    // Replace resolved topic placeholders with type-coloured underlined word
    const resolved = resolveTopic(text, topic);
    // Highlight remaining non-resolved brackets in gold
    return resolved
      .replace(new RegExp(topic.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),
        `<span class="topic-resolved">${topic}</span>`)
      .replace(/\[([^\]]+)\]/g,'<span class="hl">$1</span>')
      .replace(/…/g,'<span class="hl">…</span>');
  }
  return text
    .replace(/\[([^\]]+)\]/g,'<span class="hl">$1</span>')
    .replace(/…/g,'<span class="hl">…</span>');
}

function dmHighlight(text) {
  return text.replace(/([A-Z][^.!?]*[.!?])\s*/g, m => {
    const words = m.trim().split(/\s+/);
    const n = Math.min(4, Math.max(2, Math.floor(words.length*.28)));
    return `<span class="dm">${words.slice(0,n).join(' ')}</span> ${words.slice(n).join(' ')} `;
  });
}

function activeTypes() {
  return filter === 'all' ? ['essay','report','review','email','article'] : [filter];
}

// ─── BUILD SLIDE SEQUENCE ────────────────────────────────
function build() {
  const types = activeTypes();
  slides = [];
  current = 0; prev = -1;

  if (mode === 'paragraph') {
    const pillSections = activePill ? activePill.sections : null;
    for (let i = 0; i < 50; i++) {
      const type = pick(types);
      const order = PARA_ORDER[type] || [];
      order.forEach(sec => {
        if (pillSections && !pillSections.includes(sec)) return;
        const pool = phraseBank[type]?.[sec];
        if (pool?.length) slides.push({ type, section: sec, text: pick(pool) });
      });
    }
  } else {
    types.forEach(type => {
      (modelBank[type] || []).forEach(model => slides.push({ type, isModel:true, model }));
    });
    slides = shuffle(slides);
  }
}

// ─── PAINT DOM ───────────────────────────────────────────
function paint() {
  const container = document.getElementById('slidesContainer');
  const dotNav    = document.getElementById('dotNav');

  container.innerHTML = slides.map((s, i) => {
    let inner;
    if (s.isModel) {
      inner = '<div class="task-text">' +
        s.model.paragraphs.map(p =>
          `<div class="task-section">` +
          (p.label ? `<div class="task-section-label">${p.label}</div>` : '') +
          `<div class="task-section-text">${dmHighlight(p.text)}</div></div>`
        ).join('') + '</div>';
    } else {
      const displayText = s.text;
      inner = `<div class="phrase-text ${sizeClass(displayText)}">${hlText(displayText, activeTopic)}</div>`;
    }
    return `<div class="slide" data-idx="${i}">${inner}</div>`;
  }).join('');

  const n = Math.min(slides.length, 60);
  dotNav.innerHTML = Array.from({length:n},(_,i) =>
    `<div class="dot" data-dot="${i}"></div>`
  ).join('');
  dotNav.querySelectorAll('.dot').forEach(d =>
    d.addEventListener('click', e => { e.stopPropagation(); jump(+d.dataset.dot); })
  );
}

// ─── CONTEXT ROW ─────────────────────────────────────────
// Shows: topic chips (when single type, no topic chosen)
//        topic indicator + section pills (when topic chosen or all types)
function renderContextRow() {
  const row = document.getElementById('contextRow');
  row.innerHTML = '';

  // Multi-type or task mode → no context row needed
  if (filter === 'all' || mode === 'task') return;

  const type = filter;

  if (topicPhase) {
    // ── TOPIC CHIPS ──
    const topics = TOPICS[type] || [];
    topics.forEach(topic => {
      const chip = document.createElement('button');
      chip.className = 'topic-chip' + (activeTopic === topic ? ' active' : '');
      chip.textContent = topic;
      chip.addEventListener('click', e => {
        e.stopPropagation();
        activeTopic = topic;
        topicPhase = false;
        build(); paint(); show(0,'none');
        renderContextRow(); resetAuto();
      });
      row.appendChild(chip);
    });

  } else {
    // ── TOPIC INDICATOR (if topic chosen) ──
    if (activeTopic) {
      const ind = document.createElement('div');
      ind.className = 'topic-indicator visible';
      ind.innerHTML = `<div class="topic-indicator-dot"></div>
        <span class="topic-indicator-label">${activeTopic} ✕</span>`;
      ind.title = 'Change topic';
      ind.addEventListener('click', e => {
        e.stopPropagation();
        topicPhase = true;
        renderContextRow();
      });
      row.appendChild(ind);
      // Add a small separator
      const sep = document.createElement('span');
      sep.style.cssText = 'width:1px;height:16px;background:rgba(255,255,255,.1);flex-shrink:0';
      row.appendChild(sep);
    } else {
      // No topic chosen yet — show a subtle "choose topic" prompt chip
      const prompt = document.createElement('button');
      prompt.className = 'topic-chip';
      prompt.style.opacity = '0.5';
      prompt.textContent = '＋ Choose topic';
      prompt.addEventListener('click', e => {
        e.stopPropagation();
        topicPhase = true;
        renderContextRow();
      });
      row.appendChild(prompt);
      return; // don't show section pills until topic chosen
    }

    // ── SECTION PILLS ──
    const pills = SECTION_PILLS[type] || [];
    pills.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'sec-pill' + (activePill?.label === p.label ? ' active' : '');
      btn.textContent = p.label;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        activePill = activePill?.label === p.label ? null : p;
        build(); paint(); show(0,'none'); renderContextRow(); resetAuto();
      });
      row.appendChild(btn);
    });
  }
}

// ─── UPDATE CHROME ───────────────────────────────────────
function updateChrome(s) {
  const badge = document.getElementById('typeBadge');
  const card  = document.getElementById('slideCard');
  const stage = document.getElementById('stage');

  badge.textContent = s.type.charAt(0).toUpperCase() + s.type.slice(1);
  badge.className   = `type-badge ${s.type}`;
  card.className    = `slide-card ${s.type}`;
  stage.className   = `stage ${s.type}`;

  const lbl = s.isModel ? (s.model?.topic || '') : (SEC_LABEL[s.section] || '');
  document.getElementById('sectionLabel').textContent = lbl;
  document.getElementById('sectionLabel').classList.toggle('visible', xray);
}

// ─── SHOW SLIDE ──────────────────────────────────────────
function show(idx, dir) {
  if (!slides.length) return;
  const els  = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');

  if (prev >= 0 && prev !== idx && els[prev]) {
    els[prev].classList.remove('active');
    if (dir !== 'none') {
      els[prev].classList.add('exit-left');
      setTimeout(() => els[prev]?.classList.remove('exit-left'), 480);
    }
  }

  if (els[idx]) {
    if (dir === 'forward')   els[idx].style.cssText = 'transform:translateX(60px);opacity:0';
    else if (dir === 'back') els[idx].style.cssText = 'transform:translateX(-60px);opacity:0';
    else                     els[idx].style.cssText = '';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      els[idx].classList.add('active');
      els[idx].style.cssText = '';
    }));
  }

  dots.forEach((d,i) => d.classList.toggle('active', i === idx));
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === slides.length-1;

  updateChrome(slides[idx]);
  prev = idx; current = idx;
}

// ─── NAV ─────────────────────────────────────────────────
function next() {
  if (busy || current >= slides.length-1) return;
  busy=true; show(current+1,'forward'); setTimeout(()=>busy=false,480); resetAuto();
}
function back() {
  if (busy || current<=0) return;
  busy=true; show(current-1,'back'); setTimeout(()=>busy=false,480); resetAuto();
}
function jump(idx) {
  if (busy) return;
  busy=true;
  show(idx, idx>current?'forward':'back');
  setTimeout(()=>busy=false,480); resetAuto();
}

// ─── AUTO ────────────────────────────────────────────────
function startAuto() {
  stopAuto();
  const fill = document.getElementById('progressFill');
  fill.style.transition='none'; fill.style.width='0%';
  requestAnimationFrame(()=>{
    fill.style.transition=`width ${AUTO_MS}ms linear`;
    fill.style.width='100%';
  });
  autoTimer = setTimeout(()=>{
    if (current < slides.length-1) next();
    else { build(); paint(); show(0,'none'); }
    if (autoOn) startAuto();
  }, AUTO_MS);
}
function stopAuto() {
  clearTimeout(autoTimer);
  const fill = document.getElementById('progressFill');
  fill.style.transition='none'; fill.style.width='0%';
}
function resetAuto() { if (autoOn) startAuto(); }
function toggleAuto() {
  autoOn=!autoOn;
  document.getElementById('autoRow').classList.toggle('on',autoOn);
  autoOn ? startAuto() : stopAuto();
}

// ─── X-RAY ───────────────────────────────────────────────
function showXray() {
  xray=true;
  document.getElementById('sectionLabel').classList.add('visible');
  if (!xrayDone) { xrayDone=true; document.getElementById('holdHint').classList.add('hidden'); }
}
function hideXray() {
  xray=false;
  document.getElementById('sectionLabel').classList.remove('visible');
}

// ─── MODE / FILTER ───────────────────────────────────────
function setMode(m) {
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  activePill=null;
  build(); paint(); show(0,'none'); renderContextRow(); resetAuto();
}

function setFilter(f) {
  filter=f;
  activePill=null;
  activeTopic=null;
  topicPhase = (f !== 'all'); // enter topic phase when single type selected
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.type===f));
  build(); paint(); show(0,'none'); renderContextRow(); resetAuto();
}

// ─── EVENTS ──────────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click',e=>{e.stopPropagation();back();});
document.getElementById('nextBtn').addEventListener('click',e=>{e.stopPropagation();next();});

const card = document.getElementById('slideCard');
let tx=0,ty=0,tt=0;
card.addEventListener('touchstart',e=>{
  tx=e.touches[0].clientX; ty=e.touches[0].clientY; tt=Date.now();
  longTimer=setTimeout(showXray,400);
},{passive:true});
card.addEventListener('touchend',e=>{
  clearTimeout(longTimer); hideXray();
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)) dx<0?next():back();
},{passive:true});
card.addEventListener('mousedown',()=>{longTimer=setTimeout(showXray,400);});
card.addEventListener('mouseup',()=>{clearTimeout(longTimer);hideXray();});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();back();}
  if(e.key==='a'||e.key==='A') toggleAuto();
});

document.querySelectorAll('.mode-btn').forEach(b=>
  b.addEventListener('click',e=>{e.stopPropagation();setMode(b.dataset.mode);})
);
document.querySelectorAll('.pill').forEach(p=>
  p.addEventListener('click',e=>{e.stopPropagation();setFilter(p.dataset.type);})
);
document.getElementById('autoRow').addEventListener('click',e=>{e.stopPropagation();toggleAuto();});

loadAll();
</script>
</body>
</html>
