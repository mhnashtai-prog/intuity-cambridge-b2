<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing Hub — INTUITY</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=Crimson+Text:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"DM Sans",-apple-system,sans-serif;background:#0d0d0d;background-image:radial-gradient(circle at 20% 50%,rgba(201,169,97,.04) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(201,169,97,.03) 0%,transparent 50%);color:#e5e5e7;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    .container{position:relative;z-index:2;max-width:75rem;margin:0 auto;padding:.5rem}
    /* HEADER - INTUITY cream */
    .global-header{background:rgba(240,239,236,.97);backdrop-filter:blur(14px);border-bottom:1.5px solid rgba(0,0,0,.08);padding:.65rem 1.25rem;margin-bottom:1.5rem;border-radius:.75rem .75rem 0 0}
    .header-row-main{display:flex;justify-content:space-between;align-items:center}
    .back-link{text-decoration:none;font-family:"Space Grotesk",sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(0,0,0,.38);transition:color .2s}
    .back-link:hover{color:rgba(0,0,0,.72)}
    .brand{display:flex;align-items:baseline;gap:.4rem}
    .brand-logo{font-family:"Space Grotesk",sans-serif;font-size:.78rem;font-weight:900;letter-spacing:.28em;text-transform:uppercase;color:rgba(0,0,0,.2)}
    .brand-subtitle{font-size:.6rem;color:rgba(0,0,0,.28);font-weight:600;text-transform:uppercase;letter-spacing:.1em}
    /* MODE TOGGLE */
    .reading-mode-toggle{display:flex;justify-content:center;margin-bottom:1.5rem}
    .mode-toggle-container{display:inline-flex;background:rgba(28,28,30,.6);backdrop-filter:blur(20px);border-radius:2rem;padding:.35rem;border:1px solid rgba(201,169,97,.3);box-shadow:0 4px 20px rgba(0,0,0,.4)}
    .mode-toggle-btn{font-family:"Space Grotesk",sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.6rem 1.5rem;border:none;background:transparent;border-radius:1.5rem;cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);color:rgba(229,229,231,.5);display:flex;align-items:center;gap:.5rem;white-space:nowrap}
    .mode-toggle-btn:hover{color:rgba(229,229,231,.8)}
    .mode-toggle-btn.active{background:linear-gradient(135deg,#c9a961 0%,#FFD700 100%);color:#1a1410;box-shadow:0 4px 15px rgba(201,169,97,.4)}
    /* ESSAY CONTAINER */
    .essay-container{background:linear-gradient(135deg,#f5f1e8 0%,#ede8dc 100%);padding:3.5rem 3rem 2rem;border-radius:2rem;max-width:52rem;margin:0 auto 2rem;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .essay-title{font-family:"Crimson Text",Georgia,serif;font-size:2rem;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:2.5rem;line-height:1.3;padding-bottom:1.5rem;border-bottom:2px solid rgba(0,0,0,.1)}
    /* COMPLETE TEXT */
    .complete-text-view{display:none}.complete-text-view.active{display:block}
    .complete-paragraph{margin-bottom:2rem;padding-bottom:2rem;border-bottom:1px solid rgba(139,115,85,.15)}
    .complete-paragraph:last-of-type{border-bottom:none;margin-bottom:3rem}
    .complete-section-label{font-family:"Space Grotesk",sans-serif;font-size:.9rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#6b5843;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid rgba(201,169,97,.3)}
    .complete-paragraph-text{font-family:"Crimson Text",Georgia,serif;font-size:1.1875rem;line-height:1.85;color:#2a2a2a;text-align:justify;text-indent:2.5rem;margin:0}
    .complete-nav{display:flex;justify-content:center;align-items:center;gap:1.5rem;padding:1.5rem 0;margin-top:2rem;border-top:2px solid rgba(139,115,85,.2)}
    .complete-nav-btn{font-family:"Space Grotesk",sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.75rem 1.5rem;border:2px solid rgba(201,169,97,.3);border-radius:2rem;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);background:linear-gradient(135deg,#9a9186 0%,#c9a961 100%);color:#2a2420;box-shadow:0 2px 8px rgba(154,145,134,.2)}
    .complete-nav-btn:hover:not(:disabled){background:linear-gradient(135deg,#c9a961 0%,#FFD700 100%);box-shadow:0 4px 15px rgba(201,169,97,.4);border-color:rgba(201,169,97,.6);transform:translateY(-2px) scale(1.05);color:#1a1410}
    .complete-nav-btn:disabled{opacity:.25;cursor:not-allowed}
    .complete-counter{font-family:"Space Grotesk",sans-serif;font-size:.875rem;font-weight:600;color:#6b5843;letter-spacing:.05em}
    /* SECTION CARDS */
    .section-cards-view{display:none}.section-cards-view.active{display:block}
    .paragraph-section{position:relative;padding:1.75rem .5rem 60px;min-height:220px;transition:all .3s;border-bottom:2px solid rgba(139,115,85,.2);margin-bottom:1rem}
    .paragraph-section:hover{background:rgba(201,169,97,.03);border-radius:.5rem}
    .section-heading{font-family:"Space Grotesk",sans-serif;font-size:.9rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#6b5843;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid rgba(201,169,97,.3)}
    .paragraph-text{font-family:"Crimson Text",Georgia,serif;font-size:1.1875rem;line-height:1.85;color:#2a2a2a;text-align:justify;text-indent:2.5rem;margin:0}
    .discourse-marker{color:#4169E1;font-weight:600}
    /* PHRASE LIST */
    .phrase-list-view{display:none;position:relative;background:linear-gradient(145deg,rgba(28,28,30,.95),rgba(20,20,22,.98));backdrop-filter:blur(30px);border-radius:1rem;border:1px solid rgba(201,169,97,.3);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 100px rgba(201,169,97,.15);min-height:450px}
    .phrase-list-view.active{display:block}
    .phrase-group{display:flex;align-items:stretch;background:#faf8f5;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.15);transition:all .3s cubic-bezier(.4,0,.2,1);min-height:140px;border-bottom:1px solid rgba(0,0,0,.05)}
    .phrase-group:first-child{border-top-left-radius:1rem;border-top-right-radius:1rem}
    .phrase-group:last-child{border-bottom-left-radius:1rem;border-bottom-right-radius:1rem;border-bottom:none}
    .phrase-group:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.2);z-index:1}
    .phrase-group-icon{width:55px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.5rem;color:rgba(255,255,255,.9)}
    .phrase-group[data-variant="default"] .phrase-group-icon{background:linear-gradient(135deg,#e74c3c,#c0392b)}
    .phrase-group[data-variant="alt1"]    .phrase-group-icon{background:linear-gradient(135deg,#f39c12,#d68910)}
    .phrase-group[data-variant="alt2"]    .phrase-group-icon{background:linear-gradient(135deg,#2ecc71,#27ae60)}
    .phrase-group-content{flex:1;padding:.875rem 1rem .875rem 1.125rem;display:flex;flex-direction:column;background:#faf8f5;min-width:0}
    .phrase-group-title{font-family:"Space Grotesk",sans-serif;font-size:.85rem;font-weight:700;color:#1a1a1a;text-transform:uppercase;letter-spacing:.02em;margin-bottom:.75rem;flex-shrink:0}
    .phrase-list-wrapper{flex:1;overflow-y:auto;overflow-x:hidden;margin-right:.25rem;scrollbar-width:thin;scrollbar-color:rgba(201,169,97,.4) transparent}
    .phrase-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.4rem;padding-bottom:.5rem;padding-right:.5rem}
    .phrase-list li{font-size:.7rem;color:#4a4a4a;line-height:1.45;font-weight:500;padding-left:1.25rem;position:relative}
    .phrase-list li::before{content:"•";position:absolute;left:0;color:#C9A961;font-weight:bold;font-size:1rem}
    .phrase-placeholder{color:#9ca3af;font-style:italic}
    .modal-close-btn{position:absolute;top:.75rem;right:.75rem;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border:1px solid rgba(201,169,97,.3);color:#C9A961;font-size:1.25rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;z-index:100;font-weight:300;line-height:1}
    .modal-close-btn:hover{background:rgba(201,169,97,.3);border-color:rgba(201,169,97,.6);transform:scale(1.1) rotate(90deg)}
    /* SWIPE */
    .swipe-view{display:none;position:relative;min-height:450px;background:linear-gradient(145deg,rgba(28,28,30,.95),rgba(20,20,22,.98));border-radius:1rem;border:1px solid rgba(201,169,97,.3);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 100px rgba(201,169,97,.15)}
    .swipe-view.active{display:block}
    .swipe-slides-container{position:relative;min-height:400px;overflow:hidden}
    .swipe-slide{position:absolute;top:0;left:0;width:100%;height:100%;padding:4rem 3rem;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateX(100%);transition:all .5s cubic-bezier(.4,0,.2,1);pointer-events:none}
    .swipe-slide.active{opacity:1;transform:translateX(0);pointer-events:auto;z-index:10}
    .swipe-phrase-text{font-family:"Space Grotesk",sans-serif;line-height:1.3;text-align:center;color:#e5e5e7;font-weight:800;max-width:95%;width:100%;text-transform:uppercase;letter-spacing:-.02em}
    .swipe-phrase-text.size-small{font-size:4rem}.swipe-phrase-text.size-medium{font-size:2.8rem}.swipe-phrase-text.size-large{font-size:2rem}.swipe-phrase-text.size-xlarge{font-size:1.5rem;text-transform:none}
    .swipe-phrase-text .highlight{background:linear-gradient(135deg,#C9A961 0%,#FFD700 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900}
    .swipe-nav-arrows{position:absolute;top:50%;left:0;right:0;display:flex;justify-content:space-between;padding:0 .5rem;transform:translateY(-50%);pointer-events:none;z-index:20}
    .swipe-arrow{pointer-events:auto;width:40px;height:40px;border-radius:50%;background:rgba(201,169,97,.2);border:1px solid rgba(201,169,97,.4);color:#C9A961;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
    .swipe-arrow:hover:not(:disabled){background:rgba(201,169,97,.35);transform:scale(1.15)}
    .swipe-arrow:disabled{opacity:.2;cursor:not-allowed}
    .swipe-nav-dots{padding:1.5rem;display:flex;justify-content:center;gap:.5rem;background:rgba(0,0,0,.2)}
    .swipe-dot{width:8px;height:8px;border-radius:50%;background:rgba(99,99,102,.3);cursor:pointer;transition:all .3s}
    .swipe-dot.active{background:#C9A961;transform:scale(1.4);box-shadow:0 0 10px rgba(201,169,97,.6)}
    /* NAV */
    .paragraph-nav-container{position:absolute;bottom:.75rem;left:.5rem;right:.5rem;display:flex;justify-content:center;align-items:center;height:36px;gap:.35rem;flex-wrap:nowrap}
    .nav-btn{font-family:"Space Grotesk",sans-serif;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;padding:.35rem .65rem;border:1px solid rgba(201,169,97,.3);border-radius:1.5rem;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);background:linear-gradient(135deg,#9a9186 0%,#c9a961 100%);color:#2a2420;box-shadow:0 2px 6px rgba(154,145,134,.2);white-space:nowrap;flex-shrink:0}
    .nav-btn:hover:not(:disabled){background:linear-gradient(135deg,#c9a961 0%,#FFD700 100%);box-shadow:0 4px 12px rgba(201,169,97,.4);border-color:rgba(201,169,97,.6);transform:translateY(-2px) scale(1.05);color:#1a1410}
    .nav-btn:disabled{opacity:.25;cursor:not-allowed}
    .view-mode-toggle-mini{display:flex;gap:.2rem;background:rgba(0,0,0,.08);padding:.2rem;border-radius:1rem;border:1px solid rgba(201,169,97,.2);flex-shrink:0}
    .view-mode-btn{padding:.3rem .5rem;border:none;background:transparent;border-radius:.7rem;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);opacity:.4;color:#2a2420;font-family:"Space Grotesk",sans-serif;white-space:nowrap}
    .view-mode-btn:hover{opacity:.9;background:rgba(201,169,97,.15);transform:translateY(-1px)}
    .view-mode-btn.active{background:rgba(201,169,97,.25);opacity:1;color:#1a1410}
    .view-mode-btn.active:hover{background:linear-gradient(135deg,#c9a961 0%,#FFD700 100%);transform:translateY(-2px) scale(1.05)}
    .sample-counter{font-family:"Space Grotesk",sans-serif;font-size:.6rem;font-weight:600;color:rgba(0,0,0,.35);letter-spacing:.03em;white-space:nowrap;min-width:32px;text-align:center;flex-shrink:0}
    .nav-pills{display:flex;justify-content:center;gap:1rem;padding:1.5rem 1rem;flex-wrap:wrap}
    .pill-btn{font-family:"Space Grotesk",sans-serif;font-size:.875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.75rem 2rem;border:2px solid transparent;border-radius:2rem;cursor:pointer;transition:all .4s;background:linear-gradient(135deg,#9a9186 0%,#c9a961 100%);color:#2a2420;box-shadow:0 4px 15px rgba(154,145,134,.25)}
    .pill-btn:hover{transform:translateY(-4px) scale(1.05);filter:brightness(1.1)}
    .pill-btn.active{border:2px solid rgba(201,169,97,.6);font-weight:800;box-shadow:0 6px 20px rgba(201,169,97,.5)}
    @media(max-width:768px){
      .mode-toggle-btn{font-size:.65rem;padding:.5rem 1rem}
      .paragraph-nav-container{gap:.25rem;left:.25rem;right:.25rem;bottom:.5rem}
      .nav-btn{font-size:.55rem;padding:.3rem .5rem}
      .view-mode-btn{font-size:.5rem;padding:.25rem .4rem}
      .sample-counter{font-size:.55rem;min-width:28px}
      .swipe-phrase-text.size-small{font-size:2.5rem}.swipe-phrase-text.size-medium{font-size:1.8rem}.swipe-phrase-text.size-large{font-size:1.3rem}.swipe-phrase-text.size-xlarge{font-size:1.1rem}
      .essay-container{padding:2rem 1.2rem 1.5rem}
    }
  </style>
</head>
<body>
<div class="container">
  <header class="global-header">
    <div class="header-row-main">
      <a class="back-link" href="../../../index.html?openModal=writing">← Writing</a>
      <div class="brand">
        <span class="brand-logo">INTUITY</span>
        <span class="brand-subtitle" id="brandSubtitle">Writing Hub</span>
      </div>
      <div style="width:60px"></div>
    </div>
  </header>

  <div class="reading-mode-toggle">
    <div class="mode-toggle-container">
      <button class="mode-toggle-btn active" onclick="setReadingMode('complete')"><span class="mode-icon">📖</span><span>Complete Text</span></button>
      <button class="mode-toggle-btn"        onclick="setReadingMode('cards')"><span class="mode-icon">🎴</span><span>Section Cards</span></button>
    </div>
  </div>

  <div class="essay-container" id="essayContainer">
    <div id="loadingSpinner" style="text-align:center;padding:4rem;opacity:1;transition:opacity .3s">
      <div style="font-weight:600;color:#6b5843">Loading content…</div>
      <div style="margin-top:1rem;font-size:.875rem;color:#9a9186">Please wait</div>
    </div>
    <div id="mainContent" style="opacity:0;transition:opacity .3s"></div>
  </div>
</div>

<script>
let currentType=null,currentData=null,phraseData=null,paragraphIndices=[],viewModes=[],swipeIndices={},readingMode='complete',completeTextIndex=0;

const DATA_PATHS={
  essays:'essays/data1/essays-models.json',
  reports:'essays/data1/reports-models.json',
  reviews:'essays/data1/reviews-models.json',
  emails:'essays/data1/emails-models.json'
};
const PHRASE_PATHS={
  essays:{hook:'essays/data1/essay-hook.json',thesis:'essays/data1/essay-thesis.json',full:'essays/data1/essay-full-structures.json'},
  reports:{hook:'essays/data1/report-intro-purpose.json',thesis:'essays/data1/report-intro-basis.json',full:'essays/data1/report-full-structures.json'},
  reviews:{hook:'essays/data1/review-intro-opening.json',thesis:'essays/data1/review-intro-background.json',full:'essays/data1/review-full-structures.json'},
  emails:{hook:'essays/data1/email-opening.json',thesis:'essays/data1/email-body.json',full:'essays/data1/email-closing.json'}
};
const ESSAY_TYPE_MAP={essays:'for_and_against',reports:'formal_report',reviews:'product_review',emails:'informal_email'};

function getSectionKey(label,ct){
  const lk=label||'';
  if(lk==='Introduction'||lk==='INTRODUCTION'){if(ct==='essays')return'introduction_context';if(ct==='reports')return'introduction_purpose';if(ct==='reviews')return'introduction_opening';}
  const m={'Thesis':'thesis_statement','THESIS':'thesis_statement','Body Paragraph 1 - Advantage':'advantages','Body Paragraph 2 - Advantage':'advantages','Body Paragraph 3 - Disadvantage':'disadvantages','Body Paragraph 3 - Counterargument/Additional Point':'disadvantages','Conclusion':'conclusion','CONCLUSION':'conclusion','Introduction - Purpose':'introduction_purpose','Introduction - Basis':'introduction_basis','General View':'general_view','GENERAL VIEW':'general_view','Praising':'praising','PRAISING':'praising','Criticising':'criticising','CRITICISING':'criticising','Criticizing':'criticising','CRITICIZING':'criticising','Recommendation':'recommendation','RECOMMENDATION':'recommendation','Recommendations':'recommendation','RECOMMENDATIONS':'recommendation','Introduction - Opening':'introduction_opening','Introduction - Background':'introduction_background','Reputation':'introduction_background','REPUTATION':'introduction_background','Features':'features','FEATURES':'features','Features - Paragraph 1':'features','Features - Paragraph 2':'features','Opening':'opening','OPENING':'opening','Body':'body','BODY':'body','Main Content':'body','MAIN CONTENT':'body','Main content':'body','Closing':'closing','CLOSING':'closing'};
  return m[lk];
}

function setReadingMode(mode){readingMode=mode;document.querySelectorAll('.mode-toggle-btn').forEach(b=>b.classList.remove('active'));event.target.closest('.mode-toggle-btn').classList.add('active');renderWriting();}

async function loadWritingType(type){
  currentType=type;completeTextIndex=0;
  document.querySelectorAll('.pill-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===type));
  document.getElementById('brandSubtitle').textContent=type.charAt(0).toUpperCase()+type.slice(1)+' Models';
  const sp=document.getElementById('loadingSpinner'),mc=document.getElementById('mainContent');
  sp.style.opacity='1';sp.style.display='block';mc.style.opacity='0';mc.style.display='none';
  try{
    const r=await fetch(DATA_PATHS[type]);if(!r.ok)throw new Error();
    currentData=await r.json();
    const[hr,tr,fr]=await Promise.all([fetch(PHRASE_PATHS[type].hook),fetch(PHRASE_PATHS[type].thesis),fetch(PHRASE_PATHS[type].full)]);
    phraseData={hook:hr.ok?await hr.json():null,thesis:tr.ok?await tr.json():null,full:fr.ok?await fr.json():null};
    if(currentData.samples?.length>0){const n=currentData.samples[0].paragraphs.length;paragraphIndices=new Array(n).fill(0);viewModes=new Array(n).fill('text');swipeIndices={};renderWriting();}
  }catch(e){
    mc.innerHTML=`<div style="text-align:center;padding:4rem;color:#ef4444">Failed to load ${type}</div>`;
    mc.style.display='block';mc.style.opacity='1';sp.style.display='none';
  }
}

function renderWriting(){
  const mc=document.getElementById('mainContent'),sp=document.getElementById('loadingSpinner');
  if(!currentData?.samples)return;
  let h='';
  if(currentData.title)h+=`<div class="essay-title">${currentData.title}</div>`;
  h+=readingMode==='complete'?renderCompleteTextView():renderSectionCardsView();
  h+=`<div class="nav-pills"><button class="pill-btn ${currentType==='essays'?'active':''}" data-type="essays" onclick="loadWritingType('essays')">Essays</button><button class="pill-btn ${currentType==='reports'?'active':''}" data-type="reports" onclick="loadWritingType('reports')">Reports</button><button class="pill-btn ${currentType==='reviews'?'active':''}" data-type="reviews" onclick="loadWritingType('reviews')">Reviews</button><button class="pill-btn ${currentType==='emails'?'active':''}" data-type="emails" onclick="loadWritingType('emails')">Emails</button></div>`;
  mc.innerHTML=h;
  setTimeout(()=>{sp.style.opacity='0';setTimeout(()=>sp.style.display='none',300);mc.style.display='block';setTimeout(()=>mc.style.opacity='1',50);},100);
}

function renderCompleteTextView(){
  const s=currentData.samples[completeTextIndex],tot=currentData.samples.length;
  let h='<div class="complete-text-view active">';
  s.paragraphs.forEach(p=>{h+=`<div class="complete-paragraph">${p.label?`<div class="complete-section-label">${p.label}</div>`:''}<div class="complete-paragraph-text">${highlightFirstWords(p.text)}</div></div>`;});
  h+=`<div class="complete-nav"><button class="complete-nav-btn" onclick="navigateCompleteText(-1)" ${completeTextIndex===0?'disabled':''}>← Previous</button><div class="complete-counter">${currentType.slice(0,1).toUpperCase()+currentType.slice(1,-1)} ${completeTextIndex+1} of ${tot}</div><button class="complete-nav-btn" onclick="navigateCompleteText(1)" ${completeTextIndex===tot-1?'disabled':''}>Next →</button></div></div>`;
  return h;
}

function renderSectionCardsView(){
  const fs=currentData.samples[0];
  let h='<div class="section-cards-view active">';
  fs.paragraphs.forEach((p,pi)=>{
    const si=paragraphIndices[pi],cur=currentData.samples[si].paragraphs[pi],tot=currentData.samples.length,vm=viewModes[pi];
    h+=`<div class="paragraph-section" data-para-index="${pi}">${cur.label?`<div class="section-heading">${cur.label}</div>`:''}<div class="paragraph-text" style="display:${vm==='text'?'block':'none'}">${highlightFirstWords(cur.text)}</div>${renderListView(pi,cur.label,vm)}${renderSwipeView(pi,cur.label,vm)}<div class="paragraph-nav-container"><button class="nav-btn" onclick="navigateParagraph(${pi},-1)" ${si===0?'disabled':''}>← PREV</button>${renderViewModeToggle(pi,cur.label)}<div class="sample-counter">${si+1}/${tot}</div><button class="nav-btn" onclick="navigateParagraph(${pi},1)" ${si===tot-1?'disabled':''}>NEXT →</button></div></div>`;
  });
  return h+'</div>';
}

function navigateCompleteText(d){const n=completeTextIndex+d;if(n>=0&&n<currentData.samples.length){completeTextIndex=n;renderWriting();}}

function renderViewModeToggle(pi,label){if(!label||!getPhraseSection(label))return'';const vm=viewModes[pi];return`<div class="view-mode-toggle-mini"><button class="view-mode-btn ${vm==='list'?'active':''}" onclick="setViewMode(${pi},'list')">LIST</button><button class="view-mode-btn ${vm==='swipe'?'active':''}" onclick="setViewMode(${pi},'swipe')">SLIDE</button></div>`;}

function renderListView(pi,label,vm){
  const ps=getPhraseSection(label);if(!ps)return'';
  const isIntro=label&&label.toLowerCase().includes('introduction');
  const isPaired=isIntro||(currentType==='reviews'&&label&&label.toLowerCase().includes('reputation'));
  const icons={default:'📌',alt1:'👍',alt2:'⭐'};
  let h=`<div class="phrase-list-view ${vm==='list'?'active':''}"><button class="modal-close-btn" onclick="setViewMode(${pi},'text')" title="Close">×</button>`;
  if(isPaired&&phraseData?.hook&&phraseData?.thesis){
    const et=ESSAY_TYPE_MAP[currentType],hk=getSectionKey(label,currentType)||'introduction_context';
    const hs=phraseData.hook.structures[et]?.sections[hk];
    const tKey=currentType==='essays'?'thesis_statement':currentType==='reports'?'introduction_basis':'introduction_background';
    const ts=phraseData.thesis.structures[et]?.sections[tKey];
    if(hs&&ts){
      Object.keys(hs.phrases).forEach(gk=>{
        const hks=hs.phrases[gk],ths=ts.phrases[gk],max=Math.max(hks.length,ths.length);
        const lbl=gk==='default'?'Complete Introduction Examples':gk==='alt1'?'Alternative Examples 1':'Alternative Examples 2';
        h+=`<div class="phrase-group" data-variant="${gk}"><div class="phrase-group-icon"><span>${icons[gk]}</span></div><div class="phrase-group-content"><div class="phrase-group-title">${lbl}</div><div class="phrase-list-wrapper"><ul class="phrase-list">${Array.from({length:max},(_,i)=>`<li style="margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(201,169,97,.15);list-style:none;padding-left:0"><div style="margin-bottom:.75rem;line-height:1.6">${formatPhrase(hks[i%hks.length]||hks[0])}</div><div style="line-height:1.6">${formatPhrase(ths[i%ths.length]||ths[0])}</div></li>`).join('')}</ul></div></div></div>`;
      });
      return h+'</div>';
    }
  }
  const phrases=ps.phrases;
  Object.keys(phrases).forEach(gk=>{
    const lbl=gk==='default'?'Core Phrases':gk==='alt1'?'Alternative Set 1':'Alternative Set 2';
    h+=`<div class="phrase-group" data-variant="${gk}"><div class="phrase-group-icon"><span>${icons[gk]}</span></div><div class="phrase-group-content"><div class="phrase-group-title">${lbl}</div><div class="phrase-list-wrapper"><ul class="phrase-list">${phrases[gk].map(p=>`<li>${formatPhrase(p)}</li>`).join('')}</ul></div></div></div>`;
  });
  return h+'</div>';
}

function renderSwipeView(pi,label,vm){
  let slides=[];
  const isIntro=label&&label.toLowerCase().includes('introduction');
  if(isIntro&&phraseData?.hook&&phraseData?.thesis){
    const et=ESSAY_TYPE_MAP[currentType],hk=getSectionKey(label,currentType)||'introduction_context';
    const hs=phraseData.hook.structures[et]?.sections[hk];
    const tKey=currentType==='essays'?'thesis_statement':currentType==='reports'?'introduction_basis':'introduction_background';
    const ts=phraseData.thesis.structures[et]?.sections[tKey];
    if(hs&&ts)Object.keys(hs.phrases).forEach(gk=>{const hks=hs.phrases[gk],ths=ts.phrases[gk]||[],max=Math.max(hks.length,ths.length);for(let i=0;i<max;i++)slides.push({type:'paired',hook:hks[i%hks.length]||hks[0],thesis:ths[i%ths.length]||ths[0]});});
  }
  if(!slides.length){const ps=getPhraseSection(label);if(!ps)return'';Object.keys(ps.phrases).forEach(gk=>ps.phrases[gk].forEach(p=>slides.push({type:'single',text:p})));}
  const key=`para_${pi}`,cur=swipeIndices[key]||0;
  return`<div class="swipe-view ${vm==='swipe'?'active':''}"><button class="modal-close-btn" onclick="setViewMode(${pi},'text')" title="Close">×</button><div class="swipe-slides-container">${slides.map((s,i)=>{let sc='';if(s.type==='paired'){const wc=(s.hook+' '+s.thesis).replace(/\[([^\]]+)\]/g,'$1').split(/\s+/).length,sz=wc<=15?'size-medium':wc<=25?'size-large':'size-xlarge';sc=`<div class="swipe-phrase-text ${sz}" style="text-align:left;max-width:85%"><div style="margin-bottom:1.5rem;line-height:1.5">${formatPhraseForSwipe(s.hook)}</div><div style="line-height:1.5;opacity:.95">${formatPhraseForSwipe(s.thesis)}</div></div>`;}else{const wc=s.text.replace(/\[([^\]]+)\]/g,'$1').split(/\s+/).length,sz=wc<=10?'size-small':wc<=20?'size-medium':wc<=30?'size-large':'size-xlarge';sc=`<div class="swipe-phrase-text ${sz}">${formatPhraseForSwipe(s.text)}</div>`;}return`<div class="swipe-slide ${i===cur?'active':''}">${sc}</div>`;}).join('')}<div class="swipe-nav-arrows"><button class="swipe-arrow" onclick="navigateSwipe(${pi},-1)" ${cur===0?'disabled':''}>←</button><button class="swipe-arrow" onclick="navigateSwipe(${pi},1)" ${cur===slides.length-1?'disabled':''}>→</button></div></div><div class="swipe-nav-dots">${slides.map((_,i)=>`<div class="swipe-dot ${i===cur?'active':''}" onclick="goToSwipeSlide(${pi},${i})"></div>`).join('')}</div></div>`;
}

function getPhraseSection(label){
  if(!phraseData)return null;
  const et=ESSAY_TYPE_MAP[currentType];if(!et)return null;
  let sk=getSectionKey(label,currentType);
  if(!sk){
    const ll=label?.toLowerCase()||'';
    if(currentType==='essays'){if(ll.includes('introduction'))sk='introduction_context';else if(ll.includes('thesis'))sk='thesis_statement';else if(ll.includes('advantage')&&!ll.includes('disadvantage'))sk='advantages';else if(ll.includes('disadvantage')||ll.includes('counterargument')||ll.includes('additional point'))sk='disadvantages';else if(ll.includes('conclusion'))sk='conclusion';}
    else if(currentType==='reports'){if(ll.includes('introduction')&&!ll.includes('basis'))sk='introduction_purpose';else if(ll.includes('basis'))sk='introduction_basis';else if(ll.includes('general')||ll.includes('overview'))sk='general_view';else if(ll.includes('prais')||ll.includes('positive')||ll.includes('strength'))sk='praising';else if(ll.includes('critic')||ll.includes('concern')||ll.includes('negative')||ll.includes('problem'))sk='criticising';else if(ll.includes('recommend'))sk='recommendation';else if(ll.includes('conclusion'))sk='conclusion';}
    else if(currentType==='reviews'){if(ll.includes('introduction')&&!ll.includes('background'))sk='introduction_opening';else if(ll.includes('reputation')||ll.includes('background'))sk='introduction_background';else if(ll.includes('feature'))sk='features';else if(ll.includes('recommend'))sk='recommendation';}
    else if(currentType==='emails'){if(ll.includes('opening')||ll.includes('greeting'))sk='opening';else if(ll.includes('body')||ll.includes('main')||ll.includes('content'))sk='body';else if(ll.includes('closing')||ll.includes('sign'))sk='closing';}
  }
  if(!sk)return null;
  let sd=null,lt=et;
  if(currentType==='essays')sd=sk==='introduction_context'?phraseData.hook:sk==='thesis_statement'?phraseData.thesis:phraseData.full;
  else if(currentType==='reports')sd=sk==='introduction_purpose'?phraseData.hook:sk==='introduction_basis'?phraseData.thesis:phraseData.full;
  else if(currentType==='reviews')sd=sk==='introduction_opening'?phraseData.hook:sk==='introduction_background'?phraseData.thesis:phraseData.full;
  else if(currentType==='emails'){const ll=label?.toLowerCase()||'',isFormal=ll.includes('formal');lt=isFormal?'formal_email':'informal_email';sd=sk==='opening'?phraseData.hook:sk==='body'?phraseData.thesis:phraseData.full;}
  if(!sd?.structures)return null;
  const struct=sd.structures[lt];if(!struct)return null;
  let fsk=sk;
  if(currentType==='emails'){const ll=label?.toLowerCase()||'',sfx=ll.includes('formal')?'_formal':'_informal';fsk=sk+sfx;}
  let section=struct.sections[fsk];
  if(!section&&currentType==='emails'){const av=Object.keys(struct.sections||{});const m=av.find(k=>k.toLowerCase().includes(sk));section=m?struct.sections[m]:av.length?struct.sections[av[0]]:null;}
  return section||null;
}

function formatPhrase(p){return p.replace(/\[([^\]]+)\]/g,'<span class="phrase-placeholder">[$1]</span>');}
function formatPhraseForSwipe(p){return p.replace(/\[([^\]]+)\]/g,'<span class="highlight">$1</span>');}

function setViewMode(pi,mode){
  if(mode!=='text'){const ps=getPhraseSection(currentData.samples[0].paragraphs[pi].label);if(!ps)return;}
  viewModes[pi]=mode;
  if(mode==='swipe'&&swipeIndices[`para_${pi}`]===undefined)swipeIndices[`para_${pi}`]=0;
  renderWriting();
}
function navigateSwipe(pi,d){const key=`para_${pi}`,cur=swipeIndices[key]||0;const ps=getPhraseSection(currentData.samples[0].paragraphs[pi].label);if(!ps)return;let tot=0;Object.keys(ps.phrases).forEach(k=>tot+=ps.phrases[k].length);const n=cur+d;if(n>=0&&n<tot){swipeIndices[key]=n;renderWriting();}}
function goToSwipeSlide(pi,idx){swipeIndices[`para_${pi}`]=idx;renderWriting();}
function highlightFirstWords(text){const s=text.split(/([.!?]\s+)/);let r='';for(let i=0;i<s.length;i++){const t=s[i];if(t.match(/^[.!?]\s+$/)||!t.trim()){r+=t;continue;}const w=t.trim().split(/\s+/),n=Math.min(5,Math.max(3,Math.floor(w.length*.3)));r+=`<span class="discourse-marker">${w.slice(0,n).join(' ')}</span>`;if(w.length>n)r+=' '+w.slice(n).join(' ');}return r;}
function navigateParagraph(pi,d){const n=paragraphIndices[pi]+d;if(n<0||n>=currentData.samples.length)return;paragraphIndices[pi]=n;renderWriting();}

window.addEventListener('DOMContentLoaded',()=>loadWritingType('essays'));
</script>
