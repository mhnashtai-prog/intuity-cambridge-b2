<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Narrative Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@600;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  /* lettuce = Review stage identity (matches review-model.html) */
  --acc:#b06a2c;--sig:#8f5320;--txt:rgba(0,0,0,0.82);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.topic-label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-align:right;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}

/* ── SUBJECT TABS ── */
.topic-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.topic-tabs::-webkit-scrollbar{display:none}
.ttab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.ttab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ttab.active{background:var(--ink);color:#fff}

/* ── MODE TOGGLE (Cards here / Phrases → accordion model page) ── */
.mode-row{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem 0.15rem;background:rgba(240,239,236,0.8)}
.mode-pill{display:inline-flex;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.2rem}
.mode-btn{font-family:'Barlow',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:0.34rem 0.95rem;border:none;background:transparent;border-radius:1.5rem;cursor:pointer;color:rgba(0,0,0,0.4);transition:all .25s;text-decoration:none}
.mode-btn:hover{color:rgba(0,0,0,0.7)}
.mode-btn.active{background:var(--sig);color:#fff}

/* ── STAGE ── */
.stage{flex:1;min-height:0;position:relative;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;padding:1.1rem 1rem 1.4rem}
.stage::-webkit-scrollbar{width:3px}
.stage::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

.hint{width:min(420px,92vw);font-family:'Instrument Sans',sans-serif;font-style:italic;font-size:0.7rem;color:rgba(0,0,0,0.32);margin-bottom:0.8rem;text-align:center}

/* ── stack + spine ── */
.stack{width:min(420px,92vw);position:relative}
.stack.has-cards::before{content:'';position:absolute;left:1.35rem;top:0.6rem;bottom:0.6rem;width:2px;background:var(--sig);opacity:0.22;z-index:0}
.card{position:relative;z-index:1;display:flex;background:var(--white);border-radius:1.1rem;overflow:hidden;margin-bottom:0.55rem;box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,3px 5px 0 rgba(0,0,0,0.05),0 14px 36px rgba(0,0,0,0.12),0 3px 9px rgba(0,0,0,0.06);animation:cardUp .5s cubic-bezier(.22,1,.36,1) both}
@keyframes cardUp{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
.band{width:2.7rem;flex-shrink:0;background:var(--sig);display:flex;flex-direction:column;align-items:center;padding:0.85rem 0 0.95rem;gap:0.55rem}
.band-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;line-height:1}
.band-word{writing-mode:vertical-rl;text-orientation:mixed;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.62rem;letter-spacing:0.26em;text-transform:uppercase;color:rgba(255,255,255,0.72)}
.content{flex:1;min-width:0;padding:0.9rem 1rem 1rem}
.flow{width:2.7rem;text-align:center;color:var(--sig);opacity:0.45;font-size:0.78rem;line-height:1;margin:-0.15rem 0 0.4rem}

/* ── tiles ── */
.line{font-family:'Barlow',sans-serif;font-weight:500;font-size:0.98rem;line-height:1.55;color:var(--txt)}
.lead{color:var(--txt);font-weight:600}
.soft{color:rgba(0,0,0,0.42);font-weight:400;font-size:0.9rem}
.sig{color:var(--sig);font-weight:500;font-size:0.9rem;margin-right:0.12rem}
.view{color:rgba(0,0,0,0.36);font-weight:400;font-size:0.86rem}
.gap{font-weight:600;color:rgba(0,0,0,0.5);letter-spacing:0.16em;padding:0 0.06rem}
.ast{color:var(--sig);font-weight:600;font-size:0.7em;vertical-align:0.35em;margin-left:0.05rem}
.dev{margin-top:0.02rem;line-height:1;font-family:'Instrument Sans',sans-serif;font-size:0.72rem;color:rgba(0,0,0,0.22);letter-spacing:0.16em}

/* ── rollable line + quiet arrows ── */
.rline{display:flex;align-items:center;gap:0.3rem}
.rline+.rline{margin-top:0.55rem}
.rtext{flex:1;min-width:0}
.nav{display:flex;gap:0.35rem;flex-shrink:0;opacity:1;align-items:center}
.nav button{border:none;background:none;color:var(--sig);font-size:1.15rem;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;padding:0 0.05rem;font-family:'Barlow',sans-serif}
.nav button:hover{opacity:0.55}
.nav button:active{transform:scale(.85)}
@keyframes navPulse{0%,100%{opacity:1}50%{opacity:0.3}}
.nav button.teach{animation:navPulse 0.9s ease-in-out 3}

/* ── in-card footnote ── */
.card-note{margin-top:0.7rem;padding-top:0.55rem;border-top:1px solid rgba(0,0,0,0.06);font-family:'Instrument Sans',sans-serif;font-size:0.66rem;line-height:1.7;color:rgba(0,0,0,0.34)}
.card-note .k{color:var(--sig);opacity:0.75;margin-right:0.05rem;font-weight:600}
.card-note span.opt{margin-right:0.6rem;white-space:nowrap}

.state{width:min(420px,92vw);text-align:center;padding:2.5rem 1rem;font-family:'Instrument Sans',sans-serif;color:rgba(0,0,0,0.4);font-style:italic;font-size:0.85rem}
.state.err{color:#b4453a}

/* ── FOOTER NAV ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ── PHONE ── */
@media (max-width:480px){
  .stage{padding:0.85rem 0.85rem 1.1rem}
  .hint{font-size:0.66rem;margin-bottom:0.65rem}
  .stack,.hint{width:94vw}
  .band{width:2.4rem;padding:0.7rem 0 0.8rem;gap:0.45rem}
  .band-num{font-size:1.3rem}
  .band-word{font-size:0.56rem;letter-spacing:0.22em}
  .stack.has-cards::before{left:1.2rem}
  .flow{width:2.4rem;font-size:0.72rem;margin:-0.2rem 0 0.32rem}
  .content{padding:0.8rem 0.85rem 0.9rem}
  .card{margin-bottom:0.45rem}
  .line{font-size:0.9rem;line-height:1.5}
  .lead{font-size:0.9rem}
  .soft{font-size:0.84rem}
  .sig{font-size:0.84rem}
  .view{font-size:0.8rem}
  .gap{letter-spacing:0.13em}
  .rline+.rline{margin-top:0.45rem}
  .nav button{font-size:1.05rem}
  .card-note{font-size:0.62rem;margin-top:0.6rem;padding-top:0.5rem}
  .card-note span.opt{margin-right:0.5rem}
}
@media (max-width:360px){
  .line,.lead{font-size:0.86rem}
  .soft,.sig{font-size:0.8rem}
  .view{font-size:0.76rem}
  .band{width:2.2rem}
  .flow{width:2.2rem}
  .stack.has-cards::before{left:1.1rem}
}
/* ── narrative-specific ── */
.stage-purpose{font-family:'Instrument Sans',sans-serif;font-style:italic;font-size:0.8rem;line-height:1.5;color:rgba(0,0,0,0.5);margin-bottom:0.9rem}
.frame-row{margin-bottom:0.9rem}
.frame-lead,.recipe-k{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:var(--acc);opacity:0.75;margin-bottom:0.3rem;display:inline-block}
.frame-line{font-family:'Instrument Sans',sans-serif;font-size:0.98rem;line-height:1.5;color:var(--ink);font-weight:500}
.recipe-row{display:flex;align-items:center;flex-wrap:wrap;gap:0.35rem;padding:0.55rem 0;margin-bottom:0.7rem;border-top:1px dashed rgba(0,0,0,0.1);border-bottom:1px dashed rgba(0,0,0,0.1)}
.recipe-chip{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--sig);background:rgba(176,106,44,0.1);border-radius:1rem;padding:0.18rem 0.6rem}
.recipe-plus{color:rgba(0,0,0,0.28);font-weight:700}
.ing-wrap{display:flex;flex-direction:column;gap:0.7rem}
.ing-grp{}
.ing-cat{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.4);margin-bottom:0.35rem}
.ing-words{display:flex;flex-wrap:wrap;gap:0.3rem}
.ing-word{font-family:'Instrument Sans',sans-serif;font-size:0.8rem;color:rgba(0,0,0,0.72);background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);border-radius:0.5rem;padding:0.16rem 0.5rem;cursor:default;transition:all 0.15s}
.ing-word:hover{background:rgba(176,106,44,0.12);border-color:var(--acc);color:var(--sig)}
.narr-note{margin-top:0.9rem}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <a class="back-link" href="/?openModal=writing&submenu=narrative">← Narrative</a>
    <span class="brand">INTUITY</span>
    <span class="topic-label" id="topicLabel">Narrative</span>
  </div>

  <div class="topic-tabs" id="tabsContainer"></div>

  <div class="mode-row">
    <div class="mode-pill">
      <button class="mode-btn active">Cards</button>
      <a class="mode-btn" href="narrative-model.html">Phrases</a>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="hint">Tap the arrows on any line to juggle — every line rolls on its own.</div>
    <div class="stack" id="stack"><div class="state">Loading…</div></div>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="switchMode('question')">Question</button>
      <button class="nb"    onclick="switchMode('plan')">Plan</button>
      <button class="nb on" onclick="switchMode('model')">Model</button>
      <button class="nb"    onclick="switchMode('builder')">Builder</button>
      <button class="nb"    onclick="switchMode('sample')">Sample</button>
    </div>
  </div>
</div>

<script>
/* ════════ NARRATIVE CARDS — four fixed stages. Each stage = one card with a rotating FRAME + a RECIPE + INGREDIENT banks. Hybrid model: scaffold + raw material, student assembles their own sentence. ════════ */

const DATA_PATH = 'data/narrative-cards-models.json';

/* the four narrative stages, in fixed sequence */
const STAGE_ORDER = ['scene','develop','tension','resolution'];

/* ── sound ── */
const AudioCtx=window.AudioContext||window.webkitAudioContext;let actx=null;
function ac(){if(!actx)actx=new AudioCtx();return actx;}
function tone(f,t,d,v,delay=0){try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;const s=c.currentTime+delay;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v,s+0.01);g.gain.exponentialRampToValueAtTime(0.0001,s+d);o.start(s);o.stop(s+d+0.05);}catch(e){}}
function sndRoll(){tone(500,'triangle',0.07,0.06);tone(660,'triangle',0.05,0.04,0.04);}
function sndSwitch(){tone(440,'triangle',0.08,0.07);tone(580,'triangle',0.06,0.05,0.05);}

const pick = a => a[Math.floor(Math.random()*a.length)];
/* pick a value not already used on a sibling line. Works for strings AND signpost objects (compares by .t). */
const keyOf = x => (x && typeof x==='object') ? (x.t||JSON.stringify(x)) : x;
const pickAvoid = (pool, avoid) => {
  if(!pool||!pool.length) return '...';
  const av = (avoid||[]).map(keyOf);
  const free = pool.filter(x=>!av.includes(keyOf(x)));
  return pick(free.length?free:pool);
};
const fmt  = s => (s||'').replace(/\.\.\./g,'<span class="gap">...</span>');

let DATA=null, STAGES=null, STAGE=null;
let frameIdx=0, taught=false;

async function init(){
  try{
    const r = await fetch(DATA_PATH);
    if(!r.ok) throw new Error('HTTP '+r.status);
    DATA = await r.json();
  }catch(e){
    document.getElementById('stack').innerHTML =
      `<div class="state err">Couldn't load the model data.<br><span style="font-size:.72rem;opacity:.7">${DATA_PATH} — ${e.message}. A fetch page must be served over http, not opened from disk.</span></div>`;
    return;
  }
  STAGES = DATA.stages||{};
  const keys = STAGE_ORDER.filter(k=>STAGES[k]);
  if(!keys.length){ document.getElementById('stack').innerHTML='<div class="state err">No narrative stages found.</div>'; return; }
  STAGE = keys[0];
  applyStage(); renderTabs(); render();
}

function applyStage(){
  frameIdx=0;
  document.getElementById('topicLabel').textContent=(STAGES[STAGE].label||STAGE).toUpperCase();
}

function renderTabs(){
  const c=document.getElementById('tabsContainer');
  c.innerHTML = STAGE_ORDER.filter(k=>STAGES[k]).map(k=>
    `<button class="ttab ${k===STAGE?'active':''}" onclick="switchStage('${k}')">${STAGES[k].label||k}</button>`
  ).join('');
}
function switchStage(k){
  if(!STAGES[k]||k===STAGE) return;
  STAGE=k; sndSwitch(); applyStage(); renderTabs(); render();
}
window.switchStage=switchStage;

/* roll the frame for the current stage */
function rollFrame(dir){
  const frames=STAGES[STAGE].frames||['...'];
  frameIdx=(frameIdx+dir+frames.length)%frames.length;
  taught=true; sndRoll(); render();
}
window.rollFrame=rollFrame;

/* ── ingredient recipe: turn "adjective" etc into styled chips ── */
function recipeHTML(recipe){
  return (recipe||[]).map(r=>`<span class="recipe-chip">${r}</span>`).join('<span class="recipe-plus">+</span>');
}
function ingredientBanks(ings){
  return Object.entries(ings||{}).map(([cat,words])=>
    `<div class="ing-grp"><div class="ing-cat">${cat}</div><div class="ing-words">${
      (words||[]).map(w=>`<span class="ing-word">${w}</span>`).join('')
    }</div></div>`
  ).join('');
}

function render(){
  const st = STAGES[STAGE];
  const frames = st.frames||['...'];
  const frame = frames[frameIdx % frames.length];
  const num = String(st.order||1).padStart(2,'0');

  document.getElementById('stack').innerHTML=`
    <div class="card"><div class="band"><span class="band-num">${num}</span><span class="band-word">${st.label||STAGE}</span></div>
      <div class="content">
        <div class="stage-purpose">${st.purpose||''}</div>

        <div class="frame-row">
          <div class="frame-lead">frame</div>
          <div class="rline"><div class="rtext"><div class="line frame-line">${fmt(frame)}</div></div>
            <div class="nav"><button onclick="rollFrame(-1)">‹</button><button onclick="rollFrame(1)">›</button></div>
          </div>
        </div>

        <div class="recipe-row"><span class="recipe-k">recipe</span>${recipeHTML(st.recipe)}</div>

        <div class="ing-wrap">${ingredientBanks(st.ingredients)}</div>

        <div class="card-note narr-note"><span class="k">how</span> pick one from each bank — build the sentence in your own words</div>
      </div>
    </div>`;
  document.getElementById('stack').classList.add('has-cards');
  if(!taught){ const first=document.querySelector('.nav button'); if(first) first.classList.add('teach'); }
}

/* ── FOOTER NAV — matches review-model.html targets ── */
function switchMode(mode){
  if(mode==='model')return;
  const map={question:'narrative-question.html',plan:'narrative-plan.html',builder:'narrative-build.html',sample:'narrative-sample.html'};
  if(map[mode])window.location.href=map[mode];
}
window.switchMode=switchMode;

init();
</script>
</body>
</html>
