<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Narrative Expressions — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900&family=Barlow:ital,wght@0,400;0,600;0,700;0,800&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --acc:#b06a2c;--acc-d:#8f5320;--acc-lt:rgba(176,106,44,0.08);--acc-mid:rgba(176,106,44,0.4);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-transform:uppercase}

.stage{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.2rem 1rem 2rem;display:flex;justify-content:center}
.stage::-webkit-scrollbar{width:4px}.stage::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}
.sheet{width:min(560px,94vw)}

.intro{text-align:center;margin-bottom:1.4rem}
.intro-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--ink);margin-bottom:0.3rem}
.intro-sub{font-family:'Instrument Sans',sans-serif;font-style:italic;font-size:0.82rem;color:rgba(0,0,0,0.45)}

.grp{background:var(--white);border-radius:1rem;padding:0.9rem 1.1rem;margin-bottom:0.8rem;box-shadow:0 2px 8px rgba(0,0,0,0.05),0 1px 0 rgba(0,0,0,0.02)}
.grp-head{display:flex;align-items:baseline;gap:0.6rem;margin-bottom:0.6rem;border-bottom:1px solid rgba(0,0,0,0.06);padding-bottom:0.45rem}
.grp-cat{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:900;letter-spacing:0.03em;text-transform:uppercase;color:var(--acc)}
.grp-hint{font-family:'Instrument Sans',sans-serif;font-style:italic;font-size:0.72rem;color:rgba(0,0,0,0.38)}
.words{display:flex;flex-wrap:wrap;gap:0.35rem}
.word{font-family:'Instrument Sans',sans-serif;font-size:0.82rem;color:rgba(0,0,0,0.72);background:var(--acc-lt);border:1px solid rgba(176,106,44,0.15);border-radius:0.55rem;padding:0.2rem 0.6rem}

.practice-link{display:flex;align-items:center;justify-content:center;gap:0.5rem;width:100%;margin-top:0.4rem;padding:0.85rem;background:var(--acc);color:#fff;border:none;border-radius:1rem;font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:background 0.2s;box-shadow:0 4px 14px rgba(176,106,44,0.3)}
.practice-link:hover{background:var(--acc-d)}

.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.9rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.62rem;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.22s;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}
.loading{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.25);letter-spacing:0.12em;text-transform:uppercase;text-align:center;padding:2rem}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="/?openModal=writing">← Writing</a>
    <span class="brand">INTUITY</span>
    <span class="label">Expressions</span>
  </div>

  <div class="stage" id="stage"><div class="loading">Loading…</div></div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Questions</button>
      <button class="nb"    onclick="navTo('sample')">Samples</button>
      <button class="nb on" onclick="navTo('expressions')">Expressions</button>
    </div>
  </div>
</div>
<script>
const DATA_PATH='data/narrative-expressions.json';
async function init(){
  let groups=[];
  try{ groups=(await (await fetch(DATA_PATH)).json()).groups||[]; }
  catch(e){ document.getElementById('stage').innerHTML='<div class="loading">⚠ Could not load expressions</div>'; return; }
  document.getElementById('stage').innerHTML=`
    <div class="sheet">
      <div class="intro">
        <div class="intro-title">Narrative Language</div>
        <div class="intro-sub">the words that make a story move — pick, don't copy</div>
      </div>
      ${groups.map(g=>`
        <div class="grp">
          <div class="grp-head"><span class="grp-cat">${g.category||''}</span><span class="grp-hint">${g.hint||''}</span></div>
          <div class="words">${(g.words||[]).map(w=>`<span class="word">${w}</span>`).join('')}</div>
        </div>`).join('')}
      <a class="practice-link" href="narrative-cards.html">Practice building sentences →</a>
    </div>`;
}
function navTo(dest){
  if(dest==='expressions')return;
  const map={question:'narrative-question.html',sample:'narrative-sample.html'};
  if(map[dest])window.location.href=map[dest];
}
window.navTo=navTo;
init();
</script>
</body>
</html>
