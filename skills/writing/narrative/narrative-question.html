<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Narrative Questions — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --acc:#b06a2c;--acc-d:#8f5320;--acc-lt:rgba(176,106,44,0.08);--acc-mid:rgba(176,106,44,0.4);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.counter{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em}

.stage{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding-top:1.4rem}

.poster{position:relative;width:min(400px,88vw);height:min(500px,74vh);background:var(--white);border-radius:1.4rem;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,4px 6px 0 rgba(0,0,0,0.06),0 20px 50px rgba(0,0,0,0.18),0 4px 12px rgba(0,0,0,0.1);animation:cardEnter 0.5s cubic-bezier(0.22,1,0.36,1) both}
@keyframes cardEnter{0%{opacity:0;transform:scale(0.9) translateY(12px)}100%{opacity:1;transform:scale(1) translateY(0)}}

.masthead{background:var(--acc);padding:0.55rem 1.4rem;display:flex;align-items:center;justify-content:space-between}
.masthead-l{font-family:'Playfair Display',serif;font-style:italic;font-size:0.7rem;font-weight:700;color:rgba(255,255,255,0.9);letter-spacing:0.02em}
.masthead-r{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.65)}

.card-body{flex:1;display:flex;flex-direction:column;padding:1.6rem 1.8rem 1rem;overflow:hidden}
.subtag{align-self:center;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:var(--acc);background:var(--acc-lt);border-radius:1rem;padding:0.2rem 0.7rem;margin-bottom:0.9rem}
.title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;line-height:1.05;text-align:center;color:var(--ink);margin-bottom:0.9rem}
.prompt{font-family:'Instrument Sans',sans-serif;font-size:0.95rem;line-height:1.6;color:rgba(0,0,0,0.7);text-align:center;margin-bottom:1.1rem}
.opening-band{background:var(--acc-lt);border-left:4px solid var(--acc);border-radius:0 0.7rem 0.7rem 0;padding:0.7rem 0.9rem;margin-bottom:1rem}
.opening-lead{font-family:'Barlow Condensed',sans-serif;font-size:0.56rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:var(--acc);margin-bottom:0.3rem}
.opening-line{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;line-height:1.4;color:var(--ink)}
.points{margin-top:auto;border-top:1.5px dashed rgba(0,0,0,0.1);padding-top:0.9rem}
.points-h{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.32);margin-bottom:0.5rem}
.kp{display:flex;align-items:flex-start;gap:0.5rem;font-family:'Barlow',sans-serif;font-size:0.8rem;font-weight:600;line-height:1.35;color:rgba(0,0,0,0.55);margin-bottom:0.35rem}
.kp-arrow{color:var(--acc);flex-shrink:0;font-weight:900;font-size:0.7rem;margin-top:0.1rem}
.footnote{font-family:'Playfair Display',serif;font-style:italic;font-size:0.66rem;color:rgba(0,0,0,0.3);text-align:center;margin-top:0.8rem}

.card-foot{display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1.4rem 0.85rem;flex-shrink:0;border-top:1px solid rgba(0,0,0,0.05)}
.card-nav-btn{background:none;border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.28);transition:all 0.2s;font-size:1rem}
.card-nav-btn:hover:not(:disabled){background:var(--acc-lt);color:var(--acc)}
.card-nav-btn:disabled{opacity:0.15;cursor:default}
.card-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:800;letter-spacing:0.06em;color:var(--acc)}

.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.9rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.62rem;letter-spacing:0.03em;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.22s;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}
.loading{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.25);letter-spacing:0.12em;text-transform:uppercase}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="/?openModal=writing">← Writing</a>
    <span class="brand">INTUITY</span>
    <span class="counter" id="counter">Narrative</span>
  </div>

  <div class="stage" id="stage"><div class="loading" id="loading">Loading…</div></div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb on" onclick="navTo('question')">Questions</button>
      <button class="nb"    onclick="navTo('sample')">Samples</button>
      <button class="nb"    onclick="navTo('expressions')">Expressions</button>
    </div>
  </div>
</div>
<script>
const DATA_PATH='data/narrative-questions.json';
let QS=[], cur=0, tsX=0;

async function init(){
  try{ const r=await fetch(DATA_PATH); QS=(await r.json()).questions||[]; }
  catch(e){ document.getElementById('loading').textContent='⚠ Could not load questions'; return; }
  if(!QS.length){ document.getElementById('loading').textContent='No prompts yet'; return; }
  show(0);
}

function show(i){
  cur=Math.max(0,Math.min(i,QS.length-1));
  const q=QS[cur];
  const stage=document.getElementById('stage');
  stage.innerHTML=`
    <div class="poster">
      <div class="masthead"><span class="masthead-l">Stories wanted</span><span class="masthead-r">English-language magazine</span></div>
      <div class="card-body">
        <div class="subtag">Narrative · Story</div>
        <div class="title">${q.title||''}</div>
        <div class="prompt">${q.prompt||''}</div>
        ${q.opening?`<div class="opening-band"><div class="opening-lead">Begin your story with</div><div class="opening-line">"${q.opening}"</div></div>`:''}
        <div class="points">
          <div class="points-h">Your story should</div>
          ${(q.points||[]).map(p=>`<div class="kp"><span class="kp-arrow">›</span><span>${p}</span></div>`).join('')}
        </div>
        <div class="footnote">The best stories will be printed next month.</div>
      </div>
      <div class="card-foot">
        <button class="card-nav-btn" onclick="go(-1)" ${cur===0?'disabled':''}>‹</button>
        <span class="card-counter">${cur+1} / ${QS.length}</span>
        <button class="card-nav-btn" onclick="go(1)" ${cur===QS.length-1?'disabled':''}>›</button>
      </div>
    </div>`;
  try{ sessionStorage.setItem('currentNarrativeQuestion',JSON.stringify(q)); }catch(e){}
}
function go(d){ const n=cur+d; if(n>=0&&n<QS.length) show(n); }
window.go=go;

document.addEventListener('touchstart',e=>{tsX=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tsX;if(dx<-55)go(1);if(dx>55)go(-1);},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});

function navTo(dest){
  if(dest==='question')return;
  const map={sample:'narrative-sample.html',expressions:'narrative-expressions.html'};
  if(map[dest])window.location.href=map[dest];
}
window.navTo=navTo;
init();
</script>
</body>
</html>
