<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Narrative Samples — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --acc:#b06a2c;--acc-d:#8f5320;--acc-lt:rgba(176,106,44,0.08);--acc-mid:rgba(176,106,44,0.4);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.label{font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.04em;text-transform:uppercase}

/* control bar: sample switch + x-ray toggle */
.ctrl{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:0.6rem;padding:0.5rem 1.1rem;background:rgba(240,239,236,0.85);border-bottom:1px solid rgba(0,0,0,0.06)}
.samp-tabs{display:flex;gap:0.25rem;overflow-x:auto}.samp-tabs::-webkit-scrollbar{display:none}
.stab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.6rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;white-space:nowrap;letter-spacing:0.04em;text-transform:uppercase;transition:all 0.2s}
.stab:hover{background:rgba(0,0,0,0.05)}.stab.active{background:var(--ink);color:#fff}
.xray-btn{flex-shrink:0;display:flex;align-items:center;gap:0.35rem;padding:0.3rem 0.75rem;border-radius:2rem;border:1.5px solid var(--acc-mid);background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:var(--acc);cursor:pointer;transition:all 0.2s}
.xray-btn.on{background:var(--acc);color:#fff;border-color:var(--acc)}

.stage{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.4rem 1rem 2rem;display:flex;justify-content:center}
.stage::-webkit-scrollbar{width:4px}.stage::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}
.story{width:min(600px,94vw)}
.story-title{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;color:var(--ink);margin-bottom:0.25rem;line-height:1.1}
.story-q{font-family:'Instrument Sans',sans-serif;font-style:italic;font-size:0.78rem;color:rgba(0,0,0,0.4);margin-bottom:1.3rem;padding-bottom:0.7rem;border-bottom:1.5px dashed rgba(0,0,0,0.1)}

.para{margin-bottom:1.1rem;position:relative;transition:all 0.25s}
.para-text{font-family:'Instrument Sans',sans-serif;font-size:0.98rem;line-height:1.75;color:rgba(0,0,0,0.82)}
.para-note{overflow:hidden;max-height:0;opacity:0;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1),opacity 0.25s,margin 0.3s}
.xray-on .para{background:var(--acc-lt);border-left:3px solid var(--acc-mid);border-radius:0 0.6rem 0.6rem 0;padding:0.7rem 0.9rem}
.xray-on .para-note{max-height:220px;opacity:1;margin-top:0.6rem}
.para-note-inner{font-family:'Barlow',sans-serif;font-size:0.76rem;line-height:1.5;color:var(--acc-d);background:rgba(255,255,255,0.6);border-radius:0.5rem;padding:0.5rem 0.7rem}
.note-tag{font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:0.1em;font-size:0.66rem}

.hint-line{text-align:center;font-family:'Instrument Sans',sans-serif;font-style:italic;font-size:0.74rem;color:rgba(0,0,0,0.34);margin-bottom:1.1rem}

.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.9rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.62rem;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.22s;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}
.loading{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.25);letter-spacing:0.12em;text-transform:uppercase;text-align:center;padding:2rem}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="/?openModal=writing">← Writing</a>
    <span class="brand">INTUITY</span>
    <span class="label">Samples</span>
  </div>

  <div class="ctrl">
    <div class="samp-tabs" id="sampTabs"></div>
    <button class="xray-btn" id="xrayBtn" onclick="toggleXray()">✦ Craft X-ray</button>
  </div>

  <div class="stage" id="stage"><div class="loading">Loading…</div></div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Questions</button>
      <button class="nb on" onclick="navTo('sample')">Samples</button>
      <button class="nb"    onclick="navTo('expressions')">Expressions</button>
    </div>
  </div>
</div>
<script>
const DATA_PATH='data/narrative-samples.json';
let SAMPLES=[], cur=0, xray=false;

async function init(){
  try{ SAMPLES=(await (await fetch(DATA_PATH)).json()).samples||[]; }
  catch(e){ document.getElementById('stage').innerHTML='<div class="loading">⚠ Could not load samples</div>'; return; }
  if(!SAMPLES.length){ document.getElementById('stage').innerHTML='<div class="loading">No samples yet</div>'; return; }
  renderTabs(); render();
}
function renderTabs(){
  document.getElementById('sampTabs').innerHTML=SAMPLES.map((s,i)=>
    `<button class="stab ${i===cur?'active':''}" onclick="pick(${i})">${s.title||('Story '+(i+1))}</button>`).join('');
}
function pick(i){ cur=i; renderTabs(); render(); }
window.pick=pick;

function toggleXray(){
  xray=!xray;
  document.getElementById('xrayBtn').classList.toggle('on',xray);
  render();
}
window.toggleXray=toggleXray;

function render(){
  const s=SAMPLES[cur];
  const stage=document.getElementById('stage');
  stage.scrollTop=0;
  stage.innerHTML=`
    <div class="story ${xray?'xray-on':''}">
      <div class="story-title">${s.title||''}</div>
      <div class="story-q">in response to: ${s.question||'—'}</div>
      ${xray?'<div class="hint-line">Craft X-ray on — see the technique behind each paragraph</div>':'<div class="hint-line">Read it as a reader first. Then switch on the Craft X-ray.</div>'}
      ${(s.paragraphs||[]).map(p=>`
        <div class="para">
          <div class="para-text">${p.text||''}</div>
          ${p.note?`<div class="para-note"><div class="para-note-inner">${fmtNote(p.note)}</div></div>`:''}
        </div>`).join('')}
    </div>`;
}
function fmtNote(n){
  // bold a leading tag: UPPERCASE word(s) followed by ':' OR '(' — e.g. "SCENE:" or "TENSION → SURPRISE (Step 3 —"
  return n.replace(/^([A-Z][A-Z →'\-]*(?:\([^)]*\))?[^a-z:]*[:—])/, '<span class="note-tag">$1</span>');
}

function navTo(dest){
  if(dest==='sample')return;
  const map={question:'narrative-question.html',expressions:'narrative-expressions.html'};
  if(map[dest])window.location.href=map[dest];
}
window.navTo=navTo;
init();
</script>
</body>
</html>
