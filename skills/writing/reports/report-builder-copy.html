<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Build — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0c;
  --gold:#C9A961; --gold-d:#9B7D3A; --gold-l:#E8D4A0;
  --white:#FAFAF8; --ink:#0d0d0d;
  --settled:rgba(13,13,13,0.82); --rule:rgba(0,0,0,0.07);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:2vh 3vw}

/* ══ OUTER CARD ══ */
.card{width:100%;height:100%;max-width:900px;max-height:95vh;background:var(--white);border-radius:1.5rem;box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));z-index:5}

/* ══ BRAND BAR ══ */
.card-brand{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem 0.75rem;margin-top:3px;border-bottom:1px solid var(--rule);position:relative;z-index:10}
.home-link{text-decoration:none;font-size:1rem;font-weight:600;color:var(--gold);padding:0.4rem 0.6rem;border-radius:0.5rem;transition:all 0.2s}
.home-link:hover{background:rgba(201,169,97,0.1);color:var(--gold-d)}
.brand-word{position:absolute;left:50%;transform:translateX(-50%);font-size:0.65rem;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.18);pointer-events:none}

/* ══ CONTROLS ROW ══ */
.controls-row{flex-shrink:0;display:flex;align-items:center;gap:0.75rem;padding:0.5rem 1.5rem 0.55rem;border-bottom:1px solid var(--rule)}
.bar-track{flex:1;height:3px;background:rgba(0,0,0,0.07);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:2px;transition:width 0.55s cubic-bezier(0.4,0,0.2,1)}
.progress-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:rgba(0,0,0,0.28);white-space:nowrap;transition:color 0.3s}
.progress-label.done{color:var(--gold-d)}
.view-toggle{display:flex;align-items:center;background:rgba(0,0,0,0.06);border-radius:2rem;padding:0.18rem;gap:0.08rem;flex-shrink:0}
.vt-btn{background:transparent;border:none;padding:0.24rem 0.7rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.vt-btn.active{background:var(--ink);color:#fff}
.vt-btn:hover:not(.active){color:rgba(0,0,0,0.6)}
.menu-btn{background:#000;border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.menu-btn:hover{background:rgba(0,0,0,0.8)}
.menu-dots{display:flex;gap:3px}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:#fff}
.menu-dropdown{position:absolute;top:calc(100% + 0.5rem);right:1rem;background:#fff;border-radius:0.75rem;box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.12);min-width:190px;padding:0.5rem;z-index:200;display:none}
.menu-dropdown.open{display:block;animation:menuIn 0.2s ease-out}
@keyframes menuIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.menu-item{padding:0.65rem 0.85rem;border-radius:0.5rem;font-size:0.8rem;font-weight:500;color:rgba(0,0,0,0.7);cursor:pointer;transition:all 0.15s}
.menu-item:hover{background:rgba(0,0,0,0.04)}

/* ══ TEXT VIEW ══ */
.report-canvas{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2rem 3rem 2.5rem;display:none}
.report-canvas.active{display:block}
.report-canvas::-webkit-scrollbar{width:4px}
.report-canvas::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}
.section-block{margin-bottom:2rem}
.section-block:last-child{margin-bottom:0}
.section-block+.section-block{padding-top:2rem;border-top:1.5px solid rgba(201,169,97,0.12)}
.section-label{font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.14em;color:rgba(0,0,0,0.2);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;transition:color 0.4s}
.section-label .check{opacity:0;transform:scale(0);transition:opacity 0.4s,transform 0.4s cubic-bezier(0.34,1.56,0.64,1);color:var(--gold)}
.section-block.complete .section-label{color:var(--gold-d)}
.section-block.complete .section-label .check{opacity:1;transform:scale(1)}
.prose{font-family:'DM Sans',sans-serif;font-size:1.05rem;line-height:2;color:var(--settled);font-weight:400}
.s-anchor{color:var(--ink);font-weight:500}
.pill-container{display:inline;white-space:normal}
.pill{display:inline-flex;align-items:center;justify-content:center;background:var(--gold);color:#fff;font-family:'Inter',sans-serif;font-size:0.65rem;font-weight:800;min-width:2.5rem;height:1.5rem;border-radius:2rem;padding:0 0.6rem;margin:0 0.15rem;vertical-align:middle;cursor:pointer;user-select:none;-webkit-user-select:none;animation:breathe 3s ease-in-out infinite;transition:transform 0.15s,background 0.15s,box-shadow 0.15s}
.pill[data-type="intro"]         {background:#546e7a}
.pill[data-type="methodology"]   {background:#64748b}
.pill[data-type="neutral"]       {background:#06b6d4}
.pill[data-type="positive"]      {background:#608020}
.pill[data-type="problem"]       {background:#ef4444}
.pill[data-type="cause"]         {background:#ed6e39}
.pill[data-type="consequence"]   {background:#f97316}
.pill[data-type="recommendation"]{background:#8b5cf6}
.pill[data-type="outcome"]       {background:#14b8a6}
.pill[data-type="conclusion"]    {background:#ec4899}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(201,169,97,0.5)}60%{box-shadow:0 0 0 6px rgba(201,169,97,0)}}
.pill:nth-child(3n+1){animation-delay:0s}.pill:nth-child(3n+2){animation-delay:0.8s}.pill:nth-child(3n+3){animation-delay:1.6s}
.pill:hover{transform:scale(1.15) translateY(-2px);filter:brightness(1.1);box-shadow:0 4px 14px rgba(0,0,0,0.35);animation:none}
.pill:active{transform:scale(0.92)}
.pill-container.revealed .pill{display:none}
.s-new{display:none;color:var(--gold-d);font-weight:600;white-space:normal;word-wrap:break-word}
.pill-container.revealed .s-new{display:inline;animation:fadeIn 0.5s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.s-new.ink{color:var(--settled);font-weight:400;transition:color 0.9s ease,font-weight 0.9s ease}

/* ══ CELEBRATION ══ */
.celebration{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.celebration.show{animation:celebPop 2.8s ease forwards}
@keyframes celebPop{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.celeb-pill{background:var(--ink);color:var(--gold);padding:1rem 2.25rem;border-radius:3rem;font-size:1rem;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;box-shadow:0 12px 48px rgba(0,0,0,0.45);animation:celebScale 0.45s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes celebScale{from{transform:scale(0.7)}to{transform:scale(1)}}

/* ══ FOOTER NAV ══ */
.card-nav{flex-shrink:0;display:flex;justify-content:center;padding:0.75rem 1.125rem calc(env(safe-area-inset-bottom,0px) + 0.875rem);border-top:1px solid var(--rule);background:var(--white)}
.nav-pill{display:flex;gap:0.15rem;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.35rem 0.4rem}
.nb{background:transparent;border:none;padding:0.5rem 1rem;border-radius:1.5rem;font-family:'Inter',sans-serif;font-size:0.7rem;letter-spacing:0.02em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.24s;white-space:nowrap;min-height:36px;font-weight:500}
.nb.on{background:var(--ink);color:var(--gold);font-weight:700}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.75rem;font-size:0.9rem;color:rgba(0,0,0,0.3);text-align:center;line-height:1.6;padding:2rem}

/* ══════════════════════════════════════════════
   STAGES OVERLAY — section-by-section cards
   Sentences within a section reveal into the
   same card one by one.
══════════════════════════════════════════════ */
.stages-overlay{
  position:fixed;inset:0;z-index:800;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.1rem 1.25rem 1.25rem;
  background:#1a1b1f;
  opacity:0;pointer-events:none;
  transition:opacity 0.28s ease;
}
.stages-overlay.active{opacity:1;pointer-events:all}

/* Top chrome */
.so-topbar{width:100%;max-width:460px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;flex-shrink:0}
.so-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.32em;text-transform:uppercase;color:rgba(255,255,255,0.13)}
.so-close-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.62rem;color:rgba(255,255,255,0.28);transition:all 0.18s}
.so-close-btn:hover{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75)}

/* ── The section card ── */
.stage-card{
  position:relative;
  width:min(460px,94vw);
  min-height:min(380px,70vw);
  background:#ffffff;
  border-radius:16px;
  overflow:visible;
  display:flex;flex-direction:column;
  flex-shrink:0;
  box-shadow:0 2px 0 rgba(255,255,255,0.06),8px 14px 0 rgba(0,0,0,0.4),0 32px 72px rgba(0,0,0,0.6);
}
.stage-card.card-enter{animation:cardSlideIn 0.42s cubic-bezier(0.34,1.3,0.64,1) both}
@keyframes cardSlideIn{from{opacity:0;transform:translateX(44px) scale(0.96)}to{opacity:1;transform:translateX(0) scale(1)}}

/* Tab badge — protrudes top-left */
.sc-badge{
  position:absolute;top:-1rem;left:1.5rem;
  width:3.2rem;height:3.2rem;
  border-radius:8px 8px 8px 0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:900;color:#fff;
  z-index:10;
  box-shadow:3px 4px 0 rgba(0,0,0,0.25),0 8px 20px rgba(0,0,0,0.28);
  transition:background 0.3s ease;
}
.sc-badge::before{
  content:attr(data-label);
  position:absolute;top:-1.1rem;left:0;right:0;
  text-align:center;
  font-family:'Barlow Condensed',sans-serif;font-size:0.42rem;font-weight:900;
  letter-spacing:0.18em;color:rgba(255,255,255,0.38);text-transform:uppercase;
}

/* Icon zone */
.sc-icon-zone{flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:2.5rem 1.5rem 0.7rem}
.sc-icon{font-size:2.4rem;opacity:0.5;line-height:1}

/* Title + rule */
.sc-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.5rem,4.5vw,2.2rem);font-weight:900;letter-spacing:0.06em;text-transform:uppercase;color:#0d0d0d;line-height:1;text-align:center;padding:0 1.5rem}
.sc-rule{width:2.8rem;height:3px;border-radius:2px;margin:0.5rem auto 0;transition:background 0.3s ease;flex-shrink:0}

/* Sentence zone — stacks revealed sentences */
.sc-sentence-zone{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0.85rem 1.8rem 0.5rem;
  gap:0.6rem;
  min-height:4.5rem;
  position:relative;
}

/* Each revealed sentence line */
.sc-sentence-line{
  font-family:'Instrument Sans',sans-serif;
  font-size:clamp(0.86rem,2.2vw,1rem);font-weight:400;line-height:1.7;
  color:rgba(0,0,0,0.6);text-align:center;width:100%;
  opacity:0;transform:translateY(8px);
  transition:opacity 0.4s ease,transform 0.4s ease;
}
.sc-sentence-line.visible{opacity:1;transform:translateY(0)}
/* First sentence (anchor) is slightly bolder */
.sc-sentence-line.anchor{color:rgba(0,0,0,0.82);font-weight:500}

/* Reveal button — shown when there are hidden sentences remaining */
.sc-reveal-btn{
  display:flex;align-items:center;gap:0.45rem;
  padding:0.75rem 1.9rem;border-radius:50px;border:none;
  font-family:'Barlow Condensed',sans-serif;font-size:0.88rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;
  color:#fff;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,0.25);
  transition:transform 0.18s,box-shadow 0.18s,opacity 0.22s,background 0.3s;
  flex-shrink:0;
  margin-top:0.4rem;
}
.sc-reveal-btn:hover{transform:scale(1.07) translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,0.35)}
.sc-reveal-btn:active{transform:scale(0.95)}
.sc-reveal-btn.hidden{opacity:0;pointer-events:none;transform:scale(0.88)}

/* Card footer */
.sc-foot{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.5rem 1.1rem;border-top:1px solid rgba(0,0,0,0.05);margin-top:0.4rem}
.sc-foot-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.2)}

/* Next/Finish button — only visible after ALL sentences in section are revealed */
.sc-next-btn{
  display:flex;align-items:center;gap:0.35rem;
  padding:0.42rem 1.1rem;border-radius:50px;border:none;
  font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;
  background:#0d0d0d;color:#fff;cursor:pointer;
  opacity:0;pointer-events:none;transform:translateX(8px);
  transition:opacity 0.3s ease,transform 0.3s ease,background 0.18s;
}
.sc-next-btn.visible{opacity:1;pointer-events:auto;transform:translateX(0)}
.sc-next-btn:hover{background:rgba(13,13,13,0.78)}
.sc-next-btn:active{transform:scale(0.95)}

/* Sentence count indicator: "2 of 3 revealed" */
.sc-sentence-counter{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.52rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(0,0,0,0.18);
  text-align:center;
  transition:color 0.3s;
}
.sc-sentence-counter.all-done{color:rgba(0,0,0,0.35)}

/* Progress below card */
.so-bottom{width:min(460px,94vw);margin-top:0.85rem;display:flex;flex-direction:column;gap:0.45rem;flex-shrink:0}
.so-progress-track{width:100%;height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.so-progress-fill{height:100%;border-radius:2px;transition:width 0.4s ease,background 0.4s ease}
.so-bottom-row{display:flex;align-items:center;justify-content:space-between}
.so-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.18)}
.so-hint{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.14)}

/* ══ RESPONSIVE ══ */
@media(max-width:768px){
  .shell{padding:1vh 2vw}.card{border-radius:1rem}
  .card-brand{padding:0.75rem 1rem 0.5rem}
  .report-canvas{padding:1.5rem 1.25rem 2rem}
  .prose{font-size:0.95rem;line-height:1.9}
  .nb{padding:0.4rem 0.75rem;font-size:0.65rem;min-height:32px}
  .controls-row{padding:0.4rem 1rem 0.45rem;gap:0.5rem}
}
@media(max-width:400px){
  .report-canvas{padding:1.25rem 1rem 1.5rem}
  .prose{font-size:0.88rem}
  .nb{padding:0.35rem 0.6rem;font-size:0.6rem}
}
</style>
</head>
<body>
<div class="shell">
<div class="card">

  <div class="card-brand">
    <a class="home-link" href="/skills/writing/reports/report-question-selector">← Questions</a>
    <span class="brand-word">INTUITY</span>
    <div style="flex:1"></div>
    <div style="position:relative">
      <div class="menu-btn" onclick="toggleMenu()">
        <div class="menu-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="menu-dropdown" id="menuDropdown">
        <div class="menu-item" onclick="revealAll()">Reveal all sentences</div>
        <div class="menu-item" onclick="resetAll()">Reset report</div>
      </div>
    </div>
  </div>

  <div class="controls-row">
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="progress-label" id="progressLabel">tap to reveal</div>
    <div class="view-toggle">
      <button class="vt-btn active" id="vtText"   onclick="setView('text')">Text</button>
      <button class="vt-btn"        id="vtStages" onclick="setView('stages')">Stages</button>
    </div>
  </div>

  <div class="report-canvas active" id="reportCanvas">
    <div class="state-msg">Loading…</div>
  </div>

  <div class="card-nav">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Question</button>
      <button class="nb"    onclick="navTo('plan')">Plan</button>
      <button class="nb"    onclick="navTo('model')">Model</button>
      <button class="nb on">Build</button>
      <button class="nb"    onclick="navTo('sample')">Sample</button>
    </div>
  </div>

</div>
</div>

<!-- ══ STAGES OVERLAY ══ -->
<div class="stages-overlay" id="stagesOverlay">

  <div class="so-topbar">
    <span class="so-brand">INTUITY — Build Report</span>
    <button class="so-close-btn" onclick="closeStages()">✕</button>
  </div>

  <div class="stage-card" id="stageCard">
    <div class="sc-badge" id="scBadge" data-label="SECTION">01</div>
    <div class="sc-icon-zone">
      <div class="sc-icon" id="scIcon">📋</div>
    </div>
    <div class="sc-title" id="scTitle">Introduction</div>
    <div class="sc-rule"  id="scRule"></div>
    <div class="sc-sentence-zone" id="scSentenceZone">
      <!-- sentence lines injected here -->
    </div>
    <div class="sc-foot">
      <span class="sc-foot-counter" id="scFootCounter">1 / 1</span>
      <button class="sc-next-btn" id="scNextBtn" onclick="advanceSectionCard()">Next →</button>
    </div>
  </div>

  <div class="so-bottom">
    <div class="so-progress-track">
      <div class="so-progress-fill" id="soProgressFill" style="width:0%"></div>
    </div>
    <div class="so-bottom-row">
      <span class="so-counter" id="soCounter">1 / 1</span>
      <span class="so-hint"    id="soHint">Tap Reveal to see each sentence</span>
    </div>
  </div>

</div>

<div class="celebration" id="celebration">
  <div class="celeb-pill">Report complete ✦</div>
</div>

<script>
// ══════════════════════════════════════════
// PALETTES  (one per section index)
// ══════════════════════════════════════════
const SECTION_PALETTES = [
  { accent:'#3d9e95', badge:'#3d9e95', icon:'📋' },
  { accent:'#e8723a', badge:'#e8723a', icon:'🏫' },
  { accent:'#7b5ea7', badge:'#7b5ea7', icon:'⚠️' },
  { accent:'#c94f6d', badge:'#c94f6d', icon:'💡' },
  { accent:'#c08b2f', badge:'#c08b2f', icon:'✅' },
];
function paletteFor(idx){ return SECTION_PALETTES[idx % SECTION_PALETTES.length]; }

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let question    = null;
let reportData  = null;
let totalHidden = 0;
let revealCount = 0;
let currentView = 'text';

// Stages state — now section-based
// sectionIdx: which section (paragraph) we are on
// sentenceRevealedCount: how many sentences in current section have been revealed
let stageSectionIdx       = 0;
let stageSentenceRevealed = 0; // how many sentences in current section shown so far

// ══════════════════════════════════════════
// SENTENCE TYPE DETECTION (for text pills)
// ══════════════════════════════════════════
function detectSentenceType(text, sectionLabel) {
  const l = text.toLowerCase();
  if(sectionLabel&&sectionLabel.toLowerCase().includes('introduction')){
    if(l.match(/^(the relevant information|this report is based on|data was|research was)/i)) return{type:'methodology',label:'Method'};
    if(l.match(/^(the aim|the purpose|this report seeks|this report provides|this report aims)/i)) return{type:'intro',label:'Aim'};
  }
  if(sectionLabel&&sectionLabel.toLowerCase().includes('conclusion')){
    if(l.match(/^(taking everything|in conclusion|to sum up|overall|in summary)/i)) return{type:'conclusion',label:'Summary'};
  }
  if(sectionLabel&&sectionLabel.toLowerCase().includes('recommend')){
    if(l.match(/^(if (these|this) (change|improvement)|this would|these would)/i)) return{type:'outcome',label:'Outcome'};
    if(l.match(/(recommend|advisable|good idea|essential that|in order to|to improve)/i)) return{type:'recommendation',label:'Action'};
  }
  if(l.includes('this is mainly due')||l.includes('this is largely because')||l.includes('one possible reason')) return{type:'cause',label:'Cause'};
  if(l.includes('as a result')||l.includes('consequently')) return{type:'consequence',label:'Effect'};
  if(l.includes('however')||l.includes('one major concern')||l.includes('by far the worst')) return{type:'problem',label:'Problem'};
  if(l.match(/(recommend|advisable|in order to)/i)) return{type:'recommendation',label:'Action'};
  if(l.includes('by far the best')||l.includes('one positive aspect')) return{type:'positive',label:'Praise'};
  if(l.match(/^(it is generally|on the whole|overall)/i)) return{type:'neutral',label:'View'};
  return{type:'default',label:null};
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init(){
  try{ question = JSON.parse(sessionStorage.getItem('currentReportQuestion')); }
  catch(e){ question = null; }

  if(!question){
    document.getElementById('reportCanvas').innerHTML =
      `<div class="state-msg">No question selected.<br>Return to Questions to choose one.</div>`;
    return;
  }

  try{
    const res = await fetch('data/samples-build-reports.json');
    if(!res.ok) throw new Error('samples-build-reports.json not found');
    const data = await res.json();
    const sections = data[question.id];
    if(!sections||!Array.isArray(sections)||sections.length===0){
      document.getElementById('reportCanvas').innerHTML =
        `<div class="state-msg">No build data for this question yet.<br>
         <small style="opacity:0.35;margin-top:0.5rem;display:block;">id: ${question.id}</small></div>`;
      return;
    }
    reportData = sections;
    countHidden();
    renderTextView();
    updateProgress();
  } catch(err){
    document.getElementById('reportCanvas').innerHTML =
      `<div class="state-msg">Could not load samples-build-reports.json<br>
       <small style="opacity:0.35;margin-top:0.5rem;display:block;">${err.message}</small></div>`;
  }
}

// ══════════════════════════════════════════
// COUNT HIDDEN SENTENCES
// ══════════════════════════════════════════
function countHidden(){
  totalHidden = 0;
  reportData.forEach(section => {
    // sentence index 0 is the anchor (always visible); rest are hidden
    totalHidden += Math.max(0, (section.sentences||[]).length - 1);
  });
}

// ══════════════════════════════════════════
// TEXT VIEW
// ══════════════════════════════════════════
function renderTextView(){
  const canvas = document.getElementById('reportCanvas');
  const html = reportData.map((section, si) => {
    const label = section.label || `Section ${si+1}`;
    const sentences = section.sentences || [];

    const sentHTML = sentences.map((text, ti) => {
      if(ti===0) return `<span class="s-anchor">${text}</span>`;
      const det = detectSentenceType(text, label);
      const lbl = det.label || (ti+1);
      return `<span class="pill-container" id="tc-${si}-${ti}">
        <span class="s-new">${text}</span>
        <span class="pill" data-type="${det.type}" onclick="revealTextSentence(${si},${ti})">${lbl}</span>
      </span>`;
    }).join(' ');

    return `<div class="section-block" id="tsec-${si}">
      <div class="section-label">${label}<span class="check"> ✦</span></div>
      <div class="prose">${sentHTML}</div>
    </div>`;
  }).join('');

  canvas.innerHTML = html;
}

// ══════════════════════════════════════════
// REVEAL — TEXT VIEW
// ══════════════════════════════════════════
function revealTextSentence(si, ti){
  const tc = document.getElementById(`tc-${si}-${ti}`);
  if(!tc||tc.classList.contains('revealed')) return;
  tc.classList.add('revealed');
  setTimeout(()=>tc.querySelector('.s-new')?.classList.add('ink'), 1400);
  revealCount++;
  checkSectionComplete(si);
  updateProgress();
  if(revealCount===totalHidden) setTimeout(celebrate, 350);
}

function checkSectionComplete(si){
  const section = reportData[si];
  if(!section) return;
  const needed = (section.sentences||[]).length - 1;
  if(needed <= 0){ markSectionDone(si); return; }
  let done = 0;
  section.sentences.forEach((_,ti)=>{
    if(ti===0) return;
    if(document.getElementById(`tc-${si}-${ti}`)?.classList.contains('revealed')) done++;
  });
  if(done >= needed) markSectionDone(si);
}

function markSectionDone(si){
  document.getElementById(`tsec-${si}`)?.classList.add('complete');
}

function updateProgress(){
  const pct = totalHidden > 0 ? (revealCount/totalHidden)*100 : 0;
  document.getElementById('barFill').style.width = pct+'%';
  const lbl = document.getElementById('progressLabel');
  if(revealCount===0){ lbl.textContent='tap to reveal'; lbl.classList.remove('done'); }
  else if(revealCount===totalHidden){ lbl.textContent='complete ✦'; lbl.classList.add('done'); }
  else{ lbl.textContent=`${revealCount} / ${totalHidden}`; lbl.classList.remove('done'); }
}

// ══════════════════════════════════════════
// VIEW SWITCH
// ══════════════════════════════════════════
function setView(v){
  currentView = v;
  document.getElementById('vtText').classList.toggle('active', v==='text');
  document.getElementById('vtStages').classList.toggle('active', v==='stages');
  document.getElementById('reportCanvas').classList.toggle('active', v==='text');
  if(v==='stages') openStages();
}

// ══════════════════════════════════════════
// STAGES OVERLAY — OPEN
// Find the first section that still has unrevealed sentences
// ══════════════════════════════════════════
function openStages(){
  if(!reportData) return;

  // Find first section with at least one unrevealed hidden sentence
  let startSection = reportData.findIndex((section, si) => {
    return (section.sentences||[]).some((_, ti) => {
      if(ti===0) return false;
      return !document.getElementById(`tc-${si}-${ti}`)?.classList.contains('revealed');
    });
  });
  if(startSection < 0) startSection = 0; // all done — restart from beginning

  stageSectionIdx       = startSection;
  stageSentenceRevealed = 0;

  document.getElementById('stagesOverlay').classList.add('active');
  loadSectionCard(stageSectionIdx, false);
}

function closeStages(){
  document.getElementById('stagesOverlay').classList.remove('active');
  currentView = 'text';
  document.getElementById('vtText').classList.add('active');
  document.getElementById('vtStages').classList.remove('active');
  document.getElementById('reportCanvas').classList.add('active');
}

// ══════════════════════════════════════════
// LOAD A SECTION CARD
// Shows the anchor sentence immediately;
// remaining sentences are hidden until Reveal is clicked
// ══════════════════════════════════════════
function loadSectionCard(si, animate){
  if(!reportData || si >= reportData.length) return;

  const section  = reportData[si];
  const label    = section.label || `Section ${si+1}`;
  const sentences = section.sentences || [];
  const pal      = paletteFor(si);
  const total    = reportData.length;
  const isLast   = si === total - 1;

  // How many of this section's hidden sentences are already revealed (from text view)
  let alreadyRevealed = 0;
  sentences.forEach((_, ti) => {
    if(ti===0) return;
    if(document.getElementById(`tc-${si}-${ti}`)?.classList.contains('revealed')) alreadyRevealed++;
  });

  // We'll always start by showing everything already revealed + the anchor
  stageSentenceRevealed = alreadyRevealed;

  // --- Badge + chrome ---
  const badge = document.getElementById('scBadge');
  badge.textContent    = String(si+1).padStart(2,'0');
  badge.style.background = pal.badge;
  document.getElementById('scIcon').textContent        = pal.icon;
  document.getElementById('scTitle').textContent       = label.toUpperCase();
  document.getElementById('scRule').style.background   = pal.accent;

  // Section progress (sections, not sentences)
  const secPct = Math.round(((si+1)/total)*100);
  document.getElementById('soProgressFill').style.background = pal.accent;
  document.getElementById('soProgressFill').style.width      = secPct+'%';
  document.getElementById('soCounter').textContent           = `${si+1} / ${total}`;
  document.getElementById('scFootCounter').textContent       = `${si+1} / ${total}`;

  // --- Build sentence zone ---
  const zone = document.getElementById('scSentenceZone');
  zone.innerHTML = '';

  // Render all sentence lines; show anchor + already-revealed ones
  sentences.forEach((text, ti) => {
    const line = document.createElement('div');
    line.className = 'sc-sentence-line' + (ti===0 ? ' anchor' : '');
    line.id = `sc-line-${ti}`;
    line.textContent = text;
    zone.appendChild(line);
    // Show immediately if anchor or already revealed
    if(ti===0 || ti <= alreadyRevealed){
      requestAnimationFrame(()=>line.classList.add('visible'));
    }
  });

  // Reveal button
  const hiddenRemaining = sentences.length - 1 - alreadyRevealed;
  rebuildRevealBtn(pal, hiddenRemaining, sentences.length - 1);

  // Next button — only if all hidden sentences already revealed
  const nextBtn = document.getElementById('scNextBtn');
  nextBtn.textContent = isLast ? 'Finish ✦' : 'Next →';
  nextBtn.classList.toggle('visible', hiddenRemaining === 0);

  updateSectionHint(alreadyRevealed, sentences.length - 1);

  if(animate){
    const cardEl = document.getElementById('stageCard');
    cardEl.classList.remove('card-enter');
    void cardEl.offsetWidth;
    cardEl.classList.add('card-enter');
  }
}

// ══════════════════════════════════════════
// REBUILD REVEAL BUTTON
// ══════════════════════════════════════════
function rebuildRevealBtn(pal, hiddenRemaining, totalHiddenInSection){
  // Remove existing reveal button if present
  const existing = document.getElementById('scRevealBtn');
  if(existing) existing.remove();

  if(hiddenRemaining <= 0) return;

  const zone = document.getElementById('scSentenceZone');
  const btn  = document.createElement('button');
  btn.className  = 'sc-reveal-btn';
  btn.id         = 'scRevealBtn';
  btn.style.background = pal.badge;

  const revealed = totalHiddenInSection - hiddenRemaining;
  btn.textContent = revealed === 0 ? '▶ Reveal' : `▶ Reveal next`;

  btn.onclick = () => revealNextSentenceInCard();
  zone.appendChild(btn);
}

// ══════════════════════════════════════════
// REVEAL NEXT SENTENCE WITHIN CURRENT CARD
// ══════════════════════════════════════════
function revealNextSentenceInCard(){
  if(!reportData) return;
  const si       = stageSectionIdx;
  const section  = reportData[si];
  const sentences = section.sentences || [];
  const pal      = paletteFor(si);
  const isLast   = si === reportData.length - 1;

  // Next sentence to reveal
  stageSentenceRevealed++;
  const ti = stageSentenceRevealed; // sentence index (0 = anchor, so first hidden = 1)

  if(ti >= sentences.length) return;

  // Show the line in the card
  const line = document.getElementById(`sc-line-${ti}`);
  if(line){
    requestAnimationFrame(()=>line.classList.add('visible'));
    line.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  // Sync with text view
  const tc = document.getElementById(`tc-${si}-${ti}`);
  if(tc && !tc.classList.contains('revealed')){
    tc.classList.add('revealed');
    setTimeout(()=>tc.querySelector('.s-new')?.classList.add('ink'), 1400);
    revealCount++;
    checkSectionComplete(si);
    updateProgress();
    if(revealCount===totalHidden) setTimeout(celebrate, 350);
  }

  // How many hidden sentences remain in this section?
  const hiddenRemaining = (sentences.length - 1) - stageSentenceRevealed;

  // Rebuild reveal button
  rebuildRevealBtn(pal, hiddenRemaining, sentences.length - 1);

  // If all revealed, show Next button
  if(hiddenRemaining <= 0){
    const nextBtn = document.getElementById('scNextBtn');
    nextBtn.textContent = isLast ? 'Finish ✦' : 'Next →';
    nextBtn.classList.add('visible');
  }

  updateSectionHint(stageSentenceRevealed, sentences.length - 1);
}

// ══════════════════════════════════════════
// HINT TEXT
// ══════════════════════════════════════════
function updateSectionHint(revealed, total){
  const hint = document.getElementById('soHint');
  if(total === 0){
    hint.textContent = 'Tap Next to continue';
  } else if(revealed === 0){
    hint.textContent = 'Tap Reveal to see each sentence';
  } else if(revealed < total){
    hint.textContent = `${revealed} of ${total} revealed — tap for more`;
  } else {
    hint.textContent = 'All sentences revealed — tap Next';
  }
}

// ══════════════════════════════════════════
// ADVANCE TO NEXT SECTION CARD
// ══════════════════════════════════════════
function advanceSectionCard(){
  if(stageSectionIdx >= reportData.length - 1){ closeStages(); return; }
  stageSectionIdx++;
  stageSentenceRevealed = 0;
  loadSectionCard(stageSectionIdx, true);
}

// ══════════════════════════════════════════
// REVEAL ALL / RESET
// ══════════════════════════════════════════
function revealAll(){
  closeMenu();
  if(!reportData) return;
  reportData.forEach((sec,si)=>{
    (sec.sentences||[]).forEach((_,ti)=>{
      if(ti===0) return;
      const tc = document.getElementById(`tc-${si}-${ti}`);
      if(tc&&!tc.classList.contains('revealed')){
        tc.classList.add('revealed');
        setTimeout(()=>tc.querySelector('.s-new')?.classList.add('ink'),1400);
        revealCount++;
      }
    });
    markSectionDone(si);
  });
  updateProgress();
  setTimeout(celebrate,350);
}

function resetAll(){
  closeMenu();
  if(!reportData) return;
  revealCount = 0;
  closeStages();
  renderTextView();
  updateProgress();
}

// ══════════════════════════════════════════
// CELEBRATE / MENU / NAV / KEYBOARD
// ══════════════════════════════════════════
function celebrate(){
  const el = document.getElementById('celebration');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2900);
}

function toggleMenu(){ document.getElementById('menuDropdown').classList.toggle('open'); }
function closeMenu(){  document.getElementById('menuDropdown').classList.remove('open'); }
document.addEventListener('click', e=>{
  if(!e.target.closest('#menuDropdown')&&!e.target.closest('.menu-btn')) closeMenu();
});

document.addEventListener('keydown', e=>{
  const open = document.getElementById('stagesOverlay').classList.contains('active');
  if(e.key==='Escape'&&open){ closeStages(); return; }
  if(e.key===' '&&open){
    e.preventDefault();
    // Space: reveal next sentence, or advance to next section if all revealed
    const section  = reportData[stageSectionIdx];
    const sentences = section?.sentences||[];
    const hiddenRemaining = (sentences.length - 1) - stageSentenceRevealed;
    if(hiddenRemaining > 0) revealNextSentenceInCard();
    else advanceSectionCard();
  }
});

function navTo(dest){
  if(dest==='builder') return;
  if(question) sessionStorage.setItem('currentReportQuestion',JSON.stringify(question));
  const map={question:'report-question-selector.html',plan:'report-plan.html',model:'report-model.html',sample:'report-master.html'};
  if(map[dest]) window.location.href=map[dest];
}

init();
</script>
