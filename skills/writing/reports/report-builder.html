<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Build — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0c;--gold:#C9A961;--gold-d:#9B7D3A;--gold-l:#E8D4A0;
  --white:#FAFAF8;--ink:#0d0d0d;--settled:rgba(13,13,13,0.82);--rule:rgba(0,0,0,0.07);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:2vh 3vw}
.card{width:100%;height:100%;max-width:900px;max-height:95vh;background:var(--white);border-radius:1.5rem;box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));z-index:5}
.card-brand{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem 0.75rem;margin-top:3px;border-bottom:1px solid var(--rule);position:relative;z-index:10}
.home-link{text-decoration:none;font-size:0.82rem;font-weight:600;color:var(--gold);padding:0.4rem 0.6rem;border-radius:0.5rem;transition:all 0.2s}
.home-link:hover{background:rgba(201,169,97,0.1)}
.brand-word{position:absolute;left:50%;transform:translateX(-50%);font-size:0.65rem;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.18);pointer-events:none}
.menu-btn{background:#000;border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.menu-btn:hover{background:rgba(0,0,0,0.75)}
.menu-dots{display:flex;gap:3px}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:#fff}
.menu-dropdown{position:absolute;top:calc(100% + 0.5rem);right:1rem;background:#fff;border-radius:0.75rem;box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.12);min-width:190px;padding:0.5rem;z-index:300;display:none}
.menu-dropdown.open{display:block;animation:menuFade 0.18s ease-out}
@keyframes menuFade{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.menu-item{padding:0.65rem 0.85rem;border-radius:0.5rem;font-size:0.8rem;font-weight:500;color:rgba(0,0,0,0.7);cursor:pointer;transition:all 0.15s}
.menu-item:hover{background:rgba(0,0,0,0.04)}

.controls-row{flex-shrink:0;display:flex;align-items:center;gap:0.75rem;padding:0.5rem 1.5rem 0.55rem;border-bottom:1px solid var(--rule)}
.bar-track{flex:1;height:3px;background:rgba(0,0,0,0.07);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:2px;transition:width 0.55s cubic-bezier(0.4,0,0.2,1)}
.progress-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:rgba(0,0,0,0.28);white-space:nowrap;transition:color 0.3s}
.progress-label.done{color:var(--gold-d)}
.view-toggle{display:flex;align-items:center;background:rgba(0,0,0,0.06);border-radius:2rem;padding:0.18rem;gap:0.08rem;flex-shrink:0}
.vt-btn{background:transparent;border:none;padding:0.24rem 0.7rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.vt-btn.active{background:var(--ink);color:#fff}
.vt-btn:hover:not(.active){color:rgba(0,0,0,0.6)}

/* TEXT CANVAS */
.report-canvas{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2rem 3rem 2.5rem;display:none}
.report-canvas.active{display:block}
.report-canvas::-webkit-scrollbar{width:4px}
.report-canvas::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}
.section-block{margin-bottom:2rem}
.section-block+.section-block{padding-top:2rem;border-top:1.5px solid rgba(201,169,97,0.12)}
.section-label{font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.14em;color:rgba(0,0,0,0.2);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;transition:color 0.4s}
.section-label .check{opacity:0;transform:scale(0);transition:opacity 0.4s,transform 0.4s cubic-bezier(0.34,1.56,0.64,1);color:var(--gold)}
.section-block.complete .section-label{color:var(--gold-d)}
.section-block.complete .section-label .check{opacity:1;transform:scale(1)}
.prose-wrap{font-family:'DM Sans',sans-serif;font-size:1.05rem;line-height:2.1;color:var(--settled);font-weight:400}
.anchor-text{color:var(--ink);font-weight:500}
.placed-sentence{display:inline;background:rgba(201,169,97,0.12);border-bottom:1.5px solid var(--gold);padding-bottom:1px;color:rgba(0,0,0,0.82);animation:placeIn 0.45s cubic-bezier(0.22,1,0.36,1) both}
.link-word{color:#4a90d9;font-style:normal}
@keyframes placeIn{from{opacity:0;background:rgba(201,169,97,0.45)}to{opacity:1;background:rgba(201,169,97,0.12)}}

/* DOTS TRIGGER */
.dots-trigger{--dt-accent:#C9A961;display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.13);background:#fff;cursor:pointer;vertical-align:middle;margin-left:0.55rem;gap:2.5px;transition:border-color 0.18s,background 0.18s,transform 0.15s,box-shadow 0.18s;flex-shrink:0;position:relative;top:-1px}
.dots-trigger:hover{border-color:var(--dt-accent);background:var(--dt-accent);transform:scale(1.15);box-shadow:0 3px 14px rgba(0,0,0,0.18)}
.dots-trigger:active{transform:scale(0.95);box-shadow:none}
.dots-trigger .dt-dot{width:3px;height:3px;border-radius:50%;background:rgba(0,0,0,0.4);transition:background 0.18s}
.dots-trigger:hover .dt-dot{background:#fff}

.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.75rem;font-size:0.9rem;color:rgba(0,0,0,0.3);text-align:center;line-height:1.6;padding:2rem}

/* INFOGRAPHIC MODAL */
.inf-backdrop{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0);pointer-events:none;transition:background 0.25s ease}
.inf-backdrop.active{background:rgba(0,0,0,0.6);pointer-events:all}
.inf-modal{position:fixed;left:50%;top:50%;z-index:700;transform:translate(-50%,-50%) scale(0.93);opacity:0;pointer-events:none;transition:opacity 0.22s cubic-bezier(0.4,0,0.2,1),transform 0.26s cubic-bezier(0.34,1.2,0.64,1);width:min(480px,calc(100vw - 2rem));border-radius:1.25rem;overflow:hidden;background:#fff;box-shadow:8px 14px 0 rgba(0,0,0,0.45),0 32px 72px rgba(0,0,0,0.65)}
.inf-modal.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
.inf-head{position:relative;overflow:hidden;padding:1.4rem 1.6rem 1.25rem}
.inf-ghost{position:absolute;right:-0.5rem;bottom:-1.1rem;font-family:'Barlow Condensed',sans-serif;font-size:clamp(6.5rem,20vw,9rem);font-weight:900;line-height:1;color:rgba(255,255,255,0.18);letter-spacing:-0.05em;pointer-events:none;user-select:none}
.inf-step{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.65);display:block;margin-bottom:0.35rem}
.inf-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.9rem,5.5vw,2.6rem);font-weight:900;letter-spacing:0.03em;text-transform:uppercase;color:#fff;line-height:1}
.inf-close{position:absolute;top:0.85rem;right:0.85rem;background:rgba(255,255,255,0.18);border:none;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.65rem;color:#fff;z-index:2;transition:background 0.18s}
.inf-close:hover{background:rgba(255,255,255,0.35)}
.inf-body{padding:1.1rem 1.5rem 1.35rem;max-height:calc(100vh - 16rem);overflow-y:auto;-webkit-overflow-scrolling:touch}
.inf-anchor-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.46rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,0,0,0.22);display:block;margin-bottom:0.42rem}
.inf-anchor{font-family:'DM Sans',sans-serif;font-size:clamp(0.9rem,2.2vw,1.03rem);font-weight:500;line-height:1.78;color:#0d0d0d;border-bottom:1.5px solid rgba(0,0,0,0.07);padding-bottom:0.85rem;margin-bottom:0.75rem;display:block}
.inf-opts{display:flex;flex-direction:column;gap:0.42rem}
.inf-opt{display:block;width:100%;text-align:left;font-family:'DM Sans',sans-serif;font-size:clamp(0.82rem,1.9vw,0.92rem);line-height:1.65;color:rgba(0,0,0,0.72);padding:0.68rem 0.95rem;border:1.5px solid rgba(0,0,0,0.08);border-radius:0.65rem;background:#fff;cursor:pointer;transition:border-color 0.18s,background 0.18s,transform 0.13s;animation:optIn 0.35s cubic-bezier(0.22,1,0.36,1) both}
.inf-opt:nth-child(2){animation-delay:0.07s}
.inf-opt:nth-child(3){animation-delay:0.14s}
@keyframes optIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.inf-opt:hover{transform:translateX(3px)}
.inf-opt:active{transform:translateX(1px)}
.inf-letter{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.4);margin-right:0.5rem;flex-shrink:0;vertical-align:middle;transition:background 0.18s,color 0.18s}

@media(max-width:600px){
  .inf-modal{left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%!important;max-width:100%!important;border-radius:1.25rem 1.25rem 0 0!important;transform:translateY(110%)!important;transition:opacity 0.22s ease,transform 0.3s cubic-bezier(0.32,0.72,0,1)!important}
  .inf-modal.open{transform:translateY(0)!important;opacity:1}
}

/* STAGES OVERLAY */
.stages-overlay{position:fixed;inset:0;z-index:800;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;background:#0c0c0c;opacity:0;pointer-events:none;transition:opacity 0.32s ease;overflow:hidden}
.stages-overlay.active{opacity:1;pointer-events:all}
.so-stage-area{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(env(safe-area-inset-top),0.75rem) 1.25rem max(env(safe-area-inset-bottom),0.75rem);gap:0.75rem;box-sizing:border-box;overflow:hidden}
.so-topbar{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;flex-shrink:0}
.so-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;letter-spacing:0.38em;text-transform:uppercase;color:rgba(255,255,255,0.1)}
.so-close-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.65rem;color:rgba(255,255,255,0.3);transition:all 0.18s}
.so-close-btn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8)}

/* NAV STRIP */
.so-nav-strip{width:100%;max-width:520px;display:flex;gap:0.35rem;flex-shrink:0;margin-bottom:0.5rem;flex-wrap:wrap;justify-content:center}
.so-nav-pip{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:0.3rem 0.7rem;font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.25);cursor:pointer;transition:all 0.18s;white-space:nowrap}
.so-nav-pip:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.25)}
.so-nav-pip.current{color:#fff;border-color:var(--pip-accent,#C9A961)}
.so-nav-pip.done{color:rgba(255,255,255,0.55);border-color:rgba(255,255,255,0.2)}

.stage-card{position:relative;width:min(500px,96vw);max-height:calc(100vh - 12rem);background:#fff;border-radius:20px;overflow:hidden;flex-shrink:1;display:flex;flex-direction:column;box-shadow:0 0 0 1px rgba(255,255,255,0.06),8px 14px 0 rgba(0,0,0,0.45),0 32px 72px rgba(0,0,0,0.65)}
.stage-card.card-enter{animation:cardSlide 0.42s cubic-bezier(0.34,1.2,0.64,1) both}
.stage-card.card-prev{animation:cardPrev 0.38s cubic-bezier(0.34,1.2,0.64,1) both}
@keyframes cardSlide{from{opacity:0;transform:translateX(52px) scale(0.95)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes cardPrev{from{opacity:0;transform:translateX(-52px) scale(0.95)}to{opacity:1;transform:translateX(0) scale(1)}}
.sc-header{position:relative;flex-shrink:0;padding:1.5rem 1.6rem 1.35rem;overflow:hidden;background:var(--sc-accent,#C9A961);transition:background 0.35s}
.sc-ghost-num{position:absolute;right:-0.6rem;bottom:-1.2rem;font-family:'Barlow Condensed',sans-serif;font-size:clamp(7rem,24vw,9.5rem);font-weight:900;line-height:1;color:rgba(255,255,255,0.18);letter-spacing:-0.05em;pointer-events:none;user-select:none}
.sc-step-label{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;letter-spacing:0.24em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:0.45rem;display:block}
.sc-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,6vw,2.8rem);font-weight:900;letter-spacing:0.03em;text-transform:uppercase;color:#fff;line-height:1;text-shadow:0 2px 12px rgba(0,0,0,0.12)}
.sc-body{flex:1;padding:0 1.6rem 0.6rem;display:flex;flex-direction:column;gap:0.5rem;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sc-anchor-label{font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,0,0,0.22);padding-top:0.9rem;display:block}
.sc-anchor{font-family:'DM Sans',sans-serif;font-size:clamp(1.02rem,2.8vw,1.2rem);font-weight:500;line-height:1.82;color:#0d0d0d;padding:0.35rem 0 0.85rem;border-bottom:1.5px solid rgba(0,0,0,0.07)}
.sc-opts-zone{display:flex;flex-direction:column;gap:0.45rem;padding:0.5rem 0 0.25rem}
.sc-opt-btn{display:block;width:100%;text-align:left;font-family:'DM Sans',sans-serif;font-size:clamp(0.82rem,2vw,0.93rem);line-height:1.65;color:rgba(0,0,0,0.72);padding:0.7rem 0.95rem;border:1.5px solid rgba(0,0,0,0.09);border-radius:10px;background:#fff;cursor:pointer;transition:border-color 0.18s,background 0.18s,transform 0.15s;animation:optIn 0.38s cubic-bezier(0.22,1,0.36,1) both}
.sc-opt-btn:nth-child(2){animation-delay:0.07s}
.sc-opt-btn:nth-child(3){animation-delay:0.14s}
.sc-opt-btn:hover{border-color:var(--sc-accent,#C9A961);background:rgba(201,169,97,0.05);transform:translateX(3px)}
.sc-opt-btn:active{transform:translateX(1px)}
.sc-opt-letter{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.4);margin-right:0.5rem;flex-shrink:0;vertical-align:middle;transition:background 0.18s,color 0.18s}
.sc-opt-btn:hover .sc-opt-letter{background:var(--sc-accent,#C9A961);color:#fff}
.sc-placed-row{display:flex;align-items:flex-start;gap:0.55rem;padding:0.75rem 0;animation:placeIn 0.38s cubic-bezier(0.22,1,0.36,1) both}
.sc-placed-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:0.42rem}
.sc-placed-text{font-family:'DM Sans',sans-serif;font-size:clamp(0.82rem,2vw,0.96rem);font-weight:400;line-height:1.72;color:rgba(0,0,0,0.62)}
.sc-dots-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 0 0.5rem}
.sc-dots-btn{display:flex;align-items:center;justify-content:center;gap:4px;width:52px;height:52px;border-radius:50%;border:2px solid var(--sc-btn-accent,rgba(0,0,0,0.18));background:#fff;cursor:pointer;transition:border-color 0.22s,background 0.22s,transform 0.18s,box-shadow 0.22s}
.sc-dots-btn:hover{background:var(--sc-btn-accent,#C9A961);border-color:var(--sc-btn-accent,#C9A961);transform:scale(1.12);box-shadow:0 4px 18px rgba(0,0,0,0.15)}
.sc-dots-btn:active{transform:scale(0.95);box-shadow:none}
.sc-dots-btn .sd-dot{width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,0.35);transition:background 0.22s}
.sc-dots-btn:hover .sd-dot{background:#fff}
.sc-dots-hint{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:rgba(0,0,0,0.22);margin-top:0.5rem;text-align:center}
.sc-foot{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.6rem 1.1rem;border-top:1px solid rgba(0,0,0,0.06)}
.sc-foot-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.2)}
.sc-foot-nav{display:flex;gap:0.5rem;align-items:center}
.sc-prev-btn,.sc-next-btn{display:flex;align-items:center;gap:0.38rem;padding:0.42rem 1rem;border-radius:50px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.3s,background 0.2s}
.sc-prev-btn{background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.5)}
.sc-prev-btn:hover{background:rgba(0,0,0,0.1)}
.sc-next-btn{background:#0d0d0d;color:#fff}
.sc-next-btn:hover{background:rgba(13,13,13,0.78)}
.sc-prev-btn:disabled{opacity:0.2;cursor:default}
.sc-next-btn:disabled{opacity:0.2;cursor:default}

.so-bottom{width:min(500px,96vw);margin-top:0.75rem;display:flex;flex-direction:column;gap:0.4rem;flex-shrink:0;position:relative;z-index:1}
.so-progress-track{width:100%;height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.so-progress-fill{height:100%;border-radius:2px;transition:width 0.45s,background 0.35s}
.so-bottom-row{display:flex;align-items:center;justify-content:space-between}
.so-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.15)}
.so-hint{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.13)}

.celebration{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.celebration.show{animation:celebPop 2.8s ease forwards}
@keyframes celebPop{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.celeb-pill{background:var(--ink);color:var(--gold);padding:1rem 2.25rem;border-radius:3rem;font-size:1rem;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;box-shadow:0 12px 48px rgba(0,0,0,0.45);animation:celebScale 0.45s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes celebScale{from{transform:scale(0.7)}to{transform:scale(1)}}

.card-nav{flex-shrink:0;display:flex;justify-content:center;padding:0.75rem 1.125rem calc(env(safe-area-inset-bottom,0px) + 0.875rem);border-top:1px solid var(--rule);background:var(--white);transition:visibility 0s,opacity 0.15s}
.card-nav.hidden{visibility:hidden;opacity:0;pointer-events:none;height:0;padding:0;border:none;overflow:hidden}
.nav-pill{display:flex;gap:0.15rem;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.35rem 0.4rem}
.nb{background:transparent;border:none;padding:0.5rem 1rem;border-radius:1.5rem;font-family:'Inter',sans-serif;font-size:0.7rem;letter-spacing:0.02em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.24s;white-space:nowrap;min-height:36px;font-weight:500}
.nb.on{background:var(--ink);color:var(--gold);font-weight:700}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

@media(max-width:768px){
  .shell{padding:1vh 2vw}.card{border-radius:1rem}
  .card-brand{padding:0.75rem 1rem 0.5rem}
  .report-canvas{padding:1.5rem 1.25rem 2rem}
  .prose-wrap{font-size:0.95rem;line-height:1.9}
  .nb{padding:0.4rem 0.75rem;font-size:0.65rem;min-height:32px}
  .controls-row{padding:0.4rem 1rem 0.45rem;gap:0.5rem;flex-wrap:wrap}
}
</style>
</head>
<body>
<div class="shell">
<div class="card">

  <div class="card-brand">
    <a class="home-link" href="/skills/writing/reports/report-question-selector">&#x2190; Questions</a>
    <span class="brand-word">INTUITY</span>
    <div style="flex:1"></div>
    <div style="position:relative">
      <div class="menu-btn" onclick="toggleMenu()">
        <div class="menu-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="menu-dropdown" id="menuDropdown">
        <div class="menu-item" onclick="revealAll()">Reveal all sentences</div>
        <div class="menu-item" onclick="resetAll()">Reset report</div>
      </div>
    </div>
  </div>

  <div class="controls-row">
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="progress-label" id="progressLabel">select a section</div>
    <div class="view-toggle">
      <button class="vt-btn active" id="vtText" onclick="setView('text')">Text</button>
      <button class="vt-btn" id="vtStages" onclick="setView('stages')">Stages</button>
    </div>
  </div>

  <div class="report-canvas active" id="reportCanvas">
    <div class="state-msg">Loading&#x2026;</div>
  </div>

  <div class="card-nav" id="cardNav">
    <div class="nav-pill">
      <button class="nb" onclick="navTo('question')">Question</button>
      <button class="nb" onclick="navTo('plan')">Plan</button>
      <button class="nb" onclick="navTo('model')">Model</button>
      <button class="nb on">Build</button>
      <button class="nb" onclick="navTo('sample')">Sample</button>
    </div>
  </div>

</div>
</div>

<!-- INFOGRAPHIC MODAL -->
<div class="inf-backdrop" id="infBackdrop" onclick="closeInfModal()"></div>
<div class="inf-modal" id="infModal">
  <div class="inf-head" id="infHead">
    <button class="inf-close" onclick="closeInfModal()">&#x2715;</button>
    <div class="inf-ghost" id="infGhost">01</div>
    <span class="inf-step" id="infStep">Section 1</span>
    <div class="inf-title" id="infTitle">Introduction</div>
  </div>
  <div class="inf-body">
    <span class="inf-anchor-lbl">Anchor sentence</span>
    <span class="inf-anchor" id="infAnchor"></span>
    <div class="inf-opts" id="infOpts"></div>
  </div>
</div>

<!-- STAGES OVERLAY -->
<div class="stages-overlay" id="stagesOverlay">
  <div class="so-stage-area">
    <div class="so-topbar">
      <span class="so-brand">INTUITY &#x2014; Build Report</span>
      <button class="so-close-btn" onclick="closeStages()">&#x2715;</button>
    </div>
    <div class="so-nav-strip" id="soNavStrip"></div>
    <div class="stage-card" id="stageCard">
      <div class="sc-header" id="scHeader">
        <div class="sc-ghost-num" id="scGhostNum">01</div>
        <span class="sc-step-label" id="scStepLabel">Section 1</span>
        <div class="sc-title" id="scTitle">Introduction</div>
      </div>
      <div class="sc-body">
        <span class="sc-anchor-label">Anchor sentence</span>
        <div class="sc-anchor" id="scAnchor"></div>
        <div class="sc-opts-zone" id="scOptsZone"></div>
      </div>
      <div class="sc-foot">
        <span class="sc-foot-counter" id="scFootCounter">1 / 1</span>
        <div class="sc-foot-nav">
          <button class="sc-prev-btn" id="scPrevBtn" onclick="goCard(-1)">&#x2190; Prev</button>
          <button class="sc-next-btn" id="scNextBtn" onclick="goCard(1)">Next &#x2192;</button>
        </div>
      </div>
    </div>
    <div class="so-bottom">
      <div class="so-progress-track"><div class="so-progress-fill" id="soProgressFill" style="width:0%"></div></div>
      <div class="so-bottom-row">
        <span class="so-counter" id="soCounter">1 / 1</span>
        <span class="so-hint" id="soHint"></span>
      </div>
    </div>
  </div>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-pill">Report built &#x2736;</div>
</div>

<script>
const STAGE_ACCENTS = ['#3d9e95','#e8723a','#7b5ea7','#c94f6d','#c08b2f'];

let question = null, buildData = null, currentView = 'text';
let pillPlaced = {};
let stageSectionIdx = 0;
let infModalSi = -1;

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hexToRgb(hex){
  return parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16);
}

/* ════ INIT ════ */
async function init(){
  try{ question = JSON.parse(sessionStorage.getItem('currentReportQuestion')); }catch(e){}
  if(!question){
    document.getElementById('reportCanvas').innerHTML =
      '<div class="state-msg">No question selected.<br>Return to Questions to choose one.</div>';
    return;
  }
  try{
    const r = await fetch('data/samples-build-reports-options.json');
    if(!r.ok) throw new Error('options file not found');
    const all = await r.json();
    buildData = all[question.id];
    if(!buildData || !buildData.length){
      document.getElementById('reportCanvas').innerHTML =
        '<div class="state-msg">No build data yet for this question.<br>'
        +'<small style="opacity:0.35;margin-top:0.5rem;display:block">id: '+esc(question.id)+'</small></div>';
      return;
    }
  } catch(err){
    document.getElementById('reportCanvas').innerHTML =
      '<div class="state-msg">Could not load build data.<br>'
      +'<small style="opacity:0.35;margin-top:0.5rem;display:block">'+esc(err.message)+'</small></div>';
    return;
  }
  buildData.forEach((_,i) => { pillPlaced[i] = false; });
  renderCanvas();
  updateProgress();
}

/* ════ TEXT VIEW ════ */
function renderCanvas(){
  document.getElementById('reportCanvas').innerHTML =
    buildData.map((sec, si) => {
      const done = !!pillPlaced[si];
      return '<div class="section-block'+(done?' complete':'')+'" id="sec-'+si+'">'
        +'<div class="section-label">'+esc(sec.label)+'<span class="check"> &#x2736;</span></div>'
        +'<div class="prose-wrap" id="prose-'+si+'">'
          +'<span class="anchor-text">'+esc(sec.anchor)+'</span>'
          +(done
            ? '<span class="placed-sentence" id="placed-'+si+'">'+colourLinker(pillPlaced[si])+'</span>'
            : '<button class="dots-trigger" id="dots-'+si+'" style="--dt-accent:'+STAGE_ACCENTS[si%STAGE_ACCENTS.length]+'" onclick="openInfModal('+si+')" aria-label="Choose sentence for '+esc(sec.label)+'">'
              +'<span class="dt-dot"></span><span class="dt-dot"></span><span class="dt-dot"></span>'
              +'</button>')
        +'</div>'
        +'</div>';
    }).join('');
}

/* ════ INFOGRAPHIC MODAL ════ */
function openInfModal(si){
  if(pillPlaced[si]) return;
  infModalSi = si;
  const sec = buildData[si];
  const accent = STAGE_ACCENTS[si % STAGE_ACCENTS.length];

  document.getElementById('infHead').style.background = accent;
  document.getElementById('infGhost').textContent     = String(si+1).padStart(2,'0');
  document.getElementById('infStep').textContent      = 'Section ' + (si+1);
  document.getElementById('infTitle').textContent     = sec.label.toUpperCase();
  document.getElementById('infAnchor').textContent    = sec.anchor;

  const optsEl = document.getElementById('infOpts');
  optsEl.innerHTML = '';
  sec.options.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'inf-opt';
    btn.style.animationDelay = (i * 0.07) + 's';
    btn.innerHTML = '<span class="inf-letter">'+String.fromCharCode(65+i)+'</span>'+colourLinker(o);
    btn.onmouseover = () => {
      btn.style.borderColor = accent;
      btn.style.background = 'rgba('+hexToRgb(accent)+',0.06)';
      btn.querySelector('.inf-letter').style.background = accent;
      btn.querySelector('.inf-letter').style.color = '#fff';
    };
    btn.onmouseout = () => {
      btn.style.borderColor = 'rgba(0,0,0,0.08)';
      btn.style.background = '#fff';
      btn.querySelector('.inf-letter').style.background = 'rgba(0,0,0,0.06)';
      btn.querySelector('.inf-letter').style.color = 'rgba(0,0,0,0.4)';
    };
    btn.onclick = () => placeFromModal(si, i);
    optsEl.appendChild(btn);
  });

  document.getElementById('infBackdrop').classList.add('active');
  document.getElementById('infModal').classList.add('open');
}

function closeInfModal(){
  infModalSi = -1;
  document.getElementById('infModal').classList.remove('open');
  document.getElementById('infBackdrop').classList.remove('active');
}

function placeFromModal(si, optIdx){
  if(pillPlaced[si]) return;
  const text = (buildData[si].options[optIdx]||'').trim();
  if(!text) return;
  closeInfModal();
  pillPlaced[si] = text;

  const dotsBtn = document.getElementById('dots-'+si);
  if(dotsBtn){
    const placed = document.createElement('span');
    placed.className = 'placed-sentence';
    placed.id = 'placed-'+si;
    placed.innerHTML = colourLinker(text);
    dotsBtn.replaceWith(placed);
  }
  document.getElementById('sec-'+si)?.classList.add('complete');
  updateProgress();
  if(buildData.every((_,i) => pillPlaced[i])) setTimeout(celebrate, 400);
}

/* ════ STAGES VIEW ════ */
function openStages(){
  if(!buildData) return;
  let start = buildData.findIndex((_,i) => !pillPlaced[i]);
  if(start < 0) start = 0;
  stageSectionIdx = start;
  document.getElementById('stagesOverlay').classList.add('active');
  document.getElementById('cardNav').classList.add('hidden');
  closeInfModal();
  buildNavStrip();
  loadCard(stageSectionIdx, 0);
}

function closeStages(){
  document.getElementById('stagesOverlay').classList.remove('active');
  document.getElementById('cardNav').classList.remove('hidden');
  currentView = 'text';
  document.getElementById('vtText').classList.add('active');
  document.getElementById('vtStages').classList.remove('active');
  document.getElementById('reportCanvas').classList.add('active');
}

function buildNavStrip(){
  const strip = document.getElementById('soNavStrip');
  strip.innerHTML = '';
  buildData.forEach((sec, si) => {
    const pip = document.createElement('button');
    pip.className = 'so-nav-pip';
    pip.textContent = sec.label;
    pip.onclick = () => jumpCard(si);
    strip.appendChild(pip);
  });
  updateNavStrip();
}

function updateNavStrip(){
  const pips = document.querySelectorAll('.so-nav-pip');
  pips.forEach((pip, si) => {
    const accent = STAGE_ACCENTS[si % STAGE_ACCENTS.length];
    pip.classList.toggle('current', si === stageSectionIdx);
    pip.classList.toggle('done', !!pillPlaced[si] && si !== stageSectionIdx);
    pip.style.setProperty('--pip-accent', si === stageSectionIdx ? accent : 'rgba(255,255,255,0.2)');
    if(si === stageSectionIdx) pip.style.color = '#fff';
    else pip.style.color = '';
  });
}

function jumpCard(si){
  const dir = si > stageSectionIdx ? 1 : (si < stageSectionIdx ? -1 : 0);
  stageSectionIdx = si;
  loadCard(si, dir);
}

function goCard(dir){
  const next = stageSectionIdx + dir;
  if(next < 0 || next >= buildData.length) return;
  stageSectionIdx = next;
  loadCard(next, dir);
}

function loadCard(si, dir){
  if(!buildData || si >= buildData.length) return;
  const sec    = buildData[si];
  const accent = STAGE_ACCENTS[si % STAGE_ACCENTS.length];
  const total  = buildData.length;

  document.getElementById('scHeader').style.setProperty('--sc-accent', accent);
  document.getElementById('scGhostNum').textContent  = String(si+1).padStart(2,'0');
  document.getElementById('scStepLabel').textContent = 'Section '+(si+1);
  document.getElementById('scStepLabel').style.color = accent;
  document.getElementById('scTitle').textContent     = sec.label.toUpperCase();
  document.getElementById('scAnchor').textContent    = sec.anchor;

  const zone = document.getElementById('scOptsZone');
  zone.innerHTML = '';

  if(pillPlaced[si]){
    const row = document.createElement('div');
    row.className = 'sc-placed-row';
    row.innerHTML = '<div class="sc-placed-dot" style="background:'+accent+'"></div>'
      +'<div class="sc-placed-text">'+colourLinker(pillPlaced[si])+'</div>';
    zone.appendChild(row);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'sc-dots-wrap';
    const dotsBtn = document.createElement('button');
    dotsBtn.className = 'sc-dots-btn';
    dotsBtn.style.setProperty('--sc-btn-accent', accent);
    dotsBtn.innerHTML = '<span class="sd-dot"></span><span class="sd-dot"></span><span class="sd-dot"></span>';
    dotsBtn.onclick = () => revealStageOpts(si, accent, zone, wrap);
    const hint = document.createElement('div');
    hint.className = 'sc-dots-hint';
    hint.textContent = 'tap to see options';
    wrap.appendChild(dotsBtn);
    wrap.appendChild(hint);
    zone.appendChild(wrap);
  }

  document.getElementById('scFootCounter').textContent = (si+1)+' / '+total;
  const prevBtn = document.getElementById('scPrevBtn');
  const nextBtn = document.getElementById('scNextBtn');
  prevBtn.disabled = si === 0;
  nextBtn.textContent = si === total-1 ? 'Finish \u2736' : 'Next \u2192';
  nextBtn.disabled = false;

  const donePct = Math.round((buildData.filter((_,i) => pillPlaced[i]).length / total)*100);
  document.getElementById('soProgressFill').style.background = accent;
  document.getElementById('soProgressFill').style.width = donePct+'%';
  document.getElementById('soCounter').textContent = (si+1)+' / '+total;
  document.getElementById('soHint').textContent = pillPlaced[si] ? 'Section complete \u2736' : 'Tap \u2022\u2022\u2022 to reveal choices';

  if(dir !== 0){
    const cardEl = document.getElementById('stageCard');
    cardEl.classList.remove('card-enter','card-prev');
    void cardEl.offsetWidth;
    cardEl.classList.add(dir > 0 ? 'card-enter' : 'card-prev');
  }
  updateNavStrip();
}

function revealStageOpts(si, accent, zone, dotsWrap){
  dotsWrap.style.transition = 'opacity 0.18s,transform 0.18s';
  dotsWrap.style.opacity = '0';
  dotsWrap.style.transform = 'scale(0.9)';
  setTimeout(() => {
    zone.innerHTML = '';
    buildData[si].options.forEach((o, i) => {
      const btn = document.createElement('button');
      btn.className = 'sc-opt-btn';
      btn.style.setProperty('--sc-accent', accent);
      btn.style.animationDelay = (i * 0.07)+'s';
      btn.innerHTML = '<span class="sc-opt-letter">'+String.fromCharCode(65+i)+'</span>'+colourLinker(o);
      btn.onclick = () => placeStage(si, i);
      zone.appendChild(btn);
    });
    document.getElementById('soHint').textContent = 'Choose a sentence to continue';
  }, 180);
}

function placeStage(si, optIdx){
  if(pillPlaced[si]) return;
  const text = (buildData[si].options[optIdx]||'').trim();
  if(!text) return;
  pillPlaced[si] = text;
  const dotsBtn = document.getElementById('dots-'+si);
  if(dotsBtn){
    const placed = document.createElement('span');
    placed.className = 'placed-sentence';
    placed.id = 'placed-'+si;
    placed.innerHTML = colourLinker(text);
    dotsBtn.replaceWith(placed);
  }
  document.getElementById('sec-'+si)?.classList.add('complete');
  updateProgress();
  loadCard(si, 0);
  if(buildData.every((_,i) => pillPlaced[i])) setTimeout(celebrate, 400);
}

/* ════ VIEW TOGGLE ════ */
function setView(v){
  currentView = v;
  document.getElementById('vtText').classList.toggle('active', v==='text');
  document.getElementById('vtStages').classList.toggle('active', v==='stages');
  document.getElementById('reportCanvas').classList.toggle('active', v==='text');
  if(v === 'stages') openStages();
  else closeInfModal();
}

/* ════ MENU ════ */
function revealAll(){
  closeMenu();
  if(!buildData) return;
  buildData.forEach((sec, si) => {
    if(pillPlaced[si]) return;
    const text = sec.options[0]||'';
    if(!text) return;
    pillPlaced[si] = text;
    const dotsBtn = document.getElementById('dots-'+si);
    if(dotsBtn){
      const placed = document.createElement('span');
      placed.className = 'placed-sentence';
      placed.innerHTML = colourLinker(text);
      dotsBtn.replaceWith(placed);
    }
    document.getElementById('sec-'+si)?.classList.add('complete');
  });
  updateProgress();
  if(document.getElementById('stagesOverlay').classList.contains('active')){
    loadCard(stageSectionIdx, 0); updateNavStrip();
  }
  setTimeout(celebrate, 350);
}

function resetAll(){
  closeMenu();
  closeInfModal();
  if(!buildData) return;
  buildData.forEach((_,i) => { pillPlaced[i] = false; });
  if(document.getElementById('stagesOverlay').classList.contains('active')){
    stageSectionIdx = 0; loadCard(0, 0); updateNavStrip();
  }
  renderCanvas();
  updateProgress();
}

/* ════ PROGRESS ════ */
function updateProgress(){
  const total = buildData.length;
  const done  = buildData.filter((_,i) => pillPlaced[i]).length;
  document.getElementById('barFill').style.width = (total>0?(done/total)*100:0)+'%';
  const lbl = document.getElementById('progressLabel');
  if(done===0){ lbl.textContent='tap \u2022\u2022\u2022 to begin'; lbl.classList.remove('done'); }
  else if(done===total){ lbl.textContent='complete \u2736'; lbl.classList.add('done'); }
  else{ lbl.textContent=done+' / '+total+' sections'; lbl.classList.remove('done'); }
}

function celebrate(){
  const el = document.getElementById('celebration');
  el.classList.remove('show'); void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2900);
}

function toggleMenu(){ document.getElementById('menuDropdown').classList.toggle('open'); }
function closeMenu(){  document.getElementById('menuDropdown').classList.remove('open'); }
function navTo(dest){
  if(question) try{ sessionStorage.setItem('currentReportQuestion', JSON.stringify(question)); }catch(e){}
  const map = {question:'report-question-selector.html',plan:'report-plan.html',model:'report-model.html',sample:'report-master.html'};
  if(map[dest]) window.location.href = map[dest];
}

document.addEventListener('click', e => {
  if(!e.target.closest('.menu-btn') && !e.target.closest('.menu-dropdown')) closeMenu();
});
document.addEventListener('keydown', e => {
  if(e.key==='Escape'){ closeMenu(); closeInfModal();
    if(document.getElementById('stagesOverlay').classList.contains('active')) closeStages(); }
  if(document.getElementById('stagesOverlay').classList.contains('active')){
    if(e.key==='ArrowRight'){ e.preventDefault(); goCard(1); }
    if(e.key==='ArrowLeft'){  e.preventDefault(); goCard(-1); }
  }
});

/* ════ LINKING-WORD COLOURER ════ */
const LINK_PHRASES = [
  'The explanation lies in the fact that ',
  'This can be attributed to the fact that ',
  'This can be explained by the fact that ',
  'This is largely due to the fact that ',
  'This stems from the fact that ',
  'This stems from ',
  'The reason for this is that ',
  'The reason is that ',
  'This is rooted in ',
  'This is mainly because ',
  'This is mainly due to ',
  'This is because ',
  'This leads to ',
  'This results in ',
  'As a consequence, ',
  'By far the best aspect of ',
  'By far the worst aspect of ',
  'One positive aspect of ',
  'One key recommendation ',
  'A common complaint ',
  'I would strongly recommend ',
  'In order to ',
  'It may be worth ',
  'It would be advisable ',
  'There is broad agreement ',
  'It is generally agreed ',
  'It was generally felt ',
  'There is a broad consensus ',
  'What makes ',
  'For example, ',
  'For instance, ',
  'As a result, ',
  'Consequently, ',
  'Therefore, ',
  'However, ',
  'Nevertheless, ',
  'Furthermore, ',
  'Hence, ',
  'Thus, ',
  'As can be seen, ',
  'Taking everything into account, ',
  'To sum up, ',
  'In conclusion, ',
  'The main conclusion to be drawn is that ',
  'The findings in this report ',
  'The information presented ',
  'This report is based on ',
];

function colourLinker(text){
  const prefix = ' ';
  const body = text.startsWith(' ') ? text.slice(1) : text;
  let html = esc(body);
  for(const phrase of LINK_PHRASES){
    const escaped = esc(phrase);
    const idx = html.indexOf(escaped);
    if(idx !== -1){
      html = html.slice(0, idx)
        + '<em class="link-word">' + escaped + '</em>'
        + html.slice(idx + escaped.length);
      break;
    }
  }
  const midPhrases = [
    'For example, ','For instance, ','As a result, ','Consequently, ',
    'Therefore, ','However, ','Nevertheless, ','Furthermore, ','Hence, ','Thus, ',
    'As can be seen, ','Taking everything into account, ','In order to ',
    'This is mainly because ','This is mainly due to ',
  ];
  for(const phrase of midPhrases){
    const escaped = esc(phrase);
    html = html.replace(
      new RegExp('(?<!<em class="link-word">)' + escaped.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'g'),
      '<em class="link-word">' + escaped + '</em>'
    );
  }
  return prefix + html;
}

init();
</script>
</body>
</html>
