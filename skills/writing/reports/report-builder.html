<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Build — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0c;--gold:#C9A961;--gold-d:#9B7D3A;--gold-l:#E8D4A0;
  --white:#FAFAF8;--ink:#0d0d0d;--settled:rgba(13,13,13,0.82);--rule:rgba(0,0,0,0.07);
  --c-reason:#1D9E75;--c-example:#ed6e39;--c-compare:#7F77DD;
  --c-contrast:#D4537E;--c-result:#BA7517;--c-rephrase:#378ADD;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:2vh 3vw}
.card{width:100%;height:100%;max-width:900px;max-height:95vh;background:var(--white);border-radius:1.5rem;box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));z-index:5}
.card-brand{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem 0.75rem;margin-top:3px;border-bottom:1px solid var(--rule);position:relative;z-index:10}
.home-link{text-decoration:none;font-size:1rem;font-weight:600;color:var(--gold);padding:0.4rem 0.6rem;border-radius:0.5rem;transition:all 0.2s}
.home-link:hover{background:rgba(201,169,97,0.1)}
.brand-word{position:absolute;left:50%;transform:translateX(-50%);font-size:0.65rem;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.18);pointer-events:none}
.menu-btn{background:#000;border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.menu-btn:hover{background:rgba(0,0,0,0.75)}
.menu-dots{display:flex;gap:3px}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:#fff}
.menu-dropdown{position:absolute;top:calc(100% + 0.5rem);right:1rem;background:#fff;border-radius:0.75rem;box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.12);min-width:190px;padding:0.5rem;z-index:300;display:none}
.menu-dropdown.open{display:block;animation:menuFade 0.18s ease-out}
@keyframes menuFade{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.menu-item{padding:0.65rem 0.85rem;border-radius:0.5rem;font-size:0.8rem;font-weight:500;color:rgba(0,0,0,0.7);cursor:pointer;transition:all 0.15s}
.menu-item:hover{background:rgba(0,0,0,0.04)}
.controls-row{flex-shrink:0;display:flex;align-items:center;gap:0.75rem;padding:0.5rem 1.5rem 0.55rem;border-bottom:1px solid var(--rule)}
.bar-track{flex:1;height:3px;background:rgba(0,0,0,0.07);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:2px;transition:width 0.55s cubic-bezier(0.4,0,0.2,1)}
.progress-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:rgba(0,0,0,0.28);white-space:nowrap;transition:color 0.3s}
.progress-label.done{color:var(--gold-d)}
.view-toggle{display:flex;align-items:center;background:rgba(0,0,0,0.06);border-radius:2rem;padding:0.18rem;gap:0.08rem;flex-shrink:0}
.vt-btn{background:transparent;border:none;padding:0.24rem 0.7rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.vt-btn.active{background:var(--ink);color:#fff}
.vt-btn:hover:not(.active){color:rgba(0,0,0,0.6)}
.report-canvas{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2rem 3rem 2.5rem;display:none}
.report-canvas.active{display:block}
.report-canvas::-webkit-scrollbar{width:4px}
.report-canvas::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}
.section-block{margin-bottom:2rem}
.section-block+.section-block{padding-top:2rem;border-top:1.5px solid rgba(201,169,97,0.12)}
.section-label{font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.14em;color:rgba(0,0,0,0.2);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;transition:color 0.4s}
.section-label .check{opacity:0;transform:scale(0);transition:opacity 0.4s,transform 0.4s cubic-bezier(0.34,1.56,0.64,1);color:var(--gold)}
.section-block.complete .section-label{color:var(--gold-d)}
.section-block.complete .section-label .check{opacity:1;transform:scale(1)}
.prose{font-family:'DM Sans',sans-serif;font-size:1.05rem;line-height:2.1;color:var(--settled);font-weight:400}
.anchor-text{color:var(--ink);font-weight:500}

/* ── PILL ── */
.pill-wrap{display:inline-block;position:relative;vertical-align:middle;margin-left:0.25rem}
.xpill{display:inline-flex;align-items:center;gap:4px;background:rgba(201,169,97,0.12);border:1px solid rgba(201,169,97,0.38);border-radius:20px;padding:3px 9px 3px 8px;cursor:pointer;transition:background 0.15s,border-color 0.15s;vertical-align:middle}
.xpill:hover{background:rgba(201,169,97,0.24);border-color:rgba(201,169,97,0.6)}
.xpill.open{background:rgba(201,169,97,0.22);border-color:var(--gold)}
.xdots{display:flex;gap:2.5px;align-items:center}
.xdots span{width:3px;height:3px;border-radius:50%;background:var(--gold-d);display:block}
.xarrow{font-size:10px;color:var(--gold-d);line-height:1;transition:transform 0.2s}
.xpill.open .xarrow{transform:rotate(90deg)}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(201,169,97,0.45)}55%{box-shadow:0 0 0 6px rgba(201,169,97,0)}}
.xpill:not(.open){animation:breathe 3s ease-in-out infinite}
.pill-wrap:nth-child(2) .xpill:not(.open){animation-delay:1s}
.pill-wrap:nth-child(3) .xpill:not(.open){animation-delay:2s}

/* ── CATEGORY MENU ── */
.cat-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:200;background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.13);min-width:160px;overflow:hidden;display:none;animation:dropIn 0.18s cubic-bezier(0.22,1,0.36,1) both}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.cat-menu.open{display:block}
.cat-head{padding:5px 11px 4px;font-size:7px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.3);border-bottom:0.5px solid rgba(0,0,0,0.07)}
.cat-row{padding:8px 11px;font-size:12px;color:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid rgba(0,0,0,0.05);cursor:pointer;transition:background 0.12s}
.cat-row:last-child{border-bottom:none}
.cat-row:hover:not(.used){background:#f5f4f1}
.cat-row.used{opacity:0.28;pointer-events:none;text-decoration:line-through}
.cat-row.active{border-left:2px solid;padding-left:9px}
.cat-row.active.r-reason{background:#E1F5EE;border-color:var(--c-reason)}
.cat-row.active.r-example{background:#FEF3EC;border-color:var(--c-example)}
.cat-row.active.r-compare{background:#EEEDFE;border-color:var(--c-compare)}
.cat-row.active.r-contrast{background:#FBEAF0;border-color:var(--c-contrast)}
.cat-row.active.r-result{background:#FAEEDA;border-color:var(--c-result)}
.cat-row.active.r-rephrase{background:#E6F1FB;border-color:var(--c-rephrase)}
.cat-left{display:flex;align-items:center;gap:7px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-chev{font-size:10px;color:rgba(0,0,0,0.22)}

/* ── OPTIONS SUB-MENU ── */
.opt-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:201;background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.13);min-width:260px;max-width:300px;overflow:hidden;display:none;animation:dropIn 0.18s cubic-bezier(0.22,1,0.36,1) both}
.opt-menu.open{display:block}
.opt-head{padding:5px 11px 4px;font-size:7px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.opt-row{padding:9px 11px;font-size:11.5px;color:rgba(0,0,0,0.72);line-height:1.5;border-bottom:0.5px solid rgba(0,0,0,0.05);cursor:pointer;transition:background 0.12s}
.opt-row:last-child{border-bottom:none}
.opt-row:hover{background:#f5f4f1}

/* ── PLACED SENTENCE ── */
.placed-sentence{display:inline;background:rgba(201,169,97,0.12);border-bottom:1.5px solid var(--gold);padding-bottom:1px;color:rgba(0,0,0,0.82);animation:placeIn 0.4s cubic-bezier(0.22,1,0.36,1) both}
@keyframes placeIn{from{opacity:0;background:rgba(201,169,97,0.35)}to{opacity:1;background:rgba(201,169,97,0.12)}}

/* ══ STAGES OVERLAY ══ */
.stages-overlay{
  position:fixed;inset:0;z-index:800;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0;background:#0c0c0c;
  opacity:0;pointer-events:none;transition:opacity 0.32s ease;
  overflow:hidden;
}
.stages-overlay.active{opacity:1;pointer-events:all}

/* noise grain texture */
.stages-overlay::before{
  content:'';position:absolute;inset:0;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;opacity:0.6;
}

/* ── SLIDE AREA ── */
.so-stage-area{
  position:relative;z-index:1;
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:1.5rem 1.25rem 1rem;
  gap:0;
}

/* ── TOP CHROME ── */
.so-topbar{
  width:100%;max-width:500px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1rem;flex-shrink:0;
}
.so-brand{
  font-family:'Barlow Condensed',sans-serif;font-size:0.48rem;font-weight:900;
  letter-spacing:0.38em;text-transform:uppercase;color:rgba(255,255,255,0.1);
}
.so-close-btn{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.65rem;color:rgba(255,255,255,0.3);
  transition:all 0.18s;
}
.so-close-btn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);}

/* ── INFOGRAPHIC CARD ── */
.stage-card{
  position:relative;
  width:min(500px,96vw);
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  flex-shrink:0;
  display:flex;flex-direction:column;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    10px 18px 0 rgba(0,0,0,0.55),
    0 40px 90px rgba(0,0,0,0.7);
}
.stage-card.card-enter{animation:cardSlide 0.45s cubic-bezier(0.34,1.2,0.64,1) both;}
@keyframes cardSlide{
  from{opacity:0;transform:translateX(52px) scale(0.95);}
  to{opacity:1;transform:translateX(0) scale(1);}
}

/* ── CARD HEADER BAND ── */
.sc-header{
  position:relative;flex-shrink:0;
  padding:1.4rem 1.6rem 1.1rem;
  overflow:hidden;
}
/* accent band — left edge only */
.sc-header::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:5px;background:var(--sc-accent,#C9A961);
  transition:background 0.35s;
}
/* section number — huge ghost figure */
.sc-ghost-num{
  position:absolute;right:-0.1rem;top:-0.5rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(5rem,18vw,7rem);font-weight:900;
  line-height:1;color:rgba(0,0,0,0.045);
  letter-spacing:-0.04em;pointer-events:none;
  transition:color 0.3s;
}
.sc-step-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.5rem;font-weight:900;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--sc-accent,#C9A961);
  margin-bottom:0.35rem;display:block;
  transition:color 0.35s;
}
.sc-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(1.6rem,5vw,2.3rem);font-weight:900;
  letter-spacing:0.04em;text-transform:uppercase;
  color:#0d0d0d;line-height:1;
}

/* ── CARD BODY ── */
.sc-body{flex:1;padding:0 1.6rem 0.6rem;display:flex;flex-direction:column;gap:0.75rem;min-height:0;}

/* anchor sentence */
.sc-anchor{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(0.9rem,2.4vw,1.08rem);font-weight:500;
  line-height:1.75;color:#0d0d0d;
  padding:0.75rem 0;
  border-bottom:1.5px solid rgba(0,0,0,0.07);
}

/* placed-move tags */
.sc-moves-zone{display:flex;flex-direction:column;gap:0.45rem;min-height:1.5rem;}
.sc-move-tag{
  display:flex;align-items:flex-start;gap:0.55rem;
  animation:tagIn 0.38s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes tagIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.sc-move-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:0.42rem;
}
.sc-move-text{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(0.82rem,2vw,0.96rem);font-weight:400;
  line-height:1.72;color:rgba(0,0,0,0.62);
}

/* ── PILL ROW (directly on card) ── */
.sc-pill-row{
  display:flex;gap:0.5rem;flex-wrap:wrap;
  padding:0.65rem 0 0.9rem;
  border-top:1px solid rgba(0,0,0,0.06);
  position:relative;
}
/* reuse xpill styles but smaller */
.sc-pill-wrap{position:relative;}
.sc-pill-wrap .xpill{font-size:0.72rem;padding:4px 10px 4px 9px;}
/* cascade menus inherit global .cat-menu / .opt-menu */

/* pill slots: used slot shows greyed check */
.sc-slot-done{
  display:inline-flex;align-items:center;gap:4px;
  font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:700;
  letter-spacing:0.06em;color:rgba(0,0,0,0.2);
  padding:3px 8px;border-radius:20px;
  border:1px solid rgba(0,0,0,0.1);
}

/* empty-state nudge */
.sc-nudge{
  font-family:'Instrument Sans',sans-serif;
  font-size:0.72rem;color:rgba(0,0,0,0.28);font-style:italic;
  padding:0.5rem 0 0.3rem;
}

/* ── CARD FOOTER ── */
.sc-foot{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0.6rem 1.6rem 1.1rem;
  border-top:1px solid rgba(0,0,0,0.06);
}
.sc-foot-counter{
  font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;
  letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,0,0,0.2);
}
.sc-next-btn{
  display:flex;align-items:center;gap:0.38rem;
  padding:0.42rem 1.15rem;border-radius:50px;border:none;
  font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;
  letter-spacing:0.1em;text-transform:uppercase;
  background:#0d0d0d;color:#fff;
  cursor:pointer;
  opacity:0;pointer-events:none;transform:translateX(8px);
  transition:opacity 0.3s,transform 0.3s;
}
.sc-next-btn.visible{opacity:1;pointer-events:auto;transform:translateX(0);}
.sc-next-btn:hover{background:rgba(13,13,13,0.78);}

/* ── BOTTOM CHROME ── */
.so-bottom{
  width:min(500px,96vw);margin-top:0.9rem;
  display:flex;flex-direction:column;gap:0.4rem;flex-shrink:0;
  position:relative;z-index:1;
}
.so-progress-track{width:100%;height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.so-progress-fill{height:100%;border-radius:2px;transition:width 0.45s,background 0.35s;}
.so-bottom-row{display:flex;align-items:center;justify-content:space-between;}
.so-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.15);}
.so-hint{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.13);}

/* ══ CELEBRATION ══ */
.celebration{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.celebration.show{animation:celebPop 2.8s ease forwards}
@keyframes celebPop{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.celeb-pill{background:var(--ink);color:var(--gold);padding:1rem 2.25rem;border-radius:3rem;font-size:1rem;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;box-shadow:0 12px 48px rgba(0,0,0,0.45);animation:celebScale 0.45s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes celebScale{from{transform:scale(0.7)}to{transform:scale(1)}}

/* ══ NAV ══ */
.card-nav{flex-shrink:0;display:flex;justify-content:center;padding:0.75rem 1.125rem calc(env(safe-area-inset-bottom,0px) + 0.875rem);border-top:1px solid var(--rule);background:var(--white)}
.nav-pill{display:flex;gap:0.15rem;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.35rem 0.4rem}
.nb{background:transparent;border:none;padding:0.5rem 1rem;border-radius:1.5rem;font-family:'Inter',sans-serif;font-size:0.7rem;letter-spacing:0.02em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.24s;white-space:nowrap;min-height:36px;font-weight:500}
.nb.on{background:var(--ink);color:var(--gold);font-weight:700}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.75rem;font-size:0.9rem;color:rgba(0,0,0,0.3);text-align:center;line-height:1.6;padding:2rem}

@media(max-width:768px){
  .shell{padding:1vh 2vw}.card{border-radius:1rem}
  .card-brand{padding:0.75rem 1rem 0.5rem}
  .report-canvas{padding:1.5rem 1.25rem 2rem}
  .prose{font-size:0.95rem;line-height:1.9}
  .nb{padding:0.4rem 0.75rem;font-size:0.65rem;min-height:32px}
  .controls-row{padding:0.4rem 1rem 0.45rem;gap:0.5rem}
  .opt-menu{min-width:220px;max-width:260px}
}
</style>
</head>
<body>
<div class="shell">
<div class="card">

  <div class="card-brand">
    <a class="home-link" href="/skills/writing/reports/report-question-selector">← Questions</a>
    <span class="brand-word">INTUITY</span>
    <div style="flex:1"></div>
    <div style="position:relative">
      <div class="menu-btn" onclick="toggleMenu()">
        <div class="menu-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="menu-dropdown" id="menuDropdown">
        <div class="menu-item" onclick="revealAll()">Reveal all sentences</div>
        <div class="menu-item" onclick="resetAll()">Reset report</div>
      </div>
    </div>
  </div>

  <div class="controls-row">
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="progress-label" id="progressLabel">tap ··· to expand</div>
    <div class="view-toggle">
      <button class="vt-btn active" id="vtText" onclick="setView('text')">Text</button>
      <button class="vt-btn" id="vtStages" onclick="setView('stages')">Stages</button>
    </div>
  </div>

  <div class="report-canvas active" id="reportCanvas">
    <div class="state-msg">Loading…</div>
  </div>

  <div class="card-nav">
    <div class="nav-pill">
      <button class="nb" onclick="navTo('question')">Question</button>
      <button class="nb" onclick="navTo('plan')">Plan</button>
      <button class="nb" onclick="navTo('model')">Model</button>
      <button class="nb on">Build</button>
      <button class="nb" onclick="navTo('sample')">Sample</button>
    </div>
  </div>

</div>
</div>

<div class="stages-overlay" id="stagesOverlay">
  <div class="so-stage-area">

    <div class="so-topbar">
      <span class="so-brand">INTUITY — Build Report</span>
      <button class="so-close-btn" onclick="closeStages()">✕</button>
    </div>

    <div class="stage-card" id="stageCard">

      <!-- HEADER BAND -->
      <div class="sc-header" id="scHeader">
        <div class="sc-ghost-num" id="scGhostNum">01</div>
        <span class="sc-step-label" id="scStepLabel">Section 1</span>
        <div class="sc-title" id="scTitle">Introduction</div>
      </div>

      <!-- BODY -->
      <div class="sc-body">
        <!-- anchor sentence -->
        <div class="sc-anchor" id="scAnchor"></div>

        <!-- placed moves -->
        <div class="sc-moves-zone" id="scMovesZone"></div>

        <!-- pill row — live interaction -->
        <div class="sc-pill-row" id="scPillRow"></div>
      </div>

      <!-- FOOTER -->
      <div class="sc-foot">
        <span class="sc-foot-counter" id="scFootCounter">1 / 1</span>
        <button class="sc-next-btn" id="scNextBtn" onclick="advanceSectionCard()">Next →</button>
      </div>

    </div><!-- /stage-card -->

    <div class="so-bottom">
      <div class="so-progress-track"><div class="so-progress-fill" id="soProgressFill" style="width:0%"></div></div>
      <div class="so-bottom-row">
        <span class="so-counter" id="soCounter">1 / 1</span>
        <span class="so-hint" id="soHint"></span>
      </div>
    </div>

  </div><!-- /so-stage-area -->
</div>

<div class="celebration" id="celebration">
  <div class="celeb-pill">Report built ✦</div>
</div>

<script>
/* Section-specific move definitions — each section has its own rhetorical vocabulary */
const SECTION_MOVES = [
  /* 0 — Introduction: methodology only */
  [
    {key:'source_a', label:'Questionnaire', color:'#1D9E75'},
    {key:'source_b', label:'Survey / Interview', color:'#3d9e95'},
    {key:'source_c', label:'Findings drawn from', color:'#378ADD'},
  ],
  /* 1 — General View: positive framing */
  [
    {key:'positive_a', label:'General agreement', color:'#1D9E75'},
    {key:'positive_b', label:'Highlight', color:'#c08b2f'},
    {key:'positive_c', label:'Appreciated feature', color:'#7b5ea7'},
  ],
  /* 2 — Problems: evidence + cause + effect */
  [
    {key:'detail_a',   label:'Key problem', color:'#c94f6d'},
    {key:'cause_a',    label:'Reason for this', color:'#e8723a'},
    {key:'effect_a',   label:'Consequence', color:'#BA7517'},
  ],
  /* 3 — Recommendations: suggest + justify + condition */
  [
    {key:'suggest_a',  label:'First recommendation', color:'#1D9E75'},
    {key:'suggest_b',  label:'Further recommendation', color:'#3d9e95'},
    {key:'condition_a',label:'Essential condition', color:'#7b5ea7'},
  ],
  /* 4 — Conclusion: summary + urge + outlook */
  [
    {key:'summary_a',  label:'Summary', color:'#378ADD'},
    {key:'urge_a',     label:'Call to action', color:'#c94f6d'},
    {key:'outlook_a',  label:'Looking ahead', color:'#1D9E75'},
  ],
];
/* Helper: get MOVES array for a given section index */
function movesFor(si){ return SECTION_MOVES[si] || SECTION_MOVES[0]; }
/* Legacy alias so any remaining references to MOVES[n] still work */
const MOVES = SECTION_MOVES[0];


let question=null,buildData=null,currentView='text';
const usedMoves={};   /* si → Set of moveKeys already placed */
const pillPlaced={};  /* si → {0:bool,1:bool,2:bool} */
let stageSectionIdx=0;

/* ══ INIT ══ */
async function init(){
  try{question=JSON.parse(sessionStorage.getItem('currentReportQuestion'));}catch(e){}
  if(!question){
    document.getElementById('reportCanvas').innerHTML=
      '<div class="state-msg">No question selected.<br>Return to Questions to choose one.</div>';
    return;
  }
  try{
    const r=await fetch('data/samples-build-reports-options.json');
    if(!r.ok)throw new Error('options file not found');
    const all=await r.json();
    buildData=all[question.id];
    if(!buildData||!buildData.length){
      document.getElementById('reportCanvas').innerHTML=
        `<div class="state-msg">No build data yet for this question.<br>
        <small style="opacity:0.35;margin-top:0.5rem;display:block">id: ${question.id}</small></div>`;
      return;
    }
  }catch(err){
    document.getElementById('reportCanvas').innerHTML=
      `<div class="state-msg">Could not load build data.<br>
      <small style="opacity:0.35;margin-top:0.5rem;display:block">${err.message}</small></div>`;
    return;
  }
  buildData.forEach((_,si)=>{usedMoves[si]=new Set();pillPlaced[si]={0:false,1:false,2:false};});
  renderCanvas();
  updateProgress();
}

/* ══ RENDER ══ */
function renderCanvas(){
  document.getElementById('reportCanvas').innerHTML=
    buildData.map((sec,si)=>`
      <div class="section-block" id="sec-${si}">
        <div class="section-label">${esc(sec.label)}<span class="check"> ✦</span></div>
        <div class="prose" id="prose-${si}">
          <span class="anchor-text">${esc(sec.anchor)}</span>${[0,1,2].map(s=>pill(si,s)).join('')}
        </div>
      </div>`).join('');
}

function pill(si,slot){
  const id=`${si}-${slot}`;
  const moves=movesFor(si);
  return `<span class="pill-wrap" id="pw-${id}">
    <span class="xpill" id="xp-${id}" onclick="togglePill(event,${si},${slot})">
      <span class="xdots"><span></span><span></span><span></span></span>
      <span class="xarrow">›</span>
    </span>
    <div class="cat-menu" id="cm-${id}">
      <div class="cat-head">Add a sentence</div>
      ${moves.map(m=>`
        <div class="cat-row r-${m.key}" id="cr-${id}-${m.key}" onclick="openOpts(event,${si},${slot},'${m.key}')">
          <div class="cat-left"><div class="cat-dot" style="background:${m.color}"></div><span>${m.label}</span></div>
          <span class="cat-chev">›</span>
        </div>`).join('')}
    </div>
    <div class="opt-menu" id="om-${id}">
      <div class="opt-head" id="oh-${id}"></div>
      <div class="opt-row" id="or-${id}-0" onclick="place(${si},${slot},0)"></div>
      <div class="opt-row" id="or-${id}-1" onclick="place(${si},${slot},1)"></div>
      <div class="opt-row" id="or-${id}-2" onclick="place(${si},${slot},2)"></div>
    </div>
  </span>`;
}

/* ══ INTERACTIONS ══ */
function togglePill(e,si,slot){
  e.stopPropagation();
  const id=`${si}-${slot}`;
  const cm=document.getElementById(`cm-${id}`);
  const xp=document.getElementById(`xp-${id}`);
  const wasOpen=cm.classList.contains('open');
  closeAll();
  if(!wasOpen){
    /* mark already-used moves */
    movesFor(si).forEach(m=>{
      const cr=document.getElementById(`cr-${id}-${m.key}`);
      if(cr)cr.classList.toggle('used',usedMoves[si].has(m.key));
    });
    xp.classList.add('open');
    cm.classList.add('open');
  }
}

function openOpts(e,si,slot,moveKey){
  e.stopPropagation();
  if(usedMoves[si].has(moveKey))return;
  const id=`${si}-${slot}`;
  const opts=buildData[si].options[moveKey]||[];
  const move=movesFor(si).find(m=>m.key===moveKey);
  document.querySelectorAll(`#cm-${id} .cat-row`).forEach(r=>r.classList.remove('active'));
  document.getElementById(`cr-${id}-${moveKey}`).classList.add('active');
  const oh=document.getElementById(`oh-${id}`);
  oh.textContent=`Choose one ${move.label.toLowerCase()}`;
  oh.style.color=move.color;
  [0,1,2].forEach(i=>{
    const el=document.getElementById(`or-${id}-${i}`);
    el.textContent=opts[i]||'';
    el.dataset.move=moveKey;
  });
  document.getElementById(`om-${id}`).classList.add('open');
}

function place(si,slot,optIdx){
  const id=`${si}-${slot}`;
  const el=document.getElementById(`or-${id}-${optIdx}`);
  const text=el.textContent.trim();
  const moveKey=el.dataset.move;
  if(!text)return;
  usedMoves[si].add(moveKey);
  pillPlaced[si][slot]=true;
  const pw=document.getElementById(`pw-${id}`);
  const span=document.createElement('span');
  span.className='placed-sentence';
  span.textContent=' '+text;
  pw.parentNode.insertBefore(span,pw);
  pw.remove();
  if(Object.values(pillPlaced[si]).some(Boolean))
    document.getElementById(`sec-${si}`).classList.add('complete');
  closeAll();
  updateProgress();
  if(buildData.every((_,i)=>Object.values(pillPlaced[i]).some(Boolean)))
    setTimeout(celebrate,400);
}

function closeAll(){
  document.querySelectorAll('.cat-menu.open').forEach(m=>m.classList.remove('open'));
  document.querySelectorAll('.opt-menu.open').forEach(m=>m.classList.remove('open'));
  document.querySelectorAll('.xpill.open').forEach(p=>p.classList.remove('open'));
}

function updateProgress(){
  const total=buildData.length;
  const done=buildData.filter((_,i)=>Object.values(pillPlaced[i]).some(Boolean)).length;
  const pct=total>0?(done/total)*100:0;
  document.getElementById('barFill').style.width=pct+'%';
  const lbl=document.getElementById('progressLabel');
  if(done===0){lbl.textContent='tap ··· to expand';lbl.classList.remove('done');}
  else if(done===total){lbl.textContent='complete ✦';lbl.classList.add('done');}
  else{lbl.textContent=`${done} / ${total} sections`;lbl.classList.remove('done');}
}

/* ══ VIEW SWITCH ══ */
function setView(v){
  currentView=v;
  document.getElementById('vtText').classList.toggle('active',v==='text');
  document.getElementById('vtStages').classList.toggle('active',v==='stages');
  document.getElementById('reportCanvas').classList.toggle('active',v==='text');
  if(v==='stages')openStages();
}

/* ══ STAGES ══ */
/* accent colours per section index */
const STAGE_ACCENTS=[
  '#3d9e95','#e8723a','#7b5ea7','#c94f6d','#c08b2f',
  '#C9A961','#3d9e95','#e8723a','#7b5ea7','#c94f6d',
];

function openStages(){
  if(!buildData)return;
  let start=buildData.findIndex((_,i)=>!Object.values(pillPlaced[i]).some(Boolean));
  if(start<0)start=0;
  stageSectionIdx=start;
  document.getElementById('stagesOverlay').classList.add('active');
  loadCard(stageSectionIdx,false);
}

function closeStages(){
  document.getElementById('stagesOverlay').classList.remove('active');
  currentView='text';
  document.getElementById('vtText').classList.add('active');
  document.getElementById('vtStages').classList.remove('active');
  document.getElementById('reportCanvas').classList.add('active');
}

function loadCard(si,animate){
  if(!buildData||si>=buildData.length)return;
  const sec=buildData[si];
  const accent=STAGE_ACCENTS[si%STAGE_ACCENTS.length];
  const total=buildData.length;
  const isLast=si===total-1;

  /* ── header ── */
  const header=document.getElementById('scHeader');
  header.style.setProperty('--sc-accent',accent);
  header.style.background='#fff';

  document.getElementById('scGhostNum').textContent=String(si+1).padStart(2,'0');
  document.getElementById('scStepLabel').textContent=`Section ${si+1}`;
  document.getElementById('scStepLabel').style.color=accent;
  document.getElementById('scTitle').textContent=sec.label.toUpperCase();

  /* ── anchor ── */
  document.getElementById('scAnchor').textContent=sec.anchor;

  /* ── placed moves ── */
  const movesZone=document.getElementById('scMovesZone');
  movesZone.innerHTML='';
  /* scan Text mode prose for placed sentences in this section */
  const proseEl=document.getElementById(`prose-${si}`);
  if(proseEl){
    proseEl.querySelectorAll('.placed-sentence').forEach((ps,ti)=>{
      const text=ps.textContent.trim();
      if(!text)return;
      /* find which move key was used — stored in usedMoves set; we match by checking which moves are in the set */
      /* For visual purposes, cycle accent colours through MOVES palette */
      const moveKeys=[...usedMoves[si]];
      const mk=moveKeys[ti]||moveKeys[0];
      const move=movesFor(si).find(m=>m.key===mk);
      const color=move?move.color:accent;
      const tag=document.createElement('div');
      tag.className='sc-move-tag';
      tag.style.animationDelay=(ti*0.07)+'s';
      tag.innerHTML=`<div class="sc-move-dot" style="background:${color}"></div>
        <div class="sc-move-text">${esc(text)}</div>`;
      movesZone.appendChild(tag);
    });
  }

  /* ── pill row ── */
  renderCardPills(si,accent);

  /* ── footer ── */
  document.getElementById('scFootCounter').textContent=`${si+1} / ${total}`;
  const nextBtn=document.getElementById('scNextBtn');
  nextBtn.textContent=isLast?'Finish ✦':'Next →';
  /* next button always visible — student can advance freely */
  nextBtn.classList.add('visible');

  /* ── bottom chrome ── */
  const secPct=Math.round(((si+1)/total)*100);
  document.getElementById('soProgressFill').style.background=accent;
  document.getElementById('soProgressFill').style.width=secPct+'%';
  document.getElementById('soCounter').textContent=`${si+1} / ${total}`;

  const anyPlaced=Object.values(pillPlaced[si]).some(Boolean);
  const remaining=[0,1,2].filter(s=>!pillPlaced[si][s]).length;
  document.getElementById('soHint').textContent=
    anyPlaced&&remaining>0?`${remaining} pill${remaining>1?'s':''} remaining`
    :anyPlaced?'Section complete ✦'
    :'Tap ··· to expand';

  /* animate card */
  if(animate){
    const cardEl=document.getElementById('stageCard');
    cardEl.classList.remove('card-enter');
    void cardEl.offsetWidth;
    cardEl.classList.add('card-enter');
  }
}

function renderCardPills(si,accent){
  const pillRow=document.getElementById('scPillRow');
  pillRow.innerHTML='';

  let anySlotShown=false;
  [0,1,2].forEach(slot=>{
    if(pillPlaced[si][slot]){
      /* slot already placed — show a small done chip */
      const chip=document.createElement('div');
      chip.className='sc-slot-done';
      chip.textContent='✦ added';
      pillRow.appendChild(chip);
      anySlotShown=true;
      return;
    }
    /* render live pill */
    const id=`sc-${si}-${slot}`;
    anySlotShown=true;
    const wrap=document.createElement('div');
    wrap.className='sc-pill-wrap pill-wrap';
    wrap.id=`sc-pw-${id}`;
    wrap.innerHTML=`
      <span class="xpill" id="sc-xp-${id}" onclick="scTogglePill(event,${si},${slot})">
        <span class="xdots"><span></span><span></span><span></span></span>
        <span class="xarrow">›</span>
      </span>
      <div class="cat-menu" id="sc-cm-${id}">
        <div class="cat-head">Expand with</div>
        ${movesFor(si).map(m=>`
          <div class="cat-row r-${m.key}" id="sc-cr-${id}-${m.key}" onclick="scOpenOpts(event,${si},${slot},'${m.key}')">
            <div class="cat-left"><div class="cat-dot" style="background:${m.color}"></div><span>${m.label}</span></div>
            <span class="cat-chev">›</span>
          </div>`).join('')}
      </div>
      <div class="opt-menu" id="sc-om-${id}">
        <div class="opt-head" id="sc-oh-${id}"></div>
        <div class="opt-row" id="sc-or-${id}-0" onclick="scPlace(${si},${slot},0)"></div>
        <div class="opt-row" id="sc-or-${id}-1" onclick="scPlace(${si},${slot},1)"></div>
        <div class="opt-row" id="sc-or-${id}-2" onclick="scPlace(${si},${slot},2)"></div>
      </div>`;
    pillRow.appendChild(wrap);
  });

  if(!anySlotShown){
    const nudge=document.createElement('div');
    nudge.className='sc-nudge';
    nudge.textContent='All sentences added to this section.';
    pillRow.appendChild(nudge);
  }
}

/* ── Stage-card pill interactions (mirror Text mode but update card directly) ── */
function scTogglePill(e,si,slot){
  e.stopPropagation();
  const id=`sc-${si}-${slot}`;
  const cm=document.getElementById(`sc-cm-${id}`);
  const xp=document.getElementById(`sc-xp-${id}`);
  const wasOpen=cm.classList.contains('open');
  closeAll();
  if(!wasOpen){
    movesFor(si).forEach(m=>{
      const cr=document.getElementById(`sc-cr-${id}-${m.key}`);
      if(cr)cr.classList.toggle('used',usedMoves[si].has(m.key));
    });
    xp.classList.add('open');
    cm.classList.add('open');
  }
}

function scOpenOpts(e,si,slot,moveKey){
  e.stopPropagation();
  if(usedMoves[si].has(moveKey))return;
  const id=`sc-${si}-${slot}`;
  const opts=buildData[si].options[moveKey]||[];
  const move=movesFor(si).find(m=>m.key===moveKey);
  document.querySelectorAll(`#sc-cm-${id} .cat-row`).forEach(r=>r.classList.remove('active'));
  document.getElementById(`sc-cr-${id}-${moveKey}`).classList.add('active');
  const oh=document.getElementById(`sc-oh-${id}`);
  oh.textContent=`Choose one ${move.label.toLowerCase()}`;
  oh.style.color=move.color;
  [0,1,2].forEach(i=>{
    const el=document.getElementById(`sc-or-${id}-${i}`);
    el.textContent=opts[i]||'';
    el.dataset.move=moveKey;
  });
  document.getElementById(`sc-om-${id}`).classList.add('open');
}

function scPlace(si,slot,optIdx){
  const id=`sc-${si}-${slot}`;
  const el=document.getElementById(`sc-or-${id}-${optIdx}`);
  const text=el.textContent.trim();
  const moveKey=el.dataset.move;
  if(!text)return;

  /* update shared state */
  usedMoves[si].add(moveKey);
  pillPlaced[si][slot]=true;

  /* ALSO update Text mode prose so it stays in sync */
  const pw=document.getElementById(`pw-${si}-${slot}`);
  if(pw){
    const span=document.createElement('span');
    span.className='placed-sentence';
    span.textContent=' '+text;
    pw.parentNode.insertBefore(span,pw);
    pw.remove();
  }
  if(Object.values(pillPlaced[si]).some(Boolean))
    document.getElementById(`sec-${si}`)?.classList.add('complete');

  closeAll();
  updateProgress();

  /* reload card to show new move tag + updated pills */
  const accent=STAGE_ACCENTS[si%STAGE_ACCENTS.length];
  loadCard(si,false);

  /* celebration if all done */
  if(buildData.every((_,i)=>Object.values(pillPlaced[i]).some(Boolean)))
    setTimeout(celebrate,400);
}

function advanceSectionCard(){
  if(stageSectionIdx>=buildData.length-1){closeStages();return;}
  stageSectionIdx++;
  loadCard(stageSectionIdx,true);
}

/* ══ REVEAL ALL / RESET ══ */
function revealAll(){
  closeMenu();
  if(!buildData)return;
  buildData.forEach((sec,si)=>{
    [0,1,2].forEach(slot=>{
      if(pillPlaced[si][slot])return;
      const pw=document.getElementById(`pw-${si}-${slot}`);
      if(!pw)return;
      const move=movesFor(si).find(m=>!usedMoves[si].has(m.key));
      if(!move)return;
      const opts=sec.options[move.key]||[];
      const text=opts[slot]||opts[0];
      if(!text)return;
      usedMoves[si].add(move.key);
      pillPlaced[si][slot]=true;
      const span=document.createElement('span');
      span.className='placed-sentence';
      span.textContent=' '+text;
      pw.parentNode.insertBefore(span,pw);
      pw.remove();
    });
    document.getElementById(`sec-${si}`)?.classList.add('complete');
  });
  updateProgress();
  setTimeout(celebrate,350);
}

function resetAll(){
  closeMenu();
  if(!buildData)return;
  buildData.forEach((_,si)=>{usedMoves[si]=new Set();pillPlaced[si]={0:false,1:false,2:false};});
  closeStages();
  renderCanvas();
  updateProgress();
}

/* ══ UTILS ══ */
function celebrate(){
  const el=document.getElementById('celebration');
  el.classList.remove('show');void el.offsetWidth;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2900);
}
function toggleMenu(){document.getElementById('menuDropdown').classList.toggle('open');}
function closeMenu(){document.getElementById('menuDropdown').classList.remove('open');}
function navTo(dest){
  if(question)sessionStorage.setItem('currentReportQuestion',JSON.stringify(question));
  const map={question:'report-question-selector.html',plan:'report-plan.html',model:'report-model.html',sample:'report-master.html'};
  if(map[dest])window.location.href=map[dest];
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.addEventListener('click',e=>{
  if(!e.target.closest('#menuDropdown')&&!e.target.closest('.menu-btn'))closeMenu();
  if(!e.target.closest('.pill-wrap'))closeAll();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeAll();
    if(document.getElementById('stagesOverlay').classList.contains('active'))closeStages();
  }
  if(e.key===' '&&document.getElementById('stagesOverlay').classList.contains('active')){
    e.preventDefault();advanceSectionCard();
  }
});

init();
</script>
</body>
</html>
