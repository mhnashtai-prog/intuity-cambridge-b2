<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Build — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Instrument+Sans:wght@400;500;600&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #0c0c0c;
  --gold:    #C9A961;
  --gold-d:  #9B7D3A;
  --gold-l:  #E8D4A0;
  --white:   #FAFAF8;
  --ink:     #0d0d0d;
  --soft:    rgba(13,13,13,0.55);
  --settled: rgba(13,13,13,0.82);
  --rule:    rgba(0,0,0,0.07);
  --c-teal:  #3d9e95;
  --c-coral: #e8723a;
  --c-purple:#7b5ea7;
  --c-rose:  #c94f6d;
  --c-gold:  #c08b2f;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; position:fixed; background:var(--bg); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
.shell { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:2vh 3vw; }
.card { width:100%; height:100%; max-width:900px; max-height:95vh; background:var(--white); border-radius:1.5rem; box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4); display:flex; flex-direction:column; overflow:hidden; position:relative; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d)); z-index:5; }
.card-brand { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:1rem 1.5rem 0.75rem; margin-top:3px; border-bottom:1px solid var(--rule); position:relative; z-index:10; }
.home-link { text-decoration:none; font-size:1rem; font-weight:600; color:var(--gold); padding:0.4rem 0.6rem; border-radius:0.5rem; transition:all 0.2s; }
.home-link:hover { background:rgba(201,169,97,0.1); color:var(--gold-d); }
.brand-word { position:absolute; left:50%; transform:translateX(-50%); font-size:0.65rem; font-weight:800; letter-spacing:0.22em; text-transform:uppercase; color:rgba(0,0,0,0.18); pointer-events:none; }
.menu-btn { background:#000; border:none; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; }
.menu-btn:hover { background:rgba(0,0,0,0.8); }
.menu-dots { display:flex; gap:4px; }
.menu-dots span { width:4px; height:4px; border-radius:50%; background:#fff; }
.menu-dropdown { position:absolute; top:calc(100% + 0.5rem); right:1rem; background:#fff; border-radius:0.75rem; box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.12); min-width:190px; padding:0.5rem; z-index:200; display:none; }
.menu-dropdown.open { display:block; animation:menuIn 0.2s ease-out; }
@keyframes menuIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.menu-item { padding:0.65rem 0.85rem; border-radius:0.5rem; font-size:0.8rem; font-weight:500; color:rgba(0,0,0,0.7); cursor:pointer; transition:all 0.15s; }
.menu-item:hover { background:rgba(0,0,0,0.04); }
.progress-strip { flex-shrink:0; padding:0.5rem 1.5rem 0.6rem; border-bottom:1px solid var(--rule); display:flex; align-items:center; gap:0.875rem; }
.bar-track { flex:1; height:3px; background:rgba(0,0,0,0.07); border-radius:2px; overflow:hidden; }
.bar-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--gold-d),var(--gold)); border-radius:2px; transition:width 0.55s cubic-bezier(0.4,0,0.2,1); }
.progress-label { font-size:0.6rem; font-weight:800; text-transform:uppercase; letter-spacing:0.1em; color:rgba(0,0,0,0.28); white-space:nowrap; min-width:60px; text-align:right; transition:color 0.3s; }
.progress-label.done { color:var(--gold-d); }
.report-canvas { flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:2rem 3rem 2.5rem; }
.report-canvas::-webkit-scrollbar { width:4px; }
.report-canvas::-webkit-scrollbar-track { background:transparent; }
.report-canvas::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.1); border-radius:2px; }
.section-block { margin-bottom:2rem; }
.section-block:last-child { margin-bottom:0; }
.section-block + .section-block { padding-top:2rem; border-top:1.5px solid rgba(201,169,97,0.12); }
.section-label { font-size:0.55rem; font-weight:800; text-transform:uppercase; letter-spacing:0.14em; color:rgba(0,0,0,0.2); margin-bottom:0.75rem; display:flex; align-items:center; gap:0.5rem; transition:color 0.4s; }
.section-label .check { opacity:0; transform:scale(0); transition:opacity 0.4s,transform 0.4s cubic-bezier(0.34,1.56,0.64,1); color:var(--gold); }
.section-block.complete .section-label { color:var(--gold-d); }
.section-block.complete .section-label .check { opacity:1; transform:scale(1); }
.prose { font-family:'DM Sans',sans-serif; font-size:1.05rem; line-height:2; color:var(--settled); font-weight:400; }
.s-anchor { color:var(--ink); font-weight:500; }
.pill-container { display:inline; white-space:normal; }
.pill { display:inline-flex; align-items:center; justify-content:center; background:var(--gold); color:#fff; font-family:'Inter',sans-serif; font-size:0.65rem; font-weight:800; min-width:2.5rem; height:1.5rem; border-radius:2rem; padding:0 0.6rem; margin:0 0.15rem; vertical-align:middle; cursor:pointer; user-select:none; position:relative; animation:breathe 3s ease-in-out infinite; transition:transform 0.15s,background 0.15s,box-shadow 0.15s; will-change:transform; }
.pill[data-type="intro"]          { background:#546e7a }
.pill[data-type="methodology"]    { background:#64748b }
.pill[data-type="neutral"]        { background:#06b6d4 }
.pill[data-type="positive"]       { background:#608020 }
.pill[data-type="problem"]        { background:#ef4444 }
.pill[data-type="cause"]          { background:#ed6e39 }
.pill[data-type="consequence"]    { background:#f97316 }
.pill[data-type="recommendation"] { background:#8b5cf6 }
.pill[data-type="outcome"]        { background:#14b8a6 }
.pill[data-type="conclusion"]     { background:#ec4899 }
@keyframes breathe { 0%,100%{box-shadow:0 0 0 0 rgba(201,169,97,0.5)} 60%{box-shadow:0 0 0 6px rgba(201,169,97,0)} }
.pill:nth-child(3n+1){animation-delay:0s} .pill:nth-child(3n+2){animation-delay:0.8s} .pill:nth-child(3n+3){animation-delay:1.6s}
.pill:hover { transform:scale(1.15) translateY(-2px); filter:brightness(1.1); box-shadow:0 4px 14px rgba(0,0,0,0.35); animation:none; }
.pill:active { transform:scale(0.92); }
.pill-container.revealed .pill { display:none; }
.s-new { display:none; color:var(--gold-d); font-weight:600; white-space:normal; word-wrap:break-word; }
.pill-container.revealed .s-new { display:inline; animation:fadeIn 0.5s ease both; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.s-new.ink { color:var(--settled); font-weight:400; transition:color 0.9s ease,font-weight 0.9s ease; }

/* ══════════════════════════════
   BANNER MODE OVERLAY
   ══════════════════════════════ */
.banner-overlay {
  position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,0.72);
  backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  padding:2rem;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s ease;
}
.banner-overlay.active {
  opacity:1;pointer-events:all;
}

/* The banner card itself */
.build-banner {
  width:min(380px,90vw);
  background:var(--white);
  border-radius:1.4rem;
  overflow:hidden;
  box-shadow:6px 8px 0 rgba(0,0,0,0.12),0 32px 80px rgba(0,0,0,0.4);
  transform:translateY(24px) scale(0.95);
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  cursor:pointer;
  user-select:none;
}
.banner-overlay.active .build-banner {
  transform:translateY(0) scale(1);
}
.build-banner-strip {
  height:4px;
  width:100%;
}
.build-banner-body {
  padding:1.4rem 1.6rem 1.2rem;
}
.build-banner-label {
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.58rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(0,0,0,0.28);margin-bottom:0.5rem;
}
.build-banner-phrase {
  font-family:'Instrument Sans',sans-serif;
  font-size:1.15rem;font-weight:500;line-height:1.55;
  color:var(--ink);margin-bottom:1rem;
}
.build-banner-hint {
  display:flex;align-items:center;gap:0.5rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(0,0,0,0.3);
}
.build-banner-hint-dot {
  width:20px;height:20px;border-radius:50%;
  background:rgba(0,0,0,0.07);
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;color:rgba(0,0,0,0.35);
  flex-shrink:0;
}
.build-banner-footer {
  padding:0.85rem 1.6rem 1.1rem;
  border-top:1px solid rgba(0,0,0,0.06);
  display:flex;align-items:center;justify-content:space-between;
}
.build-banner-tap {
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.62rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(0,0,0,0.28);
}
.build-banner-counter {
  font-family:'Instrument Sans',sans-serif;
  font-size:0.62rem;font-weight:500;
  color:rgba(0,0,0,0.22);
}

/* Pulse hint on banner */
@keyframes bannerPulse {
  0%,100%{box-shadow:6px 8px 0 rgba(0,0,0,0.12),0 32px 80px rgba(0,0,0,0.4),0 0 0 0 rgba(255,255,255,0.15)}
  50%{box-shadow:6px 8px 0 rgba(0,0,0,0.12),0 32px 80px rgba(0,0,0,0.4),0 0 0 12px rgba(255,255,255,0)}
}
.banner-overlay.active .build-banner {
  animation:bannerPulse 2.4s ease-in-out infinite;
  animation-delay:0.6s;
}

/* ── BANNER MODE TOGGLE BUTTON ── */
.banner-mode-btn {
  position:fixed;bottom:5.5rem;right:1.2rem;
  z-index:700;
  background:var(--ink);color:#fff;
  border:none;border-radius:2rem;
  padding:0.52rem 1rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.65rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,0.35);
  display:flex;align-items:center;gap:0.4rem;
  transition:all 0.2s;
}
.banner-mode-btn:hover{background:rgba(17,17,17,0.82);transform:scale(1.04)}
.banner-mode-btn.active{background:var(--gold-d)}

.celebration { position:fixed; inset:0; z-index:900; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:0; }
.celebration.show { animation:celebPop 2.8s ease forwards; }
@keyframes celebPop { 0%{opacity:0} 15%{opacity:1} 75%{opacity:1} 100%{opacity:0} }
.celeb-pill { background:var(--ink); color:var(--gold); padding:1rem 2.25rem; border-radius:3rem; font-size:1rem; font-weight:800; letter-spacing:0.07em; text-transform:uppercase; box-shadow:0 12px 48px rgba(0,0,0,0.45); animation:celebScale 0.45s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes celebScale { from{transform:scale(0.7)} to{transform:scale(1)} }
.card-nav { flex-shrink:0; display:flex; justify-content:center; padding:0.75rem 1.125rem calc(env(safe-area-inset-bottom,0px) + 0.875rem); border-top:1px solid var(--rule); background:var(--white); }
.nav-pill { display:flex; gap:0.15rem; background:rgba(10,10,10,0.06); border-radius:2rem; padding:0.35rem 0.4rem; }
.nb { background:transparent; border:none; padding:0.5rem 1rem; border-radius:1.5rem; font-family:'Inter',sans-serif; font-size:0.7rem; letter-spacing:0.02em; color:rgba(0,0,0,0.28); cursor:pointer; transition:all 0.24s; white-space:nowrap; min-height:36px; font-weight:500; }
.nb.on { background:var(--ink); color:var(--gold); font-weight:700; }
.nb:hover:not(.on) { color:rgba(0,0,0,0.5); }
.state-msg { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:0.75rem; font-size:0.9rem; color:rgba(0,0,0,0.3); text-align:center; line-height:1.6; padding:2rem; }
@media(max-width:768px){ .shell{padding:1vh 2vw} .card{border-radius:1rem} .card-brand{padding:0.75rem 1rem 0.5rem} .report-canvas{padding:1.5rem 1.25rem 2rem} .prose{font-size:0.95rem;line-height:1.9} .pill{font-size:0.6rem;min-width:2.2rem;height:1.35rem;padding:0 0.5rem} .nb{padding:0.4rem 0.75rem;font-size:0.65rem;min-height:32px} .progress-strip{padding:0.4rem 1rem 0.5rem} }
@media(max-width:400px){ .report-canvas{padding:1.25rem 1rem 1.5rem} .prose{font-size:0.88rem} .nb{padding:0.35rem 0.6rem;font-size:0.6rem} }
</style>
</head>
<body>

<div class="shell">
<div class="card">

  <div class="card-brand">
    <a class='home-link' href='/skills/writing/reports/report-question-selector'>← Questions</a>
    <span class="brand-word">INTUITY</span>
    <div style="flex:1"></div>
    <div class="menu-btn" onclick="toggleMenu()">
      <div class="menu-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="menu-dropdown" id="menuDropdown">
      <div class="menu-item" onclick="revealAll()">Reveal all sentences</div>
      <div class="menu-item" onclick="resetAll()">Reset report</div>
    </div>
  </div>

  <div class="progress-strip">
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="progress-label" id="progressLabel">tap to reveal</div>
  </div>

  <div class="report-canvas" id="reportCanvas">
    <div class="state-msg">Loading…</div>
  </div>

  <div class="card-nav">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">question</button>
      <button class="nb"    onclick="navTo('plan')">plan</button>
      <button class="nb"    onclick="navTo('model')">model</button>
      <button class="nb on" onclick="navTo('build')">build</button>
      <button class="nb"    onclick="navTo('sample')">sample</button>
    </div>
  </div>

</div>
</div>

<!-- Banner mode overlay -->
<div class="banner-overlay" id="bannerOverlay">
  <div class="build-banner" id="buildBanner" onclick="bannerTap()">
    <div class="build-banner-strip" id="bannerStrip"></div>
    <div class="build-banner-body">
      <div class="build-banner-label" id="bannerLabel"></div>
      <div class="build-banner-phrase" id="bannerPhrase"></div>
      <div class="build-banner-hint">
        <div class="build-banner-hint-dot">+</div>
        <span id="bannerHintText"></span>
      </div>
    </div>
    <div class="build-banner-footer">
      <span class="build-banner-tap">Tap to reveal</span>
      <span class="build-banner-counter" id="bannerCounter"></span>
    </div>
  </div>
</div>

<!-- Banner mode trigger button -->
<button class="banner-mode-btn" id="bannerModeBtn" onclick="startBannerMode()">✦ Banner Mode</button>

<div class="celebration" id="celebration">
  <div class="celeb-pill">Report complete ✦</div>
</div>

<script>
// ==================== STATE ====================
let question = null;
let reportData = null;
let totalHidden = 0;
let revealCount = 0;

// Banner mode state
let bannerMode = false;
let bannerQueue = []; // [{secIdx, label, anchor, color, pillCount}]
let bannerPos = 0;

const SECTION_COLORS = ['#3d9e95','#e8723a','#7b5ea7','#c94f6d','#c08b2f'];

// ==================== SENTENCE TYPE DETECTION ====================
function detectSentenceType(text, sectionLabel, sentenceIndex) {
  const lower = text.toLowerCase();
  if (sectionLabel && sectionLabel.toLowerCase().includes('introduction')) {
    if (lower.match(/^(the relevant information|the information was|this report is based on|the findings|data was|research was)/i))
      return { type: 'methodology', label: 'Method' };
    if (lower.match(/^(the aim|the purpose|this report seeks|this report provides|this report aims|this report focuses)/i))
      return { type: 'intro', label: 'Aim' };
  }
  if (sectionLabel && sectionLabel.toLowerCase().includes('conclusion')) {
    if (lower.match(/^(taking everything|in conclusion|to sum up|to conclude|overall|in summary)/i))
      return { type: 'conclusion', label: 'Summary' };
  }
  if (sectionLabel && sectionLabel.toLowerCase().includes('recommend')) {
    if (lower.match(/^(if (these|this) change|if (these|this) improvement|this would|these would)/i))
      return { type: 'outcome', label: 'Outcome' };
    if (lower.match(/(recommend|advisable|good idea|essential that|it may be worth|in order to|to improve|to address)/i))
      return { type: 'recommendation', label: 'Action' };
  }
  if (sectionLabel && sectionLabel.toLowerCase().includes('problem')) {
    if (lower.includes('this is mainly due') || lower.includes('this is largely because') || lower.includes('one possible reason'))
      return { type: 'cause', label: 'Cause' };
    if (lower.includes('as a result') || lower.includes('consequently'))
      return { type: 'consequence', label: 'Effect' };
    if (lower.includes('however') || lower.includes('one major concern') || lower.includes('a common complaint'))
      return { type: 'problem', label: 'Problem' };
  }
  if (lower.includes('as a result') || lower.includes('consequently') || lower.includes('therefore'))
    return { type: 'consequence', label: 'Effect' };
  if (lower.match(/(recommend|advisable|in order to)/i))
    return { type: 'recommendation', label: 'Action' };
  if (lower.includes('by far the best') || lower.includes('one positive aspect'))
    return { type: 'positive', label: 'Praise' };
  return { type: 'default', label: null };
}

// ==================== INIT ====================
async function init() {
  try { question = JSON.parse(sessionStorage.getItem('currentReportQuestion')); }
  catch(e) { question = null; }

  if (!question) {
    document.getElementById('reportCanvas').innerHTML =
      `<div class="state-msg">No question selected.<br>Return to Questions to choose one.</div>`;
    return;
  }

  try {
    const res = await fetch('data/samples-build-reports.json');
    if (!res.ok) throw new Error('samples-build-reports.json not found');
    const data = await res.json();
    const sections = data[question.id];
    if (!sections || !Array.isArray(sections) || sections.length === 0) {
      document.getElementById('reportCanvas').innerHTML =
        `<div class="state-msg">No build data for this question yet.<br>
         <small style="opacity:0.35;margin-top:0.5rem;display:block;">id: ${question.id}</small></div>`;
      return;
    }
    reportData = sections;
    renderReport();
  } catch(err) {
    document.getElementById('reportCanvas').innerHTML =
      `<div class="state-msg">Could not load samples-build-reports.json<br>
       <small style="opacity:0.35;margin-top:0.5rem;display:block;">${err.message}</small></div>`;
  }
}

// ==================== RENDER REPORT ====================
function renderReport() {
  if (!reportData) return;
  totalHidden = 0; revealCount = 0;
  const canvas = document.getElementById('reportCanvas');

  const html = reportData.map((section, si) => {
    const label = section.label || `Section ${si + 1}`;
    const sentences = section.sentences || [];
    totalHidden += sentences.length - 1;

    const sentenceHTML = sentences.map((text, ti) => {
      if (ti === 0) return `<span class="s-anchor">${text}</span>`;
      const detection = detectSentenceType(text, label, ti);
      const pillLabel = detection.label || (ti + 1);
      return `<span class="pill-container" data-sec="${si}" data-sent="${ti}">
                <span class="s-new">${text}</span>
                <span class="pill" data-type="${detection.type}" onclick="revealSentence(${si}, ${ti})">${pillLabel}</span>
              </span>`;
    }).join(' ');

    return `
      <div class="section-block" id="sec-${si}">
        <div class="section-label">${label}<span class="check"> ✦</span></div>
        <div class="prose">${sentenceHTML}</div>
      </div>`;
  }).join('');

  canvas.innerHTML = html;
  buildBannerQueue();
  updateProgress();
}

// ==================== REVEAL SENTENCE ====================
function revealSentence(secIdx, sentIdx) {
  const container = document.querySelector(`.pill-container[data-sec="${secIdx}"][data-sent="${sentIdx}"]`);
  if (!container || container.classList.contains('revealed')) return;
  container.classList.add('revealed');
  revealCount++;
  const newText = container.querySelector('.s-new');
  setTimeout(() => newText.classList.add('ink'), 1400);
  checkSectionComplete(secIdx);
  updateProgress();
  if (revealCount === totalHidden) setTimeout(celebrate, 350);
}

function revealSection(secIdx) {
  const sec = document.getElementById(`sec-${secIdx}`);
  if (!sec) return;
  sec.querySelectorAll('.pill-container:not(.revealed)').forEach(c => {
    const si = parseInt(c.dataset.sec);
    const ti = parseInt(c.dataset.sent);
    revealSentence(si, ti);
  });
  // Scroll section into view
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}), 100);
}

// ==================== SECTION COMPLETE ====================
function checkSectionComplete(secIdx) {
  const sec = document.getElementById(`sec-${secIdx}`);
  const containers = sec.querySelectorAll('.pill-container');
  if (Array.from(containers).every(c => c.classList.contains('revealed')))
    sec.classList.add('complete');
}

// ==================== PROGRESS ====================
function updateProgress() {
  const pct = totalHidden > 0 ? (revealCount / totalHidden) * 100 : 0;
  document.getElementById('barFill').style.width = pct + '%';
  const lbl = document.getElementById('progressLabel');
  if (revealCount === 0) { lbl.textContent='tap to reveal'; lbl.classList.remove('done'); }
  else if (revealCount === totalHidden) { lbl.textContent='complete ✦'; lbl.classList.add('done'); }
  else { lbl.textContent=`${revealCount} / ${totalHidden}`; lbl.classList.remove('done'); }
}

// ==================== CELEBRATE ====================
function celebrate() {
  const el = document.getElementById('celebration');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2900);
}

// ==================== BANNER MODE ====================
function buildBannerQueue() {
  bannerQueue = [];
  if (!reportData) return;
  reportData.forEach((section, si) => {
    const sentences = section.sentences || [];
    const unrevealed = sentences.slice(1).length; // pills count
    if (unrevealed === 0) return; // skip if already complete
    bannerQueue.push({
      secIdx: si,
      label: section.label || `Section ${si+1}`,
      anchor: sentences[0] || '',
      color: SECTION_COLORS[si % SECTION_COLORS.length],
      pillCount: unrevealed
    });
  });
}

function startBannerMode() {
  // Rebuild queue skipping already-completed sections
  bannerQueue = [];
  if (!reportData) return;
  reportData.forEach((section, si) => {
    const sec = document.getElementById(`sec-${si}`);
    if (!sec) return;
    const unrevealed = sec.querySelectorAll('.pill-container:not(.revealed)').length;
    if (unrevealed === 0) return;
    const sentences = section.sentences || [];
    bannerQueue.push({
      secIdx: si,
      label: section.label || `Section ${si+1}`,
      anchor: sentences[0] || '',
      color: SECTION_COLORS[si % SECTION_COLORS.length],
      pillCount: unrevealed
    });
  });

  if (bannerQueue.length === 0) { celebrate(); return; }

  bannerPos = 0;
  bannerMode = true;
  document.getElementById('bannerModeBtn').classList.add('active');
  showBanner(0);
}

function showBanner(idx) {
  if (idx >= bannerQueue.length) {
    closeBannerMode();
    return;
  }
  const item = bannerQueue[idx];
  document.getElementById('bannerStrip').style.background = item.color;
  document.getElementById('bannerLabel').textContent = item.label;
  document.getElementById('bannerPhrase').textContent = item.anchor;
  const n = item.pillCount;
  document.getElementById('bannerHintText').textContent =
    `${n} supporting sentence${n>1?'s':''} to reveal`;
  document.getElementById('bannerCounter').textContent =
    `${idx+1} of ${bannerQueue.length}`;

  const overlay = document.getElementById('bannerOverlay');
  overlay.classList.remove('active');
  void overlay.offsetWidth;
  // Small delay so animation re-triggers
  setTimeout(()=>overlay.classList.add('active'), 30);
}

function bannerTap() {
  if (!bannerMode) return;
  const item = bannerQueue[bannerPos];
  if (!item) return;

  // Dismiss banner, reveal section sentences
  const overlay = document.getElementById('bannerOverlay');
  overlay.classList.remove('active');

  setTimeout(()=>{
    revealSection(item.secIdx);
    bannerPos++;
    if (bannerPos < bannerQueue.length) {
      // Pause before showing next banner
      setTimeout(()=>showBanner(bannerPos), 700);
    } else {
      closeBannerMode();
    }
  }, 300);
}

function closeBannerMode() {
  bannerMode = false;
  document.getElementById('bannerOverlay').classList.remove('active');
  document.getElementById('bannerModeBtn').classList.remove('active');
}

// Close banner on overlay background tap (not on banner itself)
document.getElementById('bannerOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeBannerMode();
});

// ==================== REVEAL ALL ====================
function revealAll() {
  closeMenu();
  document.querySelectorAll('.pill-container:not(.revealed)').forEach(container => {
    revealSentence(parseInt(container.dataset.sec), parseInt(container.dataset.sent));
  });
}

function resetAll() {
  closeMenu();
  if (!reportData) return;
  closeBannerMode();
  renderReport();
}

// ==================== MENU ====================
function toggleMenu() { document.getElementById('menuDropdown').classList.toggle('open'); }
function closeMenu() { document.getElementById('menuDropdown').classList.remove('open'); }
document.addEventListener('click', e => {
  if (!e.target.closest('#menuDropdown') && !e.target.closest('.menu-btn')) closeMenu();
});

// ==================== NAV ====================
function navTo(dest) {
  if (dest === 'build') return;
  if (question) sessionStorage.setItem('currentReportQuestion', JSON.stringify(question));
  const map = { question:'report-question-selector.html', plan:'report-plan.html', model:'report-model.html', sample:'report-master.html' };
  if (map[dest]) window.location.href = map[dest];
}

init();
</script>
