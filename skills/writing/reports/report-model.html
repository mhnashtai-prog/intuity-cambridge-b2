<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Report Studio — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,700;0,800;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0c;--gold:#C9A961;--gold-d:#9B7D3A;--gold-l:#E8D4A0;
  --white:#FAFAF8;--ink:#0d0d0d;
  --soft:rgba(13,13,13,0.5);--rule:rgba(0,0,0,0.07);
  --teal:#5ab5ac;--teal-d:#4a9a92;--teal-l:rgba(90,181,172,0.12);
  --coral:#f89643;--coral-d:#e67e2e;--coral-l:rgba(248,150,67,0.12);
  --purple:#8b7ba8;--purple-d:#726291;--purple-l:rgba(139,123,168,0.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}

/* ── SHELL & CARD ── */
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:2vh 3vw}
.card{width:100%;height:100%;max-width:900px;max-height:95vh;background:var(--white);border-radius:1.5rem;box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));z-index:5}

/* ── HEADER ── */
.card-brand{flex-shrink:0;display:flex;align-items:center;padding:0.75rem 1.25rem 0.5rem;margin-top:3px;border-bottom:1px solid var(--rule);position:relative;z-index:10}
.home-link{text-decoration:none;font-size:0.85rem;font-weight:600;color:var(--gold);padding:0.35rem 0.5rem;border-radius:0.5rem;transition:all 0.2s}
.home-link:hover{background:rgba(201,169,97,0.1)}
.brand-word{position:absolute;left:50%;transform:translateX(-50%);font-size:0.55rem;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.18);pointer-events:none}
.menu-btn{margin-left:auto;background:#000;border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.menu-dots{display:flex;gap:3px}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:#fff}
.menu-dropdown{position:absolute;top:calc(100% + 0.5rem);right:1rem;background:#fff;border-radius:0.75rem;box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.12);min-width:190px;padding:0.5rem;z-index:200;display:none}
.menu-dropdown.open{display:block;animation:menuIn 0.2s ease-out}
@keyframes menuIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.menu-item{padding:0.65rem 0.85rem;border-radius:0.5rem;font-size:0.78rem;font-weight:500;color:rgba(0,0,0,0.7);cursor:pointer;transition:all 0.15s}
.menu-item:hover{background:rgba(0,0,0,0.04)}

/* ── TABS (topic selector) ── */
.card-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.4rem;padding:0.5rem 1.25rem;border-bottom:1px solid var(--rule);overflow-x:auto}
.card-tabs::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;border:none;border-bottom:3px solid transparent;padding:0.4rem 0.75rem;font-size:0.65rem;font-weight:700;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── MODE TOGGLE ── */
.mode-strip{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.55rem 1.25rem;border-bottom:1px solid var(--rule);gap:0.75rem}
.mode-switch{display:flex;background:rgba(0,0,0,0.05);border-radius:2rem;padding:0.25rem;gap:0.2rem}
.mode-btn{padding:0.38rem 1rem;border-radius:1.75rem;font-size:0.68rem;font-weight:800;color:rgba(0,0,0,0.38);cursor:pointer;transition:all 0.25s;white-space:nowrap;user-select:none;border:none;background:transparent;letter-spacing:0.04em;text-transform:uppercase}
.mode-btn:hover:not(.active){color:rgba(0,0,0,0.58)}
.mode-btn.active{background:var(--ink);color:var(--gold);box-shadow:0 3px 12px rgba(0,0,0,0.2)}
.listen-btn{display:inline-flex;align-items:center;gap:0.35rem;padding:0.35rem 0.9rem;border-radius:2rem;background:var(--ink);color:var(--gold);border:none;font-size:0.62rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;box-shadow:0 3px 10px rgba(0,0,0,0.22);white-space:nowrap}
.listen-btn:hover{background:#1a1a1a}
.listen-btn.playing{background:#c0392b;color:#fff}

/* ── PROGRESS ── */
.progress-strip{flex-shrink:0;padding:0.4rem 1.25rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:0.9rem}
.progress-strip.hidden{display:none}
.bar-track{flex:1;height:3px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--coral),var(--purple));border-radius:3px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
.progress-label{font-size:0.58rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;color:rgba(0,0,0,0.28);white-space:nowrap;transition:color 0.3s}
.progress-label.done{color:var(--teal-d)}

/* ── CANVAS ── */
.plan-canvas{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2.5rem 1.75rem 2rem;display:flex;flex-direction:column;align-items:center;gap:3rem;background:#d6d6d4}
.plan-canvas::-webkit-scrollbar{width:4px}
.plan-canvas::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18);border-radius:2px}

/* ── PRACTICE CANVAS ── */
.practice-canvas{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.25rem 1.75rem;display:none;flex-direction:column;gap:1.25rem}
.practice-canvas.active{display:flex}
.practice-question-box{background:rgba(201,169,97,0.08);border-left:4px solid var(--gold);border-radius:0.75rem;padding:1rem 1.25rem}
.pq-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:0.35rem}
.pq-text{font-size:1rem;font-weight:700;color:var(--ink);line-height:1.4;font-family:'DM Sans',sans-serif}
.practice-controls{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.25rem;background:rgba(0,0,0,0.03);border-radius:0.75rem}
.play-btn{display:flex;align-items:center;gap:0.5rem;padding:0.55rem 1.1rem;background:#000;color:var(--gold);border:none;border-radius:2rem;font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s}
.play-caption{font-size:0.78rem;font-style:italic;color:rgba(0,0,0,0.4);flex:1;line-height:1.4;min-height:1.2em;transition:color 0.3s}
.play-caption.speaking{color:rgba(0,0,0,0.75)}
.answer-box{background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.07);border-radius:0.75rem;padding:1.1rem 1.25rem}
.answer-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:rgba(0,0,0,0.3);margin-bottom:0.5rem}
.answer-line{display:flex;align-items:flex-start;gap:0.75rem;padding:0.45rem 0;border-bottom:1px solid rgba(0,0,0,0.05);transition:background 0.15s;border-radius:0.4rem}
.answer-line:last-child{border-bottom:none}
.answer-line.played .answer-text{opacity:0.35}
.answer-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;margin-top:0.48rem;background:rgba(0,0,0,0.18);transition:background 0.3s}
.answer-line.has-phrase .answer-dot{background:var(--gold)}
.answer-line.played .answer-dot{background:rgba(0,0,0,0.1)}
.answer-text{font-size:0.88rem;line-height:1.6;color:var(--ink);font-family:'DM Sans',sans-serif}
.phrase-tag{display:inline-block;font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:0.15rem 0.5rem;border-radius:2rem;margin-left:0.4rem;vertical-align:middle;opacity:0.75}
.tag-intro{background:var(--teal-l);color:var(--teal)}
.tag-feature{background:var(--coral-l);color:var(--coral)}
.tag-conclusion{background:var(--purple-l);color:var(--purple)}

/* ── PARA PLAN (card wrapper) ── */
.para-plan{position:relative;width:100%;max-width:780px;padding-top:45px;opacity:0;transform:translateY(12px);animation:fadeUp 0.45s ease forwards}
.para-plan:nth-child(1){animation-delay:0.04s}
.para-plan:nth-child(2){animation-delay:0.12s}
.para-plan:nth-child(3){animation-delay:0.20s}
.para-plan:nth-child(4){animation-delay:0.28s}
.para-plan:nth-child(5){animation-delay:0.36s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.para-plan.pulse .para-card{animation:cardPulse 0.35s ease}
@keyframes cardPulse{0%,100%{filter:drop-shadow(0 10px 28px rgba(0,0,0,0.24))}50%{filter:drop-shadow(0 0 30px rgba(201,169,97,0.45)) drop-shadow(0 10px 28px rgba(0,0,0,0.24))}}

/* ── PIN ── */
.para-pin{position:absolute;top:68px;left:50%;transform:translateX(-50%);width:18px;height:32px;z-index:20;pointer-events:none}
.para-pin::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#999,#555);box-shadow:0 3px 7px rgba(0,0,0,0.45)}
.para-pin::after{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);width:3px;height:18px;background:linear-gradient(to bottom,#777,#bbb);border-radius:0 0 2px 2px}

/* ── NUMBER TAG ── */
.para-tag{position:absolute;top:18px;left:20px;width:120px;height:120px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Playfair Display',serif;font-weight:900;font-size:48px;letter-spacing:-2px;box-shadow:0 8px 24px rgba(0,0,0,0.32);z-index:20}
.para-tag.tag-intro{background:linear-gradient(135deg,var(--teal),var(--teal-d));transform:rotate(-7deg)}
.para-tag.tag-body{background:linear-gradient(135deg,var(--coral),var(--coral-d));transform:rotate(6deg)}
.para-tag.tag-conclusion{background:linear-gradient(135deg,var(--purple),var(--purple-d));transform:rotate(-8deg)}

/* ── CARD ── */
.para-card{position:relative;width:100%;padding:1.25rem 1.75rem 2.25rem;display:flex;flex-direction:column;transition:filter 0.3s;background-color:#f4f2ee;background-image:repeating-linear-gradient(90deg,rgba(0,0,0,0.012) 0px,rgba(0,0,0,0.012) 1px,transparent 1px,transparent 5px),repeating-linear-gradient(0deg,rgba(0,0,0,0.008) 0px,rgba(0,0,0,0.008) 1px,transparent 1px,transparent 5px);filter:drop-shadow(0 10px 28px rgba(0,0,0,0.24)) drop-shadow(0 2px 6px rgba(0,0,0,0.14));clip-path:polygon(0% 2.5%,1.2% 1%,2.5% 3%,4% 1%,5.5% 3%,7% 1.5%,8.5% 3.5%,10% 1%,12% 3%,14% 1%,16% 2.5%,18% 0.8%,20% 2.8%,22% 1%,24% 3%,26% 1%,28% 2.5%,30% 0.8%,32% 2.8%,34% 1%,36% 3%,38% 1%,40% 2.5%,42% 0.8%,44% 2.8%,46% 1%,48% 2.5%,50% 0.5%,52% 2.5%,54% 1%,56% 2.8%,58% 0.8%,60% 2.5%,62% 1%,64% 3%,66% 1%,68% 2.8%,70% 0.8%,72% 2.5%,74% 1%,76% 3%,78% 1%,80% 2.5%,82% 1%,84% 3%,86% 1.5%,88% 3.5%,90% 1%,92% 3%,94% 1%,96% 3%,98% 1%,100% 2.5%,100% 97.5%,98.5% 99%,97% 97%,95% 99%,93% 97%,91% 99%,89% 97.5%,87% 99.5%,85% 97%,83% 99%,81% 97.5%,79% 99.5%,77% 97%,75% 99%,73% 97.5%,71% 99.5%,69% 97%,67% 99%,65% 97.5%,63% 99.5%,61% 97%,59% 99%,57% 97.5%,55% 99.5%,53% 97%,51% 99.5%,49% 97%,47% 99.5%,45% 97%,43% 99%,41% 97.5%,39% 99.5%,37% 97%,35% 99%,33% 97.5%,31% 99.5%,29% 97%,27% 99%,25% 97.5%,23% 99.5%,21% 97%,19% 99%,17% 97.5%,15% 99.5%,13% 97%,11% 99%,9% 97.5%,7% 99.5%,5% 97%,3% 99%,1.5% 97.5%,0% 99%)}
.type-intro .para-card{background-color:#eaf5f4}
.type-body .para-card{background-color:#fdf4e8}
.type-conclusion .para-card{background-color:#f0ecf7}

/* ── CARD HEADER ── */
.card-header{display:flex;align-items:center;justify-content:space-between;padding-top:4.75rem;padding-bottom:0.6rem;margin-bottom:0;border-bottom:1px solid rgba(0,0,0,0.07)}
.card-title{font-family:'Inter',sans-serif;font-size:0.75rem;font-weight:900;letter-spacing:0.07em;text-transform:uppercase;flex:1;text-align:center}
.type-intro .card-title{color:var(--teal-d)}
.type-body .card-title{color:var(--coral-d)}
.type-conclusion .card-title{color:var(--purple-d)}
.card-speak-btn{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;font-size:0.7rem;background:rgba(0,0,0,0.07);color:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.card-speak-btn:hover{background:rgba(0,0,0,0.13);transform:scale(1.1)}
.card-speak-btn.playing{background:var(--ink);color:var(--gold);animation:speakPulse 1.2s ease-in-out infinite}
@keyframes speakPulse{0%,100%{box-shadow:0 0 0 0 rgba(201,169,97,0.5)}50%{box-shadow:0 0 0 6px rgba(201,169,97,0)}}

/* ── OPENING PHRASE BAND ── */
.phrase-band{margin:0.7rem 0 0;padding:0.5rem 0.8rem;border-radius:0.45rem;display:flex;flex-direction:column;gap:0.15rem}
.type-intro .phrase-band{background:rgba(90,181,172,0.1);border-left:3px solid var(--teal)}
.type-body .phrase-band{background:rgba(248,150,67,0.1);border-left:3px solid var(--coral)}
.type-conclusion .phrase-band{background:rgba(139,123,168,0.1);border-left:3px solid var(--purple)}
.phrase-band-label{font-family:'Inter',sans-serif;font-size:0.5rem;font-weight:900;text-transform:uppercase;letter-spacing:0.14em;opacity:0.5}
.type-intro .phrase-band-label{color:var(--teal-d)}
.type-body .phrase-band-label{color:var(--coral-d)}
.type-conclusion .phrase-band-label{color:var(--purple-d)}
.phrase-band-text{font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;font-style:italic;line-height:1.45;color:rgba(0,0,0,0.65)}

/* ── MAIN IDEA ── */
.main-idea{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;line-height:1.35;color:var(--ink);margin:0.8rem 0 0;padding:0.7rem 0.85rem 0.75rem;text-align:center;border-radius:0.5rem 0.5rem 0 0}
.type-intro .main-idea{background:rgba(90,181,172,0.06);border-top:2px solid var(--teal)}
.type-body .main-idea{background:rgba(248,150,67,0.06);border-top:2px solid var(--coral)}
.type-conclusion .main-idea{background:rgba(139,123,168,0.06);border-top:2px solid var(--purple)}

/* ── SUPPORT LIST ── */
.support-list{list-style:none;margin-top:0;padding-top:0.6rem;border-top:1px dashed rgba(0,0,0,0.1);display:flex;flex-direction:column;gap:0.4rem}
.support-list::before{content:'Supporting points';font-family:'Inter',sans-serif;font-size:0.5rem;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;color:rgba(0,0,0,0.25);display:block;margin-bottom:0.3rem}
.support-item{display:flex;align-items:flex-start;gap:0.55rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;line-height:1.5;color:rgba(13,13,13,0.78)}

/* ── REVEAL BTN ── */
.reveal-btn{flex-shrink:0;display:inline-flex;align-items:center;gap:0.25rem;padding:0.26rem 0.65rem;border-radius:2rem;font-family:'Inter',sans-serif;font-size:0.56rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:#fff;cursor:pointer;border:none;white-space:nowrap;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 3px 10px rgba(0,0,0,0.2);user-select:none}
.reveal-btn::before{content:'▶';font-size:0.4rem;opacity:0.85}
.reveal-btn:hover{transform:scale(1.07);box-shadow:0 5px 14px rgba(0,0,0,0.25)}
.reveal-btn:active{transform:scale(0.94)}
.type-intro .reveal-btn{background:linear-gradient(135deg,var(--teal),var(--teal-d))}
.type-body .reveal-btn{background:linear-gradient(135deg,var(--coral),var(--coral-d))}
.type-conclusion .reveal-btn{background:linear-gradient(135deg,var(--purple),var(--purple-d))}
.reveal-btn.done{width:7px;height:7px;padding:0;border-radius:50%;font-size:0;cursor:default;transform:scale(1);flex-shrink:0;margin-top:0.46rem;box-shadow:0 2px 6px rgba(0,0,0,0.18)}
.reveal-btn.done::before{display:none}
.type-intro .reveal-btn.done{background:var(--teal)}
.type-body .reveal-btn.done{background:var(--coral)}
.type-conclusion .reveal-btn.done{background:var(--purple)}

.support-text{display:none;font-size:0.82rem;font-weight:400;line-height:1.5}
.support-text.show{display:inline;animation:textLand 0.3s ease both}
@keyframes textLand{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── DIALOGUE BUBBLE ── */
.dialogue-bubble{display:none;border-left:3px solid rgba(0,0,0,0.1);border-radius:0 0.5rem 0.5rem 0;padding:0.5rem 0.8rem;margin-bottom:0.6rem;font-family:'DM Sans',sans-serif;font-size:0.74rem;line-height:1.6;color:rgba(0,0,0,0.55);font-style:italic;background:rgba(0,0,0,0.025)}
.dialogue-bubble.show{display:block;animation:fadeUp 0.3s ease}
.type-intro .dialogue-bubble{border-left-color:var(--teal)}
.type-body .dialogue-bubble{border-left-color:var(--coral)}
.type-conclusion .dialogue-bubble{border-left-color:var(--purple)}

/* ══════════════════════════════════════
   BANNER SYSTEM — THE STAR OF THE SHOW
   ══════════════════════════════════════ */
.fly-banner{
  position:fixed;z-index:900;pointer-events:none;
  display:flex;flex-direction:column;
  border-radius:1.75rem;background:#fff;
  border-left:12px solid var(--teal);
  box-shadow:0 50px 120px rgba(0,0,0,0.35),0 15px 40px rgba(0,0,0,0.2),0 3px 10px rgba(0,0,0,0.1);
  width:min(380px,92vw);height:min(380px,92vw);
  overflow:hidden;
}
/* Colour top bar */
.fly-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;border-radius:1.75rem 1.75rem 0 0}
.fly-banner.type-intro{border-left-color:var(--teal)}
.fly-banner.type-intro::before{background:var(--teal)}
.fly-banner.type-body{border-left-color:var(--coral)}
.fly-banner.type-body::before{background:var(--coral)}
.fly-banner.type-conclusion{border-left-color:var(--purple)}
.fly-banner.type-conclusion::before{background:var(--purple)}

/* Banner inner zones */
.banner-inner{padding:1.6rem 1.8rem 1.4rem;display:flex;flex-direction:column;height:100%;gap:0}
.banner-mode-tag{font-family:'Inter',sans-serif;font-size:0.56rem;font-weight:900;text-transform:uppercase;letter-spacing:0.18em;opacity:0.5;margin-top:0.6rem;margin-bottom:0.4rem}
.fly-banner.type-intro .banner-mode-tag{color:var(--teal)}
.fly-banner.type-body .banner-mode-tag{color:var(--coral)}
.fly-banner.type-conclusion .banner-mode-tag{color:var(--purple)}

/* PLAN state — raw idea large */
.banner-raw{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:700;line-height:1.3;color:var(--ink);flex:1;display:flex;align-items:center}
/* MODEL state — phrase + idea fused */
.banner-phrase-wrap{display:none;flex-direction:column;flex:1;justify-content:center;gap:0.55rem}
.banner-phrase-intro{font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:600;font-style:italic;line-height:1.4;color:rgba(0,0,0,0.52)}
.banner-phrase-sentence{font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:800;line-height:1.4;color:var(--ink)}
.fly-banner.type-intro .banner-phrase-sentence{color:var(--teal-d)}
.fly-banner.type-body .banner-phrase-sentence{color:var(--coral-d)}
.fly-banner.type-conclusion .banner-phrase-sentence{color:var(--purple-d)}
/* Highlight the key phrase within sentence */
.kp{background:rgba(201,169,97,0.2);border-radius:3px;padding:0 3px}

.banner-footer{font-family:'Inter',sans-serif;font-size:0.62rem;color:rgba(0,0,0,0.3);border-top:1px solid rgba(0,0,0,0.06);padding-top:0.55rem;margin-top:auto;font-style:italic}

/* Banner animations */
.fly-banner.phase-float{animation:bFloat 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes bFloat{0%{opacity:0;transform:scale(0.55) translateY(-80px)}65%{opacity:1;transform:scale(1.05) translateY(8px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.fly-banner.phase-hover{animation:bBob 1.9s ease-in-out infinite}
@keyframes bBob{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(0.4deg)}}
.fly-banner.phase-transform{animation:bTransform 0.42s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes bTransform{0%{transform:scale(1)}40%{transform:scale(0.94) rotate(-1deg)}100%{transform:scale(1) rotate(0deg)}}
.fly-banner.phase-dive{animation:bDive 0.55s cubic-bezier(0.6,0,0.8,1) both}
@keyframes bDive{0%{opacity:1;transform:scale(1) translate(0,0)}55%{opacity:1;transform:scale(0.7) translate(var(--dive-x),var(--dive-y))}85%{opacity:0.4;transform:scale(0.25) translate(calc(var(--dive-x)*1.05),calc(var(--dive-y)*1.05))}100%{opacity:0;transform:scale(0.15) translate(calc(var(--dive-x)*1.1),calc(var(--dive-y)*1.1))}}
.fly-banner.phase-out{animation:bOut 0.4s ease both}
@keyframes bOut{to{opacity:0;transform:scale(0.8) translateY(20px)}}

/* ── CELEBRATION ── */
.celebration{position:fixed;inset:0;z-index:950;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.celebration.show{animation:celebPop 2.8s ease forwards}
@keyframes celebPop{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.celeb-pill{background:var(--ink);color:var(--gold);padding:1rem 2.25rem;border-radius:3rem;font-size:1rem;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;box-shadow:0 12px 48px rgba(0,0,0,0.45);animation:celebScale 0.45s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes celebScale{from{transform:scale(0.7)}to{transform:scale(1)}}

/* ── FOOTER NAV ── */
.card-nav{flex-shrink:0;display:flex;justify-content:center;padding:0.6rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.65rem);border-top:1px solid var(--rule);background:var(--white)}
.nav-pill{display:flex;gap:0.15rem;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.3rem 0.35rem}
.nb{background:transparent;border:none;padding:0.4rem 0.85rem;border-radius:1.5rem;font-family:'Inter',sans-serif;font-size:0.65rem;letter-spacing:0.02em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.24s;white-space:nowrap;min-height:32px;font-weight:500}
.nb.on{background:var(--ink);color:var(--gold);font-weight:700}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.75rem;font-size:0.8rem;color:rgba(0,0,0,0.3);text-align:center;padding:2rem}

@media(max-width:768px){
  .shell{padding:0}.card{border-radius:0;max-height:100vh}
  .plan-canvas{padding:1.5rem 0.75rem;gap:2rem}
  .para-plan{max-width:100%;padding-top:32px}
  .para-card{padding:1rem 1.1rem 2rem}
  .card-header{padding-top:4rem}
  .para-tag{width:95px;height:95px;font-size:38px;top:8px;left:12px}
  .main-idea{font-size:0.95rem}
  .nb{padding:0.3rem 0.6rem;font-size:0.55rem}
  .practice-canvas{padding:1rem}
}
</style>
</head>
<body>

<div class="shell"><div class="card">

  <div class="card-brand">
    <a class="home-link" href="../../../index.html?openModal=writing&submenu=reports">← Reports</a>
    <span class="brand-word">INTUITY</span>

</div></div>

<div class="celebration" id="celebration"><div class="celeb-pill">Complete ✦</div></div>

<script>
// ══════════════════════════════════════════════════
// SOUND ENGINE
// ══════════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx(){ if(!actx) actx = new AudioCtx(); return actx; }

function playTone(freq, type, duration, vol, delay=0){
  try{
    const ctx = getACtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = ctx.currentTime + delay;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.start(t); osc.stop(t + duration + 0.05);
  } catch(e){}
}

// Whoosh: banner launch
function soundLaunch(){
  playTone(220, 'sine', 0.18, 0.12);
  playTone(440, 'sine', 0.12, 0.08, 0.04);
  playTone(880, 'sine', 0.08, 0.05, 0.08);
}
// Click: raw → model transform
function soundTransform(){
  playTone(880, 'triangle', 0.06, 0.18);
  playTone(1320, 'triangle', 0.05, 0.14, 0.06);
  playTone(1760, 'sine', 0.04, 0.1, 0.1);
}
// Chime: sentence lands in card
function soundLand(){
  playTone(523, 'sine', 0.35, 0.12);
  playTone(659, 'sine', 0.28, 0.09, 0.06);
  playTone(784, 'sine', 0.22, 0.07, 0.12);
}

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let skeletonData = null;
let phraseData   = null;
let currentType  = 'school-facilities';
let currentMode  = 'plan'; // 'plan' | 'model' | 'practice'
let totalHidden  = 0;
let revealCount  = 0;
let audioActive  = false;
let audioCardIdx = -1;
let practiceActive = false;
let practiceQ    = 0;
let practiceNarrator = null;
let currentBanner = null;
const synth = window.speechSynthesis;
let narrator = null;

// Intro phrases per section type
const PHRASES = {
  intro:[
    "The main objective of this report is to…",
    "The aim of this report is to…",
    "This report focuses on evaluating…",
    "This report is based on feedback from…"
  ],
  body:[
    "It is generally agreed that…",
    "However, one major concern expressed by students is…",
    "By far the best aspect is…",
    "One positive aspect worth noting is…",
    "A significant concern amongst students was…"
  ],
  recommend:[
    "One key recommendation would be to…",
    "I would strongly recommend…",
    "In order to improve the situation, it would be advisable to…",
    "It is essential that…"
  ],
  conclusion:[
    "Taking everything into account, it seems clear that…",
    "To sum up, these changes would…",
    "In conclusion, addressing these issues should be a priority.",
    "On balance, the benefits of these changes would…"
  ]
};

// Model sentences: phrase wrapping idea
const MODEL_SENTENCES = {
  intro:[
    (idea) => `The main objective of this report is to <span class="kp">assess ${idea}</span>.`,
    (idea) => `This report focuses on <span class="kp">evaluating ${idea}</span> and suggesting improvements.`,
  ],
  body:[
    (idea) => `It is generally agreed that <span class="kp">${idea}</span> is a key concern for students.`,
    (idea) => `However, one major concern expressed by students is <span class="kp">${idea}</span>.`,
    (idea) => `By far the best aspect is <span class="kp">${idea}</span>, which students rated highly.`,
    (idea) => `One positive aspect worth noting is that <span class="kp">${idea}</span>.`,
  ],
  recommend:[
    (idea) => `One key recommendation would be to <span class="kp">${idea}</span> as a matter of priority.`,
    (idea) => `I would strongly recommend <span class="kp">${idea}</span> in order to address this issue.`,
    (idea) => `In order to improve the situation, it would be advisable to <span class="kp">${idea}</span>.`,
  ],
  conclusion:[
    (idea) => `Taking everything into account, it seems clear that <span class="kp">${idea}</span> would benefit all students.`,
    (idea) => `To sum up, <span class="kp">${idea}</span> would significantly improve the overall experience.`,
  ]
};

function getSectionType(title){
  const t = title.toLowerCase();
  if(t.includes('intro')) return 'intro';
  if(t.includes('recommend')) return 'recommend';
  if(t.includes('conclusion') || t.includes('closing')) return 'conclusion';
  return 'body';
}
function getCSSType(title){
  const st = getSectionType(title);
  if(st==='intro') return 'type-intro';
  if(st==='recommend'||st==='conclusion') return 'type-conclusion';
  return 'type-body';
}
function pickPhrase(typeKey, idx){
  const arr = PHRASES[typeKey]||PHRASES.body;
  return arr[idx % arr.length];
}
function pickModelSentence(typeKey, idea, idx){
  const arr = MODEL_SENTENCES[typeKey]||MODEL_SENTENCES.body;
  return arr[idx % arr.length](idea);
}

// ══════════════════════════════════════════════════
// SPEECH
// ══════════════════════════════════════════════════
async function initVoices(){
  return new Promise(resolve=>{
    const load = ()=>{
      const v = synth.getVoices();
      const en = v.filter(x=>x.lang.startsWith('en'));
      const pool = en.length ? en : v;
      narrator =
        pool.find(x=>x.name==='Google UK English Male')||
        pool.find(x=>x.name==='Daniel')||
        pool.find(x=>x.lang==='en-GB')||
        pool[0]||null;
      resolve();
    };
    if(synth.getVoices().length) load();
    else synth.onvoiceschanged = load;
  });
}

function speakText(text){
  return new Promise(resolve=>{
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.voice = narrator; utt.rate=0.88; utt.pitch=1.05; utt.volume=1;
    utt.onend = ()=>resolve(); utt.onerror = ()=>resolve();
    synth.speak(utt);
  });
}
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function stopAllAudio(){
  synth.cancel();
  audioActive = false; audioCardIdx = -1; practiceActive = false;
  document.querySelectorAll('.card-speak-btn.playing').forEach(b=>{b.classList.remove('playing');b.innerHTML='▶'});
  document.getElementById('listenBtn').classList.remove('playing');
  document.getElementById('listenIcon').textContent='▶';
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
  const cap = document.getElementById('practiceCaption');
  if(cap){ cap.textContent='Press Play to hear the model answer'; cap.classList.remove('speaking'); }
  const pb = document.getElementById('playBtn');
  if(pb) pb.textContent='▶ Play';
  dismissBanner();
}

// ══════════════════════════════════════════════════
// BANNER ENGINE
// ══════════════════════════════════════════════════
function dismissBanner(){
  if(currentBanner){
    const b = currentBanner; currentBanner = null;
    b.classList.remove('phase-hover','phase-transform');
    void b.offsetWidth;
    b.classList.add('phase-out');
    setTimeout(()=>b.remove(), 420);
  }
}

function buildBannerEl(typeClass){
  dismissBanner();
  const b = document.createElement('div');
  b.className = `fly-banner ${typeClass}`;
  const inner = document.createElement('div');
  inner.className = 'banner-inner';
  b.appendChild(inner);
  return {banner:b, inner};
}

function positionBanner(banner){
  banner.style.visibility='hidden';
  banner.style.left='0'; banner.style.top='0';
  document.body.appendChild(banner);
  const bw=banner.offsetWidth, bh=banner.offsetHeight;
  const vw=window.innerWidth, vh=window.innerHeight;
  banner.style.left = Math.round((vw-bw)/2)+'px';
  banner.style.top  = Math.round((vh-bh)/2)+'px';
  banner.style.visibility='visible';
}

// PLAN banner: shows raw idea large, then transforms to model sentence
function launchPlanBanner(rawIdea, modelHTML, phraseIntro, slotEl, typeClass, sectionLabel, onLanded){
  soundLaunch();
  const {banner, inner} = buildBannerEl(typeClass);

  // Mode tag
  const modeTag = document.createElement('div');
  modeTag.className = 'banner-mode-tag';
  modeTag.textContent = sectionLabel;
  inner.appendChild(modeTag);

  // Raw idea zone
  const rawZone = document.createElement('div');
  rawZone.className = 'banner-raw';
  rawZone.textContent = rawIdea;
  inner.appendChild(rawZone);

  // Model phrase zone (hidden initially)
  const phraseWrap = document.createElement('div');
  phraseWrap.className = 'banner-phrase-wrap';
  const pIntro = document.createElement('div');
  pIntro.className = 'banner-phrase-intro';
  pIntro.textContent = phraseIntro;
  const pSentence = document.createElement('div');
  pSentence.className = 'banner-phrase-sentence';
  pSentence.innerHTML = modelHTML;
  phraseWrap.appendChild(pIntro);
  phraseWrap.appendChild(pSentence);
  inner.appendChild(phraseWrap);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'banner-footer';
  footer.textContent = 'watch the transformation';
  inner.appendChild(footer);

  positionBanner(banner);
  void banner.offsetWidth;
  banner.classList.add('phase-float');
  currentBanner = banner;

  // Phase 1: float in, speak raw idea
  setTimeout(async ()=>{
    banner.classList.remove('phase-float');
    void banner.offsetWidth;
    banner.classList.add('phase-hover');

    // Speak raw idea
    await speakText(rawIdea);
    await wait(800);

    if(!currentBanner) return;

    // TRANSFORM: raw → model sentence
    soundTransform();
    banner.classList.remove('phase-hover');
    void banner.offsetWidth;
    banner.classList.add('phase-transform');

    // Swap content
    rawZone.style.transition = 'opacity 0.3s';
    rawZone.style.opacity = '0';
    setTimeout(()=>{
      rawZone.style.display = 'none';
      phraseWrap.style.display = 'flex';
      phraseWrap.style.opacity = '0';
      phraseWrap.style.transition = 'opacity 0.35s';
      setTimeout(()=>{ phraseWrap.style.opacity='1'; }, 20);
      footer.textContent = 'phrase wraps the idea';
    }, 280);

    setTimeout(async ()=>{
      if(!currentBanner) return;
      banner.classList.remove('phase-transform');
      void banner.offsetWidth;
      banner.classList.add('phase-hover');

      // Speak model sentence (plain text version)
      const plain = pSentence.textContent;
      await speakText(plain);
      await wait(1200);

      if(!currentBanner) return;

      // DIVE: banner flies into slot
      const slotRect = slotEl.getBoundingClientRect();
      const bannerRect = banner.getBoundingClientRect();
      const diveX = (slotRect.left+slotRect.width/2) - (bannerRect.left+bannerRect.width/2);
      const diveY = (slotRect.top+slotRect.height/2) - (bannerRect.top+bannerRect.height/2);
      banner.style.setProperty('--dive-x', diveX+'px');
      banner.style.setProperty('--dive-y', diveY+'px');
      banner.classList.remove('phase-hover');
      void banner.offsetWidth;
      banner.classList.add('phase-dive');
      currentBanner = null;

      setTimeout(()=>{
        soundLand();
        onLanded && onLanded();
        setTimeout(()=>banner.remove(), 540);
      }, 480);

    }, 500);

  }, 520);
}

// PRACTICE banner: phrase flies in, hovers while voice speaks, then stays
function launchPracticeBanner(phraseText, label, typeClass){
  soundLaunch();
  const {banner, inner} = buildBannerEl(typeClass);

  const modeTag = document.createElement('div');
  modeTag.className = 'banner-mode-tag';
  modeTag.textContent = label;
  inner.appendChild(modeTag);

  const rawZone = document.createElement('div');
  rawZone.className = 'banner-raw';
  rawZone.textContent = phraseText;
  inner.appendChild(rawZone);

  const footer = document.createElement('div');
  footer.className = 'banner-footer';
  footer.textContent = 'key phrase';
  inner.appendChild(footer);

  positionBanner(banner);
  void banner.offsetWidth;
  banner.classList.add('phase-float');
  currentBanner = banner;

  setTimeout(()=>{
    banner.classList.remove('phase-float');
    void banner.offsetWidth;
    banner.classList.add('phase-hover');
  }, 520);
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
async function init(){
  await initVoices();
  try{
    const [r1,r2] = await Promise.all([
      fetch('data/complete-report-phrase-bank.json'),
      fetch('data/complete-report-phrase-bank1.json')
    ]);
    skeletonData = await r1.json();
    phraseData   = await r2.json();
    renderTabs();
    renderMode();
  } catch(e){
    document.getElementById('planCanvas').innerHTML =
      '<div class="state-msg">⚠️ Failed to load data</div>';
  }
}

// ══════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════
function renderTabs(){
  const c = document.getElementById('tabsContainer');
  const keys = Object.keys(skeletonData).filter(k=>k!=='meta');
  c.innerHTML = keys.map(k=>`
    <button class="tab-btn ${k===currentType?'active':''}" onclick="switchType('${k}')">
      ${skeletonData[k].label}
    </button>`).join('');
}
function switchType(type){
  currentType=type; practiceQ=0;
  stopAllAudio();
  renderTabs(); renderMode();
}

// ══════════════════════════════════════════════════
// MODE
// ══════════════════════════════════════════════════
function setMode(mode){
  stopAllAudio();
  currentMode = mode;
  ['plan','model','practice'].forEach(m=>{
    document.getElementById('mode'+m).classList.toggle('active', m===mode);
  });
  document.getElementById('progressStrip').classList.toggle('hidden', mode==='practice');
  renderMode();
}

function renderMode(){
  const planCanvas = document.getElementById('planCanvas');
  const practiceCanvas = document.getElementById('practiceCanvas');
  planCanvas.style.display = currentMode==='practice' ? 'none' : 'flex';
  practiceCanvas.classList.toggle('active', currentMode==='practice');
  if(currentMode==='plan' || currentMode==='model'){
    renderCards();
  } else {
    renderPractice();
  }
}

// ══════════════════════════════════════════════════
// CARDS (PLAN + MODEL share same layout)
// ══════════════════════════════════════════════════
function renderCards(){
  totalHidden=0; revealCount=0;
  const canvas = document.getElementById('planCanvas');
  canvas.innerHTML='';

  const report = skeletonData[currentType];
  if(!report||!report.skeletons||!report.skeletons[0]){
    canvas.innerHTML='<div class="state-msg">No data available</div>'; return;
  }
  const skeleton = report.skeletons[0].skeleton;

  skeleton.forEach((section, si)=>{
    const typeKey  = getSectionType(section.title);
    const cssType  = getCSSType(section.title);
    const tagClass = cssType==='type-intro' ? 'tag-intro' : cssType==='type-conclusion' ? 'tag-conclusion' : 'tag-body';

    const wrap = document.createElement('div');
    wrap.className = `para-plan ${cssType}`;

    // Pin
    const pin = document.createElement('div'); pin.className='para-pin';
    wrap.appendChild(pin);

    // Number tag
    const tag = document.createElement('div');
    tag.className = `para-tag ${tagClass}`;
    tag.textContent = String(si+1).padStart(2,'0');
    wrap.appendChild(tag);

    // Card
    const card = document.createElement('div'); card.className='para-card';

    // Header
    const header = document.createElement('div'); header.className='card-header';
    const titleEl = document.createElement('div'); titleEl.className='card-title';
    titleEl.textContent = section.title;
    const speakBtn = document.createElement('button'); speakBtn.className='card-speak-btn';
    speakBtn.innerHTML='▶'; speakBtn.title='Listen';
    speakBtn.onclick = ()=>toggleCardAudio(si, wrap);
    header.appendChild(titleEl); header.appendChild(speakBtn);
    card.appendChild(header);

    // Dialogue bubble
    const bubble = document.createElement('div'); bubble.className='dialogue-bubble';
    card.appendChild(bubble);

    // Phrase band — always visible
    const phraseBand = document.createElement('div'); phraseBand.className='phrase-band';
    const pLabel = document.createElement('div'); pLabel.className='phrase-band-label';
    pLabel.textContent = currentMode==='model' ? 'model phrase' : 'opening phrase';
    const pText = document.createElement('div'); pText.className='phrase-band-text';
    pText.textContent = pickPhrase(typeKey, si);
    phraseBand.appendChild(pLabel); phraseBand.appendChild(pText);
    card.appendChild(phraseBand);

    // Main idea
    if(section.lines && section.lines.length>0){
      const mainEl = document.createElement('div'); mainEl.className='main-idea';
      mainEl.textContent = section.lines[0];
      card.appendChild(mainEl);

      // Supporting bullets
      if(section.lines.length>1){
        const list = document.createElement('ul'); list.className='support-list';
        section.lines.slice(1).forEach((line, li)=>{
          const item = document.createElement('li'); item.className='support-item';

          const span = document.createElement('span'); span.className='support-text';
          span.textContent = line;

          if(currentMode==='plan'||currentMode==='model'){
            totalHidden++;
            const btn = document.createElement('button'); btn.className='reveal-btn';
            btn.textContent = '→';

            btn.onclick = function(){
              btn.classList.add('done'); btn.onclick=null;
              revealCount++; updateProgress();

              // Pulse the card
              wrap.classList.add('pulse');
              setTimeout(()=>wrap.classList.remove('pulse'), 400);

              const modelSentenceHTML = pickModelSentence(typeKey, line, li);
              const phraseIntro = pickPhrase(typeKey, si);

              launchPlanBanner(
                line,
                modelSentenceHTML,
                phraseIntro,
                item, cssType, section.title,
                ()=>{
                  soundLand();
                  span.classList.add('show');
                  if(revealCount===totalHidden) setTimeout(celebrate, 350);
                }
              );
            };
            item.appendChild(btn);
          } else {
            const dot = document.createElement('span');
            dot.style.cssText='flex-shrink:0;width:7px;height:7px;border-radius:50%;margin-top:0.46rem;opacity:0.4;background:currentColor';
            item.appendChild(dot);
            span.classList.add('show');
          }
          item.appendChild(span);
          list.appendChild(item);
        });
        card.appendChild(list);
      }
    }

    wrap.appendChild(card);
    canvas.appendChild(wrap);
  });

  updateProgress();
}

// ══════════════════════════════════════════════════
// CARD AUDIO (lecture mode)
// ══════════════════════════════════════════════════
function toggleCardAudio(idx, wrapEl){
  if(audioActive && audioCardIdx===idx){ stopAllAudio(); return; }
  stopAllAudio();
  audioActive=true; audioCardIdx=idx;
  playCardLecture(idx, wrapEl, ()=>{ audioActive=false; audioCardIdx=-1; });
}

async function playCardLecture(idx, wrapEl, onDone){
  const report = skeletonData[currentType];
  if(!report||!report.skeletons) return;
  const section = report.skeletons[0].skeleton[idx];
  if(!section) return;

  const btn = wrapEl.querySelector('.card-speak-btn');
  const bubble = wrapEl.querySelector('.dialogue-bubble');
  if(btn){ btn.classList.add('playing'); btn.innerHTML='■'; }
  wrapEl.scrollIntoView({behavior:'smooth',block:'center'});

  const typeKey = getSectionType(section.title);
  const lines = section.lines||[];

  // Intro sentence
  const openPhrase = pickPhrase(typeKey, idx);
  if(bubble){ bubble.textContent=`${section.title} — "${openPhrase}"`; bubble.classList.add('show'); }
  await speakText(`${section.title}. ${openPhrase.replace('…','')}`);
  if(!audioActive) return cleanup();
  await wait(400);

  // Main idea
  if(lines[0]){
    if(bubble){ bubble.textContent=lines[0]; }
    await speakText(lines[0]);
    if(!audioActive) return cleanup();
    await wait(500);
  }

  // Supporting lines — auto-reveal with banners
  for(let i=1;i<lines.length;i++){
    if(!audioActive) break;
    const modelHTML = pickModelSentence(typeKey, lines[i], i-1);
    const phraseIntro = pickPhrase(typeKey, idx);
    if(bubble){ bubble.textContent=lines[i]; }

    // Auto-click unrevealed btn if present
    const btns = wrapEl.querySelectorAll('.reveal-btn:not(.done)');
    if(btns[0]) setTimeout(()=>btns[0].click(), 200);
    else await speakText(lines[i]);

    await wait(currentMode==='plan'||currentMode==='model' ? 4200 : 600);
    if(!audioActive) break;
  }

  cleanup();
  function cleanup(){
    if(bubble){ bubble.classList.remove('show'); }
    if(btn){ btn.classList.remove('playing'); btn.innerHTML='▶'; }
    onDone && onDone();
  }
}

// ══════════════════════════════════════════════════
// LISTEN ALL
// ══════════════════════════════════════════════════
function toggleListen(){
  if(audioActive && audioCardIdx===-1){ stopAllAudio(); return; }
  if(currentMode==='practice'){ togglePractice(); return; }
  stopAllAudio();
  audioActive=true; audioCardIdx=-1;
  const btn=document.getElementById('listenBtn');
  btn.classList.add('playing');
  document.getElementById('listenIcon').textContent='■';
  const wraps = document.querySelectorAll('.para-plan');
  let i=0;
  function next(){
    if(!audioActive||i>=wraps.length){ stopAllAudio(); return; }
    const idx=i++;
    playCardLecture(idx, wraps[idx], next);
  }
  next();
}

// ══════════════════════════════════════════════════
// PRACTICE MODE
// ══════════════════════════════════════════════════
function buildPracticeData(){
  const promptMap = {
    'school-facilities':      "You have been asked to write a report assessing your school's facilities and recommending improvements.",
    'exchange-programme':     'Your school has organised a two-week exchange programme. Write a report evaluating it and recommending whether it should continue.',
    'sports-facilities':      'The local council has asked you to write a report evaluating the sports centre and suggesting improvements for young people.',
    'school-trip':            'Write a report evaluating a recent educational school trip and suggesting improvements for future visits.',
    'library-services':       'Write a report assessing the school library services and recommending improvements.',
    'work-experience':        'Your school has asked you to write a report evaluating a recent work experience placement.',
    'cafeteria-services':     'Write a report assessing the school cafeteria and suggesting improvements.',
    'environmental-initiative':'Write a report evaluating the recent environmental project and recommending whether similar projects should be organised.',
    'youth-club':             'Write a report assessing the local youth club and recommending improvements.',
    'language-course':        'Write a report evaluating a language course you attended and suggesting improvements.'
  };

  const report = skeletonData[currentType];
  if(!report||!report.skeletons) return null;

  const answer = [];
  report.skeletons[0].skeleton.forEach(section=>{
    const typeKey = getSectionType(section.title);
    const phraseType = typeKey==='intro'?'intro':typeKey==='recommend'||typeKey==='conclusion'?'conclusion':'feature';
    (section.lines||[]).forEach((line,li)=>{
      answer.push({
        text: line,
        phrase: li===0 ? line : null,
        phraseType: li===0 ? phraseType : null,
        label: li===0 ? section.title : null
      });
    });
  });

  return { question: promptMap[currentType]||`Write a report about: ${report.label}`, answer };
}

function renderPractice(){
  const canvas = document.getElementById('practiceCanvas');
  const data = buildPracticeData();
  if(!data){ canvas.innerHTML='<div class="state-msg">No practice data available.</div>'; return; }

  let h = `
    <div class="practice-question-box">
      <div class="pq-label">Practice Question</div>
      <div class="pq-text">${data.question}</div>
    </div>
    <div class="practice-controls">
      <button class="play-btn" id="playBtn" onclick="togglePractice()">▶ Play</button>
      <div class="play-caption" id="practiceCaption">Press Play to hear the model answer</div>
    </div>
    <div class="answer-box">
      <div class="answer-label">Model Answer — phrase banners fire as you listen</div>`;

  data.answer.forEach((line,i)=>{
    const hasPhrase = !!line.phrase;
    h += `<div class="answer-line ${hasPhrase?'has-phrase':''}" id="aLine${i}">
      <div class="answer-dot"></div>
      <div class="answer-text">${line.text}${hasPhrase?`<span class="phrase-tag tag-${line.phraseType||'feature'}">${line.label||'phrase'}</span>`:''}</div>
    </div>`;
  });
  h += '</div>';
  canvas.innerHTML = h;
}

async function togglePractice(){
  if(practiceActive){ stopAllAudio(); return; }
  const data = buildPracticeData();
  if(!data) return;

  practiceActive=true;
  const btn=document.getElementById('playBtn');
  const cap=document.getElementById('practiceCaption');
  const listenBtn=document.getElementById('listenBtn');
  if(btn) btn.textContent='■ Stop';
  if(listenBtn){ listenBtn.classList.add('playing'); document.getElementById('listenIcon').textContent='■'; }

  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));

  for(let i=0;i<data.answer.length;i++){
    if(!practiceActive) break;
    const line = data.answer[i];
    const lineEl = document.getElementById(`aLine${i}`);
    if(cap){ cap.textContent=line.text; cap.classList.add('speaking'); }

    if(line.phrase && line.phraseType){
      const cssClass = line.phraseType==='intro'?'type-intro':line.phraseType==='conclusion'?'type-conclusion':'type-body';
      launchPracticeBanner(line.phrase, line.label||'Key Phrase', cssClass);
    }

    await speakText(line.text);
    if(lineEl) lineEl.classList.add('played');
    if(practiceActive) await wait(600);
  }

  if(practiceActive){
    stopAllAudio();
    if(cap){ cap.textContent='Complete ✦  Press Play to repeat.'; cap.classList.remove('speaking'); }
  }
}

// ══════════════════════════════════════════════════
// PROGRESS + CELEBRATE
// ══════════════════════════════════════════════════
function updateProgress(){
  const pct = totalHidden>0 ? (revealCount/totalHidden)*100 : 0;
  document.getElementById('barFill').style.width = pct+'%';
  const lbl = document.getElementById('progressLabel');
  if(revealCount===0){ lbl.textContent='tap to reveal'; lbl.classList.remove('done'); }
  else if(revealCount===totalHidden){ lbl.textContent='complete ✦'; lbl.classList.add('done'); }
  else { lbl.textContent=`${revealCount} / ${totalHidden}`; lbl.classList.remove('done'); }
}
function celebrate(){
  const el=document.getElementById('celebration');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  soundLand(); soundLand();
  setTimeout(()=>el.classList.remove('show'), 2900);
}

// ══════════════════════════════════════════════════
// MENU
// ══════════════════════════════════════════════════
function toggleMenu(){ document.getElementById('menuDropdown').classList.toggle('open'); }
function closeMenu(){ document.getElementById('menuDropdown').classList.remove('open'); }
document.addEventListener('click',e=>{
  if(!e.target.closest('#menuDropdown')&&!e.target.closest('#menuBtn')) closeMenu();
});
function revealAll(){ closeMenu(); document.querySelectorAll('.reveal-btn:not(.done)').forEach(b=>b.click()); }
function resetAll(){ closeMenu(); stopAllAudio(); renderMode(); }

// ══════════════════════════════════════════════════
// FOOTER NAV
// ══════════════════════════════════════════════════
function navTo(dest){
  if(dest==='model') return;
  stopAllAudio();
  const map={question:'report-question-selector.html',plan:'report-plan.html',builder:'report-builder.html',sample:'report-master.html'};
  if(map[dest]) window.location.href=map[dest];
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') dismissBanner();
});

init();
</script>
