<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Report Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec; --ink:#111111; --white:#ffffff;
  --c-teal:#3d9e95;   --c-teal-lt:#e4f4f2;   --c-teal-mid:#8dccc7;
  --c-coral:#e8723a;  --c-coral-lt:#fdf0ea;   --c-coral-mid:#f5ad87;
  --c-purple:#7b5ea7; --c-purple-lt:#f0ecf8;  --c-purple-mid:#b9a3d3;
  --c-rose:#c94f6d;   --c-rose-lt:#faedf1;    --c-rose-mid:#e89db0;
  --c-gold:#c08b2f;   --c-gold-lt:#fdf6e3;    --c-gold-mid:#e4c073;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}

/* TOPIC TABS */
.topic-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.topic-tabs::-webkit-scrollbar{display:none}
.ttab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.ttab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ttab.active{background:var(--ink);color:#fff}

/* VIEW TOGGLE */
.view-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.15rem;padding:0.4rem 1rem;background:rgba(240,239,236,0.6);border-bottom:1px solid rgba(0,0,0,0.06)}
.vbtn{background:transparent;border:none;padding:0.3rem 0.9rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.6rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s}
.vbtn:hover{color:rgba(0,0,0,0.55)}
.vbtn.active{background:var(--ink);color:#fff}

/* CONTENT AREA */
.content-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.2rem 1.1rem 1rem}
.content-area::-webkit-scrollbar{width:4px}
.content-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px}

/* FOOTER NAV */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ══ SKELETON ══ */
.skel-wrap{display:flex;flex-direction:column;align-items:center;max-width:440px;margin:0 auto}
.skel-banner{width:100%;background:var(--white);border-radius:1.3rem;overflow:hidden;box-shadow:3px 5px 0 rgba(0,0,0,0.06),0 16px 40px rgba(0,0,0,0.12);animation:bannerIn 0.38s cubic-bezier(0.22,1,0.36,1) both;display:flex;flex-direction:column}
@keyframes bannerIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.skel-row{display:flex;align-items:stretch;border-bottom:1px solid rgba(0,0,0,0.05)}
.skel-row:last-child{border-bottom:none}
.skel-strip{width:4px;flex-shrink:0}
.skel-num{flex-shrink:0;width:38px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Sans',sans-serif;font-size:0.85rem;font-weight:400;color:rgba(0,0,0,0.12);padding:0 0.1rem}
.skel-content{flex:1;padding:1.1rem 1.1rem 1.1rem 0.2rem;display:flex;flex-direction:column;gap:0.18rem}
.skel-section-label{font-family:'Instrument Sans',sans-serif;font-size:0.52rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:rgba(0,0,0,0.22);margin-bottom:0.08rem}
.skel-key-phrase{font-family:'Instrument Sans',sans-serif;font-size:0.88rem;font-weight:400;line-height:1.5;color:rgba(0,0,0,0.82)}
.skel-elaboration{font-family:'Instrument Sans',sans-serif;font-size:0.78rem;font-weight:400;line-height:1.45;color:rgba(0,0,0,0.42);margin-top:0.3rem;padding-top:0.3rem;border-top:1px dashed rgba(0,0,0,0.08)}
.skel-footer{display:flex;justify-content:flex-end;padding:0.55rem 0.85rem 0.65rem;border-top:1px solid rgba(0,0,0,0.05)}
.shuffle-btn{display:flex;align-items:center;gap:0.3rem;padding:0.28rem 0.75rem;background:var(--ink);border:none;border-radius:2rem;font-family:'Instrument Sans',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#fff;cursor:pointer;transition:background 0.18s}
.shuffle-btn:hover{background:rgba(17,17,17,0.78)}
.shuffle-btn:active{transform:scale(0.96)}
.shuffle-icon{font-size:0.8rem;display:inline-block;transition:transform 0.4s}
.shuffle-btn.spinning .shuffle-icon{transform:rotate(360deg)}
.skel-bullet-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.18);margin-top:0.52rem;margin-right:0.55rem}
.sr-intro  .skel-strip{background:var(--c-teal)}   .sr-intro  .skel-section-label{color:var(--c-teal)}
.sr-body1  .skel-strip{background:var(--c-coral)}  .sr-body1  .skel-section-label{color:var(--c-coral)}
.sr-body2  .skel-strip{background:var(--c-purple)} .sr-body2  .skel-section-label{color:var(--c-purple)}
.sr-rec    .skel-strip{background:var(--c-rose)}   .sr-rec    .skel-section-label{color:var(--c-rose)}
.sr-conc   .skel-strip{background:var(--c-gold)}   .sr-conc   .skel-section-label{color:var(--c-gold)}

/* ══ PHRASES ══ */
.phrases-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:1.2rem}
.phrase-group{background:var(--white);border-radius:1.1rem;overflow:hidden;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08)}
.phrase-group-head{padding:0.7rem 1.2rem 0.55rem;display:flex;align-items:center;gap:0.6rem;border-bottom:1px solid rgba(0,0,0,0.06)}
.phrase-group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phrase-group-title{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase}
.phrase-group-body{padding:0.8rem 1.2rem 1rem;display:flex;flex-direction:column;gap:0.4rem}
.phrase-row{display:flex;align-items:flex-start;gap:0.5rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;line-height:1.45;color:rgba(0,0,0,0.62);padding:0.3rem 0;border-bottom:1px dashed rgba(0,0,0,0.06)}
.phrase-row:last-child{border-bottom:none}
.phrase-arrow{flex-shrink:0;font-size:0.65rem;margin-top:0.28rem;opacity:0.35}
.pg-intro .phrase-group-dot{background:var(--c-teal)}   .pg-intro .phrase-group-title{color:var(--c-teal)}   .pg-intro .phrase-arrow{color:var(--c-teal)}
.pg-coral .phrase-group-dot{background:var(--c-coral)}  .pg-coral .phrase-group-title{color:var(--c-coral)}  .pg-coral .phrase-arrow{color:var(--c-coral)}
.pg-purple .phrase-group-dot{background:var(--c-purple)}.pg-purple .phrase-group-title{color:var(--c-purple)}.pg-purple .phrase-arrow{color:var(--c-purple)}
.pg-rose .phrase-group-dot{background:var(--c-rose)}    .pg-rose .phrase-group-title{color:var(--c-rose)}    .pg-rose .phrase-arrow{color:var(--c-rose)}
.pg-gold .phrase-group-dot{background:var(--c-gold)}    .pg-gold .phrase-group-title{color:var(--c-gold)}    .pg-gold .phrase-arrow{color:var(--c-gold)}

/* ══ PRACTICE — LAYOUT ══ */
.practice-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}

.practice-q{background:var(--white);border-radius:1.1rem;padding:1.1rem 1.4rem;border-left:4px solid var(--c-gold);box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08)}
.practice-q-label{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:var(--c-gold);margin-bottom:0.4rem}
.practice-q-text{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;font-style:italic;line-height:1.5;color:var(--ink)}

.practice-controls-row{
  display:flex;align-items:center;justify-content:space-between;gap:0.75rem;
  background:var(--white);border-radius:1.1rem;
  padding:0.75rem 1.1rem;
  box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08);
}
.practice-mode-toggle{display:flex;align-items:center;background:rgba(0,0,0,0.06);border-radius:2rem;padding:0.2rem;gap:0.1rem}
.pmt-btn{background:transparent;border:none;padding:0.26rem 0.75rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.pmt-btn.active{background:var(--ink);color:#fff}
.pmt-btn:hover:not(.active){color:rgba(0,0,0,0.6)}

.play-btn{display:flex;align-items:center;gap:0.4rem;padding:0.44rem 1rem;background:var(--ink);color:#fff;border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.play-btn:hover{background:rgba(17,17,17,0.8)}
.play-btn:disabled{opacity:0.3;cursor:not-allowed}
.play-btn.text-mode{background:rgba(0,0,0,0.07);color:rgba(0,0,0,0.45)}
.play-btn.text-mode:hover{background:rgba(0,0,0,0.12);color:rgba(0,0,0,0.7)}

/* ══ TRANSCRIPT ══ */
.transcript-wrap{
  background:var(--white);border-radius:1.1rem;
  padding:1rem 1.4rem;
  box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08);
}
.transcript-label{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(0,0,0,0.2);margin-bottom:0.75rem}
.transcript-line{
  font-family:'Instrument Sans',sans-serif;
  font-size:0.88rem;font-weight:400;line-height:1.6;
  color:rgba(0,0,0,0.72);
  padding:0.35rem 0;
  border-bottom:1px dashed rgba(0,0,0,0.05);
  transition:all 0.35s ease;
  border-radius:0.25rem;
}
.transcript-line:last-child{border-bottom:none}
.transcript-line.active{color:var(--ink);font-weight:500;background:rgba(192,139,47,0.06);padding-left:0.5rem;margin-left:-0.5rem}
.transcript-line.done{color:rgba(0,0,0,0.32);font-weight:400}
.transcript-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;padding:0.1rem 0.42rem;border-radius:2rem;margin-left:0.4rem;vertical-align:middle}
.tag-intro{background:rgba(61,158,149,0.12);color:var(--c-teal)}
.tag-feature{background:rgba(232,114,58,0.12);color:var(--c-coral)}
.tag-conclusion{background:rgba(123,94,167,0.12);color:var(--c-purple)}

/* ══════════════════════════════════════════════════
   INFOGRAPHIC LISTEN OVERLAY — bold poster style
   ══════════════════════════════════════════════════ */

.listen-overlay{
  position:fixed;inset:0;z-index:800;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.25rem 1.25rem 1rem;
  background:#16181d;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s ease;
}
.listen-overlay.active{ opacity:1;pointer-events:all; }

/* ── Overlay top bar ── */
.lo-topbar{
  width:100%;max-width:480px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:0.9rem;flex-shrink:0;
}
.lo-brand{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.58rem;font-weight:900;letter-spacing:0.32em;text-transform:uppercase;
  color:rgba(255,255,255,0.15);
}
.lo-close-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  width:26px;height:26px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.65rem;color:rgba(255,255,255,0.3);
  transition:all 0.2s;
}
.lo-close-btn:hover{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75)}

/* ══ THE POSTER CARD ══ */
.infographic-card{
  position:relative;
  width:min(480px, 96vw);
  /* Square-ish: enforce aspect ratio via min-height */
  min-height:min(420px, 80vw);
  background:#ffffff;
  border-radius:4px; /* nearly square corners — poster feel */
  overflow:visible;
  display:flex;flex-direction:column;
  box-shadow:
    6px 6px 0 rgba(255,255,255,0.04),
    10px 16px 0 rgba(0,0,0,0.45),
    0 40px 90px rgba(0,0,0,0.65);
  transform:translateY(28px) scale(0.93);
  transition:transform 0.48s cubic-bezier(0.34,1.46,0.64,1),opacity 0.35s ease;
  opacity:0;flex-shrink:0;
}
.listen-overlay.active .infographic-card{
  transform:translateY(0) scale(1);opacity:1;
}

/* ── Left coloured sidebar stripe ── */
.info-left-stripe{
  position:absolute;
  left:0;top:0;bottom:0;
  width:7px;
  border-radius:4px 0 0 4px;
  transition:background 0.4s ease;
  z-index:5;
}

/* ── Coloured bottom accent bar ── */
.info-bottom-line{
  height:6px;width:100%;flex-shrink:0;
  border-radius:0 0 4px 4px;
  transition:background 0.4s ease;
}

/* ── Number badge — proud top-left, outside card ── */
.info-num-badge{
  position:absolute;
  top:-1rem;left:1.6rem;
  width:3.4rem;height:3.4rem;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.4rem;font-weight:900;letter-spacing:0;
  color:#fff;
  transition:background 0.4s ease;
  box-shadow:4px 5px 0 rgba(0,0,0,0.3),0 10px 24px rgba(0,0,0,0.35);
  z-index:10;
  /* folded top-right corner */
  clip-path:polygon(0 0, calc(100% - 11px) 0, 100% 11px, 100% 100%, 0 100%);
}

/* ── Card inner content ── */
.info-card-body{
  padding:1.8rem 1.8rem 0 2.2rem; /* extra left padding to clear stripe */
  display:flex;flex-direction:column;
  flex:1;
}

/* Big section title — the hero element */
.info-section-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(2rem,6vw,3rem);
  font-weight:900;
  letter-spacing:0.04em;
  text-transform:uppercase;
  color:#0d0d0d;
  line-height:0.95;
  margin-top:1.5rem; /* clear the badge */
  margin-bottom:0;
}

/* Coloured rule under title */
.info-title-rule{
  width:3.5rem;height:4px;border-radius:2px;
  margin:0.7rem 0 1.1rem;
  flex-shrink:0;
  transition:background 0.4s ease;
}

/* Main sentence — generous size */
.info-sentence{
  font-family:'Instrument Sans',sans-serif;
  font-size:clamp(0.95rem,2.5vw,1.12rem);
  font-weight:400;
  line-height:1.7;
  color:rgba(0,0,0,0.58);
  flex:1;
  animation:sentIn 0.42s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes sentIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Card foot: icon + wave ── */
.info-card-foot{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0.6rem 1.8rem 1rem 2.2rem;
}
.info-icon{
  font-size:1.6rem;opacity:0.4;
  transition:opacity 0.3s;
  line-height:1;
}

/* Waveform — taller bars, poster-weight */
.info-wave{
  display:flex;align-items:flex-end;gap:4px;
}
.info-wave-bar{
  width:4px;border-radius:3px;
  animation:waveAnim 1.1s ease-in-out infinite;
  transition:background 0.4s ease;
}
.info-wave-bar:nth-child(1){height:8px; animation-delay:0s}
.info-wave-bar:nth-child(2){height:18px;animation-delay:0.08s}
.info-wave-bar:nth-child(3){height:30px;animation-delay:0.18s}
.info-wave-bar:nth-child(4){height:22px;animation-delay:0.12s}
.info-wave-bar:nth-child(5){height:11px;animation-delay:0.04s}
.info-wave-bar:nth-child(6){height:24px;animation-delay:0.22s}
.info-wave-bar:nth-child(7){height:16px;animation-delay:0.09s}
@keyframes waveAnim{
  0%,100%{transform:scaleY(0.28);opacity:0.22}
  50%{transform:scaleY(1);opacity:1}
}
.info-wave.paused .info-wave-bar{animation:none;transform:scaleY(0.28);opacity:0.15}

/* ── Progress + controls ── */
.lo-bottom{
  width:min(480px,96vw);
  margin-top:0.9rem;
  display:flex;flex-direction:column;gap:0.5rem;
  flex-shrink:0;
}
.info-progress-track{
  width:100%;height:3px;
  background:rgba(255,255,255,0.08);
  border-radius:2px;overflow:hidden;
}
.info-progress-fill{
  height:100%;border-radius:2px;
  transition:width 0.4s ease,background 0.4s ease;
}
.lo-controls-row{
  display:flex;align-items:center;justify-content:space-between;
}
.lo-counter{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.58rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(255,255,255,0.2);
}
.lo-btns{display:flex;align-items:center;gap:0.4rem}
.lo-btn{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.6rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);
  padding:0.3rem 0.85rem;border-radius:3px;
  color:rgba(255,255,255,0.38);cursor:pointer;
  transition:all 0.2s;white-space:nowrap;
}
.lo-btn:hover{background:rgba(255,255,255,0.13);color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.18)}
.lo-btn.primary{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.65);border-color:rgba(255,255,255,0.12)}
.lo-btn.primary:hover{background:rgba(255,255,255,0.18);color:#fff}

.loading-msg{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.25);letter-spacing:0.12em;text-transform:uppercase}

@media(max-width:480px){
  .info-content{padding:1.3rem 1.4rem 1rem}
  .info-footer{padding:0.65rem 1.4rem 0.9rem}
  .info-sentence{font-size:clamp(0.95rem,4.5vw,1.1rem)}
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="/?openModal=writing&submenu=reports">← Reports</a>
    <span class="brand">INTUITY</span>
    <div style="width:60px"></div>
  </div>
  <div class="topic-tabs" id="topicTabs"></div>
  <div class="view-bar">
    <button class="vbtn active" data-view="skeleton" onclick="setView('skeleton')">Skeleton</button>
    <button class="vbtn" data-view="phrases"  onclick="setView('phrases')">Phrases</button>
    <button class="vbtn" data-view="practice" onclick="setView('practice')">Practice</button>
  </div>
  <div class="content-area" id="contentArea">
    <div class="loading-msg" style="display:flex;align-items:center;justify-content:center;height:100%">Loading…</div>
  </div>
  <div class="foot">
    <div class="nav-pill">
      <button class="nb" onclick="navTo('question')">Question</button>
      <button class="nb" onclick="navTo('plan')">Plan</button>
      <button class="nb on">Model</button>
      <button class="nb" onclick="navTo('builder')">Builder</button>
      <button class="nb" onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>

<!-- ══ INFOGRAPHIC LISTEN OVERLAY ══ -->
<div class="listen-overlay" id="listenOverlay">

  <!-- Top bar -->
  <div class="lo-topbar">
    <span class="lo-brand">INTUITY — Model Answer</span>
    <button class="lo-close-btn" onclick="stopPractice()">✕</button>
  </div>

  <!-- White infographic card -->
  <div class="infographic-card" id="infographicCard">
    <!-- Left coloured stripe -->
    <div class="info-left-stripe" id="infoLeftStripe"></div>
    <!-- Hanging number badge -->
    <div class="info-num-badge" id="infoNumBadge">01</div>

    <!-- Card body -->
    <div class="info-card-body">
      <!-- Section title -->
      <div class="info-section-title" id="infoSectionTitle">Introduction</div>
      <!-- Coloured rule under title -->
      <div class="info-title-rule" id="infoTitleRule"></div>
      <!-- Sentence -->
      <div class="info-sentence" id="infoSentence">Loading…</div>
    </div>

    <!-- Card foot: icon + waveform -->
    <div class="info-card-foot">
      <div class="info-icon" id="infoIcon">📋</div>
      <div class="info-wave" id="infoWave">
        <div class="info-wave-bar" id="iwb1"></div>
        <div class="info-wave-bar" id="iwb2"></div>
        <div class="info-wave-bar" id="iwb3"></div>
        <div class="info-wave-bar" id="iwb4"></div>
        <div class="info-wave-bar" id="iwb5"></div>
        <div class="info-wave-bar" id="iwb6"></div>
        <div class="info-wave-bar" id="iwb7"></div>
      </div>
    </div>

    <!-- Bottom coloured line -->
    <div class="info-bottom-line" id="infoBottomLine"></div>
  </div>

  <!-- Progress + controls below the card -->
  <div class="lo-bottom">
    <div class="info-progress-track">
      <div class="info-progress-fill" id="infoProgressFill" style="width:0%"></div>
    </div>
    <div class="lo-controls-row">
      <span class="lo-counter" id="infoCounter">1 / 1</span>
      <div class="lo-btns">
        <button class="lo-btn primary" id="infoPauseBtn" onclick="togglePausePractice()">⏸ Pause</button>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let skeletonData = null, phraseData = null;
let currentType = 'school-facilities', currentView = 'skeleton';
let practiceQuestions = null, currentPracticeQ = 0;
let practiceMode = 'text';
let practiceActive = false;
let practicePaused = false;
let synth = window.speechSynthesis;
let narrator = null;

// Section colour palette
const SECTION_COLORS = [
  { bg:'#1a4a47', accent:'#3d9e95', badge:'#3d9e95', icon:'📋' },  // intro teal
  { bg:'#3d1f0d', accent:'#e8723a', badge:'#e8723a', icon:'🏫' },  // body1 coral
  { bg:'#231630', accent:'#7b5ea7', badge:'#7b5ea7', icon:'⚠️' },  // body2 purple
  { bg:'#3a0f1e', accent:'#c94f6d', badge:'#c94f6d', icon:'💡' },  // rec rose
  { bg:'#2d2000', accent:'#c08b2f', badge:'#c08b2f', icon:'✅' },  // conc gold
];

const PHRASE_COLORS  = ['pg-intro','pg-coral','pg-purple','pg-rose','pg-gold'];
const SKEL_SECTIONS=[
  {label:'Introduction',     color:'sr-intro', catHint:'intro'},
  {label:'Current Situation',color:'sr-body1', catHint:'current'},
  {label:'Problems',         color:'sr-body2', catHint:'problem'},
  {label:'Recommendations',  color:'sr-rec',   catHint:'recommend'},
  {label:'Conclusion',       color:'sr-conc',  catHint:'conclusion'},
];

function sectionColorIdx(label) {
  const l = (label||'').toLowerCase();
  if (l.includes('intro'))   return 0;
  if (l.includes('current') || l.includes('exist') || l.includes('activit') || l.includes('facilit') || l.includes('positive')) return 1;
  if (l.includes('problem') || l.includes('issue') || l.includes('improv'))  return 2;
  if (l.includes('recommend')) return 3;
  if (l.includes('conclu'))    return 4;
  return 1;
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init(){
  try{
    const [r1,r2] = await Promise.all([
      fetch('data/complete-report-phrase-bank.json'),
      fetch('data/complete-report-phrase-bank1.json')
    ]);
    skeletonData = await r1.json();
    phraseData   = await r2.json();
    practiceQuestions = buildPractice();
    buildTabs();
    render();
  } catch(e){
    document.getElementById('contentArea').innerHTML =
      '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4);font-family:Barlow,sans-serif">⚠ Could not load data</div>';
  }
}

function buildTabs(){
  const types = Object.keys(skeletonData).filter(k=>k!=='meta');
  document.getElementById('topicTabs').innerHTML = types.map(k=>
    `<button class="ttab ${k===currentType?'active':''}" onclick="switchType('${k}')">${skeletonData[k].label}</button>`
  ).join('');
}
function switchType(type){ stopPractice(); currentType=type; currentPracticeQ=0; buildTabs(); render(); }
function setView(v){ stopPractice(); currentView=v; document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); render(); }

function render(){
  const area = document.getElementById('contentArea');
  if(currentView==='skeleton')      area.innerHTML = renderSkeleton();
  else if(currentView==='phrases')  area.innerHTML = renderPhrases();
  else                              area.innerHTML = renderPracticeHTML();
}

// ══════════════════════════════════════════
// SKELETON
// ══════════════════════════════════════════
function pickRandom(arr){return arr[Math.floor(Math.random()*arr.length)]}
function getAllPhrasesForSection(catHint){
  const bank=phraseData[currentType];
  if(!bank||!bank.categories)return[];
  const all=[];
  bank.categories.forEach(cat=>{
    const t=cat.title.toLowerCase();
    const m=(catHint==='intro'&&t.includes('intro'))||(catHint==='current'&&(t.includes('current')||t.includes('existing')||t.includes('facilit')||t.includes('activit')||t.includes('positive')||t.includes('accommodation')||t.includes('teaching')||t.includes('company')||t.includes('project')))||(catHint==='problem'&&(t.includes('problem')||t.includes('improv')||t.includes('issue')||t.includes('complaint')||t.includes('feedback')||t.includes('difficult')||t.includes('outcome')||t.includes('skill')||t.includes('effective')||t.includes('achiev')))||(catHint==='recommend'&&t.includes('recommend'))||(catHint==='conclusion'&&t.includes('conclusion'));
    if(m)cat.subcategories.forEach(sub=>sub.phrases.forEach(p=>all.push(p)));
  });
  if(!all.length)bank.categories.forEach(cat=>cat.subcategories.forEach(sub=>sub.phrases.forEach(p=>all.push(p))));
  return all;
}
function pickTwo(pool){
  if(pool.length<2)return[pool[0]||'…',''];
  const openers=pool.filter(p=>/^the (aim|purpose|main objective|report seeks|report focuses|report provides|report covers)/i.test(p));
  const elaborations=pool.filter(p=>/^(this report is based|the relevant information|data was gathered|information was (collected|obtained|gathered)|the placement|the programme|the report is based)/i.test(p));
  const opener=openers.length?pickRandom(openers):pickRandom(pool);
  const elab=elaborations.length?pickRandom(elaborations):pickRandom(pool.filter(p=>p!==opener))||'';
  return[opener,elab];
}
function buildRow(sec,i){
  const pool=getAllPhrasesForSection(sec.catHint);
  if(sec.catHint==='intro'){
    const[opener,elab]=pickTwo(pool);
    return`<div class="skel-row ${sec.color}"><div class="skel-strip"></div><div class="skel-num">${String(i+1).padStart(2,'0')}</div><div class="skel-content"><div class="skel-section-label">${sec.label}</div><div style="display:flex;align-items:flex-start"><div class="skel-bullet-dot"></div><div class="skel-key-phrase">${opener}</div></div>${elab?`<div class="skel-elaboration">${elab}</div>`:''}</div></div>`;
  }
  const phrase=pool.length?pickRandom(pool):'…';
  return`<div class="skel-row ${sec.color}"><div class="skel-strip"></div><div class="skel-num">${String(i+1).padStart(2,'0')}</div><div class="skel-content"><div class="skel-section-label">${sec.label}</div><div style="display:flex;align-items:flex-start"><div class="skel-bullet-dot"></div><div class="skel-key-phrase">${phrase}</div></div></div></div>`;
}
function buildSkeletonBanner(){
  const rows=SKEL_SECTIONS.map((sec,i)=>buildRow(sec,i)).join('');
  return`<div class="skel-wrap"><div class="skel-banner" id="skelBanner">${rows}<div class="skel-footer"><button class="shuffle-btn" id="shuffleBtn" onclick="shuffleSkeleton()"><span class="shuffle-icon">⟳</span> Shuffle</button></div></div></div>`;
}
function renderSkeleton(){
  const bank=phraseData[currentType];
  if(!bank||!bank.categories)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4);font-family:Barlow,sans-serif">No phrase data available</div>';
  return buildSkeletonBanner();
}
function shuffleSkeleton(){
  const btn=document.getElementById('shuffleBtn');
  if(btn){btn.classList.add('spinning');setTimeout(()=>btn.classList.remove('spinning'),400)}
  const banner=document.getElementById('skelBanner');
  if(!banner)return;
  const footer=banner.querySelector('.skel-footer');
  banner.innerHTML=SKEL_SECTIONS.map((sec,i)=>buildRow(sec,i)).join('');
  banner.appendChild(footer);
}

// ══════════════════════════════════════════
// PHRASES
// ══════════════════════════════════════════
function renderPhrases(){
  const bank=phraseData[currentType];
  if(!bank||!bank.categories)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4);font-family:Barlow,sans-serif">No phrases available</div>';
  let h='<div class="phrases-wrap">';
  bank.categories.forEach((cat,i)=>{
    const color=PHRASE_COLORS[i%PHRASE_COLORS.length];
    h+=`<div class="phrase-group ${color}"><div class="phrase-group-head"><div class="phrase-group-dot"></div><div class="phrase-group-title">${cat.title}</div></div><div class="phrase-group-body">`;
    cat.subcategories.forEach(sub=>sub.phrases.forEach(p=>{h+=`<div class="phrase-row"><span class="phrase-arrow">→</span><span>${p}</span></div>`}));
    h+='</div></div>';
  });
  return h+'</div>';
}

// ══════════════════════════════════════════
// PRACTICE — BUILD DATA
// ══════════════════════════════════════════
const PROMPT_MAP={
  'school-facilities':'You have been asked to write a report assessing your school\'s facilities and recommending improvements.',
  'exchange-programme':'Your school has recently organised a two-week exchange programme. Write a report evaluating it and recommending whether it should continue.',
  'sports-facilities':'The local council has asked you to write a report evaluating the sports centre and suggesting improvements for young people.',
  'school-trip':'Write a report evaluating a recent educational school trip and suggesting improvements for future visits.',
  'library-services':'Write a report assessing the school library services and recommending improvements.',
  'work-experience':'Write a report evaluating a recent work experience placement and recommending whether it should continue.',
  'cafeteria-services':'Write a report assessing the school cafeteria and suggesting improvements.',
  'environmental-initiative':'Write a report evaluating the recent environmental project and recommending whether similar projects should be organised.',
  'youth-club':'Write a report assessing the youth club and recommending improvements.',
  'language-course':'Write a report evaluating a language course you attended and suggesting improvements.'
};

function buildPractice(){
  const out={};
  Object.keys(skeletonData).forEach(key=>{
    if(key==='meta')return;
    const topic=skeletonData[key];
    if(!topic.skeletons)return;
    out[key]=topic.skeletons.map(v=>{
      const answer=[];
      v.skeleton.forEach(sec=>{
        const t=sec.title.toLowerCase();
        const pt=t.includes('intro')?'intro':(t.includes('recommend')||t.includes('conclusion'))?'conclusion':'feature';
        (sec.lines||[]).forEach((line,li)=>{
          answer.push({
            text: line,
            sectionLabel: sec.title,
            isFirstLine: li===0,
            phraseType: li===0 ? pt : null,
          });
        });
      });
      return{question:PROMPT_MAP[key]||`Write a report about: ${topic.label}`, answer};
    });
  });
  return out;
}

// ══════════════════════════════════════════
// PRACTICE — HTML
// ══════════════════════════════════════════
function renderPracticeHTML(){
  const set=practiceQuestions[currentType]||[];
  if(!set.length)return'<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4);font-family:Barlow,sans-serif">No practice available</div>';
  const data=set[currentPracticeQ];
  const total=set.length;

  let transcriptLines='';
  data.answer.forEach((l,i)=>{
    const tag=l.isFirstLine&&l.phraseType
      ?`<span class="transcript-tag tag-${l.phraseType}">${l.sectionLabel}</span>`:'';
    transcriptLines+=`<div class="transcript-line" id="tl${i}">${l.text}${tag}</div>`;
  });

  const isTextMode = practiceMode === 'text';

  return`<div class="practice-wrap">
    <div class="practice-q">
      <div class="practice-q-label">Practice Question ${currentPracticeQ+1} of ${total}</div>
      <div class="practice-q-text">${data.question}</div>
    </div>

    <div class="practice-controls-row">
      <div class="practice-mode-toggle">
        <button class="pmt-btn ${practiceMode==='text'?'active':''}" data-pm="text"   onclick="setPracticeMode('text')">Read along</button>
        <button class="pmt-btn ${practiceMode==='listen'?'active':''}" data-pm="listen" onclick="setPracticeMode('listen')">Just listen</button>
      </div>
      <button class="play-btn ${isTextMode?'text-mode':''}" id="playBtn" onclick="startPractice()">▶ ${isTextMode?'Read along':'Play'}</button>
    </div>

    <div class="transcript-wrap" id="transcriptWrap">
      <div class="transcript-label">Model answer</div>
      ${transcriptLines}
    </div>
  </div>`;
}

// ══════════════════════════════════════════
// PRACTICE — MODE SWITCH
// ══════════════════════════════════════════
function setPracticeMode(m){
  if(m===practiceMode)return;
  stopPractice();
  practiceMode=m;
  render();
}

// ══════════════════════════════════════════
// PRACTICE — PLAY
// ══════════════════════════════════════════
async function startPractice(){
  if(practiceActive){stopPractice();return;}
  const set=practiceQuestions[currentType]||[];
  const data=set[currentPracticeQ];
  if(!data)return;

  practiceActive=true;
  practicePaused=false;
  narrator=await getVoice();

  const btn=document.getElementById('playBtn');
  if(btn){btn.textContent='■ Stop';btn.classList.remove('text-mode')}

  if(practiceMode==='listen'){
    showListenOverlay(true);
  }

  for(let i=0;i<data.answer.length;i++){
    if(!practiceActive)break;

    // Wait while paused
    while(practicePaused && practiceActive){ await wait(150); }
    if(!practiceActive)break;

    const line=data.answer[i];

    if(practiceMode==='text'){
      document.querySelectorAll('.transcript-line').forEach((el,j)=>{
        el.classList.toggle('active', j===i);
        if(j<i)el.classList.add('done');
      });
      const cur=document.getElementById('tl'+i);
      if(cur)cur.scrollIntoView({behavior:'smooth',block:'nearest'});
    } else {
      updateInfoPoster(line, i, data.answer.length);
    }

    await speakLine(line.text);
    if(practiceActive && !practicePaused) await wait(practiceMode==='listen'?500:300);
  }

  if(practiceActive){
    if(practiceMode==='text'){
      document.querySelectorAll('.transcript-line').forEach(el=>{el.classList.remove('active');el.classList.add('done')});
    }
    stopPractice();
    const btn=document.getElementById('playBtn');
    if(btn){
      btn.textContent=practiceMode==='text'?'▶ Read along':'▶ Play again';
      if(practiceMode==='text')btn.classList.add('text-mode');
    }
  }
}

// ══════════════════════════════════════════
// INFOGRAPHIC POSTER UPDATE
// ══════════════════════════════════════════
function updateInfoPoster(line, idx, total){
  const ci = sectionColorIdx(line.sectionLabel);
  const palette = SECTION_COLORS[ci];
  const numStr = String(idx + 1).padStart(2, '0');
  const pct = Math.round(((idx+1)/total)*100);

  // Left stripe
  document.getElementById('infoLeftStripe').style.background = palette.accent;
  // Badge colour
  document.getElementById('infoNumBadge').textContent = numStr;
  document.getElementById('infoNumBadge').style.background = palette.badge;

  // Section title (elegant uppercase)
  document.getElementById('infoSectionTitle').textContent = (line.sectionLabel||'').toUpperCase();
  document.getElementById('infoSectionTitle').style.color = '#111111';

  // Coloured rule under title
  document.getElementById('infoTitleRule').style.background = palette.accent;

  // Bottom accent line
  document.getElementById('infoBottomLine').style.background = palette.accent;

  // Waveform bars coloured
  document.querySelectorAll('.info-wave-bar').forEach(b => b.style.background = palette.accent);

  // Progress fill coloured
  document.getElementById('infoProgressFill').style.background = palette.accent;
  document.getElementById('infoProgressFill').style.width = pct + '%';

  // Icon
  document.getElementById('infoIcon').textContent = palette.icon;

  // Counter
  document.getElementById('infoCounter').textContent = `${idx+1} / ${total}`;

  // Sentence — re-trigger animation
  const sentEl = document.getElementById('infoSentence');
  sentEl.style.animation = 'none';
  void sentEl.offsetWidth;
  sentEl.style.animation = '';
  sentEl.textContent = line.text;

  // Wave active
  document.getElementById('infoWave').classList.remove('paused');
  document.getElementById('infoPauseBtn').textContent = '⏸ Pause';
}

// ══════════════════════════════════════════
// OVERLAY
// ══════════════════════════════════════════
function showListenOverlay(show){
  const ov=document.getElementById('listenOverlay');
  if(show){
    ov.classList.add('active');
  } else {
    ov.classList.remove('active');
    const wave=document.getElementById('infoWave');
    if(wave)wave.classList.add('paused');
  }
}

// ══════════════════════════════════════════
// PAUSE / RESUME
// ══════════════════════════════════════════
function togglePausePractice(){
  if(!practiceActive)return;
  const btn=document.getElementById('infoPauseBtn');
  if(practicePaused){
    practicePaused=false;
    if(btn)btn.textContent='⏸ Pause';
    document.getElementById('infoWave').classList.remove('paused');
  } else {
    practicePaused=true;
    synth.cancel();
    if(btn)btn.textContent='▶ Resume';
    document.getElementById('infoWave').classList.add('paused');
  }
}

// ══════════════════════════════════════════
// STOP
// ══════════════════════════════════════════
function stopPractice(){
  practiceActive=false;
  practicePaused=false;
  synth.cancel();
  showListenOverlay(false);

  const btn=document.getElementById('playBtn');
  if(btn){
    btn.textContent = practiceMode==='text' ? '▶ Read along' : '▶ Play';
    btn.classList.toggle('text-mode', practiceMode==='text');
  }
  document.querySelectorAll('.transcript-line').forEach(el=>el.classList.remove('active','done'));
}

// ══════════════════════════════════════════
// SPEECH
// ══════════════════════════════════════════
async function getVoice(){
  return new Promise(res=>{
    const load=()=>{
      const v=synth.getVoices();
      const f=v.find(x=>x.name==='Google UK English Male')
        ||v.find(x=>x.name==='Daniel')
        ||v.find(x=>x.lang==='en-GB')
        ||v.find(x=>x.lang.startsWith('en'))
        ||v[0]||null;
      res(f);
    };
    if(synth.getVoices().length)load();
    else synth.onvoiceschanged=load;
  });
}

function speakLine(text){
  return new Promise(res=>{
    if(!practiceActive){res();return;}
    synth.cancel();
    setTimeout(()=>{
      if(!practiceActive){res();return;}
      const utt=new SpeechSynthesisUtterance(text);
      utt.voice=narrator;utt.rate=0.88;utt.pitch=1.05;utt.volume=1;
      utt.onend=()=>res();utt.onerror=()=>res();
      synth.speak(utt);
    },80);
  });
}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}

// ══════════════════════════════════════════
// NAV & KEYBOARD
// ══════════════════════════════════════════
function navTo(dest){
  stopPractice();
  const map={question:'report-question-selector.html',plan:'report-plan.html',builder:'report-builder.html',sample:'report-master.html'};
  if(map[dest])window.location.href=map[dest];
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')stopPractice();
  if(!skeletonData)return;
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const idx=types.indexOf(currentType)+(e.key==='ArrowRight'?1:-1);
    if(idx>=0&&idx<types.length)switchType(types[idx]);
  }
});

init();
</script>
</body>
</html>
