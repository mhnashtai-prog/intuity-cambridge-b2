<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Report Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;
  --ink:#111111;
  --white:#ffffff;
  --c-teal:#3d9e95;   --c-teal-lt:#e4f4f2;   --c-teal-mid:#8dccc7;
  --c-coral:#e8723a;  --c-coral-lt:#fdf0ea;   --c-coral-mid:#f5ad87;
  --c-purple:#7b5ea7; --c-purple-lt:#f0ecf8;  --c-purple-mid:#b9a3d3;
  --c-rose:#c94f6d;   --c-rose-lt:#faedf1;    --c-rose-mid:#e89db0;
  --c-gold:#c08b2f;   --c-gold-lt:#fdf6e3;    --c-gold-mid:#e4c073;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}

/* ── SHELL ── */
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}

/* ── TOPIC TABS ── */
.topic-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.topic-tabs::-webkit-scrollbar{display:none}
.ttab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.ttab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ttab.active{background:var(--ink);color:#fff}

/* ── VIEW TOGGLE ── */
.view-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.15rem;padding:0.4rem 1rem;background:rgba(240,239,236,0.6);border-bottom:1px solid rgba(0,0,0,0.06)}
.vbtn{background:transparent;border:none;padding:0.3rem 0.9rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.6rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s}
.vbtn:hover{color:rgba(0,0,0,0.55)}
.vbtn.active{background:var(--ink);color:#fff}

/* ── CONTENT AREA ── */
.content-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.2rem 1.1rem 1rem}
.content-area::-webkit-scrollbar{width:4px}
.content-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px}

/* ── FOOTER NAV ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ══════════════════════════════
   SKELETON POSTER CARDS
   ══════════════════════════════ */
.skeleton-stack{display:flex;flex-direction:column;gap:1rem;max-width:480px;margin:0 auto}

.skel-card{
  background:var(--white);
  border-radius:1.2rem;
  display:flex;flex-direction:column;
  overflow:visible;position:relative;
  box-shadow:3px 5px 0 rgba(0,0,0,0.05),0 12px 32px rgba(0,0,0,0.1);
  animation:skelFadeIn 0.4s ease both;
}
@keyframes skelFadeIn{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
.skel-card:nth-child(2){animation-delay:0.07s}
.skel-card:nth-child(3){animation-delay:0.14s}
.skel-card:nth-child(4){animation-delay:0.21s}
.skel-card:nth-child(5){animation-delay:0.28s}

/* Flag */
.skel-flag{
  position:absolute;top:-2px;left:1.4rem;
  width:44px;z-index:5;
}
.skel-flag-body{
  width:100%;padding:0.38rem 0 0.28rem;
  display:flex;align-items:center;justify-content:center;
  position:relative;border-radius:0 0 0 0;
}
.skel-flag-body::after{
  content:'';position:absolute;bottom:-7px;left:0;right:0;height:8px;
  background:inherit;
  clip-path:polygon(0% 0%,10% 100%,20% 0%,30% 100%,40% 0%,50% 100%,60% 0%,70% 100%,80% 0%,90% 100%,100% 0%);
}
.skel-flag-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.4rem;font-weight:900;color:#fff;line-height:1;
}

/* Card body */
.skel-body{padding:3rem 1.5rem 1.2rem;display:flex;flex-direction:column;gap:0}

.skel-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.58rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(0,0,0,0.28);margin-bottom:0.6rem;
}

/* Key phrase — large italic coloured */
.skel-phrase{
  font-family:'Playfair Display',serif;
  font-size:1rem;font-weight:700;font-style:italic;
  line-height:1.45;
  padding-bottom:0.75rem;margin-bottom:0.75rem;
  border-bottom:1.5px dashed rgba(0,0,0,0.09);
}

/* Stem */
.skel-stem{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.3rem;font-weight:800;text-transform:uppercase;
  line-height:1.1;color:var(--ink);margin-bottom:0.65rem;
}

/* Bullets */
.skel-bullets{
  display:flex;flex-direction:column;gap:0.35rem;
  padding-left:0.9rem;border-left:2.5px solid;margin-left:0.15rem;
}
.skel-bullet{
  display:flex;align-items:flex-start;gap:0.45rem;
  font-family:'Barlow',sans-serif;
  font-size:0.78rem;font-weight:600;line-height:1.35;color:rgba(0,0,0,0.52);
}
.skel-arrow{flex-shrink:0;font-size:0.65rem;margin-top:0.1rem;opacity:0.45}

/* Accent bar */
.skel-bar{height:4px;border-radius:0 0 1.2rem 1.2rem}

/* ── Section colour themes ── */
.sc-intro   .skel-flag-body{background:var(--c-teal)}
.sc-intro   .skel-phrase{color:var(--c-teal)}
.sc-intro   .skel-stem{color:var(--c-teal)}
.sc-intro   .skel-bullets{border-color:var(--c-teal-mid)}
.sc-intro   .skel-arrow{color:var(--c-teal)}
.sc-intro   .skel-bar{background:var(--c-teal)}

.sc-body1   .skel-flag-body{background:var(--c-coral)}
.sc-body1   .skel-phrase{color:var(--c-coral)}
.sc-body1   .skel-stem{color:var(--c-coral)}
.sc-body1   .skel-bullets{border-color:var(--c-coral-mid)}
.sc-body1   .skel-arrow{color:var(--c-coral)}
.sc-body1   .skel-bar{background:var(--c-coral)}

.sc-body2   .skel-flag-body{background:var(--c-purple)}
.sc-body2   .skel-phrase{color:var(--c-purple)}
.sc-body2   .skel-stem{color:var(--c-purple)}
.sc-body2   .skel-bullets{border-color:var(--c-purple-mid)}
.sc-body2   .skel-arrow{color:var(--c-purple)}
.sc-body2   .skel-bar{background:var(--c-purple)}

.sc-rec     .skel-flag-body{background:var(--c-rose)}
.sc-rec     .skel-phrase{color:var(--c-rose)}
.sc-rec     .skel-stem{color:var(--c-rose)}
.sc-rec     .skel-bullets{border-color:var(--c-rose-mid)}
.sc-rec     .skel-arrow{color:var(--c-rose)}
.sc-rec     .skel-bar{background:var(--c-rose)}

.sc-conc    .skel-flag-body{background:var(--c-gold)}
.sc-conc    .skel-phrase{color:var(--c-gold)}
.sc-conc    .skel-stem{color:var(--c-gold)}
.sc-conc    .skel-bullets{border-color:var(--c-gold-mid)}
.sc-conc    .skel-arrow{color:var(--c-gold)}
.sc-conc    .skel-bar{background:var(--c-gold)}

/* ══════════════════════════════
   PHRASES VIEW
   ══════════════════════════════ */
.phrases-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:1.2rem}
.phrase-group{background:var(--white);border-radius:1.1rem;overflow:hidden;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08)}
.phrase-group-head{
  padding:0.7rem 1.2rem 0.55rem;
  display:flex;align-items:center;gap:0.6rem;
  border-bottom:1px solid rgba(0,0,0,0.06);
}
.phrase-group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phrase-group-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.72rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;
}
.phrase-group-body{padding:0.8rem 1.2rem 1rem;display:flex;flex-direction:column;gap:0.4rem}
.phrase-row{
  display:flex;align-items:flex-start;gap:0.5rem;
  font-family:'DM Sans',sans-serif;
  font-size:0.82rem;font-weight:500;line-height:1.45;color:rgba(0,0,0,0.62);
  padding:0.3rem 0;border-bottom:1px dashed rgba(0,0,0,0.06);
}
.phrase-row:last-child{border-bottom:none}
.phrase-arrow{flex-shrink:0;font-size:0.65rem;margin-top:0.28rem;opacity:0.35}

/* colour themes for phrase groups */
.pg-intro .phrase-group-dot{background:var(--c-teal)}
.pg-intro .phrase-group-title{color:var(--c-teal)}
.pg-intro .phrase-arrow{color:var(--c-teal)}
.pg-coral .phrase-group-dot{background:var(--c-coral)}
.pg-coral .phrase-group-title{color:var(--c-coral)}
.pg-coral .phrase-arrow{color:var(--c-coral)}
.pg-purple .phrase-group-dot{background:var(--c-purple)}
.pg-purple .phrase-group-title{color:var(--c-purple)}
.pg-purple .phrase-arrow{color:var(--c-purple)}
.pg-rose .phrase-group-dot{background:var(--c-rose)}
.pg-rose .phrase-group-title{color:var(--c-rose)}
.pg-rose .phrase-arrow{color:var(--c-rose)}
.pg-gold .phrase-group-dot{background:var(--c-gold)}
.pg-gold .phrase-group-title{color:var(--c-gold)}
.pg-gold .phrase-arrow{color:var(--c-gold)}

/* ══════════════════════════════
   PRACTICE VIEW
   ══════════════════════════════ */
.practice-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}

.practice-q{
  background:var(--white);border-radius:1.1rem;
  padding:1.1rem 1.4rem;
  border-left:4px solid var(--c-gold);
  box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08);
}
.practice-q-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.58rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--c-gold);margin-bottom:0.4rem;
}
.practice-q-text{
  font-family:'Playfair Display',serif;
  font-size:0.95rem;font-weight:700;font-style:italic;
  line-height:1.5;color:var(--ink);
}

.practice-controls{
  display:flex;align-items:center;gap:0.75rem;
  background:var(--white);border-radius:1.1rem;
  padding:0.8rem 1.2rem;
  box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08);
}
.play-btn{
  display:flex;align-items:center;gap:0.4rem;
  padding:0.48rem 1.1rem;
  background:var(--ink);color:#fff;
  border:none;border-radius:2rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.75rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.play-btn:hover{background:rgba(17,17,17,0.82)}
.play-btn:disabled{opacity:0.3;cursor:not-allowed}
.practice-caption{
  font-family:'Barlow',sans-serif;
  font-size:0.75rem;font-style:italic;color:rgba(0,0,0,0.35);
  flex:1;line-height:1.4;transition:color 0.3s;
}
.practice-caption.speaking{color:rgba(0,0,0,0.65)}

.practice-answer{
  background:var(--white);border-radius:1.1rem;
  padding:1rem 1.4rem;
  box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08);
}
.answer-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.58rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(0,0,0,0.25);margin-bottom:0.7rem;
}
.answer-line{
  display:flex;align-items:flex-start;gap:0.7rem;
  padding:0.42rem 0;border-bottom:1px dashed rgba(0,0,0,0.06);
  cursor:pointer;border-radius:0.3rem;transition:background 0.15s;
}
.answer-line:last-child{border-bottom:none}
.answer-line:hover{background:rgba(0,0,0,0.02)}
.answer-line.played .answer-text{opacity:0.32}
.answer-marker{
  flex-shrink:0;width:6px;height:6px;border-radius:50%;
  margin-top:0.42rem;background:rgba(0,0,0,0.15);transition:background 0.3s;
}
.answer-line.has-phrase .answer-marker{background:var(--c-gold)}
.answer-line.played .answer-marker{background:rgba(0,0,0,0.08)}
.answer-text{
  font-family:'DM Sans',sans-serif;
  font-size:0.85rem;line-height:1.55;color:var(--ink);
}
.answer-phrase-tag{
  display:inline-block;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.55rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;
  padding:0.12rem 0.45rem;border-radius:2rem;margin-left:0.4rem;vertical-align:middle;opacity:0.8;
}
.tag-intro{background:rgba(61,158,149,0.12);color:var(--c-teal)}
.tag-feature{background:rgba(232,114,58,0.12);color:var(--c-coral)}
.tag-conclusion{background:rgba(123,94,167,0.12);color:var(--c-purple)}

/* ══════════════════════════════
   FLYING BANNER (kept, restyled to match)
   ══════════════════════════════ */
.fly-banner{
  position:fixed;z-index:900;pointer-events:none;
  display:flex;flex-direction:column;justify-content:center;
  gap:0.5rem;
  padding:2rem 2rem;
  border-radius:1.4rem;
  background:var(--white);
  box-shadow:5px 7px 0 rgba(0,0,0,0.07),0 24px 60px rgba(0,0,0,0.22),0 6px 16px rgba(0,0,0,0.1);
  font-family:'DM Sans',sans-serif;
  font-size:1.5rem;font-weight:700;line-height:1.45;
  color:var(--ink);
  width:min(340px,85vw);
  overflow:hidden;
}
/* Zigzag bottom matching plan cards */
.fly-banner::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:5px;
}
.fly-banner-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.6rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;
  opacity:0.5;margin-bottom:0.2rem;
}
.fly-banner-flag{
  position:absolute;top:-2px;left:1.4rem;
  width:40px;
  display:flex;flex-direction:column;align-items:center;
}
.fly-banner-flag-body{
  width:100%;padding:0.35rem 0 0.25rem;
  display:flex;align-items:center;justify-content:center;position:relative;
}
.fly-banner-flag-body::after{
  content:'';position:absolute;bottom:-6px;left:0;right:0;height:7px;
  background:inherit;
  clip-path:polygon(0% 0%,10% 100%,20% 0%,30% 100%,40% 0%,50% 100%,60% 0%,70% 100%,80% 0%,90% 100%,100% 0%);
}
.fly-banner-flag-icon{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1rem;font-weight:900;color:#fff;line-height:1;letter-spacing:0.05em;
}
.fly-banner.type-intro    {border-top:4px solid var(--c-teal)}
.fly-banner.type-intro    .fly-banner-flag-body{background:var(--c-teal)}
.fly-banner.type-intro    .fly-banner-label{color:var(--c-teal)}
.fly-banner.type-intro    ::before{background:var(--c-teal)}

.fly-banner.type-feature  {border-top:4px solid var(--c-coral)}
.fly-banner.type-feature  .fly-banner-flag-body{background:var(--c-coral)}
.fly-banner.type-feature  .fly-banner-label{color:var(--c-coral)}

.fly-banner.type-conclusion{border-top:4px solid var(--c-purple)}
.fly-banner.type-conclusion .fly-banner-flag-body{background:var(--c-purple)}
.fly-banner.type-conclusion .fly-banner-label{color:var(--c-purple)}

.fly-banner.phase-float{animation:bannerFloat 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes bannerFloat{
  0%{opacity:0;transform:scale(0.65) translateY(-50px) rotate(-2deg)}
  65%{opacity:1;transform:scale(1.03) translateY(5px) rotate(0.5deg)}
  100%{opacity:1;transform:scale(1) translateY(0) rotate(0deg)}
}
.fly-banner.phase-hover{animation:bannerBob 1.9s ease-in-out infinite}
@keyframes bannerBob{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-7px) rotate(0.3deg)}
}

.loading-msg{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(0,0,0,0.25);letter-spacing:0.12em;text-transform:uppercase}

@media(max-width:480px){
  .skel-phrase{font-size:0.88rem}
  .skel-stem{font-size:1.1rem}
  .fly-banner{font-size:1.2rem;padding:1.6rem 1.6rem}
}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <a class="back-link" href="../../../index.html?openModal=writing&submenu=reports">← Reports</a>
    <span class="brand">INTUITY</span>
    <div style="width:60px"></div>
  </div>

  <div class="topic-tabs" id="topicTabs"></div>

  <div class="view-bar">
    <button class="vbtn active" data-view="skeleton" onclick="setView('skeleton')">Skeleton</button>
    <button class="vbtn" data-view="phrases" onclick="setView('phrases')">Phrases</button>
    <button class="vbtn" data-view="practice" onclick="setView('practice')">Practice</button>
  </div>

  <div class="content-area" id="contentArea">
    <div class="loading-msg" style="display:flex;align-items:center;justify-content:center;height:100%">Loading…</div>
  </div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb" onclick="navTo('question')">Question</button>
      <button class="nb" onclick="navTo('plan')">Plan</button>
      <button class="nb on">Model</button>
      <button class="nb" onclick="navTo('builder')">Builder</button>
      <button class="nb" onclick="navTo('sample')">Sample</button>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let skeletonData = null;
let phraseData   = null;
let currentType  = 'school-facilities';
let currentView  = 'skeleton';
let practiceQuestions = null;
let currentPracticeQ  = 0;

// ══════════════════════════════════════════
// SECTION → COLOUR CLASS
// ══════════════════════════════════════════
const SECTION_COLORS = ['sc-intro','sc-body1','sc-body2','sc-rec','sc-conc'];
const PHRASE_COLORS  = ['pg-intro','pg-coral','pg-purple','pg-rose','pg-gold'];

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init(){
  try{
    const [r1,r2] = await Promise.all([
      fetch('data/complete-report-phrase-bank.json'),
      fetch('data/complete-report-phrase-bank1.json')
    ]);
    skeletonData = await r1.json();
    phraseData   = await r2.json();
    practiceQuestions = buildPractice();
    buildTabs();
    render();
  } catch(e){
    document.getElementById('contentArea').innerHTML =
      '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4);font-family:Barlow,sans-serif">⚠ Could not load data</div>';
  }
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function buildTabs(){
  const types = Object.keys(skeletonData).filter(k=>k!=='meta');
  document.getElementById('topicTabs').innerHTML = types.map(k=>`
    <button class="ttab ${k===currentType?'active':''}" onclick="switchType('${k}')">
      ${skeletonData[k].label}
    </button>`).join('');
}
function switchType(type){
  stopPractice();
  currentType=type;
  currentPracticeQ=0;
  buildTabs();
  render();
}

// ══════════════════════════════════════════
// VIEW TOGGLE
// ══════════════════════════════════════════
function setView(v){
  stopPractice();
  currentView=v;
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  render();
}

// ══════════════════════════════════════════
// RENDER DISPATCHER
// ══════════════════════════════════════════
function render(){
  const area = document.getElementById('contentArea');
  if(currentView==='skeleton') area.innerHTML = renderSkeleton();
  else if(currentView==='phrases') area.innerHTML = renderPhrases();
  else area.innerHTML = renderPracticeHTML();
}

// ══════════════════════════════════════════
// SKELETON VIEW — poster cards
// ══════════════════════════════════════════
function renderSkeleton(){
  const report = skeletonData[currentType];
  if(!report||!report.skeletons||!report.skeletons[0])
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4);font-family:Barlow,sans-serif">No skeleton available</div>';

  const variation = report.skeletons[0];
  let h = '<div class="skeleton-stack">';

  variation.skeleton.forEach((sec, i) => {
    const color = SECTION_COLORS[i] || SECTION_COLORS[SECTION_COLORS.length-1];
    const lines = sec.lines || [];
    // First line is the key phrase, rest are bullets
    const keyPhrase = lines[0] || '';
    const bullets   = lines.slice(1);
    // Stem — derive from section title
    const stem = stemFor(sec.title);

    h += `
    <div class="skel-card ${color}">
      <div class="skel-flag">
        <div class="skel-flag-body">
          <span class="skel-flag-num">${String(i+1).padStart(2,'0')}</span>
        </div>
      </div>
      <div class="skel-body">
        <div class="skel-title">${sec.emoji||''} ${sec.title}</div>
        <div class="skel-phrase">${keyPhrase}</div>
        <div class="skel-stem">${stem}</div>
        <div class="skel-bullets">
          ${bullets.map(b=>`
            <div class="skel-bullet">
              <span class="skel-arrow">→</span>
              <span>${b}</span>
            </div>`).join('')}
        </div>
      </div>
      <div class="skel-bar"></div>
    </div>`;
  });

  return h + '</div>';
}

function stemFor(title){
  const t = title.toLowerCase();
  if(t.includes('intro'))       return 'This report is based on';
  if(t.includes('current')||t.includes('existing')||t.includes('facilit')||t.includes('activit')||t.includes('teaching')||t.includes('company')||t.includes('project activit')||t.includes('accommodation')) return 'One positive aspect is';
  if(t.includes('problem')||t.includes('improv')||t.includes('issue')||t.includes('complaint')||t.includes('feedback')||t.includes('effective')||t.includes('achiev')||t.includes('outcome')||t.includes('skill')) return 'A further point to consider is';
  if(t.includes('recommend'))   return 'It would be advisable to';
  if(t.includes('conclusion'))  return 'On balance, these changes would';
  return 'It is worth noting that';
}

// ══════════════════════════════════════════
// PHRASES VIEW
// ══════════════════════════════════════════
function renderPhrases(){
  const bank = phraseData[currentType];
  if(!bank||!bank.categories)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4);font-family:Barlow,sans-serif">No phrases available</div>';

  let h = '<div class="phrases-wrap">';
  bank.categories.forEach((cat,i)=>{
    const color = PHRASE_COLORS[i%PHRASE_COLORS.length];
    h += `<div class="phrase-group ${color}">
      <div class="phrase-group-head">
        <div class="phrase-group-dot"></div>
        <div class="phrase-group-title">${cat.title}</div>
      </div>
      <div class="phrase-group-body">`;
    cat.subcategories.forEach(sub=>{
      sub.phrases.forEach(p=>{
        h += `<div class="phrase-row">
          <span class="phrase-arrow">→</span>
          <span>${p}</span>
        </div>`;
      });
    });
    h += '</div></div>';
  });
  return h + '</div>';
}

// ══════════════════════════════════════════
// PRACTICE — build data
// ══════════════════════════════════════════
const PROMPT_MAP = {
  'school-facilities':       "You have been asked to write a report assessing your school's facilities and recommending improvements.",
  'exchange-programme':      'Your school has recently organised a two-week exchange programme. Write a report evaluating it and recommending whether it should continue.',
  'sports-facilities':       'The local council has asked you to write a report evaluating the sports centre and suggesting improvements for young people.',
  'school-trip':             'Write a report evaluating a recent educational school trip and suggesting improvements for future visits.',
  'library-services':        'Write a report assessing the school library services and recommending improvements.',
  'work-experience':         'Write a report evaluating a recent work experience placement and recommending whether it should continue.',
  'cafeteria-services':      'Write a report assessing the school cafeteria and suggesting improvements.',
  'environmental-initiative':'Write a report evaluating the recent environmental project and recommending whether similar projects should be organised.',
  'youth-club':              'Write a report assessing the youth club and recommending improvements.',
  'language-course':         'Write a report evaluating a language course you attended and suggesting improvements.'
};

function buildPractice(){
  const out = {};
  Object.keys(skeletonData).forEach(key=>{
    if(key==='meta') return;
    const topic = skeletonData[key];
    if(!topic.skeletons) return;
    out[key] = topic.skeletons.map(v=>{
      const answer=[];
      v.skeleton.forEach(sec=>{
        const t=sec.title.toLowerCase();
        const pt = t.includes('intro')?'intro':
                   (t.includes('recommend')||t.includes('conclusion'))?'conclusion':'feature';
        (sec.lines||[]).forEach((line,li)=>{
          const isKey = li===0;
          answer.push({text:line,phrase:isKey?line:null,phraseType:isKey?pt:null,label:isKey?sec.title:null});
        });
      });
      return {question:PROMPT_MAP[key]||`Write a report about: ${topic.label}`, answer};
    });
  });
  return out;
}

// ══════════════════════════════════════════
// PRACTICE — HTML
// ══════════════════════════════════════════
function renderPracticeHTML(){
  const set = practiceQuestions[currentType]||[];
  if(!set.length) return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4);font-family:Barlow,sans-serif">No practice available</div>';
  const data = set[currentPracticeQ];
  const total = set.length;

  let lines='';
  data.answer.forEach((l,i)=>{
    const hasP = !!l.phrase;
    lines+=`<div class="answer-line ${hasP?'has-phrase':''}" id="al${i}">
      <div class="answer-marker"></div>
      <div class="answer-text" id="at${i}">${l.text}${hasP?`<span class="answer-phrase-tag tag-${l.phraseType||'feature'}">${l.label||'phrase'}</span>`:''}</div>
    </div>`;
  });

  return `<div class="practice-wrap">
    <div class="practice-q">
      <div class="practice-q-label">Practice Question ${currentPracticeQ+1} of ${total}</div>
      <div class="practice-q-text">${data.question}</div>
    </div>
    <div class="practice-controls">
      <button class="play-btn" id="playBtn" onclick="startPractice()">▶ Play</button>
      <div class="practice-caption" id="practiceCaption">Press Play to hear the model answer</div>
    </div>
    <div class="practice-answer">
      <div class="answer-label">Model Answer — key phrases highlighted</div>
      ${lines}
    </div>
  </div>`;
}

// ══════════════════════════════════════════
// PRACTICE — AUDIO
// ══════════════════════════════════════════
let practiceActive = false;
let synth = window.speechSynthesis;
let narrator = null;
let currentBanner = null;

async function getVoice(){
  return new Promise(res=>{
    const load=()=>{
      const v=synth.getVoices();
      const f=v.find(x=>x.name==='Google UK English Male')
        ||v.find(x=>x.name==='Daniel')
        ||v.find(x=>x.lang==='en-GB')
        ||v.find(x=>x.lang.startsWith('en'))
        ||v[0]||null;
      res(f);
    };
    if(synth.getVoices().length) load();
    else synth.onvoiceschanged=load;
  });
}

function stopPractice(){
  practiceActive=false;
  synth.cancel();
  if(currentBanner){currentBanner.remove();currentBanner=null;}
  const btn=document.getElementById('playBtn');
  const cap=document.getElementById('practiceCaption');
  if(btn){btn.textContent='▶ Play';btn.disabled=false;}
  if(cap){cap.textContent='Press Play to hear the model answer';cap.classList.remove('speaking');}
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
}

async function startPractice(){
  if(practiceActive){stopPractice();return;}
  const set=practiceQuestions[currentType]||[];
  const data=set[currentPracticeQ];
  if(!data) return;

  practiceActive=true;
  narrator=await getVoice();
  const btn=document.getElementById('playBtn');
  if(btn) btn.textContent='■ Stop';

  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));

  for(let i=0;i<data.answer.length;i++){
    if(!practiceActive) break;
    const line=data.answer[i];
    const cap=document.getElementById('practiceCaption');
    if(cap){cap.textContent=line.text;cap.classList.add('speaking');}

    if(line.phrase&&line.phraseType){
      launchBanner(line.text, `type-${line.phraseType}`, line.label||'Key Phrase');
    }
    await speakLine(line.text);
    const lineEl=document.getElementById(`al${i}`);
    if(lineEl) lineEl.classList.add('played');
    if(practiceActive) await wait(500);
  }

  if(practiceActive){
    stopPractice();
    const cap=document.getElementById('practiceCaption');
    if(cap) cap.textContent='Complete — press Play to repeat.';
  }
}

function speakLine(text){
  return new Promise(res=>{
    if(!practiceActive){res();return;}
    synth.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    utt.voice=narrator;utt.rate=0.88;utt.pitch=1.05;utt.volume=1;
    utt.onend=()=>res();utt.onerror=()=>res();
    synth.speak(utt);
  });
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

// ══════════════════════════════════════════
// FLYING BANNER
// ══════════════════════════════════════════
function launchBanner(text, typeClass, label){
  if(currentBanner){currentBanner.remove();currentBanner=null;}

  const b = document.createElement('div');
  b.className=`fly-banner ${typeClass}`;
  b.innerHTML=`
    <div class="fly-banner-flag">
      <div class="fly-banner-flag-body">
        <span class="fly-banner-flag-icon">✦</span>
      </div>
    </div>
    <div class="fly-banner-label">${label}</div>
    <div>${text}</div>`;

  b.style.visibility='hidden';b.style.left='0';b.style.top='0';
  document.body.appendChild(b);

  const bw=b.offsetWidth,bh=b.offsetHeight;
  const vw=window.innerWidth,vh=window.innerHeight;
  b.style.left=Math.round((vw-bw)/2)+'px';
  b.style.top=Math.round((vh-bh)/2)+'px';
  b.style.visibility='visible';

  void b.offsetWidth;
  b.classList.add('phase-float');
  setTimeout(()=>{
    b.classList.remove('phase-float');
    void b.offsetWidth;
    b.classList.add('phase-hover');
    currentBanner=b;
  },550);
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function navTo(dest){
  stopPractice();
  const map={question:'report-question-selector.html',plan:'report-plan.html',builder:'report-builder.html',sample:'report-master.html'};
  if(map[dest]) window.location.href=map[dest];
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    const types=Object.keys(skeletonData).filter(k=>k!=='meta');
    const idx=types.indexOf(currentType)+(e.key==='ArrowRight'?1:-1);
    if(idx>=0&&idx<types.length) switchType(types[idx]);
  }
});

init();
</script>
