<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Report Builder — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0c;--gold:#C9A961;--gold-d:#9B7D3A;--gold-l:#E8D4A0;
  --white:#FAFAF8;--ink:#0d0d0d;
  --teal:#5ab5ac;--teal-d:#4a9a92;
  --coral:#f89643;--coral-d:#e67e2e;
  --purple:#8b7ba8;--purple-d:#726291;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;}
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:2vh 3vw;}
.card{width:100%;height:100%;max-width:900px;max-height:95vh;background:var(--white);border-radius:1.5rem;box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));z-index:5;}

/* HEADER */
.card-brand{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.875rem 1.25rem 0.625rem;margin-top:3px;position:relative;border-bottom:1px solid rgba(0,0,0,0.06);}
.home-link{text-decoration:none;font-size:0.875rem;font-weight:600;color:var(--gold);transition:all 0.2s;padding:0.35rem 0.5rem;border-radius:0.5rem;}
.home-link:hover{background:rgba(201,169,97,0.1);}
.brand-word{position:absolute;left:50%;transform:translateX(-50%);font-size:0.58rem;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.18);}
.menu-btn{background:#000;border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.menu-dots{display:flex;gap:3px;}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:#fff;}

/* TABS */
.card-tabs{flex-shrink:0;display:flex;align-items:center;justify-content:flex-start;gap:0.25rem;padding:0.5rem 1rem;background:var(--white);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.card-tabs::-webkit-scrollbar{height:0;}
.tab-btn{flex-shrink:0;background:transparent;border:none;border-bottom:3px solid transparent;padding:0.4rem 0.7rem;font-size:0.62rem;font-weight:700;color:rgba(0,0,0,0.4);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;}
.tab-btn:hover{color:rgba(0,0,0,0.6);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* CONTENT */
.card-content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.content-header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:0.75rem 1.5rem 0.55rem;border-bottom:2px solid rgba(0,0,0,0.06);gap:0.75rem;}
.content-title{font-size:0.65rem;font-weight:600;color:rgba(0,0,0,0.4);text-transform:uppercase;letter-spacing:0.1em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.view-toggle{display:flex;flex-shrink:0;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);border-radius:7px;padding:0.2rem;gap:0.2rem;}
.toggle-btn{padding:0.3rem 0.65rem;background:transparent;border:none;border-radius:5px;color:rgba(0,0,0,0.5);font-size:0.62rem;font-weight:800;cursor:pointer;transition:all 0.25s;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;}
.toggle-btn:hover{color:rgba(0,0,0,0.7);}
.toggle-btn.active{background:#000;color:var(--gold);}

/* SCROLLABLE */
.infographic{flex:1;padding:1rem 1.75rem;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}
.infographic::-webkit-scrollbar{width:5px;}
.infographic::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2.5px;}

/* ── SKELETON VIEW ── */
.skeleton-display .paragraph-block{margin-bottom:0.875rem;}
.skeleton-display .paragraph-title{margin-bottom:0.35rem;font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;}
.skeleton-display .paragraph-title.intro        {color:var(--teal);}
.skeleton-display .paragraph-title.neutral      {color:#8aab8a;}
.skeleton-display .paragraph-title.problem      {color:var(--coral);}
.skeleton-display .paragraph-title.recommendation{color:var(--purple);}
.skeleton-display .paragraph-title.conclusion   {color:rgba(0,0,0,0.45);}
.skeleton-display .paragraph-text{color:rgba(0,0,0,0.75);line-height:1.5;margin-bottom:0.2rem;font-size:0.71rem;}
.skeleton-display .listing-marker{color:#000;font-weight:700;font-style:italic;}
.skeleton-display .divider{height:1px;background:rgba(0,0,0,0.08);margin:0.65rem 0;}

/* ── PHRASES VIEW ── */
.phrases-display{font-family:'Inter',sans-serif;color:rgba(0,0,0,0.9);}
.phrase-category{margin-bottom:1.5rem;}
.category-title{font-size:0.73rem;font-weight:800;margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.08em;padding-bottom:0.4rem;border-bottom:2px solid;}
.category-title.intro        {color:var(--teal);border-bottom-color:var(--teal);}
.category-title.neutral      {color:#8aab8a;border-bottom-color:#8aab8a;}
.category-title.problem      {color:var(--coral);border-bottom-color:var(--coral);}
.category-title.recommendation{color:var(--purple);border-bottom-color:var(--purple);}
.category-title.conclusion   {color:rgba(0,0,0,0.5);border-bottom-color:rgba(0,0,0,0.2);}
.subcategory{margin-bottom:1.1rem;}
.subcategory-title{font-size:0.67rem;font-weight:700;color:rgba(0,0,0,0.6);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.05em;}
.phrase-list{list-style:none;padding:0;}
.phrase-item{font-size:0.75rem;line-height:1.6;color:rgba(0,0,0,0.8);margin-bottom:0.5rem;padding-left:0.875rem;position:relative;}
.phrase-item::before{content:"→";position:absolute;left:0;color:var(--gold);font-weight:700;}

/* ── PRACTICE VIEW ── */
.practice-display{display:flex;flex-direction:column;gap:1.25rem;}
.practice-question{background:rgba(201,169,97,0.08);border-left:4px solid var(--gold);border-radius:0.75rem;padding:1rem 1.25rem;}
.practice-question-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:0.35rem;}
.practice-question-text{font-size:1rem;font-weight:700;color:var(--ink);line-height:1.4;}
.practice-answer{background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.07);border-radius:0.75rem;padding:1.1rem 1.25rem;position:relative;}
.practice-answer-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:rgba(0,0,0,0.3);margin-bottom:0.5rem;}
.answer-line{display:flex;align-items:flex-start;gap:0.75rem;padding:0.45rem 0;border-bottom:1px solid rgba(0,0,0,0.05);cursor:pointer;border-radius:0.4rem;transition:background 0.15s;}
.answer-line:last-child{border-bottom:none;}
.answer-line:hover{background:rgba(0,0,0,0.03);}
.answer-line.played .answer-text{opacity:0.38;}
.answer-marker{flex-shrink:0;width:6px;height:6px;border-radius:50%;margin-top:0.45rem;background:rgba(0,0,0,0.18);transition:background 0.3s;}
.answer-line.has-phrase .answer-marker{background:var(--gold);}
.answer-line.played .answer-marker{background:rgba(0,0,0,0.1);}
.answer-text{font-size:0.88rem;line-height:1.6;color:var(--ink);font-family:'DM Sans',sans-serif;}
.answer-phrase-tag{display:inline-block;font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:0.15rem 0.5rem;border-radius:2rem;margin-left:0.4rem;vertical-align:middle;opacity:0.75;}
/* Report phrase tag colours — 5 types */
.tag-intro          {background:rgba(90,181,172,0.12);color:var(--teal);}
.tag-neutral        {background:rgba(138,171,138,0.15);color:#6a9b6a;}
.tag-problem        {background:rgba(248,150,67,0.12);color:var(--coral);}
.tag-recommendation {background:rgba(139,123,168,0.12);color:var(--purple);}
.tag-conclusion     {background:rgba(0,0,0,0.07);color:rgba(0,0,0,0.5);}

/* Play strip */
.practice-controls{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.25rem;background:rgba(0,0,0,0.03);border-radius:0.75rem;flex-shrink:0;}
.play-practice-btn{display:flex;align-items:center;gap:0.5rem;padding:0.55rem 1.1rem;background:#000;color:var(--gold);border:none;border-radius:2rem;font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;}
.play-practice-btn:hover{background:rgba(0,0,0,0.8);}
.play-practice-btn:disabled{opacity:0.35;cursor:not-allowed;}
.practice-caption{font-size:0.78rem;font-style:italic;color:rgba(0,0,0,0.4);flex:1;line-height:1.4;min-height:1.2em;transition:color 0.3s;}
.practice-caption.speaking{color:rgba(0,0,0,0.7);}

/* NAV ARROWS */
.slide-nav{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.75rem;padding:0.75rem 1.25rem;background:var(--white);border-top:1px solid rgba(0,0,0,0.06);}
.slide-arrow{background:transparent;border:2px solid rgba(0,0,0,0.15);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;font-size:1.3rem;color:rgba(0,0,0,0.6);}
.slide-arrow:hover:not(:disabled){background:var(--gold);border-color:var(--gold);color:#fff;}
.slide-arrow:disabled{opacity:0.25;cursor:not-allowed;}
.page-counter{font-size:0.875rem;font-weight:600;color:rgba(0,0,0,0.5);min-width:72px;text-align:center;}

/* FOOTER NAV */
.card-nav{flex-shrink:0;display:flex;justify-content:center;padding:0.65rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.75rem);background:var(--white);border-top:1px solid rgba(0,0,0,0.06);}
.nav-pill{display:flex;gap:0.15rem;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.3rem 0.35rem;}
.nb{background:transparent;border:none;padding:0.45rem 0.875rem;border-radius:1.5rem;font-size:0.65rem;letter-spacing:0.02em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.24s;white-space:nowrap;min-height:33px;font-weight:500;}
.nb.on{background:var(--ink);color:var(--gold);font-weight:700;}

/* ══ BANNER SYSTEM ══ */
.fly-banner{
  position:fixed;z-index:900;pointer-events:none;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:0.6rem;
  padding:2rem 2.2rem;border-radius:1.6rem;
  background:#fff;border-left:12px solid var(--teal);
  box-shadow:0 40px 100px rgba(0,0,0,0.30),0 10px 30px rgba(0,0,0,0.18),0 2px 8px rgba(0,0,0,0.10);
  font-family:'DM Sans',sans-serif;font-size:1.65rem;font-weight:700;line-height:1.45;
  color:var(--ink);text-align:left;
  width:min(360px,88vw);height:min(360px,88vw);overflow:hidden;
}
.fly-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;border-radius:1.6rem 1.6rem 0 0;}
.fly-banner::after{content:attr(data-label);display:block;font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:900;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:0.15rem;}

/* Report has 5 banner colours */
.fly-banner.type-intro          {border-left-color:var(--teal);}
.fly-banner.type-intro::before  {background:var(--teal);}
.fly-banner.type-intro::after   {color:var(--teal);}

.fly-banner.type-neutral         {border-left-color:#8aab8a;}
.fly-banner.type-neutral::before {background:#8aab8a;}
.fly-banner.type-neutral::after  {color:#8aab8a;}

.fly-banner.type-problem         {border-left-color:var(--coral);}
.fly-banner.type-problem::before {background:var(--coral);}
.fly-banner.type-problem::after  {color:var(--coral);}

.fly-banner.type-recommendation         {border-left-color:var(--purple);}
.fly-banner.type-recommendation::before {background:var(--purple);}
.fly-banner.type-recommendation::after  {color:var(--purple);}

.fly-banner.type-conclusion         {border-left-color:rgba(0,0,0,0.35);}
.fly-banner.type-conclusion::before {background:rgba(0,0,0,0.35);}
.fly-banner.type-conclusion::after  {color:rgba(0,0,0,0.5);}

.fly-banner.phase-float{animation:bannerFloat 0.55s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes bannerFloat{
  0%{opacity:0;transform:scale(0.6) translateY(-60px);}
  65%{opacity:1;transform:scale(1.04) translateY(6px);}
  100%{opacity:1;transform:scale(1) translateY(0);}
}
.fly-banner.phase-hover{animation:bannerBob 1.8s ease-in-out infinite;}
@keyframes bannerBob{
  0%,100%{transform:scale(1) translateY(0);}
  50%{transform:scale(1) translateY(-7px);}
}

@media(max-width:768px){
  .shell{padding:0;}
  .card{max-width:100%;border-radius:0;max-height:100vh;}
  .infographic{padding:0.875rem 1rem;}
  .tab-btn{font-size:0.58rem;padding:0.35rem 0.55rem;}
  .content-header{padding:0.6rem 1rem 0.5rem;}
  .toggle-btn{padding:0.28rem 0.5rem;font-size:0.58rem;}
  .nb{padding:0.35rem 0.65rem;font-size:0.58rem;}
}
@media(min-width:1024px){
  .card{max-width:1100px;}
  .infographic{padding:1.25rem 2rem;}
  .phrase-item{font-size:0.8rem;}
  .answer-text{font-size:0.92rem;}
}
</style>
</head>
<body>
<div class="shell">
<div class="card">

  <div class="card-brand">
    <a href="report-question-selector.html" class="home-link">← Reports</a>
    <span class="brand-word">INTUITY</span>
    <div style="flex:1"></div>
    <div class="menu-btn" id="menuBtn">
      <div class="menu-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="card-tabs" id="tabsContainer"></div>

  <div class="card-content">
    <div class="content-header">
      <div class="content-title" id="contentTitle">Loading…</div>
      <div class="view-toggle">
        <button class="toggle-btn active" data-mode="skeleton" onclick="setViewMode('skeleton')">Skeleton</button>
        <button class="toggle-btn" data-mode="phrases"  onclick="setViewMode('phrases')">Phrases</button>
        <button class="toggle-btn" data-mode="practice" onclick="setViewMode('practice')">Practice</button>
      </div>
    </div>
    <div class="infographic" id="contentArea"></div>
  </div>

  <div class="slide-nav">
    <button class="slide-arrow" id="btnPrev" onclick="navigate(-1)">←</button>
    <div class="page-counter" id="pageCounter">1 / 1</div>
    <button class="slide-arrow" id="btnNext" onclick="navigate(1)">→</button>
  </div>

  <div class="card-nav">
    <div class="nav-pill">
      <button class="nb" data-dest="question" onclick="navTo('question')">question</button>
      <button class="nb" data-dest="plan"     onclick="navTo('plan')">plan</button>
      <button class="nb" data-dest="model"    onclick="navTo('model')">model</button>
      <button class="nb on" data-dest="builder" onclick="navTo('builder')">builder</button>
      <button class="nb" data-dest="sample"   onclick="navTo('sample')">sample</button>
    </div>
  </div>

</div>
</div>

<script>
/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let skeletonData  = null;   // complete-report-phrase-bank.json
let phraseData    = null;   // complete-report-phrase-bank1.json
let practiceData  = null;   // report-builder.json

let currentType   = null;   // current report topic key
let currentVariation = 0;   // skeleton variation index
let currentPracticeQ = 0;   // practice question index within current type
let viewMode      = 'skeleton';

/* ══════════════════════════════════════════
   INIT — load all three JSON files
══════════════════════════════════════════ */
async function init(){
  try{
    const [r1, r2, r3] = await Promise.all([
      fetch('data/complete-report-phrase-bank.json'),
      fetch('data/complete-report-phrase-bank1.json'),
      fetch('data/report-builder.json')
    ]);
    skeletonData = await r1.json();
    phraseData   = await r2.json();
    practiceData = await r3.json();

    // Determine starting type from sessionStorage if available
    try{
      const saved = JSON.parse(sessionStorage.getItem('currentReportQuestion'));
      if(saved && saved.id && skeletonData[saved.id]) currentType = saved.id;
    } catch(e){}

    // Fall back to first available key
    if(!currentType){
      const keys = Object.keys(skeletonData).filter(k => k !== 'meta');
      currentType = keys[0] || null;
    }

    renderTabs();
    renderContent();
    updateNav();
  } catch(err){
    console.error(err);
    document.getElementById('contentArea').innerHTML =
      `<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">⚠️ Failed to load data<br><small style="font-size:0.65rem;opacity:0.5">${err.message}</small></div>`;
  }
}

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
function renderTabs(){
  const c    = document.getElementById('tabsContainer');
  const keys = Object.keys(skeletonData).filter(k => k !== 'meta');
  c.innerHTML = keys.map(k =>`
    <button class="tab-btn ${k === currentType ? 'active' : ''}" onclick="switchType('${k}')">
      ${skeletonData[k].label || k}
    </button>`).join('');
}

function switchType(type){
  currentType       = type;
  currentVariation  = 0;
  currentPracticeQ  = 0;
  stopPractice();
  renderTabs();
  renderContent();
  updateNav();
}

/* ══════════════════════════════════════════
   RENDER DISPATCHER
══════════════════════════════════════════ */
function renderContent(){
  const area = document.getElementById('contentArea');
  if(!currentType){ area.innerHTML = '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">Select a report type above</div>'; return; }

  if(viewMode === 'skeleton'){
    const entry = skeletonData[currentType];
    document.getElementById('contentTitle').textContent = entry ? entry.label : currentType;
    area.innerHTML = renderSkeleton();

  } else if(viewMode === 'phrases'){
    document.getElementById('contentTitle').textContent =
      (phraseData[currentType] ? phraseData[currentType].label : currentType) + ' — Phrase Bank';
    area.innerHTML = renderPhrases();

  } else {
    const entry = skeletonData[currentType];
    document.getElementById('contentTitle').textContent =
      (entry ? entry.label : currentType) + ' — Practice';
    area.innerHTML = renderPractice();
  }
}

/* ══════════════════════════════════════════
   SKELETON VIEW
   Reads complete-report-phrase-bank.json
   structure: { label, skeletons: [{ name, skeleton: [{ emoji, title, lines[] }] }] }
══════════════════════════════════════════ */
function renderSkeleton(){
  const entry = skeletonData[currentType];
  if(!entry || !entry.skeletons || !entry.skeletons.length)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">No skeleton available for this report type.</div>';

  const variation = entry.skeletons[currentVariation] || entry.skeletons[0];
  let h = '<div class="skeleton-display">';

  variation.skeleton.forEach((section, i) => {
    const t = (section.title || '').toLowerCase();
    // Classify section for colour
    const cls = t.includes('intro')        ? 'intro'
              : t.includes('recommend')    ? 'recommendation'
              : t.includes('conclusion')   ? 'conclusion'
              : t.includes('problem')      ? 'problem'
              : t.includes('concern')      ? 'problem'
              : t.includes('criticism')    ? 'problem'
              : t.includes('current')      ? 'neutral'
              : t.includes('overview')     ? 'neutral'
              : t.includes('situation')    ? 'neutral'
              : t.includes('assessment')   ? 'neutral'
              : t.includes('achievement')  ? 'neutral'
              : 'neutral';

    h += '<div class="paragraph-block">';
    h += `<div class="paragraph-title ${cls}">${section.emoji || ''} ${section.title}</div>`;
    (section.lines || []).forEach(line => {
      h += `<div class="paragraph-text">${line}</div>`;
    });
    if(i < variation.skeleton.length - 1) h += '</div><div class="divider"></div>';
    else h += '</div>';
  });

  return h + '</div>';
}

/* ══════════════════════════════════════════
   PHRASES VIEW
   Reads complete-report-phrase-bank1.json
   structure: { label, categories: [{ title, subcategories: [{ subtitle, phrases[] }] }] }
══════════════════════════════════════════ */
function renderPhrases(){
  const bank = phraseData[currentType];
  if(!bank || !bank.categories)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">No phrase bank for this report type.</div>';

  let h = '<div class="phrases-display">';
  bank.categories.forEach(cat => {
    const t   = (cat.title || '').toLowerCase();
    const cls = t.includes('intro')        ? 'intro'
              : t.includes('recommend')    ? 'recommendation'
              : t.includes('conclusion')   ? 'conclusion'
              : t.includes('problem')      ? 'problem'
              : t.includes('critical')     ? 'problem'
              : t.includes('complaint')    ? 'problem'
              : t.includes('neutral')      ? 'neutral'
              : t.includes('current')      ? 'neutral'
              : t.includes('overview')     ? 'neutral'
              : t.includes('praise')       ? 'neutral'
              : 'neutral';

    h += `<div class="phrase-category"><div class="category-title ${cls}">${cat.title}</div>`;
    (cat.subcategories || []).forEach(sub => {
      h += `<div class="subcategory"><div class="subcategory-title">${sub.subtitle}</div><ul class="phrase-list">`;
      (sub.phrases || []).forEach(p => { h += `<li class="phrase-item">${p}</li>`; });
      h += '</ul></div>';
    });
    h += '</div>';
  });
  return h + '</div>';
}

/* ══════════════════════════════════════════
   PRACTICE VIEW
   Reads report-builder.json
   structure: { questions: { [topicKey]: [ { question, answer: [{ text, phrase, phraseType, label }] } ] } }
══════════════════════════════════════════ */
function renderPractice(){
  if(!practiceData || !practiceData.questions)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">Practice data unavailable.</div>';

  const set = practiceData.questions[currentType];
  if(!set || !set.length)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">No practice questions for this report type.</div>';

  const data = set[currentPracticeQ];

  let h = `<div class="practice-display">
    <div class="practice-question">
      <div class="practice-question-label">Practice Question ${currentPracticeQ + 1} of ${set.length}</div>
      <div class="practice-question-text">${data.question}</div>
    </div>
    <div class="practice-controls">
      <button class="play-practice-btn" id="playPracticeBtn" onclick="startPractice()">▶ Play</button>
      <div class="practice-caption" id="practiceCaption">Press Play to hear the model answer with phrase highlights</div>
    </div>
    <div class="practice-answer">
      <div class="practice-answer-label">Model Answer — watch for the phrase banners</div>`;

  data.answer.forEach((line, i) => {
    const hasPhrase = !!line.phrase;
    const tagCls    = `tag-${line.phraseType || 'neutral'}`;
    h += `<div class="answer-line${hasPhrase ? ' has-phrase' : ''}" id="answerLine${i}">
      <div class="answer-marker"></div>
      <div class="answer-text" id="answerText${i}">${line.text}${
        hasPhrase
          ? `<span class="answer-phrase-tag ${tagCls}">${line.label || line.phraseType}</span>`
          : ''
      }</div>
    </div>`;
  });

  h += '</div></div>';
  return h;
}

/* ══════════════════════════════════════════
   AUDIO + PRACTICE ENGINE
══════════════════════════════════════════ */
let practiceActive   = false;
let practiceSynth    = window.speechSynthesis;
let practiceNarrator = null;
let currentBanner    = null;
let silentTimer      = null;

async function getPracticeVoice(){
  return new Promise(resolve => {
    const load = () => {
      const v = practiceSynth.getVoices();
      const found =
        v.find(x => x.name === 'Google UK English Male') ||
        v.find(x => x.name === 'Daniel') ||
        v.find(x => x.lang === 'en-GB') ||
        v.find(x => x.lang.startsWith('en')) ||
        v[0] || null;
      resolve(found);
    };
    if(practiceSynth.getVoices().length) load();
    else practiceSynth.onvoiceschanged = load;
  });
}

function stopPractice(){
  practiceActive = false;
  if(silentTimer){ clearTimeout(silentTimer); silentTimer = null; }
  practiceSynth.cancel();
  if(currentBanner){ currentBanner.remove(); currentBanner = null; }
  const btn = document.getElementById('playPracticeBtn');
  const cap = document.getElementById('practiceCaption');
  if(btn){ btn.textContent = '▶ Play'; btn.disabled = false; }
  if(cap){ cap.textContent = 'Press Play to hear the model answer with phrase highlights'; cap.classList.remove('speaking'); }
  document.querySelectorAll('.answer-line').forEach(l => l.classList.remove('played'));
}

async function startPractice(){
  if(practiceActive){ stopPractice(); return; }
  if(!practiceData) return;

  const set  = practiceData.questions[currentType];
  if(!set || !set.length) return;
  const data = set[currentPracticeQ];

  practiceActive   = true;
  practiceNarrator = await getPracticeVoice();

  const btn = document.getElementById('playPracticeBtn');
  const cap = document.getElementById('practiceCaption');
  btn.textContent = '■ Stop';
  document.querySelectorAll('.answer-line').forEach(l => l.classList.remove('played'));

  for(let i = 0; i < data.answer.length; i++){
    if(!practiceActive) break;
    const line   = data.answer[i];
    const lineEl = document.getElementById(`answerLine${i}`);

    if(cap){ cap.textContent = line.text; cap.classList.add('speaking'); }

    if(line.phrase && line.phraseType){
      launchBanner(line.phrase, `type-${line.phraseType}`, line.label || line.phraseType);
      await speakLine(line.text);
    } else {
      await speakLine(line.text);
    }

    if(lineEl) lineEl.classList.add('played');
    if(practiceActive) await wait(600);
  }

  if(practiceActive){
    stopPractice();
    if(cap){ cap.textContent = 'Complete — press Play to repeat.'; cap.classList.remove('speaking'); }
  }
}

function speakLine(text){
  return new Promise(resolve => {
    if(!practiceActive){ resolve(); return; }
    practiceSynth.cancel();
    const utt    = new SpeechSynthesisUtterance(text);
    utt.voice    = practiceNarrator;
    utt.rate     = 0.88;
    utt.pitch    = 1.05;
    utt.volume   = 1;
    utt.onend    = () => resolve();
    utt.onerror  = () => resolve();
    practiceSynth.speak(utt);
  });
}

function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

/* ══════════════════════════════════════════
   BANNER
══════════════════════════════════════════ */
function launchBanner(text, typeClass, label){
  if(currentBanner){ currentBanner.remove(); currentBanner = null; }

  const banner = document.createElement('div');
  banner.className = `fly-banner ${typeClass}`;
  banner.innerHTML  = text;
  banner.setAttribute('data-label', label);

  banner.style.visibility = 'hidden';
  banner.style.left = '0px';
  banner.style.top  = '0px';
  document.body.appendChild(banner);

  const bw = banner.offsetWidth, bh = banner.offsetHeight;
  const vw = window.innerWidth,  vh = window.innerHeight;
  banner.style.left = Math.round((vw - bw) / 2) + 'px';
  banner.style.top  = Math.round((vh - bh) / 2) + 'px';
  banner.style.visibility = 'visible';

  void banner.offsetWidth;
  banner.classList.add('phase-float');

  setTimeout(() => {
    banner.classList.remove('phase-float');
    void banner.offsetWidth;
    banner.classList.add('phase-hover');
    currentBanner = banner;
  }, 550);
}

/* ══════════════════════════════════════════
   VIEW MODE TOGGLE
══════════════════════════════════════════ */
function setViewMode(mode){
  stopPractice();
  if(mode === 'practice') currentPracticeQ = 0;
  viewMode = mode;
  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  renderContent();
  updateNav();
}

/* ══════════════════════════════════════════
   SLIDE NAV
══════════════════════════════════════════ */
function navigate(dir){
  stopPractice();

  if(viewMode === 'skeleton'){
    const entry   = skeletonData[currentType];
    const maxVar  = entry ? entry.skeletons.length - 1 : 0;
    currentVariation = Math.max(0, Math.min(currentVariation + dir, maxVar));

  } else if(viewMode === 'practice'){
    const set  = practiceData ? (practiceData.questions[currentType] || []) : [];
    const next = currentPracticeQ + dir;
    if(next >= 0 && next < set.length){
      currentPracticeQ = next;
    } else {
      // Cross to next/prev topic
      const keys = Object.keys(skeletonData).filter(k => k !== 'meta');
      const idx  = keys.indexOf(currentType) + dir;
      if(idx >= 0 && idx < keys.length){
        currentType      = keys[idx];
        currentPracticeQ = dir > 0 ? 0 : ((practiceData.questions[keys[idx]] || []).length - 1);
        renderTabs();
      }
    }

  } else {
    // Phrases — navigate between topic types
    const keys = Object.keys(skeletonData).filter(k => k !== 'meta');
    const idx  = keys.indexOf(currentType) + dir;
    if(idx >= 0 && idx < keys.length){ switchType(keys[idx]); return; }
  }

  renderContent();
  updateNav();
}

function updateNav(){
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');
  const ctr  = document.getElementById('pageCounter');
  const keys = Object.keys(skeletonData).filter(k => k !== 'meta');
  const typeIdx = keys.indexOf(currentType);

  if(viewMode === 'skeleton'){
    const entry  = skeletonData[currentType];
    const total  = entry ? entry.skeletons.length : 1;
    prev.disabled = currentVariation === 0;
    next.disabled = currentVariation === total - 1;
    ctr.textContent = `${currentVariation + 1} / ${total}`;

  } else if(viewMode === 'practice'){
    const set   = practiceData ? (practiceData.questions[currentType] || []) : [];
    const first = currentPracticeQ === 0 && typeIdx === 0;
    const last  = currentPracticeQ === set.length - 1 && typeIdx === keys.length - 1;
    prev.disabled = first;
    next.disabled = last;
    ctr.textContent = `Q ${currentPracticeQ + 1} / ${set.length}`;

  } else {
    prev.disabled = typeIdx === 0;
    next.disabled = typeIdx === keys.length - 1;
    ctr.textContent = `${typeIdx + 1} / ${keys.length}`;
  }
}

/* ══════════════════════════════════════════
   BOTTOM NAV — matching report-plan.html routes
══════════════════════════════════════════ */
function navTo(dest){
  if(dest === 'builder') return;
  stopPractice();
  const map = {
    question: 'report-question-selector.html',
    plan:     'report-plan.html',
    model:    'report-model.html',
    sample:   'report-master.html'
  };
  if(map[dest]) window.location.href = map[dest];
}

/* ══════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft')  navigate(-1);
  if(e.key === 'ArrowRight') navigate(1);
});

init();
</script>
