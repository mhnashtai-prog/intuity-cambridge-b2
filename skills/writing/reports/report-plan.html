<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Report Plan — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,700;0,800;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#e8e8e6;
  --gold:#C9A961;--gold-d:#9B7D3A;--gold-l:#E8D4A0;
  --ink:#0d0d0d;--white:#FAFAF8;
  --teal:#5ab5ac;--teal-d:#4a9a92;--teal-bg:#e0f3f1;
  --coral:#f89643;--coral-d:#e67e2e;--coral-bg:#fef3e6;
  --purple:#8b7ba8;--purple-d:#726291;--purple-bg:#f0ecf7;
  --rose:#e07070;--rose-d:#c45050;--rose-bg:#fbeaea;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}

/* ── SHELL ── */
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1.25rem;background:rgba(232,232,230,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.08);z-index:100}
.back-link{text-decoration:none;font-size:0.78rem;font-weight:700;color:rgba(0,0,0,0.45);letter-spacing:0.04em;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.7)}
.brand{font-size:0.52rem;font-weight:900;letter-spacing:0.24em;text-transform:uppercase;color:rgba(0,0,0,0.2)}
.topic-label{font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.45);letter-spacing:0.04em;text-align:right;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── TOPIC TABS ── */
.topic-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.3rem;padding:0.5rem 1.25rem;background:rgba(232,232,230,0.7);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.topic-tabs::-webkit-scrollbar{display:none}
.ttab{background:transparent;border:none;padding:0.3rem 0.7rem;border-radius:2rem;font-size:0.6rem;font-weight:700;color:rgba(0,0,0,0.32);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase}
.ttab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ttab.active{background:var(--ink);color:var(--gold)}

/* ── STAGE: the canvas where cards sit ── */
.stage{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* ── DOT PROGRESS ── */
.dot-track{position:absolute;bottom:1.25rem;left:50%;transform:translateX(-50%);display:flex;gap:0.55rem;z-index:50}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,0.18);transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer}
.dot.active{background:var(--ink);transform:scale(1.35)}
.dot.done{background:rgba(0,0,0,0.35)}

/* ── FOOTER NAV ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.55rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.6rem);background:rgba(232,232,230,0.92);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.15rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.28rem 0.32rem}
.nb{background:transparent;border:none;padding:0.38rem 0.8rem;border-radius:1.5rem;font-size:0.63rem;letter-spacing:0.02em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:30px;font-weight:600}
.nb.on{background:var(--ink);color:var(--gold);font-weight:700}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

/* ══════════════════════════════
   STICKY NOTE CARD
   ══════════════════════════════ */
.sticky{
  position:absolute;
  width:min(340px,88vw);
  /* square */
  aspect-ratio:1/1;
  border-radius:0.5rem;
  display:flex;flex-direction:column;
  padding:2.2rem 2rem 1.8rem;
  box-shadow:
    4px 4px 0 rgba(0,0,0,0.08),
    0 14px 40px rgba(0,0,0,0.22),
    0 3px 10px rgba(0,0,0,0.12);
  cursor:pointer;
  user-select:none;
  /* torn bottom edge via clip-path */
  clip-path:polygon(
    0% 0%,100% 0%,
    100% 92%,
    98% 94%,96% 91%,94% 94%,92% 91%,90% 94%,
    88% 91%,86% 94%,84% 91%,82% 94%,80% 91%,
    78% 94%,76% 91%,74% 94%,72% 91%,70% 94%,
    68% 91%,66% 94%,64% 91%,62% 94%,60% 91%,
    58% 94%,56% 91%,54% 94%,52% 91%,50% 94%,
    48% 91%,46% 94%,44% 91%,42% 94%,40% 91%,
    38% 94%,36% 91%,34% 94%,32% 91%,30% 94%,
    28% 91%,26% 94%,24% 91%,22% 94%,20% 91%,
    18% 94%,16% 91%,14% 94%,12% 91%,10% 94%,
    8% 91%,6% 94%,4% 91%,2% 94%,
    0% 92%
  );
  transition:filter 0.2s;
  will-change:transform,opacity;
}
.sticky:hover{filter:brightness(1.02)}

/* Colour themes */
.sticky.s-teal   {background:var(--teal-bg)}
.sticky.s-coral  {background:var(--coral-bg)}
.sticky.s-purple {background:var(--purple-bg)}
.sticky.s-rose   {background:var(--rose-bg)}
.sticky.s-gold   {background:#fdf8ec}

/* ── PIN ── */
.pin{
  position:absolute;
  top:-18px;left:50%;transform:translateX(-50%);
  width:24px;height:24px;z-index:10;
  border-radius:50%;
  box-shadow:0 4px 10px rgba(0,0,0,0.35),inset 0 -2px 4px rgba(0,0,0,0.2);
}
.s-teal   .pin{background:radial-gradient(circle at 35% 35%,#7dd4cc,var(--teal-d))}
.s-coral  .pin{background:radial-gradient(circle at 35% 35%,#fbb97e,var(--coral-d))}
.s-purple .pin{background:radial-gradient(circle at 35% 35%,#b09ccc,var(--purple-d))}
.s-rose   .pin{background:radial-gradient(circle at 35% 35%,#f09090,var(--rose-d))}
.s-gold   .pin{background:radial-gradient(circle at 35% 35%,var(--gold-l),var(--gold-d))}

/* Pin shadow line */
.pin::after{
  content:'';position:absolute;
  top:100%;left:50%;transform:translateX(-50%);
  width:2px;height:10px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.25),transparent);
}

/* ── NUMBER BADGE ── */
.badge{
  position:absolute;
  top:-12px;right:18px;
  width:38px;height:38px;
  border-radius:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-weight:900;font-size:1.2rem;
  color:#fff;
  box-shadow:2px 3px 8px rgba(0,0,0,0.28);
  transform:rotate(5deg);
}
.s-teal   .badge{background:var(--teal-d)}
.s-coral  .badge{background:var(--coral-d);transform:rotate(-4deg)}
.s-purple .badge{background:var(--purple-d);transform:rotate(3deg)}
.s-rose   .badge{background:var(--rose-d);transform:rotate(-5deg)}
.s-gold   .badge{background:var(--gold-d);transform:rotate(4deg)}

/* ── SECTION LABEL ── */
.section-label{
  font-family:'Inter',sans-serif;
  font-size:0.52rem;font-weight:900;
  text-transform:uppercase;letter-spacing:0.18em;
  opacity:0.55;margin-bottom:0.5rem;
  margin-top:0.4rem;
}
.s-teal   .section-label{color:var(--teal-d)}
.s-coral  .section-label{color:var(--coral-d)}
.s-purple .section-label{color:var(--purple-d)}
.s-rose   .section-label{color:var(--rose-d)}
.s-gold   .section-label{color:var(--gold-d)}

/* ── OPENING PHRASE ── */
.phrase-line{
  font-family:'DM Sans',sans-serif;
  font-size:0.76rem;font-weight:600;font-style:italic;
  line-height:1.35;color:rgba(0,0,0,0.48);
  padding-bottom:0.55rem;
  border-bottom:1.5px dashed rgba(0,0,0,0.1);
  margin-bottom:0.65rem;
}

/* ── BULLET MAIN IDEA ── */
.main-idea{
  font-family:'Playfair Display',serif;
  font-size:1.45rem;font-weight:900;
  line-height:1.2;color:var(--ink);
  margin-bottom:0.85rem;
  display:flex;align-items:flex-start;gap:0.5rem;
}
.main-idea::before{
  content:'';flex-shrink:0;
  width:10px;height:10px;border-radius:50%;
  margin-top:0.32rem;
}
.s-teal   .main-idea::before{background:var(--teal)}
.s-coral  .main-idea::before{background:var(--coral)}
.s-purple .main-idea::before{background:var(--purple)}
.s-rose   .main-idea::before{background:var(--rose-d)}
.s-gold   .main-idea::before{background:var(--gold)}

/* ── BULLET SUB POINTS ── */
.sub-bullets{
  display:flex;flex-direction:column;gap:0.32rem;
  margin-top:auto;
  flex:1;
  justify-content:flex-end;
}
.sub-item{
  display:flex;align-items:flex-start;gap:0.45rem;
  font-family:'Inter',sans-serif;
  font-size:0.68rem;font-weight:700;line-height:1.3;
  color:rgba(0,0,0,0.52);
  text-transform:uppercase;letter-spacing:0.04em;
}
.sub-dot{
  flex-shrink:0;width:5px;height:5px;border-radius:50%;
  margin-top:0.38rem;opacity:0.55;
}
.s-teal   .sub-dot{background:var(--teal)}
.s-coral  .sub-dot{background:var(--coral)}
.s-purple .sub-dot{background:var(--purple)}
.s-rose   .sub-dot{background:var(--rose-d)}
.s-gold   .sub-dot{background:var(--gold-d)}

/* ── AUDIO PULSE RING ── */
.audio-ring{
  position:absolute;
  bottom:1.1rem;right:1.1rem;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.6rem;
  opacity:0;transition:opacity 0.3s;
  border:2px solid rgba(0,0,0,0.15);
  color:rgba(0,0,0,0.35);
}
.sticky.speaking .audio-ring{
  opacity:1;
  animation:ringPulse 1.1s ease-in-out infinite;
}
@keyframes ringPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,0.15)}
  50%{box-shadow:0 0 0 6px rgba(0,0,0,0)}
}

/* ══════════════════════════════
   STACK ANIMATIONS
   ══════════════════════════════ */

/* Cards sit in a fanned stack — stagger rotation & offset */
.sticky[data-stack="0"]{transform:rotate(-2deg) translateY(0px);z-index:40}
.sticky[data-stack="1"]{transform:rotate(1.5deg) translate(6px,10px);z-index:30}
.sticky[data-stack="2"]{transform:rotate(-1deg) translate(-4px,20px);z-index:20}
.sticky[data-stack="3"]{transform:rotate(2.5deg) translate(8px,28px);z-index:10}

/* ENTERING — card flies in from above */
.sticky.enter{animation:cardEnter 0.6s cubic-bezier(0.22,1,0.36,1) both}
@keyframes cardEnter{
  0%{opacity:0;transform:scale(0.7) translateY(-120px) rotate(-8deg)}
  65%{opacity:1;transform:scale(1.04) translateY(10px) rotate(1deg)}
  100%{opacity:1;transform:var(--final-transform)}
}

/* ACTIVE CARD — sits on top, centred, no rotation */
.sticky.active-card{
  z-index:60;
  transform:rotate(0deg) translate(0,0) scale(1) !important;
  transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1),
             box-shadow 0.3s ease;
  box-shadow:
    6px 8px 0 rgba(0,0,0,0.1),
    0 24px 60px rgba(0,0,0,0.28),
    0 6px 16px rgba(0,0,0,0.14);
}

/* EXITING — card sails off to the side */
.sticky.exit-left{animation:exitLeft 0.5s cubic-bezier(0.6,0,0.8,1) both}
@keyframes exitLeft{
  0%{transform:rotate(0deg) translate(0,0) scale(1)}
  100%{transform:rotate(-12deg) translate(-140%,30px) scale(0.85);opacity:0.2}
}

/* BOB while speaking */
.sticky.active-card.speaking{
  animation:cardBob 2s ease-in-out infinite;
}
@keyframes cardBob{
  0%,100%{transform:rotate(0deg) translateY(0) scale(1)}
  50%{transform:rotate(0.3deg) translateY(-7px) scale(1.005)}
}

/* ── SWIPE HINT ── */
.swipe-hint{
  position:absolute;bottom:3.5rem;left:50%;transform:translateX(-50%);
  font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(0,0,0,0.22);pointer-events:none;
  animation:hintFade 3s ease 1.5s forwards;
  white-space:nowrap;
}
@keyframes hintFade{0%{opacity:1}80%{opacity:1}100%{opacity:0}}


/* ── MODE TOGGLE ── */
.mode-toggle{
  position:absolute;
  top:0.9rem;left:50%;transform:translateX(-50%);
  z-index:80;
  display:flex;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(10px);
  border-radius:2rem;
  padding:0.22rem;
  gap:0.18rem;
  box-shadow:0 2px 14px rgba(0,0,0,0.14),0 1px 4px rgba(0,0,0,0.08);
  border:1px solid rgba(255,255,255,0.9);
}
.mode-opt{
  padding:0.32rem 1.05rem;
  border-radius:1.75rem;
  font-family:'Inter',sans-serif;
  font-size:0.6rem;font-weight:800;
  text-transform:uppercase;letter-spacing:0.07em;
  color:rgba(0,0,0,0.35);
  cursor:pointer;border:none;background:transparent;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  user-select:none;white-space:nowrap;
}
.mode-opt:hover:not(.active){color:rgba(0,0,0,0.55)}
.mode-opt.active{
  background:var(--ink);
  color:var(--gold);
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}
/* Subtle indicator dot on the active card when in listen mode */
.sticky.listen-mode .audio-ring{opacity:0.6}

/* ── LOADING ── */
.loading-msg{
  font-size:0.8rem;color:rgba(0,0,0,0.3);
  font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
}

@media(max-width:480px){
  .sticky{width:min(300px,92vw)}
  .main-idea{font-size:1rem}
  .phrase-line{font-size:0.74rem}
}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <a class="back-link" href="report-question-selector.html">← Questions</a>
    <span class="brand">INTUITY</span>
    <span class="topic-label" id="topicLabel">—</span>
  </div>

  <div class="topic-tabs" id="topicTabs"></div>

  <div class="stage" id="stage">
    <div class="loading-msg" id="loadingMsg">Loading…</div>
  <div class="mode-toggle" id="modeToggle">
    <button class="mode-opt active" id="optExplore" onclick="setMode('explore')">Explore</button>
    <button class="mode-opt" id="optListen" onclick="setMode('listen')">Listen</button>
  </div>
  </div>

  <div class="dot-track" id="dotTrack"></div>

  <div class="foot">
    <div class="nav-pill">
      <button class="nb" onclick="navTo('question')">question</button>
      <button class="nb on" onclick="navTo('plan')">plan</button>
      <button class="nb" onclick="navTo('model')">model</button>
      <button class="nb" onclick="navTo('builder')">builder</button>
      <button class="nb" onclick="navTo('sample')">sample</button>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// SOUND ENGINE
// ══════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function ac(){ if(!actx) actx = new AudioCtx(); return actx; }

function tone(freq, type, dur, vol, delay=0){
  try{
    const ctx=ac(), osc=ctx.createOscillator(), g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type=type; osc.frequency.value=freq;
    const t=ctx.currentTime+delay;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    osc.start(t); osc.stop(t+dur+0.05);
  }catch(e){}
}
function sndDrop(){ tone(380,'sine',0.18,0.14); tone(520,'sine',0.12,0.08,0.07); }
function sndTap(){  tone(660,'triangle',0.06,0.12); tone(880,'triangle',0.04,0.08,0.04); }
function sndDone(){ [523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.22,0.1,i*0.07)); }

// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const COLORS = ['s-teal','s-coral','s-purple','s-rose','s-gold'];
const PHRASES = {
  intro:      ["The main objective of this report is to…","The aim of this report is to…","This report focuses on evaluating…","This report is based on feedback from…"],
  body:       ["It is generally agreed that…","However, one major concern expressed by…","By far the best aspect is…","One positive aspect worth noting is…","A significant concern amongst students was…"],
  recommend:  ["One key recommendation would be to…","I would strongly recommend…","In order to improve the situation, it would be advisable to…","It is essential that…"],
  conclusion: ["Taking everything into account, it seems clear that…","To sum up, these changes would…","In conclusion, addressing these issues should be a priority.","On balance, the benefits of these changes would…"]
};

function typeKey(title){
  const t=title.toLowerCase();
  if(t.includes('intro'))                              return 'intro';
  if(t.includes('recommend'))                          return 'recommend';
  if(t.includes('conclusion')||t.includes('closing'))  return 'conclusion';
  return 'body';
}
function pickPhrase(tk,i){ const a=PHRASES[tk]||PHRASES.body; return a[i%a.length]; }

// ══════════════════════════════════════════
// SPEECH
// ══════════════════════════════════════════
const synth = window.speechSynthesis;
let narrator = null;

async function initVoices(){
  await new Promise(res=>{
    let v=synth.getVoices();
    if(v.length){pick(v);res();return;}
    synth.onvoiceschanged=()=>{pick(synth.getVoices());res();}
  });
  function pick(v){
    const en=v.filter(x=>x.lang.startsWith('en'));
    const pool=en.length?en:v;
    narrator=pool.find(x=>x.name==='Google UK English Male')
      ||pool.find(x=>x.name==='Daniel')
      ||pool.find(x=>x.lang==='en-GB')
      ||pool[0]||null;
  }
}

let currentUtt=null;
function stopSpeech(){ synth.cancel(); currentUtt=null; }

function speak(text){
  return new Promise(res=>{
    stopSpeech();
    const utt=new SpeechSynthesisUtterance(text);
    utt.voice=narrator; utt.rate=0.88; utt.pitch=1.05; utt.volume=1;
    utt.onend=()=>res(); utt.onerror=()=>res();
    currentUtt=utt; synth.speak(utt);
  });
}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let planData = null;
let currentType  = 'school-facilities';
let cards        = [];   // { el, data } — all card elements
let current      = 0;    // which card is active
let isPlaying    = false;
let touchStartX  = 0;
let playMode = 'explore'; // 'explore' | 'listen'
let listenTimer = null;

// ══════════════════════════════════════════
// BUILD CARD ELEMENT
// ══════════════════════════════════════════
function buildCard(sec, idx, color){
  const el = document.createElement('div');
  el.className = `sticky ${color}`;
  el.dataset.idx = idx;

  // Pin
  const pin = document.createElement('div'); pin.className='pin';
  el.appendChild(pin);

  // Number badge
  const badge = document.createElement('div'); badge.className='badge';
  badge.textContent = sec.num;
  el.appendChild(badge);

  // Section label
  const lbl = document.createElement('div'); lbl.className='section-label';
  lbl.textContent = sec.title;
  el.appendChild(lbl);

  // Key phrase — italic opener, shown once
  const ph = document.createElement('div'); ph.className='phrase-line';
  ph.textContent = sec.phrase;
  el.appendChild(ph);

  // Main idea — BIG, bold, 3-5 words
  const mi = document.createElement('div'); mi.className='main-idea';
  mi.textContent = sec.idea;
  el.appendChild(mi);

  // Bullets — max 2, fragments only
  if(sec.bullets && sec.bullets.length){
    const sl = document.createElement('div'); sl.className='sub-bullets';
    sec.bullets.slice(0,2).forEach(b=>{
      const li=document.createElement('div'); li.className='sub-item';
      const dot=document.createElement('div'); dot.className='sub-dot';
      const txt=document.createElement('span'); txt.textContent=b;
      li.appendChild(dot); li.appendChild(txt);
      sl.appendChild(li);
    });
    el.appendChild(sl);
  }

  // Audio ring
  const ring=document.createElement('div'); ring.className='audio-ring';
  ring.textContent='♪'; el.appendChild(ring);

  el.onclick = ()=>{ if(current===idx) advance(); };
  return el;
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(){
  const stage = document.getElementById('stage');
  stage.innerHTML='';
  // Re-add the toggle (was wiped by innerHTML)
  const tog = document.createElement('div');
  tog.className='mode-toggle'; tog.id='modeToggle';
  tog.innerHTML=`<button class="mode-opt ${playMode==='explore'?'active':''}" id="optExplore" onclick="setMode('explore')">Explore</button>
    <button class="mode-opt ${playMode==='listen'?'active':''}" id="optListen" onclick="setMode('listen')">Listen</button>`;
  stage.appendChild(tog);

  const hint=document.createElement('div'); hint.className='swipe-hint';
  hint.textContent='tap card to advance'; stage.appendChild(hint);

  const report = planData[currentType];
  document.getElementById('topicLabel').textContent = report.label || currentType;

  const sections = report.sections || [];
  cards=[]; current=0;

  sections.forEach((sec,i)=>{
    const el = buildCard(sec, i, COLORS[i % COLORS.length]);
    el.style.cssText = getStackStyle(i, 0);
    stage.appendChild(el);
    cards.push({el, section:sec});
  });

  buildDots(sections.length);
  updateDots();

  setTimeout(()=>{ activateCard(0, true); }, 200);
}

function getStackStyle(cardIdx, activeIdx){
  const rel = cardIdx - activeIdx;
  if(rel < 0) return 'display:none'; // already passed
  const depths = [
    'transform:rotate(0deg) translateY(0) scale(1)',
    'transform:rotate(2deg) translate(5px,12px) scale(0.97)',
    'transform:rotate(-1.5deg) translate(-4px,22px) scale(0.94)',
    'transform:rotate(3deg) translate(7px,30px) scale(0.91)',
  ];
  return depths[Math.min(rel,3)] || 'display:none';
}

// ══════════════════════════════════════════
// ACTIVATE CARD
// ══════════════════════════════════════════
async function activateCard(idx, firstTime=false){
  if(isPlaying) return;
  isPlaying=true;

  const {el, section} = cards[idx];
  const stage = document.getElementById('stage');

  // Restack all remaining cards
  cards.forEach(({el:ce},i)=>{
    if(i < idx){
      ce.style.display='none';
    } else {
      const rel = i - idx;
      const transforms = [
        'rotate(0deg) translate(0,0) scale(1)',
        'rotate(2deg) translate(5px,12px) scale(0.97)',
        'rotate(-1.5deg) translate(-4px,22px) scale(0.94)',
        'rotate(3deg) translate(7px,30px) scale(0.91)',
      ];
      ce.style.transition = 'transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
      ce.style.transform = transforms[Math.min(rel,3)] || 'rotate(3deg) translate(7px,30px) scale(0.91)';
      ce.style.zIndex = 60 - rel*10;
      ce.style.display='flex';
    }
  });

  // Float active card to centre, front
  await wait(firstTime ? 50 : 20);
  sndDrop();
  el.classList.add('active-card');
  if(firstTime) el.classList.add('enter');

  await wait(firstTime ? 350 : 150);
  el.classList.remove('enter');

  updateDots();

  // Speak it
  el.classList.add('speaking');

  const sec = section; // section is now the clean JSON object
  const phrase = sec.phrase || '';
  const idea   = sec.idea   || '';
  const subs   = sec.bullets|| [];
  // Build speech: phrase + idea + bullets
  const speechText = `${phrase.replace('…','')}. ${idea}. ${subs.join('. ')}`;
  await speak(speechText);

  el.classList.remove('speaking');
  isPlaying=false;

  if(idx < cards.length-1){
    el.style.cursor='pointer';
    if(playMode==='listen'){
      // Auto-advance after a breath pause
      listenTimer = setTimeout(()=>{
        if(playMode==='listen') advance();
      }, 1400);
    }
  } else {
    sndDone();
  }
}

// ══════════════════════════════════════════
// ADVANCE
// ══════════════════════════════════════════
async function advance(){
  if(isPlaying) return;
  const prev = cards[current];
  if(current >= cards.length-1) return;

  if(listenTimer){ clearTimeout(listenTimer); listenTimer=null; }
  sndTap();
  stopSpeech();

  // Exit current
  prev.el.classList.remove('active-card','speaking');
  prev.el.classList.add('exit-left');
  setTimeout(()=>{ prev.el.style.display='none'; prev.el.classList.remove('exit-left'); }, 500);

  current++;
  await wait(120);
  activateCard(current, false);
}

// ══════════════════════════════════════════
// DOTS
// ══════════════════════════════════════════
function buildDots(n){
  const track = document.getElementById('dotTrack');
  track.innerHTML='';
  for(let i=0;i<n;i++){
    const d=document.createElement('div'); d.className='dot';
    d.onclick=()=>jumpTo(i);
    track.appendChild(d);
  }
}
function updateDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('active', i===current);
    d.classList.toggle('done', i<current);
  });
}

async function jumpTo(idx){
  if(isPlaying||idx===current) return;
  stopSpeech();
  // Hide all shown cards
  cards.forEach(({el:ce})=>{ ce.classList.remove('active-card','speaking'); ce.style.display='none'; });
  current=idx;
  activateCard(idx, true);
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function buildTabs(){
  const c = document.getElementById('topicTabs');
  const keys = Object.keys(planData);
  c.innerHTML = keys.map(k=>`
    <button class="ttab ${k===currentType?'active':''}" onclick="switchType('${k}')">
      ${planData[k].label}
    </button>`).join('');
}
function switchType(type){
  if(type===currentType) return;
  if(listenTimer){clearTimeout(listenTimer);listenTimer=null;}
  stopSpeech(); isPlaying=false;
  currentType=type;
  buildTabs();
  render();
}


// ══════════════════════════════════════════
// MODE TOGGLE
// ══════════════════════════════════════════
function setMode(mode){
  playMode = mode;
  document.getElementById('optExplore').classList.toggle('active', mode==='explore');
  document.getElementById('optListen').classList.toggle('active', mode==='listen');
  if(mode==='listen'){
    // restart from current card in listen mode
    stopSpeech(); isPlaying=false;
    activateCard(current, false);
  } else {
    // stop auto-advance, cancel any pending timer
    if(listenTimer){ clearTimeout(listenTimer); listenTimer=null; }
    stopSpeech(); isPlaying=false;
  }
}

// ══════════════════════════════════════════
// SWIPE SUPPORT
// ══════════════════════════════════════════
const stage = document.getElementById('stage');
document.addEventListener('touchstart',e=>{ touchStartX=e.touches[0].clientX; },{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx)>60) advance();
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ') advance();
  if(e.key==='ArrowLeft' && current>0) jumpTo(current-1);
});

// ══════════════════════════════════════════
// FOOTER NAV
// ══════════════════════════════════════════
function navTo(dest){
  if(dest==='plan') return;
  stopSpeech();
  const map={question:'report-question-selector.html',model:'report-model.html',builder:'report-builder.html',sample:'report-master.html'};
  if(map[dest]) window.location.href=map[dest];
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init(){
  await initVoices();
  try{
    const r = await fetch('data/report-plan-data.json');
    planData = await r.json();
    document.getElementById('loadingMsg').remove();
    buildTabs();
    render();
  } catch(e){
    document.getElementById('loadingMsg').textContent='⚠ Could not load data';
  }
}
init();
</script>
</body>
