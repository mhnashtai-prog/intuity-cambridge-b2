<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Report Plan — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0c0c0c; --gold:#C9A961; --gold-d:#9B7D3A; --gold-l:#E8D4A0;
  --white:#FAFAF8; --ink:#0d0d0d;
  --soft:rgba(13,13,13,0.55); --settled:rgba(13,13,13,0.82); --rule:rgba(0,0,0,0.07);
  --teal:#5ab5ac; --teal-d:#4a9a92;
  --coral:#f89643; --coral-d:#e67e2e;
  --purple:#8b7ba8; --purple-d:#726291;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:2vh 3vw}
.card{width:100%;height:100%;max-width:900px;max-height:95vh;background:var(--white);border-radius:1.5rem;box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));z-index:5}

/* HEADER */
.card-brand{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1.25rem 0.5rem;margin-top:3px;border-bottom:1px solid var(--rule);position:relative;z-index:10}
.home-link{text-decoration:none;font-size:0.85rem;font-weight:600;color:var(--gold);padding:0.35rem 0.5rem;border-radius:0.5rem;transition:all 0.2s}
.home-link:hover{background:rgba(201,169,97,0.1);color:var(--gold-d)}
.brand-word{position:absolute;left:50%;transform:translateX(-50%);font-size:0.55rem;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.18);pointer-events:none}
.menu-btn{background:#000;border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.menu-btn:hover{background:rgba(0,0,0,0.8)}
.menu-dots{display:flex;gap:3px}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:#fff}
.menu-dropdown{position:absolute;top:calc(100% + 0.5rem);right:1rem;background:#fff;border-radius:0.75rem;box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.12);min-width:190px;padding:0.5rem;z-index:200;display:none}
.menu-dropdown.open{display:block;animation:menuIn 0.2s ease-out}
@keyframes menuIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.menu-item{padding:0.65rem 0.85rem;border-radius:0.5rem;font-size:0.78rem;font-weight:500;color:rgba(0,0,0,0.7);cursor:pointer;transition:all 0.15s}
.menu-item:hover{background:rgba(0,0,0,0.04);color:rgba(0,0,0,0.9)}

/* PROGRESS */
.progress-strip{flex-shrink:0;padding:0.45rem 1.25rem 0.5rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:0.9rem}
.progress-strip.hidden{display:none}
.bar-track{flex:1;height:3px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--coral),var(--purple));border-radius:3px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
.progress-label{font-size:0.6rem;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;color:rgba(0,0,0,0.28);white-space:nowrap;transition:color 0.3s}
.progress-label.done{color:var(--teal-d)}

/* CELEBRATION */
.celebration{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.celebration.show{animation:celebPop 2.8s ease forwards}
@keyframes celebPop{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.celeb-pill{background:var(--ink);color:var(--gold);padding:1rem 2.25rem;border-radius:3rem;font-size:1rem;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;box-shadow:0 12px 48px rgba(0,0,0,0.45);animation:celebScale 0.45s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes celebScale{from{transform:scale(0.7)}to{transform:scale(1)}}

/* Q STRIP */
.q-strip{flex-shrink:0;padding:0.5rem 1.25rem;border-bottom:1px solid var(--rule);background:rgba(201,169,97,0.03)}
.q-text{font-family:'DM Sans',sans-serif;font-size:0.75rem;line-height:1.4;color:var(--settled);font-style:italic}

/* TOGGLE ROW */
.toggle-row{flex-shrink:0;padding:0.55rem 1.25rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;gap:0.75rem}
.view-switch{display:flex;background:rgba(0,0,0,0.05);border-radius:2rem;padding:0.25rem;gap:0.25rem}
.switch-option{padding:0.32rem 1.1rem;border-radius:1.75rem;font-size:0.68rem;font-weight:800;color:rgba(0,0,0,0.38);cursor:pointer;transition:all 0.25s;white-space:nowrap;user-select:none}
.switch-option:hover:not(.active){color:rgba(0,0,0,0.58);background:rgba(0,0,0,0.03)}
.switch-option.active{background:var(--ink);color:var(--gold);box-shadow:0 3px 12px rgba(0,0,0,0.2)}
.listen-all-btn{display:inline-flex;align-items:center;gap:0.35rem;padding:0.35rem 0.9rem;border-radius:2rem;background:var(--ink);color:var(--gold);border:none;font-family:'Inter',sans-serif;font-size:0.62rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;box-shadow:0 3px 10px rgba(0,0,0,0.22);white-space:nowrap;user-select:none}
.listen-all-btn:hover{background:#1a1a1a;box-shadow:0 5px 16px rgba(0,0,0,0.3)}
.listen-all-btn.playing{background:#c0392b;color:#fff}
.sound-toggle-btn{flex-shrink:0;background:transparent;border:1.5px solid rgba(0,0,0,0.12);border-radius:2rem;padding:0.3rem 0.65rem;font-size:1rem;cursor:pointer;transition:all 0.2s;line-height:1}
.sound-toggle-btn:hover{background:rgba(0,0,0,0.05)}
.sound-toggle-btn.muted{opacity:0.4}

/* CANVAS */
.plan-canvas{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2.5rem 1.75rem 2rem;display:flex;flex-direction:column;align-items:center;gap:3.5rem;background:#d6d6d4}
.plan-canvas::-webkit-scrollbar{width:4px}
.plan-canvas::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18);border-radius:2px}

/* PARA PLAN */
.para-plan{position:relative;width:100%;max-width:780px;padding-top:45px;opacity:0;transform:translateY(10px);animation:fadeIn 0.4s ease forwards}
.para-plan:nth-child(1){animation-delay:0.05s}
.para-plan:nth-child(2){animation-delay:0.13s}
.para-plan:nth-child(3){animation-delay:0.21s}
.para-plan:nth-child(4){animation-delay:0.29s}
.para-plan:nth-child(5){animation-delay:0.37s}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
.para-plan.speaking .para-card{filter:drop-shadow(0 0 18px rgba(201,169,97,0.5)) drop-shadow(0 10px 28px rgba(0,0,0,0.24))}

/* PIN */
.para-pin{position:absolute;top:68px;left:50%;transform:translateX(-50%);width:18px;height:32px;z-index:20;pointer-events:none}
.para-pin::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#999,#555);box-shadow:0 3px 7px rgba(0,0,0,0.45)}
.para-pin::after{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);width:3px;height:18px;background:linear-gradient(to bottom,#777,#bbb);border-radius:0 0 2px 2px}

/* NUMBER TAG */
.para-tag{position:absolute;top:18px;left:20px;width:130px;height:130px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Inter',sans-serif;font-weight:900;font-size:52px;letter-spacing:-1px;box-shadow:0 8px 24px rgba(0,0,0,0.32);z-index:20}
.para-tag.tag-intro{background:linear-gradient(135deg,var(--teal),var(--teal-d));transform:rotate(-7deg)}
.para-tag.tag-body{background:linear-gradient(135deg,var(--coral),var(--coral-d));transform:rotate(6deg)}
.para-tag.tag-conclusion{background:linear-gradient(135deg,var(--purple),var(--purple-d));transform:rotate(-8deg)}

/* CARD */
.para-card{position:relative;width:100%;padding:1.25rem 2rem 2.5rem;display:flex;flex-direction:column;gap:0;transition:filter 0.3s ease;background-color:#f4f2ee;background-image:repeating-linear-gradient(90deg,rgba(0,0,0,0.012) 0px,rgba(0,0,0,0.012) 1px,transparent 1px,transparent 5px),repeating-linear-gradient(0deg,rgba(0,0,0,0.008) 0px,rgba(0,0,0,0.008) 1px,transparent 1px,transparent 5px);filter:drop-shadow(0 10px 28px rgba(0,0,0,0.24)) drop-shadow(0 2px 6px rgba(0,0,0,0.14));clip-path:polygon(0% 2.5%,1.2% 1%,2.5% 3%,4% 1%,5.5% 3%,7% 1.5%,8.5% 3.5%,10% 1%,12% 3%,14% 1%,16% 2.5%,18% 0.8%,20% 2.8%,22% 1%,24% 3%,26% 1%,28% 2.5%,30% 0.8%,32% 2.8%,34% 1%,36% 3%,38% 1%,40% 2.5%,42% 0.8%,44% 2.8%,46% 1%,48% 2.5%,50% 0.5%,52% 2.5%,54% 1%,56% 2.8%,58% 0.8%,60% 2.5%,62% 1%,64% 3%,66% 1%,68% 2.8%,70% 0.8%,72% 2.5%,74% 1%,76% 3%,78% 1%,80% 2.5%,82% 1%,84% 3%,86% 1.5%,88% 3.5%,90% 1%,92% 3%,94% 1%,96% 3%,98% 1%,100% 2.5%,100% 97.5%,98.5% 99%,97% 97%,95% 99%,93% 97%,91% 99%,89% 97.5%,87% 99.5%,85% 97%,83% 99%,81% 97.5%,79% 99.5%,77% 97%,75% 99%,73% 97.5%,71% 99.5%,69% 97%,67% 99%,65% 97.5%,63% 99.5%,61% 97%,59% 99%,57% 97.5%,55% 99.5%,53% 97%,51% 99.5%,49% 97%,47% 99.5%,45% 97%,43% 99%,41% 97.5%,39% 99.5%,37% 97%,35% 99%,33% 97.5%,31% 99.5%,29% 97%,27% 99%,25% 97.5%,23% 99.5%,21% 97%,19% 99%,17% 97.5%,15% 99.5%,13% 97%,11% 99%,9% 97.5%,7% 99.5%,5% 97%,3% 99%,1.5% 97.5%,0% 99%)}
.para-card:hover{filter:drop-shadow(0 18px 44px rgba(0,0,0,0.28)) drop-shadow(0 4px 10px rgba(0,0,0,0.16))}
.para-plan.type-intro .para-card{background-color:#eaf5f4}
.para-plan.type-body .para-card{background-color:#fdf4e8}
.para-plan.type-conclusion .para-card{background-color:#f0ecf7}

/* CARD HEADER */
.para-card-header{display:flex;align-items:center;justify-content:space-between;padding-top:5rem;padding-bottom:0.65rem;margin-bottom:0;border-bottom:1px solid rgba(0,0,0,0.07)}
.para-card-title{font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:900;letter-spacing:0.06em;text-transform:uppercase;text-align:center;flex:1}
.para-plan.type-intro .para-card-title{color:var(--teal-d)}
.para-plan.type-body .para-card-title{color:var(--coral-d)}
.para-plan.type-conclusion .para-card-title{color:var(--purple-d)}

.card-listen-btn{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;transition:all 0.2s;font-size:0.75rem;user-select:none;background:rgba(0,0,0,0.07);color:rgba(0,0,0,0.45)}
.card-listen-btn:hover{background:rgba(0,0,0,0.13);color:rgba(0,0,0,0.7);transform:scale(1.1)}
.card-listen-btn.playing{background:var(--ink);color:var(--gold);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,169,97,0.5)}50%{box-shadow:0 0 0 6px rgba(201,169,97,0)}}

/* ── INTRO PHRASE BAND ── */
.card-intro-phrase{
  margin:0.75rem 0 0;
  padding:0.55rem 0.85rem;
  border-radius:0.5rem;
  font-family:'DM Sans',sans-serif;
  font-size:0.82rem;
  font-style:italic;
  font-weight:600;
  line-height:1.5;
  color:rgba(0,0,0,0.60);
  background:rgba(0,0,0,0.04);
  border-left:3px solid rgba(0,0,0,0.12);
}
.type-intro .card-intro-phrase{
  background:rgba(90,181,172,0.08);
  border-left-color:var(--teal);
  color:var(--teal-d);
}
.type-body .card-intro-phrase{
  background:rgba(248,150,67,0.08);
  border-left-color:var(--coral);
  color:var(--coral-d);
}
.type-conclusion .card-intro-phrase{
  background:rgba(139,123,168,0.08);
  border-left-color:var(--purple);
  color:var(--purple-d);
}
/* Phrase label */
.phrase-label{
  display:block;
  font-family:'Inter',sans-serif;
  font-size:0.52rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:0.12em;
  opacity:0.55;
  margin-bottom:0.2rem;
}

/* ── MAIN IDEA ── large, centred headline treatment ── */
.main-arg{
  font-family:'DM Sans',sans-serif;
  font-size:1.18rem;
  line-height:1.4;
  color:var(--ink);
  font-weight:800;
  margin:0.75rem 0 0;
  padding:0.75rem 1rem 0.85rem;
  text-align:center;
  border-bottom:1px dashed rgba(0,0,0,0.10);
}
/* Coloured accent bar above main idea */
.type-intro  .main-arg{ border-top:2px solid var(--teal);   background:rgba(90,181,172,0.04);  border-radius:0.5rem 0.5rem 0 0; }
.type-body   .main-arg{ border-top:2px solid var(--coral);  background:rgba(248,150,67,0.04);  border-radius:0.5rem 0.5rem 0 0; }
.type-conclusion .main-arg{ border-top:2px solid var(--purple); background:rgba(139,123,168,0.04); border-radius:0.5rem 0.5rem 0 0; }

/* ── BULLET POINTS ── */
.support-list{list-style:none;display:flex;flex-direction:column;gap:0.45rem;margin-top:0.75rem;padding-top:0.6rem}
.support-list::before{
  content:'Supporting points';
  display:block;
  font-family:'Inter',sans-serif;
  font-size:0.52rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:rgba(0,0,0,0.28);
  margin-bottom:0.4rem;
}
.support-item{display:flex;align-items:flex-start;gap:0.6rem;font-family:'DM Sans',sans-serif;font-size:0.84rem;line-height:1.55;color:var(--settled)}

/* Bullet dot — coloured by section */
.bullet-dot{
  flex-shrink:0;
  width:7px;height:7px;border-radius:50%;
  margin-top:0.44rem;
  transition:all 0.3s;
}
.type-intro .bullet-dot{background:var(--teal)}
.type-body .bullet-dot{background:var(--coral)}
.type-conclusion .bullet-dot{background:var(--purple)}

/* Hidden state — dot becomes grey outline reveal button */
.reveal-btn{
  flex-shrink:0;
  display:inline-flex;align-items:center;gap:0.3rem;
  padding:0.28rem 0.7rem;
  border-radius:2rem;
  font-family:'Inter',sans-serif;
  font-size:0.58rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;
  color:#fff;cursor:pointer;border:none;white-space:nowrap;
  transition:transform 0.15s ease,box-shadow 0.15s ease;
  box-shadow:0 3px 10px rgba(0,0,0,0.20);
  user-select:none;
}
.reveal-btn::before{content:'▶';font-size:0.45rem;opacity:0.85}
.reveal-btn:hover{transform:scale(1.06);box-shadow:0 5px 14px rgba(0,0,0,0.25)}
.reveal-btn:active{transform:scale(0.95)}
.type-intro .reveal-btn{background:linear-gradient(135deg,var(--teal),var(--teal-d))}
.type-body .reveal-btn{background:linear-gradient(135deg,var(--coral),var(--coral-d))}
.type-conclusion .reveal-btn{background:linear-gradient(135deg,var(--purple),var(--purple-d))}
.reveal-btn.done{width:7px;height:7px;padding:0;border-radius:50%;overflow:hidden;font-size:0;box-shadow:0 2px 6px rgba(0,0,0,0.18);cursor:default;transform:scale(1);flex-shrink:0;margin-top:0.44rem}
.reveal-btn.done::before{display:none}
/* Done btn inherits section colour */
.type-intro .reveal-btn.done{background:var(--teal)}
.type-body .reveal-btn.done{background:var(--coral)}
.type-conclusion .reveal-btn.done{background:var(--purple)}

.support-text{display:none;font-size:0.84rem;font-weight:400;line-height:1.55;color:var(--settled)}
.support-text.show{display:inline;animation:textSettle 0.25s ease both}
@keyframes textSettle{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* Emoji marker */
.item-marker{font-size:0.9rem;flex-shrink:0;margin-top:0.1rem;line-height:1.4}

/* Dialogue bubble */
.dialogue-bubble{display:none;border-left:3px solid rgba(0,0,0,0.12);border-radius:0 0.5rem 0.5rem 0;padding:0.55rem 0.85rem;margin-bottom:0.65rem;font-family:'DM Sans',sans-serif;font-size:0.76rem;line-height:1.6;color:rgba(0,0,0,0.6);font-style:italic;background:rgba(0,0,0,0.03);animation:fadeIn 0.3s ease;transition:opacity 0.25s}
.dialogue-bubble.show{display:block}
.type-intro .dialogue-bubble{border-left-color:var(--teal)}
.type-body .dialogue-bubble{border-left-color:var(--coral)}
.type-conclusion .dialogue-bubble{border-left-color:var(--purple)}

/* BANNER */
.fly-banner{position:fixed;z-index:800;pointer-events:none;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:0.6rem;padding:2rem 2.2rem;border-radius:1.6rem;background:#fff;border-left:12px solid var(--teal);box-shadow:0 40px 100px rgba(0,0,0,0.30),0 10px 30px rgba(0,0,0,0.18),0 2px 8px rgba(0,0,0,0.10);font-family:'DM Sans',sans-serif;font-size:1.75rem;font-weight:700;line-height:1.45;color:var(--ink);text-align:left;width:min(360px,88vw);height:min(360px,88vw);overflow:hidden}
.fly-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;border-radius:1.4rem 1.4rem 0 0;background:var(--teal)}
.fly-banner::after{content:attr(data-label);display:block;font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:900;text-transform:uppercase;letter-spacing:0.14em;color:var(--teal);margin-bottom:0.15rem}
.fly-banner.type-intro{border-left-color:var(--teal)}
.fly-banner.type-intro::before{background:var(--teal)}
.fly-banner.type-intro::after{color:var(--teal)}
.fly-banner.type-body{border-left-color:var(--coral)}
.fly-banner.type-body::before{background:var(--coral)}
.fly-banner.type-body::after{color:var(--coral)}
.fly-banner.type-conclusion{border-left-color:var(--purple)}
.fly-banner.type-conclusion::before{background:var(--purple)}
.fly-banner.type-conclusion::after{color:var(--purple)}
.fly-banner.phase-float{animation:bannerFloat 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes bannerFloat{0%{opacity:0;transform:scale(0.6) translateY(-60px)}65%{opacity:1;transform:scale(1.04) translateY(6px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.fly-banner.phase-hover{animation:bannerBob 1.8s ease-in-out infinite}
@keyframes bannerBob{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1) translateY(-7px)}}
.fly-banner.phase-dive{animation:bannerDive 0.52s cubic-bezier(0.6,0,0.8,1) both}
.fly-banner.phase-fadeout{animation:bannerFadeOut 0.5s ease both}
@keyframes bannerFadeOut{from{opacity:0.3}to{opacity:0}}
@keyframes bannerDive{0%{opacity:1;transform:scale(1) translateY(0) translateX(0)}55%{opacity:1;transform:scale(0.72) translateY(var(--dive-y)) translateX(var(--dive-x))}85%{opacity:0.5;transform:scale(0.28) translateY(calc(var(--dive-y)*1.08)) translateX(var(--dive-x))}100%{opacity:0.3;transform:scale(0.18) translateY(calc(var(--dive-y)*1.1)) translateX(var(--dive-x))}}

/* FOOTER */
.card-nav{flex-shrink:0;display:flex;justify-content:center;padding:0.6rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.65rem);border-top:1px solid var(--rule);background:var(--white)}
.nav-pill{display:flex;gap:0.15rem;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.3rem 0.35rem}
.nb{background:transparent;border:none;padding:0.4rem 0.85rem;border-radius:1.5rem;font-family:'Inter',sans-serif;font-size:0.65rem;letter-spacing:0.02em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.24s;white-space:nowrap;min-height:32px;font-weight:500}
.nb.on{background:var(--ink);color:var(--gold);font-weight:700}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.75rem;font-size:0.8rem;color:rgba(0,0,0,0.3);text-align:center;line-height:1.6;padding:2rem}

@media(max-width:768px){
  .shell{padding:0}.card{border-radius:0;max-height:100vh}
  .card-brand{padding:0.55rem 0.875rem 0.4rem}.home-link{font-size:0.7rem;padding:0.3rem 0.4rem}
  .brand-word{font-size:0.45rem}.menu-btn{width:26px;height:26px}
  .q-strip{padding:0.45rem 0.875rem}.q-text{font-size:0.65rem}
  .toggle-row{padding:0.45rem 0.875rem}
  .plan-canvas{padding:1.75rem 0.75rem 1.5rem;gap:2.25rem}
  .para-plan{max-width:100%;padding-top:35px}
  .para-card{padding:1.25rem 1.1rem 2rem}
  .para-card-header{padding-top:4rem}
  .para-tag{width:100px;height:100px;font-size:40px;top:8px;left:14px}
  .para-card-title{font-size:0.72rem}.main-arg{font-size:0.78rem}
  .support-item{font-size:0.75rem}.support-text{font-size:0.75rem}
  .nb{padding:0.3rem 0.6rem;font-size:0.55rem;min-height:28px}
  .card-intro-phrase{font-size:0.7rem}
}
@media(min-width:1024px){
  .card{max-width:1100px;max-height:90vh}
  .plan-canvas{padding:3rem 3rem 2rem;gap:3.5rem}
  .para-plan{max-width:900px}
  .para-card{padding:1.75rem 2.25rem 2.75rem}
  .para-card-title{font-size:1rem}.main-arg{font-size:0.95rem}
  .support-item{font-size:0.88rem}.support-text{font-size:0.88rem}
}
</style>
</head>
<body>
<div class="shell">
<div class="card">
  <div class="card-brand">
    <a class="home-link" href="report-question-selector.html">← Questions</a>
    <span class="brand-word">INTUITY</span>
    <div style="flex:1"></div>
    <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
      <div class="menu-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="menu-dropdown" id="menuDropdown">
      <div class="menu-item" onclick="revealAll()">Reveal all</div>
      <div class="menu-item" onclick="resetPlan()">Reset</div>
    </div>
  </div>

  <div class="q-strip" id="qStrip" style="display:none">
    <div class="q-text" id="qText"></div>
  </div>

  <div class="toggle-row">
    <div class="view-switch">
      <div class="switch-option active" id="switchExplore" onclick="setViewMode('explore')">Explore</div>
      <div class="switch-option" id="switchFull" onclick="setViewMode('full')">Full Plan</div>
    </div>
    <button class="listen-all-btn" id="listenAllBtn" onclick="toggleFullAudio()">
      <span class="btn-icon">▶</span> Listen
    </button>
    <button class="sound-toggle-btn" id="soundToggleBtn" onclick="toggleSound()" title="Sound on/off">🔊</button>
  </div>

  <div class="progress-strip" id="progressStrip">
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="progress-label" id="progressLabel">tap to reveal</div>
  </div>

  <div class="plan-canvas" id="planCanvas">
    <div class="state-msg">Loading plan…</div>
  </div>

  <div class="card-nav">
    <div class="nav-pill">
      <button class="nb" onclick="navTo('question')">question</button>
      <button class="nb on" onclick="navTo('plan')">plan</button>
      <button class="nb" onclick="navTo('model')">model</button>
      <button class="nb" onclick="navTo('builder')">builder</button>
      <button class="nb" onclick="navTo('sample')">sample</button>
    </div>
  </div>
</div>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-pill">Plan complete ✦</div>
</div>

<script>
// ══ INTRO PHRASES per section type ══
// Shown permanently at the top of each card — no reveal needed
const INTRO_PHRASES = {
  intro: [
    "The main objective of this report is to…",
    "The aim of this report is to…",
    "This report focuses on…",
    "This report is based on feedback from…",
  ],
  body: [
    "It is generally agreed that…",
    "However, one major concern expressed by…",
    "By far the best aspect is…",
    "One positive aspect of…",
    "A significant concern amongst students was…",
  ],
  recommend: [
    "One key recommendation would be to…",
    "I would strongly recommend…",
    "In order to improve the situation, it would be advisable to…",
    "It is essential that…",
  ],
  conclusion: [
    "Taking everything into account, it seems clear that…",
    "To sum up, these changes would…",
    "In conclusion, addressing these issues should be a priority.",
    "On balance, the benefits of these changes would…",
  ]
};

// Phrase label shown above the phrase
const PHRASE_LABELS = {
  intro:      "Opening phrase",
  body:       "Key phrase",
  recommend:  "Recommendation phrase",
  conclusion: "Closing phrase"
};

function pickPhrase(typeKey, index) {
  const arr = INTRO_PHRASES[typeKey] || INTRO_PHRASES.body;
  return arr[index % arr.length];
}

// ══ STATE ══
let question      = null;
let viewMode      = 'explore';
let currentReport = null;
let totalHidden   = 0;
let revealCount   = 0;
let audioPlaying     = false;
let audioQueue       = [];
let currentUtterance = null;
let audioCardIndex   = -1;
let soundEnabled     = true;
let silentTimer      = null;

// ══ SOUND ══
function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundToggleBtn');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundEnabled);
  if (!soundEnabled && audioPlaying) synth.cancel();
}

// ══ SPEECH ══
const synth = window.speechSynthesis;
let narrator = null;

function getVoices() {
  return new Promise(resolve => {
    let v = synth.getVoices();
    if (v.length) { resolve(v); return; }
    synth.onvoiceschanged = () => resolve(synth.getVoices());
  });
}

async function initVoices() {
  const voices = await getVoices();
  const en = voices.filter(v => v.lang.startsWith('en'));
  const pool = en.length ? en : voices;
  narrator =
    pool.find(v => v.name === 'Google UK English Male')  ||
    pool.find(v => v.name === 'Daniel')                  ||
    pool.find(v => v.name === 'Google UK English Female')||
    pool.find(v => v.name.includes('UK'))                ||
    pool.find(v => v.name.includes('Google'))            ||
    pool[0] || null;
}

function speak(text, onEnd) {
  if (!synth) { onEnd && onEnd(); return; }
  if (!soundEnabled) {
    if (silentTimer) clearTimeout(silentTimer);
    silentTimer = setTimeout(() => { onEnd && onEnd(); }, 6200);
    return;
  }
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.voice  = narrator;
  utt.rate   = 0.9;
  utt.pitch  = 1.05;
  utt.volume = 1;
  utt.onend   = () => { onEnd && onEnd(); };
  utt.onerror = () => { onEnd && onEnd(); };
  currentUtterance = utt;
  synth.speak(utt);
}

function stopAudio() {
  synth.cancel();
  if (silentTimer) { clearTimeout(silentTimer); silentTimer = null; }
  audioPlaying = false;
  audioQueue   = [];
  currentUtterance = null;
  document.querySelectorAll('.para-plan.speaking').forEach(c => c.classList.remove('speaking'));
  document.querySelectorAll('.card-listen-btn.playing').forEach(b => {
    b.classList.remove('playing'); b.innerHTML = '▶';
  });
  document.querySelectorAll('.dialogue-bubble').forEach(b => b.classList.remove('show'));
  const allBtn = document.getElementById('listenAllBtn');
  allBtn.classList.remove('playing');
  allBtn.innerHTML = '<span class="btn-icon">▶</span> Listen';
  audioCardIndex = -1;
}

// ══ LECTURE BUILDER ══
function buildLecture(para, reportQuestion, paraIndex) {
  const title = para.title || `paragraph ${paraIndex + 1}`;
  const items = para.items || [];
  const main  = items[0] ? items[0].text : '';
  const subs  = items.slice(1).map(n => n.text).filter(Boolean);
  const t     = title.toLowerCase();
  const sentences = [];

  if (t.includes('intro')) {
    const q = reportQuestion ? `"${reportQuestion}"` : 'this topic';
    sentences.push({ text: `Let's begin with the introduction. The report is about ${q}.`, caption: `Introduction — establishing context.` });
  } else if (t.includes('recommend')) {
    sentences.push({ text: `Now for the recommendations — proposing specific, actionable changes.`, caption: `Recommendations — proposing solutions.` });
  } else if (t.includes('conclusion')) {
    sentences.push({ text: `Finally, the conclusion — summarising our key findings.`, caption: `Conclusion — drawing the report together.` });
  } else {
    sentences.push({ text: `Now let's look at ${title}.`, caption: `${title}.` });
  }

  if (main) {
    const starters = [`The central point here is`, `The key finding is`, `What this section establishes is`, `The main thing to communicate here is`];
    const starter = starters[paraIndex % starters.length];
    sentences.push({ text: `${starter} ${main}.`, caption: `${starter} ${main}.` });
  }

  const bridges = [`To support this,`, `We can also note that`, `A further detail:`, `It is worth mentioning that`, `Additionally,`];
  subs.forEach((sub, i) => {
    sentences.push({ text: `${bridges[i % bridges.length]} ${sub}.`, caption: `${bridges[i % bridges.length]} ${sub}.`, revealIndex: i });
  });

  sentences.push({ text: t.includes('recommend') ? `And that closes the report — with clear, evidence-based recommendations.` : `Good — that section makes a clear, evidence-based point.`, caption: `Section complete.` });
  return sentences;
}

// ══ PLAY CARD AUDIO ══
function playCardAudio(paraIndex, cardWrapEl, onFinished) {
  if (!currentReport) return;
  const para     = currentReport.skeleton[paraIndex];
  const qText    = document.getElementById('qText').textContent;
  const sequence = buildLecture(para, qText, paraIndex);
  const listenBtn = cardWrapEl.querySelector('.card-listen-btn');
  const bubble    = cardWrapEl.querySelector('.dialogue-bubble');
  cardWrapEl.classList.add('speaking');
  cardWrapEl.scrollIntoView({ behavior:'smooth', block:'center' });
  if (listenBtn) { listenBtn.classList.add('playing'); listenBtn.innerHTML = '■'; }
  let step = 0;
  function runStep() {
    if (!audioPlaying || step >= sequence.length) {
      cardWrapEl.classList.remove('speaking');
      if (listenBtn) { listenBtn.classList.remove('playing'); listenBtn.innerHTML = '▶'; }
      if (bubble)    { bubble.classList.remove('show'); bubble.textContent = ''; }
      onFinished && onFinished();
      return;
    }
    const s = sequence[step];
    if (bubble) { bubble.textContent = s.caption; bubble.classList.add('show'); }
    if (s.revealIndex !== undefined) {
      const btns = cardWrapEl.querySelectorAll('.reveal-btn:not(.done)');
      if (btns.length > 0) setTimeout(() => btns[0].click(), 320);
    }
    step++;
    speak(s.text, runStep);
  }
  runStep();
}

function toggleCardAudio(paraIndex) {
  const cards = document.querySelectorAll('.para-plan');
  const cardEl = cards[paraIndex];
  if (!cardEl) return;
  if (audioPlaying && audioCardIndex === paraIndex) { stopAudio(); return; }
  stopAudio();
  audioPlaying   = true;
  audioCardIndex = paraIndex;
  playCardAudio(paraIndex, cardEl, () => { audioPlaying = false; audioCardIndex = -1; });
}

function toggleFullAudio() {
  const btn = document.getElementById('listenAllBtn');
  if (audioPlaying && audioCardIndex === -1) { stopAudio(); return; }
  stopAudio();
  audioPlaying   = true;
  audioCardIndex = -1;
  btn.classList.add('playing');
  btn.innerHTML = '<span class="btn-icon">■</span> Stop';
  const cards = document.querySelectorAll('.para-plan');
  let cardIdx = 0;
  function playNext() {
    if (!audioPlaying || cardIdx >= cards.length) { stopAudio(); return; }
    const i = cardIdx++;
    playCardAudio(i, cards[i], playNext);
  }
  playNext();
}

// ══ BANNER ══
function launchBanner(htmlText, slotEl, typeClass, onLanded) {
  const banner = document.createElement('div');
  banner.className = `fly-banner ${typeClass}`;
  banner.innerHTML = htmlText;
  const labelMap = { 'type-intro':'Introduction', 'type-body':'Key Finding', 'type-conclusion':'Recommendation' };
  banner.setAttribute('data-label', labelMap[typeClass] || 'Key Point');
  banner.style.visibility = 'hidden';
  banner.style.position   = 'fixed';
  banner.style.left = '0px';
  banner.style.top  = '0px';
  document.body.appendChild(banner);
  const bw = banner.offsetWidth, bh = banner.offsetHeight;
  const vw = window.innerWidth,  vh = window.innerHeight;
  banner.style.left       = Math.round((vw - bw) / 2) + 'px';
  banner.style.top        = Math.round((vh - bh) / 2) + 'px';
  banner.style.visibility = 'visible';
  void banner.offsetWidth;
  banner.classList.add('phase-float');
  setTimeout(() => {
    banner.classList.remove('phase-float');
    void banner.offsetWidth;
    banner.classList.add('phase-hover');
    setTimeout(() => {
      const slotRect   = slotEl.getBoundingClientRect();
      const bannerRect = banner.getBoundingClientRect();
      const diveX = (slotRect.left + slotRect.width/2)  - (bannerRect.left + bannerRect.width/2);
      const diveY = (slotRect.top  + slotRect.height/2) - (bannerRect.top  + bannerRect.height/2);
      banner.style.setProperty('--dive-x', `${diveX}px`);
      banner.style.setProperty('--dive-y', `${diveY}px`);
      banner.classList.remove('phase-hover');
      void banner.offsetWidth;
      banner.classList.add('phase-dive');
      setTimeout(() => {
        onLanded && onLanded();
        void banner.offsetWidth;
        banner.classList.add('phase-fadeout');
        setTimeout(() => banner.remove(), 520);
      }, 480);
    }, 5000);
  }, 520);
}

// ══ MENU ══
function toggleMenu() { document.getElementById('menuDropdown').classList.toggle('open'); }
function closeMenu()  { document.getElementById('menuDropdown').classList.remove('open'); }
document.addEventListener('click', e => {
  if (!e.target.closest('#menuDropdown') && !e.target.closest('#menuBtn')) closeMenu();
});
function revealAll() { closeMenu(); document.querySelectorAll('.reveal-btn:not(.done)').forEach(btn => btn.click()); }
function resetPlan() { closeMenu(); stopAudio(); if (currentReport) renderPlan(currentReport); }

// ══ VIEW MODE ══
function setViewMode(mode) {
  viewMode = mode;
  stopAudio();
  document.getElementById('switchExplore').classList.toggle('active', mode === 'explore');
  document.getElementById('switchFull').classList.toggle('active', mode === 'full');
  document.getElementById('progressStrip').classList.toggle('hidden', mode !== 'explore');
  if (currentReport) renderPlan(currentReport);
}

// ══ PROGRESS ══
function updateProgress() {
  if (viewMode !== 'explore') return;
  const pct = totalHidden > 0 ? (revealCount / totalHidden) * 100 : 0;
  document.getElementById('barFill').style.width = pct + '%';
  const lbl = document.getElementById('progressLabel');
  if (revealCount === 0)                { lbl.textContent = 'tap to reveal'; lbl.classList.remove('done'); }
  else if (revealCount === totalHidden) { lbl.textContent = 'complete ✦';    lbl.classList.add('done'); }
  else                                  { lbl.textContent = `${revealCount} / ${totalHidden}`; lbl.classList.remove('done'); }
}

function celebrate() {
  const el = document.getElementById('celebration');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2900);
}

// ══ RENDER ══
function getSectionTypeKey(title) {
  const t = title.toLowerCase();
  if (t.includes('intro'))                        return 'intro';
  if (t.includes('recommend'))                    return 'recommend';
  if (t.includes('conclusion') || t.includes('closing')) return 'conclusion';
  return 'body';
}

function renderPlan(report) {
  currentReport = report;
  totalHidden   = 0;
  revealCount   = 0;
  const canvas  = document.getElementById('planCanvas');
  canvas.innerHTML = '';

  if (report.topic) {
    document.getElementById('qText').textContent = report.topic;
    document.getElementById('qStrip').style.display = 'block';
  }

  (report.skeleton || []).forEach((para, i) => {
    const t = (para.title || '').toLowerCase();
    const typeKey = getSectionTypeKey(para.title || '');

    // CSS classes
    let typeClass = 'type-body';
    let tagClass  = 'tag-body';
    if (typeKey === 'intro')                          { typeClass = 'type-intro';      tagClass = 'tag-intro'; }
    if (typeKey === 'recommend' || typeKey === 'conclusion') { typeClass = 'type-conclusion'; tagClass = 'tag-conclusion'; }

    const wrap = document.createElement('div');
    wrap.className = `para-plan ${typeClass}`;

    // Pin
    const pin = document.createElement('div');
    pin.className = 'para-pin';
    wrap.appendChild(pin);

    // Number tag
    const tag = document.createElement('div');
    tag.className = `para-tag ${tagClass}`;
    tag.textContent = String(i + 1).padStart(2, '0');
    wrap.appendChild(tag);

    // Card
    const card = document.createElement('div');
    card.className = 'para-card';

    // Header
    const header = document.createElement('div');
    header.className = 'para-card-header';
    const titleEl = document.createElement('div');
    titleEl.className = 'para-card-title';
    titleEl.textContent = para.title || `Section ${i + 1}`;
    header.appendChild(titleEl);
    const listenBtn = document.createElement('button');
    listenBtn.className = 'card-listen-btn';
    listenBtn.innerHTML = '▶';
    listenBtn.title = 'Listen to lecture';
    listenBtn.onclick = () => toggleCardAudio(i);
    header.appendChild(listenBtn);
    card.appendChild(header);

    // Dialogue bubble
    const bubble = document.createElement('div');
    bubble.className = 'dialogue-bubble';
    card.appendChild(bubble);

    // ── INTRO PHRASE BAND ── always visible, no reveal
    const phraseEl = document.createElement('div');
    phraseEl.className = 'card-intro-phrase';
    const phraseLabel = document.createElement('span');
    phraseLabel.className = 'phrase-label';
    phraseLabel.textContent = PHRASE_LABELS[typeKey] || 'Key phrase';
    phraseEl.appendChild(phraseLabel);
    phraseEl.appendChild(document.createTextNode(pickPhrase(typeKey, i)));
    card.appendChild(phraseEl);

    // Items
    if (para.items && para.items.length > 0) {
      // ── MAIN IDEA — always visible, prominent ──
      const mainItem = para.items[0];
      const mainArg  = document.createElement('div');
      mainArg.className = 'main-arg';
      mainArg.textContent = mainItem.text || '';
      card.appendChild(mainArg);

      // ── SUPPORTING BULLETS — hidden in explore, revealed one by one ──
      if (para.items.length > 1) {
        const list = document.createElement('ul');
        list.className = 'support-list';

        para.items.slice(1).forEach((item) => {
          const li = document.createElement('li');
          li.className = 'support-item';
          const s = item.text || '';
          const marker = item.marker || '•';

          if (viewMode === 'explore') {
            // Reveal button (acts as bullet placeholder until clicked)
            totalHidden++;
            const btn = document.createElement('button');
            btn.className = 'reveal-btn';
            btn.textContent = marker;

            const span = document.createElement('span');
            span.className = 'support-text';
            span.textContent = s;

            btn.onclick = function() {
              btn.classList.add('done');
              btn.onclick = null;
              revealCount++;
              updateProgress();
              const cardType = wrap.classList.contains('type-intro')      ? 'type-intro'
                             : wrap.classList.contains('type-conclusion') ? 'type-conclusion'
                             : 'type-body';
              launchBanner(s, li, cardType, () => {
                span.classList.add('show');
                if (revealCount === totalHidden) setTimeout(celebrate, 350);
              });
            };
            li.appendChild(btn);
            li.appendChild(span);

          } else {
            // Full plan mode — bullet dot + emoji marker + text all visible
            const dot = document.createElement('span');
            dot.className = 'bullet-dot';
            const emojiEl = document.createElement('span');
            emojiEl.className = 'item-marker';
            emojiEl.textContent = marker;
            const span = document.createElement('span');
            span.className = 'support-text show';
            span.textContent = s;
            li.appendChild(dot);
            li.appendChild(emojiEl);
            li.appendChild(span);
          }
          list.appendChild(li);
        });
        card.appendChild(list);
      }
    }

    wrap.appendChild(card);
    canvas.appendChild(wrap);
  });

  updateProgress();
}

// ══ NAVIGATION ══
function navTo(dest) {
  if (dest === 'plan') return;
  stopAudio();
  if (question) sessionStorage.setItem('currentReportQuestion', JSON.stringify(question));
  const map = {
    question: 'report-question-selector.html',
    model:    'report-model.html',
    builder:  'report-builder.html',
    sample:   'report-master.html'
  };
  if (map[dest]) window.location.href = map[dest];
}

// ══ INIT ══
async function init() {
  await initVoices();

  try { question = JSON.parse(sessionStorage.getItem('currentReportQuestion')); }
  catch(e) { question = null; }

  if (!question) {
    document.getElementById('planCanvas').innerHTML =
      `<div class="state-msg">No question selected.<br>Return to Questions to choose one.</div>`;
    return;
  }

  try {
    const res = await fetch('data/report-ideas.json');
    if (!res.ok) throw new Error(`HTTP ${res.status} — data/report-ideas.json not found`);
    const data = await res.json();
    const pool   = data.reports || {};
    const report = pool[question.id];
    if (!report) {
      document.getElementById('planCanvas').innerHTML =
        `<div class="state-msg">No plan for this question yet.<br>
         <small style="opacity:0.35;margin-top:0.5rem;display:block;">id: ${question.id}</small></div>`;
      return;
    }
    renderPlan(report);
  } catch(err) {
    document.getElementById('planCanvas').innerHTML =
      `<div class="state-msg">Could not load data/report-ideas.json<br>
       <small style="opacity:0.35;margin-top:0.5rem;display:block;">${err.message}</small></div>`;
  }
}

init();
</script>
</body>
</html>
