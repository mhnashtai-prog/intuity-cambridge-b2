<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Deep Build Review — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0c;
  --gold:#C9A961;--gold-d:#9B7D3A;--gold-l:#E8D4A0;
  --white:#FAFAF8;--ink:#0d0d0d;
  --teal:#5ab5ac;--coral:#f89643;--purple:#8b7ba8;
  --direct:#4ade80;--concede:#fb923c;--question:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',sans-serif;color:#fff;-webkit-font-smoothing:antialiased}

/* ── SHELL + CARD — identical to essay-build-deep ── */
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:2vh 3vw}
.card{width:100%;height:100%;max-width:900px;max-height:95vh;background:var(--white);border-radius:1.5rem;box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));z-index:5}

/* ── HEADER — identical to essay-build-deep ── */
.card-brand{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:0.75rem;padding:0.875rem 1.25rem 0.625rem;margin-top:3px;position:relative;border-bottom:1px solid rgba(0,0,0,0.06)}
.home-link{text-decoration:none;font-size:0.875rem;font-weight:600;color:var(--gold);transition:all 0.2s;padding:0.35rem 0.5rem;border-radius:0.5rem;white-space:nowrap}
.home-link:hover{background:rgba(201,169,97,0.1)}
.brand-word{position:absolute;left:50%;transform:translateX(-50%);font-size:0.58rem;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.18)}
.xray-btn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.28rem 0.75rem;border-radius:2rem;border:1px solid rgba(201,169,97,0.22);background:transparent;color:var(--gold);cursor:pointer;transition:all 0.2s}
.xray-btn:hover,.xray-btn.on{background:rgba(201,169,97,0.1)}

/* ── VIEW TOGGLE — identical to essay-build-deep ── */
.view-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0.5rem 1.25rem;border-bottom:1px solid rgba(0,0,0,0.06)}
.vb-pill{display:flex;background:rgba(0,0,0,0.05);border-radius:2rem;padding:0.2rem}
.vb-btn{background:transparent;border:none;padding:0.35rem 1.25rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s}
.vb-btn.on{background:var(--ink);color:var(--gold)}

/* ── PARAGRAPH TABS ── */
.para-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.25rem;border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto;background:var(--white)}
.para-tabs::-webkit-scrollbar{display:none}
.ptab{background:transparent;border:none;padding:0.28rem 0.75rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:900;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.08em;text-transform:uppercase}
.ptab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.04)}
.ptab.active{background:var(--ink);color:var(--gold)}
.ptab.done{background:rgba(201,169,97,0.1);color:var(--gold-d)}

/* ── QUESTION BANNER — identical to essay-build-deep ── */
.q-banner{flex-shrink:0;display:flex;align-items:stretch;margin:0.75rem 1.5rem 0;border-radius:0.75rem;overflow:hidden;border:1px solid rgba(201,169,97,0.18)}
.q-strip{width:4px;background:var(--gold);flex-shrink:0}
.q-body{padding:0.6rem 0.875rem}
.q-label{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:0.18rem}
.q-text{font-family:'Instrument Sans',sans-serif;font-size:0.82rem;font-style:italic;color:rgba(0,0,0,0.6);line-height:1.45}

/* ── PHASE HEADER — identical to essay-build-deep ── */
.phase-hdr{flex-shrink:0;display:flex;align-items:center;gap:0.5rem;padding:0.6rem 1.5rem;border-bottom:1px solid rgba(0,0,0,0.05)}
.phase-strip{width:4px;height:16px;border-radius:2px;background:var(--gold);flex-shrink:0}
.phase-label{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(0,0,0,0.28)}

/* ── CONTENT — identical to essay-build-deep ── */
.infographic{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;padding:0.875rem 1.5rem}
.infographic::-webkit-scrollbar{width:5px}
.infographic::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2.5px}

/* ── UNAVAILABLE STATE ── */
.unavail-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:2rem;text-align:center;gap:1rem}
.unavail-icon{font-size:2.5rem;opacity:0.3}
.unavail-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;letter-spacing:0.06em;text-transform:uppercase;color:rgba(0,0,0,0.35)}
.unavail-body{font-family:'Instrument Sans',sans-serif;font-size:0.82rem;color:rgba(0,0,0,0.38);line-height:1.6;max-width:320px}

/* ── FRAMING CARDS — identical to essay-build-deep ── */
.frame-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;padding:0.25rem 0 0.5rem}
.frame-card{border-radius:0.875rem;border:1.5px solid rgba(0,0,0,0.07);background:rgba(0,0,0,0.02);padding:0.875rem 0.75rem;cursor:pointer;transition:all 0.22s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.frame-card::before{content:'';position:absolute;inset:0;border-radius:inherit;opacity:0;transition:opacity .22s}
.frame-card.direct::before  {background:rgba(74,222,128,0.07)}
.frame-card.concede::before {background:rgba(251,146,60,0.07)}
.frame-card.question::before{background:rgba(167,139,250,0.07)}
.frame-card:hover{transform:translateY(-2px)}
.frame-card:hover::before{opacity:1}
.frame-card.direct:hover  {border-color:rgba(74,222,128,0.5)}
.frame-card.concede:hover {border-color:rgba(251,146,60,0.5)}
.frame-card.question:hover{border-color:rgba(167,139,250,0.5)}
.frame-icon{font-size:1.1rem;margin-bottom:0.3rem;display:block}
.frame-type{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:0.25rem}
.frame-card.direct   .frame-type{color:var(--direct)}
.frame-card.concede  .frame-type{color:var(--concede)}
.frame-card.question .frame-type{color:var(--question)}
.frame-desc{font-family:'Instrument Sans',sans-serif;font-size:0.65rem;color:rgba(0,0,0,0.42);line-height:1.4;margin-bottom:0.4rem}
.frame-preview{font-family:'Instrument Sans',sans-serif;font-size:0.62rem;font-style:italic;color:rgba(0,0,0,0.28);line-height:1.4;border-top:1px dashed rgba(0,0,0,0.08);padding-top:0.4rem}

/* ── TOPIC OPTIONS — identical to essay-build-deep ── */
.topic-opts{display:flex;flex-direction:column;background:var(--white);border-radius:1.1rem;overflow:hidden;box-shadow:2px 4px 0 rgba(0,0,0,0.05),0 8px 24px rgba(0,0,0,0.09)}
.topic-opt{display:flex;align-items:flex-start;gap:0.65rem;padding:0.875rem 1.1rem;border-bottom:1px solid rgba(0,0,0,0.05);cursor:pointer;transition:background 0.18s}
.topic-opt:last-child{border-bottom:none}
.topic-opt:hover{background:rgba(201,169,97,0.06)}
.topic-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.9rem;color:var(--gold);min-width:1.1rem;flex-shrink:0}
.topic-text{font-family:'Instrument Sans',sans-serif;font-size:0.88rem;font-weight:400;line-height:1.55;color:rgba(0,0,0,0.8);flex:1}
.topic-badge{align-self:center;flex-shrink:0;margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.48rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.18rem 0.55rem;border-radius:2rem}
.badge-direct  {background:rgba(74,222,128,0.12); color:var(--direct); border:1px solid rgba(74,222,128,0.25)}
.badge-concede {background:rgba(251,146,60,0.12);  color:var(--concede);border:1px solid rgba(251,146,60,0.25)}
.badge-question{background:rgba(167,139,250,0.12);color:var(--question);border:1px solid rgba(167,139,250,0.25)}

/* ── ASSEMBLED BANNER — identical to essay-build-deep ── */
.assembled-banner{background:var(--white);border-radius:1.3rem;overflow:hidden;box-shadow:3px 5px 0 rgba(0,0,0,0.06),0 16px 40px rgba(0,0,0,0.12);animation:bannerIn 0.35s cubic-bezier(0.22,1,0.36,1) both}
@keyframes bannerIn{from{opacity:0;transform:translateY(6px) scale(0.99)}to{opacity:1;transform:translateY(0) scale(1)}}
.asm-row{display:flex;align-items:stretch;border-bottom:1px solid rgba(0,0,0,0.05)}
.asm-row:last-of-type{border-bottom:none}
.asm-row.new-row{animation:rowIn 0.32s cubic-bezier(0.22,1,0.36,1) both}
@keyframes rowIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.asm-strip{width:4px;flex-shrink:0}
.asm-content{flex:1;padding:0.825rem 1rem 0.825rem 0.5rem}
.asm-label{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:0.18rem}
.asm-text{font-family:'Instrument Sans',sans-serif;font-size:0.9rem;font-weight:400;line-height:1.6;color:rgba(0,0,0,0.82)}
.hl-direct  {font-weight:700;color:var(--direct)}
.hl-concede {font-weight:700;color:var(--concede)}
.hl-question{font-weight:700;color:var(--question)}
.lw{font-weight:700;color:var(--coral)}

/* section colours */
.sc-teal   .asm-strip{background:var(--teal)}   .sc-teal   .asm-label{color:var(--teal)}
.sc-coral  .asm-strip{background:var(--coral)}  .sc-coral  .asm-label{color:var(--coral)}
.sc-purple .asm-strip{background:var(--purple)} .sc-purple .asm-label{color:var(--purple)}
.sc-gold   .asm-strip{background:var(--gold)}   .sc-gold   .asm-label{color:var(--gold-d)}
.sc-direct  .asm-strip{background:var(--direct)}  .sc-direct  .asm-label{color:var(--direct)}
.sc-concede .asm-strip{background:var(--concede)} .sc-concede .asm-label{color:var(--concede)}
.sc-question .asm-strip{background:var(--question)}.sc-question .asm-label{color:var(--question)}

/* ── EXPAND SECTION — identical to essay-build-deep ── */
.expand-section{padding:0.6rem 1rem 0.875rem}
.expand-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:rgba(0,0,0,0.22);margin-bottom:0.45rem}
.exp-row{display:flex;flex-wrap:wrap;gap:0.3rem}
.exp-btn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.32rem 0.75rem;border-radius:2rem;border:1px solid rgba(0,0,0,0.1);background:transparent;color:rgba(0,0,0,0.42);cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:0.25rem}
.exp-btn:hover:not(.used){border-color:var(--gold);color:var(--ink)}
.exp-btn.used{opacity:0.2;cursor:not-allowed}
.done-btn{display:inline-flex;align-items:center;gap:0.35rem;margin-top:0.5rem;padding:0.38rem 0.875rem;background:var(--ink);border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);cursor:pointer;transition:all 0.2s}
.done-btn:hover{background:rgba(13,13,13,0.8)}
.banner-foot{display:flex;align-items:center;justify-content:space-between;padding:0.55rem 1rem;border-top:1px solid rgba(0,0,0,0.05)}
.foot-btn{background:transparent;border:1px solid rgba(0,0,0,0.1);padding:0.3rem 0.875rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.38);cursor:pointer;transition:all 0.2s}
.foot-btn:hover{border-color:var(--gold);color:var(--gold)}
.foot-btn.danger{color:#d94f4f;border-color:rgba(217,79,79,0.2)}
.foot-btn.danger:hover{border-color:#d94f4f;background:rgba(217,79,79,0.04)}

/* ── MODAL — identical to essay-build-deep ── */
.modal-veil{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:1.25rem}
.modal-veil.show{display:flex}
.modal-box{background:var(--white);border-radius:1.3rem;box-shadow:3px 5px 0 rgba(0,0,0,0.08),0 24px 60px rgba(0,0,0,0.4);max-width:560px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid rgba(0,0,0,0.06)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.82rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold)}
.modal-close{background:rgba(0,0,0,0.06);border:none;width:28px;height:28px;border-radius:50%;font-size:1rem;color:rgba(0,0,0,0.38);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.modal-close:hover{background:rgba(0,0,0,0.12);color:rgba(0,0,0,0.7)}
.modal-opt{display:flex;align-items:flex-start;gap:0.75rem;padding:0.875rem 1.25rem;border-bottom:1px solid rgba(0,0,0,0.05);transition:background 0.15s}
.modal-opt:last-child{border-bottom:none}
.modal-opt:hover{background:rgba(201,169,97,0.05)}
.modal-opt-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.88rem;color:var(--gold);min-width:1.1rem;flex-shrink:0}
.modal-opt-text{flex:1;font-family:'Instrument Sans',sans-serif;font-size:0.875rem;line-height:1.6;color:rgba(0,0,0,0.78)}
.use-btn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.3rem 0.75rem;border-radius:2rem;border:none;background:rgba(13,13,13,0.07);color:rgba(0,0,0,0.45);cursor:pointer;transition:all 0.18s;white-space:nowrap;flex-shrink:0;align-self:center}
.use-btn:hover{background:var(--ink);color:var(--gold)}

/* ── NAV PILL — identical to essay-build-deep ── */
.card-nav{flex-shrink:0;display:flex;justify-content:center;padding:0.65rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.75rem);background:var(--white);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.15rem;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.3rem 0.35rem}
.nb{background:transparent;border:none;padding:0.45rem 0.875rem;border-radius:1.5rem;font-size:0.65rem;letter-spacing:0.02em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.24s;white-space:nowrap;min-height:33px;font-weight:500}
.nb.on{background:var(--ink);color:var(--gold);font-weight:700}

@media(max-width:768px){
  .shell{padding:1vh 2vw}
  .card{border-radius:1rem}
  .frame-grid{grid-template-columns:1fr}
  .infographic{padding:0.875rem 1rem}
  .q-banner{margin:0.6rem 1rem 0}
}
</style>
</head>
<body>
<div class="shell">
<div class="card">

  <div class="card-brand">
    <a href="review-builder.html" class="home-link">← Read</a>
    <span class="brand-word">INTUITY</span>
    <button class="xray-btn" id="xrayBtn" onclick="toggleXray()" style="display:none">X-Ray</button>
  </div>

  <div class="view-bar">
    <div class="vb-pill">
      <button class="vb-btn" onclick="goToRead()">Read</button>
      <button class="vb-btn on">Build</button>
    </div>
  </div>

  <div class="para-tabs" id="paraTabs"></div>

  <div class="q-banner" id="qBanner" style="display:none">
    <div class="q-strip"></div>
    <div class="q-body">
      <div class="q-label" id="qLabel">Paragraph</div>
      <div class="q-text" id="qText"></div>
    </div>
  </div>

  <div class="phase-hdr" id="phaseHdr">
    <div class="phase-strip"></div>
    <div class="phase-label" id="phaseLabel">Loading…</div>
  </div>

  <div class="infographic" id="contentArea"></div>

  <div class="card-nav">
    <div class="nav-pill">
      <button class="nb" onclick="navTo('question')">question</button>
      <button class="nb" onclick="navTo('plan')">plan</button>
      <button class="nb" onclick="navTo('model')">model</button>
      <button class="nb on">builder</button>
      <button class="nb" onclick="navTo('sample')">sample</button>
    </div>
  </div>

</div>
</div>

<div class="modal-veil" id="expModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title" id="expTitle"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="expBody"></div>
  </div>
</div>

<script>
/* ══ PARAGRAPH CONFIG ══ */
const PARA_CONFIG=[
  {key:'intro',     label:'Introduction',   tab:'Intro',     qLabel:'Introduction'},
  {key:'feature1',  label:'Key Feature 1',  tab:'Feature 1', qLabel:'Key Feature 1'},
  {key:'feature2',  label:'Key Feature 2',  tab:'Feature 2', qLabel:'Key Feature 2'},
  {key:'recommend', label:'Recommendation', tab:'Recommend', qLabel:'Recommendation'},
];

/* ══ FRAMING META — identical to essay-build-deep ══ */
const FRAME_META={
  direct:  {icon:'→',label:'Direct Opening',   sc:'sc-direct',  desc:'State your main point immediately — confident and authoritative.'},
  concede: {icon:'↔',label:'Concession + Hook',sc:'sc-concede', desc:'Acknowledge the challenge or complexity first, then state your point.'},
  question:{icon:'?',label:'Rhetorical Question',sc:'sc-question',desc:'Open with a question your paragraph then answers.'},
};

/* ══ EXPAND MOVES — review-specific ══ */
const DEEP_MOVES=[
  {key:'detail',  icon:'🔍',label:'Detail',   sc:'sc-teal'},
  {key:'example', icon:'📝',label:'Example',  sc:'sc-coral'},
  {key:'impact',  icon:'✨',label:'Impact',   sc:'sc-gold'},
  {key:'contrast',icon:'↕️',label:'Contrast', sc:'sc-purple'},
  {key:'personal',icon:'💬',label:'Personal', sc:'sc-teal'},
];

/* ══ OPENER PREFIXES ══ */
const OPENER_PREFIXES=[
  'What makes ','The thing that ','By far the best ','One of the most ',
  'What I found ','Choosing ','When it comes to ','Known for ',
  'While some may say ','Although there are many options, ',
  'Despite the wide range of ','If you are looking for ',
];

const LINK_WORDS=['For example','For instance','However','Therefore','Thus','Hence','As a result','Consequently','Moreover','Furthermore','In addition','Nevertheless','Nonetheless','On the other hand','In contrast','Similarly','Likewise','In fact','Indeed','Specifically','This is because','Although','While','Whereas','In other words','That is to say'];

/* ══ STATE ══ */
let deepData={},question=null,currentParaIdx=0;
let phase=0,chosenFrame=null,chosenTopic='',expansions={},xray=false;
const doneParagraphs=new Set();

/* ══ LOAD ══ */
async function load(){
  try{question=JSON.parse(sessionStorage.getItem('currentReviewQuestion'));}catch(e){}
  try{
    const qId=question?.id||'';
    const r=await fetch(`data/review-deep-build-${qId}.json`);
    if(r.ok)deepData=await r.json();
  }catch(e){deepData={};}
  buildTabs();
  loadParagraph(0);
}

/* ══ TABS ══ */
function buildTabs(){
  document.getElementById('paraTabs').innerHTML=PARA_CONFIG.map((p,i)=>{
    const isDone=doneParagraphs.has(i);
    const isActive=i===currentParaIdx;
    return `<button class="ptab ${isActive?'active':''} ${isDone&&!isActive?'done':''}" onclick="switchPara(${i})">${p.tab}${isDone&&!isActive?' ✓':''}</button>`;
  }).join('');
}

function switchPara(idx){
  currentParaIdx=idx;
  phase=0;chosenFrame=null;chosenTopic='';expansions={};xray=false;
  loadParagraph(idx);
}

function loadParagraph(idx){
  currentParaIdx=idx;
  const cfg=PARA_CONFIG[idx];
  if(question){
    document.getElementById('qLabel').textContent=cfg.qLabel;
    document.getElementById('qText').textContent=`"${question.question||''}"`;
    document.getElementById('qBanner').style.display='flex';
  }
  buildTabs();
  render();
}

/* ══ RENDER ══ */
function render(){
  const xb=document.getElementById('xrayBtn');
  xb.style.display=phase>=2?'':'none';
  xb.classList.toggle('on',xray);
  xb.textContent=xray?'Normal':'X-Ray';
  if(xray&&phase===2){renderXray();return;}
  switch(phase){
    case 0:renderPhase0();break;
    case 1:renderPhase1();break;
    case 2:renderPhase2();break;
  }
}

/* ── Phase 0 ── */
function renderPhase0(){
  setPhaseLabel('Step 1 — How will you open this paragraph?');
  const cfg=PARA_CONFIG[currentParaIdx];
  const d=deepData[cfg.key]||null;
  const previews={
    direct:  d?d.frames?.direct?.[0]  :'State your main point directly and confidently.',
    concede: d?d.frames?.concede?.[0] :'Acknowledge the other view first, then pivot.',
    question:d?d.frames?.question?.[0]:'Open with a question your paragraph answers.',
  };
  const cards=Object.entries(FRAME_META).map(([key,f])=>`
    <div class="frame-card ${key}" onclick="pickFrame('${key}')">
      <span class="frame-icon">${f.icon}</span>
      <div class="frame-type">${f.label}</div>
      <div class="frame-desc">${f.desc}</div>
      <div class="frame-preview">"${esc(previews[key])}"</div>
    </div>`).join('');
  document.getElementById('contentArea').innerHTML=`<div class="frame-grid">${cards}</div>`;
}

/* ── Phase 1 ── */
function renderPhase1(){
  setPhaseLabel('Step 2 — Choose your opening sentence');
  const cfg=PARA_CONFIG[currentParaIdx];
  const d=deepData[cfg.key]||null;
  const opts=(d&&d.frames&&d.frames[chosenFrame])||[];
  if(!opts.length){
    document.getElementById('contentArea').innerHTML=`
      <div class="unavail-wrap">
        <div class="unavail-icon">🔒</div>
        <div class="unavail-title">No options yet</div>
        <div class="unavail-body">Deep Build data for this paragraph is not yet available.</div>
        <a href="review-builder.html" style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);text-decoration:none;padding:.38rem .875rem;border:1px solid rgba(201,169,97,.25);border-radius:2rem;">← Go back to Read</a>
      </div>`;
    return;
  }
  const rows=opts.map((t,i)=>`
    <div class="topic-opt" onclick="pickTopic(${i})">
      <span class="topic-num">${i+1}</span>
      <span class="topic-text">${esc(t)}</span>
      <span class="topic-badge badge-${chosenFrame}">${FRAME_META[chosenFrame].label}</span>
    </div>`).join('');
  document.getElementById('contentArea').innerHTML=`<div class="topic-opts">${rows}</div>`;
}

/* ── Phase 2 ── */
function renderPhase2(){
  setPhaseLabel('Step 3 — Build your paragraph');
  const cfg=PARA_CONFIG[currentParaIdx];
  const d=deepData[cfg.key]||null;
  const fMeta=FRAME_META[chosenFrame];
  const topicHtml=formatTopic(chosenTopic,chosenFrame);
  let rows=`
    <div class="asm-row ${fMeta.sc}">
      <div class="asm-strip"></div>
      <div class="asm-content">
        <div class="asm-label">Opening — ${fMeta.label}</div>
        <div class="asm-text">${topicHtml}</div>
      </div>
    </div>`;
  Object.entries(expansions).forEach(([key,txt])=>{
    const m=DEEP_MOVES.find(x=>x.key===key);
    rows+=`
      <div class="asm-row ${m?m.sc:'sc-coral'} new-row">
        <div class="asm-strip"></div>
        <div class="asm-content">
          <div class="asm-label">${m?m.label:key}</div>
          <div class="asm-text">${hlLinks(esc(txt))}</div>
        </div>
      </div>`;
  });
  const expBtns=DEEP_MOVES.map(m=>{
    const avail=d&&(d.expansions?.[m.key]||[]).length>0;
    const used=!!expansions[m.key];
    return `<button class="exp-btn ${used||!avail?'used':''}" onclick="openExpModal('${m.key}')" ${used||!avail?'disabled':''}>${m.icon} ${m.label}</button>`;
  }).join('');
  const canDone=Object.keys(expansions).length>=1;
  document.getElementById('contentArea').innerHTML=`
    <div class="assembled-banner">
      ${rows}
      <div class="expand-section">
        <div class="expand-lbl">Expand your paragraph</div>
        <div class="exp-row">${expBtns}</div>
        ${canDone?`<button class="done-btn" onclick="paraDone()">✓ Done — next paragraph</button>`:''}
      </div>
      <div class="banner-foot">
        <button class="foot-btn danger" onclick="phase=1;expansions={};render()">← Change Opening</button>
        <button class="foot-btn" onclick="copyPara()">Copy</button>
      </div>
    </div>`;
}

/* ── X-Ray ── */
function renderXray(){
  setPhaseLabel('X-Ray — Paragraph Structure');
  const fMeta=FRAME_META[chosenFrame];
  let rows=`<div class="asm-row ${fMeta.sc}"><div class="asm-strip"></div><div class="asm-content"><div class="asm-label">Opening — ${fMeta.label}</div><div class="asm-text">${formatTopic(chosenTopic,chosenFrame)}</div></div></div>`;
  Object.entries(expansions).forEach(([key,txt])=>{
    const m=DEEP_MOVES.find(x=>x.key===key);
    rows+=`<div class="asm-row ${m?m.sc:'sc-coral'}"><div class="asm-strip"></div><div class="asm-content"><div class="asm-label">${m?m.label:key}</div><div class="asm-text">${esc(txt)}</div></div></div>`;
  });
  document.getElementById('contentArea').innerHTML=`<div class="assembled-banner">${rows}</div>`;
}

/* ══ INTERACTIONS ══ */
function pickFrame(frame){chosenFrame=frame;phase=1;render();}

function pickTopic(idx){
  const cfg=PARA_CONFIG[currentParaIdx];
  const d=deepData[cfg.key]||null;
  chosenTopic=(d&&d.frames&&d.frames[chosenFrame]&&d.frames[chosenFrame][idx])||'';
  expansions={};phase=2;render();
}

function toggleXray(){if(phase<2)return;xray=!xray;render();}

function openExpModal(key){
  if(expansions[key])return;
  const cfg=PARA_CONFIG[currentParaIdx];
  const d=deepData[cfg.key]||null;
  const opts=(d&&d.expansions&&d.expansions[key])||[];
  if(!opts.length)return;
  const m=DEEP_MOVES.find(x=>x.key===key);
  document.getElementById('expTitle').textContent=m?m.label:key;
  document.getElementById('expBody').innerHTML=opts.map((s,i)=>`
    <div class="modal-opt">
      <span class="modal-opt-num">${i+1}</span>
      <span class="modal-opt-text">${esc(s)}</span>
      <button class="use-btn" onclick="useExp('${key}',${i})">Use</button>
    </div>`).join('');
  document.getElementById('expModal').classList.add('show');
}

function useExp(key,idx){
  const cfg=PARA_CONFIG[currentParaIdx];
  const d=deepData[cfg.key]||null;
  expansions[key]=(d&&d.expansions&&d.expansions[key]&&d.expansions[key][idx])||'';
  closeModal();xray=false;render();
}

function closeModal(){document.getElementById('expModal').classList.remove('show');}

function paraDone(){
  doneParagraphs.add(currentParaIdx);
  const next=currentParaIdx+1;
  if(next<PARA_CONFIG.length){
    switchPara(next);
  }else{
    document.getElementById('contentArea').innerHTML=`
      <div class="unavail-wrap">
        <div class="unavail-icon">✦</div>
        <div class="unavail-title">Review built!</div>
        <div class="unavail-body">You've built all four paragraphs. Check the Sample to compare with the model answer.</div>
        <button onclick="navTo('sample')" style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);background:transparent;border:1px solid rgba(201,169,97,.25);border-radius:2rem;padding:.55rem 1.25rem;cursor:pointer;">→ See Sample</button>
      </div>`;
    buildTabs();
  }
}

function copyPara(){
  const full=chosenTopic+' '+Object.values(expansions).join(' ');
  navigator.clipboard.writeText(full.trim()).catch(()=>{});
}

/* ══ HELPERS ══ */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hlLinks(escaped){const p=new RegExp(`(${LINK_WORDS.join('|')})`,'gi');return escaped.replace(p,'<span class="lw">$1</span>');}
function formatTopic(text,frame){
  const cls=`hl-${frame}`;
  if(text.includes('? ')){const qi=text.indexOf('? ')+2;return `<span class="${cls}">${esc(text.slice(0,qi))}</span>${hlLinks(esc(text.slice(qi)))}`;}
  for(const pref of OPENER_PREFIXES){if(text.startsWith(pref))return `<span class="${cls}">${esc(pref)}</span>${hlLinks(esc(text.slice(pref.length)))}`;}
  return hlLinks(esc(text));
}
function setPhaseLabel(txt){document.getElementById('phaseLabel').textContent=txt;}

/* ══ NAVIGATION ══ */
function goToRead(){window.location.href='review-builder.html';}
function navTo(dest){
  if(question)sessionStorage.setItem('currentReviewQuestion',JSON.stringify(question));
  const map={question:'review-question-selector.html',plan:'review-plan.html',model:'review-model.html',sample:'review-master.html'};
  if(map[dest])window.location.href=map[dest];
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('expModal').addEventListener('click',e=>{if(e.target.id==='expModal')closeModal();});

load();
</script>
</body>
</html>
