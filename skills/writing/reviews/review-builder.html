<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Build Review — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--white:#ffffff;--ink:#111111;--rule:rgba(0,0,0,0.07);
  --c-teal:#3d9e95;--c-coral:#e8723a;--c-purple:#7b5ea7;--c-rose:#c94f6d;--c-gold:#c08b2f;
  /* pill colours — review-specific, preserved from original */
  --hook:#546e7a;--opinion:#ec4899;--feature:#06b6d4;--detail:#f59e0b;
  --highlight:#ed6e39;--impact:#ef4444;--addition:#8b5cf6;
  --contrast:#64748b;--verdict:#14b8a6;--audience:#f97316;--context:#608020;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}

/* ── SHELL ── */
.shell{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.97);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:10}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}

/* ── MENU ── */
.menu-wrap{position:relative}
.menu-btn{background:var(--ink);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.menu-btn:hover{background:rgba(0,0,0,0.8)}
.menu-dots{display:flex;gap:3px}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:#fff}
.menu-dropdown{position:absolute;top:calc(100% + 0.5rem);right:0;background:var(--white);border-radius:0.75rem;box-shadow:0 0 0 1px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.12);min-width:190px;padding:0.5rem;z-index:200;display:none}
.menu-dropdown.open{display:block;animation:menuIn 0.2s ease-out}
@keyframes menuIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.menu-item{padding:0.65rem 0.85rem;border-radius:0.5rem;font-family:'Barlow',sans-serif;font-size:0.78rem;font-weight:600;color:rgba(0,0,0,0.7);cursor:pointer;transition:all 0.15s}
.menu-item:hover{background:rgba(0,0,0,0.04);color:rgba(0,0,0,0.9)}

/* ── POSTER WRAP — centred, capped ── */
.poster-wrap{flex:1;min-height:0;display:flex;align-items:stretch;justify-content:center;padding:0.75rem 0.75rem 0}
.poster{width:min(720px,100%);background:var(--white);border-radius:1.4rem 1.4rem 0 0;overflow:hidden;display:flex;flex-direction:column;min-height:0;position:relative;
  box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,4px 6px 0 rgba(0,0,0,0.05),0 20px 50px rgba(0,0,0,0.15),0 4px 12px rgba(0,0,0,0.08);
  animation:cardEnter 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes cardEnter{0%{opacity:0;transform:scale(0.92) translateY(-24px)}65%{opacity:1;transform:scale(1.01) translateY(4px)}100%{opacity:1;transform:scale(1) translateY(0)}}

/* flag */
.flag{position:absolute;top:-2px;left:1.8rem;width:52px;z-index:10}
.flag-body{width:100%;padding:0.45rem 0 0.3rem;display:flex;align-items:center;justify-content:center;position:relative;background:var(--ink)}
.flag-body::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:9px;background:var(--ink);clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%)}
.flag-label{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;color:#fff;letter-spacing:0.12em;text-transform:uppercase;line-height:1}

/* ── PROGRESS STRIP ── */
.progress-strip{flex-shrink:0;padding:0.55rem 1.5rem 0.6rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:0.875rem;margin-top:2.4rem}
.bar-track{flex:1;height:3px;background:rgba(0,0,0,0.07);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--c-teal),var(--c-coral));border-radius:2px;transition:width 0.55s cubic-bezier(0.4,0,0.2,1)}
.progress-label{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:rgba(0,0,0,0.28);white-space:nowrap;min-width:64px;text-align:right;transition:color 0.3s}
.progress-label.done{color:var(--c-teal)}

/* ── ESSAY CANVAS ── */
.essay-canvas{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.5rem 2rem 2rem}
.essay-canvas::-webkit-scrollbar{width:3px}
.essay-canvas::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

/* paragraph blocks */
.para-block{margin-bottom:1.75rem}
.para-block:last-child{margin-bottom:0}
.para-block+.para-block{padding-top:1.75rem;border-top:1.5px solid rgba(61,158,149,0.1)}
.para-label{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;text-transform:uppercase;letter-spacing:0.14em;color:rgba(0,0,0,0.2);margin-bottom:0.65rem;display:flex;align-items:center;gap:0.5rem;transition:color 0.4s}
.para-label .check{opacity:0;transform:scale(0);transition:opacity 0.4s,transform 0.4s cubic-bezier(0.34,1.56,0.64,1);color:var(--c-teal)}
.para-block.complete .para-label{color:var(--c-teal)}
.para-block.complete .para-label .check{opacity:1;transform:scale(1)}

/* prose */
.prose{font-family:'DM Sans',sans-serif;font-size:1.02rem;line-height:2;color:rgba(0,0,0,0.72);font-weight:400}
.s-anchor{color:var(--ink);font-weight:500}

/* pill containers */
.pill-container{display:inline;white-space:normal}
.pill{display:inline-flex;align-items:center;justify-content:center;background:var(--c-teal);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:900;min-width:2.5rem;height:1.5rem;border-radius:2rem;padding:0 0.6rem;margin:0 0.15rem;vertical-align:middle;cursor:pointer;user-select:none;-webkit-user-select:none;position:relative;animation:breathe 3s ease-in-out infinite;transition:transform 0.15s,background 0.15s,box-shadow 0.15s;will-change:transform}
/* review-specific pill colours — preserved from original */
.pill[data-type="hook"]     {background:var(--hook)}
.pill[data-type="opinion"]  {background:var(--opinion)}
.pill[data-type="feature"]  {background:var(--feature)}
.pill[data-type="detail"]   {background:var(--detail)}
.pill[data-type="highlight"]{background:var(--highlight)}
.pill[data-type="impact"]   {background:var(--impact)}
.pill[data-type="addition"] {background:var(--addition)}
.pill[data-type="contrast"] {background:var(--contrast)}
.pill[data-type="verdict"]  {background:var(--verdict)}
.pill[data-type="audience"] {background:var(--audience)}
.pill[data-type="context"]  {background:var(--context)}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(61,158,149,0.5)}60%{box-shadow:0 0 0 6px rgba(61,158,149,0)}}
.pill:nth-child(3n+1){animation-delay:0s}.pill:nth-child(3n+2){animation-delay:0.8s}.pill:nth-child(3n+3){animation-delay:1.6s}
.pill:hover{transform:scale(1.15) translateY(-2px);filter:brightness(1.1);box-shadow:0 4px 14px rgba(0,0,0,0.35);animation:none}
.pill:active{transform:scale(0.92)}
.pill-container.revealed .pill{display:none}
.s-new{display:none;color:var(--c-teal);font-weight:600;white-space:normal;word-wrap:break-word}
.pill-container.revealed .s-new{display:inline;animation:fadeIn 0.5s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.s-new.ink{color:rgba(0,0,0,0.72);font-weight:400;transition:color 0.9s ease,font-weight 0.9s ease}

/* state msg */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.75rem;font-family:'Instrument Sans',sans-serif;font-size:0.9rem;color:rgba(0,0,0,0.3);text-align:center;line-height:1.6;padding:2rem}

/* celebration */
.celebration{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.celebration.show{animation:celebPop 2.8s ease forwards}
@keyframes celebPop{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.celeb-pill{background:var(--ink);color:#fff;padding:1rem 2.25rem;border-radius:3rem;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;letter-spacing:0.07em;text-transform:uppercase;box-shadow:0 12px 48px rgba(0,0,0,0.3);animation:celebScale 0.45s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes celebScale{from{transform:scale(0.7)}to{transform:scale(1)}}

/* accent bar */
.accent-bar{height:5px;flex-shrink:0;background:linear-gradient(90deg,var(--c-teal),var(--c-coral))}

/* ── FOOTER NAV ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.97);border-top:1px solid var(--rule)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

@media(max-width:480px){
  .essay-canvas{padding:1rem 1.25rem 1.5rem}
  .prose{font-size:0.92rem;line-height:1.9}
  .nb{padding:0.3rem 0.6rem;font-size:0.55rem;min-height:26px}
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="back-link" href="/skills/writing/reviews/review-question-selector">← Questions</a>
    <span class="brand">INTUITY</span>
    <div class="menu-wrap">
      <div class="menu-btn" onclick="toggleMenu()">
        <div class="menu-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="menu-dropdown" id="menuDropdown">
        <div class="menu-item" onclick="revealAll()">Reveal all sentences</div>
        <div class="menu-item" onclick="resetAll()">Reset review</div>
      </div>
    </div>
  </div>

  <div class="poster-wrap">
  <div class="poster">
    <div class="flag"><div class="flag-body"><span class="flag-label">Builder</span></div></div>

    <div class="progress-strip">
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      <div class="progress-label" id="progressLabel">tap to reveal</div>
    </div>

    <div class="essay-canvas" id="essayCanvas">
      <div class="state-msg">Loading…</div>
    </div>

    <div class="accent-bar"></div>
  </div>
  </div><!-- /poster-wrap -->

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    onclick="navTo('question')">Question</button>
      <button class="nb"    onclick="navTo('plan')">Plan</button>
      <button class="nb"    onclick="navTo('model')">Model</button>
      <button class="nb on" onclick="navTo('builder')">Builder</button>
      <button class="nb"    onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-pill">Review complete ✦</div>
</div>

<script>
/* ══ STATE ══ */
let question=null,essayData=null,totalHidden=0,revealCount=0;
const PARA_LABELS=['Introduction','Key Feature 1','Key Feature 2','Recommendation'];

/* ══ SENTENCE TYPE DETECTION — preserved exactly from original ══ */
function detectSentenceType(text,paraLabel,sentenceIndex){
  const lower=text.toLowerCase();
  const label=(paraLabel||'').toLowerCase();
  if(label.includes('intro')){
    if(lower.match(/^(choosing|when it comes to|if you are looking|deciding on|selecting)/i))return{type:'hook',label:'Hook'};
    if(lower.match(/^(i recently|i have to say|i was|i must say|i visited|i watched|i attended|i read|i played|i downloaded)/i))return{type:'opinion',label:'Opinion'};
    if(lower.match(/^(however|nevertheless|that said)/i))return{type:'contrast',label:'Contrast'};
  }
  if(label.includes('recommend')||label.includes('p4')||sentenceIndex>=3){
    if(lower.match(/^(i would|for anyone|i can assure|this is a must|i guarantee|i would definitely|i would highly)/i))return{type:'verdict',label:'Verdict'};
    if(lower.match(/^(for anyone who|anyone interested|perfect for|ideal for)/i))return{type:'audience',label:'Audience'};
  }
  if(lower.match(/^(what makes|the thing that is most|by far the best|the other feature|if you happen)/i))return{type:'feature',label:'Feature'};
  if(lower.includes('most likely to impress')||lower.includes('by far the best'))return{type:'highlight',label:'Highlight'};
  if(lower.match(/^(known for|regarded as|located|designed by|created by)/i))return{type:'impact',label:'Impact'};
  if(lower.match(/^(by far one of the most|one of the most memorable|one of the most powerful)/i))return{type:'highlight',label:'Highlight'};
  if(lower.match(/^(furthermore|moreover|in addition|additionally|what's more)/i))return{type:'addition',label:'Addition'};
  if(lower.match(/^(however|on the other hand|that said|although|despite)/i))return{type:'contrast',label:'Contrast'};
  if(lower.match(/^(this means|this allows|this makes|the result|the effect)/i))return{type:'detail',label:'Detail'};
  return{type:'detail',label:null};
}

/* ══ INIT ══ */
async function init(){
  try{question=JSON.parse(sessionStorage.getItem('currentReviewQuestion'));}
  catch(e){question=null;}
  if(!question){
    document.getElementById('essayCanvas').innerHTML=
      '<div class="state-msg">No question selected.<br>Return to Questions to choose one.</div>';
    return;
  }
  try{
    /* data path preserved exactly */
    const res=await fetch('data/review-samples-build.json');
    if(!res.ok)throw new Error('review-samples-build.json not found');
    const data=await res.json();
    const paragraphs=data[question.id];
    if(!paragraphs||!Array.isArray(paragraphs)||paragraphs.length===0){
      document.getElementById('essayCanvas').innerHTML=
        `<div class="state-msg">No build data for this question yet.<br><small style="opacity:0.35;margin-top:0.5rem;display:block">id: ${question.id}</small></div>`;
      return;
    }
    essayData=paragraphs;
    renderEssay();
  }catch(err){
    document.getElementById('essayCanvas').innerHTML=
      `<div class="state-msg">Could not load review-samples-build.json<br><small style="opacity:0.35;margin-top:0.5rem;display:block">${err.message}</small></div>`;
  }
}

/* ══ RENDER ══ */
function renderEssay(){
  if(!essayData)return;
  totalHidden=0;revealCount=0;
  const canvas=document.getElementById('essayCanvas');
  const html=essayData.map((para,pi)=>{
    const label=para.label||PARA_LABELS[pi]||`Paragraph ${pi+1}`;
    const sentences=para.sentences||[];
    totalHidden+=sentences.length-1;
    const sentenceHTML=sentences.map((text,si)=>{
      if(si===0)return `<span class="s-anchor">${text}</span>`;
      const detection=detectSentenceType(text,label,si);
      const pillLabel=detection.label||(si+1);
      return `<span class="pill-container" data-para="${pi}" data-sent="${si}">` +
             `<span class="s-new">${text}</span>` +
             `<span class="pill" data-type="${detection.type}" onclick="revealSentence(${pi},${si})">${pillLabel}</span>` +
             `</span>`;
    }).join(' ');
    return `<div class="para-block" id="para-${pi}">` +
           `<div class="para-label">${label}<span class="check"> ✦</span></div>` +
           `<div class="prose">${sentenceHTML}</div>` +
           `</div>`;
  }).join('');
  canvas.innerHTML=html;
  updateProgress();
}

/* ══ REVEAL ══ */
function revealSentence(paraIdx,sentIdx){
  const container=document.querySelector(`.pill-container[data-para="${paraIdx}"][data-sent="${sentIdx}"]`);
  if(!container||container.classList.contains('revealed'))return;
  container.classList.add('revealed');
  revealCount++;
  const newText=container.querySelector('.s-new');
  setTimeout(()=>newText.classList.add('ink'),1400);
  checkParagraphComplete(paraIdx);
  updateProgress();
  if(revealCount===totalHidden)setTimeout(celebrate,350);
}

function checkParagraphComplete(paraIdx){
  const para=document.getElementById(`para-${paraIdx}`);
  const containers=para.querySelectorAll('.pill-container');
  if(Array.from(containers).every(c=>c.classList.contains('revealed')))
    para.classList.add('complete');
}

/* ══ PROGRESS ══ */
function updateProgress(){
  const pct=totalHidden>0?(revealCount/totalHidden)*100:0;
  document.getElementById('barFill').style.width=pct+'%';
  const lbl=document.getElementById('progressLabel');
  if(revealCount===0){lbl.textContent='tap to reveal';lbl.classList.remove('done');}
  else if(revealCount===totalHidden){lbl.textContent='complete ✦';lbl.classList.add('done');}
  else{lbl.textContent=`${revealCount} / ${totalHidden}`;lbl.classList.remove('done');}
}

/* ══ CELEBRATE ══ */
function celebrate(){
  const el=document.getElementById('celebration');
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2900);
}

/* ══ MENU ══ */
function toggleMenu(){document.getElementById('menuDropdown').classList.toggle('open');}
function closeMenu(){document.getElementById('menuDropdown').classList.remove('open');}
document.addEventListener('click',e=>{
  if(!e.target.closest('#menuDropdown')&&!e.target.closest('.menu-btn'))closeMenu();
});
function revealAll(){
  closeMenu();
  document.querySelectorAll('.pill-container:not(.revealed)').forEach(c=>{
    revealSentence(parseInt(c.dataset.para),parseInt(c.dataset.sent));
  });
}
function resetAll(){closeMenu();if(essayData)renderEssay();}

/* ══ FOOTER NAV — all paths preserved ══ */
function navTo(dest){
  if(dest==='builder')return;
  if(question)sessionStorage.setItem('currentReviewQuestion',JSON.stringify(question));
  const map={
    question:'review-question-selector.html',
    plan:    'review-plan.html',
    model:   'review-model.html',
    sample:  'review-master.html'
  };
  if(map[dest])window.location.href=map[dest];
}

init();
</script>
</body>
</html>
