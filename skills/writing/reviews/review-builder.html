<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Build Review — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--ink:#111111;--white:#ffffff;
  --c-teal:#3d9e95;--c-teal-lt:#e4f4f2;--c-teal-mid:#8dccc7;
  --c-coral:#e8723a;--c-coral-lt:#fdf0ea;--c-coral-mid:#f5ad87;
  --c-purple:#7b5ea7;--c-purple-lt:#f0ecf8;--c-purple-mid:#b9a3d3;
  --c-rose:#c94f6d;--c-rose-lt:#faedf1;--c-rose-mid:#e89db0;
  --c-gold:#c08b2f;--c-gold-lt:#fdf6e3;--c-gold-mid:#e4c073;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.shell{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.95);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:100}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}

/* ── VIEW TOGGLE ── */
.view-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0.5rem 1.25rem;border-bottom:1px solid rgba(0,0,0,0.06);background:rgba(240,239,236,0.8)}
.vb-pill{display:flex;background:rgba(0,0,0,0.05);border-radius:2rem;padding:0.2rem}
.vb-btn{background:transparent;border:none;padding:0.35rem 1.25rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s}
.vb-btn.on{background:var(--ink);color:#fff}

/* ── PARAGRAPH TABS ── */
.para-tabs{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;padding:0.45rem 1.1rem;background:rgba(240,239,236,0.8);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto}
.para-tabs::-webkit-scrollbar{display:none}
.ptab{background:transparent;border:none;padding:0.28rem 0.65rem;border-radius:2rem;font-family:'Barlow',sans-serif;font-size:0.58rem;font-weight:700;color:rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase}
.ptab:hover{color:rgba(0,0,0,0.55);background:rgba(0,0,0,0.05)}
.ptab.active{background:var(--ink);color:#fff}
.ptab.done{background:rgba(61,158,149,0.12);color:var(--c-teal)}

/* ── CONTENT AREA ── */
.stage{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1.25rem;display:flex;flex-direction:column;align-items:center;gap:0.75rem}
.stage::-webkit-scrollbar{width:4px}
.stage::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px}

/* ── QUESTION BANNER ── */
.q-banner{width:100%;max-width:480px;border-radius:0 0.75rem 0.75rem 0;padding:0.7rem 1rem;border-left:4px solid}
.q-banner.para-intro    {background:rgba(61,158,149,0.07);border-color:var(--c-teal)}
.q-banner.para-feat1    {background:rgba(232,114,58,0.07);border-color:var(--c-coral)}
.q-banner.para-feat2    {background:rgba(123,94,167,0.07);border-color:var(--c-purple)}
.q-banner.para-recommend{background:rgba(192,139,47,0.07);border-color:var(--c-gold)}
.q-label{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:0.2rem}
.q-banner.para-intro    .q-label{color:var(--c-teal)}
.q-banner.para-feat1    .q-label{color:var(--c-coral)}
.q-banner.para-feat2    .q-label{color:var(--c-purple)}
.q-banner.para-recommend .q-label{color:var(--c-gold)}
.q-text{font-family:'Instrument Sans',sans-serif;font-size:0.82rem;font-style:italic;color:rgba(0,0,0,0.6);line-height:1.5}

/* ── SENTENCE CARD ── */
.read-wrap{width:100%;max-width:480px}
.read-banner{width:100%;background:var(--white);border-radius:1.3rem;overflow:hidden;box-shadow:3px 5px 0 rgba(0,0,0,0.06),0 16px 40px rgba(0,0,0,0.1);animation:bannerIn 0.35s cubic-bezier(0.22,1,0.36,1) both}
@keyframes bannerIn{from{opacity:0;transform:translateY(8px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.sent-row{display:flex;align-items:stretch;border-bottom:1px solid rgba(0,0,0,0.05)}
.sent-row:last-of-type{border-bottom:none}
.sent-row.new-row{animation:rowIn 0.35s cubic-bezier(0.22,1,0.36,1) both}
@keyframes rowIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.sent-strip{width:4px;flex-shrink:0}
.sent-num{flex-shrink:0;width:32px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Sans',sans-serif;font-size:0.75rem;font-weight:400;color:rgba(0,0,0,0.14)}
.sent-content{flex:1;padding:0.825rem 1rem 0.825rem 0.2rem}
.sent-label{font-family:'Barlow Condensed',sans-serif;font-size:0.5rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:0.18rem}
.sent-text{font-family:'Instrument Sans',sans-serif;font-size:0.9rem;font-weight:400;line-height:1.6;color:rgba(0,0,0,0.82)}
.lw{font-weight:700;color:var(--c-coral)}
.ow{font-weight:700;color:var(--c-teal)}
.sc-teal   .sent-strip{background:var(--c-teal)}   .sc-teal   .sent-label{color:var(--c-teal)}
.sc-coral  .sent-strip{background:var(--c-coral)}  .sc-coral  .sent-label{color:var(--c-coral)}
.sc-purple .sent-strip{background:var(--c-purple)} .sc-purple .sent-label{color:var(--c-purple)}
.sc-gold   .sent-strip{background:var(--c-gold)}   .sc-gold   .sent-label{color:var(--c-gold)}
.sent-row.pending .sent-strip{background:rgba(0,0,0,0.05)}
.sent-row.pending .sent-label{color:rgba(0,0,0,0.15)}
.sent-row.pending .sent-text{color:rgba(0,0,0,0.18)}

/* card footer */
.read-foot{display:flex;align-items:center;justify-content:space-between;padding:0.55rem 1rem;border-top:1px solid rgba(0,0,0,0.05)}
.foot-counter{font-family:'Instrument Sans',sans-serif;font-size:0.68rem;color:rgba(0,0,0,0.25)}
.foot-btn{background:transparent;border:1px solid rgba(0,0,0,0.1);padding:0.3rem 0.875rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.38);cursor:pointer;transition:all 0.2s}
.foot-btn:hover:not(:disabled){border-color:var(--c-teal);color:var(--c-teal)}
.foot-btn:disabled{opacity:0.2;cursor:not-allowed}
.foot-btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}
.foot-btn.primary:hover{background:rgba(0,0,0,0.8)}
.foot-btn.next-para{background:var(--c-teal);border-color:var(--c-teal);color:#fff}
.foot-btn.next-para:hover{opacity:0.88}

/* state / complete */
.state-msg{font-family:'Instrument Sans',sans-serif;font-size:0.9rem;color:rgba(0,0,0,0.3);text-align:center;padding:3rem 1rem;line-height:1.6}
.complete-banner{width:100%;max-width:480px;background:rgba(61,158,149,0.08);border:1.5px solid rgba(61,158,149,0.2);border-radius:1.3rem;padding:1.5rem;text-align:center}
.complete-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:0.06em;text-transform:uppercase;color:var(--c-teal);margin-bottom:0.5rem}
.complete-body{font-family:'Instrument Sans',sans-serif;font-size:0.82rem;color:rgba(0,0,0,0.5);line-height:1.5;margin-bottom:1rem}
.complete-btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.55rem 1.25rem;background:var(--ink);color:#fff;border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.complete-btn:hover{background:rgba(0,0,0,0.8)}

/* ── FOOTER NAV ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.95);border-top:1px solid rgba(0,0,0,0.06)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}
@media(max-width:768px){
  .stage{padding:0.75rem 1rem}
  .nb{padding:0.3rem 0.6rem;font-size:0.55rem;min-height:26px}
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a href="/skills/writing/reviews/review-question-selector" class="back-link">← Questions</a>
    <span class="brand">INTUITY</span>
    <div style="width:28px"></div>
  </div>
  <div class="view-bar">
    <div class="vb-pill">
      <button class="vb-btn on">Read</button>
      <button class="vb-btn" onclick="goToBuild()">Build</button>
    </div>
  </div>
  <div class="para-tabs" id="paraTabs"></div>
  <div class="stage" id="contentArea">
    <div class="state-msg">Loading…</div>
  </div>
  <div class="foot">
    <div class="nav-pill">
      <button class="nb" onclick="navTo('question')">Question</button>
      <button class="nb" onclick="navTo('plan')">Plan</button>
      <button class="nb" onclick="navTo('model')">Model</button>
      <button class="nb on">Builder</button>
      <button class="nb" onclick="navTo('sample')">Sample</button>
    </div>
  </div>
</div>
<script>
const PARA_CONFIG=[
  {key:'intro',     label:'Introduction',   tab:'Intro',     sc:'sc-teal',   bannerClass:'para-intro',     firstLabel:'Opening'},
  {key:'feature1',  label:'Key Feature 1',  tab:'Feature 1', sc:'sc-coral',  bannerClass:'para-feat1',     firstLabel:'Topic Sentence'},
  {key:'feature2',  label:'Key Feature 2',  tab:'Feature 2', sc:'sc-purple', bannerClass:'para-feat2',     firstLabel:'Topic Sentence'},
  {key:'recommend', label:'Recommendation', tab:'Recommend', sc:'sc-gold',   bannerClass:'para-recommend', firstLabel:'Verdict'},
];
const LINK_WORDS=['For example','For instance','However','Therefore','Thus','Hence','As a result','Consequently','Moreover','Furthermore','In addition','Nevertheless','Nonetheless','On the other hand','In contrast','Similarly','Likewise','In fact','Indeed','Specifically','This is because','This happens because','Given that','Since','Although','While','Whereas','By comparison','Compared to','Unlike','In other words','That is to say','Put simply','To say it another way'];
const MOVE_DETECT=[
  {label:'Hook',     sc:'sc-teal',   re:/^(choosing|when it comes to|if you are looking|deciding on)/i},
  {label:'Opinion',  sc:'sc-coral',  re:/^(i recently|i have to say|i was|i must say|i visited|i watched|i attended|i read|i played)/i},
  {label:'Feature',  sc:'sc-coral',  re:/^(what makes|the thing that|by far the best|one of the most impressive|what i found|another feature)/i},
  {label:'Detail',   sc:'sc-purple', re:/^(furthermore|moreover|in addition|additionally|what's more|known for|regarded as)/i},
  {label:'Impact',   sc:'sc-gold',   re:/^(as a result|therefore|thus|consequently|this means|this allows|this makes)/i},
  {label:'Contrast', sc:'sc-purple', re:/^(however|on the other hand|that said|although|despite)/i},
  {label:'Verdict',  sc:'sc-gold',   re:/^(i would|for anyone|i can assure|this is a must|i guarantee|i would definitely|i would highly)/i},
  {label:'Audience', sc:'sc-teal',   re:/^(for anyone who|anyone interested|perfect for|ideal for)/i},
];
const OPENER_STARTS=['What makes','The thing that','By far the best','One of the most','What I found','Choosing','When it comes to','I would','For anyone','Known for'];

let buildsData=null,question=null,currentParaIdx=0,sentences=[],revealed=0;
const doneParagraphs=new Set();

async function load(){
  try{question=JSON.parse(sessionStorage.getItem('currentReviewQuestion'));}catch(e){}
  if(!question){show('<div class="state-msg">No question selected.<br>Return to Questions to choose one.</div>');buildTabs();return;}
  try{
    const r=await fetch('data/review-samples-build.json');
    if(!r.ok)throw new Error();
    buildsData=await r.json();
  }catch(e){show('<div class="state-msg">⚠️ Could not load paragraph data.</div>');buildTabs();return;}
  if(!buildsData[question.id]){
    show(`<div class="state-msg">No build data for this question yet.<br><small style="opacity:0.35;margin-top:0.5rem;display:block">id: ${question.id}</small></div>`);
    buildTabs();return;
  }
  buildTabs();
  loadParagraph(0);
}

function buildTabs(){
  document.getElementById('paraTabs').innerHTML=PARA_CONFIG.map((p,i)=>{
    const isDone=doneParagraphs.has(i);
    const isActive=i===currentParaIdx;
    return `<button class="ptab ${isActive?'active':''} ${isDone&&!isActive?'done':''}" onclick="switchPara(${i})">${p.tab}${isDone&&!isActive?' ✓':''}</button>`;
  }).join('');
}

function switchPara(idx){currentParaIdx=idx;loadParagraph(idx);}

function loadParagraph(idx){
  currentParaIdx=idx;
  const cfg=PARA_CONFIG[idx];
  const essay=buildsData[question.id];
  const paraData=essay[idx]||essay[cfg.key]||null;
  const raw=paraData?paraData.sentences:[];
  const firstScMap={intro:'sc-teal',feature1:'sc-coral',feature2:'sc-purple',recommend:'sc-gold'};
  sentences=raw.map((text,i)=>{
    if(i===0)return{text,label:cfg.firstLabel,sc:firstScMap[cfg.key]||'sc-teal'};
    const move=MOVE_DETECT.find(m=>m.re.test(text.trim()));
    return{text,label:move?move.label:'Supporting',sc:move?move.sc:'sc-purple'};
  });
  revealed=1;
  buildTabs();
  render();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hlLinks(escaped){const p=new RegExp(`(${LINK_WORDS.join('|')})`,'gi');return escaped.replace(p,'<span class="lw">$1</span>');}
function hlText(text,idx){
  const escaped=esc(text);
  if(idx===0){for(const op of OPENER_STARTS){if(text.startsWith(op))return `<span class="ow">${esc(op)}</span>${hlLinks(esc(text.slice(op.length)))}`; }}
  return hlLinks(escaped);
}
function show(html){document.getElementById('contentArea').innerHTML=html;}

function render(){
  if(!sentences.length){show('<div class="state-msg">No sentences available for this paragraph yet.</div>');return;}
  const cfg=PARA_CONFIG[currentParaIdx];
  const isLast=revealed>=sentences.length;
  const isLastPara=currentParaIdx>=PARA_CONFIG.length-1;
  let rows='';
  sentences.forEach((s,i)=>{
    const isPending=i>=revealed;
    const isNew=i===revealed-1&&revealed>1;
    rows+=`<div class="sent-row ${isPending?'':s.sc} ${isPending?'pending':''} ${isNew?'new-row':''}">
      <div class="sent-strip"></div>
      <div class="sent-num">${String(i+1).padStart(2,'0')}</div>
      <div class="sent-content">
        <div class="sent-label">${isPending?'—':s.label}</div>
        <div class="sent-text">${isPending?'· · ·':hlText(s.text,i)}</div>
      </div>
    </div>`;
  });
  let primaryBtn='';
  if(!isLast){
    primaryBtn=`<button class="foot-btn primary" onclick="step(1)">Next →</button>`;
  }else if(!isLastPara){
    primaryBtn=`<button class="foot-btn next-para" onclick="nextParagraph()">Next Paragraph →</button>`;
  }else{
    primaryBtn=`<button class="foot-btn primary" onclick="allDone()">✓ Done</button>`;
  }
  const qText=question?`"${esc(question.question||'')}"`:'' ;
  show(`
    <div class="q-banner ${cfg.bannerClass}">
      <div class="q-label">${cfg.label}</div>
      <div class="q-text">${qText}</div>
    </div>
    <div class="read-wrap">
      <div class="read-banner">
        ${rows}
        <div class="read-foot">
          <button class="foot-btn" onclick="step(-1)" ${revealed<=1?'disabled':''}>← Back</button>
          <span class="foot-counter">${revealed} / ${sentences.length}</span>
          ${primaryBtn}
        </div>
      </div>
    </div>`);
}

function step(dir){const next=revealed+dir;if(next<1||next>sentences.length)return;revealed=next;render();}

function nextParagraph(){
  doneParagraphs.add(currentParaIdx);
  switchPara(currentParaIdx+1);
}

function allDone(){
  doneParagraphs.add(currentParaIdx);
  show(`<div class="complete-banner">
    <div class="complete-title">Review complete ✦</div>
    <div class="complete-body">You've read through all four paragraphs.<br>Try Build mode to construct your own.</div>
    <button class="complete-btn" onclick="goToBuild()">→ Try Build mode</button>
  </div>`);
  buildTabs();
}

function goToBuild(){
  if(question)sessionStorage.setItem('currentReviewQuestion',JSON.stringify(question));
  window.location.href='review-builder-deep.html';
}
function navTo(dest){
  if(question)sessionStorage.setItem('currentReviewQuestion',JSON.stringify(question));
  const map={question:'review-question-selector.html',plan:'review-plan.html',model:'review-model.html',sample:'review-master.html'};
  if(map[dest])window.location.href=map[dest];
}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')step(1);if(e.key==='ArrowLeft')step(-1);});
load();
</script>
</body>
</html>
