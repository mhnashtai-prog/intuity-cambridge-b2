<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Review Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Barlow+Condensed:wght@700;800;900&family=Bebas+Neue&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0efec;--white:#FAFAF8;--ink:#0d0d0d;--rule:rgba(0,0,0,0.07);

  /* lettuce — page identity colour */
  --lettuce:#7db87a;--lettuce-d:#5a9657;--lettuce-lt:#e8f5e6;--lettuce-mid:#aed6ab;

  /* review colour system — mirrors section roles */
  --teal:#5ab5ac;--teal-d:#4a9a92;
  --coral:#f89643;--coral-d:#e67e2e;
  --purple:#8b7ba8;--purple-d:#726291;

  /* live accent — default lettuce, overridden per tab if needed */
  --accent:var(--lettuce);--accent-d:var(--lettuce-d);--accent-mid:var(--lettuce-mid);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}

/* ── SHELL ── */
.shell{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.25rem;background:rgba(240,239,236,0.97);border-bottom:1.5px solid rgba(0,0,0,0.07);z-index:10}
.back-link{text-decoration:none;font-size:0.72rem;font-weight:700;color:rgba(0,0,0,0.38);letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s}
.back-link:hover{color:rgba(0,0,0,0.65)}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:rgba(0,0,0,0.18)}

/* ── POSTER WRAP — centred, capped width ── */
.poster-wrap{flex:1;min-height:0;display:flex;align-items:stretch;justify-content:center;padding:0.75rem 0.75rem 0}
.poster{width:min(720px,100%);background:var(--white);border-radius:1.4rem 1.4rem 0 0;overflow:hidden;display:flex;flex-direction:column;min-height:0;position:relative;
  box-shadow:0 2px 0 rgba(255,255,255,0.8) inset,4px 6px 0 rgba(0,0,0,0.05),0 20px 50px rgba(0,0,0,0.15),0 4px 12px rgba(0,0,0,0.08);
  animation:cardEnter 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes cardEnter{0%{opacity:0;transform:scale(0.92) translateY(-24px)}65%{opacity:1;transform:scale(1.01) translateY(4px)}100%{opacity:1;transform:scale(1) translateY(0)}}

/* flag */
.flag{position:absolute;top:-2px;left:1.8rem;width:52px;z-index:10;display:flex;flex-direction:column;align-items:center}
.flag-body{width:100%;padding:0.45rem 0 0.3rem;display:flex;align-items:center;justify-content:center;position:relative;background:var(--lettuce);transition:background 0.3s}
.flag-body::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:9px;background:var(--lettuce);clip-path:polygon(0% 0%,8.33% 100%,16.66% 0%,25% 100%,33.33% 0%,41.66% 100%,50% 0%,58.33% 100%,66.66% 0%,75% 100%,83.33% 0%,91.66% 100%,100% 0%);transition:background 0.3s}
.flag-label{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;color:#fff;letter-spacing:0.12em;text-transform:uppercase;line-height:1}

/* type badge top-right */
.type-badge{position:absolute;top:1rem;right:1.3rem;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:var(--lettuce);opacity:0.65}

/* ── TABS ── */
.card-tabs{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.35rem;padding:0.6rem 1.25rem 0.5rem;background:var(--white);border-bottom:1px solid var(--rule);overflow-x:auto;margin-top:2.4rem}
.card-tabs::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;border:none;border-bottom:3px solid transparent;padding:0.4rem 0.8rem;font-size:0.64rem;font-weight:800;color:rgba(0,0,0,0.32);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;font-family:'Barlow Condensed',sans-serif}
.tab-btn:hover{color:rgba(0,0,0,0.6)}
.tab-btn.active{color:var(--lettuce);border-bottom-color:var(--lettuce)}

/* ── CONTENT ── */
.card-content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--white)}
.content-header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:0.6rem 1.4rem 0.5rem;border-bottom:2px solid rgba(0,0,0,0.06)}
.content-title{font-size:0.62rem;font-weight:700;color:rgba(0,0,0,0.32);text-transform:uppercase;letter-spacing:0.12em;font-family:'Barlow Condensed',sans-serif}
.view-toggle{display:flex;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);border-radius:7px;padding:0.18rem;gap:0.18rem}
.toggle-btn{padding:0.28rem 0.65rem;background:transparent;border:none;border-radius:5px;color:rgba(0,0,0,0.42);font-size:0.58rem;font-weight:800;cursor:pointer;transition:all 0.25s;text-transform:uppercase;letter-spacing:0.06em;font-family:'Barlow Condensed',sans-serif}
.toggle-btn:hover{color:rgba(0,0,0,0.7)}
.toggle-btn.active{background:var(--ink);color:#fff}

/* ── SCROLL AREA ── */
.infographic{flex:1;padding:0.75rem 1rem 1rem;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.infographic::-webkit-scrollbar{width:3px}
.infographic::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

/* ══ ANATOMY SKELETON — bone system ══ */
.anatomy-plate{position:relative;padding:0.25rem 0.5rem 1.25rem 0}
.anatomy-plate::before{content:'';position:absolute;left:1.85rem;top:0.5rem;bottom:1.5rem;width:1px;background:linear-gradient(to bottom,transparent,rgba(0,0,0,0.1) 5%,rgba(0,0,0,0.1) 95%,transparent)}

.bone{position:relative;display:flex;align-items:stretch;margin-bottom:0.1rem;border-radius:0 0.6rem 0.6rem 0;cursor:pointer;transition:background 0.2s;-webkit-tap-highlight-color:transparent;overflow:hidden}
.bone:hover{background:rgba(0,0,0,0.025)}
.bone.open{background:rgba(0,0,0,0.025)}

.bone-ghost{position:absolute;right:0.25rem;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:4.5rem;line-height:1;opacity:0.04;pointer-events:none;user-select:none;letter-spacing:-0.02em;z-index:0}

.bone-num-col{width:1.85rem;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:0.85rem;position:relative;z-index:2}
.bone-num{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;line-height:1;letter-spacing:0.04em;transition:color 0.2s}
.bone-node{width:6px;height:6px;border-radius:50%;border:2px solid white;box-shadow:0 0 0 1px currentColor;margin-top:0.28rem;flex-shrink:0;transition:transform 0.2s}
.bone:hover .bone-node,.bone.open .bone-node{transform:scale(1.5)}

.bone-rib{position:absolute;left:1.6rem;top:1.5rem;width:0.65rem;height:1px;opacity:0.2;z-index:1}

.bone-content{flex:1;padding:0.65rem 0.4rem 0.55rem 0.55rem;min-width:0;position:relative;z-index:2}
.bone-label{font-family:'Bebas Neue',sans-serif;font-size:clamp(1rem,3.8vw,1.4rem);letter-spacing:0.04em;text-transform:uppercase;line-height:1;color:#0d0d0d;transition:color 0.2s}
.bone-purpose{font-family:'Barlow',sans-serif;font-size:0.55rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.3);margin-top:0.12rem;margin-bottom:0.3rem}
.bone-preview{font-family:'Crimson Text',Georgia,serif;font-style:italic;font-size:clamp(0.78rem,2.4vw,0.9rem);line-height:1.45;color:rgba(0,0,0,0.38);overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.bone-preview .bph{font-style:normal;font-weight:700;opacity:0.6}

.bone-chevron{font-size:0.6rem;opacity:0.22;transition:transform 0.3s,opacity 0.2s;align-self:center;flex-shrink:0;margin-right:0.4rem;z-index:2;font-family:sans-serif}
.bone.open .bone-chevron{transform:rotate(180deg);opacity:0.55}

.bone-divider{height:1px;margin-left:1.85rem;margin-bottom:0.1rem;background:linear-gradient(to right,rgba(0,0,0,0.07),transparent 70%)}

.bone-drawer{overflow:hidden;max-height:0;transition:max-height 0.38s cubic-bezier(0.4,0,0.2,1);margin-left:2.5rem;margin-right:0.25rem}
.bone-drawer.open{max-height:600px}
.drawer-body{padding:0.5rem 0 0.9rem;border-left:1px solid rgba(0,0,0,0.08);padding-left:0.75rem}
.drawer-section-label{font-family:'Barlow Condensed',sans-serif;font-size:0.52rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(0,0,0,0.28);margin-bottom:0.45rem;margin-top:0.65rem}
.drawer-section-label:first-child{margin-top:0}
.drawer-line{font-family:'Instrument Sans',sans-serif;font-size:clamp(0.74rem,2.3vw,0.84rem);line-height:1.65;color:rgba(0,0,0,0.65);padding:0.25rem 0;border-bottom:1px solid rgba(0,0,0,0.045);display:flex;gap:0.45rem;align-items:baseline}
.drawer-line:last-child{border-bottom:none}
.drawer-bullet{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:0.5rem;opacity:0.45}
.dph{font-style:italic;opacity:0.5}
.drawer-phrase-item{font-family:'Crimson Text',Georgia,serif;font-size:clamp(0.8rem,2.5vw,0.92rem);font-style:italic;line-height:1.6;color:rgba(0,0,0,0.55);padding:0.2rem 0;border-bottom:1px solid rgba(0,0,0,0.04);display:flex;gap:0.4rem;align-items:baseline}
.drawer-phrase-item:last-child{border-bottom:none}
.phrase-arrow{font-size:0.6rem;font-style:normal;flex-shrink:0;margin-top:0.38rem;opacity:0.35}

/* bone colour roles: intro=teal, body/feature=coral, end/conclusion=purple */
.bone-intro .bone-num,.bone-intro .bone-node{color:var(--teal)}
.bone-intro .bone-rib{background:var(--teal)}
.bone-intro .bone-ghost{color:var(--teal)}
.bone-intro:hover .bone-label,.bone-intro.open .bone-label{color:var(--teal)}
.bone-intro .bone-preview{color:rgba(90,181,172,0.7)}
.bone-intro .drawer-bullet{background:var(--teal)}
.bone-intro .phrase-arrow{color:var(--teal)}

.bone-body .bone-num,.bone-body .bone-node{color:var(--coral)}
.bone-body .bone-rib{background:var(--coral)}
.bone-body .bone-ghost{color:var(--coral)}
.bone-body:hover .bone-label,.bone-body.open .bone-label{color:var(--coral)}
.bone-body .bone-preview{color:rgba(248,150,67,0.65)}
.bone-body .drawer-bullet{background:var(--coral)}
.bone-body .phrase-arrow{color:var(--coral)}

.bone-end .bone-num,.bone-end .bone-node{color:var(--purple)}
.bone-end .bone-rib{background:var(--purple)}
.bone-end .bone-ghost{color:var(--purple)}
.bone-end:hover .bone-label,.bone-end.open .bone-label{color:var(--purple)}
.bone-end .bone-preview{color:rgba(139,123,168,0.65)}
.bone-end .drawer-bullet{background:var(--purple)}
.bone-end .phrase-arrow{color:var(--purple)}

.anatomy-footer{margin-top:1.25rem;margin-left:1.85rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(0,0,0,0.07);padding-top:0.65rem}
.anatomy-brand{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.18em;color:rgba(0,0,0,0.08)}
.anatomy-level{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(0,0,0,0.12)}

/* ══ PHRASES ══ */
.phrases-display{font-family:'Barlow',sans-serif;color:rgba(0,0,0,0.9)}
.phrase-category{margin-bottom:1.5rem}
.category-title{font-size:0.72rem;font-weight:900;color:rgba(0,0,0,0.35);margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.1em;padding-bottom:0.4rem;border-bottom:2px solid rgba(0,0,0,0.15);font-family:'Barlow Condensed',sans-serif}
.category-title.intro{color:var(--teal);border-bottom-color:var(--teal)}
.category-title.feature{color:var(--coral);border-bottom-color:var(--coral)}
.category-title.conclusion{color:var(--purple);border-bottom-color:var(--purple)}
.subcategory{margin-bottom:1rem}
.subcategory-title{font-size:0.64rem;font-weight:800;color:rgba(0,0,0,0.42);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.06em;font-family:'Barlow Condensed',sans-serif}
.phrase-list{list-style:none;padding:0}
.phrase-item{font-size:0.78rem;line-height:1.6;color:rgba(0,0,0,0.75);margin-bottom:0.5rem;padding-left:0.875rem;position:relative;font-family:'Instrument Sans',sans-serif}
.phrase-item:before{content:"→";position:absolute;left:0;color:var(--lettuce);font-weight:700}

/* ══ PRACTICE ══ */
.practice-display{display:flex;flex-direction:column;gap:1.25rem}
.practice-question{background:rgba(125,184,122,0.07);border-left:4px solid var(--lettuce);border-radius:0.75rem;padding:1rem 1.25rem}
.practice-question-label{font-size:0.6rem;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;color:rgba(0,0,0,0.35);margin-bottom:0.35rem;font-family:'Barlow Condensed',sans-serif}
.practice-question-text{font-size:1rem;font-weight:700;color:var(--ink);line-height:1.4;font-family:'Instrument Sans',sans-serif}
.practice-answer{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.06);border-radius:0.75rem;padding:1.1rem 1.25rem}
.practice-answer-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:rgba(0,0,0,0.3);margin-bottom:0.5rem;font-family:'Barlow Condensed',sans-serif}
.answer-line{display:flex;align-items:flex-start;gap:0.75rem;padding:0.45rem 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.answer-line:last-child{border-bottom:none}
.answer-line.played .answer-text{opacity:0.38}
.answer-marker{flex-shrink:0;width:6px;height:6px;border-radius:50%;margin-top:0.45rem;background:rgba(0,0,0,0.18);transition:background 0.3s}
.answer-line.has-phrase .answer-marker{background:var(--lettuce)}
.answer-line.played .answer-marker{background:rgba(0,0,0,0.1)}
.answer-text{font-size:0.88rem;line-height:1.6;color:var(--ink);font-family:'Instrument Sans',sans-serif}
.answer-phrase-tag{display:inline-block;font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:0.15rem 0.5rem;border-radius:2rem;margin-left:0.4rem;vertical-align:middle;opacity:0.75;font-family:'Barlow Condensed',sans-serif}
.tag-intro{background:rgba(90,181,172,0.12);color:var(--teal)}
.tag-feature{background:rgba(248,150,67,0.12);color:var(--coral)}
.tag-conclusion{background:rgba(139,123,168,0.12);color:var(--purple)}
.practice-controls{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.25rem;background:rgba(0,0,0,0.02);border-radius:0.75rem;flex-shrink:0}
.play-practice-btn{display:flex;align-items:center;gap:0.5rem;padding:0.55rem 1.1rem;background:var(--ink);color:#fff;border:none;border-radius:2rem;font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;font-family:'Barlow Condensed',sans-serif}
.play-practice-btn:hover{background:rgba(0,0,0,0.8)}
.practice-caption{font-size:0.78rem;font-style:italic;color:rgba(0,0,0,0.38);flex:1;line-height:1.4;min-height:1.2em;font-family:'Instrument Sans',sans-serif}

/* ══ FLY BANNER (practice overlay) ══ */
.fly-banner{position:fixed;z-index:900;pointer-events:none;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:0.6rem;padding:2rem 2.2rem;border-radius:1.6rem;background:#fff;border-left:12px solid var(--teal);box-shadow:0 40px 100px rgba(0,0,0,0.3),0 10px 30px rgba(0,0,0,0.18),0 2px 8px rgba(0,0,0,0.1);font-family:'Instrument Sans',sans-serif;font-size:1.75rem;font-weight:700;line-height:1.45;color:var(--ink);width:min(360px,88vw);height:min(360px,88vw);overflow:hidden}
.fly-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;border-radius:1.6rem 1.6rem 0 0}
.fly-banner::after{content:attr(data-label);display:block;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:900;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:0.15rem}
.fly-banner.type-intro{border-left-color:var(--teal)}.fly-banner.type-intro::before{background:var(--teal)}.fly-banner.type-intro::after{color:var(--teal)}
.fly-banner.type-feature{border-left-color:var(--coral)}.fly-banner.type-feature::before{background:var(--coral)}.fly-banner.type-feature::after{color:var(--coral)}
.fly-banner.type-conclusion{border-left-color:var(--purple)}.fly-banner.type-conclusion::before{background:var(--purple)}.fly-banner.type-conclusion::after{color:var(--purple)}
.fly-banner.phase-float{animation:bannerFloat 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes bannerFloat{0%{opacity:0;transform:scale(0.6) translateY(-60px)}65%{opacity:1;transform:scale(1.04) translateY(6px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.fly-banner.phase-hover{animation:bannerBob 1.8s ease-in-out infinite}
@keyframes bannerBob{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1) translateY(-7px)}}

/* ── SLIDE NAV ── */
.slide-nav{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.75rem;padding:0.65rem 1.25rem;background:var(--white);border-top:1px solid var(--rule)}
.slide-arrow{background:transparent;border:2px solid rgba(0,0,0,0.13);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;font-size:1.2rem;color:rgba(0,0,0,0.55)}
.slide-arrow:hover:not(:disabled){background:var(--lettuce);border-color:var(--lettuce);color:#fff}
.slide-arrow:disabled{opacity:0.22;cursor:not-allowed}
.page-counter{font-size:0.875rem;font-weight:700;color:rgba(0,0,0,0.35);min-width:72px;text-align:center;font-family:'Barlow Condensed',sans-serif}

/* accent bar */
.accent-bar{height:5px;flex-shrink:0;background:var(--lettuce)}

/* ── FOOTER NAV ── */
.foot{flex-shrink:0;display:flex;justify-content:center;padding:0.5rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.55rem);background:rgba(240,239,236,0.97);border-top:1px solid var(--rule)}
.nav-pill{display:flex;gap:0.12rem;background:rgba(10,10,10,0.07);border-radius:2rem;padding:0.25rem 0.28rem}
.nb{background:transparent;border:none;padding:0.35rem 0.75rem;border-radius:1.5rem;font-family:'Barlow',sans-serif;font-size:0.6rem;letter-spacing:0.03em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.22s;white-space:nowrap;min-height:28px;font-weight:700;text-transform:uppercase}
.nb.on{background:var(--ink);color:#fff;font-weight:800}
.nb:hover:not(.on){color:rgba(0,0,0,0.5)}

@media(max-width:480px){
  .infographic{padding:0.6rem 0.75rem 1rem}
  .tab-btn{padding:0.35rem 0.65rem;font-size:0.58rem}
  .nb{padding:0.3rem 0.6rem;font-size:0.55rem;min-height:26px}
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a href="/?openModal=writing&submenu=reviews" class="back-link">← Reviews</a>
    <span class="brand">INTUITY</span>
    <div style="width:28px"></div>
  </div>

  <div class="poster-wrap">
  <div class="poster" id="posterCard">
    <div class="flag"><div class="flag-body"><span class="flag-label">Model</span></div></div>
    <div class="type-badge" id="typeBadge">Review</div>

    <div class="card-tabs" id="tabsContainer"></div>

    <div class="card-content">
      <div class="content-header">
        <div class="content-title" id="contentTitle">Loading…</div>
        <div class="view-toggle">
          <button class="toggle-btn active" data-mode="skeleton" onclick="setViewMode('skeleton')">Skeleton</button>
          <button class="toggle-btn" data-mode="phrases"  onclick="setViewMode('phrases')">Phrases</button>
          <button class="toggle-btn" data-mode="practice" onclick="setViewMode('practice')">Practice</button>
        </div>
      </div>
      <div class="infographic" id="contentArea"></div>
    </div>

    <div class="slide-nav">
      <button class="slide-arrow" id="btnPrev" onclick="navigate(-1)">←</button>
      <div class="page-counter" id="pageCounter">1 / 1</div>
      <button class="slide-arrow" id="btnNext" onclick="navigate(1)">→</button>
    </div>

    <div class="accent-bar"></div>
  </div>
  </div><!-- /poster-wrap -->

  <div class="foot">
    <div class="nav-pill">
      <button class="nb"    data-mode="question" onclick="switchMode('question')">Question</button>
      <button class="nb"    data-mode="plan"     onclick="switchMode('plan')">Plan</button>
      <button class="nb on" data-mode="model"    onclick="switchMode('model')">Model</button>
      <button class="nb"    data-mode="builder"  onclick="switchMode('builder')">Builder</button>
      <button class="nb"    data-mode="sample"   onclick="switchMode('sample')">Sample</button>
    </div>
  </div>
</div>

<script>
/* ══ STATE ══ */
let skeletonData=null,phraseData=null,practiceQuestions=null;
let currentType='ocean-documentary',currentPracticeQuestion=0,viewMode='skeleton';
let practiceActive=false,practiceSynth=window.speechSynthesis,practiceNarrator=null;
let currentBanner=null;

/* ══ CATEGORY MAP — preserved exactly from original ══ */
const CATEGORY_MAP={
  'ocean-documentary':'documentaries',
  'ed-sheeran-concert':'festivals',
  'italian-restaurant-meal':'places',
  'restaurant-anniversary':'places',
  'surf-camp-portugal':'experiences',
  'lonely-planet-spain':'products',
  'atomic-habits-book':'products',
  'duolingo-app':'products',
  'film-intern':'entertainment',
  'stardew-valley-game':'entertainment'
};

/* ══ INIT ══ */
async function init(){
  try{
    /* All three fetches — paths preserved exactly */
    const [r1,r2,r3]=await Promise.all([
      fetch('data/complete-review-phrase-bank.json'),
      fetch('data/complete-review-phrase-bank1.json'),
      fetch('data/review-practice.json')
    ]);
    skeletonData=await r1.json();
    phraseData=await r2.json();
    const practice=await r3.json();
    practiceQuestions=practice.questions;

    /* restore type from sessionStorage */
    try{
      const saved=sessionStorage.getItem('currentReviewQuestion');
      if(saved){
        const q=JSON.parse(saved);
        const id=q.id||q.questionId;
        if(id&&skeletonData[id])currentType=id;
      }
    }catch(e){}

    renderTabs();
    renderContent();
    updateNav();
  }catch(e){
    document.getElementById('contentArea').innerHTML=
      '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35);font-family:Barlow,sans-serif">⚠ Failed to load data</div>';
  }
}

/* ══ TABS ══ */
function renderTabs(){
  const c=document.getElementById('tabsContainer');
  const types=Object.keys(skeletonData);
  c.innerHTML=types.map(k=>
    `<button class="tab-btn ${k===currentType?'active':''}" onclick="switchType('${k}')">${skeletonData[k].label}</button>`
  ).join('');
  document.getElementById('typeBadge').textContent=skeletonData[currentType]?.label||'Review';
}

function switchType(type){
  currentType=type;
  currentPracticeQuestion=0;
  stopPractice();
  renderTabs();
  renderContent();
  updateNav();
}

/* ══ RENDER ══ */
function renderContent(){
  const area=document.getElementById('contentArea');
  if(viewMode==='skeleton'){
    document.getElementById('contentTitle').textContent=skeletonData[currentType]?.label||currentType;
    area.innerHTML=renderSkeleton();
  }else if(viewMode==='phrases'){
    document.getElementById('contentTitle').textContent=skeletonData[currentType]?.label||currentType;
    area.innerHTML=renderPhrases();
  }else{
    document.getElementById('contentTitle').textContent=`${skeletonData[currentType]?.label||currentType} — Practice`;
    area.innerHTML=renderPractice();
  }
}

/* ══ TOGGLE BONE ══ */
function toggleBone(idx){
  const bone=document.getElementById('rbone-'+idx);
  const drawer=document.getElementById('rbdrawer-'+idx);
  if(!bone||!drawer)return;
  const isOpen=bone.classList.contains('open');
  bone.classList.toggle('open',!isOpen);
  drawer.classList.toggle('open',!isOpen);
}

/* ══ BONE ROLE — maps review section titles to intro/body/end ══ */
function boneRole(title){
  const t=title.toLowerCase();
  if(t.includes('intro')||t.includes('opening')||t.includes('hook'))return 'intro';
  if(t.includes('recommend')||t.includes('conclu')||t.includes('closing')||t.includes('summary'))return 'end';
  return 'body';
}

/* ══ BONE PURPOSE — one-line description of paragraph function ══ */
function bonePurpose(title,role){
  const t=title.toLowerCase();
  if(role==='intro')return 'Hook · Context · Opening opinion';
  if(role==='end')  return 'Verdict · Audience · Final recommendation';
  if(t.includes('feature')||t.includes('highlight')||t.includes('aspect'))return 'Key feature with detail & impact';
  if(t.includes('atmosphere')||t.includes('experience')||t.includes('feel'))return 'Atmosphere & personal reaction';
  if(t.includes('technical')||t.includes('quality')||t.includes('skill'))return 'Technical quality assessed';
  if(t.includes('value')||t.includes('price')||t.includes('worth'))return 'Value for money considered';
  return 'Develop with specific detail';
}

/* ══ GET MATCHING PHRASES from phraseData ══ */
function getMatchingPhrases(type,title,role){
  if(!phraseData||!phraseData[type]||!phraseData[type].categories)return[];
  const t=title.toLowerCase();
  const results=[];
  phraseData[type].categories.forEach(cat=>{
    const ct=cat.title.toLowerCase();
    const catIsIntro=ct.includes('intro')||ct.includes('opening');
    const catIsConc=ct.includes('recommend')||ct.includes('conclu');
    const catIsBody=!catIsIntro&&!catIsConc;
    if(role==='intro'&&!catIsIntro)return;
    if(role==='end'&&!catIsConc)return;
    if(role==='body'&&!catIsBody)return;
    (cat.subcategories||[]).forEach(sub=>{
      const st=(sub.subtitle||'').toLowerCase();
      // For body, narrow by keyword match where possible
      if(role==='body'){
        const wantFeat=t.includes('feature')||t.includes('highlight')||t.includes('aspect')||t.includes('key');
        const wantAtm=t.includes('atmosphere')||t.includes('experience')||t.includes('feel')||t.includes('personal');
        const wantTech=t.includes('technical')||t.includes('quality')||t.includes('skill');
        if(wantFeat&&!(st.includes('feature')||st.includes('highlight')||st.includes('key')||st.includes('aspect')||st.includes('what')))return;
        if(wantAtm&&!(st.includes('atmosphere')||st.includes('experience')||st.includes('feel')||st.includes('impression')))return;
        if(wantTech&&!(st.includes('technical')||st.includes('quality')||st.includes('skill')))return;
      }
      (sub.phrases||[]).forEach(p=>results.push(p));
    });
  });
  return results;
}

/* ══ FORMAT HELPERS ══ */
function fmtLine(str){
  if(!str)return '';
  return str.replace(/\[([^\]]+)\]/g,'<span class="dph">[$1]</span>');
}
function fmtPreview(str){
  if(!str)return '';
  return str.replace(/\[([^\]]+)\]/g,'<span class="bph">[$1]</span>');
}

/* ══ RENDER SKELETON — full bone system ══ */
function renderSkeleton(){
  const review=skeletonData[currentType];
  if(!review||!review.skeletons||!review.skeletons[0])
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35)">Skeleton not available</div>';
  const variation=review.skeletons[0];
  let h='<div class="anatomy-plate">';
  variation.skeleton.forEach((section,i)=>{
    const role=boneRole(section.title);
    const purpose=bonePurpose(section.title,role);
    const num=String(i+1).padStart(2,'0');
    const lines=section.lines||[];
    const previewRaw=lines.find(l=>l&&l.trim())||'';
    const drawerLines=lines.filter(l=>l&&l.trim());
    const matchPhrases=getMatchingPhrases(currentType,section.title,role);

    h+=`
      <div class="bone bone-${role}" id="rbone-${i}" onclick="toggleBone(${i})">
        <div class="bone-ghost">${num}</div>
        <div class="bone-num-col">
          <div class="bone-num">${num}</div>
          <div class="bone-node"></div>
        </div>
        <div class="bone-rib"></div>
        <div class="bone-content">
          <div class="bone-label">${section.emoji||''} ${section.title}</div>
          <div class="bone-purpose">${purpose}</div>
          <div class="bone-preview">${fmtPreview(previewRaw)}</div>
        </div>
        <div class="bone-chevron">▼</div>
      </div>
      <div class="bone-drawer" id="rbdrawer-${i}">
        <div class="drawer-body">
          <div class="drawer-section-label">Skeleton lines</div>
          ${drawerLines.map(line=>`
            <div class="drawer-line">
              <div class="drawer-bullet"></div>
              <div>${fmtLine(line)}</div>
            </div>`).join('')}
          ${matchPhrases.length?`
          <div class="drawer-section-label" style="margin-top:0.75rem">Key phrases</div>
          ${matchPhrases.slice(0,6).map(p=>`
            <div class="drawer-phrase-item">
              <div class="phrase-arrow">→</div>
              <div>${fmtLine(p)}</div>
            </div>`).join('')}
          `:''}
        </div>
      </div>
      ${i<variation.skeleton.length-1?'<div class="bone-divider"></div>':''}`;
  });
  h+=`
    <div class="anatomy-footer">
      <div class="anatomy-brand">INTUITY</div>
      <div class="anatomy-level">Cambridge B2 · ${review.label||currentType}</div>
    </div>
  </div>`;
  return h;
}

/* ── Phrases ── */
function renderPhrases(){
  const bank=phraseData[currentType];
  if(!bank||!bank.categories)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35)">No phrases available.</div>';
  let h='<div class="phrases-display">';
  bank.categories.forEach(cat=>{
    const t=cat.title.toLowerCase();
    const c=t.includes('intro')?'intro':t.includes('recommend')?'conclusion':'feature';
    h+=`<div class="phrase-category"><div class="category-title ${c}">${cat.title}</div>`;
    (cat.subcategories||[]).forEach(sub=>{
      if(sub.subtitle)h+=`<div class="subcategory"><div class="subcategory-title">${sub.subtitle}</div>`;
      h+='<ul class="phrase-list">';
      (sub.phrases||[]).forEach(p=>{h+=`<li class="phrase-item">${p}</li>`;});
      h+='</ul>';
      if(sub.subtitle)h+='</div>';
    });
    h+='</div>';
  });
  return h+'</div>';
}

/* ── Practice ── */
function renderPractice(){
  if(!practiceQuestions)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35)">Loading practice…</div>';
  const category=CATEGORY_MAP[currentType]||'entertainment';
  const set=practiceQuestions[category];
  if(!set||!set.length)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.35)">No practice questions for this type.</div>';
  const data=set[currentPracticeQuestion];
  let h=`<div class="practice-display">
    <div class="practice-question">
      <div class="practice-question-label">Practice Question ${currentPracticeQuestion+1} of ${set.length}</div>
      <div class="practice-question-text">${data.question}</div>
    </div>
    <div class="practice-controls">
      <button class="play-practice-btn" id="playPracticeBtn" onclick="startPractice()">▶ Play</button>
      <div class="practice-caption" id="practiceCaption">Press Play to hear the model answer</div>
    </div>
    <div class="practice-answer">
      <div class="practice-answer-label">Model Answer — watch for the phrase banners</div>`;
  data.answer.forEach((line,i)=>{
    const hasPhrase=!!line.phrase;
    h+=`<div class="answer-line ${hasPhrase?'has-phrase':''}" id="answerLine${i}">
      <div class="answer-marker"></div>
      <div class="answer-text">${line.text}${hasPhrase?`<span class="answer-phrase-tag tag-${line.phraseType||'feature'}">${line.label||'phrase'}</span>`:''}</div>
    </div>`;
  });
  h+='</div></div>';
  return h;
}

/* ══ PRACTICE AUDIO ══ */
async function getPracticeVoice(){
  return new Promise(resolve=>{
    const load=()=>{
      const v=practiceSynth.getVoices();
      const found=v.find(x=>x.name==='Google UK English Male')||v.find(x=>x.name==='Daniel')||v.find(x=>x.lang==='en-GB')||v.find(x=>x.lang.startsWith('en'))||v[0]||null;
      resolve(found);
    };
    if(practiceSynth.getVoices().length)load();else practiceSynth.onvoiceschanged=load;
  });
}

function stopPractice(){
  practiceActive=false;
  practiceSynth.cancel();
  if(currentBanner){currentBanner.remove();currentBanner=null;}
  const btn=document.getElementById('playPracticeBtn');
  const cap=document.getElementById('practiceCaption');
  if(btn){btn.textContent='▶ Play';btn.disabled=false;}
  if(cap){cap.textContent='Press Play to hear the model answer';}
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
}

async function startPractice(){
  if(practiceActive){stopPractice();return;}
  const category=CATEGORY_MAP[currentType]||'entertainment';
  const data=practiceQuestions[category][currentPracticeQuestion];
  if(!data)return;
  practiceActive=true;
  practiceNarrator=await getPracticeVoice();
  const btn=document.getElementById('playPracticeBtn');
  const cap=document.getElementById('practiceCaption');
  if(btn)btn.textContent='■ Stop';
  document.querySelectorAll('.answer-line').forEach(l=>l.classList.remove('played'));
  for(let i=0;i<data.answer.length;i++){
    if(!practiceActive)break;
    const line=data.answer[i];
    const lineEl=document.getElementById(`answerLine${i}`);
    if(cap){cap.textContent=line.text;}
    if(line.phrase&&line.phraseType){
      launchBanner(line.phrase,lineEl,`type-${line.phraseType}`,line.label||'Key Phrase');
      await speakLine(line.text);
    }else{
      await speakLine(line.text);
    }
    if(lineEl)lineEl.classList.add('played');
    if(practiceActive)await wait(600);
  }
  if(practiceActive){
    stopPractice();
    if(cap)cap.textContent='Complete. Press Play to repeat.';
  }
}

function speakLine(text){
  return new Promise(resolve=>{
    if(!practiceActive){resolve();return;}
    practiceSynth.cancel();
    setTimeout(()=>{
      if(!practiceActive){resolve();return;}
      const utt=new SpeechSynthesisUtterance(text);
      utt.voice=practiceNarrator;utt.rate=0.88;utt.pitch=1.05;utt.volume=1;
      utt.onend=()=>resolve();utt.onerror=()=>resolve();
      practiceSynth.speak(utt);
    },80);
  });
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

/* ══ FLY BANNER ══ */
function launchBanner(htmlText,slotEl,typeClass,label){
  if(currentBanner){currentBanner.remove();currentBanner=null;}
  const banner=document.createElement('div');
  banner.className=`fly-banner ${typeClass}`;
  banner.innerHTML=htmlText;
  banner.setAttribute('data-label',label);
  banner.style.visibility='hidden';
  banner.style.left='0px';banner.style.top='0px';
  document.body.appendChild(banner);
  const bw=banner.offsetWidth,bh=banner.offsetHeight;
  const vw=window.innerWidth,vh=window.innerHeight;
  banner.style.left=Math.round((vw-bw)/2)+'px';
  banner.style.top=Math.round((vh-bh)/2)+'px';
  banner.style.visibility='visible';
  void banner.offsetWidth;
  banner.classList.add('phase-float');
  setTimeout(()=>{
    banner.classList.remove('phase-float');
    void banner.offsetWidth;
    banner.classList.add('phase-hover');
    currentBanner=banner;
  },550);
}

/* ══ VIEW MODE ══ */
function setViewMode(mode){
  stopPractice();
  if(mode==='practice')currentPracticeQuestion=0;
  viewMode=mode;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  renderContent();
  updateNav();
}

/* ══ NAVIGATE ══ */
function navigate(dir){
  stopPractice();
  if(viewMode==='practice'){
    const category=CATEGORY_MAP[currentType]||'entertainment';
    const set=practiceQuestions?(practiceQuestions[category]||[]):[];
    const next=currentPracticeQuestion+dir;
    if(next>=0&&next<set.length)currentPracticeQuestion=next;
  }else{
    const types=Object.keys(skeletonData);
    const idx=types.indexOf(currentType)+dir;
    if(idx>=0&&idx<types.length){switchType(types[idx]);return;}
  }
  renderContent();updateNav();
}

function updateNav(){
  const prev=document.getElementById('btnPrev');
  const next=document.getElementById('btnNext');
  const ctr=document.getElementById('pageCounter');
  if(viewMode==='practice'){
    const category=CATEGORY_MAP[currentType]||'entertainment';
    const set=practiceQuestions?(practiceQuestions[category]||[]):[];
    prev.disabled=currentPracticeQuestion===0;
    next.disabled=currentPracticeQuestion===set.length-1;
    ctr.textContent=`Q ${currentPracticeQuestion+1} / ${set.length}`;
  }else{
    const types=Object.keys(skeletonData);
    const idx=types.indexOf(currentType);
    prev.disabled=idx===0;next.disabled=idx===types.length-1;
    ctr.textContent=`${idx+1} / ${types.length}`;
  }
}

/* ══ FOOTER NAV — all paths preserved ══ */
function switchMode(mode){
  if(mode==='model')return;
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
  const map={
    question:'review-question-selector.html',
    plan:    'review-plan.html',
    builder: 'review-builder.html',
    sample:  'review-master.html'
  };
  if(map[mode])window.location.href=map[mode];
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')navigate(-1);
  if(e.key==='ArrowRight')navigate(1);
});

init();
</script>
</body>
</html>
