<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Review Model — INTUITY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&family=Barlow+Condensed:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0c;--gold:#C9A961;--gold-d:#9B7D3A;--gold-l:#E8D4A0;
  --white:#FAFAF8;--ink:#0d0d0d;
  --teal:#5ab5ac;--teal-d:#4a9a92;
  --coral:#f89643;--coral-d:#e67e2e;
  --purple:#8b7ba8;--purple-d:#726291;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg);font-family:'Inter',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;}
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:2vh 3vw;}
.card{width:100%;height:100%;max-width:900px;max-height:95vh;background:var(--white);border-radius:1.5rem;box-shadow:0 0 0 1px rgba(201,169,97,0.15),0 24px 80px rgba(0,0,0,0.65),0 4px 16px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d));z-index:5;}

/* HEADER */
.card-brand{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.875rem 1.25rem 0.625rem;margin-top:3px;position:relative;border-bottom:1px solid rgba(0,0,0,0.06);}
.home-link{text-decoration:none;font-size:0.875rem;font-weight:600;color:var(--gold);transition:all 0.2s;padding:0.35rem 0.5rem;border-radius:0.5rem;}
.home-link:hover{background:rgba(201,169,97,0.1);}
.brand-word{position:absolute;left:50%;transform:translateX(-50%);font-size:0.58rem;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:rgba(0,0,0,0.18);}
.menu-btn{background:#000;border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.menu-dots{display:flex;gap:3px;}
.menu-dots span{width:3px;height:3px;border-radius:50%;background:#fff;}

/* TABS */
.card-tabs{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.625rem 1.25rem;background:var(--white);border-bottom:1px solid rgba(0,0,0,0.06);overflow-x:auto;}
.tab-btn{background:transparent;border:none;border-bottom:3px solid transparent;padding:0.45rem 0.875rem;font-size:0.68rem;font-weight:700;color:rgba(0,0,0,0.4);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;}
.tab-btn:hover{color:rgba(0,0,0,0.6);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* CONTENT */
.card-content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.content-header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:0.825rem 1.75rem 0.625rem;border-bottom:2px solid rgba(0,0,0,0.06);}
.content-title{font-size:0.68rem;font-weight:600;color:rgba(0,0,0,0.4);text-transform:uppercase;letter-spacing:0.1em;}
.view-toggle{display:flex;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);border-radius:7px;padding:0.225rem;gap:0.225rem;}
.toggle-btn{padding:0.35rem 0.75rem;background:transparent;border:none;border-radius:5px;color:rgba(0,0,0,0.5);font-size:0.65rem;font-weight:800;cursor:pointer;transition:all 0.25s;text-transform:uppercase;letter-spacing:0.05em;}
.toggle-btn:hover{color:rgba(0,0,0,0.7);}
.toggle-btn.active{background:#000;color:var(--gold);}

/* SCROLLABLE */
.infographic{flex:1;padding:1rem 1.75rem;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}
.infographic::-webkit-scrollbar{width:5px;}
.infographic::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2.5px;}

/* ══ SKELETON — mother skel-banner system ══ */
.skel-wrap{display:flex;flex-direction:column;align-items:center;max-width:440px;margin:0 auto}
.skel-banner{width:100%;background:var(--white);border-radius:1.3rem;overflow:hidden;box-shadow:3px 5px 0 rgba(0,0,0,0.06),0 16px 40px rgba(0,0,0,0.12);animation:bannerIn 0.38s cubic-bezier(0.22,1,0.36,1) both;display:flex;flex-direction:column}
@keyframes bannerIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.skel-row{display:flex;align-items:stretch;border-bottom:1px solid rgba(0,0,0,0.05)}
.skel-row:last-child{border-bottom:none}
.skel-strip{width:4px;flex-shrink:0}
.skel-num{flex-shrink:0;width:38px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Sans',sans-serif;font-size:0.85rem;font-weight:400;color:rgba(0,0,0,0.12);padding:0 0.1rem}
.skel-content{flex:1;padding:1.1rem 1.1rem 1.1rem 0.2rem;display:flex;flex-direction:column;gap:0.18rem}
.skel-section-label{font-family:'Instrument Sans',sans-serif;font-size:0.52rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:rgba(0,0,0,0.22);margin-bottom:0.08rem}
.skel-key-phrase{font-family:'Instrument Sans',sans-serif;font-size:0.88rem;font-weight:400;line-height:1.5;color:rgba(0,0,0,0.82)}
.skel-elaboration{font-family:'Instrument Sans',sans-serif;font-size:0.78rem;font-weight:400;line-height:1.45;color:rgba(0,0,0,0.42);margin-top:0.3rem;padding-top:0.3rem;border-top:1px dashed rgba(0,0,0,0.08)}
.skel-footer{display:flex;justify-content:flex-end;padding:0.55rem 0.85rem 0.65rem;border-top:1px solid rgba(0,0,0,0.05)}
.shuffle-btn{display:flex;align-items:center;gap:0.3rem;padding:0.28rem 0.75rem;background:var(--ink);border:none;border-radius:2rem;font-family:'Instrument Sans',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#fff;cursor:pointer;transition:background 0.18s}
.shuffle-btn:hover{background:rgba(17,17,17,0.78)}
.shuffle-btn:active{transform:scale(0.96)}
.shuffle-icon{font-size:0.8rem;display:inline-block;transition:transform 0.4s}
.shuffle-btn.spinning .shuffle-icon{transform:rotate(360deg)}
.skel-bullet-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.18);margin-top:0.52rem;margin-right:0.55rem}
/* Review section colour coding */
.sr-intro  .skel-strip{background:#5ab5ac} .sr-intro  .skel-section-label{color:#5ab5ac}
.sr-body1  .skel-strip{background:#f89643} .sr-body1  .skel-section-label{color:#f89643}
.sr-body2  .skel-strip{background:#8b7ba8} .sr-body2  .skel-section-label{color:#8b7ba8}
.sr-body3  .skel-strip{background:#C9A961} .sr-body3  .skel-section-label{color:#C9A961}
.sr-conc   .skel-strip{background:#e8723a} .sr-conc   .skel-section-label{color:#e8723a}

/* PHRASES */
.phrases-display{font-family:'Inter',sans-serif;color:rgba(0,0,0,0.9);}
.phrase-category{margin-bottom:1.5rem;}
.category-title{font-size:0.75rem;font-weight:800;color:rgba(0,0,0,0.9);margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.08em;padding-bottom:0.4rem;border-bottom:2px solid rgba(0,0,0,0.2);}
.category-title.intro{color:#5ab5ac;border-bottom-color:#5ab5ac;}
.category-title.feature{color:#f89643;border-bottom-color:#f89643;}
.category-title.conclusion{color:#8b7ba8;border-bottom-color:#8b7ba8;}
.phrase-list{list-style:none;padding:0;}
.phrase-item{font-size:0.75rem;line-height:1.6;color:rgba(0,0,0,0.8);margin-bottom:0.5rem;padding-left:0.875rem;position:relative;}
.phrase-item:before{content:"→";position:absolute;left:0;color:var(--gold);font-weight:700;}

/* ══ PRACTICE — mother transcript system ══ */
.practice-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}
.practice-q{background:var(--white);border-radius:1.1rem;padding:1.1rem 1.4rem;border-left:4px solid var(--gold);box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08)}
.practice-q-label{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem}
.practice-q-text{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;font-style:italic;line-height:1.5;color:var(--ink)}
.practice-controls-row{display:flex;align-items:center;justify-content:space-between;gap:0.75rem;background:var(--white);border-radius:1.1rem;padding:0.75rem 1.1rem;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08)}
.practice-mode-toggle{display:flex;align-items:center;background:rgba(0,0,0,0.06);border-radius:2rem;padding:0.2rem;gap:0.1rem}
.pmt-btn{background:transparent;border:none;padding:0.26rem 0.75rem;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:rgba(0,0,0,0.35);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.pmt-btn.active{background:var(--ink);color:#fff}
.pmt-btn:hover:not(.active){color:rgba(0,0,0,0.6)}
.play-btn{display:flex;align-items:center;gap:0.4rem;padding:0.44rem 1rem;background:var(--ink);color:#fff;border:none;border-radius:2rem;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.play-btn:hover{background:rgba(17,17,17,0.8)}
.play-btn.text-mode{background:rgba(0,0,0,0.07);color:rgba(0,0,0,0.45)}
.play-btn.text-mode:hover{background:rgba(0,0,0,0.12);color:rgba(0,0,0,0.7)}
.transcript-wrap{background:var(--white);border-radius:1.1rem;padding:1rem 1.4rem;box-shadow:2px 4px 0 rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.08)}
.transcript-label{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:rgba(0,0,0,0.2);margin-bottom:0.75rem}
.transcript-line{font-family:'Instrument Sans',sans-serif;font-size:0.88rem;font-weight:400;line-height:1.6;color:rgba(0,0,0,0.72);padding:0.35rem 0;border-bottom:1px dashed rgba(0,0,0,0.05);transition:all 0.35s ease;border-radius:0.25rem}
.transcript-line:last-child{border-bottom:none}
.transcript-line.active{color:var(--ink);font-weight:500;background:rgba(201,169,97,0.07);padding-left:0.5rem;margin-left:-0.5rem}
.transcript-line.done{color:rgba(0,0,0,0.32);font-weight:400}
.transcript-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;padding:0.18rem 0.55rem;border-radius:3px;margin-left:0.5rem;vertical-align:middle;border-left:3px solid currentColor}
.tag-intro{background:rgba(90,181,172,0.13);color:#5ab5ac}
.tag-feature{background:rgba(248,150,67,0.13);color:#e07a28}
.tag-conclusion{background:rgba(139,123,168,0.13);color:#7a6a98}

/* NAV */
.slide-nav{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:1.75rem;padding:0.825rem 1.25rem;background:var(--white);border-top:1px solid rgba(0,0,0,0.06);}
.slide-arrow{background:transparent;border:2px solid rgba(0,0,0,0.15);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;font-size:1.3rem;color:rgba(0,0,0,0.6);}
.slide-arrow:hover:not(:disabled){background:var(--gold);border-color:var(--gold);color:#fff;}
.slide-arrow:disabled{opacity:0.25;cursor:not-allowed;}
.page-counter{font-size:0.875rem;font-weight:600;color:rgba(0,0,0,0.5);min-width:72px;text-align:center;}

/* FOOTER */
.card-nav{flex-shrink:0;display:flex;justify-content:center;padding:0.65rem 1rem calc(env(safe-area-inset-bottom,0px) + 0.75rem);background:var(--white);border-top:1px solid rgba(0,0,0,0.06);}
.nav-pill{display:flex;gap:0.15rem;background:rgba(10,10,10,0.06);border-radius:2rem;padding:0.3rem 0.35rem;}
.nb{background:transparent;border:none;padding:0.45rem 0.875rem;border-radius:1.5rem;font-size:0.65rem;letter-spacing:0.02em;color:rgba(0,0,0,0.28);cursor:pointer;transition:all 0.24s;white-space:nowrap;min-height:33px;font-weight:500;}
.nb.on{background:var(--ink);color:var(--gold);font-weight:700;}

/* fly-banner removed — infographic card used for all modes */

/* ══ INFOGRAPHIC LISTEN OVERLAY — from mother ══ */
.listen-overlay{position:fixed;inset:0;z-index:800;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 1.25rem 1rem;background:#16181d;opacity:0;pointer-events:none;transition:opacity 0.3s ease;}
.listen-overlay.active{opacity:1;pointer-events:all;}

.lo-topbar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;flex-shrink:0;}
.lo-brand{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.32em;text-transform:uppercase;color:rgba(255,255,255,0.15);}
.lo-close-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.65rem;color:rgba(255,255,255,0.3);transition:all 0.2s;}
.lo-close-btn:hover{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75);}

.infographic-card{position:relative;width:min(480px,96vw);min-height:min(420px,80vw);background:#ffffff;border-radius:4px;overflow:visible;display:flex;flex-direction:column;box-shadow:6px 6px 0 rgba(255,255,255,0.04),10px 16px 0 rgba(0,0,0,0.45),0 40px 90px rgba(0,0,0,0.65);transform:translateY(28px) scale(0.93);transition:transform 0.48s cubic-bezier(0.34,1.46,0.64,1),opacity 0.35s ease;opacity:0;flex-shrink:0;}
.listen-overlay.active .infographic-card{transform:translateY(0) scale(1);opacity:1;}
.infographic-card.section-enter{animation:sectionSlideIn 0.42s cubic-bezier(0.34,1.3,0.64,1) both;}
@keyframes sectionSlideIn{from{opacity:0;transform:translateX(44px) scale(0.96)}to{opacity:1;transform:translateX(0) scale(1)}}

.info-left-stripe{position:absolute;left:0;top:0;bottom:0;width:7px;border-radius:4px 0 0 4px;transition:background 0.4s ease;z-index:5;}
.info-bottom-line{height:6px;width:100%;flex-shrink:0;border-radius:0 0 4px 4px;transition:background 0.4s ease;}
.info-num-badge{position:absolute;top:-1rem;left:1.6rem;width:3.4rem;height:3.4rem;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:#fff;transition:background 0.4s ease;box-shadow:4px 5px 0 rgba(0,0,0,0.3),0 10px 24px rgba(0,0,0,0.35);z-index:10;clip-path:polygon(0 0,calc(100% - 11px) 0,100% 11px,100% 100%,0 100%);}

.info-card-body{padding:1.8rem 1.8rem 0 2.2rem;display:flex;flex-direction:column;flex:1;overflow:hidden;}
.info-section-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,6vw,3rem);font-weight:900;letter-spacing:0.04em;text-transform:uppercase;color:#0d0d0d;line-height:0.95;margin-top:1.5rem;margin-bottom:0;}
.info-title-rule{width:3.5rem;height:4px;border-radius:2px;margin:0.7rem 0 0.85rem;flex-shrink:0;transition:background 0.4s ease;}

.info-sentences-stack{flex:1;display:flex;flex-direction:column;gap:0.6rem;overflow:hidden;}
.info-sentence-line{font-family:'Instrument Sans',sans-serif;font-size:clamp(0.88rem,2.3vw,1.02rem);font-weight:400;line-height:1.65;color:rgba(0,0,0,0.55);opacity:0;transform:translateY(10px);transition:opacity 0.4s ease,transform 0.4s ease;}
.info-sentence-line.visible{opacity:1;transform:translateY(0)}
.info-sentence-line.first{color:rgba(0,0,0,0.78);font-weight:500;}

.info-card-foot{display:flex;align-items:flex-end;justify-content:space-between;padding:0.6rem 1.8rem 1rem 2.2rem;flex-shrink:0;}
.info-icon{font-size:1.6rem;opacity:0.4;transition:opacity 0.3s;line-height:1;}
.info-wave{display:flex;align-items:flex-end;gap:4px;}
.info-wave-bar{width:4px;border-radius:3px;animation:waveAnim 1.1s ease-in-out infinite;transition:background 0.4s ease;}
.info-wave-bar:nth-child(1){height:8px;animation-delay:0s}
.info-wave-bar:nth-child(2){height:18px;animation-delay:0.08s}
.info-wave-bar:nth-child(3){height:30px;animation-delay:0.18s}
.info-wave-bar:nth-child(4){height:22px;animation-delay:0.12s}
.info-wave-bar:nth-child(5){height:11px;animation-delay:0.04s}
.info-wave-bar:nth-child(6){height:24px;animation-delay:0.22s}
.info-wave-bar:nth-child(7){height:16px;animation-delay:0.09s}
@keyframes waveAnim{0%,100%{transform:scaleY(0.28);opacity:0.22}50%{transform:scaleY(1);opacity:1}}
.info-wave.paused .info-wave-bar{animation:none;transform:scaleY(0.28);opacity:0.15}

.lo-bottom{width:min(480px,96vw);margin-top:0.9rem;display:flex;flex-direction:column;gap:0.5rem;flex-shrink:0;}
.info-progress-track{width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.info-progress-fill{height:100%;border-radius:2px;transition:width 0.4s ease,background 0.4s ease;}
.lo-controls-row{display:flex;align-items:center;justify-content:space-between;}
.lo-counter{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.2);}
.lo-btns{display:flex;align-items:center;gap:0.4rem;}
.lo-btn{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);padding:0.3rem 0.85rem;border-radius:3px;color:rgba(255,255,255,0.38);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.lo-btn:hover{background:rgba(255,255,255,0.13);color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.18);}
.lo-btn.primary{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.65);border-color:rgba(255,255,255,0.12);}
.lo-btn.primary:hover{background:rgba(255,255,255,0.18);color:#fff;}

@media(max-width:768px){
  .shell{padding:1vh 2vw;}
  .card{max-width:100%;border-radius:1rem;}
  .infographic{padding:0.875rem 1.3rem;}
  .tab-btn{padding:0.375rem 0.7rem;font-size:0.6rem;}
  .info-card-body{padding:1.3rem 1.4rem 0.5rem 1.7rem;}
  .info-card-foot{padding:0.5rem 1.4rem 0.8rem 1.7rem;}
}
</style>
</head>
<body>

<div class="shell">
<div class="card">

  <div class="card-brand">
    <a href="../../../index.html?openModal=writing&submenu=reviews" class="home-link">← Reviews</a>
    <span class="brand-word">INTUITY</span>
    <div style="flex:1"></div>
    <div class="menu-btn" id="menuBtn">
      <div class="menu-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="card-tabs" id="tabsContainer"></div>

  <div class="card-content">
    <div class="content-header">
      <div class="content-title" id="contentTitle">Loading...</div>
      <div class="view-toggle">
        <button class="toggle-btn active" data-mode="skeleton" onclick="setViewMode('skeleton')">Skeleton</button>
        <button class="toggle-btn" data-mode="phrases" onclick="setViewMode('phrases')">Phrases</button>
        <button class="toggle-btn" data-mode="practice" onclick="setViewMode('practice')">Practice</button>
      </div>
    </div>
    <div class="infographic" id="contentArea"></div>
  </div>

  <div class="slide-nav">
    <button class="slide-arrow" id="btnPrev" onclick="navigate(-1)">←</button>
    <div class="page-counter" id="pageCounter">1 / 1</div>
    <button class="slide-arrow" id="btnNext" onclick="navigate(1)">→</button>
  </div>

  <div class="card-nav">
    <div class="nav-pill">
      <button class="nb" data-mode="question" onclick="switchMode('question')">question</button>
      <button class="nb" data-mode="plan" onclick="switchMode('plan')">plan</button>
      <button class="nb on" data-mode="model" onclick="switchMode('model')">model</button>
      <button class="nb" data-mode="builder" onclick="switchMode('builder')">builder</button>
      <button class="nb" data-mode="sample" onclick="switchMode('sample')">sample</button>
    </div>
  </div>

</div>
</div>

<!-- ══ INFOGRAPHIC LISTEN OVERLAY ══ -->
<div class="listen-overlay" id="listenOverlay">
  <div class="lo-topbar">
    <span class="lo-brand">INTUITY — Review Model</span>
    <button class="lo-close-btn" onclick="stopPractice()">✕</button>
  </div>
  <div class="infographic-card" id="infographicCard">
    <div class="info-left-stripe" id="infoLeftStripe"></div>
    <div class="info-num-badge" id="infoNumBadge">01</div>
    <div class="info-card-body">
      <div class="info-section-title" id="infoSectionTitle">Introduction</div>
      <div class="info-title-rule" id="infoTitleRule"></div>
      <div class="info-sentences-stack" id="infoSentencesStack"></div>
    </div>
    <div class="info-card-foot">
      <div class="info-icon" id="infoIcon">⭐</div>
      <div class="info-wave" id="infoWave">
        <div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div>
        <div class="info-wave-bar"></div>
      </div>
    </div>
    <div class="info-bottom-line" id="infoBottomLine"></div>
  </div>
  <div class="lo-bottom">
    <div class="info-progress-track">
      <div class="info-progress-fill" id="infoProgressFill" style="width:0%"></div>
    </div>
    <div class="lo-controls-row">
      <span class="lo-counter" id="infoCounter">Section 1 / 1</span>
      <div class="lo-btns">
        <button class="lo-btn primary" id="infoPauseBtn" onclick="togglePausePractice()">⏸ Pause</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ══ STATE ══ */
let skeletonData = null;
let phraseData   = null;
let currentType  = 'ocean-documentary';
let currentPracticeQuestion = 0;
let viewMode     = 'skeleton';
let practiceMode = 'text'; // 'text' | 'listen'
let practiceQuestions = null;

/* ══ SECTION COLOUR PALETTE (from mother) ══ */
const SECTION_COLORS = [
  { accent:'#5ab5ac', badge:'#5ab5ac', icon:'⭐' },
  { accent:'#f89643', badge:'#f89643', icon:'🎬' },
  { accent:'#8b7ba8', badge:'#8b7ba8', icon:'💡' },
  { accent:'#C9A961', badge:'#C9A961', icon:'🎭' },
  { accent:'#e8723a', badge:'#e8723a', icon:'✅' },
];
function sectionPalette(idx){ return SECTION_COLORS[idx % SECTION_COLORS.length]; }

/* ══ CATEGORY MAP for practice questions ══ */
const CATEGORY_MAP = {
  'ocean-documentary': 'documentaries',
  'ed-sheeran-concert': 'festivals',
  'italian-restaurant-meal': 'places',
  'restaurant-anniversary': 'places',
  'surf-camp-portugal': 'experiences',
  'lonely-planet-spain': 'products',
  'atomic-habits-book': 'products',
  'duolingo-app': 'products',
  'film-intern': 'entertainment',
  'stardew-valley-game': 'entertainment'
};

/* ══ INIT ══ */
async function init(){
  try{
    const [r1,r2,r3] = await Promise.all([
      fetch('data/complete-review-phrase-bank.json'),
      fetch('data/complete-review-phrase-bank1.json'),
      fetch('data/review-practice.json')
    ]);
    skeletonData = await r1.json();
    phraseData   = await r2.json();
    const practice = await r3.json();
    practiceQuestions = practice.questions;
    renderTabs();
    renderContent();
    updateNav();
  } catch(e){
    console.error(e);
    document.getElementById('contentArea').innerHTML =
      '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">⚠️ Failed to load data</div>';
  }
}

/* ══ TABS ══ */
function renderTabs(){
  const c = document.getElementById('tabsContainer');
  const types = Object.keys(skeletonData);
  c.innerHTML = types.map(k=>`
    <button class="tab-btn ${k===currentType?'active':''}" onclick="switchType('${k}')">
      ${skeletonData[k].label}
    </button>`).join('');
}

function switchType(type){
  currentType = type;
  currentPracticeQuestion = 0;
  stopPractice();
  renderTabs();
  renderContent();
  updateNav();
}

/* ══ RENDER ══ */
function renderContent(){
  const area = document.getElementById('contentArea');
  if(viewMode==='skeleton'){
    document.getElementById('contentTitle').textContent = skeletonData[currentType].label;
    area.innerHTML = renderSkeleton();
  } else if(viewMode==='phrases'){
    document.getElementById('contentTitle').textContent = skeletonData[currentType].label;
    area.innerHTML = renderPhrases();
  } else {
    document.getElementById('contentTitle').textContent = `${skeletonData[currentType].label} — Practice`;
    area.innerHTML = renderPractice();
  }
}

/* ══ REVIEW SKELETON SECTIONS ══ */
const REVIEW_SKEL_SECTIONS = [
  {label:'Introduction', color:'sr-intro'},
  {label:'Feature 1',    color:'sr-body1'},
  {label:'Feature 2',    color:'sr-body2'},
  {label:'Feature 3',    color:'sr-body3'},
  {label:'Recommendation', color:'sr-conc'},
];
function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function renderSkeleton(){
  const review = skeletonData[currentType];
  if(!review||!review.skeletons||!review.skeletons[0])
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">Skeleton not available</div>';
  const variation = review.skeletons[0];
  let rows = '';
  variation.skeleton.forEach((section, i) => {
    const sec = REVIEW_SKEL_SECTIONS[i] || {label: section.title, color:'sr-body1'};
    const mainLine = section.lines[0] || '';
    const elab = section.lines[1] || '';
    rows += `<div class="skel-row ${sec.color}">
      <div class="skel-strip"></div>
      <div class="skel-num">${String(i+1).padStart(2,'0')}</div>
      <div class="skel-content">
        <div class="skel-section-label">${sec.label}</div>
        <div style="display:flex;align-items:flex-start">
          <div class="skel-bullet-dot"></div>
          <div class="skel-key-phrase">${mainLine}</div>
        </div>
        ${elab?`<div class="skel-elaboration">${elab}</div>`:''}
      </div>
    </div>`;
  });
  return `<div class="skel-wrap"><div class="skel-banner" id="skelBanner">${rows}
    <div class="skel-footer">
      <button class="shuffle-btn" id="shuffleBtn" onclick="shuffleSkeleton()">
        <span class="shuffle-icon">⟳</span> Shuffle
      </button>
    </div>
  </div></div>`;
}

function shuffleSkeleton(){
  const btn=document.getElementById('shuffleBtn');
  if(btn){btn.classList.add('spinning');setTimeout(()=>btn.classList.remove('spinning'),400);}
  const review=skeletonData[currentType];
  const skeletons=review.skeletons||[];
  const variation=skeletons[Math.floor(Math.random()*skeletons.length)];
  const banner=document.getElementById('skelBanner');
  if(!banner||!variation)return;
  const footer=banner.querySelector('.skel-footer');
  let rows='';
  variation.skeleton.forEach((section,i)=>{
    const sec=REVIEW_SKEL_SECTIONS[i]||{label:section.title,color:'sr-body1'};
    const mainLine=section.lines[0]||'';
    const elab=section.lines[1]||'';
    rows+=`<div class="skel-row ${sec.color}">
      <div class="skel-strip"></div>
      <div class="skel-num">${String(i+1).padStart(2,'0')}</div>
      <div class="skel-content">
        <div class="skel-section-label">${sec.label}</div>
        <div style="display:flex;align-items:flex-start">
          <div class="skel-bullet-dot"></div>
          <div class="skel-key-phrase">${mainLine}</div>
        </div>
        ${elab?`<div class="skel-elaboration">${elab}</div>`:''}
      </div>
    </div>`;
  });
  banner.innerHTML=rows;
  banner.appendChild(footer);
}

function renderPhrases(){
  const phraseBank = phraseData[currentType];
  if(!phraseBank||!phraseBank.categories)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">No phrases available.</div>';
  let h='<div class="phrases-display">';
  phraseBank.categories.forEach(cat=>{
    const t=cat.title.toLowerCase();
    const c=t.includes('intro')?'intro':t.includes('recommend')?'conclusion':'feature';
    h+=`<div class="phrase-category"><div class="category-title ${c}">${cat.title}</div>`;
    cat.subcategories.forEach(sub=>{
      h+=`<ul class="phrase-list">`;
      sub.phrases.forEach(p=>{ h+=`<li class="phrase-item">${p}</li>`; });
      h+='</ul>';
    });
    h+='</div>';
  });
  return h+'</div>';
}

/* ══ PRACTICE RENDER — mother transcript system ══ */
function renderPractice(){
  if(!practiceQuestions)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">Loading practice questions...</div>';
  const category = CATEGORY_MAP[currentType] || 'entertainment';
  const set = practiceQuestions[category];
  if(!set||!set.length)
    return '<div style="padding:2rem;text-align:center;color:rgba(0,0,0,0.4)">No practice questions for this type.</div>';
  const data = set[currentPracticeQuestion];
  const isTextMode = practiceMode === 'text';

  let transcriptLines = '';
  data.answer.forEach((line, i) => {
    const tag = line.phrase
      ? `<span class="transcript-tag tag-${line.phraseType||'feature'}">${line.label||line.phraseType||'phrase'}</span>`
      : '';
    transcriptLines += `<div class="transcript-line" id="tl${i}">${line.text}${tag}</div>`;
  });

  return `<div class="practice-wrap">
    <div class="practice-q">
      <div class="practice-q-label">Practice Question ${currentPracticeQuestion+1} of ${set.length}</div>
      <div class="practice-q-text">${data.question}</div>
    </div>
    <div class="practice-controls-row">
      <div class="practice-mode-toggle">
        <button class="pmt-btn ${practiceMode==='text'?'active':''}" onclick="setPracticeMode('text')">Read along</button>
        <button class="pmt-btn ${practiceMode==='listen'?'active':''}" onclick="setPracticeMode('listen')">Just listen</button>
      </div>
      <button class="play-btn ${isTextMode?'text-mode':''}" id="playPracticeBtn" onclick="startPractice()">▶ ${isTextMode?'Read along':'Play'}</button>
    </div>
    <div class="transcript-wrap" id="transcriptWrap">
      <div class="transcript-label">Model answer</div>
      ${transcriptLines}
    </div>
  </div>`;
}

/* ══ PRACTICE MODE SWITCH ══ */
function setPracticeMode(m){
  if(m===practiceMode) return;
  stopPractice();
  practiceMode = m;
  renderContent();
}

/* ══ AUDIO STATE ══ */
let practiceActive = false;
let practicePaused = false;
let practiceSynth  = window.speechSynthesis;
let practiceNarrator = null;

async function getPracticeVoice(){
  return new Promise(resolve=>{
    const load=()=>{
      const v=practiceSynth.getVoices();
      const found=v.find(x=>x.name==='Google UK English Male')||v.find(x=>x.name==='Daniel')||v.find(x=>x.lang==='en-GB')||v.find(x=>x.lang.startsWith('en'))||v[0]||null;
      resolve(found);
    };
    if(practiceSynth.getVoices().length) load();
    else practiceSynth.onvoiceschanged=load;
  });
}

function stopPractice(){
  practiceActive = false;
  practicePaused = false;
  practiceSynth.cancel();
  showListenOverlay(false);
  const btn=document.getElementById('playPracticeBtn');
  if(btn){ btn.textContent=practiceMode==='text'?'▶ Read along':'▶ Play'; btn.classList.toggle('text-mode',practiceMode==='text'); }
  document.querySelectorAll('.transcript-line').forEach(l=>l.classList.remove('active','done'));
}

/* ══ START PRACTICE ══ */
async function startPractice(){
  if(practiceActive){ stopPractice(); return; }
  const category = CATEGORY_MAP[currentType] || 'entertainment';
  const data = practiceQuestions ? practiceQuestions[category]?.[currentPracticeQuestion] : null;
  if(!data) return;

  practiceActive = true;
  practicePaused = false;
  practiceNarrator = await getPracticeVoice();

  const btn=document.getElementById('playPracticeBtn');
  if(btn){ btn.textContent='■ Stop'; btn.classList.remove('text-mode'); }

  // Build sections
  const sections = buildSections(data.answer);

  if(practiceMode==='listen'){
    showListenOverlay(true);
    for(let si=0; si<sections.length; si++){
      if(!practiceActive) break;
      const sec=sections[si];
      const palette=sectionPalette(si);
      showSectionCard(sec, si, sections.length, palette);
      for(let li=0; li<sec.lines.length; li++){
        if(!practiceActive) break;
        while(practicePaused && practiceActive){ await wait(150); }
        if(!practiceActive) break;
        appendSentenceToCard(sec.lines[li].text, li===0, palette);
        document.getElementById('infoProgressFill').style.width=Math.round(((si+1)/sections.length)*100)+'%';
        document.getElementById('infoCounter').textContent=`Section ${si+1} / ${sections.length}`;
        await speakLine(sec.lines[li].text);
        if(practiceActive && !practicePaused) await wait(380);
      }
      if(practiceActive && si<sections.length-1) await wait(650);
    }
  } else {
    // READ ALONG — transcript highlights only, no overlay at all
    document.querySelectorAll('.transcript-line').forEach(l=>l.classList.remove('active','done'));
    for(let i=0; i<data.answer.length; i++){
      if(!practiceActive) break;
      while(practicePaused && practiceActive){ await wait(150); }
      if(!practiceActive) break;
      const line=data.answer[i];
      const lineEl=document.getElementById(`tl${i}`);
      document.querySelectorAll('.transcript-line').forEach((el,j)=>{
        el.classList.toggle('active', j===i);
        if(j<i) el.classList.add('done');
      });
      if(lineEl) lineEl.scrollIntoView({behavior:'smooth',block:'nearest'});
      await speakLine(line.text);
      if(practiceActive) await wait(350);
    }
    document.querySelectorAll('.transcript-line').forEach(el=>{el.classList.remove('active');el.classList.add('done');});
  }

  if(practiceActive){
    stopPractice();
  }
}

/* Build sections: every line WITH a phrase starts a new card.
   Lines without a phrase attach to the current card as supporting sentences.
   This mirrors the mother file's one-card-per-paragraph behaviour. */
function buildSections(answer){
  const sections = [];
  let current = null;
  answer.forEach(line => {
    if(line.phrase){
      current = {
        label: line.label || line.phraseType || 'Feature',
        type:  line.phraseType || 'feature',
        lines: [line]
      };
      sections.push(current);
    } else {
      if(!current){
        current = { label: 'Opening', type: 'feature', lines: [] };
        sections.push(current);
      }
      current.lines.push(line);
    }
  });
  return sections;
}

/* ══ INFOGRAPHIC CARD HELPERS ══ */
function showSectionCard(sec, sectionIdx, totalSections, palette){
  document.getElementById('infoLeftStripe').style.background=palette.accent;
  document.getElementById('infoNumBadge').textContent=String(sectionIdx+1).padStart(2,'0');
  document.getElementById('infoNumBadge').style.background=palette.badge;
  document.getElementById('infoSectionTitle').textContent=(sec.label||'').toUpperCase();
  document.getElementById('infoTitleRule').style.background=palette.accent;
  document.getElementById('infoBottomLine').style.background=palette.accent;
  document.getElementById('infoIcon').textContent=palette.icon;
  document.querySelectorAll('.info-wave-bar').forEach(b=>b.style.background=palette.accent);
  document.getElementById('infoSentencesStack').innerHTML='';
  const card=document.getElementById('infographicCard');
  card.classList.remove('section-enter');
  void card.offsetWidth;
  card.classList.add('section-enter');
  document.getElementById('infoWave').classList.remove('paused');
  document.getElementById('infoPauseBtn').textContent='⏸ Pause';
}

function appendSentenceToCard(text, isFirst, palette){
  const stack=document.getElementById('infoSentencesStack');
  const line=document.createElement('div');
  line.className='info-sentence-line'+(isFirst?' first':'');
  line.textContent=text;
  stack.appendChild(line);
  requestAnimationFrame(()=>requestAnimationFrame(()=>line.classList.add('visible')));
  line.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function showListenOverlay(show){
  const ov=document.getElementById('listenOverlay');
  if(show){ ov.classList.add('active'); }
  else { ov.classList.remove('active'); const wave=document.getElementById('infoWave'); if(wave) wave.classList.add('paused'); }
}

function togglePausePractice(){
  if(!practiceActive) return;
  const btn=document.getElementById('infoPauseBtn');
  if(practicePaused){
    practicePaused=false;
    if(btn) btn.textContent='⏸ Pause';
    document.getElementById('infoWave').classList.remove('paused');
  } else {
    practicePaused=true;
    practiceSynth.cancel();
    if(btn) btn.textContent='▶ Resume';
    document.getElementById('infoWave').classList.add('paused');
  }
}

/* ══ SPEECH ══ */
function speakLine(text){
  return new Promise(resolve=>{
    if(!practiceActive){ resolve(); return; }
    practiceSynth.cancel();
    setTimeout(()=>{
      if(!practiceActive){ resolve(); return; }
      const utt=new SpeechSynthesisUtterance(text);
      utt.voice=practiceNarrator; utt.rate=0.88; utt.pitch=1.05; utt.volume=1;
      utt.onend=()=>resolve(); utt.onerror=()=>resolve();
      practiceSynth.speak(utt);
    },80);
  });
}
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ══ SHOW PHRASE CARD (read-along mode) — uses same infographic overlay ══ */
function showPhraseCard(phraseText, label, palette){
  document.getElementById('infoLeftStripe').style.background = palette.accent;
  document.getElementById('infoNumBadge').textContent = '✦';
  document.getElementById('infoNumBadge').style.background = palette.badge;
  document.getElementById('infoSectionTitle').textContent = (label||'Key Phrase').toUpperCase();
  document.getElementById('infoTitleRule').style.background = palette.accent;
  document.getElementById('infoBottomLine').style.background = palette.accent;
  document.getElementById('infoIcon').textContent = palette.icon;
  document.querySelectorAll('.info-wave-bar').forEach(b=>b.style.background=palette.accent);
  const stack = document.getElementById('infoSentencesStack');
  stack.innerHTML = '';
  const line = document.createElement('div');
  line.className = 'info-sentence-line first';
  line.textContent = phraseText;
  stack.appendChild(line);
  requestAnimationFrame(()=>requestAnimationFrame(()=>line.classList.add('visible')));
  const card = document.getElementById('infographicCard');
  card.classList.remove('section-enter');
  void card.offsetWidth;
  card.classList.add('section-enter');
  document.getElementById('infoWave').classList.remove('paused');
  document.getElementById('infoPauseBtn').textContent = '⏸ Pause';
  document.getElementById('infoProgressFill').style.width = '100%';
  document.getElementById('infoCounter').textContent = label || 'Key Phrase';
}

/* ══ VIEW MODE ══ */
function setViewMode(mode){
  stopPractice();
  if(mode==='practice') currentPracticeQuestion=0;
  viewMode=mode;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  renderContent();
  updateNav();
}

/* ══ NAV ══ */
function navigate(dir){
  stopPractice();
  if(viewMode==='practice'){
    const category=CATEGORY_MAP[currentType]||'entertainment';
    const set=practiceQuestions?(practiceQuestions[category]||[]):[];
    const next=currentPracticeQuestion+dir;
    if(next>=0&&next<set.length){ currentPracticeQuestion=next; }
  } else {
    const types=Object.keys(skeletonData);
    const idx=types.indexOf(currentType)+dir;
    if(idx>=0&&idx<types.length){ switchType(types[idx]); return; }
  }
  renderContent(); updateNav();
}

function updateNav(){
  const prev=document.getElementById('btnPrev');
  const next=document.getElementById('btnNext');
  const ctr=document.getElementById('pageCounter');
  if(viewMode==='practice'){
    const category=CATEGORY_MAP[currentType]||'entertainment';
    const set=practiceQuestions?(practiceQuestions[category]||[]):[];
    prev.disabled=(currentPracticeQuestion===0);
    next.disabled=(currentPracticeQuestion===set.length-1);
    ctr.textContent=`Q ${currentPracticeQuestion+1} / ${set.length}`;
  } else {
    const types=Object.keys(skeletonData);
    const idx=types.indexOf(currentType);
    prev.disabled=idx===0; next.disabled=idx===types.length-1;
    ctr.textContent=`${idx+1} / ${types.length}`;
  }
}

/* ══ MODE SWITCHING ══ */
function switchMode(mode){
  if(mode==='model') return;
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
  const map={question:'review-question-selector.html',structure:'review-plan.html',plan:'review-plan.html',builder:'review-builder.html',sample:'review-master.html'};
  if(map[mode]) window.location.href=map[mode];
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') stopPractice();
  if(e.key==='ArrowLeft') navigate(-1);
  if(e.key==='ArrowRight') navigate(1);
});

init();
</script>
